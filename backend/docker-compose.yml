# Production Docker Compose for Qori Slack AI Bot
version: "3.8"

services:
  qori-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qori-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DIALECT: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URI: redis://redis:6379
      PORT: 3000
      # Slack configuration
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      # GitHub configuration
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_OWNER: ${GITHUB_OWNER}
      GITHUB_REPO: ${GITHUB_REPO}
      # AI configuration
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL_NAME: ${ANTHROPIC_MODEL_NAME:-claude-sonnet-4-20250514}
      ANTHROPIC_TEMPERATURE: ${ANTHROPIC_TEMPERATURE:-0.4}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Other environment variables
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - qori-network
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: qori-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    networks:
      - qori-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qori-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - qori-network
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:

networks:
  qori-network:
    driver: bridge
