# docker-compose -f docker-compose-dev.yml up --build
# Development Docker Compose for Qori Slack AI Bot

version: "3.8"

services:
  qori-backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: qori-backend-dev
    environment:
      NODE_ENV: development
      DB_NAME: ${DB_NAME:-qori_dev}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DIALECT: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URI: redis://redis:6379
      PORT: 3000
      # Slack configuration
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      # GitHub configuration
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_OWNER: ${GITHUB_OWNER}
      GITHUB_REPO: ${GITHUB_REPO}
      # AI configuration
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL_NAME: ${ANTHROPIC_MODEL_NAME:-claude-sonnet-4-20250514}
      ANTHROPIC_TEMPERATURE: ${ANTHROPIC_TEMPERATURE:-0.4}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Other environment variables
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - qori-network
    env_file:
      - .env
    volumes:
      # Mount source code for hot reload (if using nodemon in dev)
      - ./src:/app/src
      - ./package.json:/app/package.json
    command: npm run dev

  postgres:
    image: postgres:15-alpine
    container_name: qori-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-qori_dev}
    ports:
      - "5432:5432"
    networks:
      - qori-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qori-redis-dev
    ports:
      - "6379:6379"
    networks:
      - qori-network
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  postgres-data:
  redis-data:

networks:
  qori-network:
    driver: bridge
