id: targeted_readouts
name: run_targeted_readouts
label: "🎯 Targeted Readouts"
version: v4.0
description: |
  Generate audience-specific research reports. Supports Congressional Briefings, 
  Leadership Briefs, Product Briefs, and Team Readouts with appropriate tone, 
  structure, and level of detail for each audience.
  
  v4.0 Changes:
  - Added Leadership Brief format (Secretary/SES level)
  - Added Product Brief format (PO/Director reporting up)
  - Refined Congressional Briefing format
  - Improved Team Readout with implementation focus
  - Increased max_tokens to 10000
  - Removed backend developer notes

author: Qori R&D
created: 2025-08-19
last_updated: 2026-01-28

input_type: text
input_processing: summarize_if_long

llm_config:
  model: "claude-sonnet-4"
  temperature: 0.2
  max_tokens: 12000

input_variables:
  - research_folder_path
  - target_audience
  - study_name
  - researcher_contact
  - study_channel
  - research_readout_data
  - input_text
  - study_link
  - team_members
  - congressional_mandate
  - oversight_committee
  - reporting_deadline

core_files:
  research_plan:
    file: "research_plan.md"
    required: true
    extract: ["objectives", "methods", "success_criteria", "timeline"]
    
  session_summaries:
    folder: "03-fieldwork/session-summaries/"
    required: true
    extract: ["pain_points", "opportunities", "insights", "quotes", "participant_context"]
    file_pattern: "*session_summary*.md"
    
  participant_tracker:
    file: "participant_tracker.md"
    required: false
    extract: ["demographics", "sample_size", "completion_status"]

optional_files:
  affinity_mapping:
    file: "04-analysis/affinity-mapping/*.md"
    extract: ["themes", "evidence_counts", "recommendations"]
    
  journey_mapping:
    file: "04-analysis/journey-mapping/*.md"
    extract: ["stages", "pain_points", "opportunities"]

auto_variables:
  - audience_category: |
      determine_audience_category(target_audience) || "team"
  - current_date: |
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      generate_github_link(study_name, current_date, target_audience) || null
  - detected_files: |
      scan_research_folder(research_folder_path, core_files, optional_files)
  - participant_count: |
      extract_from_md(participant_tracker, "participants") || "Unknown"
  - session_count: |
      count_completed_sessions(participant_tracker, "completed") || "Unknown"

audience_routing:
  congressional:
    - "congressional_briefing"
    - "congressional"
    - "Congressional Briefing"
    
  leadership:
    - "executive"
    - "executive_leadership"
    - "Executive Leadership"
    - "leadership"
    - "ses_briefing"
    - "secretary"
    
  product_leadership:
    - "product_leadership"
    - "Product Leadership"
    - "design_leadership"
    - "Design Leadership"
    - "director"
    
  team:
    - "product"
    - "Product Team"
    - "design"
    - "Design Team"
    - "engineering"
    - "Engineering Team"
    - "accessibility"
    - "Accessibility Team"
    - "content"
    - "Content Team"

ai_generation_tasks:
  - task_id: "targeted_readout_complete"
    prompt: |
      ============================================================
      🚨 CRITICAL GROUNDING RULES - READ FIRST 🚨
      ============================================================
      
      You are creating a targeted research report from REAL research data.
      
      ABSOLUTE REQUIREMENTS:
      1. ONLY use findings, quotes, and data from the source below
      2. NEVER invent statistics, quotes, or findings
      3. Use participant IDs exactly as they appear (PT001, PT002, etc.)
      4. All numbers must be accurate to source data
      5. If source data is empty, say so - do not fabricate
      
      If source data is insufficient, output:
      "⚠️ Insufficient data for targeted report. Required files may be empty."
      
      ============================================================
      SOURCE DATA
      ============================================================
      
      **Study Name:** {{study_name}}
      **Target Audience:** {{target_audience}}
      **Research Folder:** {{research_folder_path}}
      **Lead Researcher:** {{researcher_contact}}
      **Congressional Mandate:** {{congressional_mandate}}
      **Oversight Committee:** {{oversight_committee}}
      
      **Research Data:**
      
      {{input_text}}
      
      {{research_readout_data}}
      
      ============================================================
      AUDIENCE DETECTION
      ============================================================
      
      Determine audience type from {{target_audience}}:
      
      CONGRESSIONAL: "Congressional Briefing", "congressional_briefing", "congressional"
      LEADERSHIP: "Executive Leadership", "executive_leadership", "executive", "leadership", "secretary"
      PRODUCT_LEADERSHIP: "Product Leadership", "Design Leadership", "product_leadership", "design_leadership", "director"
      TEAM: "Product Team", "Design Team", "Engineering Team", "Accessibility Team", "Content Team", "product", "design", "engineering", "accessibility", "content"
      
      Select the appropriate format below based on audience type.
      
      ============================================================
      FORMAT A: CONGRESSIONAL BRIEFING
      ============================================================
      
      Use this format for: Congressional Briefing
      
      Tone: Formal government language. No jargon. Direct and specific.
      Length: 1-2 pages maximum. Legislators skim.
      Purpose: Testimony prep, oversight response, budget justification.
      
      ---
      
      <div align="center">
      
      # 🏛️ CONGRESSIONAL BRIEFING
      ## {{study_name}}
      
      **[Date]**
      
      ---
      
      | Classification | Prepared By | Oversight Committee |
      |:--------------:|:-----------:|:-------------------:|
      | UNCLASSIFIED | {{researcher_contact}} | {{oversight_committee}} |
      
      </div>
      
      ---
      
      ## 📌 BOTTOM LINE UP FRONT
      
      > [!IMPORTANT]
      > [2-3 sentences maximum. What Congress needs to know RIGHT NOW.]
      
      | Issue | Veteran Impact | VA Status |
      |:------|:---------------|:----------|
      | [Primary issue] | [X] veterans affected | [What VA is doing] |
      
      ---
      
      ## 📋 BACKGROUND
      
      **Why this research was conducted:** [1-2 sentences]
      
      | Study Details | |
      |:--------------|:--|
      | **Methodology** | [Usability testing / Interviews / etc.] |
      | **Participants** | [X] veterans |
      | **Focus Area** | [What was evaluated] |
      
      ---
      
      ## 🔍 KEY FINDINGS
      
      ### Finding 1: [Title]
      
      - **Veteran Impact:** [How many affected, severity]
      - **Evidence:** "[Brief quote]" — PT00X
      - **Status:** [Being addressed / Requires action]
      
      ### Finding 2: [Title]
      
      - **Veteran Impact:** [How many affected, severity]
      - **Evidence:** "[Brief quote]" — PT00X
      - **Status:** [Being addressed / Requires action]
      
      ### Finding 3: [Title]
      
      - **Veteran Impact:** [How many affected, severity]
      - **Evidence:** "[Brief quote]" — PT00X
      - **Status:** [Being addressed / Requires action]
      
      ---
      
      ## ✅ ACTIONS UNDERWAY
      
      | Action | Owner | Timeline | Status |
      |:-------|:------|:---------|:-------|
      | [Action 1] | [Team] | [Date] | [In Progress/Planned] |
      | [Action 2] | [Team] | [Date] | [In Progress/Planned] |
      
      ---
      
      ## ⚠️ RISK IF NOT ADDRESSED
      
      - [Specific consequence for veterans]
      - [Potential scale of impact]
      
      ---
      
      ## 📊 SUCCESS METRICS
      
      Congress can track progress through:
      - [Metric 1 with target]
      - [Metric 2 with target]
      
      ---
      
      <div align="center">
      
      ---
      
      **Point of Contact:** {{researcher_contact}} | **Channel:** {{study_channel}}
      
      ---
      
      *Prepared for Congressional Oversight • [Date]*
      
      </div>
      
      ---
      
      ============================================================
      FORMAT B: LEADERSHIP BRIEF (Executive Leadership)
      ============================================================
      
      Use this format for: Executive Leadership, Secretary, SES
      
      Tone: Strategic, mission-focused. Decisions and risk.
      Length: 1 page. They have 5 minutes.
      Purpose: Priority setting, budget decisions, risk awareness.
      
      ---
      
      <div align="center">
      
      # 📊 LEADERSHIP BRIEF
      ## {{study_name}}
      
      **[Date]**
      
      ---
      
      | Participants | Sessions | Methodology | Lead Researcher |
      |:------------:|:--------:|:-----------:|:---------------:|
      | {{participant_count}} | {{session_count}} | [Type] | {{researcher_contact}} |
      
      </div>
      
      ---
      
      ## 📌 BOTTOM LINE
      
      > [!IMPORTANT]
      > [One sentence: What's the issue and why does it matter to VA's mission?]
      
      ---
      
      ## 🎯 VETERAN IMPACT
      
      | Finding | Veterans Affected | Severity | Mission Risk |
      |:--------|:-----------------:|:--------:|:-------------|
      | [Finding 1] | [X] of [Y] | 🔴 Critical | [Risk to VA mission] |
      | [Finding 2] | [X] of [Y] | 🟡 High | [Risk to VA mission] |
      | [Finding 3] | [X] of [Y] | 🟢 Low | [Positive/maintain] |
      
      ---
      
      ## ✅ WHAT'S WORKING
      
      - [Positive finding] — preserve and expand
      
      ---
      
      ## ⚡ DECISION NEEDED
      
      | Decision | Options | Recommendation |
      |:---------|:--------|:---------------|
      | [What needs deciding] | A: [Option] / B: [Option] | [Recommended + why] |
      
      ---
      
      ## 💰 RESOURCE IMPLICATIONS
      
      | Aspect | Impact |
      |:-------|:-------|
      | **Timeline** | [Effect on roadmap] |
      | **Staffing** | [Any needs or "Current staffing sufficient"] |
      | **Budget** | [Any implications or "No additional budget required"] |
      
      ---
      
      ## ⚠️ IF NOT ADDRESSED
      
      - [Consequence 1 for veterans]
      - [Consequence 2 for VA operations/reputation]
      
      ---
      
      <div align="center">
      
      ---
      
      **Full Report:** [Link to complete research report]
      
      **Contact:** {{researcher_contact}} | **Channel:** {{study_channel}}
      
      ---
      
      *Prepared for VA Leadership • [Date]*
      
      </div>
      
      ---
      
      ============================================================
      FORMAT C: PRODUCT BRIEF (Product/Design Leadership)
      ============================================================
      
      Use this format for: Product Leadership, Design Leadership, Directors
      
      Tone: Strategic but practical. Roadmap and trade-offs.
      Length: 1-2 pages. Needs to justify priorities.
      Purpose: Roadmap decisions, resource requests, stakeholder updates.
      
      ---
      
      <div align="center">
      
      # PRODUCT BRIEF
      ## {{study_name}}
      
      **Date:** [Date] | **Participants:** {{participant_count}} | **Lead:** {{researcher_contact}}
      
      </div>
      
      ---
      
      ## SUMMARY
      
      > [!IMPORTANT]
      > [One sentence: What did we learn and what should we do about it?]
      
      ---
      
      ## PRIORITY MATRIX
      
      | Finding | Severity | User Impact | Effort | Recommendation |
      |:--------|:--------:|:-----------:|:------:|:---------------|
      | [Finding 1] | 🔴 Critical | High | Medium | Fix in current sprint |
      | [Finding 2] | 🟡 High | Medium | High | Plan for next quarter |
      | [Finding 3] | 🟢 Low | Low | Low | Backlog |
      
      ---
      
      ## KEY FINDINGS
      
      ### 🔴 [Finding 1 Title]
      
      **The Problem:** [2-3 sentences describing the issue]
      
      **User Evidence:**
      > "[Quote from participant]" — PT00X
      
      **Impact:** [X]% of participants affected | [Effect on task completion/satisfaction]
      
      **Recommended Action:** [Specific fix]
      
      ---
      
      ### 🟡 [Finding 2 Title]
      
      [Same format]
      
      ---
      
      ## WHAT'S WORKING
      
      | Feature/Flow | Evidence | Recommendation |
      |:-------------|:---------|:---------------|
      | [What works] | "[Quote]" — PT00X | Maintain / Expand pattern to X |
      
      ---
      
      ## ROADMAP IMPACT
      
      **If we prioritize these fixes:**
      - [Trade-off 1: What gets delayed]
      - [Trade-off 2: Resource reallocation]
      
      **If we delay these fixes:**
      - [Risk 1: User impact continues]
      - [Risk 2: Metric impact]
      
      ---
      
      ## METRICS TO TRACK
      
      | Metric | Current | Target | Timeline |
      |:-------|:-------:|:------:|:---------|
      | [Metric 1] | [X] | [Y] | [When] |
      | [Metric 2] | [X] | [Y] | [When] |
      
      ---
      
      ## NEXT STEPS
      
      | Action | Owner | By When |
      |:-------|:------|:--------|
      | [Action 1] | [Team/Person] | [Date] |
      | [Action 2] | [Team/Person] | [Date] |
      
      ---
      
      **Questions?** {{researcher_contact}}
      
      ---
      
      ============================================================
      FORMAT D: TEAM READOUTS (Team-Specific)
      ============================================================
      
      IMPORTANT: Select the correct sub-format based on {{target_audience}}.
      Each team gets findings filtered and framed for their domain.
      
      ---
      
      ============================================================
      FORMAT D1: ENGINEERING TEAM
      ============================================================
      
      Use for: Engineering Team, engineering
      
      Filter for: Performance issues, technical implementation problems, 
      accessibility code violations, API/component errors, load times.
      
      Frame findings as: Technical issues with specific components affected.
      
      ---
      
      <div align="center">
      
      # 🔧 ENGINEERING READOUT
      ## {{study_name}}
      
      **[Date]**
      
      ---
      
      | Participants | Sessions | Lead Researcher |
      |:------------:|:--------:|:---------------:|
      | {{participant_count}} | {{session_count}} | {{researcher_contact}} |
      
      </div>
      
      ---
      
      ## TL;DR FOR ENGINEERING
      
      - 🔴 [Technical issue requiring immediate fix]
      - 🔴 [Another critical technical issue if applicable]
      - 🟡 [Performance or implementation improvement needed]
      - 🟢 [What's working technically - don't break this]
      
      ---
      
      ## TECHNICAL ISSUES
      
      ### 🔴 Issue 1: [Technical Issue Title]
      
      **User Evidence:**
      > "[Quote describing the problem]"
      > — **PT00X**
      
      | Technical Details | |
      |:------------------|:--|
      | **Issue Type** | [Performance / Accessibility / Error Handling / API / Component] |
      | **Severity** | 🔴 Critical |
      | **Affected Users** | [X] of [Y] participants ([%]) |
      | **Component/Screen** | [Specific component, screen, or API affected] |
      | **Repro Steps** | [If identifiable from research: steps to reproduce] |
      
      **Technical Recommendation:**
      ```
      [Specific technical fix - e.g., "Add aria-label to button element", 
      "Implement lazy loading for images", "Add error boundary for API failures"]
      ```
      
      ---
      
      ### 🟡 Issue 2: [Technical Issue Title]
      
      [Same format]
      
      ---
      
      ## ACCESSIBILITY VIOLATIONS (Engineering Action Required)
      
      | WCAG Criterion | Issue | Component | Fix |
      |:---------------|:------|:----------|:----|
      | [1.1.1 Non-text Content] | [Unlabeled button] | [Component] | [Add aria-label] |
      | [2.1.1 Keyboard] | [Not keyboard accessible] | [Component] | [Add tabindex, handlers] |
      
      ---
      
      ## PERFORMANCE METRICS OBSERVED
      
      | Metric | Observed | Target | Priority |
      |:-------|:--------:|:------:|:--------:|
      | [Load time] | [45+ sec] | [<3 sec] | 🔴 |
      | [Time to interactive] | [X sec] | [<X sec] | 🟡 |
      
      ---
      
      ## IMPLEMENTATION CHECKLIST
      
      - [ ] [Specific technical task with component name]
      - [ ] [Specific technical task with component name]
      - [ ] [Specific technical task with component name]
      - [ ] [Specific technical task with component name]
      
      ---
      
      ## WORKING WELL (Preserve These Patterns)
      
      | Feature | Why It Works (Technically) | Evidence |
      |:--------|:---------------------------|:---------|
      | [Feature] | [Technical reason - fast API, good caching, clean component] | "[Quote]" — PT00X |
      
      ---
      
      **Questions?** {{researcher_contact}} | **Channel:** {{study_channel}}
      
      ---
      
      ============================================================
      FORMAT D2: DESIGN TEAM
      ============================================================
      
      Use for: Design Team, design
      
      Filter for: Flow issues, pattern problems, visual hierarchy, 
      discoverability, interaction design, information architecture, consistency.
      
      Frame findings as: Design pattern issues with recommended solutions.
      
      ---
      
      <div align="center">
      
      # 🎨 DESIGN READOUT
      ## {{study_name}}
      
      **[Date]**
      
      ---
      
      | Participants | Sessions | Lead Researcher |
      |:------------:|:--------:|:---------------:|
      | {{participant_count}} | {{session_count}} | {{researcher_contact}} |
      
      </div>
      
      ---
      
      ## TL;DR FOR DESIGN
      
      - 🔴 [Critical UX pattern issue]
      - 🔴 [Another critical design issue if applicable]
      - 🟡 [Flow or hierarchy improvement needed]
      - 🟢 [Design pattern working well - extend this]
      
      ---
      
      ## DESIGN PATTERN ISSUES
      
      ### 🔴 Issue 1: [Design Pattern Issue Title]
      
      **User Behavior Observed:**
      > "[Quote showing confusion or failure]"
      > — **PT00X**
      
      | Design Details | |
      |:---------------|:--|
      | **Pattern Type** | [Navigation / Discoverability / Hierarchy / Interaction / IA / Consistency] |
      | **Severity** | 🔴 Critical |
      | **Affected Users** | [X] of [Y] participants ([%]) |
      | **Screen/Flow** | [Where in the user journey this occurs] |
      | **User Expectation** | [What users expected to happen] |
      | **Actual Experience** | [What actually happened] |
      
      **Design Recommendation:**
      
      | Current State | Recommended Change |
      |:--------------|:-------------------|
      | [Current pattern] | [Recommended pattern with rationale] |
      
      **Reference Pattern:** [If applicable - cite design system or best practice]
      
      ---
      
      ### 🟡 Issue 2: [Design Pattern Issue Title]
      
      [Same format]
      
      ---
      
      ## FLOW ANALYSIS
      
      **Problem Flow:**
      ```
      [Step 1] → [Step 2] → ❌ [Where users got stuck] → [Abandonment]
      ```
      
      **Recommended Flow:**
      ```
      [Step 1] → [Step 2] → ✅ [Improved step] → [Success]
      ```
      
      ---
      
      ## INFORMATION ARCHITECTURE ISSUES
      
      | Content | User Expectation | Current Location | Recommended |
      |:--------|:-----------------|:-----------------|:------------|
      | [Content type] | [Where users looked] | [Where it actually is] | [Where it should be] |
      
      ---
      
      ## DESIGN CHECKLIST
      
      - [ ] [Specific design task - e.g., "Redesign search with prominent placement"]
      - [ ] [Specific design task - e.g., "Simplify messaging flow to 2 steps"]
      - [ ] [Specific design task - e.g., "Increase touch target size for edit buttons"]
      - [ ] [Specific design task]
      
      ---
      
      ## PATTERNS WORKING WELL (Extend These)
      
      | Pattern | Why It Works | Where Used | Extend To |
      |:--------|:-------------|:-----------|:----------|
      | [Pattern] | "[User quote praising it]" — PT00X | [Current location] | [Where else to apply] |
      
      ---
      
      **Questions?** {{researcher_contact}} | **Channel:** {{study_channel}}
      
      ---
      
      ============================================================
      FORMAT D3: CONTENT TEAM
      ============================================================
      
      Use for: Content Team, content
      
      Filter for: Labels, microcopy, error messages, terminology mismatches,
      reading level issues, unclear instructions, tone problems.
      
      Frame findings as: Content issues with before/after copy recommendations.
      
      ---
      
      <div align="center">
      
      # ✍️ CONTENT READOUT
      ## {{study_name}}
      
      **[Date]**
      
      ---
      
      | Participants | Sessions | Lead Researcher |
      |:------------:|:--------:|:---------------:|
      | {{participant_count}} | {{session_count}} | {{researcher_contact}} |
      
      </div>
      
      ---
      
      ## TL;DR FOR CONTENT
      
      - 🔴 [Critical labeling or terminology issue]
      - 🟡 [Microcopy improvement needed]
      - 🟡 [Error message or instruction unclear]
      - 🟢 [Content that resonated well with users]
      
      ---
      
      ## CONTENT ISSUES
      
      ### 🔴 Issue 1: [Content Issue Title]
      
      **User Confusion:**
      > "[Quote showing misunderstanding or confusion about terminology/labels]"
      > — **PT00X**
      
      | Content Details | |
      |:----------------|:--|
      | **Issue Type** | [Label / Microcopy / Error Message / Terminology / Instructions / Tone] |
      | **Severity** | 🔴 Critical |
      | **Affected Users** | [X] of [Y] participants ([%]) |
      | **Location** | [Screen and specific element] |
      
      **Copy Recommendation:**
      
      | Current Copy | Recommended Copy | Rationale |
      |:-------------|:-----------------|:----------|
      | "[Exact current text]" | "[Recommended text]" | [Why this is clearer for users] |
      
      ---
      
      ### 🟡 Issue 2: [Content Issue Title]
      
      [Same format]
      
      ---
      
      ## TERMINOLOGY AUDIT
      
      | Term Used | User Understanding | User's Mental Model | Recommended Term |
      |:----------|:-------------------|:--------------------|:-----------------|
      | [Current term] | [How users interpreted it] | [What they expected] | [Better term] |
      
      ---
      
      ## ERROR MESSAGE REVIEW
      
      | Current Error | User Reaction | Recommended Error | Tone |
      |:--------------|:--------------|:------------------|:-----|
      | "[Current message]" | [Confusion/frustration] | "[Clearer message]" | [Helpful/Reassuring] |
      
      ---
      
      ## CONTENT CHECKLIST
      
      - [ ] [Specific copy change with location]
      - [ ] [Specific label update]
      - [ ] [Specific error message rewrite]
      - [ ] [Terminology standardization task]
      
      ---
      
      ## CONTENT WORKING WELL (Maintain These)
      
      | Content Element | Why It Works | Evidence |
      |:----------------|:-------------|:---------|
      | [Label/copy] | [Clear, matches user mental model] | "[Quote]" — PT00X |
      
      ---
      
      **Questions?** {{researcher_contact}} | **Channel:** {{study_channel}}
      
      ---
      
      ============================================================
      FORMAT D4: ACCESSIBILITY TEAM
      ============================================================
      
      Use for: Accessibility Team, accessibility
      
      Filter for: Screen reader issues, keyboard navigation, WCAG violations,
      assistive technology problems, inclusive design gaps.
      
      Frame findings as: WCAG criterion violations with compliance path.
      
      ---
      
      <div align="center">
      
      # ♿ ACCESSIBILITY READOUT
      ## {{study_name}}
      
      **[Date]**
      
      ---
      
      | Participants | Sessions | Lead Researcher |
      |:------------:|:--------:|:---------------:|
      | {{participant_count}} | {{session_count}} | {{researcher_contact}} |
      
      </div>
      
      ---
      
      ## TL;DR FOR ACCESSIBILITY
      
      - 🔴 [Critical WCAG violation blocking users]
      - 🔴 [Another critical accessibility barrier if applicable]
      - 🟡 [Accessibility improvement needed]
      - 🟢 [Accessible pattern working well]
      
      ---
      
      ## WCAG COMPLIANCE SUMMARY
      
      | Level | Violations Found | Status |
      |:------|:----------------:|:------:|
      | **Level A** | [X] | 🔴 Critical gaps |
      | **Level AA** | [X] | 🟡 Improvements needed |
      | **Level AAA** | [X] | 🟢 / Not assessed |
      
      ---
      
      ## ACCESSIBILITY VIOLATIONS
      
      ### 🔴 Violation 1: WCAG [X.X.X] - [Criterion Name]
      
      **User Experience:**
      > "[Quote from user with assistive technology]"
      > — **PT00X** [Assistive tech used: VoiceOver/JAWS/etc.]
      
      | Violation Details | |
      |:------------------|:--|
      | **WCAG Criterion** | [X.X.X - Full criterion name] |
      | **Level** | [A / AA / AAA] |
      | **Severity** | 🔴 Critical |
      | **Assistive Tech Affected** | [Screen readers / Keyboard / Magnification / etc.] |
      | **Component/Screen** | [Specific location] |
      | **Current State** | [What's happening now] |
      
      **Compliance Path:**
      
      | Issue | Fix | WCAG Technique |
      |:------|:----|:---------------|
      | [Specific issue] | [Specific fix] | [ARIA technique or HTML fix] |
      
      ---
      
      ### 🟡 Violation 2: WCAG [X.X.X] - [Criterion Name]
      
      [Same format]
      
      ---
      
      ## ASSISTIVE TECHNOLOGY TESTING SUMMARY
      
      | Technology | Tested By | Major Issues | Minor Issues |
      |:-----------|:----------|:------------:|:------------:|
      | VoiceOver (iOS) | PT00X | [X] | [X] |
      | Large Text | PT00X | [X] | [X] |
      | [Other] | PT00X | [X] | [X] |
      
      ---
      
      ## ACCESSIBILITY CHECKLIST
      
      - [ ] **[WCAG X.X.X]** - [Specific fix for specific component]
      - [ ] **[WCAG X.X.X]** - [Specific fix for specific component]
      - [ ] **[WCAG X.X.X]** - [Specific fix for specific component]
      - [ ] Conduct full accessibility audit for remaining issues
      
      ---
      
      ## ACCESSIBLE PATTERNS WORKING WELL
      
      | Feature | Why It's Accessible | Evidence |
      |:--------|:--------------------|:---------|
      | [Feature] | [Technical reason - proper labels, good contrast, etc.] | "[Quote]" — PT00X |
      
      ---
      
