id: jobs_to_be_done
name: extract_jobs_to_be_done

label: 🎯 Jobs to be Done
version: "v3.4"

description: >
  Extract research-grounded Jobs-to-be-Done using the industry-standard
  When/Want/So framework. Jobs focus on PROGRESS, not tasks.

author: Qori R&D
created: 2025-06-26
last_updated: 2026-01-08

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4000

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 1000
  max_file_size: 100000
  supported_formats: [".md", ".txt", ".csv", ".json"]
  max_files_per_analysis: 20

# Privacy controls
privacy_controls:
  enable_pii_detection: true
  pii_detection_patterns:
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
    phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    ssn: '\b\d{3}-\d{2}-\d{4}\b'
  masking_strategy:
    email: "[EMAIL_REDACTED]"
    phone: "[PHONE_REDACTED]" 
    ssn: "[SSN_REDACTED]"

# Slack modal input variables
input_variables:
  - selected_study
  - include_research_plan
  - include_participant_notes
  - include_raw_transcripts
  - discovered_files
  - combined_file_content
  - quality_assessment

# Study metadata mapping
study_metadata:
  "VA Housing Application Usability Study":
    folder: "va-housing-usability-2025"
    researcher: "jordan.researcher"
    channel: "#research-housing-app"
    focus_area: "housing application usability"
    
  "Benefits Portal Navigation Research":
    folder: "benefits-portal-nav-2025"
    researcher: "alex.ux"
    channel: "#research-benefits"
    focus_area: "benefits portal navigation"
    
  "Veteran Onboarding Experience Study":
    folder: "veteran-onboarding-2025"
    researcher: "casey.research"
    channel: "#research-onboarding"
    focus_area: "veteran onboarding process"

# File discovery system
auto_file_discovery:
  core_files:
    session_summaries:
      file_patterns: ["*session_summary*", "*summary*", "*session*"]
      search_paths: ["01-sessions/", "sessions/", "summaries/"]
      priority: "required"
      confidence_weight: 50
      
    transcripts:
      file_patterns: ["*transcript*", "*interview*", "*recording*"]
      search_paths: ["01-sessions/", "transcripts/", "interviews/"]
      priority: "high"
      confidence_weight: 30

# AI generation tasks - SINGLE CONSOLIDATED TASK
ai_generation_tasks:
  - task_id: "jtbd_complete"
    prompt: |
      You are extracting Jobs-to-be-Done from research data.
      
      IMPORTANT: Generate the COMPLETE output following the format below. Do not stop early.
      
      ============================================================
      RULES (read these, then generate the full output)
      ============================================================
      
      RULE 1: JOBS ARE PROGRESS, NOT TASKS
      
      A JOB is the PROGRESS someone wants to make in their life.
      
      ❌ WRONG (tasks):
      - "Update Profile Information"
      - "Check Claim Status" 
      - "Find the Edit button"
      
      ✅ RIGHT (jobs):
      - "Feel confident the VA can reach me when my benefits status changes"
      - "Know my claim is being processed without having to call anyone"
      
      Test: Can you describe the job WITHOUT mentioning the app? If not, it's a task.
      
      RULE 2: NO HALLUCINATION
      Every pain point must come from actual research data with citations.
      
      RULE 3: VA CONTEXT ONLY
      Jobs relate to veterans accessing healthcare, benefits, claims, prescriptions.
      
      RULE 4: JOBS MUST BE DISTINCT
      If two jobs sound similar, combine them into one.
      
      RULE 5: BEFORE SUBMITTING, VERIFY
      - Job names focus on progress, not tasks
      - Pain points have citations
      - Jobs are distinct from each other
      
      ============================================================
      INPUT DATA
      ============================================================
      
      **Study:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      **Research Data:** {{combined_file_content}}
      
      ============================================================
      NOW GENERATE THE COMPLETE OUTPUT BELOW
      ============================================================
      
      # 🎯 Jobs to be Done: {{selected_study}}
      
      > **[X] jobs** identified from **[Y] participants** | **Generated:** [Today's date]
      
      ---
      
      ## At a Glance
      
      | Job | Core Need | When It Arises |
      |-----|-----------|----------------|
      | [Progress-focused name] | [Underlying need] | [Trigger situation] |
      | [Progress-focused name] | [Underlying need] | [Trigger situation] |
      
      ---
      
      ## Job 1: [Progress-Focused Job Name]
      
      > **When** [specific situation from research],  
      > **I want to** [desired progress — NOT a UI action],  
      > **So I can** [life outcome — NOT app outcome].
      
      **What this job is really about:**
      
      | Functional Need | Emotional Need | Social Need |
      |-----------------|----------------|-------------|
      | [What they're trying to accomplish] | [How they want to feel] | [How they want to be seen] |
      
      **What they do today:**
      
      > "[Quote about current approach]" — PT00X, 00:00:00
      
      Current workarounds: [What they "hire" to do this job now]
      
      **Why current solutions fail:**
      
      | Pain Point | Evidence |
      |------------|----------|
      | [Specific issue] | PT00X, 00:00:00 |
      | [Specific issue] | PT00X, 00:00:00 |
      
      **Success looks like:** [How user knows the job is done — measurable outcome]
      
      **Design opportunity:** [Specific, implementable fix that addresses pain points]
      
      ---
      
      ## Job 2: [Progress-Focused Job Name]
      
      [Same format as Job 1 — only include if truly distinct]
      
      ---
      
      ## Priorities
      
      | # | Opportunity | Addresses Job | Effort |
      |---|-------------|---------------|:------:|
      | 1 | [Specific fix] | Job 1 | 🔵⚪⚪ |
      | 2 | [Specific fix] | Job 2 | 🔵🔵⚪ |
      
      ---
      
      ## Methodology
      
      **Framework:** Jobs-to-be-Done (JTBD)
      
      **Core Principle:** Jobs describe the progress people want to make, not tasks they perform. Jobs are stable even as technology changes.
      
      **Data Sources:** [Participant IDs]
      
      ### References
      
      - **Clayton Christensen** — "Competing Against Luck" (2016)
      - **Bob Moesta** — Switch interviews, Forces of Progress
      - **Tony Ulwick** — Outcome-Driven Innovation
      - **Alan Klement** — "When Coffee and Kale Compete"
      
      ---
      
      *Generated by Qori • [Today's date]*

# Processing workflow
processing_workflow:
  1. validate_slack_modal_inputs
  2. discover_files_from_study_selection
  3. calculate_initial_quality_assessment
  4. validate_discovered_files
  5. combine_selected_files_with_truncation
  6. execute_jtbd_complete
  7. format_slack_output
  8. format_github_output
  9. save_to_analysis_folder
  10. send_team_notifications

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "jtbd_focused"
  file_format: "github_markdown"
  path: "04-analysis/jobs-to-be-done/"
  filename: "{{study_folder}}_jobs_to_be_done_{{current_date}}.md"

# Slack output template
output_template: |
  {{ai_generated.jtbd_complete}}

# GitHub markdown file template
github_file_template: |
  {{ai_generated.jtbd_complete}}

# Auto-generated variables
auto_variables:
  - max_jobs: extract_job_count(ai_generated.jtbd_complete) || 3
  - current_date: new Date().toISOString().split('T')[0]
  - analysis_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(study_name, current_date)

# Slack notifications
notify:
  - role: team
    action: "Jobs to be Done analysis completed"
    channel: "{{study_channel}}"
    message: "🎯 {{researcher_contact}} completed JTBD analysis for {{selected_study}}. {{max_jobs}} jobs identified!"

output_use: |
  Extract Jobs-to-be-Done focusing on PROGRESS users want to make,
  not tasks they perform. Each job includes When/Want/So statement,
  functional/emotional/social dimensions, current workarounds, pain
  points with citations, and design opportunities.
