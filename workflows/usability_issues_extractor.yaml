# Auto-generated variables
auto_variables:
  - num_issues: extract_issue_count(ai_generated.usability_scope_analysis) || 4
  - severity_overview: extract_severity_overview(ai_generated.usability_scope_analysis) || "Medium"
  - primary_problem_area: extract_primary_problem_area(ai_generated.usability_scope_analysis) || "User interface"
  - current_date: new Date().toISOString().split('T')[0]
  - analysis_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(study_name, current_date)

notify:
  - role: team
    action: "Usability issues extraction completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} identified {{num_issues}} usability issues from {{selected_study}} with {{severity_overview}} severity overall. Ready for prioritization!"

output_use: |
  Slack-Native Usability Issues Extractor automatically discovers research files from selected study folders,
  systematically identifies specific interface problems with user behaviors and expectations, assesses severity
  and impact, and generates actionable fix recommendations. Outputs concise Slack summaries focused on issues 
  and fixes, plus detailed GitHub markdown reports for development teams and stakeholders.

  Use this method to:
    - Extract specific, actionable usability problems from testing data
    - Understand user behaviors and expectations vs. actual interface design
    - Prioritize fixes based on severity, impact, and implementation complexity
    - Generate specific recommendations for design and development teams
    - Create evidence-based issue reports for product planning and sprints
