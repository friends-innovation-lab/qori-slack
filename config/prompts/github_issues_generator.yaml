id: github_issues_generator
name: run_github_issues_generator
label: "🛠 GitHub Issues Generator"
version: v4.0
description: |
  Generate GitHub issues from research findings. Pulls from Research Readout 
  to create actionable, evidence-backed development tickets.

author: Qori R&D
created: 2025-08-19
last_updated: 2026-01-07

