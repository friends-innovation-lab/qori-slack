input_type: text
input_processing: summarize_if_long

llm_config:
  model: "claude-sonnet-4"
  temperature: 0.2
  max_tokens: 4000

input_variables:
  - github_repository
  - github_token
  - research_readout_data
  - study_name
  - researcher_contact
  - study_channel
  - team_members
  - github_labels
  - github_assignees
  - max_issues
  - readout_link

auto_variables:
  - current_date: |
      new Date().toISOString().split('T')[0]
  - github_repo_url: |
      "https://github.com/{{github_repository}}"

ai_generation_tasks:
  - task_id: "github_issues_complete"
    prompt: |
      ============================================================
      🚨 CRITICAL GROUNDING RULES - READ FIRST 🚨
      ============================================================
      
      You are creating GitHub issues from REAL research findings.
      
      ABSOLUTE REQUIREMENTS:
      1. ONLY create issues for findings that exist in the source data below
      2. ONLY use quotes that appear EXACTLY in the source data
      3. Use participant IDs exactly as they appear (PT001, PT002, etc.) — NEVER change to P1, P3, P7
      4. Severity and frequency must match source data
      5. If source data is empty or insufficient, output the insufficient data message
      
      FORBIDDEN (hallucination indicators):
      - Quotes not found verbatim in source
      - Participant IDs not in source (P1, P3, P7 when source has PT001, PT002, PT003)
      - Findings about features not mentioned in source
      - Made-up frequency data
      
      If source data is insufficient, output:
      "⚠️ Insufficient data for GitHub issues. Research readout may be empty or not loaded."
      
      ============================================================
      SOURCE DATA
      ============================================================
      
      **Study Name:** {{study_name}}
      **Repository:** {{github_repository}}
      **Researcher:** {{researcher_contact}}
      **Readout Link:** {{readout_link}}
      **Max Issues:** {{max_issues}} (default: 5)
      
      **Research Readout Data:**
      
      {{research_readout_data}}
      
      ============================================================
      ISSUE CREATION RULES
      ============================================================
      
      Create 3-5 GitHub issues from the research findings above.
      
      PRIORITIZE findings that are:
      - Critical or High severity
      - Affect multiple participants
      - Have clear, actionable fixes
      - Have strong evidence (quotes, behavioral data)
      
      SKIP:
      - "Nice to have" improvements
      - Research follow-ups
      - Process/organizational changes
      - Findings without clear dev action
      
      ============================================================
      OUTPUT FORMAT
      ============================================================
      
      Output valid JSON array of issues:
      
      ```json
      
        "study": "[Study name from source]",
        "generated_date": "[Today's date]",
        "total_issues": [count],
        "issues": [
          
            "number": 1,
            "title": "[Severity] Brief action-oriented title",
            "labels": ["research-finding", "severity-label", "component"],
            "priority": "Critical|High|Medium",
            "effort": "Small (1-2 days)|Medium (3-5 days)|Large (1-2 weeks)",
            "body": "Full issue body in markdown - see template below"
          
        ]
      
      ```
      
      ISSUE BODY TEMPLATE (use this exact structure):
      
      ## Problem
      
      [1-2 sentences describing what users experienced. Be specific.]
      
      ## Evidence
      
      **Study:** [Study name]
      **Severity:** [Critical/High/Medium] **Affected:** [X] of [Y] participants
      
      > "[Exact quote from source]"
      > — PT00X
      
      > "[Another quote if available]"
      > — PT00X
      
      **Observed behavior:** [What participants actually did, from source]
      
      ## Acceptance Criteria
      
      - [ ] [Specific, testable requirement tied to the finding]
      - [ ] [Another specific requirement]
      - [ ] [Validation: how we know it's fixed]
      
      ## Implementation Notes
      
      [Brief technical guidance if available from source recommendations]
      
      ## Research Source
      
      📊 [Full Research Readout]({{readout_link}})
      
      ---
      *Issue generated from research findings by Qori*
      
      ============================================================
      TITLE FORMAT
      ============================================================
      
      Format: [Severity] Action-oriented description
      
      GOOD titles:
      - [Critical] Add labels to unlabeled buttons for screen readers
      - [High] Move Edit button to visible location in Profile
      - [Medium] Clarify Claims vs File a Claim navigation labels
      
      BAD titles:
      - Enhance Appointment Scheduling Functionality (too vague)
      - User Experience Improvement (not actionable)
      - Fix button (no context)
      
      ============================================================
      LABELS
      ============================================================
      
      Always include:
      - "research-finding"
      
      Add severity:
      - "critical" | "high-priority" | "medium-priority"
      
      Add component (infer from finding):
      - "accessibility" (screen reader, labels, contrast)
      - "navigation" (wayfinding, menu, IA)
      - "performance" (loading, speed)
      - "content" (copy, labels, messaging)
      - "ui" (visual design, layout)
      
      ============================================================
      EXAMPLE OUTPUT - JSON Format
      ============================================================
      
      
        "study": "2026 VA Health and Benefits Mobile App",
        "generated_date": "January 7, 2026",
        "total_issues": 3,
        "issues": [
          
            "number": 1,
            "title": "[Critical] Add accessible labels to all buttons",
            "labels": ["research-finding", "critical", "accessibility"],
            "priority": "Critical",
            "effort": "Medium (3-5 days)",
            "body": "## Problem\n\nScreen reader users cannot identify button functions. Buttons announce only as \"Button\" without descriptive text, blocking task completion.\n\n## Evidence\n\n**Study:** 2026 VA Health and Benefits Mobile App\n**Severity:** Critical | **Affected:** 1 of 1 screen reader users (100%)\n\n> \"There's some buttons that just say 'Button' without any descriptive text.\"\n> — PT001\n\n**Observed behavior:** PT001 had to guess button functions and could not complete appointment scheduling task.\n\n## Acceptance Criteria\n\n- [ ] All buttons have descriptive aria-labels or visible text\n- [ ] Screen reader announces button purpose (e.g., \"Schedule appointment\" not \"Button\")\n- [ ] Tested with VoiceOver and TalkBack\n\n## Implementation Notes\n\nAudit all interactive elements. Priority: appointment scheduling flow, profile section, claims navigation.\n\n## Research Source\n\n[Link to research readout]({{readout_link}})\n\n---\n*Issue generated from research findings by Qori*"
          
        ]
      
      
      
      ============================================================
      QUALITY CHECK (do not include in output)
      ============================================================
      
      Before outputting, verify:
      - Every quote appears EXACTLY in source data
      - Participant IDs match source (PT001 not P1)
      - Severity matches source findings
      - Frequency data is accurate
      - No fabricated findings or features
      
      Output ONLY the JSON. No preamble, no markdown code fences around the entire response.

github_api:
  authentication: "personal_access_token"
  required_scopes: ["repo", "issues:write"]
  
  issue_creation:
    endpoint: "POST /repos/{{github_repository}}/issues"
    headers:
      Authorization: "token {{github_token}}"
      Accept: "application/vnd.github.v3+json"
    
    default_labels: ["research-finding"]
    batch_creation: true
    rate_limit_buffer: "1_request_per_second"

output_options:
  default_delivery: "slack_and_github_api"
  path: "07-implementation/"
  filename: "github_issues_{{study_name}}_{{current_date}}.json"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "🛠 GitHub Issues Created"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  
  interactive_elements:
    - text: "🔗 View Issues"
      url: "{{github_repo_url}}/issues?q=is:issue+label:research-finding"

output_template: |
  🛠 **GitHub Issues Created**
  
  **Study:** {{study_name}}
  **Repository:** {{github_repository}}
  
  {{ai_generated.github_issues_complete}}
  
  🔗 **View Issues:** {{github_repo_url}}/issues?q=is:issue+label:research-finding
  
  *Questions?* Contact {{researcher_contact}}

notify:
  - role: dev_teams
    action: "Research issues created"
    channel: "{{study_channel}}"
    message: "🛠 GitHub issues from {{study_name}} research ready for triage."
