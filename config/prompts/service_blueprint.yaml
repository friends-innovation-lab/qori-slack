id: service_blueprint
name: create_service_blueprint

label: 🔧 Service Blueprint
version: "v1.1"

description: >
  Generate a service blueprint that maps user actions alongside frontstage
  interactions, backstage processes, and support systems. Reveals where
  service failures occur and why.

author: Qori R&D
created: 2026-01-08
last_updated: 2026-01-08

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4500

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 1000
  max_file_size: 100000
  supported_formats: [".md", ".txt", ".csv", ".json"]
  max_files_per_analysis: 25

# Slack modal input variables
input_variables:
  - selected_study
  - blueprint_scope
  - include_user_research
  - include_stakeholder_research
  - include_journey_map
  - discovered_files
  - combined_file_content

# Blueprint scope options
blueprint_scope_options:
  - value: "end_to_end"
    label: "End-to-End Journey"
    description: "Full service from first touch to completion"
  - value: "specific_task"
    label: "Specific Task Flow"
    description: "One task (e.g., 'Submit a claim')"
  - value: "failure_point"
    label: "Failure Point Deep-Dive"
    description: "Focus on where service breaks down"

# File discovery system
# 
# Folder structure:
# research/{study-name}/
# ├── desk-research/
# │   └── 00-desk-research/
# └── primary-research/
#     ├── 00-brief/
#     ├── 01-planning/
#     ├── 02-participants/
#     ├── 03-fieldwork/
#     ├── 04-analysis/
#     ├── 05-findings/
#     └── 06-assets/
#
# Service Blueprints need TWO data sources:
# - User research → fills Customer Actions + Frontstage (above line of visibility)
# - Stakeholder research → fills Backstage + Support Systems (below line of visibility)
#
# Without stakeholder data, output will show "Backstage Gaps" section
#
auto_file_discovery:
  core_files:
    # REQUIRED — User research (fills top 2 layers)
    session_summaries:
      file_patterns: ["*session_summary*", "*summary*"]
      search_paths: ["primary-research/03-fieldwork/"]
      priority: "required"
      confidence_weight: 40
      fills_layers: ["customer_actions", "frontstage"]
      
    # HIGH — Journey map provides stage structure + user data
    journey_maps:
      file_patterns: ["*journey*", "*journey_map*"]
      search_paths: ["primary-research/04-analysis/"]
      priority: "high"
      confidence_weight: 30
      fills_layers: ["customer_actions", "frontstage", "stage_structure"]
      
    # HIGH — Stakeholder data (fills bottom 2 layers)
    stakeholder_notes:
      file_patterns: ["*stakeholder*", "*internal*", "*sme*", "*engineering*", "*product_owner*", "*policy*"]
      search_paths: ["primary-research/01-planning/stakeholder-interviews/"]
      priority: "high"
      confidence_weight: 30
      fills_layers: ["backstage", "support_systems"]
      
    # OPTIONAL — Usability issues help identify failure points
    usability_issues:
      file_patterns: ["*usability*", "*issues*"]
      search_paths: ["primary-research/04-analysis/"]
      priority: "optional"
      confidence_weight: 15
      fills_layers: ["failure_points"]
      
    # OPTIONAL — Coded transcripts for raw evidence
    coded_transcripts:
      file_patterns: ["*coded*", "*transcript*"]
      search_paths: ["primary-research/03-fieldwork/"]
      priority: "optional"
      confidence_weight: 10
      fills_layers: ["customer_actions", "frontstage"]
      
    # OPTIONAL — Technical docs from desk research
    technical_docs:
      file_patterns: ["*technical*", "*architecture*", "*api*", "*system*"]
      search_paths: ["desk-research/00-desk-research/"]
      priority: "optional"
      confidence_weight: 10
      fills_layers: ["support_systems"]
      
    # OPTIONAL — Findings for additional context
    findings:
      file_patterns: ["*finding*", "*insight*", "*recommendation*"]
      search_paths: ["primary-research/05-findings/"]
      priority: "optional"
      confidence_weight: 10
      fills_layers: ["failure_points"]

# AI generation task
ai_generation_tasks:
  - task_id: "service_blueprint_complete"
    prompt: |
      You are creating a service blueprint from research data.
      
      IMPORTANT: Generate the COMPLETE output following the format below. Do not stop early.
      
      ============================================================
      RULES
      ============================================================
      
      RULE 1: FOUR LAYERS — ALL REQUIRED
      Every stage must show all four layers:
      1. **Customer Actions** — What the user does (from user research)
      2. **Frontstage** — What the user sees/interacts with (UI, messages, staff)
      3. **Backstage** — What happens behind the scenes (from stakeholder input)
      4. **Support Systems** — Databases, APIs, tools that enable the service
      
      RULE 2: LINE OF VISIBILITY
      The "line of visibility" separates what users see from what they don't.
      - Above the line: Customer Actions, Frontstage
      - Below the line: Backstage, Support Systems
      
      RULE 3: IDENTIFY FAILURE POINTS
      Mark where the service breaks down with ⚠️
      - Where does user frustration come from backstage issues?
      - Where do delays originate?
      - Where is information lost between systems?
      
      RULE 4: NO HALLUCINATION
      - User actions/frontstage: ONLY from user research data
      - Backstage/systems: ONLY from stakeholder data OR mark as [NEEDS STAKEHOLDER INPUT]
      - If you don't have backstage data, say so explicitly
      
      RULE 5: VA CONTEXT
      - Teams: Product, Engineering, Design, Content, Policy, Operations
      - Systems: VA databases, benefits systems, health records, claims processing
      - NEVER mention: Marketing, Sales, CRM, advertising
      
      RULE 6: VERIFY BEFORE SUBMITTING
      - All four layers present for each stage
      - Failure points marked with ⚠️
      - Backstage gaps marked as [NEEDS STAKEHOLDER INPUT]
      - Citations for user-facing issues
      
      ============================================================
      INPUT
      ============================================================
      
      **Study:** {{selected_study}}
      **Blueprint Scope:** {{blueprint_scope}}
      **Research Data:** {{combined_file_content}}
      
      ============================================================
      NOW GENERATE THE COMPLETE OUTPUT BELOW
      ============================================================
      
      # 🔧 Service Blueprint: {{selected_study}}
      
      > **Generated:** [Today's date] | **Scope:** [Task or journey being mapped]
      
      ---
      
      ## Overview
      
      | | |
      |---|---|
      | **Service** | [What service is being blueprinted] |
      | **Scope** | [Start point] → [End point] |
      | **User** | [Who — from research] |
      | **Key Failure Points** | [X] identified |
      | **Data Completeness** | [Complete / Partial — missing backstage] |
      
      ---
      
      ## Blueprint Layers
      
      | Layer | What It Shows | Data Source | Status |
      |-------|---------------|-------------|--------|
      | 👤 **Customer Actions** | What the user does | User research | ✅ |
      | 💻 **Frontstage** | What the user sees/touches | User research | ✅ |
      | ⚙️ **Backstage** | Internal processes users don't see | Stakeholder input | [✅ or ⚠️ Gaps] |
      | 🗄️ **Support Systems** | Databases, APIs, tools | Stakeholder input | [✅ or ⚠️ Gaps] |
      
      ---
      
      ## Service Blueprint
      
      ### Stage 1: [Stage Name]
      
      | Layer | What Happens |
      |-------|--------------|
      | 👤 **Customer Action** | [What user does] — PT00X |
      | 💻 **Frontstage** | [What user sees/interacts with] |
      | ——— | *Line of Visibility* ——————————————— |
      | ⚙️ **Backstage** | [Internal process OR "[NEEDS STAKEHOLDER INPUT]"] |
      | 🗄️ **Support Systems** | [Database, API, tool OR "[NEEDS STAKEHOLDER INPUT]"] |
      
      **⚠️ Failure Point:** [If applicable — what breaks here and why]
      
      ---
      
      ### Stage 2: [Stage Name]
      
      | Layer | What Happens |
      |-------|--------------|
      | 👤 **Customer Action** | [What user does] — PT00X |
      | 💻 **Frontstage** | [What user sees/interacts with] |
      | ——— | *Line of Visibility* ——————————————— |
      | ⚙️ **Backstage** | [Internal process] |
      | 🗄️ **Support Systems** | [Database, API, tool] |
      
      **⚠️ Failure Point:** [If applicable]
      
      ---
      
      ### Stage 3: [Stage Name]
      
      [Same format — continue for all stages]
      
      ---
      
      ## Failure Point Analysis
      
      | # | Failure Point | Layer | Cause | Impact on User | Fix Owner |
      |---|---------------|-------|-------|----------------|-----------|
      | 1 | [What fails] | [Backstage/System] | [Root cause] | [User experience] | `[Team]` |
      | 2 | [What fails] | [Backstage/System] | [Root cause] | [User experience] | `[Team]` |
      
      ---
      
      ## Backstage Gaps
      
      > ⚠️ The following need stakeholder input to complete. Consider interviewing these roles:
      
      | Stage | What We Don't Know | Who to Ask |
      |-------|-------------------|------------|
      | [Stage] | [Gap in backstage understanding] | Engineering Lead |
      | [Stage] | [Gap in system understanding] | Product Owner |
      | [Stage] | [Gap in policy/process] | Policy SME |
      
      **Suggested next step:** Use `/plan-study` → "Create Stakeholder Interview Guide" to prepare for these conversations.
      
      ---
      
      ## Recommendations
      
      | Priority | Opportunity | Addresses | Owner | Effort |
      |:--------:|-------------|-----------|-------|:------:|
      | 🔴 | [Fix that addresses root cause] | Failure Point 1 | `[Team]` | 🔵🔵🔵 |
      | 🟡 | [Improvement] | Failure Point 2 | `[Team]` | 🔵🔵⚪ |
      
      > **Legend:** 🔴 High | 🟡 Medium | 🟢 Low — Effort: 🔵🔵🔵 High | 🔵🔵⚪ Med | 🔵⚪⚪ Low
      
      <br>
      
      ---
      
      ## 📚 Methodology
      
      **Framework:** Service Blueprinting
      
      **Approach:** Maps customer actions alongside frontstage interactions, backstage processes, and support systems to reveal service delivery gaps.
      
      **Data Sources:**
      - User research: [List participant IDs]
      - Stakeholder input: [List roles interviewed OR "None — gaps noted above"]
      
      <br>
      
      ---
      
      ### References
      
      This analysis follows established service design methods:
      
      - **Lynn Shostack** — Creator of service blueprinting methodology (1984)
      - **Service Design Thinking** — Stickdorn & Schneider
      - **Nielsen Norman Group** — Service blueprint guidelines
      - **Practical Service Blueprinting** — Erik Flowers & Megan Miller
      
      ---
      
      *Generated by Qori • {{current_date}}*

# Processing workflow
processing_workflow:
  - validate_slack_modal_inputs
  - discover_files_from_study_selection
  - check_data_completeness
  - combine_selected_files_with_truncation
  - execute_service_blueprint_complete
  - format_slack_output
  - format_github_output

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "blueprint_focused"
  file_format: "github_markdown"
  path: "primary-research/04-analysis/service-blueprints/"
  filename: "{{selected_study}}_service_blueprint_{{current_date}}.md"

# Slack output template
output_template: |
  {{ai_generated.service_blueprint_complete}}

# GitHub markdown file template
github_file_template: |
  {{ai_generated.service_blueprint_complete}}

notes: |
  v1.1 Updates:
  - Improved file discovery with fills_layers metadata
  - Added 03-fieldwork/ as primary search path for session data
  - Added usability issues, coded transcripts, technical docs discovery
  - Added "Data Completeness" indicator in Overview
  - Added "Status" column in Blueprint Layers table
  - Added actionable next step in Backstage Gaps section
  - Added check_data_completeness to workflow
  
  v1.0 Initial release:
  - Four-layer blueprint (Customer, Frontstage, Backstage, Support Systems)
  - Line of visibility concept
  - Failure point identification
  - Explicit "Backstage Gaps" section when stakeholder data missing
  - Follows Shostack, Stickdorn & Schneider methodologies
  
  IMPORTANT: Service blueprints work best when you have BOTH:
  - User research (fills Customer Actions, Frontstage)
  - Stakeholder research (fills Backstage, Support Systems)
  
  Without stakeholder data, backstage will be incomplete.

output_use: |
  Generate service blueprints that map user journeys alongside
  behind-the-scenes processes. Reveals where service failures
  originate and why user pain points exist. Requires both user
  research and stakeholder input for complete picture.
