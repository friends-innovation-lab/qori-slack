id: research_request
name: submit_research_request
label: 📝 Research Request
version: v1.1

description: |
  Submit a research request to the UX research team. Stakeholders use this form 
  to describe what they need to understand - the research team will translate 
  this into a formal research brief with methodology and scope.

author: Qori R&D
created: 2026-01-28
last_updated: 2026-01-28

input_type: slack_modal_form
input_processing: form_based

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.2
  max_tokens: 2000

# Slack modal input variables - Simple fields stakeholders can answer
input_variables:
  # Project info
  - name: project_title
    type: string
    required: true
    label: "Project Title/Focus"
    placeholder: "e.g., Claims Status Navigation Study"
    hint: "Choose a clear, descriptive title. Max 100 characters."

  # The problem
  - name: problem_description
    type: textarea
    required: true
    label: "What problem or opportunity does this address?"
    placeholder: "e.g., Users report difficulty navigating the mobile app to find their claim status..."
    hint: "Include: data observed, user complaints, business metrics, or opportunities. Max 800 characters."

  # Users
  - name: affected_users
    type: textarea
    required: true
    label: "Who are the affected users?"
    placeholder: "e.g., Veterans using the mobile app to check claim status, particularly those with multiple active claims"
    hint: "Describe the users experiencing this problem. Max 300 characters."

  # Decision context
  - name: decisions_to_inform
    type: textarea
    required: true
    label: "What decisions will this research inform?"
    placeholder: "e.g., Q4 navigation redesign priorities, invest in unified search, IA strategy"
    hint: "How will findings impact planning or product decisions? Max 500 characters."

  # Timing
  - name: urgency
    type: select
    required: true
    label: "Urgency"
    options:
      - value: "critical"
        label: "🔴 Critical - Blocking a launch or major decision (1-2 weeks)"
      - value: "high"
        label: "🟠 High - Important for upcoming work (2-4 weeks)"
      - value: "medium"
        label: "🟡 Medium - Would help prioritization (1-2 months)"
      - value: "low"
        label: "🟢 Low - Exploratory, no hard deadline"

  - name: deadline
    type: date
    required: false
    label: "Deadline (optional)"
    hint: "Specific date if you have one"

  # What they know
  - name: existing_knowledge
    type: textarea
    required: false
    label: "What do you already know? (optional)"
    placeholder: "e.g., Previous research from Q2 showed..., Analytics indicate 40% drop-off at..."
    hint: "Any existing data, previous research, or analytics. Helps avoid duplicate work. Max 500 characters."

  # Requestor (auto-populated)
  - name: requestor_name
    type: string
    required: false
    label: "Name (optional)"
    placeholder: "Auto-populated from Slack profile"
    auto_populate: "slack_profile.name"

# AI generation tasks - Light touch, just formatting and clarification
ai_generation_tasks:
  - task_id: "formatted_problem"
    prompt: |
      Clean up and clarify this problem description while preserving the original meaning:
      "{{problem_description}}"
      
      - Fix grammar and clarity issues
      - Keep it concise (2-4 sentences max)
      - Preserve any specific metrics or data mentioned
      - Don't add information that wasn't there
      
      Output only the improved text, no preamble.

  - task_id: "formatted_decisions"
    prompt: |
      Clean up this description of decisions the research will inform:
      "{{decisions_to_inform}}"
      
      - Format as 1-3 clear bullet points
      - Make vague decisions more specific if possible
      - Keep the original intent
      
      Output only the bullet points, no preamble.

  - task_id: "formatted_users"
    prompt: |
      Clean up this description of affected users:
      "{{affected_users}}"
      
      - Make it clear and specific
      - Keep to 1-2 sentences
      - Preserve any specific criteria mentioned
      
      Output only the improved text, no preamble.

  - task_id: "suggested_research_type"
    prompt: |
      Based on this research request, suggest the most appropriate research type:
      
      Problem: {{problem_description}}
      Decisions to inform: {{decisions_to_inform}}
      Urgency: {{urgency}}
      
      Choose ONE from:
      - **Usability Testing** - if they need to evaluate an existing or proposed design
      - **User Interviews** - if they need to understand behaviors, needs, or pain points
      - **Survey** - if they need to quantify attitudes or preferences at scale
      - **Analytics Review** - if they need to understand usage patterns from existing data
      - **Concept Testing** - if they need to validate ideas before building
      - **Diary Study** - if they need to understand behavior over time
      - **To be determined** - if unclear, needs researcher consultation
      
      Output format:
      **Suggested approach:** [Type] — [One sentence explaining why this fits]

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. populate_template
  4. save_to_requests_folder
  5. notify_research_team

# Output template - Clean, scannable format for research team to review
output_template: |
  # Research Request: {{project_title}}

  **Submitted by:** {{requestor_name}} | **Date:** {{current_date}} | **Urgency:** {{urgency}}

  ---

  ## The Problem

  {{ai_generated.formatted_problem}}

  ---

  ## Affected Users

  {{ai_generated.formatted_users}}

  ---

  ## Decisions This Will Inform

  {{ai_generated.formatted_decisions}}

  ---

  ## Timeline

  | Urgency | Deadline |
  |:--------|:---------|
  | {{urgency}} | {{deadline}} |

  ---

  ## Existing Knowledge

  {{existing_knowledge}}

  ---

  ## Research Team Notes

  {{ai_generated.suggested_research_type}}

  **Status:** 🟡 Pending Review

  | Next Step | Owner | By When |
  |:----------|:------|:--------|
  | Review request and assess feasibility | Research Team | +2 business days |
  | Schedule intake conversation if needed | Research Team | +3 business days |
  | Create research brief | Assigned Researcher | TBD |

  ---

  *Submitted via Qori • {{current_date}}*

# Output configuration
output_options:
  filename: "{{project_title}}_research_request_{{current_date}}.md"
  path: "00-requests/"
  
  delivery:
    github:
      enabled: true
      commit_message: "New research request: {{project_title}}"
      
    slack:
      enabled: true
      channel: "#research-requests"
      message: "📝 New research request from {{requestor_name}}: *{{project_title}}*"
      include_preview: true

# Auto-generated variables
auto_variables:
  - current_date: new Date().toISOString().split('T')[0]
  - request_id: generate_request_id() || "REQ-001"
  - github_file_link: generate_github_link(project_title, current_date)

# Slack notifications
notify:
  - role: research_team
    action: "New research request submitted"
    channel: "#research-requests"
    message: "📝 {{requestor_name}} submitted a research request for *{{project_title}}*. Urgency: {{urgency}}"
    
  - role: requestor
    action: "Request confirmation"
    channel: "DM"
    message: "✅ Your research request for *{{project_title}}* has been submitted. The research team will review it within 2 business days."

output_use: |
  Stakeholders (PMs, Product Owners, etc.) use this form to request research
  from the UX team. Captures the business problem and decision context without
  requiring stakeholders to specify methodology. Research team reviews requests
  and creates formal research briefs.
