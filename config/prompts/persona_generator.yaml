id: persona_generator
name: generate_personas

label: 👤 Persona Generator
version: "v4.1"

description: >
  Create evidence-based personas from research data. Personas aggregate 
  behavioral patterns across participants — they are NOT 1:1 relabeling.

author: Qori R&D
created: 2025-06-26
last_updated: 2026-01-08

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4000

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 1000
  max_file_size: 100000
  supported_formats: [".md", ".txt", ".csv", ".json"]
  max_files_per_analysis: 20

# Privacy controls
privacy_controls:
  enable_pii_detection: true
  pii_detection_patterns:
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
    phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    ssn: '\b\d{3}-\d{2}-\d{4}\b'

# Slack modal input variables
input_variables:
  - selected_study
  - include_research_plan
  - include_participant_notes
  - include_raw_transcripts
  - discovered_files
  - combined_file_content

# AI generation tasks - SINGLE CONSOLIDATED TASK
ai_generation_tasks:
  - task_id: "personas_complete"
    prompt: |
      You are creating research-based personas from VA research data.
      
      ============================================================
      🚨 CRITICAL RULES - VIOLATIONS WILL RUIN THE OUTPUT
      ============================================================
      
      RULE 1: NO HALLUCINATION
      
      You are an EXTRACTOR, not a GENERATOR.
      - Every goal must come from the research data
      - Every frustration must have a citation
      - Every quote must be verbatim from the data
      - If you can't find evidence, DON'T INCLUDE IT
      
      RULE 2: NO REAL NAMES — EVER
      
      ❌ NEVER USE:
      - "John Reynolds"
      - "Sarah Nguyen" 
      - "Mark Thompson"
      - Any first+last name combination
      
      ✅ ALWAYS USE archetype names:
      - "The Assisted Navigator"
      - "The Efficiency Seeker"
      - "The Phone-First Veteran"
      
      RULE 3: VA CONTEXT ONLY
      
      These are VETERANS using VA SERVICES. Goals relate to:
      ✅ Healthcare appointments
      ✅ Prescription refills
      ✅ Disability claims
      ✅ Benefits information
      ✅ Profile/contact updates
      
      ❌ NEVER mention (these are hallucinations):
      - "data analysis tools"
      - "team collaboration"
      - "academic success"
      - "professional development"
      - "study recommendations"
      - "workload management"
      - Marketing, Sales, or corporate teams
      
      RULE 4: AGGREGATE — DO NOT DO 1:1 MAPPING
      
      ❌ WRONG (1:1 mapping — just relabeling participants):
      - Persona 1 = PT001
      - Persona 2 = PT002
      - Persona 3 = PT003
      
      ✅ RIGHT (aggregation by shared patterns):
      - Persona 1 = PT001 + PT003 (both need accessibility features)
      - Persona 2 = PT002 + PT003 (both prefer phone support when frustrated)
      
      Look for PATTERNS that appear across multiple participants.
      Group participants who share the same behaviors, goals, or frustrations.
      
      RULE 5: FEWER PERSONAS THAN PARTICIPANTS
      
      If you have 3 participants, you should have 2 personas (MAX).
      If you have 5 participants, you should have 2-3 personas.
      
      Personas represent PATTERNS, not individuals.
      
      ============================================================
      INPUT DATA
      ============================================================
      
      **Study:** {{selected_study}}
      **Research Data:** {{combined_file_content}}
      
      ============================================================
      OUTPUT FORMAT — FOLLOW EXACTLY
      ============================================================
      
      # 👤 Personas: [Study Name]
      
      > **[X] personas** from **[Y] participants** | **Generated:** [Date]
      
      ---
      
      ## At a Glance
      
      | Persona | Archetype | Based On | Key Need |
      |---------|-----------|----------|----------|
      | 1 | [Name like "The Assisted Navigator"] | PT00X, PT00X | [One-line need] |
      | 2 | [Name like "The Efficiency Seeker"] | PT00X, PT00X | [One-line need] |
      
      ---
      
      ## Persona 1: [Archetype Name]
      
      **Based on:** PT00X, PT00X [list ALL participant IDs who share this pattern]
      
      > "[Key quote that captures this persona's experience]" — PT00X, 00:00:00
      
      **Who they are:**
      
      | Attribute | Details |
      |-----------|---------|
      | **Background** | [Military branch, service details from data] |
      | **Tech Setup** | [Device, accessibility settings, connectivity] |
      | **VA Usage** | [How often, primary tasks] |
      
      **What they're trying to do:**
      
      - [Goal from research] — *Evidence: PT00X*
      - [Goal from research] — *Evidence: PT00X*
      
      **What blocks them:**
      
      | Frustration | Evidence |
      |-------------|----------|
      | [Specific issue from data] | PT00X, 00:00:00 |
      | [Specific issue from data] | PT00X, 00:00:00 |
      
      **How they cope:** [Workarounds or behaviors observed in research]
      
      **Design implication:** [One specific, implementable fix]
      
      ---
      
      ## Persona 2: [Archetype Name]
      
      [Same format as Persona 1]
      
      ---
      
      ## Design Priorities
      
      | # | Opportunity | Helps Persona | Effort |
      |---|-------------|---------------|:------:|
      | 1 | [Specific fix] | Both / Persona 1 | 🔵⚪⚪ |
      | 2 | [Specific fix] | Both / Persona 2 | 🔵🔵⚪ |
      
      ---
      
      ## Methodology
      
      **Framework:** Evidence-Based Persona Development
      
      **Approach:** Composite archetypes from behavioral patterns across participants — not 1:1 mapping.
      
      **Data Sources:** [List ALL participant IDs]
      
      **Why these groupings:** [Explain the patterns you identified]
      
      ### References
      
      - **Alan Cooper** — Goal-directed personas, "The Inmates Are Running the Asylum"
      - **Kim Goodwin** — "Designing for the Digital Age"
      - **Nielsen Norman Group** — Persona best practices
      
      ---
      
      *Generated by Qori*
      
      ============================================================
      STOP HERE — DO NOT OUTPUT ANYTHING BELOW THIS LINE
      ============================================================
      
      VALIDATION (internal only — do not output):
      - Did you use archetype names (not real names)?
      - Does each persona cite MULTIPLE participants?
      - Are there FEWER personas than participants?
      - Do all goals relate to VA services?
      - Do all frustrations have citations?

# Processing workflow
processing_workflow:
  1. validate_slack_modal_inputs
  2. discover_files_from_study_selection
  3. combine_selected_files_with_truncation
  4. execute_personas_complete
  5. format_slack_output
  6. format_github_output
  7. save_to_analysis_folder

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "persona_focused"
  file_format: "github_markdown"
  path: "04-analysis/personas/"
  filename: "{{study_folder}}_personas_{{current_date}}.md"

# Slack output template
output_template: |
  {{ai_generated.personas_complete}}

# GitHub markdown file template
github_file_template: |
  {{ai_generated.personas_complete}}

# Study metadata mapping
study_metadata:
  "VA Housing Application Usability Study":
    folder: "va-housing-usability-2025"
    researcher: "jordan.researcher"
    channel: "#research-housing-app"
    focus_area: "housing application usability"
    
  "Benefits Portal Navigation Research":
    folder: "benefits-portal-nav-2025"
    researcher: "alex.ux"
    channel: "#research-benefits"
    focus_area: "benefits portal navigation"
    
  "Veteran Onboarding Experience Study":
    folder: "veteran-onboarding-2025"
    researcher: "casey.research"
    channel: "#research-onboarding"
    focus_area: "veteran onboarding process"

# Auto-generated variables
auto_variables:
  - persona_count: extract_persona_count(ai_generated.personas_complete) || 2
  - current_date: new Date().toISOString().split('T')[0]
  - analysis_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(study_name, current_date)

# Slack notifications
notify:
  - role: team
    action: "Persona generation completed"
    channel: "{{study_channel}}"
    message: "👤 {{researcher_contact}} generated {{persona_count}} personas for {{selected_study}}. Ready for design review!"

output_use: |
  Generate evidence-based personas using archetype names (never real names).
  Each persona aggregates behavioral patterns across multiple participants.
  Output includes goals, frustrations with citations, and design implications.
