name: Research Insight
description: Log a new user insight from CivicMind research
title: "[Insight] "
labels: [insight, user-feedback, research]
body:
  - type: markdown
    attributes:
      value: |
        🧠 _Use this template to turn research findings into actionable issues for the team._
  - type: input
    id: theme
    attributes:
      label: Theme
      description: What overarching theme or pattern does this insight belong to?
      placeholder: "Eligibility Confusion"
  - type: textarea
    id: quote
    attributes:
      label: Participant Quote
      description: Add a compelling quote or behavior observed
      placeholder: "I wasn’t sure if I even qualified."
  - type: textarea
    id: description
    attributes:
      label: Description of Insight
      description: Summarize what happened and what it means
      placeholder: "Participants were unsure whether they qualified based on the current language."
  - type: textarea
    id: recommendation
    attributes:
      label: Suggested Action
      description: What could the team do to improve this experience?
      placeholder: "Add a yes/no eligibility screener at the start of the form"
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
  - type: input
    id: source
    attributes:
      label: Source Transcript / Session ID
      placeholder: "interview_03.txt"

