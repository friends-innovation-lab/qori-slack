id: insight_card
label: 💡 Insight Card
description: Generate a structured insight card for research findings and action tracking
input_type: text
input_processing: summarize_if_long
prompt: |
  You are helping write a structured insight card for a research study. Use the markdown format below. Write clearly and concisely using plain, professional language. Use active voice, no em-dashes, and keep each section focused and brief.

  Input (notes, quotes, or summary findings):
  {{input}}

output_format: |
  # 💡 Insight Card – [Project or Study Name]

  ## 🧭 Insight  
  [Write a clear, concise insight statement here]

  ---

  ## 📝 Description  
  [Describe what was observed or learned. Include context about when or where it occurred.]

  ---

  ## 💬 Supporting Evidence  
  > “[Quote from participant or artifact]” — PXX  
  > “[Optional second quote]” — PXX

  ---

  ## 🎯 Why It Matters  
  [Explain the relevance of this insight. Why is it important for the product, experience, or user outcomes?]

  ---

  ## 🛠️ Recommendation  
  [State what action or change is recommended based on this insight.]

  ---

  ## 🏷️ Tags  
  `example-tag`, `another-tag`, `team-tag`, `theme-tag`

  ---

  **Created by:** [Your Name]  
  **Date:** [YYYY-MM-DD]
