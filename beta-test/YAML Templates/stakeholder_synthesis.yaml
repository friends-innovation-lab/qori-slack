id: stakeholder_synthesis
name: synthesize_stakeholder_interviews

label: 🏛️ Stakeholder Synthesis
version: "v3.2"

description: >
  Synthesize findings from internal stakeholder interviews into comprehensive,
  service blueprint-ready documentation. Aggregates constraints, priorities, 
  backstage processes, and generates questions for user research. Produces
  visual sequence diagrams for process maps with failure modes suitable for 
  service design work. Renders as interactive diagrams on GitHub.
  
  v3.2: Added high-level service overview diagram, fixed truncation on complex
  processes, reduced redundancy between process maps and blueprint section,
  added design pattern recognition, aligned priority indicators across sections.

author: Qori R&D
created: 2026-01-08
last_updated: 2026-02-10

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration - Claude Sonnet
llm_config:
  model: "claude-sonnet-4-20250514"
  temperature: 0.3
  max_tokens: 8000  # Claude Sonnet supports 8K output

# System limits
system_limits:
  max_total_tokens: 100000  # Claude has 200K context window
  min_content_threshold: 1000
  max_file_size: 150000
  supported_formats: [".md", ".txt", ".docx"]
  max_files_per_analysis: 20

# Slack modal input variables
input_variables:
  - name: selected_study
    type: string
    required: true
    description: "Study folder name"
  - name: study_name
    type: string
    required: true
    description: "Human-readable study name"
  - name: study_channel
    type: string
    required: true
    description: "Slack channel for this study"
  - name: researcher_contact
    type: string
    required: true
    description: "Lead researcher Slack handle"
  - name: team_members
    type: array
    required: false
    description: "Team members to notify"
  - name: stakeholder_files
    type: array
    required: true
    description: "Selected stakeholder interview transcripts/notes"
  - name: discovered_files
    type: array
    required: false
    description: "Auto-discovered files from study folder"
  - name: combined_file_content
    type: string
    required: true
    description: "Combined content of all selected stakeholder files"
  - name: current_date
    type: string
    required: true
    description: "Current date for filename and output"

# File discovery system
auto_file_discovery:
  core_files:
    stakeholder_notes:
      file_patterns: ["*stakeholder*", "*transcript*", "*internal*", "*sme*", "*engineering*", "*product_owner*", "*policy*", "*design*", "*lead*", "*response*"]
      search_paths: ["01-planning/stakeholder-interviews/"]
      priority: "required"
      confidence_weight: 80
    interview_guides:
      file_patterns: ["*guide*"]
      search_paths: ["01-planning/stakeholder-interviews/"]
      priority: "optional"
      confidence_weight: 20

# =============================================================================
# AI GENERATION TASKS - Split into 4 sequential tasks to prevent truncation
# =============================================================================

ai_generation_tasks:

  # -------------------------------------------------------------------------
  # TASK 1: Overview, Stakeholders, Constraints
  # -------------------------------------------------------------------------
  - task_id: "section_1_overview_constraints"
    prompt: |
      You are synthesizing internal stakeholder interviews. This is TASK 1 of 4.
      
      Generate ONLY these sections:
      1. Title and Overview table
      2. Stakeholders Interviewed table
      3. Constraints & Blockers (Technical, Policy, Resource)
      
      ============================================================
      RULES
      ============================================================
      
      RULE 1: PROCESS ALL STAKEHOLDERS
      - Count ALL stakeholders in the input
      - Extract insights from EACH stakeholder
      - If you see Engineering Lead, Design Lead, and Policy SME, that's 3 stakeholders
      
      RULE 2: CONSTRAINT TRIANGULATION
      When multiple stakeholders mention the same constraint, show ALL perspectives:
      - Engineering says: [technical angle]
      - Design says: [UX impact angle]  
      - Policy says: [compliance/legal angle]
      
      RULE 3: QUANTIFY EVERYTHING
      Include ALL numbers: drop-off rates, incident counts, time durations, team sizes
      
      RULE 4: CITE BY ROLE
      Use "Engineering Lead," "Design Lead," "Policy SME" — not personal names
      
      ============================================================
      INPUT DATA
      ============================================================
      
      **Study:** {{study_name}}
      
      **Stakeholder Interview Data:**
      
      {{combined_file_content}}
      
      ============================================================
      GENERATE OUTPUT (Sections 1-3 only)
      ============================================================
      
      # 🏛️ Stakeholder Synthesis: {{study_name}}
      
      > **Generated:** {{current_date}} | **[X] stakeholders** | **[Teams represented]**
      
      ---
      
      ## Overview
      
      | | |
      |---|---|
      | **Stakeholders Interviewed** | [Count ALL stakeholders from input] |
      | **Teams Represented** | [List ALL teams] |
      | **Key Constraint** | [Biggest blocker — be specific with numbers if available] |
      | **Key Insight** | [Most important backstage revelation] |
      | **Critical Gap** | [What's missing or broken systemically] |
      
      ---
      
      ## Stakeholders Interviewed
      
      | Role | Team | Tenure | Focus Areas |
      |------|------|--------|-------------|
      | [Role from input] | [Team] | [If mentioned] | [Topics they covered] |
      
      ---
      
      ## 🚧 Constraints & Blockers
      
      ### Technical Constraints
      
      > "[Most impactful quote about technical limitation]" — [Role]
      
      > "[Supporting quote from different stakeholder if available]" — [Role]
      
      | Constraint | Impact | Downstream Effect | Source(s) |
      |------------|--------|-------------------|-----------|
      | [Constraint with specifics] | [Quantified impact if possible] | [What users experience] | [All roles who mentioned] |
      
      ### Policy Constraints
      
      > "[Quote about policy limitation]" — [Role]
      
      > "[Supporting quote from different stakeholder]" — [Role]
      
      | Constraint | Impact | User Experience Effect | Source(s) |
      |------------|--------|------------------------|-----------|
      | [Policy constraint with regulation/directive name] | [What it requires] | [How users experience it] | [Source(s)] |
      
      ### Resource Constraints
      
      > "[Quote about resource limitation]" — [Role]
      
      | Constraint | Impact | Systemic Effect | Source(s) |
      |------------|--------|-----------------|-----------|
      | [Resource constraint with numbers] | [Quantified impact] | [Organizational effect] | [Source(s)] |
      
      [END OF SECTION 1-3 — Do not generate beyond this point]

  # -------------------------------------------------------------------------
  # TASK 2: Strategic Priorities + Backstage Processes
  # -------------------------------------------------------------------------
  - task_id: "section_2_priorities_processes"
    prompt: |
      You are synthesizing internal stakeholder interviews. This is TASK 2 of 4.
      
      Generate ONLY these sections:
      1. Strategic Priorities
      2. Backstage Processes (ALL major processes with detailed breakdowns)
      
      ============================================================
      RULES
      ============================================================
      
      RULE 1: DETAILED PROCESS MAPPING
      For each major process, create a Mermaid sequence diagram showing:
      - User actions (frontstage)
      - System interactions (backstage, invisible to user)
      - Failure points with ⚠️ markers and failure rates
      - Wait times and delays using Note blocks
      - Actual system names from interviews as participants
      Plus a failure table and systems list after each diagram
      
      RULE 2: QUANTIFY EVERYTHING
      Include ALL numbers: drop-off rates, latency times, incident counts
      
      RULE 3: CITE BY ROLE
      Use "Engineering Lead," "Design Lead," "Policy SME" — not personal names
      
      RULE 4: INCLUDE ALL PROCESSES
      Document EVERY major process mentioned in the interviews.
      If the interviews reference 4+ processes, prioritize by user impact and
      ensure every diagram is COMPLETE before starting the next one.
      
      RULE 5: COMPLETE EVERY DIAGRAM — NEVER TRUNCATE
      Each Mermaid sequence diagram MUST:
      - End with a closing ``` (triple backtick)
      - Be followed by its "Where It Breaks Down" table
      - Be followed by its "Systems Involved" line
      If you are running low on output space, SIMPLIFY the remaining diagrams
      (fewer steps, combine system hops) rather than leaving ANY diagram
      incomplete. A complete 6-step diagram is better than a truncated 15-step one.
      
      RULE 6: IDENTIFY POSITIVE DESIGN PATTERNS
      When stakeholders describe solutions that ARE working well (e.g., optimistic
      UI, background refresh, caching, progressive loading), call these out in a
      "✅ Working Pattern" callout after the failure table. Format:
      
      > ✅ **Working Pattern — [Pattern Name]:** [Brief description of what the
      > team is doing well and why it works, with stakeholder attribution]
      
      This ensures the synthesis captures what's succeeding, not just what's broken.
      
      RULE 7: HIGH-LEVEL OVERVIEW DIAGRAM
      BEFORE the individual process sections, generate a single Mermaid flowchart
      that maps the veteran's journey across all backstage processes. This gives
      readers an orientation map before diving into detailed sequences. Format:
      
      ```mermaid
      flowchart LR
          A[Touchpoint 1] -->|dependency| B[Touchpoint 2]
          B -->|dependency| C[Touchpoint 3]
      ```
      
      Keep this overview to ONE level of detail — touchpoints and the systems
      connecting them. The detailed sequence diagrams below handle the rest.
      
      ============================================================
      INPUT DATA
      ============================================================
      
      **Study:** {{study_name}}
      
      **Stakeholder Interview Data:**
      
      {{combined_file_content}}
      
      ============================================================
      GENERATE OUTPUT (Sections 4-5 only)
      ============================================================
      
      ## 🎯 Strategic Priorities
      
      > "[Quote about prioritization]" — [Role]
      
      | Priority | Driver | Timeline | Aligns With User Needs? | Source |
      |----------|--------|----------|:-----------------------:|--------|
      | [What gets prioritized] | [Why] | [When] | ✅ / ⚠️ / ❌ | [Role] |
      
      **Critical Alignment Gap:** [Document any conflicts between stated priorities and user needs]
      
      ---
      
      ## ⚙️ Backstage Processes
      
      > This section maps the invisible systems behind each veteran-facing
      > touchpoint. The overview diagram below shows how processes connect;
      > detailed sequence diagrams follow for each.
      
      ### System Overview
      
      ```mermaid
      flowchart LR
          subgraph Veteran Touchpoints
              A[Download & Onboard]
              B[Check Claims]
              C[View Health Records]
              D[Refill Prescriptions]
          end
          
          A -->|"ID.me / Login.gov"| AUTH[Auth Services]
          AUTH -->|"Token exchange"| B
          AUTH -->|"Session mgmt"| C
          AUTH -->|"Session mgmt"| D
          B -->|"4-5 system hops"| VBA[VBA Backend Systems]
          C -->|"EHR query"| VHA[VHA Health Systems]
          D -->|"Rx routing"| PHARM[VA Pharmacy Systems]
          
          style A fill:#fff3e0,stroke:#e65100
          style B fill:#e3f2fd,stroke:#1565c0
          style C fill:#e8f5e9,stroke:#2e7d32
          style D fill:#f3e5f5,stroke:#7b1fa2
      ```
      
      > ☝️ **How to read this section:** The overview above shows the veteran
      > journey and system dependencies at a glance. Each process below expands
      > into a detailed sequence diagram showing every system hop, failure point,
      > and delay. Adapt the overview to match the ACTUAL processes found in the
      > interview data — the example above is illustrative.
      
      ---
      
      ### [First Major Process Name]
      
      > "[Quote explaining this process]" — [Role]
      
      > "[Additional perspective]" — [Different Role]
      
      **Process Flow:**
      
      ```mermaid
      sequenceDiagram
          actor User
          participant Frontend as Frontend/UI
          participant Backend as Backend System
          participant Legacy as Legacy/External
          participant Staff as Staff/Manual
          
          User->>Frontend: [First user action]
          Frontend->>Backend: [API call or system request]
          Backend->>Legacy: [Backend process step]
          Note over User,Frontend: [Drop-off rate if available, e.g. "40% drop-off here"]
          Legacy-->>Backend: [Response — note failures like "⚠️ Timeout (X% failure rate)"]
          Backend-->>Frontend: [What gets returned]
          Note over Backend,Staff: [Invisible delays, e.g. "Manual review — avg 3 days"]
          Staff->>Legacy: [Manual intervention step]
          Legacy-->>User: [Final notification/result]
      ```
      
      **Where It Breaks Down:**
      
      | Failure Point | What Happens | User Experience | Frequency/Severity |
      |---------------|--------------|-----------------|-------------------|
      | [Specific failure] | [Technical explanation] | [What user sees/feels] | [Quantify if possible] |
      
      > ✅ **Working Pattern — [Name]:** [If stakeholders described a successful
      > mitigation for this process, document it here. If none mentioned, omit
      > this callout entirely — don't fabricate patterns.]
      
      **Systems Involved:** [List all systems, APIs, databases, vendors]
      
      ---
      
      ### [Second Major Process Name]
      
      > "[Quote]" — [Role]
      
      **Process Flow:**
      
      ```mermaid
      sequenceDiagram
          actor User
          participant Frontend as Frontend/UI
          participant Backend as Backend System
          participant Legacy as Legacy/External
          participant Staff as Staff/Manual
          
          [Map the process steps as above — adapt participants to match actual systems mentioned]
      ```
      
      **Where It Breaks Down:**
      
      | Failure Point | What Happens | User Experience | Frequency/Severity |
      |---------------|--------------|-----------------|-------------------|
      | [Specific failure] | [Technical explanation] | [What user sees/feels] | [Quantify if possible] |
      
      **Systems Involved:** [List all systems, APIs, databases, vendors]
      
      ---
      
      [Continue for ALL major processes mentioned in interviews — each gets its own sequence diagram]
      
      IMPORTANT RULES FOR SEQUENCE DIAGRAMS:
      - Adapt the participant names to match ACTUAL systems mentioned in interviews (e.g. "VA.gov", "VistA", "VBMS")
      - Use Note blocks for drop-off rates, wait times, and invisible delays
      - Use -->> (dashed arrows) for responses and failure paths
      - Use ⚠️ emoji in failure/risk steps
      - Keep diagrams to 8-15 steps max — split complex processes into sub-diagrams if needed
      - Every diagram MUST be valid Mermaid syntax — no unclosed blocks
      - EVERY diagram MUST end with closing ``` followed by its failure table
      - If running low on space: simplify remaining diagrams, never truncate them
      - Include ✅ Working Pattern callouts only when stakeholders explicitly described a successful approach — do NOT fabricate patterns
      
      [END OF SECTION 4-5 — Do not generate beyond this point]

  # -------------------------------------------------------------------------
  # TASK 3: Service Blueprint + Research Questions
  # -------------------------------------------------------------------------
  - task_id: "section_3_blueprint_questions"
    prompt: |
      You are synthesizing internal stakeholder interviews. This is TASK 3 of 4.
      
      Generate ONLY these sections:
      1. Service Blueprint Implications
      2. Questions for User Research
      
      ============================================================
      RULES
      ============================================================
      
      RULE 1: SERVICE BLUEPRINT FOCUS — NO REDUNDANCY
      The backstage process maps (Task 2) already document detailed system
      interactions and failure points. This section should ADD NEW INSIGHT,
      not repeat what's already documented. Specifically:
      
      - "Frontstage Moments That Depend on Fragile Backstage": Focus on the
        RELATIONSHIP between what users see and what's invisible — not the
        technical details (those are in the sequence diagrams). Reference the
        process diagrams: "See [Process Name] flow above" where helpful.
      
      - "Support Processes Currently Manual": Document processes that are NOT
        covered in the sequence diagrams — the organizational/operational
        processes that support the technical systems (e.g., how API change
        requests get filed, how accessibility bugs get triaged, how releases
        get coordinated across platforms).
      
      - "Line of Visibility Gaps": This is the unique value of this section.
        Focus on the PERCEPTION gaps — what users believe vs. what's actually
        happening. This should read as insights for design, not as a re-summary
        of the backstage processes.
      
      RULE 2: ACTIONABLE RESEARCH QUESTIONS
      For each question, include:
      - The stakeholder insight that prompted it
      - Specific research question
      - Recommended method
      
      RULE 3: CONSISTENT PRIORITY INDICATORS
      Use the SAME priority framework across all sections of this document:
      - 🔴 = Blocking or critical — must address before design decisions
      - 🟡 = Important but not blocking — address during study
      - 🟢 = Validation — test assumptions, confirm direction
      
      ============================================================
      INPUT DATA
      ============================================================
      
      **Study:** {{study_name}}
      
      **Stakeholder Interview Data:**
      
      {{combined_file_content}}
      
      ============================================================
      GENERATE OUTPUT (Sections 6-7 only)
      ============================================================
      
      ## 🎯 Service Blueprint Implications
      
      > Organizational and perception-layer insights that complement the
      > detailed process maps in Backstage Processes above.
      
      ### Frontstage ↔ Backstage Disconnect
      
      > Where the user's mental model diverges from the system reality.
      > For detailed system flows, see the sequence diagrams in Backstage
      > Processes above.
      
      | What the User Experiences | What's Actually Happening | Design Implication |
      |---------------------------|---------------------------|-------------------|
      | [User-facing moment] | [Backstage reality — brief, reference diagram if applicable] | [What this means for design decisions] |
      
      ### Support Processes Outside the Product
      
      > Organizational processes that keep the product running but aren't
      > captured in the technical system flows above.
      
      | Process | Current State | Risk | Affects |
      |---------|---------------|------|---------|
      | [Operational/org process] | [How it works now] | [What could go wrong] | [Which user-facing experience] |
      
      ### Line of Visibility Gaps
      
      > The most impactful gaps between what users see and what they
      > don't — written as design insights, not technical summaries.
      
      | Users Believe | Reality | Opportunity |
      |---------------|---------|-------------|
      | [User's mental model] | [Actual system behavior] | [Design opportunity to bridge the gap] |
      
      ---
      
      ## 🔍 Questions for User Research
      
      > Based on stakeholder input, explore these with participants.
      > Priority levels: 🔴 Blocking · 🟡 Important · 🟢 Validation
      
      ### Blocking Questions (🔴)
      
      > Must answer before making design decisions
      
      | Stakeholder Insight | Research Question | Method |
      |---------------------|-------------------|--------|
      | [Specific insight from interviews] | [What to ask/observe] | [Interview/usability test/etc.] |
      
      ### Important Questions (🟡)
      
      > Address during study — informs but doesn't block
      
      | Stakeholder Insight | Research Question | Method |
      |---------------------|-------------------|--------|
      | [Insight] | [Question] | [Method] |
      
      ### Assumption Validation (🟢)
      
      > Test stakeholder assumptions with real users
      
      | Stakeholder Assumption | Validate With Users |
      |------------------------|---------------------|
      | [Assumption stated by stakeholder] | [How to test if true] |
      
      [END OF SECTION 6-7 — Do not generate beyond this point]

  # -------------------------------------------------------------------------
  # TASK 4: Open Questions + Recommendations + Next Steps
  # -------------------------------------------------------------------------
  - task_id: "section_4_recommendations"
    prompt: |
      You are synthesizing internal stakeholder interviews. This is TASK 4 of 4.
      
      Generate ONLY these sections:
      1. Open Questions
      2. Recommendations
      3. Methodology
      4. Recommended Next Interviews
      5. References
      
      ============================================================
      RULES
      ============================================================
      
      RULE 1: CAPTURE UNANSWERED QUESTIONS
      Document questions that couldn't be answered from the interviews
      Note who might know the answer
      
      RULE 2: ACTIONABLE RECOMMENDATIONS
      Each recommendation should:
      - Address a specific constraint
      - Have a feasibility indicator (✅ / ⚠️ / ❌)
      - Have a suggested owner
      
      RULE 3: DOCUMENT RECOMMENDED CONTACTS
      Stakeholders often mention colleagues who know more — capture these
      
      RULE 4: CONSISTENT PRIORITY INDICATORS
      Use the SAME priority framework across all sections of this document:
      - 🔴 = Blocking or critical — must address immediately
      - 🟡 = Important — needs attention but not blocking
      - 🟢 = Strategic — long-term or low-urgency
      
      ============================================================
      INPUT DATA
      ============================================================
      
      **Study:** {{study_name}}
      
      **Stakeholder Interview Data:**
      
      {{combined_file_content}}
      
      ============================================================
      GENERATE OUTPUT (Sections 8-12 only)
      ============================================================
      
      ## ❓ Open Questions
      
      > Questions that couldn't be answered — need follow-up interviews or data.
      > Priority levels: 🔴 Blocking · 🟡 Important · 🟢 Strategic
      
      ### Immediate Follow-Up Needed (🔴)
      
      | Question | Who Might Know | Why It Matters |
      |----------|----------------|----------------|
      | [Unanswered question] | [Specific person/role if mentioned] | [Impact on research/design] |
      
      ### Needs Clarification (🟡)
      
      | Question | Who Might Know | Why It Matters |
      |----------|----------------|----------------|
      | [Policy/legal/technical question] | [Role] | [Impact] |
      
      ### Requires Cross-Team Coordination (🟡)
      
      | Question | Teams Involved | Why It Matters |
      |----------|----------------|----------------|
      | [Cross-cutting question] | [Teams] | [Impact] |
      
      ---
      
      ## 📋 Recommendations
      
      ### Immediate Actions (🔴 High Priority)
      
      | Action | Constraint Addressed | Feasibility | Owner |
      |--------|---------------------|-------------|-------|
      | [Specific action] | [Which constraint] | ✅ / ⚠️ / ❌ | [Team] |
      
      ### Near-Term Actions (🟡 Medium Priority)
      
      | Action | Constraint Addressed | Feasibility | Owner |
      |--------|---------------------|-------------|-------|
      | [Action] | [Constraint] | ✅ / ⚠️ / ❌ | [Team] |
      
      ### Strategic Actions (🟢 Long-Term)
      
      | Action | Constraint Addressed | Feasibility | Owner |
      |--------|---------------------|-------------|-------|
      | [Action] | [Constraint] | ✅ / ⚠️ / ❌ | [Team] |
      
      ---
      
      ## 📚 Methodology
      
      **Framework:** Stakeholder Research Synthesis for Service Design
      
      **Approach:** Aggregated findings from [X] internal stakeholder interviews, organized by constraint type, priority alignment, and backstage process mapping. Cross-referenced insights across [list teams] perspectives to identify systemic patterns and root causes.
      
      **Key Synthesis Methods:**
      - Constraint triangulation (same issue from technical, design, and policy angles)
      - Process mapping with failure mode identification
      - Design pattern recognition (documenting what works, not just what's broken)
      - Priority alignment analysis (stated priorities vs. user needs)
      - Open question documentation for follow-up
      
      **Data Sources:**
      - [List each stakeholder role and interview duration if available]
      
      ---
      
      ## 👥 Recommended Next Interviews
      
      | Name/Role | Team | Focus Area | Priority |
      |-----------|------|------------|----------|
      | [Name if mentioned by stakeholders] | [Team] | [What they'd contribute] | 🔴 / 🟡 / 🟢 |
      
      ---
      
      <details>
      <summary>References</summary>
      
      This analysis follows established stakeholder research and service design methods:
      
      - **Steve Portigal** — "Interviewing Users" (stakeholder interview techniques)
      - **Kim Goodwin** — "Designing for the Digital Age" (stakeholder alignment)
      - **Stickdorn & Schneider** — "This Is Service Design Thinking" (backstage process mapping)
      - **Kalbach** — "Mapping Experiences" (service blueprint methodology)
      
      </details>
      
      ---
      
      *Generated by Qori • {{current_date}}*

# Processing workflow
processing_workflow:
  - validate_inputs
  - verify_all_files_loaded
  - execute_ai_generation_tasks  # Runs all 4 tasks sequentially
  - concatenate_task_outputs     # Combines sections 1-4 into single document
  - validate_all_stakeholders_represented
  - validate_all_diagrams_complete
  - populate_template
  - save_to_outputs

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "stakeholder_focused"
  file_format: "github_markdown"
  path: "01-planning/stakeholder-interviews/"
  filename: "{{selected_study}}_stakeholder_synthesis_{{current_date}}.md"

# Concatenate all task outputs into single document
output_template: |
  {{ai_generated.section_1_overview_constraints}}
  
  ---
  
  {{ai_generated.section_2_priorities_processes}}
  
  ---
  
  {{ai_generated.section_3_blueprint_questions}}
  
  ---
  
  {{ai_generated.section_4_recommendations}}

# GitHub markdown file template
github_file_template: |
  {{ai_generated.section_1_overview_constraints}}
  
  ---
  
  {{ai_generated.section_2_priorities_processes}}
  
  ---
  
  {{ai_generated.section_3_blueprint_questions}}
  
  ---
  
  {{ai_generated.section_4_recommendations}}

# Validation rules
validation_rules:
  - rule: "all_stakeholders_represented"
    description: "Output must include insights from every stakeholder in input"
    check: "count stakeholders in output >= count stakeholders in input"
  - rule: "constraint_triangulation"
    description: "Major constraints should show multiple stakeholder perspectives"
    check: "constraints section includes multiple source attributions"
  - rule: "process_detail"
    description: "Process maps must include Mermaid sequence diagrams with failure points"
    check: "backstage processes section contains 'sequenceDiagram' and 'Where It Breaks Down'"
  - rule: "diagram_completeness"
    description: "Every Mermaid code block must be properly closed"
    check: "count of opening ``` equals count of closing ``` in backstage section"
  - rule: "overview_diagram_present"
    description: "High-level flowchart must appear before individual process diagrams"
    check: "backstage processes section contains 'flowchart' before first 'sequenceDiagram'"
  - rule: "quantification"
    description: "Include numbers and metrics where available"
    check: "output contains numeric data from input"
  - rule: "all_sections_present"
    description: "All 4 task outputs must be present"
    check: "output contains Overview, Constraints, Priorities, Processes, Blueprint, Questions, Recommendations"
  - rule: "priority_indicator_consistency"
    description: "🔴🟡🟢 indicators must use the same meaning across all sections"
    check: "priority indicators follow Blocking/Important/Strategic framework throughout"

# Slack notifications
notify:
  - role: research_team
    action: "Stakeholder synthesis complete"
    channel: "{{study_channel}}"
    message: "🏛️ {{researcher_contact}} completed stakeholder synthesis for {{study_name}}. {{stakeholder_count}} stakeholders analyzed."

# Auto-generated variables
auto_variables:
  current_date: "new Date().toISOString().split('T')[0]"
  stakeholder_count: "count_stakeholders_in_output()"
  github_file_link: "generate_github_link(selected_study, current_date)"

notes: |
  v3.2 Update — Overview Diagrams, Anti-Truncation, Pattern Recognition:
  - Added high-level Mermaid flowchart at top of Backstage Processes as
    orientation map before detailed sequence diagrams
  - Fixed truncation: RULE 5 instructs AI to simplify remaining diagrams
    rather than truncate — a complete 6-step diagram beats a cut-off 15-step one
  - Added RULE 6: Working Pattern recognition — captures what's succeeding,
    not just what's broken (e.g., optimistic UI, background refresh)
  - Reduced redundancy: Service Blueprint section now explicitly avoids
    re-describing process details already in sequence diagrams. Three sub-sections
