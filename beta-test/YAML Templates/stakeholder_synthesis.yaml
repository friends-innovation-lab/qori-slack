id: stakeholder_synthesis
name: synthesize_stakeholder_interviews

label: 🏛️ Stakeholder Synthesis
version: "v2.0"

description: >
  Synthesize findings from internal stakeholder interviews into comprehensive,
  service blueprint-ready documentation. Aggregates constraints, priorities, 
  backstage processes, and generates questions for user research. Produces
  detailed process maps with failure modes suitable for service design work.

author: Qori R&D
created: 2026-01-08
last_updated: 2026-01-21

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 12000  # Increased significantly for comprehensive output

# System limits
system_limits:
  max_total_tokens: 80000  # Increased to handle multiple long interviews
  min_content_threshold: 1000
  max_file_size: 150000
  supported_formats: [".md", ".txt", ".docx"]
  max_files_per_analysis: 20

# Slack modal input variables
input_variables:
  # Study context (from router/modal)
  - name: selected_study
    type: string
    required: true
    description: "Study folder name"
  - name: study_name
    type: string
    required: true
    description: "Human-readable study name"
  - name: study_channel
    type: string
    required: true
    description: "Slack channel for this study"
  - name: researcher_contact
    type: string
    required: true
    description: "Lead researcher Slack handle"
  - name: team_members
    type: array
    required: false
    description: "Team members to notify"
  
  # File selection (from modal form)
  - name: stakeholder_files
    type: array
    required: true
    description: "Selected stakeholder interview transcripts/notes"
  - name: discovered_files
    type: array
    required: false
    description: "Auto-discovered files from study folder"
  
  # Content (processed by backend)
  - name: combined_file_content
    type: string
    required: true
    description: "Combined content of all selected stakeholder files"
  
  # System
  - name: current_date
    type: string
    required: true
    description: "Current date for filename and output"

# File discovery system
auto_file_discovery:
  core_files:
    # REQUIRED — Stakeholder interview transcripts/notes
    stakeholder_notes:
      file_patterns: ["*stakeholder*", "*transcript*", "*internal*", "*sme*", "*engineering*", "*product_owner*", "*policy*", "*design*", "*lead*", "*response*"]
      search_paths: ["primary-research/01-planning/stakeholder-interviews/"]
      priority: "required"
      confidence_weight: 80
      
    # OPTIONAL — Interview guides for context
    interview_guides:
      file_patterns: ["*guide*"]
      search_paths: ["primary-research/01-planning/stakeholder-interviews/"]
      priority: "optional"
      confidence_weight: 20

# AI generation task
ai_generation_tasks:
  - task_id: "stakeholder_synthesis_complete"
    prompt: |
      You are synthesizing internal stakeholder interviews into a COMPREHENSIVE document 
      that will feed directly into service blueprint creation. This requires DETAILED 
      process mapping, failure mode identification, and cross-stakeholder triangulation.
      
      ============================================================
      CRITICAL: PROCESS ALL INPUT FILES
      ============================================================
      
      BEFORE generating output, you MUST:
      1. Identify ALL stakeholders in the input data
      2. Extract insights from EACH stakeholder
      3. Cross-reference where multiple stakeholders discuss the same topic
      4. Note where stakeholders have different perspectives on the same issue
      
      Count the stakeholders. If you see Engineering Lead, Design Lead, and Policy SME,
      that's 3 stakeholders and ALL THREE must be represented throughout the output.
      
      ============================================================
      RULES FOR COMPREHENSIVE SYNTHESIS
      ============================================================
      
      RULE 1: CONSTRAINT TRIANGULATION
      
      When multiple stakeholders mention the same constraint, show ALL perspectives:
      - Engineering says: [technical angle]
      - Design says: [UX impact angle]  
      - Policy says: [compliance/legal angle]
      
      This triangulation is ESSENTIAL for service blueprint work.
      
      RULE 2: QUANTIFY EVERYTHING POSSIBLE
      
      Extract and include ALL numbers mentioned:
      - Drop-off rates (e.g., "42% drop-off at authentication")
      - Incident counts (e.g., "847 duplicates per month")
      - Time durations (e.g., "3-30 seconds latency")
      - Team sizes, backlog counts, timeline estimates
      
      Numbers make constraints concrete and actionable.
      
      RULE 3: DETAILED PROCESS MAPPING
      
      For each major process, document:
      - Frontend steps (what user sees)
      - Backend steps (what happens invisibly)
      - Failure points with specific failure modes
      - Systems involved at each step
      - Where breakdowns occur and WHY
      
      RULE 4: SERVICE BLUEPRINT PREPARATION
      
      Include a dedicated section mapping:
      - Frontstage moments → Backstage dependencies
      - Manual/human processes that support automated flows
      - "Line of visibility" gaps (what users see vs. reality)
      
      RULE 5: CROSS-REFERENCE INSIGHTS
      
      When stakeholders reference each other's domains:
      - Design mentions engineering constraints → note it
      - Engineering mentions policy blockers → note it
      - Policy mentions design workarounds → note it
      
      These cross-references reveal systemic patterns.
      
      RULE 6: AGGREGATE BY THEME, NOT BY INTERVIEW
      
      DO NOT structure as "Engineering said X, Design said Y"
      DO structure as "Authentication Constraint: [Engineering perspective] + [Design perspective] + [Policy perspective]"
      
      RULE 7: CITE BY ROLE
      
      Use role titles for attribution:
      - ✅ "Engineering Lead," "Design Lead," "Policy SME"
      - ❌ Personal names
      
      RULE 8: GENERATE ACTIONABLE RESEARCH QUESTIONS
      
      For each major insight, generate:
      - What to explore with users
      - What method would work best
      - Why this matters (connection to stakeholder insight)
      
      RULE 9: DOCUMENT RECOMMENDED NEXT INTERVIEWS
      
      Stakeholders often mention colleagues who know more. Capture:
      - Name and role
      - What they'd contribute
      - Priority level
      
      RULE 10: VA CONTEXT
      
      - Teams: Product, Engineering, Design, Content, Policy, Operations, OCTO, Clinical
      - Systems: VistA, Cerner, VA.gov, My HealtheVet, VA Mobile App, ID.me
      - NEVER mention: Marketing, Sales, CRM, advertising
      
      ============================================================
      INPUT DATA — PROCESS ALL FILES BELOW
      ============================================================
      
      **Study:** {{study_name}}
      
      **Stakeholder Interview Data:**
      
      {{combined_file_content}}
      
      ============================================================
      NOW GENERATE COMPREHENSIVE OUTPUT
      ============================================================
      
      # 🏛️ Stakeholder Synthesis: {{study_name}}
      
      > **Generated:** {{current_date}} | **[X] stakeholders** | **[Teams represented]**
      
      ---
      
      ## Overview
      
      | | |
      |---|---|
      | **Stakeholders Interviewed** | [Count ALL stakeholders from input] |
      | **Teams Represented** | [List ALL teams] |
      | **Key Constraint** | [Biggest blocker — be specific with numbers if available] |
      | **Key Insight** | [Most important backstage revelation] |
      | **Critical Gap** | [What's missing or broken systemically] |
      
      ---
      
      ## Stakeholders Interviewed
      
      | Role | Team | Tenure | Focus Areas |
      |------|------|--------|-------------|
      | [Role from input] | [Team] | [If mentioned] | [Topics they covered] |
      | [Role from input] | [Team] | [If mentioned] | [Topics they covered] |
      | [Role from input] | [Team] | [If mentioned] | [Topics they covered] |
      
      ---
      
      ## 🚧 Constraints & Blockers
      
      ### Technical Constraints
      
      > "[Most impactful quote about technical limitation]" — [Role]
      
      > "[Supporting quote from different stakeholder if available]" — [Role]
      
      | Constraint | Impact | Downstream Effect | Source(s) |
      |------------|--------|-------------------|-----------|
      | [Constraint with specifics] | [Quantified impact if possible] | [What users experience] | [All roles who mentioned] |
      | [Constraint] | [Impact] | [User effect] | [Source(s)] |
      | [Continue for ALL technical constraints mentioned] | | | |
      
      ### Policy Constraints
      
      > "[Quote about policy limitation]" — [Role]
      
      > "[Supporting quote from different stakeholder]" — [Role]
      
      | Constraint | Impact | User Experience Effect | Source(s) |
      |------------|--------|------------------------|-----------|
      | [Policy constraint with regulation/directive name] | [What it requires] | [How users experience it] | [Source(s)] |
      | [Continue for ALL policy constraints] | | | |
      
      ### Resource Constraints
      
      > "[Quote about resource limitation]" — [Role]
      
      | Constraint | Impact | Systemic Effect | Source(s) |
      |------------|--------|-----------------|-----------|
      | [Resource constraint with numbers] | [Quantified impact] | [Organizational effect] | [Source(s)] |
      | [Continue for ALL resource constraints] | | | |
      
      ---
      
      ## 🎯 Strategic Priorities
      
      > "[Quote about prioritization]" — [Role]
      
      | Priority | Driver | Timeline | Aligns With User Needs? | Source |
      |----------|--------|----------|:-----------------------:|--------|
      | [What gets prioritized] | [Why] | [When] | ✅ / ⚠️ / ❌ | [Role] |
      | [Continue for all priorities mentioned] | | | | |
      
      **Critical Alignment Gap:** [Document any conflicts between stated priorities and user needs]
      
      ---
      
      ## ⚙️ Backstage Processes
      
      ### [Primary Process Name] (e.g., Appointment Creation Flow)
      
      > "[Quote explaining this process]" — [Role]
      
      > "[Additional perspective]" — [Different Role]
      
      **Frontend Steps (User-Facing):**
      1. [Step with detail]
      2. [Step — note drop-off points with ← **X% drop-off here** if data available]
      3. [Continue all steps]
      
      **Backend Steps (Invisible to User):**
      1. [Backend step with system involved]
      2. [Step — note latency/failure risk]
      3. [Continue all steps]
      
      **Where It Breaks Down:**
      
      | Failure Point | What Happens | User Experience | Frequency/Severity |
      |---------------|--------------|-----------------|-------------------|
      | [Specific failure] | [Technical explanation] | [What user sees/feels] | [Quantify if possible] |
      | [Continue for all failure modes] | | | |
      
      **Systems Involved:** [List all systems, APIs, databases, vendors]
      
      ---
      
      ### [Second Major Process] (e.g., Authentication & Identity Verification)
      
      > "[Quote]" — [Role]
      
      [Follow same detailed structure as above]
      
      ---
      
      ### [Third Major Process if applicable]
      
      [Continue pattern]
      
      ---
      
      ## 🎯 Service Blueprint Implications
      
      > Key inputs for backstage/support layer mapping
      
      ### Frontstage Moments That Depend on Fragile Backstage
      
      | Frontstage Moment | Backstage Dependency | Failure Mode |
      |-------------------|----------------------|--------------|
      | [What user sees/does] | [What must work behind scenes] | [How it fails] |
      | [Continue for key moments] | | |
      
      ### Support Processes Currently Manual
      
      | Process | Current State | Risk |
      |---------|---------------|------|
      | [Manual process] | [How it's handled now] | [What could go wrong] |
      
      ### Line of Visibility Gaps
      
      | Users See | Users Don't See | Creates Confusion When... |
      |-----------|-----------------|---------------------------|
      | [Frontend reality] | [Backend reality] | [Mismatch scenario] |
      
      ---
      
      ## 🔍 Questions for User Research
      
      > Based on stakeholder input, explore these with participants
      
      ### High Priority (🔴)
      
      | Stakeholder Insight | Research Question | Method |
      |---------------------|-------------------|--------|
      | [Specific insight from interviews] | [What to ask/observe] | [Interview/observation/etc.] |
      | [Continue for high-priority questions] | | |
      
      ### Medium Priority (🟡)
      
      | Stakeholder Insight | Research Question | Method |
      |---------------------|-------------------|--------|
      | [Insight] | [Question] | [Method] |
      
      ### Validation Questions (🟢)
      
      | Stakeholder Assumption | Validate With Users |
      |------------------------|---------------------|
      | [Assumption stated by stakeholder] | [How to test if true] |
      
      ---
      
      ## ❓ Open Questions
      
      > Questions that couldn't be answered — need follow-up interviews or data
      
      ### Immediate Follow-Up Needed (🔴)
      
      | Question | Who Might Know | Why It Matters |
      |----------|----------------|----------------|
      | [Unanswered question] | [Specific person/role if mentioned] | [Impact on research/design] |
      
      ### Needs Policy/Legal Clarification (🟡)
      
      | Question | Who Might Know | Why It Matters |
      |----------|----------------|----------------|
      | [Policy question] | [Role] | [Impact] |
      
      ### Requires Cross-Team Coordination (🟡)
      
      | Question | Teams Involved | Why It Matters |
      |----------|----------------|----------------|
      | [Cross-cutting question] | [Teams] | [Impact] |
      
      ---
      
      ## 📋 Recommendations
      
      ### Immediate Actions (🔴 High Priority)
      
      | Action | Constraint Addressed | Feasibility | Owner |
      |--------|---------------------|-------------|-------|
      | [Specific action] | [Which constraint] | ✅ / ⚠️ / ❌ | [Team] |
      
      ### Near-Term Actions (🟡 Medium Priority)
      
      | Action | Constraint Addressed | Feasibility | Owner |
      |--------|---------------------|-------------|-------|
      | [Action] | [Constraint] | ✅ / ⚠️ / ❌ | [Team] |
      
      ### Strategic Actions (🟢 Long-Term)
      
      | Action | Constraint Addressed | Feasibility | Owner |
      |--------|---------------------|-------------|-------|
      | [Action] | [Constraint] | ✅ / ⚠️ / ❌ | [Team] |
      
      ---
      
      ## 📚 Methodology
      
      **Framework:** Stakeholder Research Synthesis for Service Design
      
      **Approach:** Aggregated findings from [X] internal stakeholder interviews, organized by constraint type, priority alignment, and backstage process mapping. Cross-referenced insights across [list teams] perspectives to identify systemic patterns and root causes.
      
      **Key Synthesis Methods:**
      - Constraint triangulation (same issue from technical, design, and policy angles)
      - Process mapping with failure mode identification
      - Priority alignment analysis (stated priorities vs. user needs)
      - Open question documentation for follow-up
      
      **Data Sources:**
      - [List each stakeholder role and interview duration if available]
      
      ---
      
      ## 👥 Recommended Next Interviews
      
      | Name | Role | Focus Area | Priority |
      |------|------|------------|----------|
      | [Name if mentioned by stakeholders] | [Role] | [What they'd contribute] | 🔴 / 🟡 / 🟢 |
      | [Continue for all recommended contacts] | | | |
      
      ---
      
      ### References
      
      This analysis follows established stakeholder research and service design methods:
      
      - **Steve Portigal** — "Interviewing Users" (stakeholder interview techniques)
      - **Kim Goodwin** — "Designing for the Digital Age" (stakeholder alignment)
      - **Stickdorn & Schneider** — "This Is Service Design Thinking" (backstage process mapping)
      - **Kalbach** — "Mapping Experiences" (service blueprint methodology)
      
      ---
      
      *Generated by Qori • {{current_date}}*

# Processing workflow
processing_workflow:
  1. validate_slack_modal_inputs
  2. discover_files_from_study_selection
  3. verify_all_files_loaded  # Added: confirm all selected files are processed
  4. combine_selected_files_with_truncation
  5. execute_stakeholder_synthesis_complete
  6. validate_all_stakeholders_represented  # Added: check output includes all input stakeholders
  7. format_slack_output
  8. format_github_output
  9. save_to_planning_folder

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "stakeholder_focused"
  file_format: "github_markdown"
  path: "primary-research/01-planning/stakeholder-interviews/"
  filename: "{{selected_study}}_stakeholder_synthesis_{{current_date}}.md"

# Slack output template
output_template: |
  {{ai_generated.stakeholder_synthesis_complete}}

# GitHub markdown file template
github_file_template: |
  {{ai_generated.stakeholder_synthesis_complete}}

# Validation rules
validation_rules:
  - rule: "all_stakeholders_represented"
    description: "Output must include insights from every stakeholder in input"
    check: "count stakeholders in output >= count stakeholders in input"
  - rule: "constraint_triangulation"
    description: "Major constraints should show multiple stakeholder perspectives"
    check: "constraints section includes multiple source attributions"
  - rule: "process_detail"
    description: "Process maps must include both frontend and backend steps"
    check: "backstage processes section contains 'Frontend Steps' and 'Backend Steps'"
  - rule: "quantification"
    description: "Include numbers and metrics where available"
    check: "output contains numeric data from input"

notes: |
  v2.0 Major Update — Service Blueprint Ready:
  - Increased max_tokens from 4500 to 12000 for comprehensive output
  - Increased max_total_tokens from 50000 to 80000 for multiple long interviews
  - Added CRITICAL section requiring processing of ALL input files
  - Added constraint triangulation requirement (multiple stakeholder perspectives)
  - Added quantification requirement (include all numbers from interviews)
  - Added detailed process mapping with frontend/backend split
  - Added failure mode documentation for each process
  - Added Service Blueprint Implications section
  - Added Line of Visibility gaps mapping
  - Added validation rules to check output completeness
  - Added verify_all_files_loaded and validate_all_stakeholders_represented steps
  - Enhanced file discovery patterns to catch more stakeholder file types
  - Added Recommended Next Interviews section with specific people mentioned
  
  v1.1 Updates:
  - Added complete input_variables with types, required flags, descriptions
  - Added study context variables (study_name, study_channel, researcher_contact)
  - Added discovered_files for auto-discovery
  - Added current_date for output
  - Updated description to reflect planning context
  
  v1.0 Initial release:
  - Basic aggregation across stakeholder interviews
  
  KEY DIFFERENCE FROM v1.x:
  - v1.x produced summary-level output
  - v2.0 produces service blueprint-ready detail
  
  WHAT THIS SYNTHESIS FEEDS INTO:
  - Service Blueprint (backstage layer with failure modes)
  - Discussion guide creation (informed by stakeholder input)
  - Recommendations feasibility assessment
  - Cross-team alignment documentation

output_use: |
  Synthesize internal stakeholder interviews into comprehensive, service 
  blueprint-ready documentation. Produces detailed process maps with failure 
  modes, constraint triangulation across stakeholder perspectives, and 
  quantified insights suitable for service design work. Run BEFORE user 
  research to inform discussion guides and research focus.
