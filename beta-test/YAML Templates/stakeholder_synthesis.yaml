id: stakeholder_synthesis
name: synthesize_stakeholder_interviews

label: 🏛️ Stakeholder Synthesis
version: "v1.1"

description: >
  Synthesize findings from internal stakeholder interviews. Aggregates
  constraints, priorities, backstage processes, and generates questions
  to explore in upcoming user research.

author: Qori R&D
created: 2026-01-08
last_updated: 2026-01-08

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4500

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 1000
  max_file_size: 100000
  supported_formats: [".md", ".txt", ".docx"]
  max_files_per_analysis: 15

# Slack modal input variables
input_variables:
  # Study context (from router/modal)
  - name: selected_study
    type: string
    required: true
    description: "Study folder name"
  - name: study_name
    type: string
    required: true
    description: "Human-readable study name"
  - name: study_channel
    type: string
    required: true
    description: "Slack channel for this study"
  - name: researcher_contact
    type: string
    required: true
    description: "Lead researcher Slack handle"
  - name: team_members
    type: array
    required: false
    description: "Team members to notify"
  
  # File selection (from modal form)
  - name: stakeholder_files
    type: array
    required: true
    description: "Selected stakeholder interview transcripts/notes"
  - name: discovered_files
    type: array
    required: false
    description: "Auto-discovered files from study folder"
  
  # Content (processed by backend)
  - name: combined_file_content
    type: string
    required: true
    description: "Combined content of all selected stakeholder files"
  
  # System
  - name: current_date
    type: string
    required: true
    description: "Current date for filename and output"

# File discovery system
auto_file_discovery:
  core_files:
    # REQUIRED — Stakeholder interview transcripts/notes
    stakeholder_notes:
      file_patterns: ["*stakeholder*", "*transcript*", "*internal*", "*sme*", "*engineering*", "*product_owner*", "*policy*"]
      search_paths: ["primary-research/01-planning/stakeholder-interviews/"]
      priority: "required"
      confidence_weight: 80
      
    # OPTIONAL — Interview guides for context
    interview_guides:
      file_patterns: ["*guide*"]
      search_paths: ["primary-research/01-planning/stakeholder-interviews/"]
      priority: "optional"
      confidence_weight: 20

# AI generation task
ai_generation_tasks:
  - task_id: "stakeholder_synthesis_complete"
    prompt: |
      You are synthesizing internal stakeholder interviews for a research study.
      
      IMPORTANT: Generate the COMPLETE output following the format below. Do not stop early.
      
      ============================================================
      RULES — READ THEN GENERATE FULL OUTPUT
      ============================================================
      
      RULE 1: STAKEHOLDER ≠ USER RESEARCH
      
      This is NOT about user pain points. This is about:
      - Technical, policy, and resource CONSTRAINTS
      - Strategic PRIORITIES from leadership
      - BACKSTAGE PROCESSES (how things work internally)
      - System DEPENDENCIES
      - WHY user pain points exist (root causes)
      
      RULE 2: AGGREGATE ACROSS STAKEHOLDERS
      
      Don't summarize each interview separately. Organize by THEME:
      - All technical constraints together (from any stakeholder)
      - All priorities together
      - All process explanations together
      
      RULE 3: CITE BY ROLE, NOT NAME
      
      Use role titles for attribution:
      - ✅ "Engineering Lead," "Product Owner," "Policy SME"
      - ❌ "John Smith," "Jane Doe"
      
      RULE 4: GENERATE QUESTIONS FOR USER RESEARCH
      
      Stakeholder interviews happen BEFORE user research. Use stakeholder insights
      to generate questions to explore with users:
      - Constraint revealed → "Do users notice this? How do they react?"
      - Process explained → "Does this match user expectations?"
      - Assumption stated → "Is this true from the user perspective?"
      
      RULE 5: IDENTIFY GAPS
      
      What questions couldn't be answered? Who else needs to be interviewed?
      
      RULE 6: VA CONTEXT
      
      - Teams: Product, Engineering, Design, Content, Policy, Operations, OCTO
      - Systems: VBA, VHA, VA Profile, Benefits API, Health API
      - NEVER mention: Marketing, Sales, CRM, advertising
      
      RULE 7: VERIFY BEFORE SUBMITTING
      - Findings organized by theme, not by interview
      - Every quote cites a role
      - Constraints clearly separated (technical, policy, resource)
      - Open questions listed for follow-up
      
      ============================================================
      INPUT DATA
      ============================================================
      
      **Study:** {{selected_study}}
      **Stakeholder Data:** {{combined_file_content}}
      
      ============================================================
      NOW GENERATE THE COMPLETE OUTPUT BELOW
      ============================================================
      
      # 🏛️ Stakeholder Synthesis: {{selected_study}}
      
      > **Generated:** [Today's date] | **[X] stakeholders** | **[Y] teams represented**
      
      ---
      
      ## Overview
      
      | | |
      |---|---|
      | **Stakeholders Interviewed** | [X] |
      | **Teams Represented** | [List teams] |
      | **Key Constraint** | [Biggest blocker identified] |
      | **Key Insight** | [Most important backstage revelation] |
      
      ---
      
      ## Stakeholders Interviewed
      
      | Role | Team | Focus Areas |
      |------|------|-------------|
      | [Role] | [Team] | [What they covered] |
      | [Role] | [Team] | [What they covered] |
      | [Role] | [Team] | [What they covered] |
      
      ---
      
      ## 🚧 Constraints & Blockers
      
      ### Technical Constraints
      
      > "[Quote about technical limitation]" — [Role]
      
      | Constraint | Impact | Source |
      |------------|--------|--------|
      | [Constraint] | [How it affects users/product] | [Role] |
      | [Constraint] | [Impact] | [Role] |
      
      ### Policy Constraints
      
      > "[Quote about policy limitation]" — [Role]
      
      | Constraint | Impact | Source |
      |------------|--------|--------|
      | [Constraint] | [Impact] | [Role] |
      
      ### Resource Constraints
      
      | Constraint | Impact | Source |
      |------------|--------|--------|
      | [Constraint] | [Impact] | [Role] |
      
      ---
      
      ## 🎯 Strategic Priorities
      
      > "[Quote about what matters to leadership]" — [Role]
      
      | Priority | Source | Timeline | Aligns With User Needs? |
      |----------|--------|----------|:-----------------------:|
      | [Priority] | [Role] | [When] | ✅ / ⚠️ / ❌ |
      | [Priority] | [Role] | [When] | ✅ / ⚠️ / ❌ |
      
      **Alignment Note:** [Any conflicts between stated priorities and user research findings]
      
      ---
      
      ## ⚙️ Backstage Processes
      
      ### [Process Name] (e.g., Claims Data Sync)
      
      > "[Quote explaining the process]" — [Role]
      
      **How it works:**
      1. [Step 1]
      2. [Step 2]
      3. [Step 3]
      
      **Where it breaks down:** [Connection to user-facing problems]
      
      **Systems involved:** [List systems/APIs/databases]
      
      ---
      
      ### [Process Name]
      
      > "[Quote]" — [Role]
      
      **How it works:**
      1. [Step]
      2. [Step]
      
      **Where it breaks down:** [Issue]
      
      ---
      
      ## 🔍 Questions for User Research
      
      > Based on stakeholder input, explore these with participants
      
      | Stakeholder Insight | Research Question | Priority |
      |---------------------|-------------------|:--------:|
      | [Constraint or process revealed] | [What to ask/observe with users] | 🔴 |
      | [Constraint or process] | [What to explore] | 🔴 |
      | [Assumption from stakeholder] | [What to validate] | 🟡 |
      
      ---
      
      ## ❓ Open Questions
      
      > Questions that couldn't be answered — need follow-up interviews
      
      | Question | Who Might Know | Priority |
      |----------|----------------|:--------:|
      | [Unanswered question] | [Role/Team] | 🔴 |
      | [Question that came up] | [Role/Team] | 🟡 |
      | [Area needing deeper dive] | [Role/Team] | 🟡 |
      
      ---
      
      ## Recommendations
      
      | Priority | Action | Constraint Addressed | Feasibility |
      |:--------:|--------|---------------------|:-----------:|
      | 🔴 | [Specific action] | [Which constraint] | ✅ Feasible |
      | 🔴 | [Action] | [Constraint] | ⚠️ Needs buy-in |
      | 🟡 | [Action] | [Constraint] | ⚠️ Resource-dependent |
      
      > **Legend:** 🔴 High | 🟡 Medium | 🟢 Low
      
      <br>
      
      ---
      
      ## 📚 Methodology
      
      **Framework:** Stakeholder Research Synthesis
      
      **Approach:** Aggregated findings from internal interviews, organized by constraint type, priority alignment, and backstage process mapping. Connected stakeholder insights to user research findings where applicable.
      
      **Data Sources:**
      - Stakeholder interviews: [List roles]
      
      <br>
      
      ---
      
      ### References
      
      This analysis follows established stakeholder research methods:
      
      - **Steve Portigal** — "Interviewing Users" (stakeholder interview techniques)
      - **Kim Goodwin** — "Designing for the Digital Age" (stakeholder alignment)
      - **Service Design Thinking** — Backstage process mapping (Stickdorn & Schneider)
      
      ---
      
      *Generated by Qori • {{current_date}}*

# Processing workflow
processing_workflow:
  1. validate_slack_modal_inputs
  2. discover_files_from_study_selection
  3. combine_selected_files_with_truncation
  4. execute_stakeholder_synthesis_complete
  5. format_slack_output
  6. format_github_output
  7. save_to_planning_folder

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "stakeholder_focused"
  file_format: "github_markdown"
  path: "primary-research/01-planning/stakeholder-interviews/"
  filename: "{{selected_study}}_stakeholder_synthesis_{{current_date}}.md"

# Slack output template
output_template: |
  {{ai_generated.stakeholder_synthesis_complete}}

# GitHub markdown file template
github_file_template: |
  {{ai_generated.stakeholder_synthesis_complete}}

notes: |
  v1.1 Updates:
  - Added complete input_variables with types, required flags, descriptions
  - Added study context variables (study_name, study_channel, researcher_contact)
  - Added discovered_files for auto-discovery
  - Added current_date for output
  - Updated description to reflect planning context
  
  v1.0 Initial release:
  - Aggregates across multiple stakeholder interviews
  - Organized by theme (constraints, priorities, processes) not by interview
  - Generates questions for user research (stakeholder interviews come FIRST)
  - Identifies open questions for follow-up
  - Outputs to 01-planning (stakeholder research is planning context)
  - Follows Portigal, Goodwin, Stickdorn methodologies
  
  KEY DIFFERENCE FROM USER RESEARCH:
  - User research → What users need (pain points, behaviors)
  - Stakeholder research → What's possible (constraints, processes)
  
  TYPICAL FLOW:
  1. Stakeholder interviews (understand context)
  2. Stakeholder synthesis (this tool)
  3. Create discussion guide (informed by stakeholder input)
  4. User research sessions
  5. User research synthesis
  
  This synthesis feeds into:
  - Discussion guide creation
  - Service Blueprint (backstage layer)
  - Recommendations feasibility

output_use: |
  Synthesize internal stakeholder interviews to understand constraints,
  priorities, and backstage processes. Generates questions to explore
  in upcoming user research. Typically run BEFORE user research to
  inform discussion guides and research focus.
