id: executive_summary
label: 📊 Executive Summary
description: Generate a VA-style executive summary with key findings and recommendations
input_type: text
input_processing: summarize_if_long
prompt: |
  You are creating an executive summary based on qualitative research findings. Use the structure below, written in plain, accessible language at a 10th-grade reading level. Be specific, avoid business jargon, and do not use em-dashes. Use Markdown headings and bullet points as shown.

  Input:
  {{input}}

output_format: |
  # 🧾 Executive Summary – [Project or Study Name]

  ---

  ## 🎯 Objective  
  [Briefly summarize the purpose of the research. What were you trying to understand or solve?]

  ---

  ## 🔍 Key Insights  
  1. **[Top Insight 1]** – [Short explanation]  
  2. **[Top Insight 2]** – [Short explanation]  
  3. **[Top Insight 3]** – [Short explanation]  

  [Optional: Add 1–2 more insights depending on space and importance]

  ---

  ## 👤 Who We Spoke To  
  - [#] Participants  
  - [Participant types (e.g., Veterans, Caregivers, Clinicians)]  
  - [Key demographic details: age range, geography, device use, etc.]

  ---

  ## 🛠️ Top Recommendations  
  - [Brief, actionable recommendation #1]  
  - [Brief, actionable recommendation #2]  
  - [Brief, actionable recommendation #3]

  ---

  ## 🧠 Why It Matters  
  [Summarize how this research supports org goals, informs design decisions, or addresses equity gaps.]

  ---

  ## 📎 Artifacts  
  - [Link to full report]  
  - [Links to transcripts, affinity map, or prototypes (if applicable)]

  ---

  **Prepared by:** [Name or Team]  
  **Date:** [YYYY-MM-DD]
