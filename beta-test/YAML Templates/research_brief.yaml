id: research_brief
name: run_research_brief
label: 📄 Research Brief
version: v4.0
description: "Executive Research Brief Generator - Create concise, business-focused research briefs designed for fast stakeholder approval."

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-16

llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.3
  max_tokens: 2500

input_type: structured
input_processing: direct
precision_mode: concise

error_handling:
  validation_errors:
    - field: "project_title"
      rules:
        - type: "min_length"
          value: 5
          message: "Project title must clearly describe the research focus"
    - field: "study_context"
      rules:
        - type: "min_length"
          value: 20
          message: "Study context must explain the motivation for research"

input_variables:
  - project_title:
      type: "text"
      required: true
      placeholder: "e.g., Claims Status Navigation Study"
  - study_context:
      type: "textarea"
      required: true
      placeholder: "e.g., Veterans are calling the help desk frequently about claim status, suggesting navigation issues with the current online experience"
  - target_barriers:
      type: "textarea"
      required: true
      placeholder: "e.g., Confusing status language, unclear next steps, hard-to-find claim details"
  - user_flows_touchpoints:
      type: "textarea"
      required: true
      placeholder: "e.g., Login to claim status page, interpreting status updates, finding additional details"
  - stakeholders:
      type: "textarea"
      required: true
      placeholder: "e.g., VBA Claims Team, Call Center Manager, UX Design Lead"
  - research_approach:
      type: "text"
      required: true
      placeholder: "e.g., User interviews and usability testing"
  - prepared_by:
      type: "text"
      required: true
      placeholder: "e.g., Jordan Smith, UX Researcher"

ai_generation_tasks:
  - task_id: "business_impact"
    prompt: "Create compelling business impact statement for {project_title}. Study context: {study_context}. Target barriers: {target_barriers}. Stakeholders: {stakeholders}. Generate 2-3 sentences that answer: How does this problem affect VA operations? What's the impact on Veterans? What's the cost of NOT fixing this? Use specific, measurable language. Focus on business value, not research value."

  - task_id: "key_questions"
    prompt: "Create 3-4 key business questions this research will answer. Project: {project_title}. Context: {study_context}. Barriers: {target_barriers}. Questions should be answerable by stakeholders in business terms, focus on what should we do not what do users think, and support specific decisions. Format as actionable business questions that help prioritize improvements."

  - task_id: "touchpoint_analysis"
    prompt: "Analyze specific touchpoints for {project_title}. User flows/touchpoints to evaluate: {user_flows_touchpoints}. Study context: {study_context}. Target barriers: {target_barriers}. Create analysis focusing on: Why these touchpoints are critical to business success, How problems at these touchpoints connect to overall issues, Which should be prioritized based on business impact. Format as business-focused touchpoint prioritization."

  - task_id: "approach_rationale"
    prompt: "Justify research approach in business terms. Approach: {research_approach}. Study context: {study_context}. Create 2-3 sentences explaining: Why this approach is right for this problem, What type of insights it will provide for decision-making, How it supports business needs. Use business language, focus on ROI and decision-making value."

  - task_id: "success_criteria"
    prompt: "Define business success criteria for {project_title} research. Stakeholders: {stakeholders}. Create 3 criteria focused on business value: 1. Decision Support: How findings will enable specific decisions 2. Implementation Impact: How research will improve experience for Veterans 3. Stakeholder Value: How research will help stakeholders achieve goals. Focus on business outcomes and stakeholder value."

  - task_id: "resource_requirements"
    prompt: "Estimate resource requirements for {project_title} research. Approach: {research_approach}. Provide realistic estimates: Time Commitment - Lead researcher hours per week, Stakeholder time for review. Budget Considerations - Participant incentives, Tools costs. Timeline - Research execution breakdown, Findings delivery timeline. Keep practical and business-focused."

  - task_id: "next_steps"
    prompt: "Create clear next steps for stakeholder decision-making. Stakeholders: {stakeholders}. Format as immediate action plan: This Week - Stakeholder decision needed, Resource allocation. Next 2 Weeks - Research plan development, Team coordination. Research Execution - Timeline and findings delivery schedule. Include specific decision points."

processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. format_executive_brief
  4. save_to_github
  5. send_slack_notification

output_template: "# Research Brief – {project_title}\n\n**Prepared by:** {prepared_by} | **Date:** {current_date}\n\n---\n\n## 🎯 Study Context & Motivation\n\n{study_context}\n\n---\n\n## 💼 Business Impact\n\n{ai_generated.business_impact}\n\n---\n\n## 🔍 What We Need to Learn\n\n{ai_generated.key_questions}\n\n---\n\n## 🗺️ User Flows & Touchpoints to Evaluate\n\n**Focus Areas:** {user_flows_touchpoints}\n\n**Analysis:** {ai_generated.touchpoint_analysis}\n\n---\n\n## 🛠️ Research Approach\n\n**Method:** {research_approach}\n\n**Rationale:** {ai_generated.approach_rationale}\n\n**Resources:** {ai_generated.resource_requirements}\n\n---\n\n## ✅ Success Criteria\n\n{ai_generated.success_criteria}\n\n---\n\n## 🚀 Next Steps\n\n{ai_generated.next_steps}\n\n---\n\n## 📋 The Ask\n\n**Decision Needed:** Approve {project_title} research to inform improvement strategy\n\n**Stakeholders:** {stakeholders}\n\n**Value:** Clear prioritization of improvements with data-driven recommendations\n\n---\n\n*Research brief • Generated by Qori Research Platform*"

output_options:
  filename: "research_brief_{project_title_slug}_{current_date}.md"
  path: "00-brief/"
  
delivery:
  github:
    enabled: true
    repo: "your-research-repo"
    commit_message: "Add research brief: {project_title}"
  slack:
    enabled: true
    channel: "#research-planning"
    message: "📄 **Research Brief Ready** - {project_title} - Brief optimized for stakeholder review and approval."

analytics:
  track_events:
    - event: "research_brief_generated"
      properties: [project_title, research_approach]
