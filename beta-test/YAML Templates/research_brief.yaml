id: research_brief
name: run_research_brief
label: 📄 Research Brief
version: v2.0
description: |
  Generate VA-aligned research briefs for scoping studies with design and product partners. Creates structured research briefs with objectives, hypotheses, and methodology following VA research standards and government service considerations.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-02

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

input_variables:
  - input_text           # Research context, objectives, barriers to investigate (REQUIRED)
  - study_name           # Title of study (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to notify completion (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Who to notify (OPTIONAL)

# Auto-generated/computed variables
auto_variables:
  - project_scope: |
      # AI identifies project scope from context
      # Product Area, Service Area, Feature Focus
      identify_project_scope(input_text) || "Digital Services"
  - target_barriers: |
      # AI extracts key barriers from research context
      extract_barriers(input_text) || "User experience challenges"
  - user_flows: |
      # AI identifies user flows to evaluate
      identify_user_flows(input_text) || "Primary service flow"
  - research_approach: |
      # AI suggests research methods from objectives
      suggest_research_methods(input_text) || "Qualitative interviews and usability testing"
  - stakeholder_groups: |
      # AI identifies relevant stakeholders
      identify_stakeholders(input_text) || "Product team, Design team"
  - current_date: |
      # Auto-generate current date
      new Date().toLocaleDateString('en-US', {year: 'numeric', month: 'long', day: 'numeric'})
  - github_file_link: |
      # Auto-generate based on study name and date
      generate_github_link(study_name, current_date) || null

# Output configuration
output_options:
  default_delivery: "file_only"
  slack_format: "notification_only"
  file_location: "01-planning/"
  file_name: "research_brief_{{study_name_slug}}_{{current_date}}.md"

slack_output:
  post_in_channel: false
  create_thread: false
  send_notification: true
  title_format: "📄 Research Brief Created"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "📄 View Brief"
      url: "{{github_file_link}}"
    - text: "🧭 Create Research Plan"
      action: "run_research_plan"

output_use: |
  CivicMind Research Brief generator creates VA-compliant research scoping documents for stakeholder alignment. Ensures consistent structure and coverage of key research elements while supporting trauma-informed design principles.

  Use this method to:
    - Generate structured research briefs following VA standards
    - Align stakeholders on research objectives and scope
    - Document research hypotheses and framing questions
    - Plan research approach and methodology
    - Support trauma-informed service design considerations

output_notes: |
  Project scope ({{project_scope}}) and barriers ({{target_barriers}}) identified from research context.
  Research approach ({{research_approach}}) and stakeholders ({{stakeholder_groups}}) determined automatically.
  Brief follows VA research standards including trauma-informed design considerations.
  Write in plain, accessible language at 10th-grade reading level.
  Keep focused and actionable for design and product partners.

output_format: |
  # 📄 Research Brief – {{study_name}}

  **📦 Project Area:** {{project_scope}}  
  **👩🏽‍🔬 Prepared by:** {{researcher_contact}}  
  **🗓️ Date:** {{current_date}}

  ---

  ## Overview

  {{study_context}}

  ## Objectives

  1. **Identify Barriers:**  
     {{target_barriers}}

  2. **Evaluate Navigation Experience:**  
     {{user_flows}}

  3. **Surface Insights for Design & Content Improvements:**  
     {{design_improvements}}

  4. **Support Trauma-Informed Service Design:**  
     {{trauma_informed_considerations}}

  ---

  ## Initial Scoping Materials

  - **Stakeholders Consulted:**  
    {{stakeholder_groups}}

  - **Initial Hypotheses:**  
    {{research_hypotheses}}

  - **Framing Questions:**  
    {{framing_questions}}

  - **Research Approach Summary:**  
    {{research_approach}}
    
    {{methodology_details}}

  ---

  **Study Details:** {{study_link}}

prompt: |
  You are a senior UX researcher experienced in creating VA-compliant research briefs for government service design.

  ANALYSIS CONTEXT:
  - Study: {{study_name}}
  - Project scope: {{project_scope}} (AI-identified from context)
  - Target barriers: {{target_barriers}} (AI-extracted from objectives)
  - Research approach: {{research_approach}} (AI-suggested from scope)
  - Stakeholders: {{stakeholder_groups}} (AI-identified from context)

  Create a comprehensive research brief that includes:

  1. **Study Context** - Clear overview of current challenges and research motivation
  2. **Design Improvements** - Specific improvements this research will inform
  3. **Trauma-Informed Considerations** - VA-relevant considerations for veteran experiences
  4. **Research Hypotheses** - 2-3 testable hypotheses based on barriers and objectives
  5. **Framing Questions** - 3-4 specific research questions for investigation
  6. **Methodology Details** - Expanded details on research approach and methods

  Requirements:
  - Follow VA research standards and trauma-informed design principles
  - Use plain, accessible language at 10th-grade reading level
  - Focus on actionable outcomes for design and product partners
  - Consider veteran experiences, mental health impacts, and equitable access
  - Avoid business jargon, em-dashes, and complex language
  - Connect research to specific service improvements

  Write in clear, professional language that helps stakeholders understand research value and scope.

notify:
  - role: research_team
    action: "Research brief created"
    channel: "{{study_channel}}"
    message: "📄 Research brief for {{study_name}} has been created and saved. Ready for stakeholder review and planning phase."
  - role: researcher
    action: "Brief ready for review"
    slack_tag: "{{researcher_contact}}"
    message: "Your research brief has been saved to the planning folder and is ready for stakeholder review."
