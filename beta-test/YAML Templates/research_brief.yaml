id: research_brief
name: run_research_brief
label: Research Brief
version: v3.0
description: |
  Generate VA-aligned research briefs for scoping studies with design and product partners. Creates structured research briefs that capture and refine stakeholder thinking to inform detailed research plans. Automatically improves informal or unclear stakeholder inputs while preserving original intent.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-09-26

# Character encoding fix
encoding: utf-8
output_encoding: utf-8

# LLM Configuration - Upgraded for better quality
llm_config:
  model: "gpt-4o"
  temperature: 0.2
  max_tokens: 4000

input_type: text
input_processing: summarize_if_long
precision_mode: concise

# Input schema for Slack UI
input_variables:
  - project_title        # Project Title/Focus from UI (REQUIRED)
  - study_context        # Study context and motivation from UI (REQUIRED)
  - target_barriers      # Target barriers to identify from UI (REQUIRED)
  - user_flows           # User flows/touchpoints to evaluate from UI (REQUIRED)
  - stakeholders         # Stakeholders consulted from UI (REQUIRED)
  - research_approach    # High-level research approach from UI (REQUIRED)
  - prepared_by          # Prepared by name and title from UI (REQUIRED)

# AI Generation Tasks - These will be processed sequentially
ai_generation_tasks:
  - task_id: "project_scope"
    prompt: |
      Based on the project title "{{project_title}}" and study context "{{study_context}}", identify the broader project scope or domain area.
      
      Choose from these VA domains:
      - Digital Services (web platforms, online tools)
      - Benefits Claims (disability, education, housing benefits)
      - Healthcare Services (medical care, appointments, records)
      - Education Services (GI Bill, training programs)
      - Career Services (employment, vocational rehab)
      - Financial Services (loans, payments, debt)
      
      If unclear, default to "Digital Services"
      Provide a concise 1-2 word descriptor (e.g., "Digital Services", "Benefits Claims").

  - task_id: "refined_context"
    prompt: |
      Rewrite and improve the study context provided: "{{study_context}}"
      
      Make it more professional and clear while preserving the original meaning. The improved version should:
      - Use clear, professional language
      - Provide better context and background
      - Be 2-3 sentences that set up the research need
      - Fix any grammatical or clarity issues
      - Maintain the core message and intent
      - Focus on VA and Veteran-specific challenges
      
      If the input is very brief or unclear, expand it appropriately while staying true to the apparent intent.

  - task_id: "refined_barriers"
    prompt: |
      Improve and clarify the target barriers: "{{target_barriers}}"
      
      Rewrite as a clear, bulleted list that:
      - Uses professional UX/research language
      - Makes vague barriers more specific
      - Fixes grammatical issues
      - Maintains the original intent
      - Formats consistently
      - Focuses on user experience and interface barriers
      
      Format as:
      - [Clear, specific barrier description]
      - [Clear, specific barrier description]
      - [Clear, specific barrier description]

  - task_id: "refined_user_flows"
    prompt: |
      Improve and clarify the user flows: "{{user_flows}}"
      
      Rewrite as a clear, numbered list that:
      - Uses consistent formatting
      - Makes vague steps more specific
      - Fixes any unclear language
      - Maintains logical flow order
      - Uses action-oriented language
      - Focuses on Veteran user actions
      
      Format as:
      1. [Clear action/step]
      2. [Clear action/step]
      3. [Clear action/step]
      etc.

  - task_id: "refined_research_approach"
    prompt: |
      Improve and professionalize the research approach: "{{research_approach}}"
      
      Rewrite to be more professional and specific while preserving the original intent:
      - Use proper research methodology terminology
      - Be more specific about methods (e.g., "talk to users" → "user interviews")
      - Fix informal language
      - Maintain the core approach and scope
      - Reference VA research standards
      
      Keep it concise - just 1-2 sentences describing the high-level methodology.

  - task_id: "stakeholder_concerns"
    prompt: |
      Based on the refined barriers "{{target_barriers}}" and study context "{{study_context}}", identify 2-3 key stakeholder concerns that are driving this VA research.
      
      Format as bullet points focusing on:
      - Specific user experience problems Veterans are facing
      - Business impact on VA operations or service delivery
      - Technical or design issues affecting the product/service
      
      Example format:
      - [Specific UX problem] is causing [impact on Veterans/VA operations]
      - [Observed usability issue] preventing [desired outcome for Veterans]
      
      Keep focused on problems directly related to {{project_title}}, not generic business issues.

  - task_id: "learning_objectives"
    prompt: |
      Create 3-4 clear learning objectives based on:
      - Refined barriers: {{target_barriers}}
      - User flows: {{user_flows}}
      - Study context: {{study_context}}
      
      Format as "What we want to learn:" with bullet points that start with:
      - "Where veterans..." (understand pain points)
      - "Which..." (identify priorities)  
      - "Why..." (understand root causes)
      - "How..." (understand current state)
      
      Focus on learning goals specific to {{project_title}}, not research methods or solutions.
      Keep each objective to one sentence.

  - task_id: "key_questions"
    prompt: |
      Create 3-4 primary research questions based on:
      - Refined barriers: {{target_barriers}}
      - User flows: {{user_flows}}
      - Research approach: {{research_approach}}
      
      Questions should:
      - Be specific and answerable through research
      - Focus on understanding problems, not validating solutions
      - Connect to the user flows and barriers mentioned
      - Be relevant to {{project_title}}
      
      Format as numbered questions starting with:
      - "How do veterans currently..."
      - "What barriers prevent..."
      - "Why do veterans..."
      - "What causes..."
      
      Keep questions focused on understanding the current state and problems.

  - task_id: "team_hypotheses"
    prompt: |
      Generate 2-3 brief team hypotheses specifically related to {{project_title}} and the barriers mentioned in "{{target_barriers}}":
      
      Format as simple statements of what the research team currently believes about the specific product/service being studied:
      - "[Specific barrier from target_barriers] increases [measurable user outcome]"
      - "Veterans with [specific condition] face more [specific type of problem with the product]"
      - "[Current design/approach] leads to [specific negative outcome]"
      
      Keep hypotheses brief and focused on assumptions that research will test about {{project_title}}.
      Do not generate generic hypotheses about transportation, childcare, or unrelated topics.

  - task_id: "research_rationale"
    prompt: |
      Based on the refined research approach, explain in 1-2 sentences why this approach makes sense for the research objectives.
      
      Focus on:
      - Why this method will answer the key questions
      - What type of insights it will provide (behavioral vs. attitudinal)
      - How it fits the scope and constraints
      
      Keep brief and high-level - no implementation details.

  - task_id: "expected_outcomes"
    prompt: |
      Based on the study context and objectives, describe how this research will be used in 2-3 bullet points.
      
      Format as "Research will inform:" followed by:
      - [Specific type] improvements or decisions
      - [Area] prioritization or strategy
      - [Process] optimization or changes
      
      Focus on how insights will be applied to {{project_title}}, not what the insights might be.

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. validate_generated_content
  4. populate_template
  5. save_to_outputs

# Modern GitHub-optimized output template with advanced formatting
output_template: |
  # Research Brief — {{project_title}}
  
  📦 **Project Area:** {{ai_generated.project_scope}}


  👩🏽‍🔬 **Prepared by:** {{prepared_by}}


  🗓️ **Date:** {{current_date}}


  ---

  ## 🎯 Business Context

  {{ai_generated.refined_context}}

  > [!WARNING]
  > **Critical Issues Driving This Research**
  > 
  > {{ai_generated.stakeholder_concerns}}

  <br>

  ---

  <br>

  ## 🎯 Research Objectives

  {{ai_generated.learning_objectives}}

  <details>
  <summary><strong>📋 User Journey in Scope</strong> <kbd>Click to expand</kbd></summary>
  
  > **What this covers:** The complete end-to-end user experience we'll be researching
  
  {{ai_generated.refined_user_flows}}
  
  </details>

  <br>

  ---

  <br>

  ## 🎯 Target Barriers

  {{ai_generated.refined_barriers}}

  <br>

  ---

  <br>

  ## 🤔 Key Questions & Hypotheses

  ### 🔍 Primary Research Questions
  {{ai_generated.key_questions}}

  ### 💭 Team Hypotheses
  {{ai_generated.team_hypotheses}}

  <br>

  ---

  <br>

  ## 🧭 Proposed Research Approach

  | 🔬 **Aspect** | 📝 **Details** |
  |---------------|-----------------|
  | **Method** | {{ai_generated.refined_research_approach}} |
  | **Rationale** | {{ai_generated.research_rationale}} |

  <br>

  ---

  <br>

  ## 🎯 Expected Outcomes

  {{ai_generated.expected_outcomes}}

  <br>

  ---

  <br>

  ## 🚀 Next Steps

  ```diff
  + IMMEDIATE (This Week)
  ```
  - [ ] **Stakeholder review** of this brief and alignment on objectives

  ```diff
  ! SHORT-TERM (Next 2 Weeks)
  ```
  - [ ] **Detailed research plan** development with specific methodology  
  - [ ] **Participant recruitment** strategy and timeline

  ```diff
  - LONGER-TERM (Month 2)
  ```
  - [ ] **Resource allocation** and team coordination

  ---

  > [!NOTE]
  > **Ready to proceed:** Once stakeholders approve this brief → Develop detailed research plan → Begin execution

  <sub>*Generated with ❤️ for better Veteran experiences*</sub>

# Output configuration
output_options:
  # File settings
  filename: "research_brief.md"
  path: "requested_research/{{project_title}}/"
  
  # Delivery methods (multiple can be enabled)
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add research brief for {{project_title}}"
      
    slack:
      enabled: true
      channel: "#research-planning"
      notify_user: "{{prepared_by}}"
      message: "Research brief for {{project_title}} has been generated and saved to GitHub."
      include_preview: false  # Set to true to include brief summary in Slack
      actions:
        - text: "View Brief"
          url: "{{github_file_link}}"
        - text: "Create Research Plan"
          action: "run_research_plan"
    
    email:
      enabled: false
      # Future: email delivery options
      
    teams:
      enabled: false
      # Future: Teams delivery options

output_use: |
  CivicMind Research Brief generator creates VA-compliant research scoping documents that capture and refine stakeholder thinking. Automatically improves informal or unclear stakeholder inputs to create professional, coherent research briefs. Focuses on problem definition and learning goals to inform detailed research plan development.

output_notes: |
  Input refinement: AI automatically improves clarity and professionalism of stakeholder inputs while preserving original intent.
  Content focus: Problem definition, learning objectives, and high-level approach only.
  Quality control: Transforms informal Slack inputs into professional stakeholder-ready documents.
  Next step: Brief should inform separate detailed research plan creation.
  Format: Concise, stakeholder-friendly language focused on alignment and scope setting.
