id: research_brief
name: create_research_brief
label: 📋 Research Brief
version: v4.0
description: |
  Researcher tool to create formal research briefs from stakeholder requests.
  Translates business problems into research scope, objectives, and methodology.
  Used after reviewing a research request to formalize the research approach.

author: Qori R&D
created: 2025-06-26
last_updated: 2026-01-28

# Character encoding fix
encoding: utf-8
output_encoding: utf-8

# LLM Configuration - Upgraded for better quality
llm_config:
  model: "gpt-4o"
  temperature: 0.2
  max_tokens: 4000

input_type: text
input_processing: summarize_if_long
precision_mode: concise

# Input schema for Slack UI - Researcher fills this out
input_variables:
  # Link to original request (optional - can create brief without request)
  - name: research_request_link
    type: string
    required: false
    label: "Link to research request (if applicable)"
    placeholder: "e.g., GitHub link to the research request file"

  # Researcher info
  - name: lead_researcher
    type: string
    required: true
    label: "Lead researcher"
    placeholder: "e.g., Jordan Smith"
    
  - name: research_team
    type: string
    required: false
    label: "Research team members"
    placeholder: "e.g., Alex (note-taker), Casey (observer)"

  # Project info
  - name: project_title
    type: string
    required: true
    label: "Project/study title"
    placeholder: "e.g., VA Mobile App Navigation Usability Study"

  - name: requestor_name
    type: string
    required: true
    label: "Stakeholder who requested this"
    placeholder: "e.g., Sarah Chen, PM"

  # Research scope - Researcher determines these
  - name: business_context
    type: textarea
    required: true
    label: "Business context"
    placeholder: "What's the problem and why does it matter? Include key metrics if available."
    hint: "Pull from the research request, add any additional context from intake conversation."

  - name: research_objectives
    type: textarea
    required: true
    label: "Research objectives"
    placeholder: "What do we want to learn? (3-4 objectives)"
    hint: "Start with: Where veterans..., Which..., Why..., How..."

  - name: research_questions
    type: textarea
    required: true
    label: "Primary research questions"
    placeholder: "Specific questions this research will answer (3-5 questions)"

  - name: user_journeys_in_scope
    type: textarea
    required: true
    label: "User journeys/flows in scope"
    placeholder: "Which user flows or touchpoints will we evaluate?"

  - name: target_barriers
    type: textarea
    required: true
    label: "Target barriers to investigate"
    placeholder: "What barriers or friction points are we looking for?"

  - name: hypotheses
    type: textarea
    required: false
    label: "Team hypotheses"
    placeholder: "What does the team currently believe? (These will be tested)"

  # Methodology - Researcher specifies
  - name: research_method
    type: select
    required: true
    label: "Primary research method"
    options:
      - value: "usability_testing"
        label: "Usability Testing"
      - value: "user_interviews"
        label: "User Interviews"
      - value: "contextual_inquiry"
        label: "Contextual Inquiry"
      - value: "survey"
        label: "Survey"
      - value: "diary_study"
        label: "Diary Study"
      - value: "card_sorting"
        label: "Card Sorting"
      - value: "tree_testing"
        label: "Tree Testing"
      - value: "concept_testing"
        label: "Concept Testing"
      - value: "mixed_methods"
        label: "Mixed Methods"

  - name: method_rationale
    type: textarea
    required: true
    label: "Why this method?"
    placeholder: "Brief rationale for methodology choice"

  # Participants
  - name: participant_criteria
    type: textarea
    required: true
    label: "Participant criteria"
    placeholder: "Who should we recruit? Include must-haves and nice-to-haves."

  - name: sample_size
    type: string
    required: true
    label: "Target sample size"
    placeholder: "e.g., 8-10 participants"

  # Timeline
  - name: timeline_weeks
    type: string
    required: true
    label: "Estimated timeline (weeks)"
    placeholder: "e.g., 4 weeks"

  - name: deadline
    type: date
    required: false
    label: "Hard deadline (if any)"

  # Constraints
  - name: constraints
    type: textarea
    required: false
    label: "Constraints & risks"
    placeholder: "Budget, access limitations, recruitment challenges, etc."

# AI Generation Tasks - Light formatting, researcher provides substance
ai_generation_tasks:
  - task_id: "project_scope"
    prompt: |
      Based on the project title "{{project_title}}" and business context "{{business_context}}", identify the VA domain area.
      
      Choose from:
      - Digital Services
      - Benefits Claims
      - Healthcare Services
      - Education Services
      - Career Services
      - Financial Services
      
      Output only the domain (e.g., "Digital Services").

  - task_id: "formatted_barriers"
    prompt: |
      Format these target barriers as a clean table:
      "{{target_barriers}}"
      
      Output as:
      | Category | Barrier |
      |:---------|:--------|
      | [Category] | [Specific barrier] |
      
      Group similar barriers. Keep original meaning.

  - task_id: "success_criteria"
    prompt: |
      Based on these research objectives and questions:
      Objectives: {{research_objectives}}
      Questions: {{research_questions}}
      
      Define 3-4 success criteria - how will we know the research succeeded?
      
      Format as bullet points starting with "We will have succeeded if..."

  - task_id: "expected_outcomes"
    prompt: |
      Based on the business context and objectives:
      Context: {{business_context}}
      Objectives: {{research_objectives}}
      
      Describe how this research will be used in 3 bullet points.
      Format as "Research will inform:" followed by specific applications.

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. validate_generated_content
  4. populate_template
  5. save_to_outputs

# Output template - Researcher-created brief
output_template: |
  # Research Brief: {{project_title}}

  **Lead Researcher:** {{lead_researcher}} | **Date:** {{current_date}} | **Project Area:** {{ai_generated.project_scope}}

  **Requested by:** {{requestor_name}} | **Timeline:** {{timeline_weeks}} weeks

  ---

  ## Business Context

  {{business_context}}

  ---

  ## Research Objectives

  {{research_objectives}}

  ---

  ## Research Questions

  {{research_questions}}

  ---

  ## User Journeys in Scope

  {{user_journeys_in_scope}}

  ---

  ## Target Barriers

  {{ai_generated.formatted_barriers}}

  ---

  ## Hypotheses

  {{hypotheses}}

  ---

  ## Methodology

  | Aspect | Details |
  |:-------|:--------|
  | **Method** | {{research_method}} |
  | **Rationale** | {{method_rationale}} |
  | **Sample Size** | {{sample_size}} |

  ---

  ## Participant Criteria

  {{participant_criteria}}

  ---

  ## Timeline

  | Phase | Duration |
  |:------|:---------|
  | **Planning & Recruitment** | Week 1-2 |
  | **Fieldwork** | Week 2-3 |
  | **Analysis & Synthesis** | Week 3-4 |
  | **Findings Presentation** | Week 4 |

  **Hard deadline:** {{deadline}}

  ---

  ## Success Criteria

  {{ai_generated.success_criteria}}

  ---

  ## Expected Outcomes

  {{ai_generated.expected_outcomes}}

  ---

  ## Constraints & Risks

  {{constraints}}

  ---

  ## Team

  | Role | Name |
  |:-----|:-----|
  | **Lead Researcher** | {{lead_researcher}} |
  | **Team** | {{research_team}} |
  | **Stakeholder** | {{requestor_name}} |

  ---

  ## Next Steps

  | Action | Owner | By When |
  |:-------|:------|:--------|
  | Stakeholder review of brief | {{requestor_name}} | +3 days |
  | Finalize recruitment criteria | {{lead_researcher}} | +5 days |
  | Begin participant recruitment | Research team | +7 days |
  | Create discussion guide | {{lead_researcher}} | +10 days |

  ---

  > **Status:** 🟡 Pending stakeholder approval

  *Created by {{lead_researcher}} • {{current_date}}*

# Output configuration
output_options:
  filename: "{{project_title}}_research_brief_{{current_date}}.md"
  path: "01-planning/"
  
  delivery:
    github:
      enabled: true
      commit_message: "Add research brief: {{project_title}}"
      
    slack:
      enabled: true
      channel: "#research-planning"
      message: "📋 {{lead_researcher}} created a research brief for *{{project_title}}*"
      include_preview: false
      actions:
        - text: "View Brief"
          url: "{{github_file_link}}"
        - text: "Create Research Plan"
          action: "run_research_plan"

# Study metadata mapping
study_metadata:
  "VA Housing Application Usability Study":
    folder: "va-housing-usability-2025"
    researcher: "jordan.researcher"
    channel: "#research-housing-app"
    focus_area: "housing application usability"
    
  "Benefits Portal Navigation Research":
    folder: "benefits-portal-nav-2025"
    researcher: "alex.ux"
    channel: "#research-benefits"
    focus_area: "benefits portal navigation"
    
  "Veteran Onboarding Experience Study":
    folder: "veteran-onboarding-2025"
    researcher: "casey.research"
    channel: "#research-onboarding"
    focus_area: "veteran onboarding process"

# Auto-generated variables
auto_variables:
  - current_date: new Date().toISOString().split('T')[0]
  - brief_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(project_title, current_date)

# Slack notifications
notify:
  - role: research_team
    action: "Research brief created"
    channel: "#research-planning"
    message: "📋 {{lead_researcher}} created a research brief for *{{project_title}}*. Method: {{research_method}}, Timeline: {{timeline_weeks}} weeks."
    
  - role: stakeholder
    action: "Brief ready for review"
    channel: "DM"
    to: "{{requestor_name}}"
    message: "📋 Your research brief for *{{project_title}}* is ready for review. Please review and approve within 3 business days."

output_use: |
  Researchers use this tool to create formal research briefs after reviewing 
  stakeholder requests. Captures research scope, methodology, participant 
  criteria, and timeline. Outputs to 00-planning/ for the study repository.

notes: |
  v4.0 Changes (Complete redesign):
  - Now researcher-facing (was stakeholder-facing)
  - Researcher provides methodology, participant criteria, timeline
  - Links to research_request.yaml for stakeholder input
  - Simplified AI tasks (formatting only, not content generation)
  - Added success criteria generation
  - Added team and timeline sections
  - Notifies both research team and stakeholder
  
  v3.1: Stakeholder-facing version (deprecated)
  v3.0: Original with excessive formatting
