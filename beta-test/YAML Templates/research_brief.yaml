# FINAL OPTIMIZED RESEARCH BRIEF - Fixes Content Coherence & Quality Issues

id: research_brief
name: run_research_brief
label: 📄 Research Brief
version: v3.0
description: |
  📄 **Generate VA-Aligned Research Briefs**
  
  Transform stakeholder conversations and rough research ideas into professional, coherent research briefs. Fixes content quality issues and ensures all sections relate to the same project. Perfect for scoping studies with design and product partners.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-16

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.3
  max_tokens: 3500

input_type: structured
input_processing: direct
precision_mode: detailed

# Enhanced Error Handling
error_handling:
  validation_errors:
    - field: "project_title"
      rules:
        - type: "min_length"
          value: 5
          message: "Project title must be at least 5 characters"
        - type: "coherence_check"
          message: "Project title should clearly describe the research focus"
    
    - field: "study_context"
      rules:
        - type: "min_length"
          value: 20
          message: "Study context must explain the business situation (minimum 20 characters)"
        - type: "context_relevance"
          message: "Context should directly relate to the project title and barriers"
    
    - field: "target_barriers"
      rules:
        - type: "barrier_specificity"
          message: "Barriers should be specific to the project area, not generic research problems"

# Current UI-Compatible Input Schema
input_variables:
  - project_title:
      type: "text"
      required: true
      placeholder: "e.g., Claims Status Navigation Study"
      
  - study_context:
      type: "textarea"
      required: true
      placeholder: "e.g., Veterans are calling the help desk frequently about claim status, suggesting navigation issues with the current online experience"
      
  - target_barriers:
      type: "textarea"
      required: true
      placeholder: "e.g., Confusing status language, unclear next steps, hard-to-find claim details"
      
  - user_flows:
      type: "textarea"
      required: true
      placeholder: "e.g., Login to claim status page, interpreting status updates, finding additional details"
      
  - stakeholders:
      type: "textarea"
      required: true
      placeholder: "e.g., VBA Claims Team, Call Center Manager, UX Design Lead"
      
  - research_approach:
      type: "text"
      required: true
      placeholder: "e.g., User interviews and usability testing"
      
  - prepared_by:
      type: "text"
      required: true
      placeholder: "e.g., Jordan Smith, UX Researcher"

# ENHANCED AI GENERATION TASKS - Fixes Content Coherence Issues
ai_generation_tasks:
  # NEW - Project coherence validation (prevents mismatched content)
  - task_id: "project_coherence_check"
    prompt: |
      Validate project coherence and create consistent project scope:
      
      Project title: "{{project_title}}"
      Study context: "{{study_context}}"
      Target barriers: "{{target_barriers}}"
      User flows: "{{user_flows}}"
      
      CRITICAL: Ensure all inputs relate to the SAME project. If there are inconsistencies, flag them.
      
      Create:
      **Project Focus:** [Single, clear statement of what this research is about]
      **VA Domain:** [Which VA service area this focuses on - be specific]
      **Research Type:** [Discovery, Validation, Optimization, or Strategic research]
      **Coherence Check:** [Confirm all inputs relate to the same project or note inconsistencies]
      
      If inputs are mismatched or generic, note this for correction.

  # IMPROVED - Professional context refinement (fixes vague content)
  - task_id: "refined_context"
    prompt: |
      Transform study context into professional, coherent business background:
      
      Original context: "{{study_context}}"
      Project focus: "{{project_title}}"
      
      REQUIREMENTS - Create exactly 2-3 sentences that:
      1. **Current Situation:** What's happening now with {{project_title}}
      2. **Business Impact:** Why this matters to VA and Veterans  
      3. **Research Opportunity:** What research can solve
      
      CRITICAL COHERENCE RULES:
      - ALL content must relate directly to {{project_title}}
      - NO generic business language or unrelated examples
      - Focus specifically on the situation described in study context
      - Use professional language while preserving original meaning
      - Maximum 75 words total

  # IMPROVED - Coherent stakeholder concerns (fixes mismatched content)
  - task_id: "stakeholder_concerns"
    prompt: |
      Generate stakeholder concerns that directly relate to {{project_title}}:
      
      Based on:
      - Project: "{{project_title}}"
      - Context: "{{study_context}}"
      - Barriers: "{{target_barriers}}"
      - Stakeholders: "{{stakeholders}}"
      
      Create 3-4 specific concerns that:
      - Directly relate to {{project_title}} (not generic business problems)
      - Connect to the barriers and context provided
      - Matter to the stakeholders mentioned
      - Focus on business impact and user experience
      
      Format as:
      - **[Concern Type]:** [Specific concern about {{project_title}}]
      
      AVOID generic concerns like "communication issues" or "system integration" unless directly related to {{project_title}}.

  # IMPROVED - Coherent learning objectives (fixes mismatched goals)
  - task_id: "learning_objectives"
    prompt: |
      Create learning objectives that consistently focus on {{project_title}}:
      
      Based on:
      - Project focus: "{{project_title}}"
      - Barriers: "{{target_barriers}}"
      - User flows: "{{user_flows}}"
      - Research approach: "{{research_approach}}"
      
      Generate 3-4 learning objectives that:
      - ALL reference {{project_title}} or related terminology
      - Address the specific barriers mentioned
      - Connect to the user flows provided
      - Are achievable through {{research_approach}}
      
      Format as:
      - **Understand** [specific aspect of {{project_title}}] to inform [specific decision]
      - **Identify** [specific barriers in {{project_title}}] that impact [user outcome]
      - **Determine** [specific factors in {{project_title}}] that influence [user behavior]
      
      CRITICAL: Every objective must clearly relate to {{project_title}}.

  # IMPROVED - Coherent user flows (fixes generic journey descriptions)
  - task_id: "refined_user_flows"
    prompt: |
      Transform user flows to be specific to {{project_title}}:
      
      Original flows: "{{user_flows}}"
      Project context: "{{project_title}}"
      
      Create numbered steps that:
      - Specifically relate to {{project_title}} processes
      - Use action-oriented, specific language
      - Connect to the barriers identified
      - Are relevant to {{research_approach}}
      - Avoid generic research participation steps
      
      Format as:
      1. [Specific action related to {{project_title}}]
      2. [Specific interaction with {{project_title}} system/process]
      3. [etc.]
      
      AVOID generic research study steps like "sign up for study" - focus on actual user interactions with {{project_title}}.

  # IMPROVED - Coherent barrier identification (fixes generic research problems)
  - task_id: "refined_barriers"
    prompt: |
      Refine barriers to be specific to {{project_title}}:
      
      Original barriers: "{{target_barriers}}"
      Project context: "{{project_title}}"
      User flows: "{{user_flows}}"
      
      Transform into specific, actionable barriers that:
      - Directly relate to {{project_title}} user experience
      - Connect to the user flows described
      - Are research-addressable through {{research_approach}}
      - Avoid generic research study problems (survey fatigue, recruitment issues)
      
      Format as clear bullet points:
      - [Specific barrier veterans face with {{project_title}}]
      - [Specific usability issue in {{project_title}} interface]
      - [Specific process barrier in {{project_title}} workflow]
      
      Focus on user experience barriers, NOT research methodology problems.

  # IMPROVED - Coherent research questions (fixes topic confusion)
  - task_id: "key_questions"
    prompt: |
      Generate research questions that consistently focus on {{project_title}}:
      
      EVERY question must:
      - Include "{{project_title}}" or directly related terminology
      - Address the specific barriers identified
      - Connect to the user flows described
      - Be answerable through {{research_approach}}
      
      Create 3-4 questions:
      1. How do veterans currently [specific behavior] when using {{project_title}}?
      2. What barriers prevent veterans from [specific goal] in {{project_title}}?
      3. Why do veterans [specific behavior] when encountering [specific situation] in {{project_title}}?
      4. What causes [specific problem] when veterans interact with {{project_title}}?
      
      CRITICAL: Every question must clearly reference {{project_title}} context.

  # IMPROVED - Realistic hypotheses (fixes disconnected examples)
  - task_id: "team_hypotheses"
    prompt: |
      Create testable hypotheses specific to {{project_title}}:
      
      Based on:
      - Project: "{{project_title}}"
      - Context: "{{study_context}}"
      - Barriers: "{{target_barriers}}"
      
      Generate 2-3 hypotheses that:
      - Reference {{project_title}} specifically
      - Connect to the barriers and context provided
      - Are testable through {{research_approach}}
      - Reflect realistic team assumptions about {{project_title}}
      
      Format as:
      - "Veterans using {{project_title}} experience [specific challenge] when [specific condition]"
      - "The current [{{project_title}} feature/process] causes [predicted impact] for [user group]"
      
      AVOID generic healthcare or unrelated examples. Focus on {{project_title}} only.

  # IMPROVED - Coherent research approach (fixes methodology mismatch)
  - task_id: "refined_research_approach"
    prompt: |
      Improve research approach description for {{project_title}}:
      
      Approach: "{{research_approach}}"
      Project context: "{{project_title}}"
      Learning objectives: Based on barriers and user flows
      
      Create:
      **Methodology:** [Improved, specific description of {{research_approach}} for {{project_title}}]
      **Rationale:** [Why {{research_approach}} is optimal for {{project_title}} research - 1-2 sentences]
      
      Ensure approach description:
      - Uses proper research methodology terminology
      - Explains how it will address {{project_title}} barriers
      - Connects to {{project_title}} user experience evaluation
      - Avoids generic methodology descriptions

  # NEW - Business urgency and decision timeline
  - task_id: "decision_framework"
    prompt: |
      Create clear decision framework for {{project_title}} research:
      
      Based on:
      - Project: "{{project_title}}"
      - Business context: "{{study_context}}"
      - Stakeholders: "{{stakeholders}}"
      
      Generate:
      **Decision This Research Will Inform:** [Specific decision about {{project_title}}]
      **Decision Timeline:** [When stakeholders need to act on findings]
      **Business Urgency:** [Why this research is needed now]
      **Success Criteria:** [How stakeholders will know research succeeded]
      
      Focus on practical business decision-making about {{project_title}}.

  # IMPROVED - Realistic expected outcomes (fixes generic benefits)
  - task_id: "expected_outcomes"
    prompt: |
      Define specific outcomes for {{project_title}} research:
      
      Project: "{{project_title}}"
      Stakeholders: "{{stakeholders}}"
      Business context: "{{study_context}}"
      
      Format as "Research will inform:" followed by specific applications:
      - [Specific improvements] to {{project_title}} [feature/process]
      - [Specific decisions] about {{project_title}} [priority/resource allocation]
      - [Specific changes] to {{project_title}} [user experience/workflow]
      
      Make outcomes:
      - Directly actionable for {{project_title}}
      - Relevant to the stakeholders mentioned
      - Connected to the business context provided

  # NEW - Stakeholder alignment and next steps
  - task_id: "next_steps_roadmap"
    prompt: |
      Create actionable next steps roadmap for {{project_title}} research:
      
      Stakeholders: "{{stakeholders}}"
      Research approach: "{{research_approach}}"
      
      Format:
      **Immediate Actions (This Week):**
      - [Stakeholder review and approval process]
      - [Resource allocation decisions]
      
      **Research Planning (Next 2 Weeks):**
      - [Detailed research plan development for {{project_title}}]
      - [Participant recruitment strategy]
      
      **Execution Timeline:**
      - [Research implementation for {{project_title}}]
      - [Findings delivery and stakeholder review]
      
      **Decision Phase:**
      - [{{project_title}} improvement implementation]
      - [Success measurement and follow-up]
      
      Include realistic timelines and clear ownership for each step.

# Enhanced Processing Workflow
processing_workflow:
  1. validate_inputs
  2. check_project_coherence
  3. validate_content_consistency
  4. execute_ai_generation_tasks
  5. validate_generated_coherence
  6. format_professional_output
  7. save_to_github
  8. send_slack_notification
  9. track_analytics

# IMPROVED OUTPUT TEMPLATE - Coherent and Professional
output_template: |
  # 📄 Research Brief – {{project_title}}

  > **👩🏽‍🔬 Prepared by:** {{prepared_by}} &nbsp;&nbsp;|&nbsp;&nbsp; **🗓️ Date:** {{current_date}} &nbsp;&nbsp;|&nbsp;&nbsp; **📁 File:** `{{filename}}`

  {{ai_generated.project_coherence_check}}

  ---

  ## 🎯 Business Context

  {{ai_generated.refined_context}}

  **Key Stakeholder Concerns:**
  {{ai_generated.stakeholder_concerns}}

  ---

  ## 🎯 Research Objectives

  {{ai_generated.learning_objectives}}

  **User Journey in Scope:**
  {{ai_generated.refined_user_flows}}

  ---

  ## 🎯 Target Barriers & Pain Points

  {{ai_generated.refined_barriers}}

  ---

  ## 🤔 Key Questions & Hypotheses

  **Primary Research Questions:**
  {{ai_generated.key_questions}}

  **Team Hypotheses:**
  {{ai_generated.team_hypotheses}}

  ---

  ## 🧭 Proposed Research Approach

  {{ai_generated.refined_research_approach}}

  ---

  ## 👥 Stakeholder Input & Alignment

  **Consulted Stakeholders:**
  {{stakeholders}}

  **Key Insights from Stakeholder Conversations:**
  - Research need validated through stakeholder input and business context analysis
  - {{project_title}} improvement priorities clearly established through stakeholder feedback
  - Research approach confirmed appropriate for {{project_title}} decision-making needs
  - Stakeholder alignment achieved on research scope and expected outcomes

  ---

  ## 🎯 Expected Outcomes & Decision Framework

  {{ai_generated.decision_framework}}

  **Research Application:**
  {{ai_generated.expected_outcomes}}

  ---

  ## 🚀 Next Steps & Decision Timeline

  {{ai_generated.next_steps_roadmap}}

  ---

  ## 📋 Executive Summary

  **The Research Need:** {{project_title}} research addresses critical user experience barriers affecting veteran satisfaction and operational efficiency.

  **The Approach:** {{research_approach}} to provide actionable insights for immediate {{project_title}} decision-making.

  **The Timeline:** Standard 3-4 week research cycle with findings delivery for stakeholder review and {{project_title}} improvement planning.

  **The Value:** Clear prioritization of {{project_title}} improvements, data-driven recommendations, and reduced risk in product decisions.

  ---

  > 💡 **Status:** Ready for stakeholder review and approval → {{project_title}} research plan development

  *Research brief generated by Qori AI Research Platform v{{version}}*  
  *Saved to: `{{path}}{{filename}}`*

# Enhanced Output Options
output_options:
  filename: "research_brief_{{project_title|slugify}}_{{current_date}}.md"
  path: "00-brief/"
  
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add research brief: {{project_title}}"
      
    slack:
      enabled: true
      channel: "#research-planning"
      message: |
        📄 **Research Brief Generated**
        
        **Project:** {{project_title}}
        **Prepared by:** {{prepared_by}}
        **Stakeholders:** {{stakeholders}}
        
        Professional, coherent research brief ready for stakeholder review.
      
      actions:
        - text: "📄 View Brief"
          style: "primary"
          url: "{{github_file_url}}"
        - text: "🧭 Create Research Plan"
          style: "default"
          action: "trigger_research_plan"
          pre_fill:
            project_title: "{{project_title}}"
            prepared_by: "{{prepared_by}}"
        - text: "👥 Share with Stakeholders"
          style: "default"
          action: "share_brief"

# Current UI-Compatible Slack Interface
slack_ui:
  modal:
    title: "📄 Create Research Brief"
    submit_label: "Generate Brief"
    close_label: "Cancel"
    blocks:
      - type: "section"
        text: "I'll help you create a focused research brief for scoping with design and product partners."
      
      - type: "input"
        label: "Project Title/Focus"
        element: "plain_text_input"
        placeholder: "e.g., Claims Status Navigation Study"
        
      - type: "input"
        label: "Study context and motivation"
        element: "plain_text_input"
        multiline: true
        placeholder: "e.g., Veterans are calling the help desk frequently about claim status, suggesting navigation issues with the current online experience"
        
      - type: "input"
        label: "Target barriers to identify"
        element: "plain_text_input"
        multiline: true
        placeholder: "e.g., Confusing status language, unclear next steps, hard-to-find claim details"
        
      - type: "input"
        label: "User flows/touchpoints to evaluate"
        element: "plain_text_input"
        multiline: true
        placeholder: "e.g., Login to claim status page, interpreting status updates, finding additional details"
        
      - type: "input"
        label: "Stakeholders consulted"
        element: "plain_text_input"
        multiline: true
        placeholder: "e.g., VBA Claims Team, Call Center Manager, UX Design Lead"
        
      - type: "input"
        label: "Research approach"
        element: "plain_text_input"
        placeholder: "e.g., User interviews and usability testing"
        
      - type: "input"
        label: "Prepared by"
        element: "plain_text_input"
        placeholder: "e.g., Jordan Smith, UX Researcher"

# Analytics
analytics:
  track_events:
    - event: "research_brief_generated"
      properties: [project_title, research_approach, prepared_by]
    - event: "content_coherence_improved"
      properties: [project_title, coherence_score]
      
  generate_reports:
    - type: "content_quality_tracking"
      recipients: ["research-ops@va.gov"]
      metrics: [coherence_scores, stakeholder_satisfaction, brief_to_plan_conversion]
