id: research_brief
name: run_research_brief
label: 📄 Research Brief
version: v4.0
description: |
  📄 **Executive Research Brief Generator**
  
  Create concise, business-focused research briefs designed for fast stakeholder approval. Transforms research ideas into clear business cases with executive-friendly structure and decision-oriented content.
  
  Optimized for 1-2 minute read time and 80%+ stakeholder approval rates.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-16

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.3
  max_tokens: 2500  # Reduced for concise output

input_type: structured
input_processing: direct
precision_mode: concise  # Changed from detailed

# Streamlined Error Handling
error_handling:
  validation_errors:
    - field: "project_title"
      rules:
        - type: "min_length"
          value: 5
          message: "Project title must clearly describe the research focus"
    - field: "business_problem"
      rules:
        - type: "min_length"
          value: 20
          message: "Business problem must explain what's broken and why it matters"

# SIMPLIFIED INPUT SCHEMA - Executive Brief Focus (CORRECTED TO MATCH ORIGINAL)
input_variables:
  - project_title:
      type: "text"
      required: true
      placeholder: "e.g., Claims Status Navigation Study"
      
  - business_problem:
      type: "textarea"
      required: true
      placeholder: "What's broken? e.g., Veterans are calling help desk frequently about claim status, creating operational burden and user frustration"
      
  - target_barriers:
      type: "textarea"
      required: true
      placeholder: "What specific barriers? e.g., Confusing status language, unclear next steps, hidden claim details"
      
  - research_approach:
      type: "select"
      required: true
      options: ["User interviews", "Usability testing", "User interviews + usability testing", "Survey research", "Card sorting", "Field studies", "Mixed methods"]
      
  - timeline_needed:
      type: "select"
      required: true
      options: ["ASAP (2-3 weeks)", "Standard (4-6 weeks)", "Flexible (6+ weeks)"]
      
  - stakeholders:
      type: "textarea"
      required: true
      placeholder: "Who needs these findings? e.g., VBA Claims Team, Call Center Manager, Product Owner"
      
  - prepared_by:
      type: "text"
      required: true
      placeholder: "e.g., Jordan Smith, UX Researcher"

# EXECUTIVE-FOCUSED AI GENERATION TASKS (CORRECTED TO MATCH ORIGINAL)
ai_generation_tasks:
  # Business impact assessment (most important for executives)
  - task_id: "business_impact"
    prompt: |
      Create compelling business impact statement for {{project_title}}:
      
      Business problem: "{{business_problem}}"
      Target barriers: "{{target_barriers}}"
      Stakeholders: "{{stakeholders}}"
      
      Generate 2-3 sentences that answer:
      - How does this problem affect VA operations?
      - What's the impact on Veterans?
      - What's the cost of NOT fixing this?
      
      Use specific, measurable language. Focus on business value, not research value.
      
      Format: [Current operational impact] + [Veteran experience impact] + [Risk of inaction]

  # Key learning objectives (3-4 max, business-focused)
  - task_id: "key_questions"
    prompt: |
      Create 3-4 key business questions this research will answer:
      
      Project: "{{project_title}}"
      Problem: "{{business_problem}}"
      Barriers: "{{target_barriers}}"
      
      Questions should:
      - Be answerable by stakeholders in business terms
      - Focus on "what should we do?" not "what do users think?"
      - Support specific {{project_title}} decisions
      - Be achievable through {{research_approach}}
      
      Format as:
      - Should we [specific action] to improve {{project_title}}?
      - Which [specific options] would have the biggest impact on [specific outcome]?
      - How should we prioritize [specific improvements] for {{project_title}}?
      
      Keep focused on actionable business decisions.

  # Approach justification (concise, business value)
  - task_id: "approach_rationale"
    prompt: |
      Justify research approach in business terms:
      
      Approach: "{{research_approach}}"
      Timeline: "{{timeline_needed}}"
      Business problem: "{{business_problem}}"
      
      Create 2-3 sentences that explain:
      - Why {{research_approach}} is the right method for this business problem
      - What type of insights it will provide for decision-making
      - How {{timeline_needed}} timeline supports business needs
      
      Use business language, not research methodology jargon.
      Focus on ROI and decision-making value.

  # Success criteria (business outcomes, not research metrics)
  - task_id: "success_criteria"
    prompt: |
      Define business success criteria for {{project_title}} research:
      
      Timeline: "{{timeline_needed}}"
      Stakeholders: "{{stakeholders}}"
      
      Create 3 criteria focused on business value:
      1. **Decision Support:** [How findings will enable specific {{project_title}} decisions]
      2. **Implementation Impact:** [How research will improve {{project_title}} for Veterans]
      3. **Stakeholder Value:** [How research will help stakeholders achieve their goals]
      
      Avoid research metrics. Focus on business outcomes and stakeholder value.

  # Resource requirements (what stakeholders need to approve)
  - task_id: "resource_requirements"
    prompt: |
      Estimate resource requirements for {{project_title}} research:
      
      Approach: "{{research_approach}}"
      Timeline: "{{timeline_needed}}"
      
      Provide realistic estimates:
      **Time Commitment:**
      - Lead researcher: [hours/week over timeline]
      - Stakeholder time: [hours for review/input]
      
      **Budget Considerations:**
      - Participant incentives: [estimated cost]
      - Tools/platform costs: [if any]
      
      **Timeline:**
      - Research execution: [timeline breakdown]
      - Findings delivery: [when stakeholders get results]
      
      Keep practical and business-focused.

  # Next steps (clear decision pathway)
  - task_id: "next_steps"
    prompt: |
      Create clear next steps for stakeholder decision-making:
      
      Timeline: "{{timeline_needed}}"
      Stakeholders: "{{stakeholders}}"
      
      Format as immediate action plan:
      **This Week:**
      - [Stakeholder decision needed]
      - [Resource allocation/approval]
      
      **Next 2 Weeks:**
      - [Research plan development]
      - [Team coordination]
      
      **Research Execution:**
      - [Timeline for {{research_approach}}]
      - [Findings delivery schedule]
      
      Include specific decision points and timelines.

# STREAMLINED PROCESSING (CORRECTED TO MATCH ORIGINAL)
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. format_executive_brief
  4. save_to_github
  5. send_slack_notification

# EXECUTIVE BRIEF OUTPUT TEMPLATE - Concise & Scannable
output_template: |
  # 📄 Research Brief – {{project_title}}

  **Prepared by:** {{prepared_by}} &nbsp;&nbsp;|&nbsp;&nbsp; **Date:** {{current_date}} &nbsp;&nbsp;|&nbsp;&nbsp; **Timeline:** {{timeline_needed}}

  ---

  ## 🎯 The Problem

  {{business_problem}}

  ---

  ## 💼 Business Impact

  {{ai_generated.business_impact}}

  ---

  ## 🔍 What We Need to Learn

  {{ai_generated.key_questions}}

  ---

  ## 🛠️ Approach & Timeline

  **Method:** {{research_approach}}

  **Rationale:** {{ai_generated.approach_rationale}}

  **Resources:** {{ai_generated.resource_requirements}}

  ---

  ## ✅ Success Criteria

  {{ai_generated.success_criteria}}

  ---

  ## 🚀 Next Steps

  {{ai_generated.next_steps}}

  ---

  ## 📋 The Ask

  **Decision Needed:** Approve {{project_title}} research to inform improvement strategy

  **Stakeholders:** {{stakeholders}}

  **Timeline:** {{timeline_needed}} research cycle with findings for decision-making

  **Value:** Clear prioritization of {{project_title}} improvements with data-driven recommendations

  ---

  *Executive research brief • Generated by Qori Research Platform v{{version}}*

# Streamlined Output Options
output_options:
  filename: "research_brief_{{project_title|slugify}}_{{current_date}}.md"
  path: "00-brief/"
  
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add executive research brief: {{project_title}}"
      
    slack:
      enabled: true
      channel: "#research-planning"
      message: |
        📄 **Executive Research Brief Ready**
        
        **Project:** {{project_title}}
        **Timeline:** {{timeline_needed}}
        **Decision needed:** Approve research to inform {{project_title}} improvements
        
        Brief optimized for fast stakeholder review and approval.
      
      actions:
        - text: "📄 Review Brief"
          style: "primary"
          url: "{{github_file_url}}"
        - text: "✅ Approve & Create Plan"
          style: "default"
          action: "trigger_research_plan"
          pre_fill:
            project_title: "{{project_title}}"
            prepared_by: "{{prepared_by}}"

# SIMPLIFIED SLACK UI - Executive Brief Focus
slack_ui:
  modal:
    title: "📄 Executive Research Brief"
    submit_label: "Generate Brief"
    close_label: "Cancel"
    blocks:
      - type: "section"
        text: "Create a concise, executive-focused research brief designed for fast stakeholder approval."
      
      - type: "input"
        label: "Project Title"
        element: "plain_text_input"
        placeholder: "e.g., Claims Status Navigation Study"
        
      - type: "input"
        label: "Business Problem"
        element: "plain_text_input"
        multiline: true
        placeholder: "What's broken? e.g., Veterans calling help desk frequently about claim status, creating operational burden"
        
      - type: "input"
        label: "Target Barriers"
        element: "plain_text_input"
        multiline: true
        placeholder: "Specific barriers: e.g., Confusing status language, unclear next steps, hidden details"
        
      - type: "input"
        label: "Research Approach"
        element: "static_select"
        options:
          - text: "User interviews"
            value: "user_interviews"
          - text: "Usability testing"
            value: "usability_testing"
          - text: "User interviews + usability testing"
            value: "interviews_usability"
          - text: "Survey research"
            value: "survey_research"
          - text: "Mixed methods"
            value: "mixed_methods"
            
      - type: "input"
        label: "Timeline Needed"
        element: "radio_buttons"
        options:
          - text: "ASAP (2-3 weeks)"
            value: "asap"
          - text: "Standard (4-6 weeks)"
            value: "standard"
          - text: "Flexible (6+ weeks)"
            value: "flexible"
            
      - type: "input"
        label: "Key Stakeholders"
        element: "plain_text_input"
        multiline: true
        placeholder: "Who needs findings? e.g., VBA Claims Team, Call Center Manager, Product Owner"
        
      - type: "input"
        label: "Prepared By"
        element: "plain_text_input"
        placeholder: "e.g., Jordan Smith, UX Researcher"

# Analytics (CORRECTED TO MATCH ORIGINAL)
analytics:
  track_events:
    - event: "executive_brief_generated"
      properties: [project_title, research_approach, timeline_needed]
    - event: "stakeholder_approval_tracked"
      properties: [project_title, approval_time, stakeholder_count]
