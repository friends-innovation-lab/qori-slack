id: research_brief
name: run_research_brief
label: 📄 Research Brief
version: v2.1
description: |
  Generate VA-aligned research briefs for scoping studies with design and product partners. Creates structured research briefs with objectives, hypotheses, and methodology following VA research standards and government service considerations.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-07

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.4
  max_tokens: 3000

input_type: text
input_processing: summarize_if_long
precision_mode: concise

# Input schema for Slack UI
input_variables:
  - project_title        # Project Title/Focus from UI (REQUIRED)
  - study_context        # Study context and motivation from UI (REQUIRED)
  - target_barriers      # Target barriers to identify from UI (REQUIRED)
  - user_flows           # User flows/touchpoints to evaluate from UI (REQUIRED)
  - stakeholders         # Stakeholders consulted from UI (REQUIRED)
  - research_approach    # Research approach from UI (REQUIRED)
  - prepared_by          # Prepared by from UI (REQUIRED)

# AI Generation Tasks - These will be processed sequentially
ai_generation_tasks:
  - task_id: "project_scope"
    prompt: |
      Based on the project title "{{project_title}}" and study context "{{study_context}}", identify the broader project scope or domain area (e.g., Digital Services, Benefits Claims, Healthcare, Education, etc.). Provide a concise 1-2 word descriptor.

  - task_id: "design_improvements"
    prompt: |
      Based on the target barriers "{{target_barriers}}" and user flows "{{user_flows}}", generate 2-3 specific design and content improvements this research will inform. Focus on actionable outcomes that address the identified barriers in the user experience.

  - task_id: "trauma_informed_considerations"
    prompt: |
      Create 2-3 VA-relevant trauma-informed design considerations based on:
      - Study context: {{study_context}}
      - Target barriers: {{target_barriers}}
      
      Focus on veteran mental health, accessibility needs, and creating safe, supportive digital experiences.

  - task_id: "research_hypotheses"
    prompt: |
      Generate 2-3 testable research hypotheses based on:
      - Target barriers: {{target_barriers}}
      - Research approach: {{research_approach}}
      - User flows: {{user_flows}}
      
      Format as clear, testable statements that this research can validate or refute.

  - task_id: "framing_questions"
    prompt: |
      Create 3-4 specific research questions that will guide the investigation based on:
      - Research approach: {{research_approach}}
      - Target barriers: {{target_barriers}}
      - User flows: {{user_flows}}
      
      Questions should be specific, actionable, and aligned with the research approach.

  - task_id: "methodology_details"
    prompt: |
      Expand on the research approach "{{research_approach}}" with specific implementation details including:
      - Specific methods and techniques
      - Session structure or data collection approach
      - VA compliance considerations
      - Timeline and resource requirements
      
      Keep focused on practical implementation details.

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. populate_template
  4. save_to_outputs

# Output template with AI generation placeholders
output_template: |
  # 📄 Research Brief – {{project_title}}

  **📦 Project Area:** {{ai_generated.project_scope}}  
  **👩🏽‍🔬 Prepared by:** {{prepared_by}}  
  **🗓️ Date:** {{current_date}}

  ---

  ## Overview

  {{study_context}}

  ## Objectives

  1. **Identify Barriers:**  
     {{target_barriers}}

  2. **Evaluate Navigation Experience:**  
     {{user_flows}}

  3. **Surface Insights for Design & Content Improvements:**  
     {{ai_generated.design_improvements}}

  4. **Support Trauma-Informed Service Design:**  
     {{ai_generated.trauma_informed_considerations}}

  ---

  ## Initial Scoping Materials

  - **Stakeholders Consulted:**  
    {{stakeholders}}

  - **Initial Hypotheses:**  
    {{ai_generated.research_hypotheses}}

  - **Framing Questions:**  
    {{ai_generated.framing_questions}}

  - **Research Approach Summary:**  
    {{research_approach}}
    
    {{ai_generated.methodology_details}}

# Output configuration
output_options:
  # File settings
  filename: "research_brief_{{project_title}}_{{current_date}}.md"
  path: "00-brief/"
  
  # Delivery methods (multiple can be enabled)
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add research brief for {{project_title}}"
      
    slack:
      enabled: true
      channel: "#research-planning"
      notify_user: "{{prepared_by}}"
      message: "📄 Research brief for {{project_title}} has been generated and saved to GitHub."
      include_preview: false  # Set to true to include brief summary in Slack
      actions:
        - text: "📄 View Brief"
          url: "{{github_file_link}}"
        - text: "🧭 Create Research Plan"
          action: "run_research_plan"
    
    email:
      enabled: false
      # Future: email delivery options
      
    teams:
      enabled: false
      # Future: Teams delivery options

output_use: |
  CivicMind Research Brief generator creates VA-compliant research scoping documents for stakeholder alignment. Ensures consistent structure and coverage of key research elements while supporting trauma-informed design principles.

output_notes: |
  Project details collected via structured form input from research brief UI.
  Brief follows VA research standards including trauma-informed design considerations.
  Write in plain, accessible language at 10th-grade reading level.
  Keep focused and actionable for design and product partners.
