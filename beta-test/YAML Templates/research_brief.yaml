id: research_brief
name: run_research_brief
label: 📄 Research Brief
version: v4.0
description: "Executive Research Brief Generator - Create concise, business-focused research briefs designed for fast stakeholder approval. Transforms research ideas into clear business cases with executive-friendly structure and decision-oriented content. Optimized for 1-2 minute read time and 80%+ stakeholder approval rates."

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-16

llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.3
  max_tokens: 2500

input_type: structured
input_processing: direct
precision_mode: concise

error_handling:
  validation_errors:
    - field: "project_title"
      rules:
        - type: "min_length"
          value: 5
          message: "Project title must clearly describe the research focus"
    - field: "business_problem"
      rules:
        - type: "min_length"
          value: 20
          message: "Business problem must explain what's broken and why it matters"

input_variables:
  - project_title:
      type: "text"
      required: true
      placeholder: "e.g., Claims Status Navigation Study"
  - business_problem:
      type: "textarea"
      required: true
      placeholder: "What's broken? e.g., Veterans are calling help desk frequently about claim status, creating operational burden and user frustration"
  - target_barriers:
      type: "textarea"
      required: true
      placeholder: "What specific barriers? e.g., Confusing status language, unclear next steps, hidden claim details"
  - research_approach:
      type: "select"
      required: true
      options: ["User interviews", "Usability testing", "User interviews + usability testing", "Survey research", "Card sorting", "Field studies", "Mixed methods"]
  - timeline_needed:
      type: "select"
      required: true
      options: ["ASAP (2-3 weeks)", "Standard (4-6 weeks)", "Flexible (6+ weeks)"]
  - stakeholders:
      type: "textarea"
      required: true
      placeholder: "Who needs these findings? e.g., VBA Claims Team, Call Center Manager, Product Owner"
  - prepared_by:
      type: "text"
      required: true
      placeholder: "e.g., Jordan Smith, UX Researcher"

ai_generation_tasks:
  - task_id: "business_impact"
    prompt: "Create compelling business impact statement for this project. Generate 2-3 sentences that answer: How does this problem affect VA operations? What's the impact on Veterans? What's the cost of NOT fixing this? Use specific, measurable language. Focus on business value, not research value. Format: Current operational impact + Veteran experience impact + Risk of inaction"
  - task_id: "key_questions"
    prompt: "Create 3-4 key business questions this research will answer. Questions should be answerable by stakeholders in business terms, focus on what should we do not what do users think, and support specific decisions. Format as actionable business questions that help prioritize improvements."
  - task_id: "approach_rationale"
    prompt: "Justify research approach in business terms. Create 2-3 sentences explaining: Why this approach is right for this problem, What type of insights it will provide for decision-making, How it supports business needs. Use business language, focus on ROI and decision-making value."
  - task_id: "success_criteria"
    prompt: "Define business success criteria for this research. Create 3 criteria focused on business value: 1. Decision Support: How findings will enable specific decisions 2. Implementation Impact: How research will improve experience for Veterans 3. Stakeholder Value: How research will help stakeholders achieve goals. Focus on business outcomes and stakeholder value."
  - task_id: "resource_requirements"
    prompt: "Estimate resource requirements for this research. Provide realistic estimates: Time Commitment - Lead researcher hours per week, Stakeholder time for review. Budget Considerations - Participant incentives, Tools costs. Timeline - Research execution breakdown, Findings delivery timeline. Keep practical and business-focused."
  - task_id: "next_steps"
    prompt: "Create clear next steps for stakeholder decision-making. Format as immediate action plan: This Week - Stakeholder decision needed, Resource allocation. Next 2 Weeks - Research plan development, Team coordination. Research Execution - Timeline and findings delivery schedule. Include specific decision points."

processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. format_executive_brief
  4. save_to_github
  5. send_slack_notification

output_template: "# Research Brief – PROJECT_TITLE\n\n**Prepared by:** PREPARED_BY **Date:** CURRENT_DATE **Timeline:** TIMELINE_NEEDED\n\n---\n\n## The Problem\n\nBUSINESS_PROBLEM\n\n---\n\n## Business Impact\n\nAI_BUSINESS_IMPACT\n\n---\n\n## What We Need to Learn\n\nAI_KEY_QUESTIONS\n\n---\n\n## Approach & Timeline\n\n**Method:** RESEARCH_APPROACH\n\n**Rationale:** AI_APPROACH_RATIONALE\n\n**Resources:** AI_RESOURCE_REQUIREMENTS\n\n---\n\n## Success Criteria\n\nAI_SUCCESS_CRITERIA\n\n---\n\n## Next Steps\n\nAI_NEXT_STEPS\n\n---\n\n## The Ask\n\n**Decision Needed:** Approve PROJECT_TITLE research to inform improvement strategy\n\n**Stakeholders:** STAKEHOLDERS\n\n**Timeline:** TIMELINE_NEEDED research cycle with findings for decision-making\n\n**Value:** Clear prioritization of PROJECT_TITLE improvements with data-driven recommendations\n\n---\n\n*Executive research brief • Generated by Qori Research Platform v4.0*"

output_options:
  filename: "research_brief_SLUGIFIED_TITLE_CURRENT_DATE.md"
  path: "00-brief/"
  
delivery:
  github:
    enabled: true
    repo: "your-research-repo"
    commit_message: "Add executive research brief"
  slack:
    enabled: true
    channel: "#research-planning"
    message: "Executive Research Brief Ready - Brief optimized for fast stakeholder review and approval."
    actions:
      - text: "📄 Review Brief"
        style: "primary"
        url: "GITHUB_FILE_URL"
      - text: "✅ Approve & Create Plan"
        style: "default"
        action: "trigger_research_plan"

slack_ui:
  modal:
    title: "📄 Executive Research Brief"
    submit_label: "Generate Brief"
    close_label: "Cancel"
    blocks:
      - type: "section"
        text: "Create a concise, executive-focused research brief designed for fast stakeholder approval."
      - type: "input"
        label: "Project Title"
        element: "plain_text_input"
        placeholder: "e.g., Claims Status Navigation Study"
      - type: "input"
        label: "Business Problem"
        element: "plain_text_input"
        multiline: true
        placeholder: "What's broken? e.g., Veterans calling help desk frequently about claim status, creating operational burden"
      - type: "input"
        label: "Target Barriers"
        element: "plain_text_input"
        multiline: true
        placeholder: "Specific barriers: e.g., Confusing status language, unclear next steps, hidden details"
      - type: "input"
        label: "Research Approach"
        element: "static_select"
        options:
          - text: "User interviews"
            value: "user_interviews"
          - text: "Usability testing"
            value: "usability_testing"
          - text: "User interviews + usability testing"
            value: "interviews_usability"
          - text: "Survey research"
            value: "survey_research"
          - text: "Mixed methods"
            value: "mixed_methods"
      - type: "input"
        label: "Timeline Needed"
        element: "radio_buttons"
        options:
          - text: "ASAP (2-3 weeks)"
            value: "asap"
          - text: "Standard (4-6 weeks)"
            value: "standard"
          - text: "Flexible (6+ weeks)"
            value: "flexible"
      - type: "input"
        label: "Key Stakeholders"
        element: "plain_text_input"
        multiline: true
        placeholder: "Who needs findings? e.g., VBA Claims Team, Call Center Manager, Product Owner"
      - type: "input"
        label: "Prepared By"
        element: "plain_text_input"
        placeholder: "e.g., Jordan Smith, UX Researcher"

analytics:
  track_events:
    - event: "executive_brief_generated"
      properties: [project_title, research_approach, timeline_needed]
    - event: "stakeholder_approval_tracked"
      properties: [project_title, approval_time, stakeholder_count]
