id: github_issues_generator
name: run_github_issues_generator
label: 🐛 GitHub Issues Generator
version: v1.0
description: |
  Transform research findings into actionable GitHub issues with proper labels, priorities, and implementation details.
  Converts user research insights into development-ready tasks that engineering teams can immediately understand and act upon.

author: Qori R&D
created: 2025-08-19
last_updated: 2025-08-19

input_type: text
input_processing: summarize_if_long
temperature: 0.3
precision_mode: concise | detailed

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4000

input_variables:
  # Core analysis data
  - input_text           # Research findings or readout data (REQUIRED)
  - study_name           # Title of study (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to post results (REQUIRED)
  - github_repo          # Target GitHub repository (OPTIONAL)
  - product_area         # Specific product area for labeling (OPTIONAL)

# AI GENERATION TASKS
ai_generation_tasks:
  # Analyze findings for actionable issues
  - task_id: "issue_analysis"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on specific, implementable changes
      
      Analyze research findings to identify actionable GitHub issues:
      
      **Input Data:** {{input_text}}
      **Study:** {{study_name}}
      **Product Area:** {{product_area}}
      
      Identify issues that are:
      1. **Technically implementable** (specific features, bug fixes, content changes)
      2. **Well-supported by evidence** from research findings
      3. **Clear in scope** (not too broad or vague)
      4. **Actionable by development teams** (frontend, backend, content, design system)
      
      Categories to look for:
      - **Bug fixes** (broken functionality users encountered)
      - **Feature requests** (new functionality needed)
      - **Content updates** (copy changes, help text improvements)
      - **UX improvements** (interface changes, workflow optimizations)
      - **Accessibility issues** (barriers users with disabilities face)
      - **Performance issues** (slow loading, timeouts)
      
      **Format:**
      **Potential Issues Identified:** [Count]
      **Issue Categories:**
      • Bug fixes: [Count and brief description]
      • Feature requests: [Count and brief description]
      • Content updates: [Count and brief description]
      • UX improvements: [Count and brief description]
      • Accessibility: [Count and brief description]
      • Performance: [Count and brief description]

  # Generate specific GitHub issues
  - task_id: "github_issues_creation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Write clear, implementable issue descriptions
      
      Create specific GitHub issues from the research findings:
      
      **Issue Analysis:** {{ai_generated.issue_analysis}}
      **Research Data:** {{input_text}}
      **Study Context:** {{study_name}}
      
      For each identified issue, create:
      1. **Clear title** (50 characters or less)
      2. **Problem description** with user impact
      3. **Supporting evidence** from research
      4. **Acceptance criteria** (specific, testable)
      5. **Priority level** (P0, P1, P2, P3)
      6. **Appropriate labels** 
      7. **Implementation notes** for developers
      
      **Format for each issue:**
      
      ---
      **Issue #[X]: [Clear, specific title]**
      
      **Labels:** `research-finding`, `[priority-level]`, `[feature-area]`, `[team-assignment]`
      
      **Problem Statement:**
      [Clear description of the problem from user perspective]
      
      **Research Evidence:**
      [Specific findings, quotes, or data supporting this issue]
      
      **User Impact:**
      [How this affects user success and experience]
      
      **Acceptance Criteria:**
      - [ ] [Specific, testable criterion 1]
      - [ ] [Specific, testable criterion 2]
      - [ ] [Specific, testable criterion 3]
      
      **Implementation Notes:**
      [Technical guidance for developers]
      
      **Priority:** [P0/P1/P2/P3] - [Reasoning]
      
      **Estimated Effort:** [S/M/L/XL] - [Brief reasoning]
      
      ---

  # Create issue summary and prioritization
  - task_id: "issue_prioritization"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Provide clear prioritization rationale
      
      Create a prioritized summary of all GitHub issues:
      
      **Generated Issues:** {{ai_generated.github_issues_creation}}
      
      Organize issues by:
      1. **Priority levels** (P0 = Critical, P1 = High, P2 = Medium, P3 = Low)
      2. **Implementation complexity** (effort estimates)
      3. **Team assignments** (frontend, backend, content, design)
      4. **Dependencies** (what needs to happen first)
      
      **Format:**
      
      **📊 Issue Summary**
      
      **Total Issues:** [Count]
      **Priority Breakdown:**
      • P0 (Critical): [Count] issues
      • P1 (High): [Count] issues  
      • P2 (Medium): [Count] issues
      • P3 (Low): [Count] issues
      
      **Team Distribution:**
      • Frontend: [Count] issues
      • Backend: [Count] issues
      • Content: [Count] issues
      • Design System: [Count] issues
      
      **Recommended Implementation Order:**
      1. **Week 1-2:** [P0 issues that can be implemented quickly]
      2. **Month 1:** [P1 issues with moderate effort]
      3. **Quarter 1:** [P2 issues requiring more planning]
      4. **Future backlog:** [P3 issues for later consideration]
      
      **Dependencies & Blockers:**
      [Any issues that depend on others or external factors]

# Auto-generated/computed variables
auto_variables:
  - total_issues_count: |
      count_issues(ai_generated.github_issues_creation) || 0
  - p0_issues_count: |
      count_priority_issues(ai_generated.github_issues_creation, "P0") || 0
  - current_date: |
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      generate_github_link(study_name, current_date) || null

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "structured"
  file_location: "06-implementation/"
  file_name: "github_issues_{{study_name_slug}}_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "🐛 GitHub Issues Generated"
  ping_team: ["{{researcher_contact}}", "@dev-team", "@product-team"]
  interactive_elements:
    - text: "📝 Create Issues in GitHub"
      action: "create_github_issues"
    - text: "📊 View Research Readout"
      action: "run_research_readout"
    - text: "🎯 Stakeholder Summary"
      action: "run_stakeholder_summary"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"

output_use: |
  GitHub Issues Generator transforms research findings into development-ready tasks with proper technical context,
  clear acceptance criteria, and appropriate prioritization for engineering teams.

  Use this method to:
    - Convert research insights into actionable development tasks
    - Provide proper technical context for engineering teams
    - Ensure research findings directly impact product improvements
    - Track research-to-implementation progress

output_notes: |
  Generated {{total_issues_count}} total issues with {{p0_issues_count}} critical priority items.
  Issues include technical implementation guidance and clear acceptance criteria.

# Enhanced output template
output_template: |
  Hi dev team! 👋 I've converted our research findings from {{study_name}} into {{total_issues_count}} actionable GitHub issues ready for implementation.

  @dev-team @product-team - these issues include technical context, acceptance criteria, and clear prioritization based on user impact.

  📂 *Study:* {{study_name}}  
  🔗 *Research Details:* {{study_link}}
  🚨 *Critical Issues:* {{p0_issues_count}} P0 items need immediate attention

  ---

  ## 🐛 GITHUB ISSUES GENERATED

  **🤖 AI-Generated from Research Findings | {{current_date}}**

  ---

  ### 📊 Issue Analysis Summary

  {{ai_generated.issue_analysis}}

  ---

  ### 📝 Generated GitHub Issues

  {{ai_generated.github_issues_creation}}

  ---

  ### 🎯 Prioritization & Implementation Plan

  {{ai_generated.issue_prioritization}}

  ---

  ### 🔗 Next Steps

  1. **Review issues** in thread below
  2. **Create in GitHub** using the "Create Issues" button
  3. **Assign to sprint** based on priority recommendations
  4. **Track progress** against research findings

  ---

  **🏷️ Tags:** `research-to-dev`, `github-issues`, `implementation-ready`, `{{product_area}}`

  ---

  *Questions about implementation?* Reply in thread or contact {{researcher_contact}} for research context.

  *🤖 AI-Generated Issues | Ready for GitHub Creation*

notify:
  - role: dev_team
    action: "Research-based GitHub issues ready"
    channel: "{{study_channel}}"
    message: "🐛 {{total_issues_count}} GitHub issues generated from {{study_name}} research. {{p0_issues_count}} critical issues need immediate attention."
  - role: researcher
    action: "Issues generated"
    slack_tag: "{{researcher_contact}}"
    message: "GitHub issues have been generated from your research and are ready for development team review."
