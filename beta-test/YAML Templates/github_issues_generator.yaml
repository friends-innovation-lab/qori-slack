id: github_issues_generator
name: run_github_issues_generator
label: 🛠 GitHub Issues Generator
version: v3.0
description: |
  Generate GitHub issues directly from research findings with automatic prioritization by impact and effort.
  Creates actionable development tasks with research evidence, quotes, and clear acceptance criteria.
  Issues go directly to repository backlog for sprint planning.

author: Qori R&D
created: 2025-08-19
last_updated: 2025-08-19

input_type: text
input_processing: summarize_if_long
temperature: 0.3
precision_mode: detailed

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4000

input_variables:
  # GitHub Repository Configuration (REQUIRED)
  - github_repository      # Format: "owner/repo-name" (REQUIRED)
  - github_token          # User's GitHub personal access token (REQUIRED)
  
  # Research Readout Data (PRIMARY SOURCE)
  - research_readout_data  # Full research readout with recommendations (REQUIRED)
  - study_name            # Title of study (REQUIRED)
  - researcher_contact    # Lead researcher (REQUIRED)
  - study_channel         # Where to post results (REQUIRED)
  
  # Optional Configuration
  - team_members          # Who to notify (OPTIONAL)
  - github_labels         # Custom labels to add (OPTIONAL - defaults provided)
  - github_assignees      # Default assignees (OPTIONAL)
  - max_issues           # Maximum issues to create (OPTIONAL - default: 5)

# AI GENERATION TASKS
ai_generation_tasks:
  # Extract actionable recommendations from research readout
  - task_id: "recommendations_extraction"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      Extract actionable recommendations from research readout for GitHub issue creation:
      
      **Research Readout:** {{research_readout_data}}
      **Study Name:** {{study_name}}
      **Max Issues:** {{max_issues}} (default: 5)
      
      Focus on extracting:
      1. **Immediate Actions** (next 2 weeks) - These become P0-P1 issues
      2. **Short-term Initiatives** (1-2 months) - These become P2 issues
      3. **Supporting evidence** from detailed findings for each recommendation
      
      Prioritize recommendations that are:
      - **Development-focused** (can be implemented by engineering/design teams)
      - **Specific and actionable** (clear what needs to be built)
      - **Well-supported by evidence** (have user quotes and behavioral data)
      - **High user impact** (address major pain points)
      
      **Skip recommendations that are:**
      - Research follow-ups or additional studies
      - Organizational/process changes
      - Vague or aspirational goals
      
      **Format:**
      **High Priority (P0-P1) - Immediate Actions:**
      • [Action 1]: [Specific development task] - [User impact]
      • [Action 2]: [Specific development task] - [User impact]
      
      **Medium Priority (P2) - Short-term Initiatives:**
      • [Initiative 1]: [Specific development task] - [User impact]  
      • [Initiative 2]: [Specific development task] - [User impact]
      
      **Evidence Available:**
      • [Action 1]: [Supporting evidence from findings - quotes, behavioral data]
      • [Action 2]: [Supporting evidence from findings - quotes, behavioral data]

  # Convert recommendations into GitHub issues with full context
  - task_id: "github_issues_creation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Use GitHub markdown formatting
      
      Convert research recommendations into {{max_issues}} focused GitHub issues:
      
      **Recommendations:** {{ai_generated.recommendations_extraction}}
      **Research Readout:** {{research_readout_data}}
      **Study Name:** {{study_name}}
      
      Create 3-6 focused issues maximum. For each recommendation, create:
      
      1. **Clear title** (under 50 characters, action-oriented)
      2. **Problem statement** (why this matters to users)
      3. **Research evidence** (specific quotes and behavioral observations)
      4. **Acceptance criteria** (specific, testable requirements)
      5. **Implementation guidance** (technical considerations)
      
      **Format each issue:**
      
      ---
      **ISSUE [X]:**
      **TITLE:** [Action-oriented title under 50 chars]
      **PRIORITY:** P[0-2] - [Critical/High/Medium]  
      **EFFORT:** [Small/Medium] ([1-2 weeks]/[3-4 weeks])
      **LABELS:** research-finding, [priority-level], [component], [type]
      
      **BODY:**
      ## Problem Statement
      
      [Clear description of user problem from research readout findings]
      
      ## Research Evidence  
      
      **Study:** {{study_name}}
      **User Impact:** [How this affects user success]
      **Research Source:** [Link back to research readout]
      
      **Evidence from Research:**
      > "[User quote from findings]" - Participant P[X]  
      > "[Behavioral observation from findings]"
      
      ## Acceptance Criteria
      
      - [ ] [Specific, testable requirement 1]
      - [ ] [Specific, testable requirement 2]
      - [ ] [Specific, testable requirement 3]
      
      ## Implementation Notes
      
      [Technical guidance from research readout recommendations]
      
      **Definition of Done:**
      - [ ] Implementation completed and tested
      - [ ] User experience validates the research recommendation
      - [ ] Solution addresses the specific user pain point identified
      
      ---
      
      **Create only 3-6 issues total - focus on highest impact recommendations.**

  # Create implementation summary  
  - task_id: "implementation_summary"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      Summarize the GitHub issues created and implementation plan:
      
      **GitHub Issues:** {{ai_generated.github_issues_creation}}
      **Repository:** {{github_repository}}
      
      Create implementation summary:
      1. **Total issues created** and priority breakdown
      2. **Development effort estimate** (total sprint impact)
      3. **User impact summary** (what problems these solve)
      4. **Sprint planning guidance** (how to prioritize)
      
      **Format:**
      **Implementation Summary:**
      **Total Issues:** [Count] focused issues created from {{study_name}} recommendations
      
      **Priority Breakdown:**
      • **P0-P1 Critical/High:** [Count] issues - Address major user blockers
      • **P2 Medium:** [Count] issues - Improve user experience
      
      **Estimated Development:**
      • **Total Effort:** [X-Y] weeks of development work
      • **Sprint Impact:** Recommend [X] issues per sprint for manageable implementation
      
      **User Problems Addressed:**
      • [Problem 1]: [Solution approach]
      • [Problem 2]: [Solution approach]
      • [Problem 3]: [Solution approach]
      
      **Sprint Planning Recommendation:**
      Start with P0-P1 issues that have the highest user impact and strongest research evidence.

# Auto-generated variables (focused on recommendation-based issues)
auto_variables:
  - total_issues: |
      count_issues(ai_generated.github_issues_creation) || 0
  - p0_p1_count: |
      count_priority_issues(ai_generated.github_issues_creation, "P0-P1") || 0
  - p2_count: |
      count_priority_issues(ai_generated.github_issues_creation, "P2") || 0
  - estimated_weeks: |
      calculate_total_effort(ai_generated.github_issues_creation) || "3-4"
  - github_repo_url: |
      "https://github.com/{{github_repository}}"
  - current_date: |
      new Date().toISOString().split('T')[0]

# GitHub API Integration (Simplified)
github_api:
  authentication: "personal_access_token"
  required_scopes: ["repo", "issues:write"]
  
  issue_creation:
    endpoint: "POST /repos/{{github_repository}}/issues"
    headers:
      Authorization: "token {{github_token}}"
      Accept: "application/vnd.github.v3+json"
    
    default_labels: ["research-finding", "user-experience", "needs-triage"]
    
    batch_creation: true
    rate_limit_buffer: "1_request_per_second"
    
  error_handling:
    authentication_failure: "Invalid GitHub token or insufficient permissions"
    repository_not_found: "Repository {{github_repository}} not accessible"
    rate_limit_exceeded: "GitHub API rate limit reached, retrying with backoff"

# Output configuration
output_options:
  default_delivery: "slack_and_github_api"
  slack_format: "creation_summary"
  save_issues_locally: true
  file_location: "07-implementation/"
  file_name: "github_issues_{{study_name_slug}}_{{current_date}}.json"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "🛠 GitHub Issues Created"
  ping_team: ["{{researcher_contact}}", "@dev-team", "@product-team", "{{team_members}}"]
  
  interactive_elements:
    - text: "🔗 View All Issues"
      url: "{{github_repo_url}}/issues?q=is:issue+label:research-finding"
    - text: "📋 Add to Current Sprint"  
      action: "add_to_sprint_board"
    - text: "🏷 Update Labels"
      action: "bulk_update_labels"
    - text: "👥 Assign Teams"
      action: "bulk_assign_issues"

# Clean output format focused on recommendation conversion
output_format: |
  🛠 **GitHub Issues Created from Research Recommendations!**
  
  Hi dev teams! {{team_members}} I've converted {{total_issues}} key recommendations from the {{study_name}} research readout into actionable GitHub issues in {{github_repository}}.
  
  📊 **Issues Created:**
  • **{{p0_p1_count}} Critical/High Priority** - Address major user blockers identified in research
  • **{{p2_count}} Medium Priority** - User experience improvements with clear evidence
  
  ⚡ **Implementation Summary:**
  • **Estimated Development:** {{estimated_weeks}} weeks total
  • **Research-backed** with participant quotes and behavioral evidence
  • **Ready for sprint planning** with clear acceptance criteria
  
  🔗 **View Issues:** {{github_repo_url}}/issues?q=is:issue+label:research-finding
  
  ---
  
  {{ai_generated.implementation_summary}}
  
  ---
  
  **🚀 Sprint Planning Guidance:**
  1. **Start with P0-P1 issues** - These address critical user blockers
  2. **Each issue includes research context** - User quotes and behavioral evidence  
  3. **Clear acceptance criteria** - Ready for development estimation
  4. **Research source links** - Connect back to {{study_name}} findings
  
  **[🔗 View All Issues]({{github_repo_url}}/issues)** | **[📋 Add to Sprint]** | **[🏷 Update Labels]** | **[👥 Assign Teams]**
  
  ---
  
  *Questions about research context?* Contact {{researcher_contact}} for details about any recommendation.
  
  *🤖 {{total_issues}} Issues Created | Research Recommendations → Development Tasks Complete*

# Simplified issue creation process
creation_workflow:
  steps:
    1. "validate_github_access"
    2. "analyze_research_findings" 
    3. "generate_issue_content"
    4. "create_issues_via_api"
    5. "apply_default_labels"
    6. "post_completion_summary"
  
  validation:
    github_token: "Check token validity and repository access"
    repository: "Verify repository exists and user has write access"
    issue_content: "Ensure all issues have required fields"

# Error handling
error_scenarios:
  invalid_token:
    message: "❌ Invalid GitHub token. Please check your personal access token has 'repo' and 'issues:write' permissions."
    action: "show_token_setup_guide"
    
  repository_access:
    message: "❌ Cannot access repository {{github_repository}}. Check repository name and permissions."
    action: "show_repository_help"
    
  api_failure:
    message: "⚠️ Created {{success_count}}/{{total_issues}} issues. Retrying failed issues..."
    action: "retry_failed_with_backoff"
    
  partial_success:
    message: "✅ Created {{success_count}}/{{total_issues}} issues successfully. {{failed_count}} issues need manual creation."
    action: "provide_failed_issue_templates"

notify:
  - role: dev_teams
    action: "Research issues ready for development"
    channel: "{{study_channel}}"
    message: "🛠 {{total_issues}} research-backed GitHub issues created in {{github_repository}}. {{p0_count}} critical issues need immediate sprint attention."
  - role: researcher
    action: "Research findings converted to development tasks"
    slack_tag: "{{researcher_contact}}"
    message: "Your {{study_name}} research has been converted into {{total_issues}} actionable GitHub issues with full research evidence. Ready for development prioritization."
