id: github_issues_creator
name: run_github_issues_creator
label: 🐛 GitHub Issues Creator
version: v2.0
description: |
  Automatically create GitHub issues directly from research findings using GitHub API integration.
  Transforms user research insights into live GitHub issues with proper labels, assignments, and project integration.

author: Qori R&D
created: 2025-08-19
last_updated: 2025-08-19

# GITHUB API INTEGRATION CONFIGURATION
github_integration:
  required_permissions:
    oauth_scopes: ["repo", "issues:write", "project:write"]
    oauth_app_id: "{{env.GITHUB_OAUTH_APP_ID}}"
    oauth_client_secret: "{{env.GITHUB_OAUTH_CLIENT_SECRET}}"
  
  api_configuration:
    base_url: "https://api.github.com"
    endpoints:
      create_issue: "/repos/{owner}/{repo}/issues"
      add_labels: "/repos/{owner}/{repo}/issues/{issue_number}/labels" 
      assign_users: "/repos/{owner}/{repo}/issues/{issue_number}/assignees"
      add_to_project: "/projects/{project_id}/cards"
    rate_limits:
      requests_per_hour: 5000
      authenticated_requests_per_hour: 5000
  
  authentication:
    type: "oauth_token"
    storage: "encrypted_user_tokens"
    refresh_strategy: "automatic"

input_type: text
input_processing: summarize_if_long
temperature: 0.3
precision_mode: detailed

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4000

input_variables:
  # GITHUB REPOSITORY CONFIGURATION (REQUIRED)
  - github_repository      # Format: "owner/repo-name" (REQUIRED)
  - github_labels          # Default labels to apply (OPTIONAL)
  - github_assignees       # Default assignees (OPTIONAL)
  - github_project_id      # Project board ID for auto-assignment (OPTIONAL)
  - github_milestone       # Milestone for issues (OPTIONAL)
  
  # RESEARCH DATA (inherited from research readout)
  - research_readout_data  # Full readout data for context (OPTIONAL)
  - input_text            # Research findings or readout data (OPTIONAL if readout_data provided)
  - study_name            # Title of study (REQUIRED)
  - researcher_contact    # Lead researcher (REQUIRED)
  - study_channel         # Where to post results (REQUIRED)
  - team_members          # Who to notify/tag (OPTIONAL)
  
  # File processing context (passed from research readout)
  - file_quality_score    # Quality of source files (OPTIONAL)
  - data_sources         # What data sources were used (OPTIONAL)
  - participant_count    # Number of participants (OPTIONAL)
  - session_count        # Number of sessions (OPTIONAL)
  - completion_rate      # Participant completion rate (OPTIONAL)
  - session_quotes       # Specific quotes from session files (OPTIONAL)
  - behavioral_evidence  # Behavioral patterns from sessions (OPTIONAL)

# AI GENERATION TASKS (Generate issue data for API calls)
ai_generation_tasks:
  # Validate GitHub repository access
  - task_id: "github_repository_validation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      Validate GitHub repository configuration and access:
      
      **Repository:** {{github_repository}}
      **User OAuth Status:** {{github_oauth_status}}
      **Repository Permissions:** {{github_permissions}}
      
      Validate:
      1. **Repository format** (owner/repo-name)
      2. **User permissions** (can create issues, add labels)
      3. **Repository accessibility** (exists and user has access)
      4. **Label configuration** (default labels available)
      5. **Assignee validation** (specified users exist in repo)
      
      **Format:**
      **Repository Valid:** [Yes/No] - [Reason if invalid]
      **User Permissions:** [Write/Read/None] - [Specific permissions available]
      **Repository Access:** [Accessible/Restricted/Not Found]
      **Default Labels:** [Available labels in repository]
      **Assignee Status:** [Valid assignees from provided list]
      **Ready for Issue Creation:** [Yes/No] - [Requirements met/missing]

  # Generate GitHub-ready issue data structures
  - task_id: "github_issues_generation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Generate issues in GitHub API format
      
      Generate GitHub issues data for API creation:
      
      **Research Data:** {{research_readout_data}} {{input_text}}
      **Study Context:** {{study_name}}
      **File Quality:** {{file_quality_score}}
      **Participant Evidence:** {{session_quotes}} {{behavioral_evidence}}
      **Repository:** {{github_repository}}
      
      Create 5-12 issues in GitHub API JSON format:
      
      Each issue must include:
      1. **Title** (50 characters max, clear and specific)
      2. **Body** (GitHub markdown with research evidence)
      3. **Labels** (array of label names)
      4. **Assignees** (array of GitHub usernames)
      5. **Priority** (P0/P1/P2/P3 for sorting)
      6. **Research context** (links to study and evidence)
      
      **Format as valid GitHub API JSON:**
      ```json
      [
        {
          "title": "Add progress indicator to application flow",
          "body": "## Problem Statement\\n\\nUsers abandon applications because they can't see progress...\\n\\n## Research Evidence\\n\\n- Quote: \"I don't know if this will take 5 minutes or 5 hours\" - P03\\n- Behavioral: 8/8 participants looked for progress info\\n- Study: {{study_name}}\\n\\n## Acceptance Criteria\\n\\n- [ ] Show current step and total steps\\n- [ ] Display estimated time remaining\\n\\n## Implementation Notes\\n\\nAffected components: ApplicationFlow, ProgressBar\\n\\n**Priority:** P1-High\\n**Effort:** Medium (1-2 weeks)\\n**Research Source:** {{study_link}}",
          "labels": ["research-finding", "P1-high", "frontend", "ux-improvement"],
          "assignees": ["frontend-lead", "ux-designer"]
        },
        {
          "title": "Improve error messages for eligibility validation",
          "body": "## Problem Statement\\n\\nUsers receive generic error messages...\\n\\n## Research Evidence\\n\\n- Quote: \"It just says 'error' - no idea what I did wrong\" - P05\\n\\n## Acceptance Criteria\\n\\n- [ ] Replace generic errors with specific guidance\\n\\n**Priority:** P0-Critical\\n**Research Source:** {{study_link}}",
          "labels": ["research-finding", "P0-critical", "content", "error-handling"],
          "assignees": ["content-team", "frontend-lead"]
        }
      ]
      ```
      
      **Requirements:**
      - Generate 5-12 issues based on research findings
      - Prioritize by user impact and frequency
      - Include specific participant quotes and behavioral evidence
      - Use proper GitHub markdown formatting
      - Reference study context and links

  # Prepare batch creation strategy
  - task_id: "batch_creation_strategy"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      Create batch issue creation strategy:
      
      **Generated Issues:** {{ai_generated.github_issues_generation}}
      **Repository Validation:** {{ai_generated.github_repository_validation}}
      **GitHub Configuration:** {{github_labels}} {{github_assignees}}
      
      Plan the batch creation process:
      1. **Creation order** (P0 first, then P1, etc.)
      2. **Rate limiting** (respect GitHub API limits)
      3. **Error handling** (what to do if creation fails)
      4. **Progress tracking** (how to report status to user)
      5. **Rollback strategy** (if batch fails partway through)
      
      **Format:**
      **Total Issues to Create:** [Count]
      **Creation Order:** [Priority-based sequence]
      **Estimated Time:** [Seconds/minutes for full batch]
      **Rate Limit Buffer:** [Requests per minute to stay under limits]
      **Error Handling:** [Strategy for failed creations]
      **Progress Updates:** [How to update user during creation]
      **Success Criteria:** [How to measure successful completion]

# GITHUB API ACTIONS (New section for actual API calls)
github_api_actions:
  # Authenticate user with GitHub
  - action_id: "authenticate_github_user"
    type: "oauth_flow"
    oauth_scopes: ["repo", "issues:write"]
    oauth_redirect: "{{slack_app_url}}/oauth/github/callback"
    success_message: "✅ GitHub authentication successful"
    failure_message: "❌ GitHub authentication failed"
    
  # Validate repository access
  - action_id: "validate_repository_access"
    type: "api_call" 
    method: "GET"
    endpoint: "/repos/{{github_repository}}"
    headers:
      Authorization: "token {{user_github_token}}"
      Accept: "application/vnd.github.v3+json"
    success_criteria: "status_code == 200"
    error_handling: "return_permissions_error"
    
  # Create issues in batch
  - action_id: "create_issues_batch"
    type: "api_batch"
    method: "POST" 
    endpoint: "/repos/{{github_repository}}/issues"
    headers:
      Authorization: "token {{user_github_token}}"
      Accept: "application/vnd.github.v3+json"
    payload_source: "{{ai_generated.github_issues_generation}}"
    rate_limit: "30_requests_per_minute"
    retry_strategy: "exponential_backoff"
    progress_callback: "update_slack_message"
    
  # Apply additional labels and assignments
  - action_id: "enhance_created_issues"
    type: "api_batch"
    method: "POST"
    depends_on: "create_issues_batch"
    operations:
      - endpoint: "/repos/{{github_repository}}/issues/{issue_number}/labels"
        payload: "{{github_labels}}"
      - endpoint: "/repos/{{github_repository}}/issues/{issue_number}/assignees" 
        payload: "{{github_assignees}}"
    conditional: "if github_labels or github_assignees provided"

# Auto-generated/computed variables
auto_variables:
  - total_issues_count: |
      count_issues(ai_generated.github_issues_generation) || 0
  - p0_issues_count: |
      count_priority_issues(ai_generated.github_issues_generation, "P0") || 0
  - p1_issues_count: |
      count_priority_issues(ai_generated.github_issues_generation, "P1") || 0
  - estimated_creation_time: |
      calculate_creation_time(ai_generated.batch_creation_strategy) || "2-3 minutes"
  - github_repo_url: |
      "https://github.com/{{github_repository}}"
  - current_date: |
      new Date().toISOString().split('T')[0]

# Output configuration
output_options:
  default_delivery: "slack_only"  # Real-time creation updates
  slack_format: "interactive"
  save_results: true
  file_location: "06-implementation/"
  file_name: "github_issues_created_{{study_name_slug}}_{{current_date}}.json"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "🐛 Creating GitHub Issues"
  ping_team: ["{{researcher_contact}}", "@dev-team", "@product-team", "{{team_members}}"]
  interactive_elements:
    - text: "🔗 View All Issues"
      url: "{{github_repo_url}}/issues"
    - text: "📊 View Research Readout"
      action: "run_research_readout"
    - text: "🎯 Stakeholder Summary"
      action: "run_stakeholder_summary"
    - text: "📋 Add to Project Board"
      action: "add_issues_to_project"

# Enhanced output template with real-time creation
output_format: |
  Hi dev team! 👋 I'm creating {{total_issues_count}} GitHub issues directly in {{github_repository}} from our {{study_name}} research findings.

  @dev-team @product-team {{team_members}} - Issues will be created with proper labels, assignments, and research context.

  📂 *Study:* {{study_name}}  
  🔗 *Repository:* {{github_repo_url}}
  🚨 *Critical Issues:* {{p0_issues_count}} P0 items
  ⏱️ *Estimated Time:* {{estimated_creation_time}}

  ---

  ## 🐛 CREATING GITHUB ISSUES IN REAL-TIME

  **🤖 Direct API Integration | {{current_date}}**

  ---

  ### 📊 Creation Plan

  {{ai_generated.batch_creation_strategy}}

  ---

  ### 🔄 Creation Progress

  {{real_time_progress_updates}}

  ---

  ### ✅ Creation Results

  {{github_creation_results}}

  ---

  ### 🔗 Next Steps

  1. **Review created issues** at {{github_repo_url}}/issues
  2. **Assign to sprints** using project board integration
  3. **Add story points** and effort estimates
  4. **Schedule work** based on research priorities

  ---

  **🏷️ Tags:** `github-issues-created`, `{{total_issues_count}}-issues`, `research-to-dev`, `api-integration`

  ---

  *Issues created successfully!* View all at {{github_repo_url}}/issues or contact {{researcher_contact}} for research context.

  *🤖 Direct GitHub Integration | {{total_issues_count}} Issues Created*

# Real-time progress tracking
progress_tracking:
  slack_updates:
    start: "🔄 Starting GitHub issue creation..."
    progress: "✅ Created issue {current}/{total}: {issue_title}"
    error: "❌ Failed to create issue: {issue_title} - {error_message}"
    success: "🎉 Successfully created all {{total_issues_count}} issues!"
    failure: "⚠️ Created {success_count}/{total_issues_count} issues. {failure_count} failed."

# Error handling and recovery
error_handling:
  authentication_failure:
    message: "❌ GitHub authentication required. Click below to connect your account."
    action: "show_oauth_button"
  
  permission_denied:
    message: "❌ Insufficient permissions for {{github_repository}}. Need 'Issues: Write' access."
    action: "show_permission_help"
  
  api_rate_limit:
    message: "⏳ GitHub API rate limit reached. Retrying in {retry_seconds} seconds..."
    action: "exponential_backoff_retry"
  
  partial_failure:
    message: "⚠️ Created {success_count}/{total_count} issues. Retrying failed issues..."
    action: "retry_failed_issues"

notify:
  - role: dev_team
    action: "GitHub issues created"
    channel: "{{study_channel}}"
    message: "🎉 {{total_issues_count}} GitHub issues created in {{github_repository}} from {{study_name}} research. {{p0_issues_count}} critical issues ready for immediate attention."
  - role: researcher
    action: "Issues created successfully"
    slack_tag: "{{researcher_contact}}"
    message: "Your research findings have been converted into {{total_issues_count}} live GitHub issues with full research context and evidence."
