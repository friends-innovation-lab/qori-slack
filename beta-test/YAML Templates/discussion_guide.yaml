id: discussion_guide_v5
name: run_discussion_guide
label: 💬 Discussion Guide
version: v5.0

description: |
  Generate a comprehensive, professional discussion guide for user research sessions.
  Includes timing breakdown, scripts, tasks, interview questions, and observer templates.

author: Qori R&D
created: 2025-06-26
last_updated: 2025-11-25

# Character encoding
encoding: utf-8
output_encoding: utf-8

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4000

# Input variables - SINGLE canonical names only
input_variables:
  - research_focus:
      type: "textarea"
      required: true
      placeholder: "e.g., VA Video Connect telehealth onboarding experience"
      
  - research_questions:
      type: "textarea"
      required: true
      placeholder: "e.g., Where do Veterans drop off? What causes technical issues?"
      
  - participants:
      type: "textarea"
      required: true
      placeholder: "e.g., Veterans who completed at least one telehealth visit"
      
  - session_length:
      type: "select"
      required: true
      options: ["30", "45", "60", "90"]
      default: "60"
      
  - testing_url:
      type: "text"
      required: false
      placeholder: "e.g., https://staging.va.gov/telehealth"

# AI GENERATION TASKS - Split into focused tasks
ai_generation_tasks:

  # Task 1: Generate study name
  - task_id: "study_name"
    prompt: |
      Generate a concise, professional study name (max 8 words) based on:
      
      Research Focus: {{research_focus}}
      
      Return ONLY the study name. No quotes, no extra text.
      
      Examples:
      - VA Telehealth Onboarding Experience Study
      - Debt Letters Usability Evaluation
      - Claims Status Tool Navigation Study

  # Task 2: Generate timing breakdown
  - task_id: "timing_breakdown"
    prompt: |
      Create a timing breakdown for a {{session_length}}-minute research session.
      
      Distribute time appropriately across these phases:
      - Introduction & consent
      - Warm-up questions  
      - Main research tasks
      - Post-task interview
      - Closing & wrap-up
      
      Format as a simple table:
      | Phase | Duration | Running Total |
      |-------|----------|---------------|
      | Introduction & Consent | X min | X min |
      | Warm-up Questions | X min | X min |
      | Main Research Tasks | X min | X min |
      | Post-Task Interview | X min | X min |
      | Closing & Wrap-up | X min | {{session_length}} min |
      
      Ensure times add up to exactly {{session_length}} minutes.

  # Task 3: Generate research objectives
  - task_id: "objectives"
    prompt: |
      Create 3-5 clear research objectives based on:
      
      Research Focus: {{research_focus}}
      Research Questions: {{research_questions}}
      
      Format as numbered list:
      1. [Specific, measurable objective]
      2. [Specific, measurable objective]
      3. [Specific, measurable objective]
      
      Make each objective actionable and directly tied to the research questions.

  # Task 4: Generate introduction script
  - task_id: "introduction"
    prompt: |
      Write a warm, professional introduction script for a research session about:
      
      Research Focus: {{research_focus}}
      Participants: {{participants}}
      Session Length: {{session_length}} minutes
      
      Include these elements (write as a natural script the researcher can read):
      
      **Welcome & Thank You**
      [Thank participant, introduce yourself]
      
      **Session Purpose**
      [Explain what you're researching and why their input matters]
      
      **Consent & Recording**
      [Explain recording, get verbal consent, emphasize confidentiality]
      
      **Ground Rules**
      [No right/wrong answers, think aloud, can skip questions, take breaks]
      
      **Questions Before We Begin**
      [Ask if they have any questions]
      
      Write naturally — this should sound like a real person talking, not a script being read.

  # Task 5: Generate warm-up questions
  - task_id: "warmup"
    prompt: |
      Create 4-5 warm-up questions for a research session with:
      
      Participants: {{participants}}
      Research Focus: {{research_focus}}
      
      These questions should:
      - Build rapport and put participant at ease
      - Be relevant to their background/experience
      - Naturally lead into the research topic
      - Be open-ended (not yes/no)
      
      Format:
      1. [Question] 
         - *Why this matters:* [Brief note for researcher]
      
      2. [Question]
         - *Why this matters:* [Brief note for researcher]
      
      Continue for all questions.

  # Task 6: Generate main research tasks
  - task_id: "tasks"
    prompt: |
      Design 3-4 usability tasks for a research session about:
      
      Research Focus: {{research_focus}}
      Research Questions: {{research_questions}}
      Participants: {{participants}}
      
      For each task, use this exact format:
      
      ### Task 1: [Clear Task Name]
      **Time:** X minutes
      
      **Scenario:** 
      [Set up a realistic situation for the participant]
      
      **Instruction to Participant:**
      "[Exact words to say to the participant]"
      
      **Success Criteria:**
      - [What successful completion looks like]
      
      **What to Observe:**
      - [Specific behavior to watch for]
      - [Potential pain points]
      - [Navigation patterns]
      
      **Probing Questions:**
      - [Question to ask during or after the task]
      - [Question about their thought process]
      
      ---
      
      Repeat this format for each task. Make tasks realistic and specific to {{research_focus}}.

  # Task 7: Generate post-session interview
  - task_id: "interview"
    prompt: |
      Create 6-8 post-session interview questions for research about:
      
      Research Focus: {{research_focus}}
      Research Questions: {{research_questions}}
      
      Include questions that explore:
      - Overall impressions and feelings
      - Specific pain points observed during tasks
      - Expectations vs. reality
      - Mental models and understanding
      - Suggestions for improvement
      - Likelihood to use/recommend (include rating scale)
      
      Format:
      1. [Question]
         - *Follow-up if needed:* [Probing question]
      
      2. [Question]
         - *Follow-up if needed:* [Probing question]
      
      End with: "On a scale of 1-10, how likely would you be to use this [product/service]? What would make it a 10?"

  # Task 8: Generate closing script
  - task_id: "closing"
    prompt: |
      Write a brief closing script for a research session.
      
      Include:
      - Warm thank you
      - Brief explanation of next steps
      - Compensation information (leave as placeholder)
      - How their feedback will be used
      - Contact information for follow-up questions
      - Final opportunity for questions
      
      Keep it warm and genuine. This is the last impression they have of the research team.

  # Task 9: Generate observer notes template
  - task_id: "observer_template"
    prompt: |
      Create a structured observer notes template for research about:
      
      Research Focus: {{research_focus}}
      
      Include these sections with clear formatting:
      
      **Session Info**
      - Participant ID: ____
      - Date/Time: ____
      - Observer: ____
      
      **Key Quotes** (verbatim)
      | Quote | Context | Timestamp |
      |-------|---------|-----------|
      |       |         |           |
      
      **Usability Issues**
      | Issue | Severity (H/M/L) | Task # | Notes |
      |-------|------------------|--------|-------|
      |       |                  |        |       |
      
      **Behavioral Observations**
      - [ ] Hesitation/confusion points:
      - [ ] Positive reactions:
      - [ ] Workarounds attempted:
      
      **Feature Requests/Suggestions**
      - 
      
      **Technical Issues**
      - 
      
      **Overall Impression** (1-5 scale)
      - Task completion: ___
      - User confidence: ___
      - Satisfaction: ___

  # Task 10: Generate synthesis prompts
  - task_id: "synthesis"
    prompt: |
      Create 5 reflection questions for researchers to ask themselves after sessions about:
      
      Research Focus: {{research_focus}}
      Research Questions: {{research_questions}}
      
      These should help with synthesis and pattern identification:
      
      **After Each Session:**
      1. [Question about patterns emerging]
      2. [Question about surprises or unexpected findings]
      3. [Question about what needs deeper investigation]
      
      **After All Sessions:**
      4. [Question about overall themes]
      5. [Question about confidence in findings]
      
      Make these specific to {{research_focus}}, not generic.

# OUTPUT TEMPLATE
output_template: |
  # 💬 Discussion Guide — {{ai_generated.study_name}}

  **Duration:** {{session_length}} minutes
  **Participants:** {{participants}}
  **Date:** {{current_date}}
  **Testing URL:** {{testing_url}}

  ---

  ## 🚨 Emergency Procedures

  **Technical Issues:**
  - Have backup meeting link ready
  - Screen share troubleshooting: Check browser permissions, try different browser
  - Contact technical support: [Add contact info]
  - Have phone number as backup

  **Participant Distress:**
  - Pause session immediately and check comfort level
  - Remind participant of voluntary participation — they can stop at any time
  - Remind them there are no wrong answers
  - For veterans: VA Crisis Line: 988, Press 1 (24/7 support)
  - Have list of relevant support resources ready

  **Data/Privacy Concerns:**
  - Reassure about data handling and anonymization
  - Review consent form if needed
  - Stop recording if requested

  ---

  ## ⏱️ Session Timing

  {{ai_generated.timing_breakdown}}

  ---

  ## 🎯 Research Objectives

  {{ai_generated.objectives}}

  ---

  ## 👋 Introduction Script

  {{ai_generated.introduction}}

  ---

  ## 🗣️ Warm-up Questions

  {{ai_generated.warmup}}

  ---

  ## 🎯 Main Research Tasks

  {{ai_generated.tasks}}

  ---

  ## 💭 Post-Session Interview

  {{ai_generated.interview}}

  ---

  ## 🎁 Closing Script

  {{ai_generated.closing}}

  ---

  ## 📝 Observer Notes Template

  {{ai_generated.observer_template}}

  ---

  ## 🔍 Research Synthesis Prompts

  {{ai_generated.synthesis}}

  ---

  ## 📋 Appendix

  **Materials Checklist:**
  - [ ] Recording software ready and tested
  - [ ] Screen sharing tested
  - [ ] Prototype/product accessible
  - [ ] Consent form signed
  - [ ] Compensation ready
  - [ ] Backup facilitator available
  - [ ] Observer notes template printed/ready

  **Post-Session Checklist:**
  - [ ] Save and backup recording
  - [ ] Transfer notes to research repository
  - [ ] Send thank you email
  - [ ] Process compensation within 24 hours
  - [ ] Update participant tracker
  - [ ] Schedule debrief with team

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. validate_generated_content
  4. populate_template
  5. save_to_outputs

# Output configuration
output_options:
  filename: "discussion_guide_{{ai_generated.study_name}}_{{current_date}}.md"
  path: "01-planning/"
  
  delivery:
    github:
      enabled: true
      commit_message: "Add discussion guide: {{ai_generated.study_name}}"
      
    slack:
      enabled: true
      channel: "#research-planning"
      message: |
        💬 **Discussion Guide Generated**
        **Study:** {{ai_generated.study_name}}
        **Duration:** {{session_length}} minutes
        **Ready for session prep.**
      
      actions:
        - text: "📋 View Guide"
          style: "primary"
          url: "{{github_file_url}}"

# Slack UI configuration
slack_ui:
  modal:
    title: "💬 Create Discussion Guide"
    submit_label: "Generate Guide"
    close_label: "Cancel"
