id: discussion_guide
name: run_discussion_guide
label: 💬 Discussion Guide
version: v6.0

description: |
  Generate a comprehensive, professional discussion guide for user research sessions.
  Includes timing breakdown, scripts, tasks/questions, and observer templates.
  Adapts content based on research method (usability testing vs interviews vs concept testing).
  
  v6.0: Refactored to use Claude Sonnet with multi-task generation to prevent truncation.
  Added research_method field to generate method-appropriate content.

author: Qori R&D
created: 2025-06-26
last_updated: 2026-01-29

# Character encoding
encoding: utf-8
output_encoding: utf-8

# LLM Configuration - Claude Sonnet
llm_config:
  model: "claude-sonnet-4-20250514"
  temperature: 0.3
  max_tokens: 8000

# Input variables
input_variables:
  - selected_study:
      type: "select"
      required: true
      description: "Study folder name"
      
  - research_focus:
      type: "textarea"
      required: true
      placeholder: "e.g., VA Video Connect telehealth onboarding experience"
      
  - research_questions:
      type: "textarea"
      required: true
      placeholder: "e.g., Where do Veterans drop off? What causes technical issues?"
      
  - participants:
      type: "textarea"
      required: true
      placeholder: "e.g., Veterans who completed at least one telehealth visit"
      
  - research_method:
      type: "select"
      required: true
      options: ["usability_testing", "user_interviews", "contextual_inquiry", "concept_testing"]
      default: "usability_testing"
      
  - session_length:
      type: "select"
      required: true
      options: ["30", "45", "60", "90"]
      default: "60"
      
  - testing_url:
      type: "text"
      required: false
      placeholder: "e.g., https://staging.va.gov/telehealth"

# =============================================================================
# AI GENERATION TASKS - Split into 4 sequential tasks
# =============================================================================

ai_generation_tasks:

  # -------------------------------------------------------------------------
  # TASK 1: Study name, timing, objectives, introduction
  # -------------------------------------------------------------------------
  - task_id: "section_1_setup"
    prompt: |
      You are creating a discussion guide for a user research session. This is TASK 1 of 4.
      
      Generate ONLY these sections:
      1. Study name (concise, max 8 words)
      2. Timing breakdown table
      3. Research objectives (3-5)
      4. Introduction script
      
      ============================================================
      INPUT
      ============================================================
      
      **Research Focus:** {{research_focus}}
      **Research Questions:** {{research_questions}}
      **Participants:** {{participants}}
      **Research Method:** {{research_method}}
      **Session Length:** {{session_length}} minutes
      
      ============================================================
      GENERATE OUTPUT
      ============================================================
      
      ## Study Name
      
      [Generate concise study name, max 8 words]
      
      ---
      
      ## ⏱️ Session Timing
      
      | Phase | Duration | Running Total |
      |-------|----------|---------------|
      | Introduction & Consent | X min | X min |
      | Warm-up Questions | X min | X min |
      | Main Research Activities | X min | X min |
      | Post-Activity Discussion | X min | X min |
      | Closing & Wrap-up | X min | {{session_length}} min |
      
      *Ensure times add up to exactly {{session_length}} minutes.*
      
      ---
      
      ## 🎯 Research Objectives
      
      1. [Specific, measurable objective tied to research questions]
      2. [Specific, measurable objective]
      3. [Specific, measurable objective]
      
      ---
      
      ## 👋 Introduction Script
      
      **Welcome & Thank You**
      
      [Write natural script thanking participant, introducing yourself]
      
      **Session Purpose**
      
      [Explain what you're researching and why their input matters - tailor to {{research_method}}]
      
      **Consent & Recording**
      
      [Explain recording, get verbal consent, emphasize confidentiality]
      
      **Ground Rules**
      
      [No right/wrong answers, think aloud, can skip questions, take breaks]
      
      **Questions Before We Begin**
      
      "Do you have any questions before we get started?"
      
      [END OF TASK 1 — Do not generate beyond this point]

  # -------------------------------------------------------------------------
  # TASK 2: Warm-up questions and main activities (method-specific)
  # -------------------------------------------------------------------------
  - task_id: "section_2_activities"
    prompt: |
      You are creating a discussion guide for a user research session. This is TASK 2 of 4.
      
      Generate ONLY these sections:
      1. Warm-up questions (4-5)
      2. Main research activities (method-specific)
      
      ============================================================
      INPUT
      ============================================================
      
      **Research Focus:** {{research_focus}}
      **Research Questions:** {{research_questions}}
      **Participants:** {{participants}}
      **Research Method:** {{research_method}}
      **Session Length:** {{session_length}} minutes
      **Testing URL:** {{testing_url}}
      
      ============================================================
      GENERATE OUTPUT
      ============================================================
      
      ## 🗣️ Warm-up Questions
      
      *Build rapport and ease participant into the session.*
      
      1. [Open-ended question about their background/experience]
         - *Why this matters:* [Brief note for researcher]
      
      2. [Question connecting to research topic]
         - *Why this matters:* [Brief note]
      
      3. [Question about current behaviors/habits]
         - *Why this matters:* [Brief note]
      
      4. [Question that naturally transitions to main activities]
         - *Why this matters:* [Brief note]
      
      ---
      
      ## 🎯 Main Research Activities
      
      {% if research_method == "usability_testing" %}
      *For each task, read the scenario and instruction verbatim. Observe without helping unless participant is completely stuck.*
      
      ### Task 1: [Clear Task Name]
      
      **Time:** X minutes
      
      **Scenario:** 
      [Set up a realistic situation]
      
      **Instruction to Participant:**
      "[Exact words to say]"
      
      **Success Criteria:**
      - [What completion looks like]
      
      **What to Observe:**
      - [Specific behaviors]
      - [Pain points]
      - [Navigation patterns]
      
      **Probing Questions:**
      - [Question during/after task]
      - [Question about thought process]
      
      ---
      
      ### Task 2: [Task Name]
      [Same format]
      
      ---
      
      ### Task 3: [Task Name]
      [Same format]
      
      {% elif research_method == "user_interviews" %}
      *These are open-ended questions to explore experiences and mental models. Follow the participant's lead and probe deeper on interesting responses.*
      
      ### Topic Area 1: [Topic Name]
      
      **Primary Question:**
      "[Main question to ask]"
      
      **Follow-up Probes:**
      - [Probe for details]
      - [Probe for feelings/reactions]
      - [Probe for specific examples]
      
      **Listen For:**
      - [Themes to note]
      - [Mental models]
      
      ---
      
      ### Topic Area 2: [Topic Name]
      [Same format]
      
      ---
      
      ### Topic Area 3: [Topic Name]
      [Same format]
      
      {% elif research_method == "concept_testing" %}
      *Show each concept and gather reactions. Don't explain or defend the concept — let participants react naturally.*
      
      ### Concept 1: [Concept Name]
      
      **Show:** [What to display]
      
      **Initial Reaction:**
      "What's your first impression of this?"
      
      **Comprehension:**
      "What do you think this is for? How would you use it?"
      
      **Value:**
      "How useful would this be for you? Why or why not?"
      
      **Comparison:**
      "How does this compare to how you do this today?"
      
      ---
      
      ### Concept 2: [Concept Name]
      [Same format]
      
      {{else}}
      *Adapt these activities to your specific research method.*
      
      ### Activity 1: [Activity Name]
      
      **Setup:**
      [How to introduce this activity]
      
      **Instructions:**
      "[What to say to participant]"
      
      **What to Capture:**
      - [Key observations]
      - [Quotes to note]
      
      ---
      
      ### Activity 2: [Activity Name]
      [Same format]
      
      {% endif %}
      
      [END OF TASK 2 — Do not generate beyond this point]

  # -------------------------------------------------------------------------
  # TASK 3: Post-session interview and closing
  # -------------------------------------------------------------------------
  - task_id: "section_3_closing"
    prompt: |
      You are creating a discussion guide for a user research session. This is TASK 3 of 4.
      
      Generate ONLY these sections:
      1. Post-session interview questions (6-8)
      2. Closing script
      
      ============================================================
      INPUT
      ============================================================
      
      **Research Focus:** {{research_focus}}
      **Research Questions:** {{research_questions}}
      **Research Method:** {{research_method}}
      
      ============================================================
      GENERATE OUTPUT
      ============================================================
      
      ## 💭 Post-Session Interview
      
      *Ask these after completing all main activities.*
      
      1. **Overall Impressions**
         "[Question about overall experience]"
         - *Follow-up if needed:* [Probing question]
      
      2. **Pain Points**
         "[Question about difficulties or frustrations]"
         - *Follow-up if needed:* [Probing question]
      
      3. **Expectations**
         "[Question about expectations vs reality]"
         - *Follow-up if needed:* [Probing question]
      
      4. **Mental Model**
         "[Question about understanding/mental model]"
         - *Follow-up if needed:* [Probing question]
      
      5. **Improvements**
         "[Question about what would make it better]"
         - *Follow-up if needed:* [Probing question]
      
      6. **Comparison**
         "[Question comparing to alternatives/current process]"
         - *Follow-up if needed:* [Probing question]
      
      7. **Likelihood to Use**
         "On a scale of 1-10, how likely would you be to use this? What would make it a 10?"
      
      8. **Anything Else**
         "Is there anything else you'd like to share that I didn't ask about?"
      
      ---
      
      ## 🎁 Closing Script
      
      **Thank You**
      
      [Warm, genuine thank you for their time and insights]
      
      **Next Steps**
      
      [Brief explanation of what happens with their feedback]
      
      **Compensation**
      
      [PLACEHOLDER: Compensation details — update before session]
      
      **Follow-up**
      
      [Contact info if they have questions later]
      
      **Final Question**
      
      "Any final questions for me before we wrap up?"
      
      [END OF TASK 3 — Do not generate beyond this point]

  # -------------------------------------------------------------------------
  # TASK 4: Synthesis prompts and appendix
  # -------------------------------------------------------------------------
  - task_id: "section_4_appendix"
    prompt: |
      You are creating a discussion guide for a user research session. This is TASK 4 of 4.
      
      Generate ONLY these sections:
      1. Synthesis prompts for researchers
      2. Emergency procedures
      
      ============================================================
      INPUT
      ============================================================
      
      **Research Focus:** {{research_focus}}
      **Research Questions:** {{research_questions}}
      
      ============================================================
      GENERATE OUTPUT
      ============================================================
      
      ## 📝 Synthesis Prompts
      
      *Questions to ask yourself after sessions.*
      
      **After Each Session:**
      
      1. What patterns am I seeing related to {{research_focus}}?
      2. What surprised me about this participant's experience?
      3. What needs deeper investigation in remaining sessions?
      4. What quotes or moments were most revealing?
      
      **After All Sessions:**
      
      5. What are the top 3-5 themes across all participants?
      6. How confident am I in these findings? What's still unclear?
      7. What recommendations emerge from these patterns?
      
      ---
      
      ## 🚨 Emergency Procedures
      
      **Technical Issues:**
      - Have backup meeting link ready
      - Screen share troubleshooting: Check browser permissions, try different browser
      - Have phone number as backup contact method
      
      **Participant Distress:**
      - Pause session immediately and check comfort level
      - Remind participant they can stop at any time
      - Remind them there are no wrong answers
      - For veterans: VA Crisis Line: 988, Press 1 (24/7 support)
      
      **Data/Privacy Concerns:**
      - Reassure about data handling and anonymization
      - Review consent form if needed
      - Stop recording immediately if requested
      
      ---
      
      ## 📋 Checklists
      
      **Before Session:**
      - [ ] Recording software ready and tested
      - [ ] Screen sharing tested
      - [ ] Prototype/product accessible
      - [ ] Consent form ready
      - [ ] Compensation prepared
      - [ ] Backup facilitator available
      - [ ] Discussion guide printed/accessible
      
      **After Session:**
      - [ ] Save and backup recording
      - [ ] Transfer notes to research repository
      - [ ] Send thank you message
      - [ ] Process compensation within 24 hours
      - [ ] Update participant tracker
      - [ ] Complete synthesis prompts while fresh
      
      [END OF TASK 4]

# Processing workflow
processing_workflow:
  - validate_inputs
  - execute_ai_generation_tasks
  - concatenate_task_outputs
  - populate_template
  - save_to_outputs

# Output template - concatenates all task outputs
output_template: |
  # 💬 Discussion Guide
  
  {{ai_generated.section_1_setup}}
  
  ---
  
  {{ai_generated.section_2_activities}}
  
  ---
  
  {{ai_generated.section_3_closing}}
  
  ---
  
  {{ai_generated.section_4_appendix}}
  
  ---
  
  *Generated by Qori • {{current_date}}*

# Output configuration
output_options:
  filename: "discussion_guide_{{selected_study}}_{{current_date}}.md"
  path: "01-planning/"
  
  delivery:
    github:
      enabled: true
      commit_message: "Add discussion guide for {{selected_study}}"
      
    slack:
      enabled: true
      channel: "{{study_channel}}"
      message: |
        💬 **Discussion Guide Generated**
        **Study:** {{selected_study}}
        **Method:** {{research_method}}
        **Duration:** {{session_length}} minutes
        **Ready for session prep.**
      
      actions:
        - text: "📋 View Guide"
          style: "primary"
          url: "{{github_file_url}}"

# Validation rules
validation_rules:
  - rule: "all_sections_present"
    description: "All 4 task outputs must be present"
    check: "output contains Study Name, Timing, Objectives, Introduction, Warm-up, Activities, Interview, Closing, Synthesis"
  - rule: "method_appropriate_content"
    description: "Main activities should match selected research method"
    check: "if usability_testing then contains 'Task' else if user_interviews then contains 'Topic Area'"
