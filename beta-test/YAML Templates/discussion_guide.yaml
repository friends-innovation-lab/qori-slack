id: discussion_guide_v4
name: run_discussion_guide
label: 💬 Discussion Guide
version: v4.0

# Simplified input variables
input_variables:
  - research_focus          
  - research_questions      
  - participants           
  - testing_url           
  - session_length        

# Single AI task for everything
ai_generation_tasks:
  - task_id: "generate_complete_guide"
    prompt: |
      Create a complete discussion guide from:
      
      Research Focus: {{research_focus}}
      Research Questions: {{research_questions}}
      Participants: {{participants}}
      Session Length: {{session_length}} minutes
      Testing URL: {{testing_url}}
      
      Generate a clean, structured discussion guide with:
      1. Study name (derived from research focus)
      2. Session timing breakdown
      3. 3-4 warm-up questions specific to participants
      4. 2-4 tasks based on session length and research focus
      5. Post-session interview questions
      
      Format as clean markdown with proper headers and timing.

# Clean, minimal output template
output_template: |
  # 💬 Discussion Guide — {{generated_study_name}}

  **Duration:** {{session_length}} minutes  
  **Participants:** {{participants}}  
  **Date:** {{current_date}}

  {% if testing_url %}
  **Testing URL:** {{testing_url}}
  {% endif %}

  ---

  ## 🚨 Emergency Procedures

  **Technical Issues:**
  - Have backup meeting link ready
  - Contact technical support if needed

  **Participant Distress:**
  - Pause session and check comfort level
  - Remind about voluntary participation
  - VA Crisis Line: 988, Press 1

  ---

  {{generated_complete_guide}}

  ---

  **Generated:** {{current_date}}

# Simple delivery
output_options:
  filename: "discussion_guide_{{current_date}}.md"
  path: "01-planning/"
