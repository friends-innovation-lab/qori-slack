id: discussion_guide
name: run_discussion_guide
label: 💬 Discussion Guide
version: v2.1
description: |
  Generate VA-aligned conversation guides for moderated research sessions. Creates structured discussion guides with timing, tasks, warm-up questions, and observer instructions following VA research standards and best practices.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-07

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.4
  max_tokens: 4000

input_type: text
input_processing: summarize_if_long
precision_mode: detailed

# Input schema for Slack UI
input_variables:
  - input_text           # Research objectives, tasks, participant info (REQUIRED)
  - study_name           # Title of study (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to notify completion (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Who to notify (OPTIONAL)

# AI Generation Tasks - These will be processed sequentially
ai_generation_tasks:
  - task_id: "session_analysis"
    prompt: |
      Analyze the research objectives and tasks described in: "{{input_text}}"
      
      Determine and provide in this exact format:
      Session Type: [Usability Testing|Discovery Interview|Concept Validation|Card Sort|Tree Test|etc.]
      Duration: [30|45|60|90] minutes
      Task Count: [2-5 based on complexity]
      Participant Type: [Veteran|Caregiver|Service Member|Dependent|etc.]
      
      Base your analysis on the complexity, objectives, and scope described in the input text.

  - task_id: "warmup_questions"
    prompt: |
      Create 3-4 warm-up questions appropriate for the participant type and study context based on: "{{input_text}}"
      
      Questions should:
      - Help participants feel comfortable
      - Be relevant to the research domain
      - Build rapport and context
      - Use plain, conversational language
      
      Format as a bulleted list with clear, friendly questions.

  - task_id: "task_sections"
    prompt: |
      Based on the research objectives in "{{input_text}}", create structured task sections for the discussion guide.
      
      For each task, provide:
      - Clear step-by-step instructions for the moderator
      - Specific things for observers to watch for
      - Estimated timing (5-15 minutes per task)
      - Natural progression from simple to complex
      
      Format each task as:
      ## 🎯 Task [Number]: [Task Name] – [X Minutes]
      
      **Instructions for Moderator:**
      [Step-by-step instructions]
      
      **Things to Watch For:**
      [Observer notes and what to look for]
      
      Create 2-4 tasks based on the complexity and objectives described.

  - task_id: "post_task_questions"
    prompt: |
      Create 4-5 post-task interview questions based on the research objectives in "{{input_text}}"
      
      Questions should:
      - Gather overall impressions and feedback
      - Address any gaps from task sections
      - Be open-ended and encourage reflection
      - Relate to the specific research goals
      
      Format as a bulleted list with thoughtful, probing questions.

  - task_id: "emergency_procedures"
    prompt: |
      Create VA-approved emergency exit language for research sessions that covers:
      - Technical difficulties during the session
      - Participant distress or discomfort
      - Inappropriate content or behavior
      - Session termination procedures
      - Contact information for support
      
      Use professional, supportive language that prioritizes participant well-being.

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. parse_session_analysis
  4. populate_template
  5. save_to_outputs

# Output template with AI generation placeholders
output_template: |
  # 💬 Discussion Guide – {{study_name}}

  **Session Type:** {{parsed_session_type}}  
  **Duration:** {{parsed_duration}}  
  **Participant:** {{parsed_participant_type}}  
  **Moderator:** {{researcher_contact}}

  ## 📋 Moderator Logistics

  ### 2–3 Days Before Session
  - [ ] Schedule and confirm sessions with {{parsed_participant_type}}
  - [ ] Review platform research checklist
  - [ ] Complete project-specific prep tasks for {{study_name}}
  - [ ] Send calendar invites to {{team_members}}

  ### Day of the Session
  - [ ] Mute Slack notifications
  - [ ] Check screen sharing permissions
  - [ ] Send observer instructions to {{team_members}}
  - [ ] Join feedback Slack channel: {{study_channel}}

  ## 🗣️ Intro – 5 Minutes

  Welcome the participant. Cover:
  - Session duration (~{{parsed_duration}})
  - That feedback is welcome and voluntary
  - Consent for screen/audio recording
  - Confirmation of observer presence
  - If applicable, explain it's a prototype
  - Reconfirm VA clip usage consent

  > **Prompt**: "Are you okay with being recorded and having observers? This helps our team learn from your experience."

  ## ❄️ Warm-Up Questions – 5 Minutes
  {{ai_generated.warmup_questions}}

  ## 🧪 Task Sections

  {{ai_generated.task_sections}}

  ## 🎤 Post-Task Interview – 10 Minutes
  {{ai_generated.post_task_questions}}

  ## 🔁 Reconfirm Clip Consent
  "Are you still comfortable with us using a short video clip (with de-identified info) to share with internal VA teams? This helps us communicate your feedback to decision-makers."

  ## 🙏 Thank You & Closing – 5 Minutes
  - Thank participant for their time and insights
  - Mention follow-up/thank-you note timeline
  - Offer opt-in for future research opportunities
  - Provide contact information: {{researcher_contact}}

  ## 🚨 Emergency Exit Strategy
  {{ai_generated.emergency_procedures}}

  ## 📝 Observer Instructions
  **For {{team_members}}:**
  - Take notes on participant reactions and quotes
  - Note technical issues or usability problems
  - Avoid interrupting unless technical emergency
  - Upload notes using `/upload-notes` after session

  ---
  **Guide created:** {{current_date}}  
  **Study details:** {{study_link}}

# Output configuration
output_options:
  # File settings
  filename: "discussion_guide_{{study_name_slug}}_{{current_date}}.md"
  path: "01-planning/"
  
  # Delivery methods (multiple can be enabled)
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add discussion guide for {{study_name}}"
      
    slack:
      enabled: true
      channel: "{{study_channel}}"
      notify_user: "{{researcher_contact}}"
      team_members: "{{team_members}}"
      message: "💬 Discussion guide for {{study_name}} has been created and saved. {{parsed_duration}} {{parsed_session_type}} guide ready for {{parsed_participant_type}} sessions."
      include_preview: false
      actions:
        - text: "📝 View Guide"
          url: "{{github_file_link}}"
        - text: "✅ Create Pre-Session Reminder"
          action: "create_calendar_reminder"
    
    email:
      enabled: false
      # Future: email delivery options
      
    teams:
      enabled: false
      # Future: Teams delivery options

output_use: |
  CivicMind Discussion Guide generator creates VA-compliant conversation guides for research sessions. Ensures consistent structure, timing, and coverage of key research objectives while maintaining VA standards for participant consent and ethics.
