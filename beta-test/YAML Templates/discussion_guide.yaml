id: discussion_guide
name: run_discussion_guide
label: 💬 Discussion Guide
version: v2.4
description: |
  Generate VA-aligned conversation guides for moderated research sessions. Creates structured discussion guides with timing, tasks, warm-up questions, and observer instructions following VA research standards and best practices. Automatically refines informal inputs to create professional, actionable session guides.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-10

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.4
  max_tokens: 4000

input_type: text
input_processing: summarize_if_long
precision_mode: detailed

# Input schema for Slack UI
input_variables:
  - input_text           # Research objectives, tasks, participant info (REQUIRED)
  - study_name           # Title of study (REQUIRED)
  - researcher_contact   # Lead researcher name and contact (REQUIRED)
  - study_channel        # Slack channel for notifications (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Team members to notify, comma-separated (OPTIONAL)

# AI Generation Tasks - These will be processed sequentially
ai_generation_tasks:
  - task_id: "refined_input_text"
    prompt: |
      Improve and clarify the research input provided: "{{input_text}}"
      
      Rewrite to be more professional and specific while preserving the original intent:
      - Fix informal language and grammar issues
      - Make vague objectives more specific and actionable
      - Clarify participant information and research context
      - Maintain the core research goals and scope
      - Use proper UX research terminology
      
      Structure the improved version to clearly separate:
      - Research objectives (what you want to learn)
      - Tasks or scenarios (what participants will do)
      - Participant context (who and why)
      
      If input is very brief, expand appropriately based on apparent intent while staying true to the scope.

  - task_id: "session_overview"
    prompt: |
      Analyze the refined research objectives and create a session overview in this exact format (fill in ALL fields with realistic values):
      **Session Type:** [Choose: Usability Testing/Discovery Interview/Concept Validation/Card Sort/Tree Test/Focus Group]  
      **Duration:** [Choose: 30/45/60/90] minutes  
      **Participant:** [Choose: Veteran/Caregiver/Service Member/Dependent/VA Staff/General Public]
      
      Base decisions on the refined research content, using these guidelines:
      - If testing interfaces or specific tasks → Usability Testing (60-90 min)
      - If exploring experiences or attitudes → Discovery Interview (45-60 min)
      - If evaluating concepts or ideas → Concept Validation (30-45 min)
      - If organizing information → Card Sort (45-60 min)
      - Duration should match complexity and number of tasks
      - Participant type should align with VA research context and stated objectives
      
      If input is still vague after refinement, use defaults: "Discovery Interview", "60 minutes", "Veteran"

  - task_id: "warmup_questions"
    prompt: |
      Create 3-4 warm-up questions based on the refined research context.
      
      Questions should:
      - Build rapport and make participants comfortable
      - Be specific to the research domain identified in the refined input
      - Use plain, conversational language
      - Connect to the participant's relevant experience
      
      If refined input mentions:
      - VA benefits → Ask about experience with VA services
      - Healthcare → Ask about healthcare experiences  
      - Digital tools/websites → Ask about technology comfort level
      - Forms/applications → Ask about online form experiences
      - Claims/status → Ask about previous claim experiences
      
      If refined input is still general, create VA-focused questions about:
      - Experience with VA services or websites
      - Comfort with digital platforms
      - Previous interactions with government services
      
      Format as bullet points with natural, friendly questions that feel conversational.

  - task_id: "task_sections"
    prompt: |
      Create 2-4 specific, actionable task sections based on the refined research objectives.
      
      Each task must include:
      - Concrete, step-by-step moderator instructions based on refined objectives
      - Specific observer notes (not generic "watch for confusion")
      - Realistic 5-15 minute timing based on task complexity
      - Clear objectives tied to the refined research goals
      
      Task progression should be: simple → complex, broad → specific
      
      If refined input mentions specific features/processes, create tasks around those.
      If refined input is still general, create realistic VA-focused tasks such as:
      - Navigation/wayfinding tasks
      - Form completion scenarios  
      - Information-seeking tasks
      - Status checking or account management
      
      Format each task exactly as:
      ## 🎯 Task [Number]: [Specific Task Name] – [X Minutes]
      
      **Instructions for Moderator:**
      1. [Specific numbered step with clear action]
      2. [Specific numbered step with clear action]
      3. [Specific numbered step with clear action]
      
      **Things to Watch For:**
      - [Specific behavior, struggle, or success indicator]
      - [Specific usability issue or user reaction]
      - [Specific area of confusion or clarity]
      
      Make tasks concrete and actionable - avoid generic instructions like "explore the interface."

  - task_id: "post_task_questions"
    prompt: |
      Create 4-5 post-task interview questions based on the refined research objectives.
      
      Questions should:
      - Focus on overall experience and impressions (not the research process itself)
      - Gather actionable feedback for design/product decisions
      - Be open-ended and encourage reflection
      - Connect to specific research objectives from the refined input
      
      Avoid meta-questions about "the tasks" or "research objectives"
      Instead focus on:
      - Overall experience with the product/service/process tested
      - What worked well vs. what was challenging
      - Comparison to expectations or similar experiences
      - Confidence in using the service independently
      - Specific improvement suggestions
      
      If refined input mentions specific areas, tailor questions to those.
      If refined input is still general, create VA-focused questions about:
      - Overall experience with the digital service
      - Comparison to other government services
      - Confidence and comfort level using VA services
      - Specific pain points or successes encountered
      - Recommendations for improvement
      
      Format as bullet points with thoughtful, open-ended questions.

  - task_id: "emergency_procedures"
    prompt: |
      Create comprehensive emergency exit procedures for VA research sessions. Write from the moderator's perspective with specific action steps for each scenario:
      
      **Technical Difficulties:**
      - Pause recording immediately and inform participant of technical issues
      - Attempt basic troubleshooting (refresh browser, check connection, restart application)
      - If issues persist beyond 5 minutes, offer to reschedule at participant's convenience
      - Document technical problems encountered for future session planning
      
      **Participant Distress:**
      - Immediately pause the session and ask if participant needs a break
      - Remind participant that participation is voluntary and they can stop at any time
      - Offer mental health resources if participant expresses distress related to military service
      - Allow participant to collect themselves and decide whether to continue
      
      **Inappropriate Content/Behavior:**
      - Calmly but firmly redirect conversation back to research topics
      - If behavior continues, politely end the session: "I think we have enough information for today"
      - Document incident details immediately after session
      - Contact research supervisor within 24 hours for guidance on next steps
      
      **Session Termination:**
      - Save and secure any recordings immediately
      - Thank participant professionally regardless of reason for termination
      - Complete incident documentation including time, reason, and participant response
      - Follow up with participant via email if appropriate
      
      **Support Contacts:**
      - VA Research Ethics Office: research.ethics@va.gov | (202) 443-5930
      - Study supervisor: [Insert supervisor contact from research protocol]
      - Mental health crisis support: Veterans Crisis Line 1-800-273-8255
      - For immediate emergencies: 911
      
      Remember: Participant well-being is always the top priority over research objectives.

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. validate_generated_content
  4. populate_template
  5. save_to_outputs

# Output template with refined content
output_template: |
  # 💬 Discussion Guide – {{study_name}}

  {{ai_generated.session_overview}}  
  **Moderator:** {{researcher_contact}}

  ---

  ## 📋 Moderator Logistics

  ### 2–3 Days Before Session
  - [ ] Schedule and confirm sessions with participants
  - [ ] Review platform research checklist
  - [ ] Complete project-specific prep tasks for {{study_name}}
  - [ ] Send calendar invites to {{team_members}}

  ### Day of the Session
  - [ ] Mute Slack notifications
  - [ ] Check screen sharing permissions
  - [ ] Send observer instructions to {{team_members}}
  - [ ] Join feedback Slack channel: {{study_channel}}

  ---

  ## 🗣️ Intro – 5 Minutes

  Welcome the participant. Cover:
  - Session duration and purpose
  - That feedback is welcome and voluntary
  - Consent for screen/audio recording
  - Confirmation of observer presence
  - If applicable, explain it's a prototype
  - Reconfirm VA clip usage consent

  > **Prompt**: "Are you okay with being recorded and having observers? This helps our team learn from your experience."

  ---

  ## ❄️ Warm-Up Questions – 5 Minutes
  {{ai_generated.warmup_questions}}

  ---

  ## 🧪 Task Sections

  {{ai_generated.task_sections}}

  ---

  ## 🎤 Post-Task Interview – 10 Minutes
  {{ai_generated.post_task_questions}}

  ---

  ## 🔁 Reconfirm Clip Consent
  "Are you still comfortable with us using a short video clip (with de-identified info) to share with internal VA teams? This helps us communicate your feedback to decision-makers."

  ---

  ## 🙏 Thank You & Closing – 5 Minutes
  - Thank participant for their time and insights
  - Mention follow-up/thank-you note timeline
  - Offer opt-in for future research opportunities
  - Provide contact information: {{researcher_contact}}

  ---

  ## 🚨 Emergency Exit Strategy
  {{ai_generated.emergency_procedures}}

  ---

  ## 📝 Observer Instructions
  **For {{team_members}}:**
  - Take notes on participant reactions and quotes
  - Note technical issues or usability problems
  - Avoid interrupting unless technical emergency
  - Upload notes using `/upload-notes` after session

  ---
  **Guide created:** {{current_date}}  
  **Study details:** {{study_link}}

# Output configuration
output_options:
  # File settings
  filename: "discussion_guide_{{study_name}}_{{current_date}}.md"
  path: "03-fieldwork/"
  
  # Delivery methods (multiple can be enabled)
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add discussion guide for {{study_name}}"
      
    slack:
      enabled: true
      channel: "{{study_channel}}"
      notify_user: "{{researcher_contact}}"
      team_members: "{{team_members}}"
      message: "💬 Discussion guide for {{study_name}} has been created and saved. Research session guide ready for fieldwork."
      include_preview: false
      actions:
        - text: "📝 View Guide"
          url: "{{github_file_link}}"
        - text: "✅ Create Pre-Session Reminder"
          action: "create_calendar_reminder"
    
    email:
      enabled: false
      # Future: email delivery options
      
    teams:
      enabled: false
      # Future: Teams delivery options

output_use: |
  CivicMind Discussion Guide generator creates VA-compliant conversation guides for research sessions. Automatically refines informal or unclear research inputs to create professional, actionable session guides. Ensures consistent structure, timing, and coverage of key research objectives while maintaining VA standards for participant consent and ethics.

output_notes: |
  Input refinement: AI automatically improves clarity and professionalism of research objectives while preserving original intent.
  Content quality: AI tasks include specific instructions for handling vague or incomplete research objectives.
  VA compliance: All generated content follows VA research standards and ethical guidelines.
  Quality control: Transforms informal inputs into professional moderator-ready session guides.
  Format consistency: Maintain professional formatting with proper timing and clear moderator instructions.
