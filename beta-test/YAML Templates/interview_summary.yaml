id: session_summary
name: generate_session_summary
label: 📋 Generate Session Summary
version: v3.0
description: Generate concise session summary from coded transcript with top pain points, opportunities, insights, quotes, and action items

author: Research Ops Team
created: 2025-10-16
last_updated: 2025-10-16

llm_config:
  model: "claude-sonnet-4"
  temperature: 0.3
  max_tokens: 3000

input_type: coded_transcript
input_processing: synthesize_and_summarize

input_variables:
  participant_id: "{{participant_id}}"
  coded_transcript_path: "{{coded_transcript_path}}"
  coded_transcript_content: "{{coded_transcript_content}}"
  session_date: "{{session_date}}"
  study_name: "{{study_name}}"
  current_date: "{{current_date}}"
  analyzer: "{{analyzer}}"

ai_generation_tasks:
  
  - task_id: "top_pain_points"
    prompt: |
      You are creating a session summary from an already-coded research transcript.
      
      **Coded Transcript:**
      {{coded_transcript_content}}
      
      From the Pain Points section, extract the TOP 3 most critical issues.
      Use the EXACT severity levels and descriptions already provided in the coded transcript.
      
      Requirements:
      - Select based on severity (Critical > High > Medium > Low)
      - Use exact wording from the coded transcript
      - Keep descriptions concise (1-2 sentences max)
      
      Format each as:
      **[Severity] - [Title]**
      [Description from coded transcript]

  - task_id: "key_opportunities"
    prompt: |
      From the Opportunities section of the coded transcript, extract the TOP 2-3 opportunities.
      
      **Coded Transcript:**
      {{coded_transcript_content}}
      
      Requirements:
      - Prioritize High Impact and Quick Win items
      - Use exact titles and descriptions from coded transcript
      - Keep descriptions concise
      
      Format each as:
      **[Impact Level] - [Title]**
      [Description from coded transcript]
      
      If there are no opportunities in the coded transcript, output: "*No opportunities were identified in this session.*"

  - task_id: "key_insights"
    prompt: |
      From the Key Insights section of the coded transcript, extract the TOP 2-3 most revealing insights.
      
      **Coded Transcript:**
      {{coded_transcript_content}}
      
      Requirements:
      - Prioritize insights that reveal user behavior, mental models, or workflow patterns
      - Use exact insight types and descriptions from coded transcript
      - Keep descriptions concise
      
      Format each as:
      **[Insight Type] - [Title]**
      [Description from coded transcript]
      
      If there are no insights in the coded transcript, output: "*No key insights were identified in this session.*"

  - task_id: "top_quotes"
    prompt: |
      Extract 3-5 of the most impactful participant quotes from the coded transcript.
      
      **Coded Transcript:**
      {{coded_transcript_content}}
      
      Requirements:
      - Use EXACT quotes (verbatim) from the coded transcript
      - Include timestamps
      - Prioritize quotes that illustrate pain points, opportunities, or insights
      - Choose quotes that are specific and revealing
      
      Format each as:
      *"[Exact quote]"* [timestamp]

  - task_id: "action_items"
    prompt: |
      Based on the coded transcript findings, generate 3-5 prioritized action items for the team.
      
      **Coded Transcript:**
      {{coded_transcript_content}}
      
      Requirements:
      - Prioritize by severity/impact (Critical pain points → Quick wins → High impact opportunities)
      - Make actions specific and achievable
      - Reference the specific pain points or opportunities
      - Use action-oriented language
      
      Format each as:
      - **[Priority Level]:** [Specific action item]

  - task_id: "summary_stats"
    prompt: |
      Extract the coding summary statistics from the coded transcript.
      
      **Coded Transcript:**
      {{coded_transcript_content}}
      
      From the "Coding Summary" section, extract:
      - Total codes found
      - Pain points count
      - Opportunities count
      - Insights count
      - Positive feedback count
      - Usability issues count
      
      Format as:
      **Total Codes:** [number] ([x] pain points, [y] opportunities, [z] insights, [n] positive feedback, [m] usability issues)

output_template: |
  # 📋 Session Summary - {{participant_id}}

  **Study:** {{study_name}}  
  **Date:** {{session_date}}

  ---

  ## 🔴 Top Pain Points

  {{ai_generated.top_pain_points}}

  ---

  ## 🟡 Key Opportunities

  {{ai_generated.key_opportunities}}

  ---

  ## 💡 Key Insights

  {{ai_generated.key_insights}}

  ---

  ## 💬 Top Quotes

  {{ai_generated.top_quotes}}

  ---

  ## ✅ Recommended Actions

  {{ai_generated.action_items}}

  ---

  **📊 Analysis Overview:** {{ai_generated.summary_stats}}

output_options:
  filename: "{{participant_id}}-session-summary-{{session_date}}.md"
  path: "03-fieldwork/session-summaries/"
  
  delivery:
    github:
      enabled: true
      commit_message: "📋 {{participant_id}} session summary - {{session_date}}"
      
    slack:
      enabled: true
      
      dm_notification:
        enabled: true
        target_user: "{{analyzer}}"
        message: |
          ✅ **Session Summary Ready** - {{participant_id}}
          
          📂 **Study:** {{study_name}}
          📅 **Session Date:** {{session_date}}
          🕐 **Generated:** {{current_date}}
          
          Quick preview:
          🔴 {{pain_points_count}} pain points identified
          🟡 {{opportunities_count}} opportunities found
          💡 {{insights_count}} key insights
          
          Ready to share with your team? 👇
        
        actions:
          - text: "📤 Share to Channel"
            style: "primary"
            action_id: "share_summary_to_channel"
          - text: "📖 View Full Summary"
            style: "default"
            url: "{{github_file_url}}"
          - text: "🔍 View Coded Transcript"
            style: "default"
            url: "{{coded_transcript_url}}"

sharing_workflow:
  channel_message: |
    📋 **Session Summary** — {{participant_id}}
    
    **Study:** {{study_name}} | **Date:** {{session_date}}
    
    **🔴 Top Pain Point:**
    {{top_pain_point_preview}}
    
    **🟡 Top Opportunity:**
    {{top_opportunity_preview}}
    
    **💡 Key Insight:**
    {{top_insight_preview}}
    
    📖 [Read full summary]({{github_summary_url}}) | 🔍 [View coded transcript]({{github_coded_transcript_url}})
  
  channel_actions:
    - text: "📖 Read Full Summary"
      url: "{{github_summary_url}}"
    - text: "🔍 View Coded Transcript"
      url: "{{github_coded_transcript_url}}"
    - text: "💬 Start Discussion"
      action_id: "start_discussion_thread"

processing_rules:
  source_is_coded_transcript: true
  preserve_exact_quotes: true
  prioritize_by_severity: true
  link_to_coded_transcript: true
  
validation_rules:
  require_coded_transcript: true
  minimum_pain_points: 1
  validate_quote_format: true
  check_timestamp_presence: true

quality_assurance:
  verify_quote_accuracy: true
  check_severity_labels: true
  validate_impact_levels: true
  ensure_insight_types: true
  cross_reference_codes: true

output_use: |
  Session summary generator that synthesizes already-coded research transcripts into concise, 
  shareable summaries. Pulls top pain points, opportunities, insights, and quotes from coded 
  analysis for quick team communication and decision-making.

notes: |
  Key Design Decisions:
  - Pulls from coded transcript (not raw notes) to avoid re-analysis
  - Preserves exact severity/impact labels from coding
  - Uses verbatim quotes with timestamps
  - Links to full coded transcript for details
  - Prioritizes by severity/impact for action planning
  - Includes opportunities and insights (not just pain points)
  - Central folder structure: 03-fieldwork/session-summaries/ (all summaries in one place)
  - Filename includes participant ID: pt005-session-summary-2025-10-16.md
```

---

