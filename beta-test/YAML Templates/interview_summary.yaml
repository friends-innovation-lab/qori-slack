# STREAMLINED INTERVIEW SUMMARY - Simple Note Analysis

id: analyze_notes
name: analyze_session_notes
label: 📝 Analyze Notes
version: v2.0
description: Generate quick summary with top pain points, quotes, and observations from session notes for easy team sharing

author: CivicMind R&D
created: 2025-08-11
last_updated: 2025-08-12

# LLM Configuration
llm_config:
  model: "gpt-4"
  temperature: 0.3
  max_tokens: 2000

input_type: structured
input_processing: combine_and_analyze

# Simple inputs matching current Slack UI
input_variables:
  study_folder: "{{study_folder}}"                   # Selected research study folder (e.g., "Benefits Portal Usability")
  study_name: "{{study_name}}"                       # Display name of the study
  selected_note_files: "{{selected_note_files}}"     # Array of selected note file paths
  note_content: "{{note_content}}"                   # Combined content from all selected files
  note_takers: "{{note_takers}}"                     # Auto-extracted from file names (jordan, sarah.m, mike.t)
  participant_ids: "{{participant_ids}}"             # Auto-detected from file names (bp001, bp002, bp003)
  current_date: "{{current_date}}"
  analyzer: "{{analyzer}}"                           # User who ran the analysis

# Simple AI generation tasks
ai_generation_tasks:
  # Extract top 3 pain points
  - task_id: "pain_points"
    prompt: |
      As a UX researcher, extract the TOP 3 most significant pain points from these session notes:

      **Notes to analyze:**
      {{note_content}}

      Requirements:
      - Focus on the most impactful user problems
      - Be specific and actionable
      - Use clear, direct language
      - Prioritize by user impact and frequency mentioned

      Format each as: **[Pain Point Category]:** [Specific description]

  # Extract key quotes
  - task_id: "key_quotes"
    prompt: |
      Extract 3-5 key participant quotes that best illustrate important insights:

      **Notes:**
      {{note_content}}

      Requirements:
      - Use exact participant words
      - Choose quotes that show emotions, pain points, or key insights
      - Include brief context for each quote

      Format as:
      > *"[exact quote]"*
      > 
      > [Context: when/why this was said]

  # Identify notable observations
  - task_id: "observations"
    prompt: |
      Identify 3-4 notable observations about user behavior or patterns:

      **Notes:**
      {{note_content}}

      Requirements:
      - Focus on observable behaviors, not assumptions
      - Include emotional responses and workflow patterns
      - Keep observations actionable for design decisions

      Format as: 🔸 [Specific observation]

  # Generate action items
  - task_id: "action_items"
    prompt: |
      Generate 2-3 quick action items the team should consider:

      **Notes:**
      {{note_content}}

      Requirements:
      - Make actions specific and achievable
      - Focus on addressing the main pain points
      - Include mix of immediate and short-term actions

      Format as: - [ ] [Specific action item]

# Simple output template
output_template: |
  # 📝 Session Summary - {{participant_ids}}

  ## ⚠️ Top 3 Pain Points

  {{ai_generated.pain_points}}

  ## 💬 Key Quotes

  {{ai_generated.key_quotes}}

  ## 👀 Notable Observations

  {{ai_generated.observations}}

  ## ✅ Quick Action Items

  {{ai_generated.action_items}}

  ---

# Output configuration
output_options:
  filename: "{{study_folder}}_summary_{{current_date}}.md"
  path: "03-fieldwork/summaries/"
  
  # Simple delivery
  delivery:
    # Save to GitHub repository
    github:
      enabled: true
      repo: "primary-research"
      path: "03-fieldwork/summaries/{{study_folder}}/"
      commit_message: "Add {{study_name}} summary for {{participant_ids}} - {{current_date}}"
      
    # Share via Slack
    slack:
      enabled: true
      
      # Send to analyzer first
      dm_notification:
        enabled: true
        target_user: "{{analyzer}}"
        message: |
          ✅ *Summary Ready* - **{{participant_ids}}**
          
          📂 *Study:* {{study_name}}
          📁 *Analyzed:* {{selected_files_count}} note files
          🕒 *Generated:* {{current_date}}
          
          Ready to share with your team? 👇
        
        actions:
          - text: "📤 Share to Channel"
            style: "primary"
            action_id: "share_summary_to_channel"
          - text: "📝 View Full Summary"
            style: "default"
            url: "{{github_file_url}}"
          - text: "🔄 Analyze More Notes"
            style: "default"
            action_id: "analyze_notes_modal"

# Slack formatting
slack_formatting:
  use_slack_markdown: true
  max_channel_message_length: 2000
  prefer_slack_emoji: true
  chunk_long_lists: true

# Channel sharing (when user clicks "Share to Channel")
sharing_workflow:
  channel_message: |
    📝 **Session Summary** – {{participant_ids}}
    
    **Study:** {{study_name}} | **Notes:** {{note_takers}}
    
    **⚠️ Top Pain Points:**
    {{#each top_pain_points}}
    `{{@index}}.` {{this}}
    {{/each}}
    
    **💬 Key Quote:**
    > {{top_quote}}
    
    **✅ Action Items:**
    {{#each priority_actions}}
    🔸 {{this}}
    {{/each}}
    
    📎 [Full summary]({{github_file_url}})
  
  channel_actions:
    - text: "📖 Read Full Summary"
      url: "{{github_file_url}}"
    - text: "💬 Start Discussion"
      action_id: "start_discussion_thread"

# Simple processing rules
processing_rules:
  auto_detect_participant_ids: true  # Extract from file names (bp001, bp002, etc.)
  combine_multiple_files: true       # Merge content when multiple files selected
  auto_extract_note_takers: true     # Get from file names (jordan, sarah.m, etc.)
  
validation_rules:
  minimum_content_length: 200
  require_at_least_one_quote: true
  require_at_least_two_pain_points: true

output_use: |
  Quick session summary generator for research teams. Transforms raw session notes into shareable summaries with key pain points, quotes, and observations. Perfect for rapid insights and team communication.
