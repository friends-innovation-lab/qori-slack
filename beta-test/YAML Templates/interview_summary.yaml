5. All variables get passed to the YAML template
6. AI synthesizes the coded transcript into a summary
7. Output saved as: pt005-session-summary-2025-10-16.md

**Current Issue:**
It appears the system isn't reading or passing these variables correctly. Can you check:
- How is participant_id being extracted from the filename?
- Is the coded transcript file content being read and passed as `coded_transcript_content`?
