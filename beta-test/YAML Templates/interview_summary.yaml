id: interview_summary
name: run_interview_summary
label: 📝 Interview Summary
version: v2.2
description: Extract key themes, pain points, quotes, and coded transcript segments from interviews 💬

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-09

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.4
  max_tokens: 4000

input_type: text
input_processing: summarize_if_long
batch_mode: true
batch_delimiter: "---"
precision_mode: detailed

# Input schema for Slack UI
input_variables:
  - transcript_text      # Interview transcript or notes (REQUIRED)
  - participant_id       # Participant identifier (REQUIRED)
  - interviewer_name     # Lead interviewer (REQUIRED)
  - study_name           # Name of the study (REQUIRED)
  - session_date         # Date of interview (OPTIONAL)
  - study_channel        # Slack channel for notifications (OPTIONAL)

# Qualitative coding framework
coding_framework:
  emotional_states: 
    - frustrated
    - confused
    - confident
    - overwhelmed
    - satisfied
    - anxious
    - hopeful
  
  barrier_types:
    - language_barrier
    - process_confusion
    - technical_difficulty
    - cognitive_load
    - documentation_issue
    - accessibility_barrier
  
  user_behaviors:
    - abandonment
    - workaround
    - help_seeking
    - completion_success
    - error_recovery
    - giving_up
  
  interaction_points:
    - form_fields
    - navigation
    - help_text
    - error_messages
    - document_upload
    - verification_step

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. process_transcript
  3. apply_coding_framework
  4. populate_template
  5. save_to_outputs

prompt: |
  You are a qualitative research assistant helping analyze interview data. Your task is to:
  
  1. Extract 3 key themes, 3 pain points, and 3 notable quotes
  2. Apply research codes to significant transcript segments
  
  For the coded transcript, identify 8-12 important segments and label them using this coding framework:
  
  **Emotional States:** frustrated, confused, confident, overwhelmed, satisfied, anxious, hopeful
  **Barrier Types:** language_barrier, process_confusion, technical_difficulty, cognitive_load, documentation_issue, accessibility_barrier  
  **User Behaviors:** abandonment, workaround, help_seeking, completion_success, error_recovery, giving_up
  **Interaction Points:** form_fields, navigation, help_text, error_messages, document_upload, verification_step
  
  Format coded segments as: **[CODE_CATEGORY - SPECIFIC_CODE]** followed by the quote.
  Use plain language written at a 10th-grade reading level. Be conversational but professional. Use active voice. Do not include explanations — only the outputs in the requested format.
  
  Transcript:
  {{transcript_text}}

# Output template
output_template: |
  # 📝 Interview Summary - {{participant_id}}

  **🏛️ Study:** {{study_name}}  
  **👩🏽‍🔬 Interviewer:** {{interviewer_name}}  
  **🗓️ Date:** {{session_date}}

  ## 🧠 Key Themes
  - Theme 1: [AI Generated]
  - Theme 2: [AI Generated]
  - Theme 3: [AI Generated]
  
  ## ⚠️ Pain Points
  - Pain Point 1: [AI Generated]
  - Pain Point 2: [AI Generated]
  - Pain Point 3: [AI Generated]
  
  ## 💬 Notable Quotes
  - "Quote 1" – {{participant_id}}
  - "Quote 2" – {{participant_id}}
  - "Quote 3" – {{participant_id}}

  ## 🏷️ Coded Transcript Segments
  
  [AI Generated coded segments with research labels]

  ## 📊 Code Summary
  
  **Most Frequent Codes:**
  [AI Generated code frequency count]

  ---
  **Summary created:** {{current_date}}  
  **Study details:** Available in project folder

# Output configuration
output_options:
  # File settings
  filename: "interview_summary_{{participant_id}}_{{current_date}}.md"
  path: "03-fieldwork/"
  
  # Delivery methods (multiple can be enabled)
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add coded interview summary for {{participant_id}} - {{study_name}}"
      
    slack:
      enabled: true
      channel: "{{study_channel}}"
      notify_user: "{{interviewer_name}}"
      message: "📝 Coded interview summary for {{participant_id}} ({{study_name}}) has been processed and saved."
      include_preview: false
      actions:
        - text: "📝 View Summary"
          url: "{{github_file_link}}"
        - text: "📊 View All Summaries"
          action: "view_study_summaries"
        - text: "🏷️ Compare Codes"
          action: "compare_participant_codes"
    
    email:
      enabled: false
      # Future: email delivery options
      
    teams:
      enabled: false
      # Future: Teams delivery options

output_use: |
  CivicMind Interview Summary generator creates structured summaries with qualitative coding from research sessions. Extracts key themes, pain points, quotes, and applies research codes to transcript segments to support analysis and reporting phases of government research projects.
