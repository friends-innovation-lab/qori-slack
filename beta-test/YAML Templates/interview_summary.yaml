id: interview_summary
label: 📝 Interview Summary
description: Extract key themes, pain points, and quotes from interviews 💬
input_type: transcript
prompt: |
Review the following interview transcript and identify.:
  - 🧠 Key themes
  - ⚠️ User pain points
  - 💬 Notable quotes

  Transcript:
  {{input}}
output_format: |
## 🧠 Key Themes
- Theme 1: [Description]
- Theme 2: [Description]
- Theme 3: [Description]

## ⚠️ Pain Points
- Pain Point 1: [Description]
- Pain Point 2: [Description]
- Pain Point 3: [Description]

## 💬 Notable Quotes
- "Quote 1" – User
- "Quote 2" – User
- "Quote 3" – User

