id: analyze_notes
name: analyze_session_notes
label: 📝 Analyze Notes
version: v1.0
description: Generate quick summary with top pain points, quotes, and observations from session notes

author: CivicMind R&D
created: 2025-08-11
last_updated: 2025-08-11

# LLM Configuration
llm_config:
  model: "gpt-4"
  temperature: 0.3
  max_tokens: 2000

input_type: structured
input_processing: combine_and_analyze

# Simple inputs from Slack modal
input_variables:
  selected_note_files: "{{selected_note_files}}"     # Array of selected note file paths
  note_content: "{{note_content}}"                   # Combined content from all selected files
  note_takers: "{{note_takers}}"                     # List of note takers
  participant_id: "{{participant_id}}"               # Auto-detected from file names (pt001, pt002, etc.)
  current_date: "{{current_date}}"
  analyzer: "{{analyzer}}"                           # User who ran the analysis

# Simple analysis prompt
prompt: |
  You are analyzing user research session notes. Create a concise summary that's perfect for sharing with a research team.

  **Your task:**
  1. Extract the TOP 3 most significant pain points or issues the participant encountered
  2. Pull 3-5 key quotes that illustrate important insights or user reactions
  3. Identify 3-4 notable observations about user behavior or patterns
  4. Suggest 2-3 quick action items the team should consider

  **Guidelines:**
  - Keep it concise and actionable
  - Focus on the most impactful findings
  - Use the participant's actual words when possible
  - Write in a conversational, team-friendly tone
  - Prioritize findings that could influence design decisions

  **Notes to analyze:**
  {{note_content}}

# Simple output template
output_template: |
  # 📝 Session Summary - {{participant_id}}

  👋 Hi team! Here's the interview summary for **{{participant_id}}**. 

  ## ⚠️ Top 3 Pain Points

  **1.** {{pain_point_1}}

  **2.** {{pain_point_2}}

  **3.** {{pain_point_3}}

  ## 💬 Key Quotes

  {{#each key_quotes}}
  > *"{{quote}}"* 
  > 
  > {{context}}

  {{/each}}

  ## 👀 Notable Observations

  {{#each observations}}
  🔸 {{observation}}
  {{/each}}

  ## ✅ Quick Action Items

  {{#each action_items}}
  - [ ] {{action_item}}
  {{/each}}

  ---
  *Analysis by {{analyzer}} • 📎 [View source notes]({{source_file_links}})*

# Output configuration
output_options:
  filename: "{{participant_id}}_quick_summary_{{current_date}}.md"
  path: "03-fieldwork/summaries/"
  
  # Multi-channel delivery
  delivery:
    # Save to GitHub repository
    github:
      enabled: true
      repo: "primary-research"
      path: "03-fieldwork/summaries/"
      commit_message: "Add quick summary for {{participant_id}} - {{current_date}}"
      
    # Share via Slack
    slack:
      enabled: true
      
      # Send to analyzer first
      dm_notification:
        enabled: true
        target_user: "{{analyzer}}"
        message: |
          ✅ *Quick Summary Ready* - **{{participant_id}}**
          
          📁 *Analyzed:* {{selected_files_count}} note files
          🕒 *Generated:* {{current_date}}
          
          Ready to share with your team? 👇
        
        actions:
          - text: "📤 Share to Channel"
            style: "primary"
            action_id: "share_summary_to_channel"
            value: "{{summary_data}}"
          - text: "📝 View Full Summary"
            style: "default"
            url: "{{github_file_url}}"
          - text: "🔄 Analyze More Notes"
            style: "default"
            action_id: "analyze_notes_modal"

# Slack formatting optimization
slack_formatting:
  # Use Slack-friendly markdown
  use_slack_markdown: true
  # Optimize message length for Slack
  max_channel_message_length: 2000
  # Use Slack emoji formatting
  prefer_slack_emoji: true
  # Break long lists into readable chunks
  chunk_long_lists: true

# Sharing workflow when user clicks "Share to Channel"
sharing_workflow:
  channel_message: |
    👋 Hi team! Here's the interview summary for **{{participant_id}}**
    
    *⚠️ Top Pain Points:*
    {{#each top_pain_points}}
    `{{@index}}.` {{this}}
    {{/each}}
    
    *💬 Key Quote:*
    > {{top_quote}}
    
    *👀 Notable Observation:*
    {{top_observation}}
    
    *✅ Action Items:*
    {{#each priority_actions}}
    🔸 {{this}}
    {{/each}}
    
    📎 Notes analyzed: {{note_takers}}
  
  channel_actions:
    - text: "📖 Read Full Summary"
      url: "{{github_file_url}}"
    - text: "💬 Start Discussion"
      action_id: "start_discussion_thread"
    - text: "📋 Copy Summary"
      action_id: "copy_summary_to_clipboard"

# Simple processing rules
processing_rules:
  auto_detect_participant: true  # Extract participant ID from file names
  combine_multiple_files: true   # Merge content when multiple files selected
  prioritize_recent_files: true  # Weight newer files more heavily
  
validation_rules:
  minimum_content_length: 200
  require_at_least_one_quote: true
  require_at_least_two_pain_points: true

output_use: |
  Quick session summary generator for research teams. Transforms raw session notes into shareable summaries with key pain points, quotes, and observations. Perfect for rapid insights and team communication.
