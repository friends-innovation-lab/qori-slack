id: interview_summary
label: 📝 Interview Summary
description: Extract key themes, pain points, and quotes from interviews 💬
input_type: transcript
prompt: |
  Review the following interview transcript and identify:
  - 🧠 Key themes
  - ⚠️ User pain points
  - 💬 Notable quotes

  Transcript:
  {{input}}
output_format: |
  ## 🧠 Themes
  - ...

  ## ⚠️ Pain Points
  - ...

  ## 💬 Quotes
  - "..." – User
