id: usability_issues_extractor
label: 🧪 Usability Issues Extractor
description: Identify usability issues from research notes
input_type: text
input_processing: summarize_if_long
prompt: |
  You are extracting 3 to 5 usability issues from research transcripts or observation notes.

  For each issue, provide:
  - A short title
  - Description of the problem
  - Observed behavior (what happened)
  - Expected behavior (what the user thought would happen)
  - Severity (low, medium, high)
  - Screen or feature name
  - Recommendation (1–2 sentences)

  Be specific and actionable. Use plain language at a 10th-grade reading level.
  Avoid em-dashes, jargon, and vague language. Do not invent details.

  Input:
  {{input}}
output_format: |
  ## 🧪 Usability Issues

  ### Issue 1: [Short Title]
  - Description: ...
  - Observed Behavior: ...
  - Expected Behavior: ...
  - Severity: medium
  - Screen: ...
  - Recommendation: ...

  ### Issue 2: ...
  ### Issue 3: ...
  (up to 5 issues total)
