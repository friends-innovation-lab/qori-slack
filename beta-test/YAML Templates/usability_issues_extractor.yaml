id: usability_issues_extractor
name: run_usability_issues_extractor
label: 🧪 Usability Issues Extractor
version: v2.1
description: |
  Extract and prioritize usability issues from testing sessions, user observations, and research notes.
  Enhanced with router intelligence for optimal data quality assessment and context-aware usability analysis.
  Identify specific UX problems with severity levels, user behaviors, and actionable recommendations for immediate fixes.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-08-15

input_type: text
input_processing: summarize_if_long
precision_mode: concise | detailed

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.4
  max_tokens: 4000

input_variables:
  # Core analysis data (from router)
  - input_text           # Usability testing notes, observations, session recordings (REQUIRED)
  - focus_area           # Analysis focus from router (REQUIRED)
  
  # Study context (from router)
  - study_name           # Title of study (REQUIRED)
  - study_folder         # Study folder path (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to post results (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Who to notify/tag (OPTIONAL)
  
  # Router intelligence (NEW - from synthesize_router)
  - file_selection_quality    # Router's file quality assessment
  - analysis_preview         # Router's expected outcomes
  - recommendations          # Router's smart suggestions
  - collaboration_plan       # Router's team coordination plan
  - routing_validation       # Router's methodology validation
  - selected_files_summary   # Summary of files used
  - data_combination_strategy # How files were combined
  
  # Router metadata
  - router_version           # Router version for tracking
  - preprocessing_timestamp  # When router processed
  - analysis_id             # Unique analysis identifier

# AI GENERATION TASKS
ai_generation_tasks:
  # Analyze usability data scope and determine optimal analysis approach
  - task_id: "usability_scope_analysis"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      As an experienced usability researcher and UX expert, analyze the scope and quality of usability testing data:
      
      **Study:** {{study_name}}
      **Focus Area:** {{focus_area}}
      **Input Data:** [Analyze the input_text for usability testing indicators]
      **Router Quality Assessment:** {{file_selection_quality}}
      **Router Recommendations:** {{recommendations}}
      
      Analyze:
      1. **Data Type Assessment:** What types of usability data are present (testing notes, task observations, error logs, etc.)?
      2. **Issue Density:** How many distinct usability problems can be identified?
      3. **Optimal Issue Count:** Based on data complexity, how many issues should be extracted?
      4. **Overall Severity:** What's the general severity level of usability problems?
      5. **Analysis Confidence:** Given router assessment, what confidence level is appropriate?
      
      **Format:**
      **Data Type Assessment:** [Types of usability data present - testing notes, observations, task completion data, etc.]
      **Issue Density:** [High/Medium/Low] - [estimated number of distinct problems identifiable]
      **Recommended Issue Count:** [3-8 issues] - [reasoning based on problem variety and severity]
      **Overall Severity:** [High/Medium/Low] - [assessment of general problem severity]
      **Analysis Confidence:** [High/Medium/Low] - [reasoning based on router assessment]
      **Primary Problem Area:** [Main problematic feature/flow identified]

  # Identify and categorize usability issues
  - task_id: "issue_identification"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on specific, observable interface problems
      
      As an experienced UX researcher, identify distinct usability issues from the testing data:
      
      **Input Data:**
      {{input_text}}
      
      **Usability Context:**
      {{ai_generated.usability_scope_analysis}}
      
      **Study Context:** {{study_name}}
      **Focus Area:** {{focus_area}}
      
      Based on the recommended issue count, identify each distinct usability problem:
      
      1. **Issue Titles:** Clear, specific names for each usability problem
      2. **Issue Categories:** Type of problem (navigation, form, search, content, etc.)
      3. **Problem Locations:** Specific screens, features, or interface elements affected
      4. **Issue Distinctiveness:** How each problem differs from others
      5. **Evidence Support:** What data supports each identified issue
      
      **Format for each issue:**
      **Issue [X]: "[Clear, specific issue title]"**
      - **Category:** [Type of usability problem - navigation, forms, search, content, visual design, etc.]
      - **Location:** [Specific screen, feature, or interface element where problem occurs]
      - **Problem Type:** [Workflow disruption, cognitive load, error-prone design, unclear feedback, etc.]
      - **Affected Users:** [How many/which users encountered this problem]
      - **Supporting Evidence:** [Specific observations, quotes, or data that demonstrate this issue]
      - **Distinctiveness:** [How this issue differs from other identified problems]
      
      Requirements:
      - Focus on specific, observable interface problems rather than general feedback
      - Ensure each issue is genuinely distinct from others
      - Base all issues on actual testing evidence
      - Make issue titles clear and actionable for design/dev teams
      - Include specific location information for each problem

  # Analyze user behaviors and expectations
  - task_id: "behavior_expectation_analysis"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on specific user actions and expectations
      
      As an experienced usability analyst, analyze user behaviors and expectations for each identified issue:
      
      **Identified Issues:**
      {{ai_generated.issue_identification}}
      
      **Input Data:**
      {{input_text}}
      
      For each issue, analyze:
      1. **Observed Behavior:** What users actually did when encountering this problem
      2. **Expected Behavior:** What users thought would happen or tried to make happen
      3. **Mental Model Mismatch:** Where user expectations differed from interface design
      4. **Error Recovery:** How users tried to recover from or work around the problem
      5. **Emotional Impact:** How the problem affected user confidence or frustration
      
      **Format for each issue:**
      **Issue: "[Issue title]"**
      
      👀 **Observed Behavior:** [Specific actions users took - be detailed about what they clicked, where they looked, what they said]
      
      🎯 **Expected Behavior:** [What users thought would happen or what they were trying to accomplish]
      
      🧠 **Mental Model Mismatch:** [Where user expectations conflicted with interface design or behavior]
      
      🔧 **Error Recovery Attempts:** [How users tried to fix or work around the problem]
      
      😤 **Emotional Impact:** [How the problem affected user confidence, frustration, or task completion]
      
      📊 **Frequency:** [How often this behavior pattern occurred: "All users" / "Majority of users" / "Several users" / "Specific user type"]
      
      🔍 **Supporting Evidence:** [Specific quotes or observations that demonstrate these behaviors]
      
      Requirements:
      - Be specific about user actions - avoid generic descriptions
      - Show clear contrast between observed and expected behavior
      - Include actual user language and reactions when possible
      - Focus on actionable insights for interface improvements

  # Assess severity levels and impact
  - task_id: "severity_impact_assessment"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Use consistent severity criteria across all issues
      
      As an experienced UX researcher, assess severity levels and impact for each usability issue:
      
      **Issues with Behaviors:**
      {{ai_generated.behavior_expectation_analysis}}
      
      **Study Context:** {{study_name}}
      **Focus Area:** {{focus_area}}
      
      For each issue, assess:
      1. **Severity Level:** High/Medium/Low based on impact and frequency
      2. **Task Impact:** How the issue affects task completion
      3. **User Impact:** Effect on user experience and confidence
      4. **Business Impact:** Potential effect on service/product goals
      5. **Fix Complexity:** How difficult the issue would be to address
      
      **Severity Criteria:**
      - **High:** Prevents task completion, affects majority of users, critical workflow blocker
      - **Medium:** Causes confusion or delays, affects some users, workaround possible
      - **Low:** Minor annoyance, affects few users, doesn't block core tasks
      
      **Format for each issue:**
      **Issue: "[Issue title]"**
      
      🚨 **Severity Level:** [High/Medium/Low] - [specific reasoning based on criteria above]
      
      📋 **Task Impact:** [How this issue affects users' ability to complete their intended task]
      
      👤 **User Impact:** [Effect on user experience, confidence, frustration, or abandonment]
      
      💼 **Business Impact:** [Potential effect on conversion, support burden, user retention, or service goals]
      
      🛠️ **Fix Complexity:** [Low/Medium/High] - [assessment of technical difficulty to address]
      
      ⏱️ **Time to Fix:** [Estimated effort: "Quick fix" / "Sprint work" / "Major effort"]
      
      📈 **Priority Score:** [High/Medium/Low] - [overall priority considering severity, impact, and fix complexity]
      
      Requirements:
      - Use consistent severity criteria across all issues
      - Consider both user and business impact
      - Be realistic about fix complexity and effort
      - Provide clear prioritization guidance for teams

  # Generate specific fix recommendations
  - task_id: "fix_recommendation_generation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Make recommendations specific and actionable for design/dev teams
      
      As an experienced UX designer and interface specialist, generate specific fix recommendations for each usability issue:
      
      **Issues with Severity Assessment:**
      {{ai_generated.severity_impact_assessment}}
      
      **Behavior Analysis:**
      {{ai_generated.behavior_expectation_analysis}}
      
      **Study Context:** {{study_name}}
      
      For each issue, generate:
      1. **Primary Recommendation:** Most effective fix for the core problem
      2. **Implementation Details:** Specific design or technical changes needed
      3. **Alternative Solutions:** Other approaches that could address the issue
      4. **Success Metrics:** How to measure if the fix resolves the problem
      
      **Format for each issue:**
      **Issue: "[Issue title]"**
      
      💡 **Primary Recommendation:** [Specific, actionable fix that directly addresses the core usability problem]
      
      🔧 **Implementation Details:**
      - [Specific design change]: [What needs to be modified in the interface]
      - [Technical requirement]: [Any development work needed]
      - [Content change]: [Any text, label, or messaging updates]
      
      🔄 **Alternative Solutions:**
      - [Alternative approach 1]: [Different way to solve the same problem]
      - [Alternative approach 2]: [Another option if primary recommendation isn't feasible]
      
      📊 **Success Metrics:** [How to measure if the fix successfully resolves the usability issue]
      
      ⚡ **Quick Win Potential:** [Yes/No] - [whether this could be implemented quickly for immediate impact]
      
      **Examples of good recommendations:**
      - "Add visual feedback when form fields are successfully completed (green checkmark)"
      - "Change button label from 'Submit' to 'Continue to Review' to clarify next step"
      - "Move search function to header navigation for consistent access across pages"
      
      **NOT vague recommendations like:**
      - "Improve user experience"
      - "Make interface more intuitive"
      - "Better design"

  # Identify supporting quotes and evidence validation
  - task_id: "evidence_quote_validation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Use actual quotes that demonstrate the usability problem
      
      As an experienced qualitative researcher, identify supporting quotes and validate evidence for each usability issue:
      
      **Complete Issue Analysis:**
      {{ai_generated.behavior_expectation_analysis}}
      {{ai_generated.severity_impact_assessment}}
      
      **Input Data:**
      {{input_text}}
      
      For each issue, find:
      1. **Representative Quote:** Direct quote that best illustrates the usability problem
      2. **Signal Strength:** How often this issue appeared in testing
      3. **Source Reference:** Where the evidence comes from
      4. **Evidence Quality:** How well-supported this issue is
      5. **Additional Evidence:** Other observations that support the issue
      
      **Format for each issue:**
      **Issue: "[Issue title]"**
      
      💬 **Representative Quote:** "[Direct quote from user that clearly demonstrates this usability problem]"
      
      📊 **Signal Strength:** [How often this issue appeared: "Affected X out of Y users" / "Consistent problem across sessions" / "Recurring pattern" / "Isolated but severe"]
      
      📚 **Source Reference:** [Specific reference to testing source - session, participant, task if available]
      
      ✅ **Evidence Quality:** [Strong/Moderate/Limited] - [assessment of how well data supports this issue]
      
      🔍 **Additional Evidence:** [Other quotes, observations, or data points that support this usability issue]
      
      📱 **Device/Context:** [Any specific device, browser, or context factors that influenced this issue]
      
      Requirements:
      - Use direct quotes that genuinely demonstrate the usability problem
      - Be specific about signal strength - use actual numbers when possible
      - Reference specific testing sources when available
      - Include contextual factors that may influence the issue
      - Assess evidence quality honestly based on data strength

  # Generate prioritization and follow-up recommendations
  - task_id: "prioritization_and_follow_up"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Provide specific prioritization criteria and next steps
      
      As an experienced UX strategist, prioritize usability issues and recommend follow-up actions:
      
      **Complete Usability Analysis:**
      {{ai_generated.severity_impact_assessment}}
      {{ai_generated.fix_recommendation_generation}}
      {{ai_generated.evidence_quote_validation}}
      
      **Router Quality Assessment:** {{file_selection_quality}}
      **Router Recommendations:** {{recommendations}}
      **Study Context:** {{study_name}}
      
      Based on the usability analysis, provide:
      
      1. **Issue Prioritization:** Rank issues by priority for fixing
      2. **Sprint Planning:** Which issues should be addressed when
      3. **Validation Needs:** What additional testing would strengthen findings
      4. **Success Tracking:** How to measure improvement after fixes
      
      **Format:**
      **Overall Usability Assessment:** [High/Medium/Low severity] - [summary of main usability health]
      
      **Issue Priority Ranking:**
      1. **[Issue Title]** - [High/Medium/Low Priority] - [reasoning: impact + fix complexity]
      2. **[Issue Title]** - [High/Medium/Low Priority] - [reasoning]
      3. **[Issue Title]** - [High/Medium/Low Priority] - [reasoning]
      
      **Sprint Planning Recommendations:**
      - **This Sprint (Quick Wins):** [Issues that can be fixed immediately]
      - **Next Sprint (Medium Effort):** [Issues requiring more work but high impact]
      - **Future Sprints (Major Changes):** [Issues requiring significant development]
      
      **Validation Needs:**
      - [Testing method]: [What additional validation would strengthen findings]
      - [User feedback approach]: [How to confirm fixes resolve problems]
      
      **Success Tracking:**
      - [Specific metric]: [How to measure usability improvement]
      - [User satisfaction indicator]: [How to track user experience enhancement]
      
      **Follow-up Analysis Recommendations:**
      Based on router recommendations and usability findings:
      - [Analysis type]: [How this would complement usability insights]
      - [Research approach]: [What additional perspective this would provide]
      
      **Router Integration:**
      {{recommendations}}
      [How router recommendations align with usability improvement]
      
      **Key Limitations:** [Any significant limitations from router assessment or data gaps that affect issue confidence]

# Auto-generated/computed variables (enhanced with AI analysis)
auto_variables:
  - num_issues: |
      # AI determines optimal issue count from scope analysis
      extract_issue_count(ai_generated.usability_scope_analysis) || 4
  - severity_overview: |
      # AI assesses overall usability health from scope analysis
      extract_severity_overview(ai_generated.usability_scope_analysis) || "Medium"
  - primary_problem_area: |
      # AI identifies main problematic feature/flow from scope analysis
      extract_primary_problem_area(ai_generated.usability_scope_analysis) || "User interface"
  - session_count: |
      # AI estimates session count from scope analysis and file metadata
      extract_session_count(ai_generated.usability_scope_analysis, selected_files_summary) || "multiple sessions"
  - confidence_level: |
      # AI determines overall analysis confidence from prioritization task
      extract_confidence_level(ai_generated.prioritization_and_follow_up) || "medium"
  - current_date: |
      # Auto-generate current date for file naming
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      # Auto-generate based on study name and date
      generate_github_link(study_name, current_date) || null

# Output configuration (enhanced)
output_options:
  default_delivery: "slack_and_file"
  slack_format: "structured"
  path: "04-analysis/usability-issues/"
  filename: "{{study_folder}}_usability_issues_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "🧪 Usability Issues"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "💡 Create Fix Issues"
      action: "run_insight_card"
    - text: "🎨 Generate Design Opportunities"
      action: "run_design_opportunity_generator"
    - text: "🧠 Run Affinity Mapping"
      action: "run_affinity_mapping"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"
    - text: "📊 Router Intelligence Log"
      url: "{{router_log_link}}"

output_use: |
  Router-Enhanced Usability Issues Extractor leverages intelligent preprocessing to optimize usability analysis quality and context.
  Receives AI-validated file selections, quality assessments, and smart recommendations from the synthesize_router
  to ensure optimal issue identification and prioritization. By incorporating router intelligence, researchers can confidently extract
  actionable usability problems with full visibility into data quality, limitations, and optimization opportunities.

  Use this method to:
    - Benefit from intelligent file selection validation and optimization
    - Understand data quality impact on usability issue confidence and severity assessment
    - Leverage router recommendations for comprehensive UX improvement planning
    - Maintain full transparency in AI-assisted usability analysis workflow

output_notes: |
  This method extracts {{num_issues}} usability issues based on AI analysis of problem density and data quality.
  Overall severity ({{severity_overview}}) and primary problem area ({{primary_problem_area}}) identified from testing data.
  Session count ({{session_count}}) estimated from input patterns and router file metadata.
  Analysis confidence: {{confidence_level}} based on router file selection assessment.

# Enhanced output template using AI-generated content
output_template: |
  Hi team! 👋 I just extracted the key usability issues from our AI-enhanced testing analysis. Found {{num_issues}} specific UX problems that are impacting users, with most issues in {{primary_problem_area}}.

  {{team_members}} - these issues are ready for prioritization and fixing. The severity levels should help us tackle the most critical problems first.

  📂 *Study:* {{study_name}}  
  🔗 *Full details:* {{study_link}}
  📊 *Router Analysis:* [View preprocessing intelligence]({{router_log_link}})

  ---

  ## 📊 *USABILITY SCOPE & QUALITY ANALYSIS*

  {{ai_generated.usability_scope_analysis}}

  **Router Quality Assessment:**
  {{file_selection_quality}}

  **Files Analyzed:**
  {{selected_files_summary}}

  ---

  ## 🔍 *IDENTIFIED USABILITY ISSUES*

  {{ai_generated.issue_identification}}

  ---

  ## 👀 *USER BEHAVIORS & EXPECTATIONS*

  {{ai_generated.behavior_expectation_analysis}}

  ---

  ## 🚨 *SEVERITY & IMPACT ASSESSMENT*

  {{ai_generated.severity_impact_assessment}}

  ---

  ## 💡 *FIX RECOMMENDATIONS*

  {{ai_generated.fix_recommendation_generation}}

  ---

  ## 📚 *SUPPORTING EVIDENCE*

  {{ai_generated.evidence_quote_validation}}

  ---

  ## 🎯 *PRIORITIZATION & NEXT STEPS*

  {{ai_generated.prioritization_and_follow_up}}

  **Router Recommendations Integration:**
  {{recommendations}}

  ---

  *Ready to fix?* Reply in thread with your thoughts:
  • Which issues should we tackle first?
  • Any quick wins we can implement this sprint?
  • Should we follow the recommended validation steps?
  • Should we create GitHub issues for these fixes?

  ---
  
  *🤖 AI-Enhanced Usability Analysis Complete*  
  *Preprocessing: {{preprocessing_timestamp}} | Router: {{router_version}} | Analysis ID: {{analysis_id}}*

# Processing workflow
processing_workflow:
  1. validate_router_inputs
  2. confirm_data_quality_context
  3. execute_usability_scope_analysis
  4. execute_issue_identification
  5. execute_behavior_expectation_analysis
  6. execute_severity_impact_assessment
  7. execute_fix_recommendation_generation
  8. execute_evidence_quote_validation
  9. execute_prioritization_and_follow_up
  10. format_comprehensive_output
  11. save_to_analysis_folder
  12. send_team_notifications
  13. track_analysis_completion

notify:
  - role: ux_team
    action: "Router-enhanced usability issues extracted"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} identified {{num_issues}} usability issues from {{study_name}} with {{confidence_level}} confidence. {{severity_overview}} severity overall - ready for prioritization."
  - role: researcher
    action: "Issues documented"
    slack_tag: "{{researcher_contact}}"
    message: "Your router-enhanced usability issues have been posted to {{study_channel}} and saved to GitHub. Analysis confidence: {{confidence_level}} based on file quality assessment."
