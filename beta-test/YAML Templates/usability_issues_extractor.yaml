id: usability_issues_extractor
name: run_usability_issues_extractor
label: 🧪 Usability Issues Extractor
version: v2.0
description: |
  Extract and prioritize usability issues from testing sessions, user observations, and research notes. Identify specific UX problems with severity levels, user behaviors, and actionable recommendations for immediate fixes.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-02

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

input_variables:
  - input_text           # Usability testing notes, observations, session recordings (REQUIRED)
  - study_name           # Title of study (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to post results (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Who to notify/tag (OPTIONAL)

# Auto-generated/computed variables
auto_variables:
  - num_issues: |
      # AI analyzes input to determine optimal issue count
      # Default: 4, Range: 3-8 based on problem density and variety
      analyze_usability_issues(input_text) || 4
  - severity_overview: |
      # AI assesses overall usability health
      # High/Medium/Low based on issue severity distribution
      assess_overall_severity(input_text) || "Medium"
  - primary_problem_area: |
      # AI identifies main problematic feature/flow
      # e.g., "Navigation", "Form completion", "Search functionality"
      identify_problem_area(input_text) || "User interface"
  - session_count: |
      # AI estimates testing session count from input patterns
      estimate_session_count(input_text) || "multiple sessions"
  - current_date: |
      # Auto-generate current date for file naming
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      # Auto-generate based on study name and date
      generate_github_link(study_name, current_date) || null

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "structured"
  file_location: "04-analysis/"
  file_name: "usability_issues_{{study_name_slug}}_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "🧪 Usability Issues"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "💡 Create Fix Issues"
      action: "run_insight_card"
    - text: "🎨 Generate Design Opportunities"
      action: "run_design_opportunity_generator"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"

output_use: |
  CivicMind Usability Issues Extractor transforms testing observations into actionable UX fixes. Specifically designed for usability testing analysis, helping teams quickly identify, prioritize, and address user interface problems.

  Use this method to:
    - Extract specific usability problems from testing sessions
    - Prioritize fixes based on severity and user impact
    - Provide clear observed vs. expected behavior descriptions
    - Generate actionable recommendations for immediate improvements
    - Track usability issues through to resolution

output_notes: |
  This method extracts {{num_issues}} usability issues based on problem density analysis.
  Overall severity ({{severity_overview}}) and primary problem area ({{primary_problem_area}}) identified from testing data.
  Session count ({{session_count}}) estimated from input patterns.
  Focus on specific, observable UX problems rather than general insights.
  Include clear severity levels and actionable recommendations.
  Use plain language accessible to designers and developers.
  Format for immediate action and issue tracking.

