id: session_notes
label: "📝 Session Notes"
version: v2.0
description: Quick session note-taking with AI-powered organization into structured sections

author: CivicMind R&D
created: 2025-07-07
last_updated: 2025-10-25

# LLM Configuration
llm_config:
  model: "gpt-4"
  temperature: 0.2
  max_tokens: 3000

input_type: structured
input_processing: ai_structured
precision_mode: detailed

# Integration with participant tracker
external_data_sources:
  participant_tracker:
    file_path: "participant_tracker.yaml"
    endpoint: "/api/slack/options/sessions"
    cache_duration: "5 minutes"
    
    option_mapping:
      value: "{{session_id}}"
      label: "{{session_id}} - {{participant_name}} ({{session_date}})"
      description: "{{session_time}} | {{researcher}} | {{session_type}}"
      
    filters:
      - status: "scheduled|in_progress|completed"
      - session_date: "within_7_days"
      - has_observers: true
      
    fallback:
      enabled: true
      fallback_to: "text_input"
      placeholder: "Enter session ID manually (e.g., P001)"

# Simple input fields
input_variables:
  - session_id:
      type: "select"
      required: true
      label: "Session"
      placeholder: "Select the session you observed..."
      data_source: "participant_tracker"
      help_text: "Choose from recent sessions"
      
  - observer_name:
      type: "hidden"
      derived_from: "slack_user_display_name"
      
  - raw_notes:
      type: "textarea"
      required: true
      label: "Session observations"
      placeholder: |
        Write your observations freely. The AI will organize them into sections automatically.
        
        💡 Tips for better notes:
        • Quote participant reactions: "This is confusing"
        • Note timestamps: Minute 5: User struggled with navigation
        • Describe tasks: Task 1 - Find benefits (completed in 3 min)
        • Flag technical issues: VoiceOver didn't announce button
        • Highlight key moments: Critical moment at minute 12 when user gave up
        • Capture emotions: User became frustrated, sighed heavily
        
        Write naturally - the system will structure everything for you!
      rows: 20
      max_length: 10000
      help_text: "Freeform observations. AI will extract quotes, timestamps, tasks, and organize into sections."

# AI Processing - Extract structure from freeform notes
ai_processing_tasks:
  - task_id: "structure_notes"
    prompt: |
      You are processing raw session notes from a UX research observation. Extract and organize the content into structured sections.
      
      **Raw Notes:**
      {{raw_notes}}
      
      **Your Task:**
      Analyze these notes and organize them into the following sections. Extract relevant content for each section. If a section has no relevant content, output "No observations recorded for this section."
      
      **CRITICAL INSTRUCTIONS:**
      - Extract actual quotes from participants (look for quotation marks or phrases like "they said", "participant mentioned")
      - Identify emotional moments (frustrated, confused, satisfied, etc.) with timestamps if present
      - Find task descriptions and their outcomes (completed, failed, partial success)
      - Flag any technical issues, bugs, or platform problems mentioned
      - Extract accessibility observations (screen reader, VoiceOver, assistive tech mentions)
      - Identify the top 3 most important moments from the session
      - Preserve timestamps when mentioned (Minute X, Min X, X minutes in, etc.)
      
      **OUTPUT FORMAT:**
      
      ## 🗣️ Key Quotes & Reactions
      [Extract direct participant quotes. Format as bullets with > blockquote style]
      [Organize by theme if possible: positive reactions, frustrations, confusion]
      [Examples:
      ### ✅ Positive Reactions
      - > "This makes sense, I like how clear this is"
      
      ### ⚠️ Frustration Points
      - > "Why is this so complicated? I can't find what I need"
      ]
      
      ## 😤 Emotional Moments & Body Language
      [Extract emotional observations with timestamps when available]
      [Format as bullets with emojis for emotion type]
      [Examples:
      - **Minute 5:** 😤 Participant became visibly frustrated when unable to locate submit button
      - **Minute 12:** 🤔 Showed confusion, paused for 30 seconds before asking for help
      ]
      
      ## ✅ Task Completion & Observations
      [Extract task descriptions with outcomes]
      [Format each task as a subsection]
      [Examples:
      ### Task 1: Find Health Benefits — ✅ Completed (3 minutes)
      - Successfully navigated to benefits page
      - Used search function effectively
      
      ### Task 2: Update Address — ❌ Failed
      - Could not locate edit button
      - Gave up after 5 minutes
      ]
      
      ## 🛠 Technical Issues & Platform Problems
      [Extract any bugs, technical failures, or platform issues]
      [Categorize by severity if possible]
      [Examples:
      ### ❌ Critical Issues
      - VoiceOver not announcing button labels in navigation menu
      
      ### ⚠️ Minor Issues
      - Page load time slow (5+ seconds)
      ]
      
      ## ♿ Accessibility & Screen Reader Observations
      [Extract any accessibility-related observations]
      [Note: Only include this section if accessibility topics are mentioned]
      [Examples:
      ### 🎧 Screen Reader Experience
      - VoiceOver successfully announced form fields
      - Skip navigation link worked as expected
      
      ### ❌ Accessibility Barriers
      - Focus order did not match visual layout
      ]
      
      ## ⭐ Top 3 Key Moments
      [Identify the 3 most significant moments from the session]
      [Format with importance badges and timestamps]
      [Examples:
      ### 1. Navigation Breakdown (Minute 8) — 🚨 Critical
      **Context:** Participant attempted to return to home page
      **Impact:** Became frustrated, couldn't find back button
      **Implications:** Primary navigation needs redesign for clarity
      ]
      
      ## 📋 Additional Context & Observations
      [Any other relevant notes that don't fit above categories]
      [Examples:
      ### 👤 Participant Background
      - Experienced screen reader user (10+ years)
      - Military veteran, familiar with VA services
      
      ### 🎭 Session Dynamics
      - Participant was engaged and communicative
      - Asked clarifying questions throughout
      ]
      
      **IMPORTANT:**
      - Preserve the exact wording of participant quotes
      - Keep timestamps when they exist
      - Use emojis for visual scanning (✅ ❌ ⚠️ 😤 🤔 💡)
      - Be concise but preserve important details
      - If a section has no content, write "No observations recorded for this section."
      - Maintain professional, objective tone
      
      Return ONLY the structured markdown output. Do not include any preamble or explanation.
    output_variable: "structured_notes"

# Output template
output_template: |
  # Session Notes: {{session_id}}
  
  📝 **Observer:** {{observer_name}}  
  📅 **Session Date:** {{session_date}}  
  👨‍🔬 **Researcher:** {{researcher}}  
  ⏰ **Submitted:** {{current_date}}
  
  ---
  
  {{structured_notes}}
  
  ---
  
  ## 📊 Session Metadata
  
  | Attribute | Value |
  |-----------|-------|
  | **Session ID** | {{session_id}} |
  | **Observer** | {{observer_name}} ({{slack_user_id}}) |
  | **Submission Date** | {{current_date}} |
  | **GitHub Path** | `03-fieldwork/session-notes/{{session_id}}/{{filename}}` |
  | **Submission Method** | Slack Modal |
  
  ---
  
  <sub>*AI-structured session notes • Generated from observer input • Saved to primary-research repository*</sub>

# GitHub configuration
github:
  repository: "primary-research"
  branch: "main"
  base_path: "03-fieldwork/session-notes"
  commit_message: "Session notes: {{session_id}} by {{observer_name}}"

# Filename pattern
filename:
  pattern: "session-notes_{{slack_user_id}}_{{current_date}}.md"
  variables:
    slack_user_id: "{{slack_user_id}}"
    current_date: "{{current_date}}"

# Output configuration
output_options:
  filename: "session-notes_{{slack_user_id}}_{{current_date}}_{{slack_ts}}.md"
  path: "03-fieldwork/session-notes/"
  
  delivery:
    github:
      enabled: true
      repo: "primary-research"
      path: "03-fieldwork/session-notes/{{session_id}}/"
      commit_message: "Session notes: {{session_id}} by {{observer_name}}"
      
    slack:
      enabled: true
      
      # DM to submitter
      dm_submitter:
        enabled: true
        message: |
          ✅ **Your session notes have been saved!**
          
          **Session:** {{session_id}}
          **File:** `{{filename}}`
          **Location:** `03-fieldwork/session-notes/{{session_id}}/`
          
          📂 View your notes: {{github_file_url}}
          
          Thanks for contributing to our research! 🙏
      
      # Channel notification
      channel_notification:
        enabled: true
        target_channel: "#research-team"
        message: |
          📝 **New Session Notes Submitted**
          
          **Observer:** {{observer_name}}
          **Session:** {{session_id}}
          **File:** `{{filename}}`
          
          📂 View in GitHub: {{github_file_url}}

# Validation
validation:
  required_fields:
    - session_id
    - raw_notes
    
  field_limits:
    session_id: 200
    raw_notes: 10000
  
  min_lengths:
    raw_notes: 50

# Slack UI Definition
slack_ui:
  modal:
    title: "📝 Session Notes"
    submit_label: "Save Notes"
    close_label: "Cancel"
    
    sections:
      - section_title: "Session Information"
        section_icon: "📅"
        fields:
          - session_id
      
      - section_title: "💡 Tips for Better Notes"
        section_description: |
          Write your observations freely - AI will organize them into structured sections automatically.
          
          *What to include:*
          • 💬 Quote participant reactions: "This is confusing"
          • ⏱️ Note timestamps: Minute 5: User struggled with navigation
          • ✅ Describe tasks: Task 1 - Find benefits (completed in 3 min)
          • 🐛 Flag technical issues: VoiceOver didn't announce button
          • ⭐ Highlight key moments: Critical moment at minute 12 when user gave up
          • 😤 Capture emotions: User became frustrated, sighed heavily
          
      - section_title: "Your Observations"
        section_icon: "📝"
        fields:
          - raw_notes

# Analytics
analytics:
  track_events:
    - event: "session_notes_submitted"
      properties: [session_id, observer_name, note_length, submission_method]
    - event: "ai_structuring_completed"
      properties: [session_id, processing_time, sections_generated]

# Help text for users
help_documentation:
  tips:
    - "Quote participant reactions directly"
    - "Note timestamps when important moments happen"
    - "Describe task outcomes (completed, failed, partial)"
    - "Flag technical issues as you see them"
    - "Capture emotional reactions and body language"
  
  examples:
    - title: "Good quote capture"
      example: 'Participant said "This is really confusing, I do not know what to click"'
    
    - title: "Timestamp usage"
      example: "Minute 12: User became frustrated when form wouldn't submit"
    
    - title: "Task documentation"
      example: "Task 1 - Find health benefits: Completed successfully in 3 minutes using search"
    
    - title: "Technical issue flagging"
      example: "Technical issue: VoiceOver not announcing submit button label"
    
    - title: "Emotional observation"
      example: "User sighed heavily and said this was taking too long"
