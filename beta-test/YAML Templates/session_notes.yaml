id: session_notes
label: "📝 Session Notes"
version: v3.0
description: Session note-taking with AI generating complete structured output in one pass

author: Qori R&D
created: 2025-07-07
last_updated: 2025-12-05

# v3.0 Changes:
# - Simplified to single AI task that generates complete output
# - Reduced dependency on backend variable passing
# - User provides session_id and observer_name directly in form
# - AI generates full markdown document including header and metadata

# LLM Configuration
llm_config:
  model: "gpt-4"
  temperature: 0.1
  max_tokens: 3000

# Simple input fields - user provides everything
input_variables:
  - session_id:
      type: "text"
      required: true
      label: "Session ID"
      placeholder: "e.g., TH001, TH002"
      help_text: "Enter the participant session ID"
      
  - participant_name:
      type: "text"
      required: true
      label: "Participant Name"
      placeholder: "e.g., Thomas Lee"
      help_text: "Enter the participant's name"
      
  - session_date:
      type: "text"
      required: true
      label: "Session Date"
      placeholder: "e.g., September 4, 2025"
      help_text: "Date the session was conducted"
      
  - researcher_name:
      type: "text"
      required: false
      label: "Researcher/Moderator"
      placeholder: "e.g., Jordan Reyes"
      help_text: "Name of the session moderator"
      
  - observer_name:
      type: "text"
      required: true
      label: "Your Name (Observer)"
      placeholder: "e.g., Alex Chen"
      help_text: "Your name as the note-taker"
      
  - raw_notes:
      type: "textarea"
      required: true
      label: "Session Observations"
      placeholder: |
        Write your observations freely. Include:
        • Participant quotes: "This is confusing"
        • Timestamps: Minute 5: User struggled
        • Tasks: Task 1 - completed, Task 2 - failed
        • Technical issues: Browser opened unexpectedly
        • Emotions: User became frustrated
      rows: 15
      max_length: 3000
      help_text: "Your raw observations (100-3000 characters)"

# Single AI task generates EVERYTHING
ai_generation_tasks:
  - task_id: "generate_full_output"
    prompt: |
      You are organizing session notes from a UX research observation. Generate a COMPLETE structured markdown document.
      
      **SESSION INFORMATION:**
      - Session ID: {{session_id}}
      - Participant: {{participant_name}}
      - Session Date: {{session_date}}
      - Researcher: {{researcher_name}}
      - Observer: {{observer_name}}
      - Submission Date: {{current_date}}
      
      **RAW NOTES TO PROCESS:**
      ---BEGIN NOTES---
      {{raw_notes}}
      ---END NOTES---
      
      ⚠️ CRITICAL RULES:
      1. ONLY extract information from the raw notes provided
      2. NEVER invent quotes, timestamps, tasks, or observations
      3. If a section has no content in the notes, write "No observations recorded."
      4. Preserve exact wording of participant quotes
      
      **GENERATE THIS EXACT DOCUMENT STRUCTURE:**
      
      # Session Notes: {{session_id}} - {{participant_name}}
      
      📝 **Observer:** {{observer_name}}
      📅 **Session Date:** {{session_date}}
      👨‍🔬 **Researcher:** {{researcher_name}}
      ⏰ **Submitted:** {{current_date}}
      
      ---
      
      ## 🗣️ Key Quotes & Reactions
      
      ### ✅ Positive Reactions
      [Extract positive quotes from notes as bullets with > blockquote, or "None recorded"]
      
      ### ⚠️ Frustration Points
      [Extract frustration quotes as bullets with > blockquote, or "None recorded"]
      
      ### 🤔 Confusion
      [Extract confusion quotes as bullets with > blockquote, or "None recorded"]
      
      ## 😤 Emotional Moments & Body Language
      
      [Extract emotional observations with timestamps. Format as:]
      - **Minute X:** [emoji] [observation]
      
      [Use: 😤 frustrated, 😟 worried, 😌 relieved, 😩 fatigued, 🤔 confused, 😊 satisfied]
      [If none found: "No observations recorded."]
      
      ## ✅ Task Completion & Observations
      
      [For each task mentioned, format as:]
      
      ### Task N: [Task Name] — [✅ Completed | ⚠️ Partial | ❌ Failed]
      - [Observation from notes]
      
      [If no tasks mentioned: "No observations recorded."]
      
      ## 🛠 Technical Issues & Platform Problems
      
      ### ❌ Critical Issues
      [List critical issues from notes, or "None recorded"]
      
      ### ⚠️ Minor Issues
      [List minor issues from notes, or "None recorded"]
      
      ## ♿ Accessibility & Accommodation Observations
      
      ### ✅ What Worked
      [List accessibility positives, or "None recorded"]
      
      ### ❌ Barriers Encountered
      [List accessibility barriers, or "None recorded"]
      
      ### 👤 User Needs Identified
      [List stated needs, or "None recorded"]
      
      ## ⭐ Top 3 Key Moments
      
      ### 1. [Moment Title] (Minute X) — 🚨 Critical
      **What happened:** [From notes]
      **Impact:** [From notes]
      
      ### 2. [Moment Title] (Minute X) — ⚠️ High
      **What happened:** [From notes]
      **Impact:** [From notes]
      
      ### 3. [Moment Title] (Minute X) — 💡 Notable
      **What happened:** [From notes]
      **Impact:** [From notes]
      
      [Include only moments supported by the notes. If fewer than 3, include only what's there.]
      
      ## 📋 Additional Context
      
      ### 👤 Participant Background
      [Any background info from notes, or "Not recorded"]
      
      ### 🎯 Key Recommendations
      [Summarize what the participant needs based on notes]
      
      ---
      
      ## 📊 Session Metadata
      
      | Attribute | Value |
      |-----------|-------|
      | **Session ID** | {{session_id}} |
      | **Participant** | {{participant_name}} |
      | **Observer** | {{observer_name}} |
      | **Session Date** | {{session_date}} |
      | **Submission Date** | {{current_date}} |
      | **GitHub Path** | `03-fieldwork/session-notes/{{session_id}}/` |
      
      ---
      
      <sub>*AI-structured session notes • Generated from observer input*</sub>
      
      ---
      
      **OUTPUT THE COMPLETE DOCUMENT ABOVE.** Fill in all sections based on the raw notes. Do not add any preamble or explanation—just output the markdown document.
    output_variable: "full_document"

# Output template - just uses the AI-generated document
output_template: |
  {{full_document}}

# Output configuration
output_options:
  filename: "{{observer_name}}_{{session_id}}_{{current_date}}.md"
  path: "03-fieldwork/session-notes/{{session_id}}/"
  
  delivery:
    github:
      enabled: true
      repo: "primary-research"
      path: "03-fieldwork/session-notes/{{session_id}}/"
      commit_message: "Session notes: {{session_id}} by {{observer_name}}"
      
    slack:
      enabled: true
      dm_submitter:
        enabled: true
        message: |
          ✅ **Session notes saved!**
          **Session:** {{session_id}} - {{participant_name}}
          📂 View: {{github_file_url}}

# Validation
validation:
  required_fields:
    - session_id
    - participant_name
    - session_date
    - observer_name
    - raw_notes
    
  field_limits:
    raw_notes: 3000
  
  min_lengths:
    raw_notes: 100

# Slack UI
slack_ui:
  modal:
    title: "📝 Session Notes"
    submit_label: "Save Notes"
    close_label: "Cancel"
