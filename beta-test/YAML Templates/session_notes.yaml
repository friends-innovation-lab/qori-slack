id: session_notes
label: "📝 Session Notes Generator"
description: Convert Slack modal submissions to structured GitHub markdown files
trigger_type: slack_modal_submission
callback_id: session_notes_modal

external_data_sources:
  participant_tracker:
    file_path: "participant_tracker.yaml"
    endpoint: "/api/slack/options/sessions"
    cache_duration: "5 minutes"
    
    option_mapping:
      value: "{{session_id}}"
      label: "{{session_id}} - {{participant_name}} ({{session_date}})"
      description: "{{session_time}} | {{researcher}} | {{session_type}}"
      
    filters:
      - status: "scheduled|in_progress|completed"
      - session_date: "within_7_days"
      - has_observers: true
      
    fallback:
      enabled: true
      fallback_to: "text_input"
      placeholder: "Enter session ID manually (e.g., P001-SessionA)"

github:
  repository: "primary-research"
  branch: "main"
  base_path: "03-fieldwork/session-notes"
  commit_message: "Session notes: {{participant_id}} by {{slack_user_display_name}}"

filename:
  pattern: "{{user_name}}_session-notes_{{date}}.md"
  variables:
    user_name: "{{slack_user_display_name | slugify}}"
    date: "{{submission_timestamp | format_date:'YYYY-MM-DD'}}"

field_mapping:
  session_selection:
    block_id: "session_selection"
    action_id: "session_dropdown"
    variable_name: "selected_session"
    data_source: "participant_tracker.yaml"
    required: true
    
  quotes_reactions:
    block_id: "quotes_reactions"
    action_id: "quotes"
    variable_name: "quotes"
    preprocessing:
      - transform: "detect_categories"
        categories:
          - pattern: "(?i)(positive|success|good|works well|helpful|logical)"
            header: "### ✅ Positive Reactions"
          - pattern: "(?i)(frustrat|annoyed|difficult|problem|issue|bad|broken)"
            header: "### ⚠️ Frustration Points"
          - pattern: "(?i)(confus|unclear|unsure|don't understand)"
            header: "### 🤔 Confusion Moments"
          - pattern: "(?i)(screen reader|voiceover|assistive|accessibility|a11y)"
            header: "### 🎧 Screen Reader Perspective"
          - pattern: "(?i)(learn|educate|explain|understand|know)"
            header: "### 💡 User Education Insights"
      - transform: "extract_quotes"
        quote_chars: ['"', "'"]
        output_format: "- > {quote}"
        wrap_unquoted: true
      - transform: "convert_to_bullets"
        detect_sentences: true
        min_sentence_length: 15
    
  emotional_moments:
    block_id: "emotional_moments"
    action_id: "emotions"
    variable_name: "emotions"
    preprocessing:
      - transform: "detect_timestamps"
        patterns:
          - "Minute (\\d+):"
          - "Min (\\d+):"
          - "(\\d+) min:"
          - "At (\\d+):"
        output_format: "**Minute {time}:**"
      - transform: "detect_emotions"
        emotion_keywords:
          "😊": ["confident", "satisfied", "pleased", "happy", "brightened", "positive"]
          "😤": ["frustrated", "annoyed", "irritated", "angry"]
          "😟": ["concerned", "worried", "anxious", "uncertain"]
          "🤔": ["confused", "uncertain", "puzzled", "questioning"]
          "💪": ["determined", "persistent", "resilient"]
          "👨‍🏫": ["educational", "instructive", "explaining", "teaching"]
          "✅": ["professional", "calm", "composed", "constructive"]
        insert_after_timestamp: true
      - transform: "split_into_bullets"
        split_by: "\\. "
        prefix: "- "
        group_by_timestamp: true
    
  task_observations:
    block_id: "task_observations"
    action_id: "tasks"
    variable_name: "tasks"
    preprocessing:
      - transform: "detect_tasks"
        patterns:
          - "Task (\\d+):\\s*(.+?)(?=Task \\d+:|$)"
        output_format: "### Task {number}: {name}"
      - transform: "detect_status"
        status_map:
          "✅": ["completed", "success", "done", "finished", "✅"]
          "⚠️": ["partial", "incomplete", "some issues", "⚠️"]
          "❌": ["failed", "unable", "couldn't", "error", "❌"]
        append_to_header: true
        include_duration: true
        duration_pattern: "(\\d+)\\s*(?:minutes?|mins?)"
      - transform: "extract_task_details"
        detail_keywords:
          "Mental Model": ["expected", "anticipated", "assumed", "thought"]
          "Navigation Pattern": ["navigated", "explored", "searched", "moved through"]
          "Success Factors": ["success", "worked well", "effective", "clear"]
          "Barriers": ["barrier", "issue", "problem", "difficulty", "obstacle"]
          "User Experience": ["experience", "felt", "perception", "reaction"]
          "Time Impact": ["took", "time", "duration", "slower", "longer"]
        output_format: "- **{keyword}:** {content}"
    
  technical_issues:
    block_id: "technical_issues"
    action_id: "tech_issues"
    variable_name: "tech_issues"
    preprocessing:
      - transform: "add_callout"
        callout_type: "WARNING"
        callout_title: "Technical Barriers Observed"
      - transform: "detect_categories"
        categories:
          - pattern: "(?i)(voiceover.+(?:success|work|correct|proper))"
            header: "### ✅ VoiceOver Integration Successes"
          - pattern: "(?i)(voiceover.+(?:fail|issue|problem|broken))"
            header: "### ❌ Critical VoiceOver Failures"
          - pattern: "(?i)(navigation|menu|hierarchy)"
            header: "### 🗺️ Navigation Structure Issues"
          - pattern: "(?i)(ios|accessibility protocol|compliance)"
            header: "### 📱 iOS Accessibility Protocol Compliance"
      - transform: "convert_to_bullets"
        detect_sentences: true
        preserve_timestamps: true
        format: "- {content}"
    
  accessibility_notes:
    block_id: "accessibility_notes"
    action_id: "accessibility"
    variable_name: "accessibility"
    optional: true
    preprocessing:
      - transform: "add_callout"
        callout_type: "IMPORTANT"
        callout_title: "Accessibility Insights"
      - transform: "detect_categories"
        categories:
          - pattern: "(?i)(success|work|correct|proper|good).+(screen reader|voiceover|accessibility)"
            header: "### ✅ Successful Screen Reader Accommodations"
          - pattern: "(?i)(fail|issue|problem|critical|barrier).+(accessibility|screen reader)"
            header: "### ❌ Critical Accommodation Failures"
          - pattern: "(?i)(strategy|adapt|workaround|approach)"
            header: "### 🔄 User Adaptation Strategies"
          - pattern: "(?i)(pattern|behavior|need|require|prefer)"
            header: "### 👤 Screen Reader User Experience Patterns"
      - transform: "convert_to_bullets"
        detect_sentences: true
        format: "- {content}"
    
  key_moments:
    block_id: "key_moments"
    action_id: "moments"
    variable_name: "moments"
    preprocessing:
      - transform: "detect_numbered_items"
        patterns:
          - "^(\\d+)[\\.)\\s]+"
          - "^Moment (\\d+)"
        output_format: "### {number}. "
      - transform: "extract_title_and_timestamp"
        timestamp_pattern: "\\(Minute (\\d+)\\)"
        append_timestamp: true
      - transform: "add_importance_badge"
        importance_keywords:
          "🚨 Critical": ["critical", "fundamental", "major", "serious"]
          "⚠️ Significant": ["significant", "important", "notable"]
          "✅ Positive": ["positive", "success", "good", "effective"]
        append_to_title: true
      - transform: "structure_moment_sections"
        section_keywords:
          "Context": ["encountered", "happened", "observed", "found"]
          "Impact": ["reaction", "showed", "highlighted", "demonstrated", "frustration", "satisfaction"]
          "Implications": ["demonstrates", "shows", "indicates", "suggests", "means", "requires"]
        output_format: "**{section}:**\n{content}\n"
    
  additional_notes:
    block_id: "additional_notes"
    action_id: "notes"
    variable_name: "additional"
    optional: true
    preprocessing:
      - transform: "detect_categories"
        categories:
          - pattern: "(?i)(background|expertise|experience|veteran|years)"
            header: "### 👤 User Expertise Level"
          - pattern: "(?i)(navigation|pattern|approach|method|systematic)"
            header: "### 🎯 Screen Reader Navigation Patterns"
          - pattern: "(?i)(implication|impact|effect|outcome)"
            header: "### 💡 User Experience Implications"
          - pattern: "(?i)(research|value|insight|finding|evidence)"
            header: "### 📊 Research Value"
          - pattern: "(?i)(dynamic|session|interaction|demeanor)"
            header: "### 🎭 Session Dynamics"
      - transform: "convert_to_bullets"
        detect_sentences: true
        format: "- {content}"

# Text transformation definitions
text_transformations:
  
  detect_categories:
    description: "Automatically detect and organize content by categories"
    logic: |
      1. Scan input text for category keywords/patterns
      2. Split text into sections based on matches
      3. Add category headers with icons
      4. Group related content under each header
    
  extract_quotes:
    description: "Extract quoted text and format as blockquotes"
    logic: |
      1. Find text enclosed in quote marks (" or ')
      2. Format each as markdown blockquote with bullet
      3. If text has no quotes, treat sentences as implicit quotes
      4. Output: - > "quote text"
    
  convert_to_bullets:
    description: "Convert prose into bulleted lists"
    logic: |
      1. Split text into sentences (by period, line break)
      2. Filter out sentences shorter than min_sentence_length
      3. Add bullet prefix (- ) to each sentence
      4. Preserve existing structure (timestamps, categories)
    
  detect_timestamps:
    description: "Find and format timestamp references"
    logic: |
      1. Search for patterns like "Minute X:" or "X min:"
      2. Normalize to standard format: **Minute X:**
      3. Use as grouping anchor for subsequent content
    
  detect_emotions:
    description: "Identify emotional keywords and add emoji indicators"
    logic: |
      1. Scan for emotion keywords (frustrated, satisfied, etc.)
      2. Map to appropriate emoji
      3. Insert emoji after timestamp marker
      4. Format: **Minute X:** 😊 Emotional description
    
  split_into_bullets:
    description: "Split content into bullet points"
    logic: |
      1. Split by sentence terminators (. ! ?)
      2. Group related sentences if under same timestamp
      3. Add dash-space prefix to each bullet
      4. Nest under timestamp headers
    
  detect_tasks:
    description: "Identify task entries and structure them"
    logic: |
      1. Find patterns like "Task 1:" or "Task: Name"
      2. Extract task number and name
      3. Create H3 header: ### Task X: Name
      4. Group subsequent content under this task
    
  detect_status:
    description: "Identify task completion status"
    logic: |
      1. Search for status keywords (completed, partial, failed)
      2. Search for status icons (✅ ⚠️ ❌)
      3. Map to standard icon
      4. Extract duration if present (X minutes)
      5. Append to task header: — ✅ Completed (X minutes)
    
  extract_task_details:
    description: "Extract structured details from task descriptions"
    logic: |
      1. Scan for detail keywords (Mental Model, Navigation, etc.)
      2. Extract content following each keyword
      3. Format as bullets with bold labels
      4. Output: - **Keyword:** content
    
  add_callout:
    description: "Add GitHub-style callout/alert box"
    logic: |
      1. Prepend alert syntax: > [!TYPE]
      2. Add title line: > **Title**
      3. Insert blank line before content
      4. Types: NOTE, TIP, IMPORTANT, WARNING, CAUTION
    
  detect_numbered_items:
    description: "Find numbered list items and format consistently"
    logic: |
      1. Search for various numbering patterns (1., 1), (1))
      2. Normalize to: ### 1. Title
      3. Preserve original content under each number
    
  extract_title_and_timestamp:
    description: "Separate moment title from timestamp"
    logic: |
      1. Find timestamp in parentheses (Minute X)
      2. Extract as separate element
      3. Append to title if requested
      4. Format: ### 1. Title (Minute X)
    
  add_importance_badge:
    description: "Add visual importance indicator to key moments"
    logic: |
      1. Analyze content for severity keywords
      2. Assign badge: 🚨 Critical, ⚠️ Significant, ✅ Positive
      3. Append to moment title
      4. Format: ### 1. Title — 🚨 Critical
    
  structure_moment_sections:
    description: "Break moment into Context/Impact/Implications sections"
    logic: |
      1. Analyze content for section indicators
      2. Split into 3 parts if possible
      3. Add bold section headers
      4. Format each section with proper spacing

output_template: |
  # Session Notes: {{selected_session}}

  📝 **Note Taker:** {{user_name}}  
  📅 **Session Date:** {{session_date}}
  👨‍🔬 **Researcher:** {{researcher}}  
  ⏰ **Submitted:** {{current_date}}

  ---

  ## 🗣️ Key Quotes & Reactions

  {{quotes | apply_preprocessing}}

  ---

  ## 😤 Emotional Moments & Body Language

  {{emotions | apply_preprocessing}}

  ---

  ## ✅ Task Completion & Errors

  {{tasks | apply_preprocessing}}

  ---

  ## 🛠 Technical Issues & Platform Problems

  {{tech_issues | apply_preprocessing}}

  ---

  {{#if accessibility}}
  ## ♿ Accessibility & Accommodation Observations

  {{accessibility | apply_preprocessing}}

  ---

  {{/if}}
  ## ⭐ Top 3 Key Moments

  {{moments | apply_preprocessing}}

  ---

  {{#if additional}}
  ## 📋 Additional Notes & Context

  {{additional | apply_preprocessing}}

  ---

  {{/if}}
  ## 📊 Session Metadata

  | Attribute | Value |
  |-----------|-------|
  | **Session ID** | {{selected_session}} |
  | **Note Taker** | {{user_name}} ({{slack_user_id}}) |
  | **Submission Date** | {{current_date}} |
  | **GitHub Path** | `03-fieldwork/session-notes/{{participant_id}}/{{filename}}` |
  | **Submission Method** | Slack Modal |

  ---

  <sub>*Generated automatically from Slack modal submission • Saved to primary-research repository*</sub>

post_actions:
  slack_notification:
    enabled: true
    target_channel: "#research-team"
    message_template: |
      📝 **New Session Notes Submitted**
      
      **Note Taker:** {{slack_user_display_name}}
      **Session:** {{selected_session}}
      **File:** `{{filename}}`
      
      📂 View in GitHub: {{github_file_url}}
    
    dm_submitter:
      enabled: true
      message: |
        ✅ **Your session notes have been saved!**
        
        **File:** `{{filename}}`
        **Location:** `03-fieldwork/session-notes/{{participant_id}}/`
        
        📂 View your notes: {{github_file_url}}
        
        Thanks for contributing to our research! 🙏

validation:
  required_fields:
    - session_selection.selected_session
    - quotes_reactions.quotes
    - key_moments.moments
    
  field_limits:
    selected_session: 200
    quotes: 5000
    emotions: 3000
    tasks: 3000
    tech_issues: 2000
    accessibility: 2000
    moments: 1500
    additional: 3000

integration:
  qori:
    enabled: true
    webhook_url: "{{qori_webhook_endpoint}}"
    authentication: "bearer_token"
    
  github_api:
    enabled: true
    api_version: "2022-11-28"
    create_pr: false
    
  slack_api:
    scopes_required:
      - "chat:write"
      - "users:read"
      - "channels:read"
