id: session_notes
label: "📝 Session Notes"
version: v2.1
description: Quick session note-taking with AI-powered organization into structured sections

author: Qori R&D
created: 2025-07-07
last_updated: 2025-12-05

# v2.1 Changes:
# - Added anti-hallucination guardrails to AI prompt
# - Added explicit section headers the AI MUST output
# - Added validation rules for empty inputs
# - Added fallback values for missing metadata
# - Lowered temperature for more consistent output

# LLM Configuration
llm_config:
  model: "gpt-4"
  temperature: 0.1  # Lowered from 0.2 for more consistent structure
  max_tokens: 3000
  
  # System instruction for all tasks
  system_instruction: |
    You are a UX research assistant organizing session notes. Your rules:
    1. ONLY use information explicitly written in the raw notes provided
    2. NEVER invent quotes, timestamps, tasks, or observations
    3. If a section has no relevant content in the notes, write "No observations recorded for this section."
    4. Preserve exact wording of any quotes
    5. Do not add context or details not present in the original notes

input_type: structured
input_processing: ai_structured
precision_mode: detailed

# Integration with participant tracker
external_data_sources:
  participant_tracker:
    file_path: "participant_tracker.yaml"
    endpoint: "/api/slack/options/sessions"
    cache_duration: "5 minutes"
    
    option_mapping:
      value: "{{session_id}}"
      label: "{{session_id}} - {{participant_name}} ({{session_date}})"
      description: "{{session_time}} | {{researcher}} | {{session_type}}"
      
    filters:
      - status: "scheduled|in_progress|completed"
      - session_date: "within_7_days"
      - has_observers: true
      
    fallback:
      enabled: true
      fallback_to: "text_input"
      placeholder: "Enter session ID manually (e.g., TH001)"

# Input variables with validation
input_variables:
  - session_id:
      type: "select"
      required: true
      label: "Session"
      placeholder: "Select the session you observed..."
      data_source: "participant_tracker"
      help_text: "Choose from recent sessions"
      validation:
        min_length: 1
        error_message: "Please select or enter a session ID"
      
  - observer_name:
      type: "hidden"
      derived_from: "slack_user_display_name"
      fallback: "Observer"
      
  - raw_notes:
      type: "textarea"
      required: true
      label: "Session observations"
      placeholder: |
        Write your observations freely. The AI will organize them into sections automatically.
        
        💡 Tips for better notes:
        • Quote participant reactions: "This is confusing"
        • Note timestamps: Minute 5: User struggled with navigation
        • Describe tasks: Task 1 - Find benefits (completed in 3 min)
        • Flag technical issues: VoiceOver didn't announce button
        • Highlight key moments: Critical moment at minute 12 when user gave up
        • Capture emotions: User became frustrated, sighed heavily
        
        Write naturally - the system will structure everything for you!
      rows: 20
      max_length: 3000
      validation:
        min_length: 100
        error_message: "Please enter at least 100 characters of observations"
      help_text: "Freeform observations (100-3000 characters). AI will extract quotes, timestamps, tasks, and organize into sections."

# Pre-execution validation
validation_rules:
  - rule: "session_id_not_empty"
    check: "{{session_id | length}} > 0"
    error_message: "Session ID is required. Please select a session or enter an ID."
    
  - rule: "raw_notes_not_empty"
    check: "{{raw_notes | length}} >= 100"
    error_message: "Please enter at least 100 characters of observations."

# AI Processing - Extract structure from freeform notes
ai_processing_tasks:
  - task_id: "structure_notes"
    prompt: |
      You are organizing raw session notes from a UX research observation into structured sections.
      
      **RAW NOTES TO PROCESS:**
      ---BEGIN NOTES---
      {{raw_notes}}
      ---END NOTES---
      
      ⚠️ CRITICAL RULES:
      1. If the notes between BEGIN/END markers are empty, respond with: "⚠️ No notes were provided."
      2. ONLY extract information explicitly written in the notes above
      3. NEVER invent quotes, timestamps, emotions, tasks, or issues not in the notes
      4. If you cannot find content for a section, write: "No observations recorded for this section."
      5. Preserve exact wording of any participant quotes
      6. Do NOT add analysis or insights beyond what's written
      
      **OUTPUT THESE EXACT SECTIONS IN THIS ORDER:**
      
      ## 🗣️ Key Quotes & Reactions
      
      Extract direct participant quotes from the notes. Look for text in quotation marks or phrases like "they said", "participant mentioned", "user stated".
      
      ### ✅ Positive Reactions
      [List positive quotes as bullets with > blockquote, or "None recorded"]
      
      ### ⚠️ Frustration Points  
      [List frustration quotes as bullets with > blockquote, or "None recorded"]
      
      ### 🤔 Confusion
      [List confusion quotes as bullets with > blockquote, or "None recorded"]
      
      ## 😤 Emotional Moments & Body Language
      
      Extract emotional observations with timestamps when available. Format:
      - **Minute X:** [emoji] [observation]
      
      Use these emojis: 😤 frustrated, 😟 worried, 😌 relieved, 😩 fatigued, 🤔 confused, 😊 satisfied
      
      [List emotional moments, or "No observations recorded for this section."]
      
      ## ✅ Task Completion & Observations
      
      Extract task descriptions with outcomes. Format each as:
      
      ### Task N: [Task Name] — [✅ Completed | ⚠️ Partial | ❌ Failed]
      - [Observation bullets]
      
      [List tasks found in notes, or "No observations recorded for this section."]
      
      ## 🛠 Technical Issues & Platform Problems
      
      Extract bugs, technical failures, or platform issues mentioned.
      
      ### ❌ Critical Issues
      [List critical issues, or "None recorded"]
      
      ### ⚠️ Minor Issues
      [List minor issues, or "None recorded"]
      
      [If no technical issues mentioned: "No observations recorded for this section."]
      
      ## ♿ Accessibility & Screen Reader Observations
      
      Extract accessibility-related observations (screen reader, captions, magnification, etc.)
      
      ### ✅ Positive Features
      [List what worked, or "None recorded"]
      
      ### ❌ Accessibility Barriers
      [List barriers found, or "None recorded"]
      
      ### 👤 User Needs
      [List stated needs, or "None recorded"]
      
      [If no accessibility content: "No observations recorded for this section."]
      
      ## ⭐ Top 3 Key Moments
      
      Identify the 3 most significant moments from the session. Format:
      
      ### 1. [Moment Title] (Minute X) — [🚨 Critical | ⚠️ High | 💡 Notable]
      **What happened:** [Brief description from notes]
      **Impact:** [Stated or observable impact]
      
      [Repeat for moments 2 and 3. If fewer than 3 significant moments, include only what's supported by the notes.]
      
      ## 📋 Additional Context & Observations
      
      ### 👤 Participant Background
      [Any background info mentioned, or "Not recorded"]
      
      ### 🎭 Session Dynamics
      [Any session dynamic observations, or "Not recorded"]
      
      ---
      
      **REMEMBER:** Only include information from the provided notes. Never fabricate content.
    output_variable: "structured_notes"

# Output template
output_template: |
  # Session Notes: {{session_id}}
  
  📝 **Observer:** {{observer_name}}  
  📅 **Session Date:** {{session_date}}  
  👨‍🔬 **Researcher:** {{researcher}}  
  ⏰ **Submitted:** {{current_date}}
  
  ---
  
  {{structured_notes}}
  
  ---
  
  ## 📊 Session Metadata
  
  | Attribute | Value |
  |-----------|-------|
  | **Session ID** | {{session_id}} |
  | **Observer** | {{observer_name}} ({{slack_user_id}}) |
  | **Submission Date** | {{current_date}} |
  | **GitHub Path** | `03-fieldwork/session-notes/{{session_id}}/{{filename}}` |
  | **Submission Method** | Slack Modal |
  
  ---
  
  <sub>*AI-structured session notes • Generated from observer input • Saved to primary-research repository*</sub>

# GitHub configuration
github:
  repository: "primary-research"
  branch: "main"
  base_path: "03-fieldwork/session-notes"
  commit_message: "Session notes: {{session_id}} by {{observer_name}}"

# Filename pattern
filename:
  pattern: "{{observer_name}}_{{session_id}}_{{date}}.md"
  variables:
    observer_name: "{{slack_user_display_name}}"
    session_id: "{{session_id}}"
    date: "{{submission_timestamp}}"

# Output configuration
output_options:
  filename: "{{observer_name}}_{{session_id}}_{{current_date}}.md"
  path: "03-fieldwork/session-notes/{{session_id}}/"
  
  delivery:
    github:
      enabled: true
      repo: "primary-research"
      path: "03-fieldwork/session-notes/{{session_id}}/"
      commit_message: "Session notes: {{session_id}} by {{observer_name}}"
      
    slack:
      enabled: true
      
      # DM to submitter
      dm_submitter:
        enabled: true
        message: |
          ✅ **Your session notes have been saved!**
          
          **Session:** {{session_id}}
          **File:** `{{filename}}`
          **Location:** `03-fieldwork/session-notes/{{session_id}}/`
          
          📂 View your notes: {{github_file_url}}
          
          Thanks for contributing to our research! 🙏
      
      # Channel notification
      channel_notification:
        enabled: true
        target_channel: "#research-team"
        message: |
          📝 **New Session Notes Submitted**
          
          **Observer:** {{observer_name}}
          **Session:** {{session_id}}
          **File:** `{{filename}}`
          
          📂 View in GitHub: {{github_file_url}}

# Validation
validation:
  required_fields:
    - session_id
    - raw_notes
    
  field_limits:
    session_id: 200
    raw_notes: 3000
  
  min_lengths:
    raw_notes: 100

# Error messages
error_messages:
  no_session_id: "⚠️ Please select or enter a session ID."
  no_notes: "⚠️ Please enter your session observations (minimum 100 characters)."
  notes_too_short: "⚠️ Your notes are too short. Please add more detail (minimum 100 characters)."
  processing_failed: "⚠️ Failed to process notes. Please try again or contact support."

# Slack UI Definition
slack_ui:
  modal:
    title: "📝 Session Notes"
    submit_label: "Save Notes"
    close_label: "Cancel"
    
    sections:
      - section_title: "Session Information"
        section_icon: "📅"
        fields:
          - session_id
      
      - section_title: "💡 Tips for Better Notes"
        section_description: |
          Write your observations freely - AI will organize them into structured sections automatically.
          
          *What to include:*
          • 💬 Quote participant reactions: "This is confusing"
          • ⏱️ Note timestamps: Minute 5: User struggled with navigation
          • ✅ Describe tasks: Task 1 - Find benefits (completed in 3 min)
          • 🛠 Flag technical issues: VoiceOver didn't announce button
          • ⭐ Highlight key moments: Critical moment at minute 12 when user gave up
          • 😤 Capture emotions: User became frustrated, sighed heavily
          
      - section_title: "Your Observations"
        section_icon: "📓"
        fields:
          - raw_notes

# Analytics
analytics:
  track_events:
    - event: "session_notes_submitted"
      properties: [session_id, observer_name, note_length, submission_method]
    - event: "ai_structuring_completed"
      properties: [session_id, processing_time, sections_generated]

# Help text for users
help_documentation:
  tips:
    - "Quote participant reactions directly"
    - "Note timestamps when important moments happen"
    - "Describe task outcomes (completed, failed, partial)"
    - "Flag technical issues as you see them"
    - "Capture emotional reactions and body language"
  
  examples:
    - title: "Good quote capture"
      example: 'Participant said "This is really confusing, I do not know what to click"'
    
    - title: "Timestamp usage"
      example: "Minute 12: User became frustrated when form wouldn't submit"
    
    - title: "Task documentation"
      example: "Task 1 - Find health benefits: Completed successfully in 3 minutes using search"
    
    - title: "Technical issue flagging"
      example: "Technical issue: VoiceOver not announcing submit button label"
    
    - title: "Emotional observation"
      example: "User sighed heavily and said this was taking too long"
