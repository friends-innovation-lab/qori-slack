id: session_notes_template
label: "📝 Session Notes Generator"
description: Convert Slack modal submissions to structured GitHub markdown files
trigger_type: slack_modal_submission
callback_id: session_notes_modal

external_data_sources:
  participant_tracker:
    file_path: "participant_tracker.yaml"
    endpoint: "/api/slack/options/sessions"
    cache_duration: "5 minutes"
    
    option_mapping:
      value: "{{session_id}}"
      label: "{{session_id}} - {{participant_name}} ({{session_date}})"
      description: "{{session_time}} | {{researcher}} | {{session_type}}"
      
    filters:
      - status: "scheduled|in_progress|completed"
      - session_date: "within_7_days"
      - has_observers: true
      
    fallback:
      enabled: true
      fallback_to: "text_input"
      placeholder: "Enter session ID manually (e.g., P001-SessionA)"

github:
  repository: "primary-research"
  branch: "main"
  base_path: "03-fieldwork/session-notes"
  commit_message: "Session notes: {{participant_id}} by {{slack_user_display_name}}"

filename:
  pattern: "{{user_name}}_notes_{{date}}.md"
  variables:
    user_name: "{{slack_user_display_name | slugify}}"
    date: "{{submission_timestamp | format_date:'YYYY-MM-DD'}}"

field_mapping:
  session_selection:
    block_id: "session_selection"
    action_id: "session_dropdown"
    variable_name: "selected_session"
    data_source: "participant_tracker.yaml"
    required: true
    
  quotes_reactions:
    block_id: "quotes_reactions"
    action_id: "quotes"
    variable_name: "quotes"
    format_type: "preserve_line_breaks"
    
  emotional_moments:
    block_id: "emotional_moments"
    action_id: "emotions"
    variable_name: "emotions"
    format_type: "preserve_line_breaks"
    
  task_observations:
    block_id: "task_observations"
    action_id: "tasks"
    variable_name: "tasks"
    format_type: "preserve_line_breaks"
    
  technical_issues:
    block_id: "technical_issues"
    action_id: "tech_issues"
    variable_name: "tech_issues"
    format_type: "preserve_line_breaks"
    
  accessibility_notes:
    block_id: "accessibility_notes"
    action_id: "accessibility"
    variable_name: "accessibility"
    format_type: "preserve_line_breaks"
    optional: true
    
  key_moments:
    block_id: "key_moments"
    action_id: "moments"
    variable_name: "moments"
    format_type: "preserve_line_breaks"
    
  additional_notes:
    block_id: "additional_notes"
    action_id: "notes"
    variable_name: "additional"
    format_type: "preserve_line_breaks"
    optional: true

output_template: |
  # Session Notes: {{selected_session}}

  📝 **Note Taker:** {{user_name}}

  📅 **Session Date:** {{session_date}} at {{session_time}}

  👨‍🔬 **Researcher:** {{researcher}}

  ⏰ **Submitted:** {{current_date}}

  <br>

  ---

  <br>

  ## 🗣️ Key Quotes & Reactions

  {{#if quotes}}
  {{quotes}}
  {{else}}
  > [!NOTE]
  > *No quotes recorded for this session.*
  {{/if}}

  <br>

  ---

  <br>

  ## 😤 Emotional Moments & Body Language

  {{#if emotions}}
  <details>
  <summary><strong>📊 Emotional Journey Throughout Session</strong> <kbd>Click to expand</kbd></summary>

  {{emotions}}

  </details>
  {{else}}
  > [!NOTE]
  > *No emotional moments recorded for this session.*
  {{/if}}

  <br>

  ---

  <br>

  ## ✅ Task Completion & Errors

  {{#if tasks}}
  {{tasks}}
  {{else}}
  > [!NOTE]
  > *No task observations recorded for this session.*
  {{/if}}

  <br>

  ---

  <br>

  ## 🛠 Technical Issues & Platform Problems

  {{#if tech_issues}}
  > [!WARNING]
  > **Technical Barriers Observed**

  {{tech_issues}}
  {{else}}
  > [!NOTE]
  > *No technical issues reported for this session.*
  {{/if}}

  <br>

  ---

  <br>

  {{#if accessibility}}
  ## ♿ Accessibility & Accommodation Observations

  > [!IMPORTANT]
  > **Accessibility Insights**

  {{accessibility}}

  <br>

  ---

  <br>

  {{/if}}
  ## ⭐ Top 3 Key Moments

  {{#if moments}}
  {{moments}}
  {{else}}
  > [!NOTE]
  > *No key moments identified for this session.*
  {{/if}}

  <br>

  ---

  <br>

  {{#if additional}}
  ## 📋 Additional Notes & Context

  <details>
  <summary><strong>Additional Context & Background</strong> <kbd>Click to expand</kbd></summary>

  {{additional}}

  </details>

  <br>

  ---

  <br>

  {{/if}}
  ## 📊 Session Metadata

  | Attribute | Value |
  |-----------|-------|
  | **Session ID** | {{selected_session}} |
  | **Note Taker** | {{user_name}} ({{slack_user_id}}) |
  | **Submission Date** | {{current_date}} |
  | **GitHub Path** | `03-fieldwork/session-notes/{{participant_id}}/{{filename}}` |
  | **Submission Method** | Slack Modal |

  ---

  <sub>*Generated automatically from Slack modal submission • Saved to primary-research repository*</sub>

post_actions:
  slack_notification:
    enabled: true
    target_channel: "#research-team"
    message_template: |
      📝 **New Session Notes Submitted**
      
      **Note Taker:** {{slack_user_display_name}}
      **Session:** {{selected_session}}
      **File:** `{{filename}}`
      
      📂 View in GitHub: {{github_file_url}}
    
    dm_submitter:
      enabled: true
      message: |
        ✅ **Your session notes have been saved!**
        
        **File:** `{{filename}}`
        **Location:** `03-fieldwork/session-notes/{{participant_id}}/`
        
        📂 View your notes: {{github_file_url}}
        
        Thanks for contributing to our research! 🙏

  email_notification:
    enabled: false
    
  update_index:
    enabled: true
    index_file: "03-fieldwork/session-notes/README.md"
    append_entry: |
      - [{{selected_session}}]({{participant_id}}/{{filename}}) - {{slack_user_display_name}} - {{submission_date}}

validation:
  required_fields:
    - session_selection.selected_session
    - quotes_reactions.quotes
    - key_moments.moments
    
  field_limits:
    selected_session: 200
    quotes: 5000
    emotions: 3000
    tasks: 3000
    tech_issues: 2000
    accessibility: 2000
    moments: 1500
    additional: 3000
    
  error_handling:
    validation_failure:
      response_type: "ephemeral"
      message: "❌ Please fill in all required fields: Session Selection, Key Quotes, and Top 3 Key Moments."
      
    github_failure:
      response_type: "ephemeral" 
      message: "⚠️ There was an issue saving to GitHub. Your notes have been saved temporarily and the research team has been notified."
      fallback_action: "save_to_slack_thread"

data_processing:
  extract_participant_id:
    regex: "^([A-Za-z0-9_-]+)"
    fallback: "unknown_participant"
    
  slugify:
    replace_spaces: "_"
    remove_special_chars: true
    lowercase: true
    max_length: 20
    
  format_timestamps:
    timezone: "America/New_York"
    formats:
      date: "YYYY-MM-DD"
      datetime: "MMMM DD, YYYY at HH:mm"
      iso: "YYYY-MM-DDTHH:mm:ssZ"

  text_cleanup:
    normalize_whitespace:
      enabled: true
      trim_lines: true
      collapse_multiple_spaces: true
      remove_trailing_spaces: true
      
    punctuation_cleanup:
      enabled: true
      add_periods_to_sentences: true
      fix_quote_spacing: true
      normalize_dashes: true
      fix_apostrophes: true
      
    paragraph_formatting:
      enabled: true
      double_line_breaks_to_paragraphs: true
      minimum_paragraph_length: 10
      max_consecutive_breaks: 2
      
  quote_formatting:
    enabled: true
    quote_indicators: ['"', "'", "said:", "commented:", "mentioned:"]
    quote_format: '"{content}"'
    attribution_format: "- {speaker}"
    group_similar_quotes: true
    
  task_formatting:
    enabled: true
    task_indicators: ["task", "completed", "failed", "✅", "❌", "⏱️"]
    standardize_status_icons:
      completed: "✅"
      failed: "❌"
      in_progress: "⏳"
      partial: "🔄"
    time_format: "{duration} minutes"
    
  section_formatting:
    enabled: true
    auto_generate_subheaders: true
    subheader_patterns:
      positive_reactions: ["positive", "liked", "appreciated", "good"]
      frustration_points: ["frustrated", "annoyed", "difficult", "problem"]
      technology_struggles: ["slow", "loading", "technical", "error"]
      suggestions: ["recommend", "suggest", "improve", "should"]
    
  time_reference_formatting:
    enabled: true
    patterns:
      minute_markers: "Minute {number}:"
      duration_format: "{number} minutes"
      time_ranges: "{start}-{end} minutes"
    standardize_timestamps: true

field_processing:
  quotes_reactions:
    apply_formatting: ["text_cleanup", "quote_formatting", "section_formatting"]
    auto_categorize: true
    categories:
      - "Positive Reactions:"
      - "Frustration Points:"
      - "Technology Struggles:"
      - "Suggestions:"
      
  emotional_moments:
    apply_formatting: ["text_cleanup", "time_reference_formatting"]
    emotion_indicators: ["frustrated", "pleased", "confused", "surprised", "angry", "satisfied"]
    standardize_emotions: true
    
  task_observations:
    apply_formatting: ["text_cleanup", "task_formatting"]
    auto_structure: true
    
  technical_issues:
    apply_formatting: ["text_cleanup", "section_formatting"]
    issue_categories:
      - "Performance Issues:"
      - "Connectivity Problems:"
      - "Interface Problems:"
      - "Error Messages:"
      
  accessibility_notes:
    apply_formatting: ["text_cleanup"]
    
  key_moments:
    apply_formatting: ["text_cleanup", "time_reference_formatting"]
    
  additional_notes:
    apply_formatting: ["text_cleanup", "section_formatting"]
    auto_organize: true

integration:
  qori:
    enabled: true
    webhook_url: "{{qori_webhook_endpoint}}"
    authentication: "bearer_token"
    
  github_api:
    enabled: true
    api_version: "2022-11-28"
    create_pr: false
    
  slack_api:
    scopes_required:
      - "chat:write"
      - "users:read"
      - "channels:read"

output_options:
  filename: "{{user_name}}_notes_{{current_date}}.md"
  path: "03-fieldwork/session-notes/{{participant_id}}/"
  generate_index: true
  index_filename: "README.md"
  
  delivery:
    github:
      enabled: true
      repo: "primary-research"
      path: "03-fieldwork/session-notes/{{participant_id}}/"
      commit_message: "Session notes: {{participant_id}} by {{slack_user_display_name}}"
      
    slack:
      enabled: true
      send_dm: true
      target_user: "{{slack_user_id}}"
      include_copy_button: true
      include_email_format: false
      
      message: |
        📝 **Your session notes have been saved!**
        
        **Session:** {{selected_session}}
        **File:** `{{filename}}`
        **Location:** `03-fieldwork/session-notes/{{participant_id}}/`
        
        📂 View your notes: {{github_file_url}}
        
        Thanks for contributing to our research! 🙏
      
      actions:
        - text: "📋 View Notes in GitHub"
          style: "primary"
          action_type: "url"
          url: "{{github_file_url}}"
          
        - text: "📊 View All Session Notes"
          style: "default"
          action_type: "url"
          url: "{{github_directory_url}}"

workflow_integration:
  triggered_by:
    - "slack_modal_submission"
    - "manual_note_submission"
  
  auto_triggers:
    slack_modal_submission:
      enabled: true
      delay: "immediate"
      conditions:
        - "selected_session != null"
        - "quotes != null"
        - "moments != null"
  
  integration_data:
    slack_modal:
      maps_to:
        selected_session: "session_dropdown_value"
        slack_user_display_name: "user_display_name"
        slack_user_id: "user_id"
    
    participant_tracker:
      maps_to:
        participant_id: "participant_id"
        participant_name: "participant_name"
        session_date: "session_date"
        session_time: "session_time"
        researcher: "researcher"

notification_routing:
  primary_submitter: "{{slack_user_id}}"
  research_team: "#research-team"
  researcher_copy: "{{researcher_slack_id}}"
  
  escalation:
    processing_timeout: "30 seconds"
    escalate_to: "#research-team"
    escalation_message: "Session notes submission from {{slack_user_display_name}} failed to process for {{selected_session}}"
