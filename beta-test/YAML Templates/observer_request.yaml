id: observer_request
label: "👀 Request to Observe Session"
description: Handle observer requests with approval workflow and capacity management
input_type: structured
input_processing: validate_and_route

# Structured inputs from Slack command or modal
inputs:
  requesting_user: "{{slack_user_id}}"
  requesting_user_name: "{{slack_user_name}}"
  session_id: "{{session_id}}" # P01, P02, etc.
  participant_name: "{{participant_name}}"
  session_date: "{{session_date}}"
  session_time: "{{session_time}}"
  study_name: "{{study_name}}"
  requested_role: "{{requested_role}}" # note_taker, silent_observer, pm_observer, stakeholder
  observer_reason: "{{observer_reason}}" # why they want to observe
  observer_experience: "{{observer_experience}}" # first_time, experienced
  researcher_contact: "{{researcher_contact}}"
  researcher_slack_id: "{{researcher_slack_id}}"
  current_observers: "{{current_observers}}" # existing observer count
  existing_observer_list: "{{existing_observer_list}}" # who's already observing
  max_capacity: 3
  request_timestamp: "{{current_date}}"
  urgent_request: "{{urgent_request}}" # true/false for same-day sessions
  available_sessions: "{{available_sessions}}" # list of sessions with capacity
  session_times: "{{session_times}}" # session schedule data
  current_observers: "{{current_observers}}" # who's already observing each session
  session_participant_names: "{{session_participant_names}}" # participant names per session

# Observer role definitions and auto-approval rules
observer_roles:
  note_taker:
    label: "📝 Note-taker"
    description: "Take detailed notes during session"
    auto_approve: true
    priority: high
  silent_observer:
    label: "👁️ Silent Observer"
    description: "Observe without taking notes"
    auto_approve: true
    priority: medium
  pm_observer:
    label: "📊 PM Observer"
    description: "Focus on product/business insights"
    auto_approve: false
    priority: medium
  stakeholder:
    label: "🏛️ Stakeholder"
    description: "Executive or external observer"
    auto_approve: false
    priority: low

# Auto-approval user lists
auto_approve_users:
  - "jordan.researcher"
  - "maria.ux"
  - "team.leads"

approval_required_users:
  - "stakeholders"
  - "external.observers"

# Request validation rules
validation_rules:
  capacity_check:
    max_observers_per_session: 3
    error_message: "Session at capacity (3/3 observers). Request cannot be processed."
  timing_restrictions:
    min_advance_notice: "2 hours"
    same_day_requires_approval: true
  role_restrictions:
    max_note_takers: 1
    max_stakeholders: 1

prompt: |
  You are managing an observer request for a VA research session. Process this observer request and determine the appropriate workflow based on capacity, user permissions, and session requirements.

  **Request Details:**
  - **Requesting User:** {{requesting_user_name}} ({{requesting_user}})
  - **Session:** {{session_id}} - {{participant_name}}
  - **Date/Time:** {{session_date}} at {{session_time}}
  - **Study:** {{study_name}}
  - **Requested Role:** {{requested_role}}
  - **Reason:** {{observer_reason}}
  - **Experience Level:** {{observer_experience}}
  - **Current Observers:** {{current_observers}}/{{max_capacity}}
  - **Existing Observers:** {{existing_observer_list}}

  **Processing Instructions:**

  1. **Capacity Check**: 
     - Verify current observer count ({{current_observers}}) is below maximum ({{max_capacity}})
     - If at capacity, generate rejection message with waitlist option
     - Check for role-specific limits (max 1 note-taker, max 1 stakeholder)

  2. **Auto-Approval Assessment**:
     - Check if requesting user is in auto-approve list
     - Check if requested role allows auto-approval
     - Consider timing (same-day requests may require approval regardless)

  3. **Approval Routing**:
     - If auto-approved: Generate confirmation and trigger observer guide
     - If approval needed: Generate approval request for researcher
     - If rejected: Generate rejection with explanation and alternatives

  4. **Session Impact Assessment**:
     - Note if this is a sensitive session requiring stakeholder approval
     - Check if observer experience level matches session complexity
     - Flag any potential conflicts or concerns

  **Generate Appropriate Response Based on Assessment:**

  - **AUTO-APPROVED**: Confirmation message + trigger observer guide
  - **PENDING APPROVAL**: Approval request to researcher + pending notification to requester
  - **REJECTED**: Rejection message with reason + alternative suggestions
  - **WAITLISTED**: Waitlist confirmation + notification if space opens

output_format: |
  # 👀 Observer Request Processing – {{study_name}}

  **📋 Request Summary**
  - **Requesting User:** {{requesting_user_name}}
  - **Session:** {{session_id}} ({{participant_name}})
  - **Date/Time:** {{session_date}} at {{session_time}}
  - **Requested Role:** {{requested_role}}
  - **Current Capacity:** {{current_observers}}/{{max_capacity}} observers
  - **Request Status:** [AUTO-APPROVED / PENDING APPROVAL / REJECTED / WAITLISTED]

  ---

  ## 🔍 Processing Results

  **✅ Capacity Check:**
  [Generate capacity assessment - available spots, role conflicts, etc.]

  **🔐 Approval Assessment:**
  [Determine if auto-approval applies or researcher approval needed]

  **⚡ Urgency Factors:**
  [Note timing considerations, same-day requests, session sensitivity]

  ---

  ## 📬 Notifications Generated

  ### To Requesting User ({{requesting_user_name}}):
  [Generate appropriate message based on status:]

  **If AUTO-APPROVED:**
  > 🎉 **Observer Request Approved!**
  > 
  > You've been confirmed as **{{requested_role}}** for:
  > - **Session:** {{session_id}} - {{participant_name}}
  > - **Date/Time:** {{session_date}} at {{session_time}}
  > 
  > 📋 **Next Steps:**
  > - Review observer guidelines (being sent separately)
  > - Join session 5 minutes early for brief setup
  > - Contact {{researcher_contact}} with any questions
  > 
  > 🔄 **Observer Guidelines** are being sent to you now with session-specific prep materials.

  **If PENDING APPROVAL:**
  > ⏳ **Observer Request Pending Approval**
  > 
  > Your request to observe **{{session_id}}** as **{{requested_role}}** has been forwarded to {{researcher_contact}} for approval.
  > 
  > **Reason for approval requirement:** [Explain why approval is needed]
  > 
  > You'll receive confirmation within 24 hours (or sooner for urgent requests).

  **If REJECTED:**
  > ❌ **Observer Request Cannot Be Processed**
  > 
  > Unfortunately, we cannot accommodate your observer request for **{{session_id}}** due to:
  > [Specific rejection reason - capacity, timing, role conflict, etc.]
  > 
  > **Alternative Options:**
  > - Join waitlist for this session (notified if space opens)
  > - Request to observe upcoming sessions with available capacity
  > - Review session recordings after completion (if available)
  > 
  > Contact {{researcher_contact}} to explore alternatives.

  ### To Researcher ({{researcher_contact}}):
  [If approval needed, generate approval request]

  **If APPROVAL NEEDED:**
  > 🔔 **Observer Approval Request**
  > 
  > **{{requesting_user_name}}** has requested to observe:
  > - **Session:** {{session_id}} - {{participant_name}}
  > - **Date/Time:** {{session_date}} at {{session_time}}
  > - **Requested Role:** {{requested_role}}
  > - **Reason:** {{observer_reason}}
  > - **Experience:** {{observer_experience}}
  > 
  > **Current Session Status:**
  > - **Observers:** {{current_observers}}/{{max_capacity}}
  > - **Existing Observers:** {{existing_observer_list}}
  > 
  > **Approval Required Because:** [Reason - stakeholder role, capacity concern, timing, etc.]
  > 
  > [APPROVE] [REJECT] [REQUEST MORE INFO]

  ---

  ## 🔄 Follow-up Actions

  **Immediate Actions:**
  [Generate specific actions based on status]

  **If AUTO-APPROVED:**
  - [ ] Send observer guidelines to {{requesting_user_name}}
  - [ ] Update participant tracker with new observer
  - [ ] Add to session calendar invite
  - [ ] Send session prep materials

  **If PENDING APPROVAL:**
  - [ ] Notify researcher of pending approval request
  - [ ] Set 24-hour follow-up reminder
  - [ ] Add to pending observer queue

  **If REJECTED:**
  - [ ] Add to waitlist (if capacity issue)
  - [ ] Send alternative session options
  - [ ] Log rejection reason for future reference

  ---

  ## 📊 Session Observer Summary

  **Updated Observer List for {{session_id}}:**
  [Generate current observer assignments including this request if approved]

  | Observer | Role | Status | Added |
  |----------|------|--------|-------|
  | [Generate updated observer table] |

  **Session Preparation Status:**
  - [ ] All observers confirmed
  - [ ] Guidelines sent to all observers
  - [ ] Session calendar updated
  - [ ] Meeting capacity verified

  ---

  ## 🎯 Recommendations

  **For Researcher:**
  [Generate recommendations based on current session status]
  - Observer mix assessment (good balance of roles?)
  - Capacity optimization suggestions
  - Session management tips for current observer count

  **For Future Requests:**
  [Suggestions to improve observer request process]
  - Popular session identification for additional slots
  - Auto-approval refinements
  - Observer training needs

# Output configuration
output_options:
  filename: "observer_request_{{session_id}}_{{requesting_user_name}}_{{current_date}}.md"
  path: "02-participants/observer-requests/"
  generate_index: true
  index_filename: "README.md"
  
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      path: "02-participants/observer-requests/"
      commit_message: "Observer request: {{requesting_user_name}} for {{session_id}}"
      
    slack:
      enabled: true
      send_dm: true
      target_user: "{{requesting_user}}"
      include_copy_button: false
      
      # Message varies based on approval status
      message: >
        {% if status == "auto_approved" %}
        🎉 **Observer Request Approved!**
        
        You've been confirmed as **{{requested_role}}** for Session {{session_id}} on {{session_date}} at {{session_time}}.
        
        📋 Observer guidelines are being sent to you now with session prep materials.
        {% elif status == "pending_approval" %}
        ⏳ **Observer Request Pending**
        
        Your request to observe Session {{session_id}} has been sent to {{researcher_contact}} for approval. You'll hear back within 24 hours.
        {% elif status == "rejected" %}
        ❌ **Observer Request Cannot Be Processed**
        
        Session {{session_id}} is at capacity or has restrictions. Alternative options have been sent via DM.
        {% endif %}
      
      actions:
        - text: "📋 View Observer Guidelines"
          style: "primary"
          action_type: "modal"
          modal_id: "observer_guide"
          condition: "status == 'auto_approved'"
          
        - text: "📅 View All Sessions"
          style: "default"
          action_type: "modal"
          modal_id: "participant_tracker"

# Additional notifications based on status
conditional_notifications:
  auto_approved:
    - target: "{{researcher_slack_id}}"
      message: "✅ {{requesting_user_name}} auto-approved as {{requested_role}} for {{session_id}}"
    - trigger: "observer_guide"
      params:
        observer_name: "{{requesting_user_name}}"
        observer_role: "{{requested_role}}"
        session_id: "{{session_id}}"
        
  pending_approval:
    - target: "{{researcher_slack_id}}"
      message: "🔔 Observer approval needed: {{requesting_user_name}} for {{session_id}}"
      actions:
        - text: "✅ Approve"
          action: "approve_observer"
        - text: "❌ Reject"
          action: "reject_observer"
        
  rejected:
    - target: "{{researcher_slack_id}}"
      message: "ℹ️ Observer request rejected: {{requesting_user_name}} for {{session_id}} ({{rejection_reason}})"

# Workflow integration
workflow_triggers:
  on_approval:
    - update_participant_tracker
    - send_observer_guide
    - update_session_calendar
  on_rejection:
    - add_to_waitlist
    - suggest_alternatives
  on_capacity_reached:
    - notify_researcher
    - create_waitlist
