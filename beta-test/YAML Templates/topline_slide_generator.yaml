id: topline_slide_generator
label: 🖼️ Topline Slide Generator
description: Turn key insights into a 5-slide outline
input_type: text
input_processing: summarize_if_long
prompt: |
  You are helping a researcher turn findings into a clear and compelling slide outline.
  
  From the input, generate a topline deck in 5 sections:
  1. Title Slide
  2. What We Studied
  3. What We Heard (3 key insights)
  4. Supporting Quotes (3–5)
  5. Takeaways or Recommendations
  
  Use a professional but conversational tone. Write in plain language at a 10th-grade level. Use bullet points, not paragraphs. Avoid generic business language, em-dashes, or passive voice.
  
  Findings:
  {{input}}
output_format: |
  # 🖼️ Topline Deck
  
  ## 📌 Slide 1: [Title Slide]
  - Title
  - Subheading or Research Goal
  
  ## 🔍 Slide 2: What We Studied
  - Context
  - Methods
  - Participants
  
  ## 🧠 Slide 3: What We Heard
  - Insight 1
  - Insight 2
  - Insight 3
  
  ## 💬 Slide 4: Quotes
  - "Quote 1"
  - "Quote 2"
  - "Quote 3"
  
  ## ✅ Slide 5: Takeaways
  - Takeaway 1
  - Takeaway 2
  - Takeaway 3