id: participant_status_update
label: 🔄 Update Participant Status
description: Quick status updates for existing study participants with automatic tracker synchronization
input_type: status_update
input_processing: read_existing_tracker_and_update

# Simple inputs focused on status changes
inputs:
  study_selection: "{{study_selection}}"        # Dropdown of active studies
  participant_selection: "{{participant_id}}"  # Dropdown of participants in selected study
  new_status: "{{new_status}}"                 # New status selection
  status_notes: "{{status_notes}}"             # Optional notes about the change
  
  # Auto-populated from existing tracker
  current_status: "{{current_status}}"         # Read from existing tracker
  participant_name: "{{participant_name}}"     # Read from existing tracker
  study_name: "{{study_name}}"                 # Read from existing tracker

# Status transition rules
status_transitions:
  recruited:
    allowed_next: ["confirmed", "pending", "disqualified", "canceled"]
  pending:
    allowed_next: ["confirmed", "rescheduling", "canceled", "disqualified"]
  confirmed:
    allowed_next: ["completed", "rescheduling", "canceled"]
  rescheduling:
    allowed_next: ["confirmed", "canceled", "disqualified"]
  completed:
    allowed_next: ["backup"]  # Only if they want to participate again
  backup:
    allowed_next: ["recruited", "confirmed"]
  canceled:
    allowed_next: ["recruited"]  # If they change their mind
  disqualified:
    allowed_next: []  # Generally final

# Processing workflow
processing_workflow:
  1. load_existing_tracker
  2. validate_status_transition
  3. update_participant_record
  4. save_updated_tracker
  5. notify_stakeholders

# Output template - focused on the change
output_template: |
  # 🔄 Status Update - {{participant_name}}

  **Study:** {{study_name}}  
  **Participant:** {{participant_name}} ({{participant_id}})  
  **New Status:** {{new_status}}

  {% if status_notes %}
  **Notes:** {{status_notes}}
  {% endif %}

  ---

  ## 📊 Updated Study Summary

  **Current Participant Status:**
  - ✅ Confirmed: {{confirmed_count}}
  - ⏳ Pending: {{pending_count}}  
  - 🎯 Completed: {{completed_count}}
  - 🔄 Rescheduling: {{rescheduling_count}}
  - ❌ Canceled: {{canceled_count}}

  **Next Sessions:**
  {{#each upcoming_sessions}}
  - {{date}} {{time}}: {{participant_name}} ({{status}})
  {{/each}}

  ---
  *Participant tracker automatically updated*

# Output configuration
output_options:
  # Update existing tracker file, don't create new one
  update_existing: true
  target_file: "{{study_name}}_participant_tracker.md"
  path: "research/{{study_name}}/primary-research/02-participants/"
  
  # Quick notification, not full document
  delivery:
    slack:
      enabled: true
      channel: "{{study_channel}}"
      message: |
        🔄 **Participant Status Updated**
        
        **{{participant_name}}** ({{participant_id}})
        Status: **{{new_status}}**
        
        {% if status_notes %}
        📝 {{status_notes}}
        {% endif %}
        
        📊 Study Progress: {{confirmed_count}} confirmed, {{pending_count}} pending
      
      actions:
        - text: "📋 View Full Tracker"
          url: "{{tracker_github_url}}"
        - text: "🔄 Update Another Participant"
          action: "trigger_status_update"

# Integration with existing participant tracker
tracker_integration:
  read_from: "research/{{study_name}}/primary-research/02-participants/{{study_name}}_participant_tracker.md"
  update_fields:
    - status_select
    - notes_field (append)
  
  preserve_fields:
    - participant_name
    - recruitment_source
    - scheduled_date
    - scheduled_time
    - demographics
    - accommodations

# Notification system
notifications:
  participant_status_change:
    trigger: "always"
    target: "study_channel"
    
  critical_status_changes:
    trigger: "status in ['canceled', 'disqualified']"
    target: "researcher_dm"
    urgent: true
    
  capacity_updates:
    trigger: "status changed to confirmed or canceled"
    target: "study_channel"
    include_capacity_summary: true
```

## Quick Status Update Slack UI

This would be a much simpler modal:

1. **Study Dropdown** - Select which study to update
2. **Participant Dropdown** - Shows current participants with current status
3. **New Status Dropdown** - Only shows valid transitions
4. **Optional Notes** - Quick note about the change
5. **Update Button** - Done!

## Workflow Benefits:

✅ **Fast Updates** - 10 seconds vs 2 minutes for full form  
✅ **Smart Transitions** - Only shows valid next statuses  
✅ **Auto-Actions** - Triggers emails, calendar updates, notifications  
✅ **Audit Trail** - Tracks who changed what when  
✅ **Bulk Capable** - Could extend for multiple participants  

## Integration:

- **Reads** existing participant tracker
- **Updates** the same GitHub file  
- **Preserves** all other participant data
- **Triggers** appropriate follow-up actions
