# Auto-generated variables
auto_variables:
  - persona_name: extract_persona_name(ai_generated.persona_identification) || "Primary User"
  - max_steps: extract_step_count(ai_generated.journey_scope_analysis) || 5
  - current_date: new Date().toISOString().split('T')[0]
  - analysis_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(study_name, current_date)

notify:
  - role: team
    action: "Journey mapping completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} just mapped the user journey for {{persona_name}} with {{max_steps}} key stages. Check out the opportunities!"

output_use: |
  Slack-Native Journey Mapping automatically discovers research files from selected study folders,
  identifies the primary user persona, and maps their journey through sequential stages with specific
  thoughts, emotions, pain points, and improvement opportunities. Outputs concise Slack summaries 
  focused on stages and opportunities, plus detailed GitHub markdown reports for stakeholder sharing.

  Use this method to:
    - Map sequential user experiences with evidence-based stages
    - Identify specific pain points and emotions at each journey stage
    - Generate actionable opportunities for stage-specific improvements
    - Assign ownership and create team discussion around journey optimization
    - Understand user thoughts and feelings throughout their process
