id: journey_mapping
label: 🧭 Journey Mapping
description: Map a user's experience across service stages 👣
precision_mode: concise | detailed
input_type: text
prompt: |
  You are helping turn raw user research into a step-by-step journey map.

  Please break the journey into 5-9 steps. For each step, provide the following details:
  - A **Step Label** that names what the user is doing
  - An **Action** describing what the user is doing in plain terms
  - A **Thought** — what the user might be thinking or feeling
  - A single-word **Emotion tag** (e.g. confusion, stress, curiosity, optimism)
  - A list of **Opportunities/Insights** for improving this step
  - A suggested **Owner** or stakeholder team who might act on it

  Write using plain, accessible language at a 10th-grade reading level.
  Use a conversational but professional tone. Avoid vague summaries or corporate speak.
  Do not use em-dashes. Keep each section short and focused.

  Raw input:
  {{input}}
output_format: |
  ## 📍 Step 1: [Step Label]
  - **Action:** What the user does
  - **Thought:** What the user is thinking or feeling
  - **Emotion:** 😕 [Tag]
  - **Opportunities/Insights:**
    - Opportunity 1
    - Opportunity 2
  - **Owner:** CX / UX / Product / Data

  ## 📍 Step 2: [Step Label]
  - **Action:** ...
  - **Thought:** ...
  - **Emotion:** 😩 [Tag]
  - **Opportunities/Insights:**
    - ...
  - **Owner:** ...

  (repeat up to Step 9)
