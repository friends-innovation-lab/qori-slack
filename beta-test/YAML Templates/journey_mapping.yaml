id: journey_mapping
label: 🧭 Journey Mapping
description: Map a user's experience across service stages 👣
input_type: synthesis
prompt: |
  Using the notes below, map the user’s journey:
  - Define stages 📍
  - List actions 🤔 and emotions 😟😃

  Notes:
  {{input}}
output_format: |
  ## 📍 Stage 1: [Label]
  - **Action:** ...
  - **Emotion:** ...

  ## 📍 Stage 2: [Label]
  ...
