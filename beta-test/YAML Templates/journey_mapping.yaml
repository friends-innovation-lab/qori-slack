id: journey_mapping
name: run_journey_mapping
label: 🧭 Journey Mapping
version: v1.2
description: |
  Turn raw user research into a clear, step-by-step journey map.  
  Map up to 7 key stages of the user's experience—capturing actions, thoughts, emotions, opportunities, and ownership—to inform design, policy, and service improvements.

author: CivicMind R&D
created: 2025-06-30
last_updated: 2025-07-02

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

input_variables:
  - input_text           # Raw notes, quotes, transcripts (REQUIRED)
  - study_name           # Title of study (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to post results (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Who to notify/tag (OPTIONAL)

# Auto-generated/computed variables
auto_variables:
  - persona_name: |
      # AI analyzes input to identify primary user type/persona
      # Extracts from quotes or creates representative name
      extract_primary_persona(input_text) || "Our User"
  - max_steps: |
      # AI determines optimal journey length based on complexity
      # Default: 5, Range: 3-7 based on process complexity
      analyze_journey_complexity(input_text) || 5
  - session_count: |
      # AI estimates session count from input patterns
      estimate_session_count(input_text) || "multiple sessions"
  - current_date: |
      # Auto-generate current date for file naming
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      # Auto-generate based on study name and date
      generate_github_link(study_name, current_date) || null

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "structured"
  file_location: "04-analysis/"
  file_name: "journey_mapping_{{study_name_slug}}_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "🧭 Journey Mapping Results"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "🧠 Run Affinity Mapping"
      action: "run_affinity_mapping"
    - text: "👤 Create Personas"
      action: "run_persona_generator"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"

output_use: |
  CivicMind Journey Mapping accelerates service-blueprint creation by producing a concise, actionable map directly in Slack.  
  Use this to:
    - Visualize the user's end-to-end experience
    - Identify friction points and high-value opportunities
    - Assign clear ownership for each stage
    - Foster team discussion and rapid iteration

output_notes: |
  This method maps {{max_steps}} journey steps based on data analysis. AI automatically determines optimal step count.
  Persona ({{persona_name}}) identified from input patterns.
  Map one journey at a time to maintain focus.
  Ground each step in actual research—cite sources or quotes.
  Use plain language; avoid jargon and passive voice.
  Format for Slack readability using *text* for bold, > for quotes, spacing between steps.

