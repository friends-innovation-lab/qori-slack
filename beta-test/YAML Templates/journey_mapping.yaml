  ---
  
  ## 📋 **Study Overview**
  
  **Study:** {{selected_study}}  
  **Analysis Date:** {{current_date}}  
  **Researcher:** {{researcher_contact}}  
  **Focus Area:** {{focus_area}}  
  **Analysis Version:** {{analysis_version}}
  
  ---
  
  ## 📊 **Data Quality Assessment**
  
  {{ai_generated.file_discovery_summary}}
  
  ---
  
  ## 🔍 **Journey Scope Analysis**
  
  {{ai_generated.journey_scope_analysis}}
  
  **Methodology:** User journey mapping using stage-by-stage analysis of user actions, thoughts, emotions, and pain points to identify improvement opportunities.
  
  ---
  
  ## 👤 **Primary Persona**
  
  {{ai_generated.persona_identification}}
  
  ---
  
  ## 🧭 **User Journey Map: {{persona_name}}**
  
  {{ai_generated.journey_stage_mapping}}
  
  ---
  
  ## 📝 **Stage Details & Emotions**
  
  {{ai_generated.stage_detail_development}}
  
  ---
  
  ## 💡 **Opportunities & Improvements**
  
  {{ai_generated.opportunity_identification}}
  
  ---
  
  ## 👥 **Ownership & Discussion**
  
  {{ai_generated.ownership_and_discussion}}
  
  ---
  
  ## 📚 **Methodology Notes**
  
