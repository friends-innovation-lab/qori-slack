id: journey_mapping
name: run_journey_mapping

label: 🧭 Journey Mapping
version: "v3.2"

description: >
  Turn raw user research into a clear, step-by-step journey map. Automatically discovers and analyzes 
  research files from selected study folder with optional quality improvements. Maps key stages of the 
  user's experience—capturing actions, thoughts, emotions, opportunities, and ownership—to inform design, 
  policy, and service improvements.

author: Qori R&D
created: 2025-06-30
last_updated: 2026-01-08

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4000

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 1000
  max_file_size: 100000
  supported_formats: [".md", ".txt", ".csv", ".json"]
  max_files_per_analysis: 20

# Privacy controls
privacy_controls:
  enable_pii_detection: true
  pii_detection_patterns:
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
    phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    ssn: '\b\d{3}-\d{2}-\d{4}\b'
  masking_strategy:
    email: "[EMAIL_REDACTED]"
    phone: "[PHONE_REDACTED]" 
    ssn: "[SSN_REDACTED]"

# Slack modal input variables
input_variables:
  - selected_study              # Study name from dropdown (REQUIRED)
  - include_research_plan       # Boolean from checkbox (OPTIONAL)
  - include_participant_notes   # Boolean from checkbox (OPTIONAL)  
  - include_raw_transcripts     # Boolean from checkbox (OPTIONAL)
  
  # Auto-generated during processing
  - discovered_files            # Files found by auto-discovery (GENERATED)
  - combined_file_content       # Auto-combined content (GENERATED)
  - quality_assessment          # Initial quality score (GENERATED)

# Study metadata mapping
study_metadata:
  "VA Housing Application Usability Study":
    folder: "va-housing-usability-2025"
    researcher: "jordan.researcher"
    channel: "#research-housing-app"
    focus_area: "housing application process"
    
  "Benefits Portal Navigation Research":
    folder: "benefits-portal-nav-2025"
    researcher: "alex.ux"
    channel: "#research-benefits"
    focus_area: "benefits portal navigation"
    
  "Veteran Onboarding Experience Study":
    folder: "veteran-onboarding-2025"
    researcher: "casey.research"
    channel: "#research-onboarding"
    focus_area: "veteran onboarding process"

# File discovery system
auto_file_discovery:
  core_files:
    session_summaries:
      file_patterns: ["*session_summary*", "*summary*", "*session*"]
      search_paths: ["01-sessions/", "sessions/", "summaries/"]
      priority: "required"
      confidence_weight: 50
      
    transcripts:
      file_patterns: ["*transcript*", "*interview*", "*recording*"]
      search_paths: ["01-sessions/", "transcripts/", "interviews/"]
      priority: "high"
      confidence_weight: 30
  
  enhancement_files:
    research_plan:
      enabled_when: "{{include_research_plan}} == true"
      file_patterns: ["*research_plan*", "*study_plan*", "*methodology*"]
      search_paths: ["00-planning/", "planning/", "research/"]
      confidence_boost: 8
      
    participant_notes:
      enabled_when: "{{include_participant_notes}} == true"
      file_patterns: ["*participant*", "*notes*", "*observations*"]
      search_paths: ["02-participants/", "participants/", "notes/"]
      confidence_boost: 5
      
    raw_transcripts:
      enabled_when: "{{include_raw_transcripts}} == true"
      file_patterns: ["*raw*", "*unprocessed*", "*recording*"]
      search_paths: ["01-sessions/raw/", "raw/", "recordings/"]
      confidence_boost: 3

# AI generation tasks
ai_generation_tasks:
  # File discovery and quality assessment
  - task_id: "file_discovery_summary"
    prompt: |
      As a research operations specialist, analyze the discovered files and quality:
      
      **Selected Study:** {{selected_study}}
      **Enhancement Options Selected:**
      - Research plan: {{include_research_plan}}
      - Participant notes: {{include_participant_notes}}
      - Raw transcripts: {{include_raw_transcripts}}
      
      **Discovered Files:** {{discovered_files}}
      **Total Content:** [Analyze character/word count of combined_file_content]
      
      Report on file coverage, content quality, enhancement impact, and analysis confidence for journey mapping.

  # Main journey mapping task - CONSOLIDATED
  - task_id: "journey_map_complete"
    prompt: |
      ============================================================
      🚨 CRITICAL RULES - READ BEFORE ANYTHING ELSE 🚨
      ============================================================
      
      RULE 1: NO HALLUCINATION - EXTRACT ONLY
      You are an EXTRACTOR, not a GENERATOR. Every claim must come from the input data.
      - If you cannot find evidence for something, DO NOT INCLUDE IT
      - Never invent quotes, thoughts, or user statements
      - Never add generic filler content
      
      RULE 2: NO REAL PARTICIPANT NAMES
      - Use participant IDs (PT001, PT002, etc.) or "the participant"
      - NEVER use names like "John", "Sarah", "David Chen"
      - This applies everywhere: persona, descriptions, all text
      
      RULE 3: VA GOVERNMENT CONTEXT ONLY
      This is a VA (Department of Veterans Affairs) research study. 
      - Users are Veterans or VA staff
      - Teams are: Product, Engineering, Design, Content, Accessibility, Policy
      - NEVER mention: Marketing Team, Sales Team, Customer Success, Influencers, Social Media Marketing
      
      RULE 4: CITE YOUR SOURCES
      Every pain point, emotion, and insight MUST include:
      - Participant ID (e.g., PT001)
      - Timestamp if available (e.g., 00:02:28)
      - Direct quote or paraphrase from data
      
      RULE 5: STAGE LABELS MUST BE CONSISTENT
      Define your stage labels ONCE at the beginning, then use EXACTLY those same labels throughout.
      Do not create different stages in different sections.
      
      ============================================================
      YOUR TASK
      ============================================================
      
      Create a journey map from this research data:
      
      **Study:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      **Input Data:** {{combined_file_content}}
      **Quality Assessment:** {{ai_generated.file_discovery_summary}}
      
      ============================================================
      OUTPUT FORMAT - FOLLOW EXACTLY
      ============================================================
      
      # 🧭 Journey Map: {{selected_study}}
      
      > **{{stage_count}} stages mapped** | **Confidence:** {{data_confidence}} | **Generated:** {{current_date}}
      
      ---
      
      ## 📊 Executive Summary
      
      | | |
      |-----------|-------|
      | 👤 **Primary User** | [Brief description - no names, use "Veterans who..." or participant IDs] |
      | 🗺️ **Journey Scope** | [Start point] → [End point] |
      | 📍 **Total Stages** | [3-6 stages based on data complexity] |
      | 📈 **Data Confidence** | [High/Medium/Low] - [brief reason] |
      
      ### 🔥 Top Pain Points
      | # | Pain Point | Source |
      |---|------------|--------|
      | 1 | [Pain point] | PT00X, 00:00:00 |
      | 2 | [Pain point] | PT00X, 00:00:00 |
      | 3 | [Pain point] | PT00X, 00:00:00 |
      
      ### 💡 Top Opportunities  
      | # | Opportunity | Impact |
      |---|-------------|--------|
      | 1 | [Specific, actionable fix] | [High/Med/Low] |
      | 2 | [Specific, actionable fix] | [High/Med/Low] |
      | 3 | [Specific, actionable fix] | [High/Med/Low] |
      
      ---
      
      ## 👤 Primary User Profile
      
      > [2-3 sentences describing the primary user type based on data. Use "Veterans who..." or participant IDs, never real names]
      
      | 🎯 Goal | 🌍 Context |
      |---------|-----------|
      | [What they're trying to accomplish] | [What situation brings them to this journey] |
      
      **Key Characteristics:**
      - ✓ [Characteristic from data with citation]
      - ✓ [Characteristic from data with citation]
      - ✓ [Characteristic from data with citation]
      
      <br>
      
      ---
      
      ## 🗺️ Journey Stages
      
      [FOR EACH STAGE - Create 3-6 stages based on data. Use this exact format:]
      
      ### 1️⃣ [Clear 2-4 word label]
      
      **What happens:** [1-2 sentences describing user action at this stage]
      
      | Emotion | Quote |
      |:-------:|-------|
      | [emoji + word, e.g., 😤 Frustrated] | "[Direct quote]" — PT00X, 00:00:00 |
      
      **🔴 Pain Points:**
      - [Specific issue] — PT00X, 00:00:00
      - [Specific issue] — PT00X, 00:00:00
      
      **✅ Success looks like:** [What helps users get through this stage]
      
      **💡 Opportunity:** [Specific, actionable improvement - not vague like "improve UX"]
      
      **👥 Owner:** `[Team]` — [why this team]
      
      <br>
      
      ---
      
      ### 2️⃣ [Stage label]
      [Same format as above]
      
      <br>
      
      ---
      
      ### 3️⃣ [Stage label]
      [Same format as above]
      
      <br>
      
      ---
      
      [Continue for remaining stages using 4️⃣ 5️⃣ 6️⃣ as needed]
      
      ---
      
      ## 🎯 Recommendations
      
      | Priority | Opportunity | Stage | Owner | Effort |
      |:--------:|-------------|-------|-------|:------:|
      | 🔴 | [Specific fix] | [Stage name] | `[Team]` | 🔵🔵🔵 |
      | 🟡 | [Specific fix] | [Stage name] | `[Team]` | 🔵🔵⚪ |
      | 🟢 | [Specific fix] | [Stage name] | `[Team]` | 🔵⚪⚪ |
      
      > **Legend:** 🔴 High Priority | 🟡 Medium | 🟢 Low | Effort: 🔵🔵🔵 High | 🔵🔵⚪ Med | 🔵⚪⚪ Low
      
      ---
      
      ## 💬 Discussion Questions
      
      | # | Question | For |
      |---|----------|-----|
      | 1 | [Specific question about a finding that needs team input] | [Team] |
      | 2 | [Question about prioritization or implementation] | [Team] |
      | 3 | [Question about cross-team collaboration needed] | All |
      
      ---
      
      ## 📚 Methodology
      
      **Approach:** Journey mapping from qualitative research data — analyzing user actions, emotions, and pain points stage by stage.
      
      **Data Sources:** [List participant IDs used, e.g., PT001, PT002, PT003]
      
      ---
      
      *Generated by Qori • {{current_date}}*
      
      ============================================================
      INTERNAL VALIDATION (Do not include in output)
      ============================================================
      
      Before submitting, verify:
      - No real participant names used
      - All pain points have citations
      - All emotions have supporting quotes
      - Stage labels consistent throughout
      - Opportunities are specific (not generic)
      - Owners are VA teams (not Marketing/Sales)
      
      ============================================================
      QUALITY REQUIREMENTS
      ============================================================
      
      GOOD OPPORTUNITIES (specific, actionable):
      ✅ "Add a progress indicator showing step X of Y"
      ✅ "Pre-populate form fields from user profile data"
      ✅ "Add confirmation message after submission with expected timeline"
      ✅ "Increase button touch target size for accessibility"
      
      BAD OPPORTUNITIES (vague, generic - DO NOT USE):
      ❌ "Improve user experience"
      ❌ "Better communication"
      ❌ "More intuitive interface"
      ❌ "Implement targeted advertising on social media" (WRONG CONTEXT)
      
      GOOD EMOTION CITATIONS:
      ✅ **Frustrated** > "Everything takes forever to load." — PT003, 00:01:56
      ✅ **Confused** > "I don't know if that actually saved." — PT002, 00:03:42
      
      BAD EMOTION CITATIONS (invented - DO NOT USE):
      ❌ **Hopeful** > "I hope this app is easy to navigate" (INVENTED - not from data)
      
      If you cannot find evidence for a stage or emotion, reduce the number of stages rather than inventing content.

# Processing workflow
processing_workflow:
  1. validate_slack_modal_inputs
  2. discover_files_from_study_selection
  3. calculate_initial_quality_assessment
  4. validate_discovered_files
  5. combine_selected_files_with_truncation
  6. execute_file_discovery_summary
  7. execute_journey_map_complete
  8. format_slack_output
  9. format_github_output
  10. save_to_analysis_folder
  11. send_team_notifications

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "journey_focused"
  file_format: "github_markdown"
  path: "04-analysis/journey-mapping/"
  filename: "{{study_folder}}_journey_mapping_{{current_date}}.md"

# Slack output template (condensed for Slack readability)
output_template: |
  🧭 **Journey Map: {{selected_study}}**
  
  **{{stage_count}} stages** | **Confidence:** {{data_confidence}}
  
  ---
  
  {{ai_generated.journey_map_complete}}

# GitHub markdown file template
github_file_template: |
  # 🧭 Journey Map: {{selected_study}}
  
  **Generated:** {{current_date}} | **Version:** {{analysis_version}} | **Researcher:** {{researcher_contact}}
  
  ---
  
  {{ai_generated.journey_map_complete}}
  
  ---
  
  ## Methodology
  
  **Approach:** Journey mapping using stage-by-stage analysis of user actions, emotions, and pain points from qualitative research data.
  
  **Data Sources:** {{discovered_files}}
  
  **Quality Controls:**
  - ✅ All findings grounded in participant data
  - ✅ Citations included for pain points and emotions
  - ✅ PII redacted from all outputs
  
  ---
  
  ## Related Analyses
  
  Consider running complementary synthesis methods:
  - 🧠 **Affinity Mapping** — to identify broader themes
  - 👤 **Persona Generation** — to create detailed user archetypes  
  - 🎯 **Jobs to be Done** — to identify functional needs
  - 🐛 **Usability Issues** — to prioritize interface problems
  
  ---
  
  ## Contact
  
  **Lead Researcher:** {{researcher_contact}}
  **Study Channel:** {{study_channel}}
  
  ---
  
  *Generated by Qori Research Synthesis • {{current_date}}*

# Auto-generated variables
auto_variables:
  - stage_count: extract_stage_count(ai_generated.journey_map_complete) || 5
  - data_confidence: extract_confidence(ai_generated.journey_map_complete) || "Medium"
  - current_date: new Date().toISOString().split('T')[0]
  - analysis_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(study_name, current_date)

notify:
  - role: team
    action: "Journey mapping completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} mapped the user journey with {{stage_count}} stages. Check out the pain points and opportunities!"

quality_assurance:
  require_citations: true
  require_participant_ids_only: true
  require_va_context: true
  prohibit_generic_opportunities: true
  prohibit_invented_quotes: true
  require_stage_consistency: true

notes: |
  v3.2 Changes (Output Cleanup):
  - Fixed title: Now "Journey Map: [Study Name]" instead of "Journey Mapping Complete"
  - Added subtitle with stage count, confidence, and date
  - Fixed emotion formatting: Now in clean table with emoji + quote
  - Removed Validation Checklist from output (moved to internal-only check)
  - Removed "What do you think?" prompt (Slack-specific, not needed in GitHub)
  - Removed empty "[View full journey map]()" link
  - Added <br> tags for better spacing between sections
  - Simplified Primary User Profile layout
  - Added Methodology section at bottom
  - Added legend for priority/effort inline with recommendations table
  
  v3.1 Changes (Visual Polish):
  - Added emojis to all section headers
  - Added numbered stage indicators (1️⃣ 2️⃣ 3️⃣)
  - Added emotion emojis (😤 😕 😊 😔 😰 😌)
  - Converted pain points/opportunities to tables
  - Added effort indicator dots (🔵🔵🔵 / 🔵🔵⚪ / 🔵⚪⚪)
  
  v3.0 Changes (Major Restructure):
  - Consolidated 6 separate AI tasks into 1 comprehensive task
  - Added critical grounding rules at top of prompt
  - Each stage now contains ALL info (emotions, pain points, opportunities, owner)
  - Added VA-specific context (removed Marketing/Sales/etc.)
  - Added citation requirements for all claims
  
  v2.0: Original multi-task architecture

output_use: |
  Slack-Native Journey Mapping automatically discovers research files from selected study folders,
  identifies the primary user type, and maps their journey through sequential stages with specific
  emotions, pain points, and improvement opportunities. All findings are grounded in research data
  with required citations. Outputs concise Slack summaries plus detailed GitHub markdown reports.
  
  Key improvements in v3.0:
  - Consolidated stage view (no more jumping between sections)
  - Executive summary for quick stakeholder scanning
  - Recommendations table for prioritization
  - Required citations prevent hallucination
  - VA government context enforced
