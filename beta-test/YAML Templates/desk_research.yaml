id: desk_research_processor
name: run_desk_research
label: 📚 Desk Research
version: v3.0

description: |
  Analyze uploaded research documents and generate a focused synthesis with key themes, 
  findings, and actionable recommendations. Designed for quick insights, not exhaustive documentation.

author: Qori R&D
created: 2025-08-27
last_updated: 2025-11-26

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4000

# Input variables
input_variables:
  - research_topic:
      type: "text"
      required: true
      placeholder: "e.g., VA Telehealth Onboarding Experience"
      
  - document_content:
      type: "textarea"
      required: true
      description: "Extracted text from uploaded documents (provided by backend)"
      # NOTE: Backend must extract text from uploaded files and populate this variable
      
  - research_questions:
      type: "textarea"
      required: false
      placeholder: "e.g., What are the main barriers to telehealth adoption?"

# AI Generation Tasks - Focused and sequential
ai_generation_tasks:

  # Task 1: Document inventory (simple table)
  - task_id: "document_inventory"
    prompt: |
      Review the following document content and create a simple inventory table.
      
      **Research Topic:** {{research_topic}}
      **Document Content:** {{document_content}}
      
      Create a markdown table with these columns:
      | Document | Type | Source | Date | Key Focus |
      |----------|------|--------|------|-----------|
      
      For each distinct document you can identify in the content:
      - Document: Title or descriptive name
      - Type: Report, Study, Survey, Brief, Article, etc.
      - Source: Author or organization
      - Date: Publication date if available, otherwise "N/A"
      - Key Focus: One-line description of what it covers
      
      Keep it concise. If you can't identify distinct documents, describe the content as a single source.

  # Task 2: Executive summary with findings and recommendations
  - task_id: "executive_summary"
    prompt: |
      Create a focused executive summary of the desk research on: {{research_topic}}
      
      **Document Content:** {{document_content}}
      **Research Questions:** {{research_questions}}
      
      Structure your summary as:
      
      **Overview**
      2-3 sentences explaining what this research covers and why it matters.
      
      **Key Findings**
      3-5 bullet points with the most important discoveries. Each finding should:
      - Be specific and evidence-based (reference the source documents)
      - Directly relate to {{research_topic}}
      - Include a specific data point, quote, or fact when available
      
      **Implications**
      2-3 sentences on what these findings mean for {{research_topic}} decisions.
      
      Keep the entire summary under 300 words. Be direct and actionable.

  # Task 3: Key themes synthesis
  - task_id: "themes"
    prompt: |
      Identify the major themes across the research documents on: {{research_topic}}
      
      **Document Content:** {{document_content}}
      
      Identify 3-5 primary themes. For each theme:
      
      ### [Theme Name]
      
      **What the research shows:** 
      2-3 sentences summarizing findings related to this theme.
      
      **Evidence:**
      - [Specific finding or data point from Document X]
      - [Specific finding or data point from Document Y]
      
      **Why it matters for {{research_topic}}:**
      1 sentence on the implication.
      
      ---
      
      Focus on themes that:
      - Appear across multiple documents (convergent evidence)
      - Have specific data or quotes to support them
      - Are actionable for {{research_topic}}
      
      Do NOT include generic themes. Every theme must be grounded in the actual document content.

  # Task 4: Recommendations and next steps
  - task_id: "recommendations"
    prompt: |
      Based on the desk research on {{research_topic}}, provide actionable recommendations.
      
      **Document Content:** {{document_content}}
      **Research Questions:** {{research_questions}}
      
      Structure as:
      
      **Immediate Actions** (This Week)
      - [ ] [Specific action based on findings]
      - [ ] [Specific action based on findings]
      
      **Short-Term Priorities** (This Month)
      - [ ] [Research or validation activity]
      - [ ] [Stakeholder engagement or decision]
      
      **Further Research Needed**
      - [Gap identified in the research that needs primary research]
      - [Question that desk research couldn't fully answer]
      
      Make each recommendation:
      - Specific (not generic advice)
      - Tied to a finding from the documents
      - Actionable by the research team
      
      Limit to 3-4 items per section.

  # Task 5: Sources (simple reference list)
  - task_id: "sources"
    prompt: |
      Create a simple reference list for the desk research documents.
      
      **Document Content:** {{document_content}}
      
      List each source in this format:
      
      1. **[Document Title]** — [Author/Organization], [Date if available]
         - Key contribution: [One sentence on what this source provided]
      
      2. **[Document Title]** — [Author/Organization], [Date if available]
         - Key contribution: [One sentence on what this source provided]
      
      Continue for all identifiable sources. Keep descriptions brief.

# OUTPUT TEMPLATE - Streamlined
output_template: |
  # 📚 Desk Research: {{research_topic}}

  **Date:** {{current_date}}
  
  **Research Questions:** {{research_questions}}

  ---

  ## 📋 Executive Summary

  {{ai_generated.executive_summary}}

  ---

  ## 📄 Documents Reviewed

  {{ai_generated.document_inventory}}

  ---

  ## 🎯 Key Themes

  {{ai_generated.themes}}

  ---

  ## ✅ Recommendations & Next Steps

  {{ai_generated.recommendations}}

  ---

  ## 📖 Sources

  {{ai_generated.sources}}

# Output configuration
output_options:
  filename: "desk_research_{{research_topic}}_{{current_date}}.md"
  path: "00-desk-research/"
  
  delivery:
    github:
      enabled: true
      commit_message: "Add desk research: {{research_topic}}"
      
    slack:
      enabled: true
      channel: "{{source_channel}}"
      message: |
        📚 **Desk Research Complete**
        **Topic:** {{research_topic}}
        **Documents Analyzed:** See summary
      
      actions:
        - text: "📖 View Analysis"
          style: "primary"
          url: "{{github_file_url}}"

# Slack UI configuration  
slack_ui:
  modal:
    title: "📚 Desk Research"
    submit_label: "Analyze Documents"
    close_label: "Cancel"
