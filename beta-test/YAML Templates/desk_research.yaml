id: desk_research_processor
name: run_desk_research
label: 📚 Desk Research
version: v4.0

description: |
  Analyze uploaded research documents and generate a polished, professional synthesis 
  with key themes, findings, and actionable recommendations. Optimized for GitHub 
  rendering with industry-standard research documentation practices.
  
  v4.0 Changes:
  - Redesigned output template for professional GitHub rendering
  - Added research metadata section for context
  - Improved visual hierarchy with GitHub-native styling
  - Enhanced evidence presentation with blockquotes and callouts
  - Added confidence indicators for findings
  - Restructured recommendations with clearer action orientation
  - Improved source attribution formatting

author: Qori R&D
created: 2025-08-27
last_updated: 2026-01-27

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.2
  max_tokens: 6000  # Increased for richer output
  
  system_instruction: |
    You are a senior research analyst producing publication-quality research syntheses.
    
    Core Rules:
    1. ONLY use information explicitly present in the provided document content
    2. NEVER invent, fabricate, or hallucinate citations, statistics, quotes, or findings
    3. If document content is empty, missing, or insufficient, say so clearly
    4. Every claim must be traceable to specific text in the provided documents
    5. When uncertain, say "The documents do not address this" rather than guessing
    6. Do not draw on training knowledge to fill gaps - only use provided content
    
    Writing Style:
    - Write in clear, professional prose
    - Use active voice
    - Be specific and concrete
    - Prioritize actionability over comprehensiveness

# Input variables with validation (UNCHANGED)
input_variables:
  - research_topic:
      type: "text"
      required: true
      placeholder: "e.g., VA Telehealth Onboarding Experience"
      validation:
        min_length: 3
        error_message: "Please enter a research topic"
      
  - document_content:
      type: "textarea"
      required: true
      description: "Extracted text from uploaded documents (provided by backend)"
      validation:
        min_length: 100
        error_message: "Document content is required. Please upload documents or paste content."
      
  - research_questions:
      type: "textarea"
      required: false
      placeholder: "e.g., What are the main barriers to telehealth adoption?"

# Pre-execution validation (UNCHANGED)
validation_rules:
  - rule: "document_content_not_empty"
    check: "{{document_content | length}} > 50"
    error_message: "No document content provided. Please upload research documents before running analysis."
    
  - rule: "research_topic_not_empty"  
    check: "{{research_topic | length}} > 2"
    error_message: "Research topic is required."

# AI Generation Tasks - Enhanced prompts for better output
ai_generation_tasks:

  # Task 1: Document inventory with richer metadata
  - task_id: "document_inventory"
    prompt: |
      Review the following document content and create a detailed source inventory.
      
      **Research Topic:** {{research_topic}}
      
      **Document Content:**
      ---BEGIN CONTENT---
      {{document_content}}
      ---END CONTENT---
      
      ⚠️ CRITICAL RULES:
      - If the content between BEGIN/END markers is empty, respond ONLY with:
        "> ⚠️ **No documents provided.** Please upload research documents and try again."
      - ONLY list documents explicitly identifiable in the provided content
      - Do NOT invent document titles, authors, dates, or sources
      - If a field is not stated in the content, write "Not specified"
      
      If documents ARE present, create this format for EACH document:
      
      ### 📄 [Document Title]
      
      | Attribute | Value |
      |:----------|:------|
      | **Source** | [Author/Organization or "Not specified"] |
      | **Date** | [Publication date or "Not specified"] |
      | **Type** | [Report / Study / Survey / Brief / Article / Guide] |
      | **Relevance** | [High / Medium / Low] to {{research_topic}} |
      
      **Summary:** [2-3 sentence description of what this document covers and its key contribution to the research topic]
      
      ---
      
      Repeat for each distinct document. If you cannot identify distinct documents, describe the content as a single source.

  # Task 2: Executive summary - more structured and scannable
  - task_id: "executive_summary"
    prompt: |
      Create a publication-quality executive summary of the desk research.
      
      **Research Topic:** {{research_topic}}
      **Research Questions:** {{research_questions}}
      
      **Document Content:**
      ---BEGIN CONTENT---
      {{document_content}}
      ---END CONTENT---
      
      ⚠️ CRITICAL ANTI-HALLUCINATION RULES:
      1. If content is empty, respond: "> ⚠️ **No documents provided.** Unable to generate executive summary."
      2. EVERY finding must be directly quoted or paraphrased from the provided content
      3. Do NOT invent statistics, percentages, or data points
      4. Do NOT cite authors or studies not mentioned in the content
      5. If content doesn't address research questions, state this explicitly
      
      If documents ARE present, structure as:
      
      ### Overview
      
      [2-3 sentences on what this research covers and its significance for {{research_topic}}. Ground in actual document content.]
      
      ### Key Findings
      
      Present 3-5 major findings. For each finding:
      
      > **Finding 1: [Descriptive title]**
      > 
      > [1-2 sentence explanation of the finding, with specific data if available]
      > 
      > *Source: [Document name]*
      
      Use this blockquote format for each finding. Include the specific document source.
      
      ### Strategic Implications
      
      [2-3 sentences on what these findings mean for decision-making related to {{research_topic}}. Only draw from actual findings.]
      
      ### Confidence Assessment
      
      | Aspect | Confidence | Rationale |
      |:-------|:-----------|:----------|
      | Evidence quality | [High/Medium/Low] | [Brief explanation based on document types and rigor] |
      | Coverage of topic | [High/Medium/Low] | [How well documents address the research questions] |
      | Actionability | [High/Medium/Low] | [Whether findings translate to clear actions] |

  # Task 3: Key themes - enhanced with better evidence structure
  - task_id: "themes"
    prompt: |
      Identify and analyze major themes across the research documents.
      
      **Research Topic:** {{research_topic}}
      
      **Document Content:**
      ---BEGIN CONTENT---
      {{document_content}}
      ---END CONTENT---
      
      ⚠️ CRITICAL ANTI-HALLUCINATION RULES:
      1. If content is empty, respond: "> ⚠️ **No documents provided.** Unable to identify themes."
      2. EVERY theme must be grounded in specific text from provided documents
      3. Do NOT create themes based on what you think should be covered
      4. QUOTE directly from documents when providing evidence
      5. If you can only identify 1-2 themes, that's fine - do not pad
      
      If documents ARE present, use this format for each theme:
      
      ---
      
      ### Theme [N]: [Theme Title]
      
      #### What the Research Shows
      
      [2-3 sentences synthesizing findings related to this theme. Be specific.]
      
      #### Supporting Evidence
      
      > "[Direct quote from document 1]"
      > 
      > — *[Document name/source]*
      
      > "[Direct quote from document 2]"
      > 
      > — *[Document name/source]*
      
      #### Implications for {{research_topic}}
      
      [1-2 sentences on why this theme matters and what it suggests for decisions/actions]
      
      #### Confidence: `[HIGH]` / `[MEDIUM]` / `[LOW]`
      
      [One sentence explaining confidence level based on evidence strength]
      
      ---
      
      Requirements:
      - Only include themes with at least 2 pieces of direct evidence
      - Maximum 5 themes
      - Each theme must have clear implications stated

  # Task 4: Recommendations - more actionable format
  - task_id: "recommendations"
    prompt: |
      Generate actionable recommendations based on the desk research findings.
      
      **Research Topic:** {{research_topic}}
      **Research Questions:** {{research_questions}}
      
      **Document Content:**
      ---BEGIN CONTENT---
      {{document_content}}
      ---END CONTENT---
      
      ⚠️ CRITICAL ANTI-HALLUCINATION RULES:
      1. If content is empty, respond: "> ⚠️ **No documents provided.** Unable to generate recommendations."
      2. EVERY recommendation must tie to a specific finding from documents
      3. Do NOT suggest generic best practices not supported by documents
      4. If documents don't support many recommendations, include fewer
      
      If documents ARE present, structure as:
      
      ## Actionable Recommendations for {{research_topic}}
      
      ### 🔴 Immediate Actions (This Week)
      
      | Priority | Action | Evidence Base |
      |:--------:|:-------|:--------------|
      | 1 | **[Specific action]** | Based on document finding: "[brief quote or paraphrase]" |
      | 2 | **[Specific action]** | Based on document finding: "[brief quote or paraphrase]" |
      | 3 | **[Specific action]** | Based on document finding: "[brief quote or paraphrase]" |
      
      ### 🟡 Short-Term Priorities (This Month)
      
      | Priority | Action | Evidence Base |
      |:--------:|:-------|:--------------|
      | 1 | **[Specific action]** | Based on document finding: "[brief quote or paraphrase]" |
      | 2 | **[Specific action]** | Based on document finding: "[brief quote or paraphrase]" |
      | 3 | **[Specific action]** | Based on document finding: "[brief quote or paraphrase]" |
      
      ### 🟢 Further Research Needed
      
      | Gap Identified | Why It Matters | Suggested Approach |
      |:---------------|:---------------|:-------------------|
      | [Gap from documents] | [Impact of not addressing] | [How to investigate] |
      | [Gap from documents] | [Impact] | [Approach] |
      
      If the documents don't provide enough substance for a section, write:
      > ℹ️ The documents do not provide sufficient evidence for [section name] recommendations.

  # Task 5: Sources - enhanced citation format
  - task_id: "sources"
    prompt: |
      Create a professional reference list for the desk research.
      
      **Document Content:**
      ---BEGIN CONTENT---
      {{document_content}}
      ---END CONTENT---
      
      ⚠️ CRITICAL ANTI-HALLUCINATION RULES:
      1. If content is empty, respond: "> ⚠️ **No documents provided.** No sources to list."
      2. ONLY list sources explicitly named or identifiable in content
      3. Do NOT invent titles, authors, organizations, or dates
      4. If author/date not stated, write "Not specified"
      
      If sources ARE identifiable, format as:
      
      ### Primary Sources
      
      | # | Document | Author/Org | Date | Contribution |
      |:-:|:---------|:-----------|:-----|:-------------|
      | 1 | **[Title]** | [Author] | [Date] | [Key contribution in one phrase] |
      | 2 | **[Title]** | [Author] | [Date] | [Key contribution] |
      
      ### Source Details
      
      <details>
      <summary><strong>1. [Document Title]</strong></summary>
      
      - **Full Citation:** [Author/Org]. ([Date]). *[Title]*. [Publisher if known].
      - **Document Type:** [Report / Study / Survey / etc.]
      - **Key Contribution:** [2-3 sentences on what this source provided to the analysis]
      - **Limitations:** [Any noted limitations or caveats about this source]
      
      </details>
      
      Repeat the details block for each source.
      
      If no distinct sources identifiable but content exists:
      
      > ℹ️ **Source Attribution:** The analyzed content did not include clear source attribution. Findings are derived from the provided document text.

# OUTPUT TEMPLATE - Professionally styled for GitHub
output_template: |
  <div align="center">
  
  # 📚 Desk Research Report
  ## {{research_topic}}
  
  **Prepared by:** Qori Research Assistant  
  **Date:** {{current_date}}
  
  ---
  
  </div>
  
  ## 📋 Research Overview
  
  | | |
  |:--|:--|
  | **Topic** | {{research_topic}} |
  | **Date Conducted** | {{current_date}} |
  | **Research Questions** | {{research_questions}} |
  | **Analysis Type** | Secondary Research / Literature Review |
  
  > [!NOTE]
  > This analysis is based solely on the documents provided. All findings, themes, and recommendations are derived from the uploaded content. No external sources or training knowledge were used to generate findings.
  
  ---
  
  ## 📊 Executive Summary
  
  {{ai_generated.executive_summary}}
  
  ---
  
  ## 📁 Documents Analyzed
  
  {{ai_generated.document_inventory}}
  
  ---
  
  ## 🎯 Key Themes
  
  {{ai_generated.themes}}
  
  ---
  
  ## ✅ Recommendations
  
  {{ai_generated.recommendations}}
  
  ---
  
  ## 📖 References
  
  {{ai_generated.sources}}
  
  ---
  
  <div align="center">
  
  ### Methodology Note
  
  This desk research synthesis follows industry-standard secondary research practices:
  
  | Practice | Implementation |
  |:---------|:---------------|
  | Source triangulation | Findings corroborated across multiple documents where possible |
  | Evidence grounding | All claims tied to specific document content |
  | Confidence assessment | Strength of evidence explicitly rated |
  | Limitation acknowledgment | Gaps and constraints clearly noted |
  
  ---
  
  **References**
  
  This analysis methodology aligns with:
  - Cooper, A. et al. — *About Face: The Essentials of Interaction Design*
  - Goodman, E. et al. — *Observing the User Experience*
  - Portigal, S. — *Interviewing Users*
  
  ---
  
  *Generated by Qori • {{current_date}}*
  
  </div>

# Output configuration (UNCHANGED structure)
output_options:
  filename: "desk_research_{{research_topic}}_{{current_date}}.md"
  path: "00-desk-research/"
  
  delivery:
    github:
      enabled: true
      commit_message: "Add desk research: {{research_topic}}"
      
    slack:
      enabled: true
      channel: "{{source_channel}}"
      message: |
        📚 **Desk Research Complete**
        
        **Topic:** {{research_topic}}
        **Documents Analyzed:** See full report
        **Key Themes Identified:** See synthesis
        
        View the full analysis for findings, evidence, and actionable recommendations.
      
      actions:
        - text: "📖 View Full Report"
          style: "primary"
          url: "{{github_file_url}}"
        - text: "📋 View Recommendations"
          style: "secondary"
          url: "{{github_file_url}}#-recommendations"

# Slack UI configuration (UNCHANGED)
slack_ui:
  modal:
    title: "📚 Desk Research"
    submit_label: "Analyze Documents"
    close_label: "Cancel"
    
  error_messages:
    no_documents: "⚠️ Please upload at least one document before running desk research."
    no_topic: "⚠️ Please enter a research topic."
    processing_failed: "⚠️ Analysis failed. Please check that your documents are readable text files (PDF, DOCX, TXT, MD)."

