id: desk_research_processor
name: run_desk_research
label: 📚 Desk Research Processor
version: v2.2
description: |
  ULTRA-STRICT document processing system that COMPLETELY FAILS if documents cannot be extracted.
  NO TEMPLATE CONTENT GENERATION UNDER ANY CIRCUMSTANCES. System will abort entire pipeline
  if document extraction fails rather than produce generic content.

author: Qori R&D
created: 2025-08-27
last_updated: 2025-08-28

# LLM Configuration
llm_config:
  model: "gpt-4"
  temperature: 0.3
  max_tokens: 6000
  retry_attempts: 3
  fallback_model: "gpt-3.5-turbo"

input_type: document_batch
input_processing: read_and_analyze_multiple_with_validation
precision_mode: comprehensive

# CRITICAL: Input schema for Slack UI
input_variables:
  - uploaded_documents      # Array of document paths/links from Slack upload (REQUIRED)
  - research_topic          # Main research topic or project name (REQUIRED)
  - fallback_manual_text    # Optional manual text if extraction fails

# STOP-GATE: Pre-processing validation that BLOCKS entire pipeline
pre_processing_validation:
  document_extraction_gate:
    enabled: true
    min_total_extractable_chars: 2000
    min_documents_successfully_extracted: 1
    min_topic_relevance_keywords: 2
    failure_action: "ABORT_ENTIRE_PIPELINE"
  
  content_authenticity_gate:
    enabled: true
    require_actual_document_titles: true
    require_topic_keyword_presence: true
    block_generic_examples: true
    failure_action: "ABORT_ENTIRE_PIPELINE"

# ENHANCED: Processing workflow with HARD STOPS
processing_workflow:
  1. validate_inputs_or_fail
  2. extract_documents_or_abort          # NEW: Hard stop if extraction fails
  3. validate_minimum_content_or_abort   # NEW: Hard stop if insufficient content
  4. check_topic_relevance_or_abort      # NEW: Hard stop if not relevant
  5. execute_ai_generation_with_gates    # NEW: Each task has validation gates
  6. cross_validate_all_outputs          # NEW: Validates consistency across tasks
  7. final_authenticity_check_or_abort   # NEW: Final check before output
  8. generate_verified_output

# CRITICAL: Global validation that applies to ALL AI tasks
global_ai_validation:
  mandatory_checks:
    - extracted_content_present: true
    - no_placeholder_content: true
    - no_generic_examples: true
    - topic_relevance_verified: true
    - document_specific_references: true
  
  automatic_failures:
    - if_no_extracted_content: "PIPELINE_ABORT"
    - if_generic_examples_detected: "PIPELINE_ABORT" 
    - if_placeholder_numbers_found: "PIPELINE_ABORT"
    - if_unrelated_topics_mentioned: "PIPELINE_ABORT"

# AI Generation Tasks - WITH ULTRA-STRICT VALIDATION
ai_generation_tasks:
  - task_id: "validate_extraction_success"
    priority: 1
    blocking: true
    prompt: |
      EXTRACTION VALIDATION CHECKPOINT:
      
      **UPLOADED DOCUMENTS:** {{uploaded_documents}}
      **RESEARCH TOPIC:** {{research_topic}}
      **EXTRACTED CONTENT:** {{extracted_document_text}}
      
      CRITICAL VALIDATION TASKS:
      1. Verify extracted_document_text contains ACTUAL readable content (not empty/placeholder)
      2. Confirm content relates to research topic: "{{research_topic}}"
      3. Count total extractable characters (minimum 2000 required)
      4. Identify actual document titles from content (not filenames)
      5. Verify topic-relevant keywords are present
      
      RESPONSE FORMAT - MUST BE EXACTLY:
      
      **EXTRACTION_STATUS:** [SUCCESS/FAILED]
      **TOTAL_CHARACTERS_EXTRACTED:** [actual number]
      **DOCUMENTS_WITH_CONTENT:** [actual count]
      **TOPIC_KEYWORDS_FOUND:** [list specific keywords found]
      **ACTUAL_DOCUMENT_TITLES:** [titles extracted from content, not filenames]
      **PROCEED_WITH_ANALYSIS:** [YES/NO]
      
      MANDATORY: If extracted_document_text is empty, contains "<no content>", or has <2000 characters:
      Respond with: "EXTRACTION_STATUS: FAILED - ABORT_PIPELINE"
      
      If content doesn't contain keywords related to "{{research_topic}}":
      Respond with: "EXTRACTION_STATUS: FAILED - TOPIC_MISMATCH - ABORT_PIPELINE"

  - task_id: "document_inventory"
    depends_on: "validate_extraction_success"
    validation_gate: "extraction_success_confirmed"
    prompt: |
      GATE CHECK: Proceed ONLY if validate_extraction_success shows "PROCEED_WITH_ANALYSIS: YES"
      
      If previous task result contains "ABORT_PIPELINE", respond with: 
      "BLOCKED: Cannot generate inventory - document extraction failed"
      
      EXTRACTED CONTENT TO ANALYZE:
      {{extracted_document_text}}
      
      TOPIC FOCUS: {{research_topic}}
      
      Using ONLY the actual extracted content above, create inventory:
      
      **DOCUMENT INVENTORY:**
      For each document with extractable content:
      - **Actual Document Title:** [From content headers/metadata, NOT filename]
      - **Content Type:** [Determined from content analysis]
      - **Author/Source:** [From extracted metadata]
      - **Topic Relevance to "{{research_topic}}":** [Specific evidence with quotes]
      - **Extraction Quality:** [Percentage of content successfully extracted]
      - **Key Sections Identified:** [Actual section titles from content]
      - **Content Volume:** [Word count from actual text]
      
      AUTHENTICATION REQUIREMENT: Each item must reference specific text from extracted content.
      
      FAIL-SAFE: If you cannot complete this inventory with specific content references, 
      respond with: "INVENTORY_BLOCKED: Insufficient real content for analysis"

  - task_id: "extract_key_themes"
    depends_on: "document_inventory" 
    validation_gate: "inventory_completed_successfully"
    prompt: |
      DEPENDENCY CHECK: Proceed ONLY if document_inventory was completed successfully
      
      If document_inventory contains "INVENTORY_BLOCKED" or "BLOCKED", respond with:
      "THEMES_BLOCKED: Cannot extract themes - inventory failed"
      
      VALIDATED DOCUMENT CONTENT:
      {{extracted_document_text}}
      
      RESEARCH FOCUS: {{research_topic}}
      
      Extract themes ONLY from the actual document content above:
      
      **PRIMARY THEMES FROM DOCUMENTS:**
      For each theme found in the actual content:
      - **Theme Name:** [Specific to {{research_topic}}]
      - **Supporting Quote:** [Exact text from documents]
      - **Source Document:** [Actual document title from inventory]
      - **Relevance Score:** [1-10 based on content analysis]
      
      **TOPIC-SPECIFIC ANALYSIS FOR "{{research_topic}}":**
      Based on what's ACTUALLY in the documents:
      - User experience issues mentioned: [Yes/No with specific examples]
      - Application process problems found: [Yes/No with specific examples]
      - Housing-related concerns identified: [Yes/No with specific examples]
      - VA-specific insights discovered: [Yes/No with specific examples]
      
      MANDATORY: Every theme must include direct quotes from extracted content.
      
      FAIL-SAFE: If themes cannot be supported by actual document content, respond with:
      "THEMES_EXTRACTION_FAILED: Cannot identify themes from available content"

  - task_id: "generate_executive_summary"
    depends_on: ["document_inventory", "extract_key_themes"]
    validation_gate: "themes_extraction_successful"
    prompt: |
      DEPENDENCY VALIDATION:
      - Document inventory status: {{ai_generated.document_inventory.status}}
      - Themes extraction status: {{ai_generated.extract_key_themes.status}}
      
      If either contains "BLOCKED", "FAILED", or "INVENTORY_BLOCKED", respond with:
      "SUMMARY_BLOCKED: Cannot generate summary - prerequisite tasks failed"
      
      VERIFIED CONTENT FOR SUMMARY:
      - Themes identified: {{ai_generated.extract_key_themes}}
      - Documents processed: {{ai_generated.document_inventory}}
      
      Create executive summary for "{{research_topic}}" using VERIFIED findings:
      
      **🎯 RESEARCH OBJECTIVE**
      - Research topic: {{research_topic}}
      - Documents successfully analyzed: [From inventory]
      - Content extraction confidence: [From validation]
      
      **📊 KEY FINDINGS** (Evidence-based only)
      For each finding (minimum 3, maximum 5):
      - **Finding:** [Specific insight about {{research_topic}}]
      - **Supporting Evidence:** [Direct quote from documents]
      - **Source:** [Actual document title]
      - **Confidence:** [High/Medium/Low based on evidence strength]
      
      **🔍 IMPLICATIONS FOR {{research_topic}}**
      - Strategic implications based on documented evidence
      - Opportunities identified in the documents
      - Risks or challenges mentioned in content
      
      AUTHENTICATION: Each finding must cite specific document content.
      
      FAIL-SAFE: If unable to generate evidence-based summary, respond with:
      "SUMMARY_GENERATION_FAILED: Insufficient documented evidence for executive summary"

  - task_id: "create_action_items"
    depends_on: ["generate_executive_summary"]
    validation_gate: "summary_completed_successfully"
    prompt: |
      VALIDATION CHECKPOINT:
      - Executive summary status: {{ai_generated.generate_executive_summary.status}}
      
      If summary contains "BLOCKED", "FAILED", or "SUMMARY_GENERATION_FAILED", respond with:
      "ACTIONS_BLOCKED: Cannot generate actions - summary generation failed"
      
      EVIDENCE BASE FOR ACTIONS:
      {{ai_generated.generate_executive_summary}}
      
      Generate actions based EXCLUSIVELY on documented findings:
      
      **IMMEDIATE ACTIONS (Next 1-2 weeks):**
      Based on specific findings from {{research_topic}} analysis:
      - [ ] [Action directly supported by document evidence] - Source: [Document title]
      - [ ] [Action based on identified gap in documents] - Evidence: [Specific quote]
      - [ ] [Validation action for key finding] - Reference: [Document section]
      
      **RESEARCH VALIDATION NEEDED:**
      - **Primary Research Gaps:** [Specific gaps identified in document content]
      - **User Research Required:** [Gaps in user experience understanding]
      - **Process Validation Needed:** [Application process issues to investigate]
      - **Stakeholder Input Required:** [VA-specific expertise needed]
      
      AUTHENTICATION: Each action must reference specific document findings.
      
      MANDATORY: Do NOT include generic actions, placeholder numbers, or unrelated tasks.
      
      FAIL-SAFE: If actions cannot be based on real findings, respond with:
      "ACTIONS_GENERATION_FAILED: Cannot create evidence-based action items"

  - task_id: "create_citations"
    depends_on: "document_inventory"
    validation_gate: "real_documents_inventoried"
    prompt: |
      INVENTORY VALIDATION:
      {{ai_generated.document_inventory}}
      
      If inventory contains "INVENTORY_BLOCKED" or lists no real documents, respond with:
      "CITATIONS_BLOCKED: No successfully processed documents to cite"
      
      Create citations ONLY for documents that were successfully analyzed:
      
      **BIBLIOGRAPHY (APA Style):**
      For each document from the inventory with successful content extraction:
      - [Create proper citation using extracted author, title, date]
      - Note: Content extraction method used
      - Note: Relevance to {{research_topic}}
      
      **EXTRACTION REPORT:**
      - Documents fully processed: [Count from inventory]
      - Documents with partial extraction: [Count from inventory]  
      - Documents failed to extract: [Count from inventory]
      
      CRITICAL: Only include documents that contributed actual content to the analysis.
      Do NOT include generic example citations.
      
      FAIL-SAFE: If no real documents were processed, respond with:
      "NO_CITATIONS_AVAILABLE: No documents successfully extracted for bibliography"

# ULTRA-STRICT Output validation
output_validation:
  blocking_checks:
    - all_ai_tasks_completed_successfully: true
    - no_blocked_or_failed_responses: true
    - no_generic_examples_in_output: true
    - topic_consistency_across_sections: true
    - document_references_are_real: true
  
  auto_reject_triggers:
    - contains_placeholder_examples: true
    - contains_unrelated_citations: true
    - contains_generic_action_items: true
    - missing_document_specific_evidence: true

# ENHANCED: Output template with HARD FAILURE STATES
output_template: |
  # 📚 Desk Research: {{research_topic}}

  {{#if pipeline_aborted}}
  
  # ⛔ PROCESSING ABORTED
  
  **Abort Reason:** {{abort_reason}}
  **Processing Date:** {{current_date}}
  **Documents Attempted:** {{uploaded_documents_count}}
  **Analyst:** {{slack_user_name}}
  
  ## 🚨 Processing Failure Details
  
  {{pipeline_failure_details}}
  
  ## 🔧 Required Actions
  
  **To proceed with analysis:**
  1. **Document Issues:** {{document_extraction_issues}}
  2. **Content Requirements:** {{content_requirements_not_met}}
  3. **Manual Steps Needed:** {{manual_intervention_required}}
  
  **Alternative Approaches:**
  - Resubmit documents in different formats (PDF, DOCX, TXT)
  - Provide manual text extraction for problematic documents
  - Verify documents are related to: {{research_topic}}
  
  ---
  *Processing failed at: {{failure_stage}}*
  *Contact analyst for manual processing: {{slack_user_contact}}*
  
  {{else}}
  
  **Research Date:** {{current_date}}  
  **Documents Successfully Processed:** {{ai_generated.document_inventory.success_count}}
  **Extraction Confidence:** {{overall_extraction_confidence}}/10
  **Analysis Focus:** {{research_topic}}
  **Analyst:** {{slack_user_name}}

  ---

  ## 📋 Executive Summary

  {{ai_generated.generate_executive_summary}}

  ---

  ## 📁 Document Inventory

  {{ai_generated.document_inventory}}

  ---

  ## 🎯 Key Themes & Evidence

  {{ai_generated.extract_key_themes}}

  ---

  ## ✅ Evidence-Based Action Items

  {{ai_generated.create_action_items}}

  ---

  ## 📖 Bibliography

  {{ai_generated.create_citations}}

  ---

  ## ✅ Validation Confirmation

  **Content Authenticity:** ✅ All analysis based on extracted document content
  **Template Prevention:** ✅ No generic examples or placeholders used  
  **Topic Consistency:** ✅ All sections focus on {{research_topic}}
  **Evidence Requirement:** ✅ All findings supported by document quotes

  ---
  *Generated by Qori Desk Research Processor v2.2*
  *Ultra-strict validation - Real content only*

  {{/if}}

# CRITICAL: Delivery configuration with abort handling
output_options:
  validation_before_output:
    - abort_if_any_task_failed: true
    - abort_if_generic_content_detected: true
    - abort_if_unrelated_citations_found: true
    - abort_if_placeholder_content_present: true
  
  delivery:
    slack:
      success_message: |
        ✅ **Desk Research Analysis Complete**
        
        **Topic:** {{research_topic}}
        **Documents Processed:** {{successful_documents}}/{{total_documents}}
        **Quality Score:** {{overall_confidence}}/10
        **Key Findings:** {{findings_count}} evidence-based insights
      
      failure_message: |
        ⛔ **Desk Research Processing Failed**
        
        **Topic:** {{research_topic}}
        **Failure Stage:** {{failure_stage}}
        **Issue:** {{failure_reason}}
        
        **Next Steps:**
        {{manual_intervention_instructions}}
        
        Use 🔄 button below to reprocess with different document formats.

# Usage instructions
output_use: |
  Ultra-strict desk research processor that COMPLETELY FAILS rather than generate template content.
  System will abort entire pipeline if documents cannot be properly extracted and analyzed.
  Only produces output when real, topic-relevant content is successfully processed.

output_notes: |
  Version 2.2 - ZERO TOLERANCE FOR TEMPLATE CONTENT:
  - Complete pipeline abort if document extraction fails
  - Ultra-strict validation on every AI generation task  
  - Hard dependency checks between tasks
  - No generic examples or placeholders under any circumstances
  - Real content verification or complete failure
