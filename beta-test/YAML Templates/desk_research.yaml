id: desk_research_processor
name: run_desk_research
label: 📚 Desk Research Processor
version: v2.1
description: |
  Process multiple document uploads from Slack to create comprehensive desk research summaries. 
  Enhanced with robust error handling, content validation, and fallback mechanisms to prevent 
  template-based failures. Automatically analyzes uploaded documents and generates structured 
  README files with verified insights.

author: Qori R&D
created: 2025-08-27
last_updated: 2025-08-28

# LLM Configuration
llm_config:
  model: "gpt-4"
  temperature: 0.3
  max_tokens: 6000
  retry_attempts: 3
  fallback_model: "gpt-3.5-turbo"

input_type: document_batch
input_processing: read_and_analyze_multiple_with_validation
precision_mode: comprehensive

# Input schema for Slack UI
input_variables:
  - uploaded_documents      # Array of document paths/links from Slack upload (REQUIRED)
  - research_topic          # Main research topic or project name (REQUIRED)
  - fallback_manual_text    # Optional manual text if extraction fails

# Enhanced validation requirements
input_validation:
  uploaded_documents:
    required: true
    min_count: 1
    max_count: 50
    allowed_types: [".pdf", ".docx", ".txt", ".pptx", ".md"]
    max_file_size: "50MB"
  research_topic:
    required: true
    min_length: 5
    max_length: 200
    validation_pattern: "^[a-zA-Z0-9\\s\\-_]+$"

# Document extraction configuration
extraction_config:
  pdf_processing:
    primary_method: "pypdf2"
    fallback_methods: ["pdfplumber", "ocr_tesseract"]
    min_text_length: 100
    enable_ocr: true
    ocr_confidence_threshold: 0.7
  
  text_validation:
    min_extractable_chars: 50
    required_keywords_match: true
    content_similarity_threshold: 0.3
  
  error_handling:
    max_extraction_retries: 3
    fail_on_zero_extraction: true
    require_manual_fallback: true

# Smart defaults handled by AI - NO GENERIC FALLBACKS
ai_defaults:
  output_style: "detailed"
  include_citations: true
  analysis_focus: "auto_detect"
  template_prevention: true     # NEW: Prevents generic template usage

# Enhanced processing workflow with validation checkpoints
processing_workflow:
  1. validate_inputs
  2. verify_document_accessibility
  3. extract_document_content
  4. validate_extracted_content
  5. check_content_relevance
  6. execute_ai_generation_tasks
  7. validate_ai_outputs
  8. cross_reference_content
  9. populate_readme_template
  10. final_quality_check
  11. save_to_outputs

# Quality assurance checkpoints
quality_assurance:
  - step: "document_extraction_check"
    validation: "extracted_text_length > 1000_chars"
    failure_action: "trigger_manual_input"
    
  - step: "content_relevance_check" 
    validation: "ai_output_contains_actual_document_references"
    failure_action: "flag_for_manual_review"
    
  - step: "citation_accuracy_check"
    validation: "bibliography_matches_uploaded_documents"
    failure_action: "regenerate_citations"
    
  - step: "template_prevention_check"
    validation: "no_generic_placeholder_content"
    failure_action: "reject_and_retry"

# AI Generation Tasks - Enhanced with strict content validation
ai_generation_tasks:
  - task_id: "document_inventory"
    validation_required: true
    content_verification: true
    prompt: |
      CRITICAL INSTRUCTIONS:
      - ONLY analyze the ACTUAL uploaded documents: {{uploaded_documents}}
      - DO NOT use placeholder content, templates, or generic examples
      - If documents cannot be read, return "EXTRACTION_FAILED" status
      - Verify extracted content contains research topic: {{research_topic}}
      
      EXTRACTED DOCUMENT CONTENT TO ANALYZE:
      {{extracted_document_text}}
      
      VALIDATION CHECK: If the above section is empty or contains "<no content extracted>", 
      respond with: "CRITICAL_ERROR: No document content was successfully extracted. Cannot proceed with analysis."
      
      For each successfully extracted document, provide:
      
      **DOCUMENT INVENTORY:**
      - Document title/name: [EXTRACTED from actual document, not filename]
      - Document type: [Determined from content analysis]
      - Source/author: [EXTRACTED from document metadata/content]
      - Publication date: [EXTRACTED if available, otherwise "Date not found"]
      - Content length: [Actual character/word count from extraction]
      - Primary subject matter: [Based on ACTUAL content analysis]
      - Content quality score (1-10): [Based on extraction success]
      - Relevance to {{research_topic}}: [Specific evidence from document]
      - Extraction status: [SUCCESS/PARTIAL/FAILED]
      
      **PROCESSING VALIDATION:**
      - Documents with successful text extraction: [count]
      - Documents requiring OCR processing: [count]
      - Documents with extraction failures: [count and filenames]
      - Total analyzable content volume: [character count]
      
      FAIL-SAFE: If no documents were successfully processed, respond with:
      "PROCESSING_FAILURE: Unable to extract readable content from uploaded documents. Manual intervention required."

  - task_id: "extract_key_themes"
    depends_on: "document_inventory"
    validation_required: true
    prompt: |
      CONTENT VALIDATION CHECKPOINT:
      - Document inventory status: {{ai_generated.document_inventory.status}}
      - If status contains "EXTRACTION_FAILED" or "PROCESSING_FAILURE", STOP and return error
      
      ACTUAL DOCUMENT CONTENT FOR ANALYSIS:
      {{extracted_document_text}}
      
      RESEARCH FOCUS: {{research_topic}}
      
      MANDATORY VALIDATION: Confirm the above content is REAL document text, not placeholders.
      If content appears generic or template-like, respond with: "CONTENT_VALIDATION_FAILED"
      
      Based on ACTUAL content analysis (not assumptions), identify:
      
      **PRIMARY THEMES** (Extracted from real content):
      For each theme found in the documents:
      - Theme name: [Specific to your document content]
      - Supporting evidence: [Direct quotes from documents]
      - Document sources: [Which specific documents contain this theme]
      - Relevance to {{research_topic}}: [Explicit connection with evidence]
      
      **CONTENT-BASED ANALYSIS FOCUS:**
      Automatically determine focus areas based on what's ACTUALLY in the documents:
      - Competitive mentions found: [yes/no with examples]
      - Industry trends discussed: [yes/no with examples]  
      - Best practices identified: [yes/no with examples]
      - User feedback present: [yes/no with examples]
      - Technical content found: [yes/no with examples]
      - Regulatory mentions: [yes/no with examples]
      
      **EVIDENCE VALIDATION:**
      - Themes supported by multiple documents: [count]
      - Single-document themes: [count]
      - Contradictory findings: [description with sources]
      
      AUTHENTICATION: Include specific quotes or data points from documents to prove analysis is based on real content.

  - task_id: "generate_executive_summary"
    depends_on: ["document_inventory", "extract_key_themes"]
    validation_required: true
    prompt: |
      PRE-FLIGHT VALIDATION:
      - Document processing status: {{ai_generated.document_inventory.status}}
      - Theme extraction status: {{ai_generated.extract_key_themes.status}}
      - Proceed only if both show successful content analysis
      
      Create executive summary for {{research_topic}} using VERIFIED findings only.
      
      **CONTENT AUTHENTICITY CHECK:**
      Reference specific findings from: {{ai_generated.extract_key_themes}}
      If themes appear generic or template-like, respond with: "INSUFFICIENT_REAL_CONTENT"
      
      **🎯 RESEARCH OBJECTIVE**
      - Research focus: {{research_topic}}
      - Documents successfully analyzed: {{ai_generated.document_inventory.success_count}}
      - Analysis confidence: {{ai_generated.document_inventory.overall_confidence}}
      - Content extraction quality: {{extraction_quality_score}}
      
      **📊 KEY FINDINGS** (From actual document analysis)
      [Generate 3-5 findings ONLY if supported by real document content]
      Each finding must include:
      - Specific evidence from named documents
      - Direct quotes or data points
      - Confidence level based on source quality
      - Relevance score to research topic
      
      **🔍 INSIGHTS & IMPLICATIONS**
      [Based exclusively on document content, not assumptions]
      - Strategic implications for {{research_topic}}
      - Evidence-based opportunities identified
      - Content gaps requiring additional research
      
      **💡 RECOMMENDATIONS** 
      [Only recommendations supported by document evidence]
      - Actions based on documented findings
      - Further research gaps identified in documents
      - Validation needs for key findings
      
      QUALITY GATE: If unable to generate substantial content from real documents, 
      respond with: "INSUFFICIENT_DOCUMENT_CONTENT: Executive summary requires more extractable content."

  - task_id: "create_detailed_analysis"
    depends_on: ["document_inventory", "extract_key_themes"]
    validation_required: true
    prompt: |
      CONTENT VERIFICATION GATE:
      - Only analyze documents with successful extraction from: {{ai_generated.document_inventory}}
      - Skip documents marked as "EXTRACTION_FAILED"
      
      **DOCUMENT-BY-DOCUMENT ANALYSIS:**
      
      For each document with successful content extraction:
      
      **Document: [ACTUAL title from content]**
      - **Extraction Status:** [SUCCESS/PARTIAL/FAILED]
      - **Content Volume:** [Actual word/character count]
      - **Source Credibility:** [Based on extracted metadata]
      - **Unique Contributions:** [Specific insights not found in other docs]
      - **Research Topic Relevance:** [Explicit connection to {{research_topic}}]
      - **Key Findings:** [Direct quotes with context]
      - **Actionable Data:** [Specific numbers, dates, recommendations from document]
      - **Quality Assessment:** [Based on extraction completeness and content depth]
      
      **CROSS-DOCUMENT SYNTHESIS:**
      - **Verified Agreements:** [Where multiple documents align with evidence]
      - **Documented Conflicts:** [Contradictions found in content]
      - **Evidence Strength:** [Documents with strongest supporting data]
      - **Content Gaps:** [Missing information identified across documents]
      
      **ANALYSIS AUTHENTICATION:**
      For each major claim, provide:
      - Source document name
      - Specific quote or data point
      - Page/section reference if available
      - Confidence level in extraction accuracy
      
      FAIL-SAFE: If insufficient extractable content for detailed analysis, 
      respond with: "DETAILED_ANALYSIS_BLOCKED: Insufficient document content extracted for comprehensive analysis."

  - task_id: "generate_citations_bibliography"
    depends_on: ["document_inventory"]
    validation_required: true
    prompt: |
      Create citations ONLY for documents with successful content extraction.
      
      Reference successful documents from: {{ai_generated.document_inventory}}
      
      **BIBLIOGRAPHY** (APA style - real documents only):
      For each successfully processed document:
      - Full citation based on extracted metadata
      - Extraction method used: [PDF parser/OCR/manual]
      - Content accessibility: [Full/Partial/Limited]
      - Processing confidence: [High/Medium/Low]
      - File integrity status: [Complete/Corrupted/Incomplete]
      
      **EXTRACTION QUALITY REPORT:**
      - Documents with full text extraction: [count and names]
      - Documents requiring OCR: [count and names]  
      - Documents with extraction failures: [count and names]
      - Manual intervention required: [count and names]
      
      **SOURCE AUTHENTICATION:**
      For each document:
      - Original filename vs extracted title match: [Y/N]
      - Metadata extraction success: [Y/N]
      - Content-topic relevance verified: [Y/N]
      - Citation accuracy confidence: [1-10]
      
      VALIDATION REQUIREMENT: Only include documents in bibliography that contributed actual content to the analysis.

  - task_id: "create_action_items"
    depends_on: ["generate_executive_summary", "create_detailed_analysis"]
    validation_required: true
    prompt: |
      Generate actions based ONLY on verified findings from document analysis.
      
      **CONTENT VALIDATION:**
      - Executive summary findings: {{ai_generated.generate_executive_summary.findings_count}}
      - Detailed analysis completeness: {{ai_generated.create_detailed_analysis.analysis_depth}}
      
      **EVIDENCE-BASED ACTIONS:**
      
      **IMMEDIATE ACTIONS** (Based on documented findings):
      - [ ] [Action supported by specific document evidence]
      - [ ] [Action with source reference and rationale]
      - [ ] [Action tied to measurable finding]
      
      **RESEARCH VALIDATION PRIORITIES:**
      - **Primary Research Gaps:** [Identified from content analysis]
      - **Document Extraction Issues:** [Files requiring reprocessing]
      - **Content Verification Needs:** [Findings requiring validation]
      - **Additional Documentation Required:** [Specific missing pieces identified]
      
      **PROCESSING IMPROVEMENT ACTIONS:**
      - Documents needing reprocessing: [count and method]
      - OCR quality improvements needed: [specific files]
      - Manual extraction required: [count and rationale]
      - Alternative document sources: [gaps identified]
      
      AUTHENTICITY CHECK: Each action item must reference specific document findings or processing results.

# Error handling and recovery mechanisms
error_recovery:
  document_extraction_failures:
    - retry_with_different_parser: true
    - attempt_ocr_processing: true
    - request_manual_text_input: true
    - flag_for_human_review: true
  
  ai_generation_failures:
    - validate_input_content_first: true
    - retry_with_simplified_prompt: true
    - fallback_to_manual_template: false  # Prevents generic content
    - require_human_intervention: true
  
  content_validation_failures:
    - reject_generic_responses: true
    - require_document_references: true
    - flag_template_like_content: true
    - enforce_evidence_based_analysis: true

# Enhanced output template with validation flags
output_template: |
  # 📚 Desk Research: {{research_topic}}

  **Research Date:** {{current_date}}  
  **Documents Processed:** {{ai_generated.document_inventory.total_count}}  
  **Successfully Analyzed:** {{ai_generated.document_inventory.success_count}}
  **Extraction Confidence:** {{overall_extraction_confidence}}/10
  **Analysis Focus:** {{analysis_focus}}  
  **Analyst:** {{slack_user_name}}

  ---

  ## ⚠️ Processing Quality Report

  {{processing_quality_summary}}
  
  **Document Extraction Status:**
  - Successful extractions: {{successful_extractions}}
  - Partial extractions: {{partial_extractions}}  
  - Failed extractions: {{failed_extractions}}
  - Manual intervention required: {{manual_intervention_needed}}

  ---

  ## 📋 Executive Summary

  {{ai_generated.generate_executive_summary}}

  ---

  ## 📁 Document Inventory & Processing Status

  {{ai_generated.document_inventory}}

  ---

  ## 🎯 Key Themes & Evidence-Based Patterns

  {{ai_generated.extract_key_themes}}

  ---

  ## 🔍 Detailed Document Analysis

  {{ai_generated.create_detailed_analysis}}

  ---

  ## ✅ Action Items & Next Steps

  {{ai_generated.create_action_items}}

  ---

  ## 📖 Bibliography & Source Validation

  {{ai_generated.generate_citations_bibliography}}

  ---

  ## 🔧 Technical Processing Report

  **Extraction Methods Used:**
  - PDF Text Parser: {{pdf_parser_success_rate}}%
  - OCR Processing: {{ocr_processing_count}} documents
  - Manual Fallback: {{manual_fallback_count}} documents

  **Quality Metrics:**
  - Average content extraction: {{avg_extraction_percentage}}%
  - Topic relevance match: {{topic_relevance_score}}/10
  - Citation accuracy: {{citation_accuracy_score}}/10
  - Analysis depth achieved: {{analysis_depth_score}}/10

  **Reprocessing Recommendations:**
  {{reprocessing_recommendations}}

  ---

  ## 📊 Validation & Confidence Scores

  **Content Authenticity:** {{content_authenticity_score}}/10
  **Evidence Strength:** {{evidence_strength_score}}/10  
  **Analysis Completeness:** {{analysis_completeness_score}}/10
  **Template Prevention:** ✅ Verified real content analysis

  **Next Review Date:** {{next_review_date}}

  ---
  *Generated by Qori Desk Research Processor v2.1*  
  *Enhanced with extraction validation and template prevention*
  *For questions about this analysis, contact: {{slack_user_contact}}*

# Output configuration with validation
output_options:
  filename: "README_{{research_topic}}_{{current_date}}.md"
  path: "{{research_topic}}/"
  
  validation_before_output:
    - check_content_authenticity: true
    - verify_document_references: true
    - validate_citation_accuracy: true
    - confirm_no_generic_content: true
  
  additional_outputs:
    - filename: "extraction_report.json"
      content: "{{extraction_quality_details}}"
      path: "research/desk-research/{{research_topic_slug}}/"
    
    - filename: "processing_log.txt"
      content: "{{detailed_processing_log}}"
      path: "research/desk-research/{{research_topic_slug}}/"
    
    - filename: "failed_extractions.md"
      content: "{{failed_extraction_summary}}"
      path: "research/desk-research/{{research_topic_slug}}/"
      condition: "{{has_extraction_failures}}"

  organize_uploads:
    enabled: true
    create_folders: true
    folder_structure: "research/desk-research/{{research_topic_slug}}/source-documents/"
    rename_files: true
    naming_convention: "{{document_type}}_{{extraction_status}}_{{original_name}}"

  delivery:
    slack:
      enabled: true
      channel: "{{source_channel}}"
      notify_user: "{{slack_user_id}}"
      message: |
        📚 **Desk Research Analysis Complete**
        
        **Topic:** {{research_topic}}
        **Documents:** {{total_documents}} uploaded, {{successful_extractions}} successfully processed
        **Quality:** {{overall_extraction_confidence}}/10 extraction confidence
        **Status:** {{processing_status}}
        
        {{#if has_extraction_failures}}
        ⚠️ **{{failed_extractions}} documents require manual review**
        {{/if}}
      
      include_preview: true
      attach_files: 
        - "README_{{research_topic_slug}}_{{current_date}}.md"
        - "extraction_report.json"
      
      actions:
        - text: "📖 View Analysis"
          url: "{{github_file_link}}"
        - text: "🔧 Processing Report"  
          url: "{{extraction_report_link}}"
        - text: "🔄 Reprocess Failed Docs"
          action: "trigger_reprocessing"
          condition: "{{has_extraction_failures}}"

# Usage instructions
output_use: |
  Enhanced Desk Research Processor with robust error handling and validation. Upload documents via Slack, 
  specify research topic, and receive verified analysis with processing quality reports. System now prevents 
  template fallbacks and ensures all analysis is based on actual extracted document content.

output_notes: |
  Version 2.1 Enhancements:
  - Robust PDF extraction with OCR fallback
  - Content validation at every pipeline stage  
  - Template prevention with authenticity checks
  - Processing quality reports and confidence scoring
  - Error recovery with manual intervention options
  - Cross-reference validation between inputs and outputs
  - Extraction failure handling and reprocessing workflows
