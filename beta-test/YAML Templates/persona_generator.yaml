id: persona_generator
label: 👤 Persona Generator
description: Generate a user persona from research findings 🧾
input_type: synthesis
prompt: |
  Create a persona using the insights below, including:
  - Name and demographics 👥
  - Goals 🎯 and frustrations 😤
  - Behaviors 🧍 and representative quotes 💬

  Insights:
  {{input}}
output_format: |
  ## 👤 Name: [Name]
  - **Demographics:** ...
  - **Goals:** ...
  - **Frustrations:** ...
  - **Behaviors:** ...
  - **Quotes:** "..."
