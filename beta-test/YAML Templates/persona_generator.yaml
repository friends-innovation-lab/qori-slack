  **Study:** {{selected_study}}
  **Analysis:** {{num_personas}} persona(s) created from {{ai_generated.file_discovery_summary.participant_count}} participants

  ---

  ## **Personas Identified**

  {{ai_generated.persona_identification}}

  ---

  ## **Persona Characteristics**

  {{ai_generated.persona_characterization}}

  ---

  ## **Goals & Frustrations**

  {{ai_generated.goal_frustration_mapping}}

  ---

  ## **Opportunities**

  {{ai_generated.persona_opportunity_generation}}

  ---

  **What do you think?** Reply in thread:
  • How well do these personas match your experience with users?
  • Which frustrations feel most urgent to address?
  • Ready to move forward with the recommended opportunities?

  📋 [View detailed report with behavioral patterns]({{github_file_link}})

