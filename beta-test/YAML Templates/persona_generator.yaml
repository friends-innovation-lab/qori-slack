# Auto-generated variables
auto_variables:
  - num_personas: extract_persona_count(ai_generated.user_diversity_analysis) || 1
  - current_date: new Date().toISOString().split('T')[0]
  - analysis_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(study_name, current_date)

notify:
  - role: team
    action: "Persona generation completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} just created {{num_personas}} research-based persona(s) for {{selected_study}}. Check out the insights!"

output_use: |
  Slack-Native Persona Generation automatically discovers research files from selected study folders,
  analyzes user diversity and behavioral patterns to create evidence-based personas with specific
  goals, frustrations, and opportunities. Outputs concise Slack summaries focused on personas and 
  opportunities, plus detailed GitHub markdown reports for stakeholder sharing and team reference.

  Use this method to:
    - Create evidence-based personas grounded in actual research data
    - Understand user diversity and optimal persona count for your study
    - Identify specific behavioral patterns, goals, and frustrations
    - Generate actionable opportunities for supporting each persona type
    - Build team empathy and inform design decisions with realistic user archetypes
