id: persona_generator
name: run_persona_generator
label: 👤 Persona Generator
version: v2.1
description: |
  Generate realistic and actionable user personas clearly grounded in qualitative research findings. Personas help teams deeply empathize with users, prioritize product or policy decisions, and confidently communicate insights.

author: CivicMind R&D
created: 2025-06-27
last_updated: 2025-07-02

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

input_variables:
  - input_text           # Research data, quotes, observations (REQUIRED)
  - study_name           # Title of study (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to post results (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Who to notify/tag (OPTIONAL)

# Auto-generated/computed variables
auto_variables:
  - num_personas: |
      # AI analyzes input to determine optimal persona count
      # Default: 1, Range: 1-3 based on user diversity in data
      analyze_user_diversity(input_text) || 1
  - session_count: |
      # AI estimates session count from input patterns
      estimate_session_count(input_text) || "multiple sessions"
  - target_audience: |
      # AI identifies primary user segment from data
      identify_primary_segment(input_text) || "Primary users"
  - current_date: |
      # Auto-generate current date for file naming
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      # Auto-generate based on study name and date
      generate_github_link(study_name, current_date) || null

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "structured"
  file_location: "04-analysis/"
  file_name: "personas_{{study_name_slug}}_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "👤 Persona Results"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "🧭 Map User Journey"
      action: "run_journey_mapping"
    - text: "🎯 Extract Jobs-to-be-Done"
      action: "run_jobs_to_be_done"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"

output_use: |
  CivicMind Personas rapidly transform qualitative research into clear, relatable, and actionable personas. Designed explicitly to facilitate deep empathy, user-centric decision-making, and easy adoption by research and product teams.

  Use this method to:
    - Clearly ground personas in realistic behaviors, motivations, and frustrations from research insights.
    - Easily communicate user understanding to stakeholders, ensuring alignment on user needs and scenarios.
    - Support confident and informed design, product, or policy decisions through believable, actionable personas.

output_notes: |
  This method generates {{num_personas}} persona(s) based on user diversity analysis.
  Target audience ({{target_audience}}) identified from input patterns.
  Session count ({{session_count}}) estimated from research scope.
  Personas must feel real, believable, and relatable. Clearly indicate behaviors, frustrations, and motivations in plain, everyday language.
  Explicitly anchor each persona in actual research quotes or observations.
  Avoid business jargon, overly technical terms, and passive voice.
  Use Slack formatting: *text* for bold, > for quotes, `backticks` for tags, clear spacing for readability.

output_format: |
  Hi team! 👋 I just created a research-grounded persona from our study data. Found some really clear patterns around user behaviors, goals, and frustrations that I think will help us make better decisions.

  {{team_members}} - would love your thoughts on this persona, especially how it connects to what we're building and where you see opportunities to better support these users.

  📂 *Study:* {{study_name}}  
  🔗 *Full details:* {{study_link}}

  ---

  *👤 USER PERSONA*

  *{{persona_1_name}}*

  *Persona Type:* {{persona_1_type}}

  *Demographics:* {{persona_1_demographics}}

  *Context & Scenario:*
  {{persona_1_context}}

  *Goals & Motivations:*
  • {{persona_1_goal_1}}
  • {{persona_1_goal_2}}
  • {{persona_1_goal_3}}

  *Frustrations & Barriers:*
  • {{persona_1_frustration_1}}
  • {{persona_1_frustration_2}}
  • {{persona_1_frustration_3}}

  *Top Frustration Impact:*
  {{persona_1_impact}}

  *Behaviors & Strategies:*
  {{persona_1_behaviors}}

  > "{{persona_1_quote}}"

  ❤️ *Emotional Dimension:* {{persona_1_emotion}}

  📊 *Signal:* {{persona_1_signal}}

  🎯 *Relevant Use Case:* {{persona_1_use_case}}

  💡 *Opportunity:* {{persona_1_opportunity}}

  📚 *Source:* {{persona_1_source}}

  `Tags: {{persona_1_tags}}`

  ---

  *What do you think?* Reply in thread with your thoughts:
  • How well does this persona match your experience with users?
  • Which frustrations feel most urgent to address?
  • Where do you see opportunities to support this user better?

prompt: |
  You are an expert qualitative researcher and human-centered designer with extensive experience creating research-based personas.

  ANALYSIS CONTEXT:
  - Study: {{study_name}}
  - Target audience: {{target_audience}} (AI-identified from data)
  - Persona count: {{num_personas}} (AI-determined based on user diversity)
  - Estimated sessions: {{session_count}}

  Generate {{num_personas}} realistic, well-supported user persona(s). Each persona must be realistic and actionable and clearly grounded in actual user behaviors, motivations, and frustrations.

  Each persona must include:
    - Realistic name and detailed demographics derived from the research
    - Clear persona type or behavioral segment label (e.g., "Skeptical First-Timer," "System-Savvy Workarounder")
    - Clear description of context and scenario illustrating realistic user interaction
    - Three explicitly stated user goals and motivations driving actions
    - Three specific frustrations and barriers that realistically hinder achieving their goals
    - Top frustration impact showing how much a pain point affects success or well-being
    - Detailed behaviors and strategies the persona realistically uses in response to challenges
    - A direct, realistic representative quote clearly derived from the research insights
    - Emotional dimension explicitly articulated to highlight feelings, attitudes, or anxieties
    - Signal clearly indicating the strength or representativeness of this persona within the research
    - Relevant use case showing how this persona informs product, service, or policy decisions
    - Actionable opportunities clearly recommended for the team to address persona needs or frustrations
    - Source reference to research data
    - Tags for categorization and filtering

  Write clearly, empathetically, and in plain language suitable for broad stakeholder understanding. Avoid jargon, technical terms, and passive voice.

  Format the persona using Slack-friendly formatting: *text* for bold, > for quotes, `backticks` for tags, clear spacing for readability and team engagement.

notify:
  - role: team
    action: "Persona generation completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} just created {{num_personas}} research-based persona(s) for {{study_name}}. Check out the insights!"
  - role: researcher
    action: "Analysis saved"
    slack_tag: "{{researcher_contact}}"
    message: "Your persona results have been posted to {{study_channel}} and saved to GitHub."
