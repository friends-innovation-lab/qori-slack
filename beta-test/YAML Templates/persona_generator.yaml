id: persona_generator
name: run_persona_generator
label: 👤 Persona Generator
version: v2.2
description: |
  Generate realistic and actionable user personas clearly grounded in qualitative research findings.
  Enhanced with router intelligence for optimal data quality assessment and context-aware persona development.
  Personas help teams deeply empathize with users, prioritize product or policy decisions, and confidently communicate insights.

author: CivicMind R&D
created: 2025-06-27
last_updated: 2025-08-15

input_type: text
input_processing: summarize_if_long
precision_mode: concise | detailed

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.4
  max_tokens: 4000

input_variables:
  # Core analysis data (from router)
  - input_text           # Research data, quotes, observations (REQUIRED)
  - focus_area           # Analysis focus from router (REQUIRED)
  
  # Study context (from router)
  - study_name           # Title of study (REQUIRED)
  - study_folder         # Study folder path (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to post results (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Who to notify/tag (OPTIONAL)
  
  # Router intelligence (NEW - from synthesize_router)
  - file_selection_quality    # Router's file quality assessment
  - analysis_preview         # Router's expected outcomes
  - recommendations          # Router's smart suggestions
  - collaboration_plan       # Router's team coordination plan
  - routing_validation       # Router's methodology validation
  - selected_files_summary   # Summary of files used
  - data_combination_strategy # How files were combined
  
  # Router metadata
  - router_version           # Router version for tracking
  - preprocessing_timestamp  # When router processed
  - analysis_id             # Unique analysis identifier

# AI GENERATION TASKS
ai_generation_tasks:
  # Analyze user diversity and determine optimal persona approach
  - task_id: "user_diversity_analysis"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      As an experienced user researcher specializing in persona development, analyze the user diversity in this research data:
      
      **Study:** {{study_name}}
      **Focus Area:** {{focus_area}}
      **Input Data:** [Analyze the input_text for user diversity indicators]
      **Router Quality Assessment:** {{file_selection_quality}}
      **Router Recommendations:** {{recommendations}}
      
      Analyze:
      1. **User Diversity Level:** How many distinct user types are represented in the data?
      2. **Optimal Persona Count:** Based on diversity and data quality, how many personas should be created?
      3. **Primary User Segments:** What are the main user categories or behavioral patterns?
      4. **Data Richness:** How well does the data support persona creation vs. other analysis types?
      5. **Confidence Level:** Given router assessment, what confidence level is appropriate for persona development?
      
      **Format:**
      **User Diversity Level:** [High/Medium/Low] - [specific details about variety in user types]
      **Recommended Persona Count:** [1-3 personas] - [reasoning based on distinct user patterns]
      **Primary Segments:** [List main user categories/behavioral patterns identified]
      **Data Suitability:** [Excellent/Good/Adequate/Poor] for persona development - [reasoning]
      **Analysis Confidence:** [High/Medium/Low] - [reasoning based on router assessment]
      **Target Audience:** [Primary user segment most represented in data]

  # Identify distinct personas from the data
  - task_id: "persona_identification"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Create realistic, specific persona names and types
      
      As an experienced user researcher, identify distinct personas from the research data:
      
      **Input Data:**
      {{input_text}}
      
      **User Diversity Context:**
      {{ai_generated.user_diversity_analysis}}
      
      **Study Context:** {{study_name}}
      **Focus Area:** {{focus_area}}
      
      Based on the recommended persona count, identify each distinct persona:
      
      1. **Persona Names:** Realistic names that fit the user types
      2. **Persona Types:** Clear behavioral segment labels (e.g., "Skeptical First-Timer")
      3. **Key Differentiators:** What makes each persona distinct
      4. **Demographics:** Relevant background information from data
      5. **Primary Context:** Situation that brings them to this process/service
      
      **Format for each persona:**
      **Persona [X]: [Realistic Name]**
      - **Persona Type:** "[Behavioral segment label - descriptive and specific]"
      - **Key Differentiator:** [What makes this persona unique from others]
      - **Demographics:** [Age range, experience level, context from data]
      - **Primary Context:** [Situation/need that brings them to this process]
      - **Data Evidence:** [Specific quotes or patterns that support this persona]
      
      Requirements:
      - Only create personas clearly supported by distinct data patterns
      - Use realistic names that fit the demographic context
      - Make persona types descriptive and behavioral, not generic
      - Ensure each persona is genuinely different from others
      - Ground each persona in actual research evidence

  # Develop detailed persona characteristics and backgrounds
  - task_id: "persona_characterization"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Make personas feel real and relatable, not generic
      
      As an experienced UX researcher, develop detailed characteristics for each identified persona:
      
      **Identified Personas:**
      {{ai_generated.persona_identification}}
      
      **Input Data:**
      {{input_text}}
      
      **Study Context:** {{study_name}}
      
      For each persona, develop:
      1. **Detailed Context & Scenario:** Realistic situation showing how they interact with the service/product
      2. **Experience Level:** How familiar they are with similar processes
      3. **Approach Style:** How they typically handle new or complex tasks
      4. **Communication Preferences:** How they prefer to receive information
      5. **Trust Factors:** What builds or undermines their confidence
      
      **Format for each persona:**
      **Persona: [Name] - [Persona Type]**
      
      📝 **Context & Scenario:** [Detailed, realistic scenario showing this persona's typical interaction - make it specific and believable]
      
      🎓 **Experience Level:** [First-time/Experienced/Mixed] - [specific details about their background]
      
      🔧 **Approach Style:** [How they handle tasks: methodical, quick, cautious, etc. - with specific examples]
      
      💬 **Communication Preferences:** [How they prefer information: step-by-step, overview first, visual cues, etc.]
      
      🤝 **Trust Factors:** [What makes them confident vs. skeptical - specific to this domain]
      
      🏷️ **Demographic Details:** [Relevant demographics from research data]
      
      🔍 **Supporting Evidence:** [Specific quotes or behaviors from data that support these characteristics]
      
      Requirements:
      - Make scenarios specific and realistic, not generic
      - Base all characteristics on actual data evidence
      - Show personality through specific behaviors and preferences
      - Avoid stereotypes - use data-driven insights

  # Analyze behavioral patterns and strategies
  - task_id: "behavioral_pattern_analysis"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on specific, observable behaviors
      
      As an experienced behavioral researcher, analyze patterns and strategies for each persona:
      
      **Personas with Characteristics:**
      {{ai_generated.persona_characterization}}
      
      **Input Data:**
      {{input_text}}
      
      For each persona, analyze:
      1. **Typical Behaviors:** How they actually behave when using services/products
      2. **Coping Strategies:** How they handle difficulties or confusion
      3. **Decision-Making Patterns:** How they make choices and evaluate options
      4. **Information Seeking:** How they find help or additional information
      5. **Representative Quote:** Direct quote that captures their voice/perspective
      
      **Format for each persona:**
      **Persona: [Name]**
      
      🎯 **Typical Behaviors:**
      - [Specific behavior 1]: [Example from data]
      - [Specific behavior 2]: [Example from data]
      - [Specific behavior 3]: [Example from data]
      
      🛡️ **Coping Strategies:** [How they handle problems - specific strategies observed in data]
      
      🤔 **Decision-Making:** [How they evaluate options and make choices - patterns from research]
      
      📚 **Information Seeking:** [How they look for help, answers, or additional info]
      
      💬 **Representative Quote:** "[Direct quote from data that captures their voice and perspective]"
      
      📊 **Signal Strength:** [How often these patterns appear: "Consistent across multiple participants" / "Strong recurring theme" / "Well-supported pattern"]
      
      ❤️ **Emotional Dimension:** [Primary emotions this persona experiences - specific and realistic]
      
      Requirements:
      - Base all behaviors on actual observed patterns in data
      - Include direct quotes that genuinely represent the persona
      - Make strategies specific and actionable for teams to understand
      - Show realistic human complexity, not oversimplified archetypes

  # Map goals, motivations, and frustrations
  - task_id: "goal_frustration_mapping"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Make goals and frustrations specific and actionable
      
      As an experienced user researcher, map goals, motivations, and frustrations for each persona:
      
      **Personas with Behaviors:**
      {{ai_generated.behavioral_pattern_analysis}}
      
      **Study Context:** {{study_name}}
      **Focus Area:** {{focus_area}}
      
      For each persona, identify:
      1. **Primary Goals:** What they're trying to accomplish (3 key goals)
      2. **Underlying Motivations:** Why these goals matter to them
      3. **Key Frustrations:** Specific barriers that prevent success (3 main frustrations)
      4. **Impact Assessment:** How frustrations affect their experience
      5. **Success Factors:** What helps them achieve their goals
      
      **Format for each persona:**
      **Persona: [Name]**
      
      🎯 **Goals & Motivations:**
      • [Specific goal 1]: [Why this matters to them - underlying motivation]
      • [Specific goal 2]: [Why this matters to them - underlying motivation]
      • [Specific goal 3]: [Why this matters to them - underlying motivation]
      
      😤 **Frustrations & Barriers:**
      • [Specific frustration 1]: [How this blocks their progress]
      • [Specific frustration 2]: [How this blocks their progress]
      • [Specific frustration 3]: [How this blocks their progress]
      
      ⚡ **Top Frustration Impact:** [How their biggest frustration affects their success, confidence, or well-being - be specific]
      
      ✅ **Success Factors:** [What helps them succeed - specific conditions, features, or support]
      
      🎯 **Use Case Context:** [Realistic scenario showing how goals/frustrations play out in practice]
      
      Requirements:
      - Make goals specific and measurable, not generic aspirations
      - Connect frustrations to actual barriers observed in research
      - Show impact in terms of real consequences for the persona
      - Base success factors on positive patterns from data

  # Generate actionable opportunities for each persona
  - task_id: "persona_opportunity_generation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Make opportunities specific and actionable for teams
      
      As an experienced UX strategist, generate actionable opportunities for each persona:
      
      **Personas with Goals/Frustrations:**
      {{ai_generated.goal_frustration_mapping}}
      
      **Study Context:** {{study_name}}
      **Focus Area:** {{focus_area}}
      
      For each persona, generate:
      1. **Primary Opportunity:** Most impactful way to support this persona
      2. **Implementation Approach:** Specific steps teams could take
      3. **Success Metrics:** How to measure improvement for this persona
      4. **Quick Wins:** Immediate actions that could help this persona
      
      **Format for each persona:**
      **Persona: [Name]**
      
      💡 **Primary Opportunity:** [Specific, actionable opportunity that directly addresses their top frustration or supports their main goal]
      
      🛠️ **Implementation Approach:**
      - [Specific step 1]: [What team should do this and how]
      - [Specific step 2]: [What team should do this and how]
      - [Specific step 3]: [What team should do this and how]
      
      📈 **Success Metrics:** [How to measure if opportunities successfully support this persona - specific indicators]
      
      ⚡ **Quick Wins:** [2-3 immediate actions teams could take to improve this persona's experience]
      
      🎯 **Relevant Use Case:** [How this persona's needs inform product, service, or policy decisions - specific applications]
      
      ⭐ **Priority Level:** [High/Medium/Low] - [reasoning based on persona's impact and implementation complexity]
      
      **Examples of good opportunities:**
      - "Create a confidence-building preview that shows exactly what will happen before they commit"
      - "Develop progressive disclosure that reveals complexity gradually as they demonstrate readiness"
      - "Add contextual help that appears at decision points where this persona typically gets stuck"
      
      **NOT vague opportunities like:**
      - "Improve user experience"
      - "Better communication"
      - "More personalization"

  # Validate personas and generate follow-up recommendations
  - task_id: "persona_validation_and_follow_up"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Provide specific validation approaches and next steps
      
      As an experienced user research strategist, validate personas and recommend follow-up actions:
      
      **Complete Persona Analysis:**
      {{ai_generated.goal_frustration_mapping}}
      {{ai_generated.persona_opportunity_generation}}
      
      **Router Quality Assessment:** {{file_selection_quality}}
      **Router Recommendations:** {{recommendations}}
      **Study Context:** {{study_name}}
      
      For the persona set, assess:
      
      1. **Persona Validation:** How confident are we in these personas?
      2. **Evidence Strength:** How well-supported is each persona?
      3. **Team Application:** How should teams use these personas?
      4. **Follow-up Research:** What would strengthen persona confidence?
      
      **Format:**
      **Overall Persona Confidence:** [High/Medium/Low] - [reasoning based on data quality and router assessment]
      
      **Individual Persona Strength:**
      [For each persona: Name - Confidence level and supporting evidence quality]
      
      **Team Application Guidelines:**
      - **Decision Making:** [How teams should use personas for decisions]
      - **Design Process:** [How personas should inform design work]
      - **Prioritization:** [How personas help prioritize features/improvements]
      
      **Persona Validation Needs:**
      - [Validation method]: [What this would confirm about personas]
      - [Research approach]: [How to strengthen persona confidence]
      
      **Follow-up Analysis Recommendations:**
      Based on router recommendations and persona findings:
      - [Analysis type]: [How this would complement persona insights]
      - [Research method]: [What additional perspective this would provide]
      
      **Router Integration:**
      {{recommendations}}
      [How router recommendations align with persona development]
      
      **Success Metrics for Personas:**
      - [Usage metric]: [How to measure persona adoption by teams]
      - [Impact metric]: [How to measure persona influence on decisions]
      
      **Key Limitations:** [Any significant limitations from router assessment or data gaps that affect persona confidence]

# Auto-generated/computed variables (enhanced with AI analysis)
auto_variables:
  - num_personas: |
      # AI determines optimal persona count from user diversity analysis
      extract_persona_count(ai_generated.user_diversity_analysis) || 1
  - session_count: |
      # AI estimates session count from diversity analysis and file metadata
      extract_session_count(ai_generated.user_diversity_analysis, selected_files_summary) || "multiple sessions"
  - target_audience: |
      # AI identifies primary user segment from diversity analysis
      extract_target_audience(ai_generated.user_diversity_analysis) || "Primary users"
  - confidence_level: |
      # AI determines overall analysis confidence from validation task
      extract_confidence_level(ai_generated.persona_validation_and_follow_up) || "medium"
  - current_date: |
      # Auto-generate current date for file naming
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      # Auto-generate based on study name and date
      generate_github_link(study_name, current_date) || null

# Output configuration (enhanced)
output_options:
  default_delivery: "slack_and_file"
  slack_format: "structured"
  file_location: "04-analysis/personas/"
  file_name: "{{study_folder}}_personas_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "👤 Persona Results"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "🧭 Map User Journey"
      action: "run_journey_mapping"
    - text: "🎯 Extract Jobs-to-be-Done"
      action: "run_jobs_to_be_done"
    - text: "🧠 Run Affinity Mapping"
      action: "run_affinity_mapping"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"
    - text: "📊 Router Intelligence Log"
      url: "{{router_log_link}}"

output_use: |
  Router-Enhanced Persona Generator leverages intelligent preprocessing to optimize persona development quality and context.
  Receives AI-validated file selections, quality assessments, and smart recommendations from the synthesize_router
  to ensure optimal persona creation. By incorporating router intelligence, researchers can confidently develop
  actionable personas with full visibility into data quality, limitations, and optimization opportunities.

  Use this method to:
    - Benefit from intelligent file selection validation and optimization
    - Understand data quality impact on persona confidence and validation needs
    - Leverage router recommendations for comprehensive user understanding
    - Maintain full transparency in AI-assisted persona development workflow

output_notes: |
  This method generates {{num_personas}} persona(s) based on AI analysis of user diversity and data quality.
  Persona confidence level: {{confidence_level}} based on router file selection assessment.
  Target audience ({{target_audience}}) identified from input patterns and user characteristics.
  Router recommendations integrated for context-aware persona development approach.

# Enhanced output template using AI-generated content
output_format: |
  Hi team! 👋 I just created {{num_personas}} research-grounded persona(s) from our AI-enhanced analysis. Found some really clear patterns around user behaviors, goals, and frustrations that I think will help us make better decisions.

  {{team_members}} - would love your thoughts on these personas, especially how they connect to what we're building and where you see opportunities to better support these users.

  📂 *Study:* {{study_name}}  
  🔗 *Full details:* {{study_link}}
  📊 *Router Analysis:* [View preprocessing intelligence]({{router_log_link}})

  ---

  ## 📊 *USER DIVERSITY & QUALITY ANALYSIS*

  {{ai_generated.user_diversity_analysis}}

  **Router Quality Assessment:**
  {{file_selection_quality}}

  **Files Analyzed:**
  {{selected_files_summary}}

  ---

  ## 👤 *IDENTIFIED PERSONAS*

  {{ai_generated.persona_identification}}

  ---

  ## 🎭 *PERSONA CHARACTERISTICS*

  {{ai_generated.persona_characterization}}

  ---

  ## 🎯 *BEHAVIORAL PATTERNS*

  {{ai_generated.behavioral_pattern_analysis}}

  ---

  ## 💭 *GOALS & FRUSTRATIONS*

  {{ai_generated.goal_frustration_mapping}}

  ---

  ## 💡 *ACTIONABLE OPPORTUNITIES*

  {{ai_generated.persona_opportunity_generation}}

  ---

  ## ✅ *PERSONA VALIDATION & NEXT STEPS*

  {{ai_generated.persona_validation_and_follow_up}}

  **Router Recommendations Integration:**
  {{recommendations}}

  ---

  *What do you think?* Reply in thread with your thoughts:
  • How well do these personas match your experience with users?
  • Which frustrations feel most urgent to address?
  • Should we follow the recommended validation steps?
  • Where do you see opportunities to support these users better?

  ---
  
  *🤖 AI-Enhanced Persona Analysis Complete*  
  *Preprocessing: {{preprocessing_timestamp}} | Router: {{router_version}} | Analysis ID: {{analysis_id}}*

# Processing workflow
processing_workflow:
  1. validate_router_inputs
  2. confirm_data_quality_context
  3. execute_user_diversity_analysis
  4. execute_persona_identification
  5. execute_persona_characterization
  6. execute_behavioral_pattern_analysis
  7. execute_goal_frustration_mapping
  8. execute_persona_opportunity_generation
  9. execute_persona_validation_and_follow_up
  10. format_comprehensive_output
  11. save_to_analysis_folder
  12. send_team_notifications
  13. track_analysis_completion

notify:
  - role: team
    action: "Router-enhanced persona generation completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} just created {{num_personas}} research-based persona(s) for {{study_name}} with {{confidence_level}} confidence. Check out the insights!"
  - role: researcher
    action: "Analysis saved"
    slack_tag: "{{researcher_contact}}"
    message: "Your router-enhanced persona results have been posted to {{study_channel}} and saved to GitHub. Analysis confidence: {{confidence_level}} based on file quality assessment."
