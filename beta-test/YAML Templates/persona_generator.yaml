id: persona_generator
name: run_persona_generator

label: 👤 Persona Generation
version: "v2.0"

description: >
  Generate realistic and actionable user personas clearly grounded in qualitative research findings.
  Automatically discovers and analyzes research files from selected study folder with optional quality improvements.
  Personas help teams deeply empathize with users, prioritize product or policy decisions, and confidently communicate insights.

author: Qori R&D
created: 2025-06-27
last_updated: 2025-09-10

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.4
  max_tokens: 4000

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 1000
  max_file_size: 100000
  supported_formats: [".md", ".txt", ".csv", ".json"]
  max_files_per_analysis: 20

# Privacy controls
privacy_controls:
  enable_pii_detection: true
  pii_detection_patterns:
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
    phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    ssn: '\b\d{3}-\d{2}-\d{4}\b'
  masking_strategy:
    email: "[EMAIL_REDACTED]"
    phone: "[PHONE_REDACTED]" 
    ssn: "[SSN_REDACTED]"

# Slack modal input variables
input_variables:
  - selected_study              # Study name from dropdown (REQUIRED)
  - include_research_plan       # Boolean from checkbox (OPTIONAL)
  - include_participant_notes   # Boolean from checkbox (OPTIONAL)  
  - include_raw_transcripts     # Boolean from checkbox (OPTIONAL)
  
  # Auto-generated during processing
  - discovered_files            # Files found by auto-discovery (GENERATED)
  - combined_file_content       # Auto-combined content (GENERATED)
  - quality_assessment          # Initial quality score (GENERATED)

# Study metadata mapping
study_metadata:
  "VA Housing Application Usability Study":
    folder: "va-housing-usability-2025"
    researcher: "jordan.researcher"
    channel: "#research-housing-app"
    focus_area: "housing application users"
    
  "Benefits Portal Navigation Research":
    folder: "benefits-portal-nav-2025"
    researcher: "alex.ux"
    channel: "#research-benefits"
    focus_area: "benefits portal users"
    
  "Veteran Onboarding Experience Study":
    folder: "veteran-onboarding-2025"
    researcher: "casey.research"
    channel: "#research-onboarding"
    focus_area: "veteran onboarding users"

# File discovery system
auto_file_discovery:
  core_files:
    session_summaries:
      file_patterns: ["*session_summary*", "*summary*", "*session*"]
      search_paths: ["01-sessions/", "sessions/", "summaries/"]
      priority: "required"
      confidence_weight: 50
      
    transcripts:
      file_patterns: ["*transcript*", "*interview*", "*recording*"]
      search_paths: ["01-sessions/", "transcripts/", "interviews/"]
      priority: "high"
      confidence_weight: 30
  
  enhancement_files:
    research_plan:
      enabled_when: "{{include_research_plan}} == true"
      file_patterns: ["*research_plan*", "*study_plan*", "*methodology*"]
      search_paths: ["00-planning/", "planning/", "research/"]
      confidence_boost: 8
      
    participant_notes:
      enabled_when: "{{include_participant_notes}} == true"
      file_patterns: ["*participant*", "*notes*", "*observations*"]
      search_paths: ["02-participants/", "participants/", "notes/"]
      confidence_boost: 5
      
    raw_transcripts:
      enabled_when: "{{include_raw_transcripts}} == true"
      file_patterns: ["*raw*", "*unprocessed*", "*recording*"]
      search_paths: ["01-sessions/raw/", "raw/", "recordings/"]
      confidence_boost: 3

# AI generation tasks
ai_generation_tasks:
  # File discovery and quality assessment
  - task_id: "file_discovery_summary"
    prompt: |
      As a research operations specialist, analyze the discovered files and quality:
      
      **Selected Study:** {{selected_study}}
      **Enhancement Options Selected:**
      - Research plan: {{include_research_plan}}
      - Participant notes: {{include_participant_notes}}
      - Raw transcripts: {{include_raw_transcripts}}
      
      **Discovered Files:** {{discovered_files}}
      **Total Content:** [Analyze character/word count of combined_file_content]
      
      Report on file coverage, content quality, enhancement impact, and analysis confidence for persona development.

  # Analyze user diversity and determine optimal persona approach
  - task_id: "user_diversity_analysis"
    prompt: |
      As an experienced user researcher specializing in persona development, analyze the user diversity in this research data:
      
      **Study:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      **Input Data:** {{combined_file_content}}
      **Quality Assessment:** {{ai_generated.file_discovery_summary}}
      
      Analyze:
      1. **User Diversity Level:** How many distinct user types are represented in the data?
      2. **Optimal Persona Count:** Based on diversity and data quality, how many personas should be created?
      3. **Primary User Segments:** What are the main user categories or behavioral patterns?
      4. **Data Richness:** How well does the data support persona creation?
      5. **Confidence Level:** What confidence level is appropriate for persona development?
      
      **Format:**
      **User Diversity Level:** [High/Medium/Low] - [specific details about variety in user types]
      **Recommended Persona Count:** [1-3 personas] - [reasoning based on distinct user patterns]
      **Primary Segments:** [List main user categories/behavioral patterns identified]
      **Data Suitability:** [Excellent/Good/Adequate/Poor] for persona development - [reasoning]
      **Analysis Confidence:** [High/Medium/Low] - [reasoning based on file assessment]
      **Target Audience:** [Primary user segment most represented in data]

  # Identify distinct personas from the data
  - task_id: "persona_identification"
    prompt: |
      As an experienced user researcher, identify distinct personas from the research data:
      
      **Input Data:** {{combined_file_content}}
      **User Diversity Context:** {{ai_generated.user_diversity_analysis}}
      **Study Context:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      
      Based on the recommended persona count, identify each distinct persona:
      
      1. **Persona Names:** Realistic names that fit the user types
      2. **Persona Types:** Clear behavioral segment labels (e.g., "Skeptical First-Timer")
      3. **Key Differentiators:** What makes each persona distinct
      4. **Demographics:** Relevant background information from data
      5. **Primary Context:** Situation that brings them to this process/service
      
      **Format for each persona:**
      **Persona [X]: [Realistic Name]**
      - **Persona Type:** "[Behavioral segment label - descriptive and specific]"
      - **Key Differentiator:** [What makes this persona unique from others]
      - **Demographics:** [Age range, experience level, context from data]
      - **Primary Context:** [Situation/need that brings them to this process]
      - **Data Evidence:** [Specific quotes or patterns that support this persona]
      
      Requirements:
      - Only create personas clearly supported by distinct data patterns
      - Use realistic names that fit the demographic context
      - Make persona types descriptive and behavioral, not generic
      - Ensure each persona is genuinely different from others
      - Ground each persona in actual research evidence

  # Develop detailed persona characteristics and backgrounds
  - task_id: "persona_characterization"
    prompt: |
      As an experienced UX researcher, develop detailed characteristics for each identified persona:
      
      **Identified Personas:** {{ai_generated.persona_identification}}
      **Input Data:** {{combined_file_content}}
      **Study Context:** {{selected_study}}
      
      For each persona, develop:
      1. **Detailed Context & Scenario:** Realistic situation showing how they interact with the service/product
      2. **Experience Level:** How familiar they are with similar processes
      3. **Approach Style:** How they typically handle new or complex tasks
      4. **Communication Preferences:** How they prefer to receive information
      5. **Trust Factors:** What builds or undermines their confidence
      
      **Format for each persona:**
      **Persona: [Name] - [Persona Type]**
      
      📝 **Context & Scenario:** [Detailed, realistic scenario showing this persona's typical interaction - make it specific and believable]
      🎓 **Experience Level:** [First-time/Experienced/Mixed] - [specific details about their background]
      🔧 **Approach Style:** [How they handle tasks: methodical, quick, cautious, etc. - with specific examples]
      💬 **Communication Preferences:** [How they prefer information: step-by-step, overview first, visual cues, etc.]
      🤝 **Trust Factors:** [What makes them confident vs. skeptical - specific to this domain]
      🏷️ **Demographic Details:** [Relevant demographics from research data]
      💬 **Supporting Evidence:** [Specific quotes or behaviors from data that support these characteristics]
      
      Requirements:
      - Make scenarios specific and realistic, not generic
      - Base all characteristics on actual data evidence
      - Show personality through specific behaviors and preferences
      - Avoid stereotypes - use data-driven insights

  # Analyze behavioral patterns and strategies
  - task_id: "behavioral_pattern_analysis"
    prompt: |
      As an experienced behavioral researcher, analyze patterns and strategies for each persona:
      
      **Personas with Characteristics:** {{ai_generated.persona_characterization}}
      **Input Data:** {{combined_file_content}}
      
      For each persona, analyze:
      1. **Typical Behaviors:** How they actually behave when using services/products
      2. **Coping Strategies:** How they handle difficulties or confusion
      3. **Decision-Making Patterns:** How they make choices and evaluate options
      4. **Information Seeking:** How they find help or additional information
      5. **Representative Quote:** Direct quote that captures their voice/perspective
      
      **Format for each persona:**
      **Persona: [Name]**
      
      🎯 **Typical Behaviors:**
      - [Specific behavior 1]: [Example from data]
      - [Specific behavior 2]: [Example from data]
      - [Specific behavior 3]: [Example from data]
      
      🛡️ **Coping Strategies:** [How they handle problems - specific strategies observed in data]
      🤔 **Decision-Making:** [How they evaluate options and make choices - patterns from research]
      📚 **Information Seeking:** [How they look for help, answers, or additional info]
      💬 **Representative Quote:** "[Direct quote from data that captures their voice and perspective]"
      📊 **Signal Strength:** [How often these patterns appear: "Consistent across multiple participants" / "Strong recurring theme" / "Well-supported pattern"]
      ❤️ **Emotional Dimension:** [Primary emotions this persona experiences - specific and realistic]
      
      Requirements:
      - Base all behaviors on actual observed patterns in data
      - Include direct quotes that genuinely represent the persona
      - Make strategies specific and actionable for teams to understand
      - Show realistic human complexity, not oversimplified archetypes

  # Map goals, motivations, and frustrations
  - task_id: "goal_frustration_mapping"
    prompt: |
      As an experienced user researcher, map goals, motivations, and frustrations for each persona:
      
      **Personas with Behaviors:** {{ai_generated.behavioral_pattern_analysis}}
      **Study Context:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      
      For each persona, identify:
      1. **Primary Goals:** What they're trying to accomplish (3 key goals)
      2. **Underlying Motivations:** Why these goals matter to them
      3. **Key Frustrations:** Specific barriers that prevent success (3 main frustrations)
      4. **Impact Assessment:** How frustrations affect their experience
      5. **Success Factors:** What helps them achieve their goals
      
      **Format for each persona:**
      **Persona: [Name]**
      
      🎯 **Goals & Motivations:**
      • [Specific goal 1]: [Why this matters to them - underlying motivation]
      • [Specific goal 2]: [Why this matters to them - underlying motivation]
      • [Specific goal 3]: [Why this matters to them - underlying motivation]
      
      😤 **Frustrations & Barriers:**
      • [Specific frustration 1]: [How this blocks their progress]
      • [Specific frustration 2]: [How this blocks their progress]
      • [Specific frustration 3]: [How this blocks their progress]
      
      ⚡ **Top Frustration Impact:** [How their biggest frustration affects their success, confidence, or well-being - be specific]
      ✅ **Success Factors:** [What helps them succeed - specific conditions, features, or support]
      🎯 **Use Case Context:** [Realistic scenario showing how goals/frustrations play out in practice]
      
      Requirements:
      - Make goals specific and measurable, not generic aspirations
      - Connect frustrations to actual barriers observed in research
      - Show impact in terms of real consequences for the persona
      - Base success factors on positive patterns from data

  # Generate actionable opportunities for each persona
  - task_id: "persona_opportunity_generation"
    prompt: |
      As an experienced UX strategist, generate actionable opportunities for each persona:
      
      **Personas with Goals/Frustrations:** {{ai_generated.goal_frustration_mapping}}
      **Study Context:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      
      For each persona, generate:
      1. **Primary Opportunity:** Most impactful way to support this persona
      2. **Implementation Approach:** Specific steps teams could take
      3. **Success Metrics:** How to measure improvement for this persona
      4. **Quick Wins:** Immediate actions that could help this persona
      
      **Format for each persona:**
      **Persona: [Name]**
      
      💡 **Primary Opportunity:** [Specific, actionable opportunity that directly addresses their top frustration or supports their main goal]
      
      🛠️ **Implementation Approach:**
      - [Specific step 1]: [What team should do this and how]
      - [Specific step 2]: [What team should do this and how]
      - [Specific step 3]: [What team should do this and how]
      
      📈 **Success Metrics:** [How to measure if opportunities successfully support this persona - specific indicators]
      ⚡ **Quick Wins:** [2-3 immediate actions teams could take to improve this persona's experience]
      🎯 **Relevant Use Case:** [How this persona's needs inform product, service, or policy decisions - specific applications]
      ⭐ **Priority Level:** [High/Medium/Low] - [reasoning based on persona's impact and implementation complexity]
      
      **Examples of good opportunities:**
      - "Create a confidence-building preview that shows exactly what will happen before they commit"
      - "Develop progressive disclosure that reveals complexity gradually as they demonstrate readiness"
      - "Add contextual help that appears at decision points where this persona typically gets stuck"
      
      **NOT vague opportunities like:**
      - "Improve user experience"
      - "Better communication"
      - "More personalization"

# Processing workflow
processing_workflow:
  1. validate_slack_modal_inputs
  2. discover_files_from_study_selection
  3. calculate_initial_quality_assessment
  4. validate_discovered_files
  5. combine_selected_files_with_truncation
  6. execute_file_discovery_summary
  7. execute_user_diversity_analysis
  8. execute_persona_identification
  9. execute_persona_characterization
  10. execute_behavioral_pattern_analysis
  11. execute_goal_frustration_mapping
  12. execute_persona_opportunity_generation
  13. format_slack_output
  14. format_github_output
  15. save_to_analysis_folder
  16. send_team_notifications

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "persona_focused"
  file_format: "github_markdown"
  path: "04-analysis/personas/"
  filename: "{{study_folder}}_personas_{{current_date}}.md"

# Slack output template
output_template: |
