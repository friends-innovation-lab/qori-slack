id: affinity_mapping
label: 🧠 Affinity Mapping
description: Group notes or quotes into themes using AI 🗂️
input_type: text
prompt: |
  Cluster the following statements into 3–5 thematic groups.
  Include each quote and label the theme.

  Notes:
  {{input}}
output_format: |
  ## 🏷️ Theme 1: [Label]
  - "..."

  ## 🏷️ Theme 2: [Label]
  - "..."
