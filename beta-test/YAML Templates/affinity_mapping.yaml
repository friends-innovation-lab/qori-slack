  - 🐛 Usability Issues - to prioritize interface problems
  - 💡 Design Opportunities - to identify specific improvements
  
  ---
  
  *Generated by Qori Research Synthesis • {{current_date}} • Version {{analysis_version}}*

# Auto-generated variables
auto_variables:
  - max_themes: extract_theme_count(ai_generated.affinity_clustering) || 3
  - current_date: new Date().toISOString().split('T')[0]
  - analysis_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(study_name, current_date)

notify:
  - role: team
    action: "Affinity mapping completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} just completed affinity mapping for {{selected_study}}. {{max_themes}} themes identified - check it out!"

output_use: |
  Slack-Native Affinity Mapping with Senior UX Strategy approach automatically discovers research files 
  from selected study folders, performs inductive clustering analysis to identify natural patterns, 
  then converts clusters into strategic themes with business implications. Outputs concise 
  Slack summaries focused on themes and opportunities, plus detailed GitHub markdown reports 
  for stakeholder sharing and documentation.
