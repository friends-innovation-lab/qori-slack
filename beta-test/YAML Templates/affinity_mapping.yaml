id: affinity_mapping
name: run_affinity_mapping

label: 🧠 Affinity Mapping
version: "v2.0"

description: >
  Group qualitative quotes, notes, or observations into clearly labeled themes using AI.
  Users select their research files directly for analysis. This method replaces manual 
  affinity mapping tools (like Miro) with a faster, scalable, and shareable format.
  Designed to support synthesis across large datasets with clean Slack/GitHub export.

author: Qori R&D  
created: 2025-06-27  
last_updated: 2025-09-02

input_type: file_selection
input_processing: combine_selected_files
precision_mode: concise | detailed

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.4
  max_tokens: 4000

# System limits and error handling
system_limits:
  max_total_tokens: 50000           # Combined file content limit
  min_content_threshold: 1000       # Minimum characters for viable analysis
  max_file_size: 100000            # Per-file character limit
  supported_formats: [".md", ".txt", ".csv", ".json"]
  max_files_per_analysis: 20

# Privacy and security controls
privacy_controls:
  enable_pii_detection: true        # Automatically detect and mask PII
  pii_detection_patterns:
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
    phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    ssn: '\b\d{3}-\d{2}-\d{4}\b'
    address: '\b\d+\s+[A-Za-z\s]+\s+(Street|St|Avenue|Ave|Road|Rd|Drive|Dr|Lane|Ln|Boulevard|Blvd)\b'
    names_common: ['First Name', 'Last Name', 'Full Name']  # Field indicators
  
  masking_strategy:
    email: "[EMAIL_REDACTED]"
    phone: "[PHONE_REDACTED]" 
    ssn: "[SSN_REDACTED]"
    address: "[ADDRESS_REDACTED]"
    names: "[NAME_REDACTED]"
  
  pii_audit_log: true              # Log all PII detections for compliance

# Data lineage and source tracking
data_lineage:
  enable_quote_attribution: true   # Track which file each quote came from
  enable_source_verification: true # Validate quotes against original sources
  citation_format: "detailed"      # Include file path, line numbers, timestamps
  
  attribution_metadata:
    track_file_source: true         # Which file the quote originated from
    track_participant_id: true      # Which participant said it
    track_session_context: true     # Session details when quote occurred
    track_timestamp: true           # When quote was recorded
    track_researcher_notes: true    # Any researcher context around quote
  
  verification_rules:
    exact_quote_match: true         # Verify quotes appear exactly in source
    context_window: 100             # Characters before/after to include
    flag_paraphrased: true          # Flag if quote seems paraphrased
    require_source_citation: true   # All quotes must link to source

# Performance monitoring and analytics
performance_monitoring:
  enable_execution_tracking: true  # Track analysis performance
  enable_resource_monitoring: true # Monitor memory and processing usage
  enable_quality_metrics: true     # Track analysis quality over time
  
  metrics_to_track:
    processing_time:
      total_analysis_time: true    # End-to-end processing duration
      task_breakdown: true         # Time per AI generation task
      file_processing_time: true   # Time to combine and validate files
      
    resource_usage:
      token_consumption: true      # Total tokens used
      memory_usage: true           # Peak memory consumption
      api_calls_count: true        # Number of LLM API calls
      
    quality_indicators:
      theme_coherence_score: true  # How well themes cluster
      quote_relevance_score: true  # How well quotes support themes
      bias_detection_accuracy: true # Effectiveness of bias detection
      reliability_validation: true # Inter-rater agreement when available
      
  benchmarking:
    compare_to_baseline: true      # Compare performance to standard benchmarks
    track_improvement: true        # Monitor quality improvements over time
    alert_performance_issues: true # Flag unusually slow or poor analyses
    
  reporting:
    generate_performance_report: true # Include performance data in output
    save_metrics_to_dashboard: true  # Update system-wide performance dashboard
    notify_on_anomalies: true        # Alert administrators to issues

# File selection and data requirements
data_requirements:
  required_data: ["session_summaries"]
  optimal_data: ["transcripts", "research_plan", "raw_notes", "participant_tracker"]
  
  file_categories:
    session_summaries:
      description: "Summary notes from user research sessions"
      file_patterns: ["*session_summary*", "*summary*", "*session*"]
      priority: "required"
      
    transcripts:
      description: "Full interview or session transcripts"
      file_patterns: ["*transcript*", "*interview*", "*recording*"]
      priority: "optimal"
      
    research_plan:
      description: "Study objectives and methodology context"
      file_patterns: ["*research_plan*", "*study_plan*", "*methodology*"]
      priority: "optimal"
      
    raw_notes:
      description: "Raw field notes and observations"
      file_patterns: ["*notes*", "*observations*", "*fieldwork*"]
      priority: "optimal"
      
    participant_tracker:
      description: "Participant demographics and context"
      file_patterns: ["*participant*", "*demographics*", "*tracker*"]
      priority: "optimal"

input_variables:
  # Core analysis data
  - selected_files           # Array of file IDs selected by user (REQUIRED)
  - combined_file_content     # Auto-combined content from selected files (GENERATED)
  - focus_area               # Analysis focus area (REQUIRED)
  
  # Study context
  - study_name               # Title of study (REQUIRED)
  - study_folder             # Study folder path (REQUIRED)
  - researcher_contact       # Lead researcher (REQUIRED)
  - study_channel            # Where to post results (REQUIRED)
  - study_link               # Link to study folder or documentation (OPTIONAL)
  - team_members             # Who to notify/tag (OPTIONAL)
  
  # Analysis preferences
  - max_themes               # Maximum number of themes to generate (OPTIONAL, default: auto-determine)
  - analysis_depth           # detailed | concise (OPTIONAL, default: detailed)
  
  # Research quality controls (NEW)
  - enable_bias_detection    # Run bias analysis on data (OPTIONAL, default: true)
  - require_validation       # Require stakeholder validation step (OPTIONAL, default: false)
  - enable_version_tracking  # Track analysis iterations (OPTIONAL, default: true)
  - quantitative_data        # Related survey/analytics data for triangulation (OPTIONAL)
  - previous_analysis_id     # Link to compare with previous runs (OPTIONAL)

# File processing and validation
file_processing:
  validation_rules:
    - ensure_required_files_present
    - validate_file_accessibility
    - validate_file_formats
    - check_minimum_content_threshold
    - check_maximum_file_sizes
    - verify_total_token_limit
    - warn_if_optimal_files_missing
    
  error_handling:
    file_too_large: "File exceeds {{max_file_size}} characters. Consider splitting into smaller sections or summarizing key content."
    unsupported_format: "File format not supported. Please use: {{supported_formats}}"
    insufficient_content: "Selected files contain less than {{min_content_threshold}} characters. Add more detailed files for reliable analysis."
    token_limit_exceeded: "Combined files exceed {{max_total_tokens}} token limit. Remove some files or use shorter excerpts."
    
  auto_truncation:
    enabled: true
    strategy: "preserve_participant_quotes"  # Keep quotes intact, truncate context
    priority_order: ["transcripts", "session_summaries", "raw_notes", "research_context"]
    
  combination_strategy:
    session_summaries:
      header: "=== SESSION SUMMARIES ==="
      format: "**Session {{session_number}} - {{participant_details}}**\n{{content}}\n\n"
      
    transcripts:
      header: "=== INTERVIEW TRANSCRIPTS ==="
      format: "**Transcript {{participant_number}}**\n{{content}}\n\n"
      
    raw_notes:
      header: "=== RAW FIELD NOTES ==="
      format: "**{{note_date}} - {{note_title}}**\n{{content}}\n\n"
      
    participant_data:
      header: "=== PARTICIPANT CONTEXT ==="
      format: "{{content}}\n\n"
      
    research_context:
      header: "=== RESEARCH CONTEXT ==="
      format: "{{content}}\n\n"

# AI GENERATION TASKS
ai_generation_tasks:
  # Privacy and compliance - PII Detection and Scrubbing
  - task_id: "pii_detection_analysis"
    enabled_when: "{{privacy_controls.enable_pii_detection}} == true"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Be thorough in identifying potential PII
      
      As a data privacy specialist, scan this research data for personally identifiable information:
      
      **Research Data:**
      {{combined_file_content}}
      
      **Detection Patterns:**
      - Email addresses: {{privacy_controls.pii_detection_patterns.email}}
      - Phone numbers: {{privacy_controls.pii_detection_patterns.phone}}
      - SSN patterns: {{privacy_controls.pii_detection_patterns.ssn}}
      - Address patterns: {{privacy_controls.pii_detection_patterns.address}}
      - Name indicators: {{privacy_controls.pii_detection_patterns.names_common}}
      
      Scan for and identify:
      1. **Direct PII:** Email addresses, phone numbers, social security numbers, full names
      2. **Indirect PII:** Specific locations, job titles with company names, unique identifiers
      3. **Contextual PII:** Information that could identify individuals when combined
      4. **Quasi-identifiers:** Demographics that could narrow identification
      
      **Format:**
      **PII Detection Summary:** [High/Medium/Low risk]
      
      **Detected PII Items:**
      - **Email addresses:** [Count and context examples] - Risk: [High/Medium/Low]
      - **Phone numbers:** [Count and context examples] - Risk: [High/Medium/Low]
      - **Names:** [Count and context examples] - Risk: [High/Medium/Low]
      - **Addresses:** [Count and context examples] - Risk: [High/Medium/Low]
      - **Other identifiers:** [Specific items found] - Risk: [High/Medium/Low]
      
      **Masking Recommendations:**
      - [Specific PII type]: Replace with [recommended mask]
      - [Specific PII type]: Replace with [recommended mask]
      
      **Compliance Assessment:** [Impact on data privacy compliance]
      
      **Masked Content Preview:** [Show examples of how data would look after masking]

  # Data lineage and source attribution
  - task_id: "data_lineage_tracking"
    enabled_when: "{{data_lineage.enable_quote_attribution}} == true"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Provide precise source tracking information
      
      As a research data specialist, create detailed source attribution for all quotes and evidence:
      
      **Analysis Results with Quotes:**
      {{ai_generated.quote_clustering}}
      
      **Selected Files with Metadata:**
      {{selected_files_with_metadata}}
      
      For each quote used in the analysis, provide:
      1. **Source Attribution:** Exact file, line number, timestamp if available
      2. **Participant Context:** Which participant, session details, circumstances
      3. **Quote Verification:** Confirm exact match or flag if paraphrased
      4. **Context Window:** Surrounding content for full understanding
      5. **Research Notes:** Any relevant researcher annotations
      
      **Format:**
      **Data Lineage Report:**
      
      {{#each themes}}
      **Theme: {{theme_name}}**
      
      **Quote Sources:**
      {{#each quotes}}
      > "{{quote_text}}"
      - **Source File:** {{file_path}}:line {{line_number}}
      - **Participant:** {{participant_id}} ({{participant_context}})
      - **Session:** {{session_date}} {{session_time}}
      - **Context:** {{surrounding_context}}
      - **Researcher Notes:** {{researcher_annotations}}
      - **Verification:** [Exact match / Paraphrased / Context-inferred]
      - **Citation:** [Standardized citation format]
      {{/each}}
      {{/each}}
      
      **Source Distribution Analysis:**
      - **Files represented:** [Count and coverage]
      - **Participants represented:** [Count and distribution]
      - **Quote quality assessment:** [Exact vs. paraphrased ratios]
      - **Missing attributions:** [Any quotes without clear sources]
      
      **Verification Flags:**
      - **Unverified quotes:** [Count and details]
      - **Paraphrased content:** [Count and flagged items]
      - **Missing context:** [Quotes needing more source context]

  # Performance monitoring and system analytics
  - task_id: "performance_analysis"
    enabled_when: "{{performance_monitoring.enable_execution_tracking}} == true"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Provide specific performance metrics and benchmarks
      
      As a system performance analyst, evaluate this analysis execution against benchmarks:
      
      **Current Analysis Metrics:**
      - Total processing time: {{execution_time}}
      - Token consumption: {{total_tokens_used}}
      - Memory usage: {{peak_memory_usage}}
      - API calls made: {{api_calls_count}}
      - Files processed: {{files_processed_count}}
      - Content volume: {{total_content_characters}}
      
      **Quality Metrics:**
      - Themes generated: {{themes_count}}
      - Quotes attributed: {{quotes_count}}
      - Evidence strength: {{evidence_quality_score}}
      - Bias risk level: {{bias_risk_level}}
      - Reliability score: {{reliability_score}}
      
      Analyze performance:
      1. **Processing Efficiency:** How does execution time compare to expected benchmarks?
      2. **Resource Optimization:** Is resource usage appropriate for content volume?
      3. **Quality Consistency:** Are quality metrics within expected ranges?
      4. **Scalability Assessment:** How would performance change with larger datasets?
      5. **Bottleneck Identification:** What processes took longest or used most resources?
      
      **Format:**
      **Performance Assessment:** [Excellent/Good/Acceptable/Poor]
      
      **Efficiency Metrics:**
      - **Processing Speed:** {{processing_speed}} chars/second - [Above/At/Below baseline]
      - **Token Efficiency:** {{tokens_per_theme}} tokens per theme - [Optimal/Standard/High]
      - **Memory Efficiency:** {{memory_per_file}} MB per file - [Efficient/Standard/High]
      
      **Quality vs. Performance Trade-offs:**
      - **Analysis Depth:** [Deep/Standard/Surface] for {{execution_time}} processing time
      - **Accuracy/Speed Balance:** [Optimal/Acceptable/Needs adjustment]
      
      **Performance Benchmarking:**
      - **Compared to similar analyses:** [Faster/Similar/Slower by X%]
      - **Resource usage ranking:** [Efficient/Standard/Resource-intensive]
      
      **Optimization Recommendations:**
      - **Speed improvements:** [Specific recommendations]
      - **Resource optimization:** [Memory/token efficiency suggestions]
      - **Quality maintenance:** [How to optimize without losing quality]
      
      **System Health Indicators:**
      - **No performance anomalies detected** / **Alert: [specific issues]**
      - **Scalability projection:** [Expected performance with 2x/5x/10x data volume]
  # Research Quality Control - Bias Detection
  - task_id: "bias_detection_analysis"
    enabled_when: "{{enable_bias_detection}} == true"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Be objective and specific about potential biases
      
      As an experienced qualitative research methodologist, analyze this research data for potential biases:
      
      **Research Data:**
      {{combined_file_content}}
      
      **Study Context:** {{study_name}}
      **Researcher:** {{researcher_contact}}
      
      Examine for common research biases:
      1. **Confirmation Bias:** Are questions or probes leading participants toward expected answers?
      2. **Selection Bias:** Does participant recruitment or retention show systematic patterns?
      3. **Researcher Bias:** Do notes/summaries reflect researcher assumptions or interpretations?
      4. **Response Bias:** Are participants giving socially desirable answers?
      5. **Framing Effects:** How questions are asked influencing responses?
      6. **Sampling Bias:** Are certain user types over/under-represented?
      
      **Format:**
      **Bias Risk Assessment:** [Low/Medium/High]
      
      **Detected Bias Indicators:**
      - [Specific bias type]: [Evidence and impact] - Risk: [Low/Medium/High]
      - [Specific bias type]: [Evidence and impact] - Risk: [Low/Medium/High]
      
      **Mitigation Recommendations:**
      - [Specific action to address bias]
      - [Specific action to address bias]
      
      **Data Reliability Impact:** [How identified biases might affect theme reliability]
      
      **Validation Needs:** [What additional validation would address bias concerns]

  # Analyze data scope and determine optimal analysis approach
  - task_id: "data_scope_analysis"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      As an experienced qualitative researcher, analyze the scope and complexity of this research data:
      
      **Study:** {{study_name}}
      **Focus Area:** {{focus_area}}
      **Selected Files:** {{selected_files}}
      **Input Data Length:** [Analyze character/word count of combined_file_content]
      
      Analyze:
      1. **Data Volume Assessment:** How much data are we working with?
      2. **Content Complexity:** What types of observations, quotes, and insights are present?
      3. **File Coverage:** How well do selected files support affinity mapping?
      4. **Optimal Theme Count:** Based on data volume and complexity, how many themes will best represent the data?
      5. **Analysis Confidence:** What confidence level is appropriate for this data set?
      6. **Missing Context:** What additional files would improve analysis quality?
      
      **Format:**
      **Data Volume:** [High/Medium/Low] - [specific details about data amount]
      **Content Types:** [List types of content: quotes, observations, task data, etc.]
      **File Coverage:** [Excellent/Good/Adequate/Insufficient] - [which file types are present/missing]
      **Recommended Theme Count:** [2-7 themes] - [reasoning]
      **Analysis Confidence:** [High/Medium/Low] - [reasoning based on data quality]
      **Missing Files Impact:** [How absence of optimal files affects analysis quality]

  # Inter-rater reliability check
  - task_id: "reliability_assessment"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on objective reliability measures
      
      As a qualitative research methodology expert, assess the reliability of these identified themes:
      
      **Themes Identified:**
      {{ai_generated.theme_identification}}
      
      **Supporting Evidence:**
      {{ai_generated.quote_clustering}}
      
      Evaluate reliability factors:
      1. **Theme Distinctiveness:** How clearly separable are themes from each other?
      2. **Evidence Quality:** How well do quotes support each theme?
      3. **Inter-coder Agreement Likelihood:** Would another analyst likely identify similar themes?
      4. **Theme Stability:** How robust are themes to slight data variations?
      5. **Boundary Clarity:** Are theme boundaries well-defined?
      
      **Format:**
      **Overall Reliability Score:** [High/Medium/Low] - [Brief reasoning]
      
      **Theme Reliability Assessment:**
      {{#each themes}}
      - **{{theme_name}}:** [High/Medium/Low reliability] - [Specific reliability factors]
      {{/each}}
      
      **Reliability Concerns:**
      - [Specific concern]: [How this affects reliability]
      - [Specific concern]: [How this affects reliability]
      
      **Validation Recommendations:**
      - [Specific method to validate themes]: [Expected outcome]
      - [Specific method to validate themes]: [Expected outcome]
      
      **Inter-rater Strategy:** [Recommended approach for independent validation]

  # Quantitative data triangulation (if provided)
  - task_id: "quantitative_triangulation"
    enabled_when: "{{quantitative_data}} != null"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on specific correlations and contradictions
      
      As a mixed-methods research analyst, triangulate qualitative themes with quantitative data:
      
      **Qualitative Themes:**
      {{ai_generated.insight_generation}}
      
      **Quantitative Data:**
      {{quantitative_data}}
      
      Compare and analyze:
      1. **Convergence:** Where do qualitative themes align with quantitative patterns?
      2. **Divergence:** Where do findings contradict each other?
      3. **Explanation:** How do qualitative insights explain quantitative patterns?
      4. **Gaps:** What gaps exist between the two data types?
      
      **Format:**
      **Triangulation Summary:** [Strong/Moderate/Weak convergence]
      
      **Convergent Findings:**
      - **Theme:** [Theme name] **aligns with** [Specific quantitative finding]
      - **Theme:** [Theme name] **explains** [Quantitative pattern]
      
      **Divergent Findings:**
      - **Theme:** [Theme name] **contradicts** [Quantitative finding] - [Possible explanations]
      
      **Enhanced Insights:**
      - [How quantitative data strengthens qualitative theme]
      - [How qualitative themes explain quantitative anomalies]
      
      **Research Implications:** [How triangulation affects confidence in findings]

  # Stakeholder validation preparation
  - task_id: "validation_preparation"
    enabled_when: "{{require_validation}} == true"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Create actionable validation plans
      
      As a user research operations specialist, prepare stakeholder validation for these themes:
      
      **Themes for Validation:**
      {{ai_generated.insight_generation}}
      
      **Study Context:** {{study_name}}
      **Stakeholders:** {{team_members}}
      
      Create validation approach:
      1. **Participant Validation:** How to get themes validated by original participants
      2. **Expert Review:** Subject matter expert validation strategy  
      3. **Stakeholder Workshops:** Team validation session planning
      4. **Validation Criteria:** How to measure validation success
      
      **Format:**
      **Validation Strategy:**
      
      **Participant Validation Plan:**
      - **Method:** [Email survey / Follow-up interviews / Focus groups]
      - **Key Questions:** [Specific validation questions for each theme]
      - **Timeline:** [When to conduct validation]
      - **Success Criteria:** [How to measure participant agreement]
      
      **Expert Review Plan:**
      - **Expert Types Needed:** [Domain experts / UX experts / Subject matter experts]
      - **Review Materials:** [What to share with experts]
      - **Review Questions:** [Specific expert validation questions]
      
      **Stakeholder Workshop Plan:**
      - **Workshop Format:** [Duration and structure]
      - **Validation Activities:** [Specific exercises to validate themes]
      - **Decision Framework:** [How to resolve disagreements]
      
      **Validation Timeline:** [Complete schedule for validation activities]
  - task_id: "theme_identification"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on specific user tensions and needs, not generic categories
      
      As an experienced qualitative researcher, identify potential themes and patterns in this research data:
      
      **Input Data:**
      {{combined_file_content}}
      
      **Context:**
      - Study: {{study_name}}
      - Focus: {{focus_area}}
      - Recommended theme count: [Extract from data_scope_analysis]
      - Data coverage assessment: [Extract from data_scope_analysis]
      
      Instructions:
      1. Read through all the data and identify recurring patterns, tensions, and user needs
      2. Look for quotes and observations that naturally cluster together
      3. Identify themes that express specific user tensions (not generic categories)
      4. Ensure themes are distinct and well-supported by evidence
      5. Focus on actionable insights that teams can use for decision-making
      
      **Format each potential theme as:**
      **Theme [X]: "[Specific user tension or need in quotes]"**
      - **Evidence Pattern:** [What type of evidence supports this theme]
      - **User Impact:** [How this affects users' experience]
      - **Supporting Quote Examples:** [2-3 brief quote snippets]
      - **Distinctiveness:** [How this differs from other themes]
      
      Generate themes that capture real user tensions like:
      - "I don't know who to trust"
      - "This process feels endless"
      - "I'm worried I'll make a mistake"
      
      NOT generic categories like "communication issues" or "user experience problems"

  # Cluster quotes and evidence by identified themes
  - task_id: "quote_clustering"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Include complete, meaningful quotes that demonstrate the theme
      
      As an experienced qualitative researcher, cluster quotes and observations by the identified themes:
      
      **Identified Themes:**
      {{ai_generated.theme_identification}}
      
      **Full Input Data:**
      {{combined_file_content}}
      
      For each theme, find the best supporting quotes and evidence:
      
      1. **Select 3-5 strong quotes** that clearly demonstrate the theme
      2. **Include participant context** when available (P1, P3, etc.)
      3. **Ensure quote diversity** - different participants, different contexts
      4. **Maintain quote integrity** - use complete thoughts, not fragments
      5. **Show thematic coherence** - explain why these quotes cluster together
      
      **Format for each theme:**
      **Theme: "[Theme label from identification]"**
      
      **Supporting Quotes:**
      > "[Complete quote 1]" - [Participant context if available]
      > "[Complete quote 2]" - [Participant context if available]  
      > "[Complete quote 3]" - [Participant context if available]
      > "[Complete quote 4]" - [Participant context if available]
      
      **Clustering Rationale:** [2-3 sentences explaining why these quotes naturally group together and what shared meaning or tension they represent]
      
      **Additional Evidence:** [Any non-quote observations, behaviors, or patterns that support this theme]

  # Develop insights and emotional dimensions for each theme
  - task_id: "insight_generation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Make insights specific and actionable, not generic observations
      
      As an experienced qualitative researcher, develop insights and emotional dimensions for each theme:
      
      **Themes with Evidence:**
      {{ai_generated.quote_clustering}}
      
      **Study Context:** {{study_name}}
      **Focus Area:** {{focus_area}}
      
      For each theme, generate:
      
      1. **Key Insight:** One concise, declarative statement revealing user behavior, belief, or tension
      2. **Emotional Dimension:** Specific emotions users experience (frustration, anxiety, confidence, confusion, etc.)
      3. **Signal Strength:** How strong/frequent this pattern is in the data
      4. **User Impact:** How this theme affects users' ability to accomplish their goals
      
      **Format for each theme:**
      **Theme: "[Theme label]"**
      
      🔍 **Insight:** [One clear, specific insight about user behavior or beliefs - avoid generic statements]
      
      ❤️ **Emotional Dimension:** [Specific emotions with brief explanation of when/why users feel this way]
      
      📊 **Signal Strength:** [How often this appears: "Consistent across all participants" / "Mentioned by majority" / "Recurring pattern" / "Strong but localized"]
      
      🎯 **User Impact:** [Specific way this affects users' success, confidence, or experience]
      
      **Examples of good insights:**
      - "Users create mental shortcuts when official processes feel too complex"
      - "Veterans assume government websites will fail them based on past experiences"
      - "People abandon tasks when they can't predict how long they'll take"
      
      **NOT generic insights like:**
      - "Users want better communication"
      - "The interface needs improvement"

  # Generate actionable opportunities for each theme
  - task_id: "opportunity_generation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Make opportunities specific and actionable for design/product teams
      
      As an experienced UX researcher, generate actionable opportunities for each theme:
      
      **Themes with Insights:**
      {{ai_generated.insight_generation}}
      
      **Study Context:** {{study_name}}
      **Focus Area:** {{focus_area}}
      
      For each theme, generate:
      
      1. **Primary Opportunity:** One concrete, actionable response (product, content, policy, or design change)
      2. **Implementation Approach:** Specific steps teams could take
      3. **Success Metrics:** How to measure if the opportunity addresses the theme
      4. **Priority Level:** High/Medium/Low based on user impact and evidence strength
      
      **Format for each theme:**
      **Theme: "[Theme label]"**
      
      💡 **Primary Opportunity:** [Specific, actionable opportunity that directly addresses the user tension/need]
      
      🛠️ **Implementation Approach:** [2-3 specific steps teams could take to pursue this opportunity]
      
      📈 **Success Metrics:** [How to measure if this opportunity successfully addresses the theme]
      
      ⭐ **Priority Level:** [High/Medium/Low] - [Brief reasoning based on user impact and evidence strength]
      
      **Examples of good opportunities:**
      - "Add progress indicators showing exact steps remaining and estimated time for each"
      - "Create a 'confidence check' feature that previews what will happen before users submit"
      - "Develop contextual help that appears based on where users typically get stuck"
      
      **NOT vague opportunities like:**
      - "Improve communication"
      - "Make interface more user-friendly"
      - "Better user experience"

  # Assess confidence levels and identify follow-up needs
  - task_id: "confidence_assessment"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Be specific about confidence levels and their implications
      
      As an experienced qualitative researcher, assess confidence levels for each theme and identify follow-up needs:
      
      **Data Scope Analysis:** {{ai_generated.data_scope_analysis}}
      **Themes with Evidence:** {{ai_generated.quote_clustering}}
      **Selected Files:** {{selected_files}}
      
      For each theme, assess:
      
      1. **Theme Confidence:** How confident are we in this theme based on evidence quality and quantity?
      2. **Evidence Strength:** How strong is the supporting evidence?
      3. **Generalizability:** How well might this theme apply beyond the current data?
      4. **Follow-up Needs:** What additional research would strengthen confidence in this theme?
      
      **Format for each theme:**
      **Theme: "[Theme label]"**
      
      🎯 **Theme Confidence:** [High/Medium/Low] - [Specific reasoning based on evidence quality and file coverage]
      
      📊 **Evidence Strength:** [Strong/Moderate/Limited] - [Details about quote quality, participant diversity, pattern consistency]
      
      🌍 **Generalizability:** [High/Medium/Low] - [How well this might apply to broader user population]
      
      🔍 **Follow-up Needs:** [Specific research activities that would strengthen confidence: more interviews, quantitative validation, etc.]
      
      **Overall Analysis Confidence:** [High/Medium/Low] based on file selection completeness and evidence strength across all themes
      
      **Key Limitations:** [Any significant limitations from missing optimal files or data gaps that affect confidence]

  # Generate follow-up analysis recommendations
  - task_id: "follow_up_recommendations"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Provide specific, actionable next steps
      
      As an experienced UX researcher, recommend follow-up analysis based on the affinity mapping results:
      
      **Identified Themes:** {{ai_generated.insight_generation}}
      **Confidence Assessment:** {{ai_generated.confidence_assessment}}
      **Study Context:** {{study_name}}
      **File Coverage:** {{ai_generated.data_scope_analysis}}
      
      Based on the themes identified and file coverage analysis, recommend:
      
      1. **Immediate Next Analysis:** What analysis should the team run next to build on these themes?
      2. **Research Gaps:** What additional research would strengthen the findings?
      3. **Decision Support:** How can teams use these themes for immediate decisions?
      4. **Long-term Research:** What future research would be valuable?
      
      **Format:**
      **Immediate Next Steps (1-2 weeks):**
      - [Specific analysis type]: [Why this builds on current themes]
      - [Specific research activity]: [How this addresses identified gaps]
      
      **Short-term Research (1-2 months):**
      - [Research approach]: [What this would validate or explore further]
      - [Analysis method]: [How this complements current findings]
      
      **Decision Support:**
      - [Specific decisions teams can make now]: [Based on which themes]
      - [Areas needing more research]: [Before making major decisions]
      
      **File Enhancement Recommendations:**
      Based on missing optimal files: [Specific recommendations for improving future analysis]
      
      **Priority Ranking:**
      1. **High Priority:** [Most important next step]
      2. **Medium Priority:** [Valuable but not urgent]
      3. **Low Priority:** [Nice to have for comprehensive view]

# Auto-generated/computed variables (Enhanced)
auto_variables:
  - max_themes: |
      # AI determines optimal theme count from data scope analysis
      extract_theme_count(ai_generated.data_scope_analysis) || 3
  - session_count: |
      # AI estimates session count from data scope analysis
      extract_session_count(ai_generated.data_scope_analysis, selected_files) || "multiple sessions"
  - confidence_level: |
      # AI determines overall analysis confidence from confidence assessment
      extract_confidence_level(ai_generated.confidence_assessment) || "medium"
  - bias_risk_level: |
      # AI determines bias risk from bias detection analysis
      extract_bias_risk(ai_generated.bias_detection_analysis) || "low"
  - reliability_score: |
      # AI determines reliability from inter-rater assessment
      extract_reliability_score(ai_generated.reliability_assessment) || "medium"
  - current_date: |
      # Auto-generate current date for file naming
      new Date().toISOString().split('T')[0]
  - analysis_version: |
      # Generate version number for tracking
      generate_version_number(previous_analysis_id) || "v1.0"
  - github_file_link: |
      # Auto-generate based on study name and date
      generate_github_link(study_name, current_date) || null

# Output configuration
output_options:
  default_delivery: "slack_and_file"  # Post to Slack AND save to GitHub
  slack_format: "structured"          # Use the formatted output with sections
  path: "04-analysis/affinity-mapping/"
  filename: "{{study_folder}}_affinity_mapping_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "🧠 Affinity Mapping Results"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "💡 Generate Insight Cards"
      action: "run_insight_card"
    - text: "🎯 Jobs to be Done Analysis"
      action: "run_jobs_to_be_done"
    - text: "🔍 Usability Issues Analysis"
      action: "run_usability_issues_extractor"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"

