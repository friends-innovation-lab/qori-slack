id: affinity_mapping
name: run_affinity_mapping

label: 🧠 Affinity Mapping
version: "v1.5"

description: >
  Group qualitative quotes, notes, or observations into clearly labeled themes using AI.
  This method replaces manual affinity mapping tools (like Miro) with a faster, scalable, and shareable format.
  Designed to support synthesis across large datasets with clean Slack/GitHub export.

author: CivicMind R&D  
created: 2025-06-27  
last_updated: 2025-06-27

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

input_variables:
  - input_text           # Quotes, observations, or notes to group
  - max_themes           # Optional: Number of themes to return (default 3)
  - study_name           # Title of study
  - study_link           # Link to study folder or documentation
  - team_members         # Who to notify/tag
  - researcher_contact   # Lead researcher
  - study_channel        # Where to post results
  - session_count        # Number of sessions analyzed
  - current_date         # For file naming
  - github_file_link     # Link to saved file

# Output configuration
output_options:
  default_delivery: "slack_and_file"  # Post to Slack AND save to GitHub
  slack_format: "structured"          # Use the formatted output with sections
  file_location: "04-analysis/"
  file_name: "affinity_mapping_{{study_name_slug}}_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "🧠 Affinity Mapping Results"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "💡 Generate Insight Cards"
      action: "run_insight_card"
    - text: "🎯 Jobs to be Done Analysis"
      action: "run_jobs_to_be_done"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"

output_use: |
  CivicMind Affinity Mapping is specifically designed to accelerate qualitative synthesis without sacrificing rigor or transparency. By clearly showing thematic logic, emotional insights, and actionable opportunities, researchers can confidently adopt AI-driven analysis—moving quickly from raw data to informed, trusted, and actionable insights. 

  Use this method to:
    - Clearly justify and communicate AI-driven affinity mapping to stakeholders.
    - Visibly speed up your research synthesis workflow without losing depth or nuance.
    - Facilitate open discussion, continuous refinement, and researcher confidence in AI-supported insights.

output_notes: |
  This method returns up to 3 themes by default. Researchers may specify a higher number (e.g. max_themes: 5)
  if the data supports it. Avoid generic or vague labels. Only include a theme if it is distinct and well-supported.
  Think like a synthesis lead preparing a readout: each theme should be actionable, grounded in quotes, and clear to stakeholders.
  Use Slack formatting: bold section titles, blockquotes for quotes, spacing between blocks, and horizontal rules for clarity.

persona_hinting: |
  Common personas include:
    - First-time applicant
    - Veteran seeking housing
    - Caregiver supporting an elder
    - Small business owner
    - Young adult navigating benefits

prompt: |
  You are a senior qualitative researcher and synthesis facilitator experienced in affinity mapping. Your job is to cluster quotes, notes, or field observations into meaningful themes—as if physically grouping sticky notes on a wall.

  Each theme must:
    - Have a clear, plain-language label capturing the central tension, need, or idea from the quotes.
    - Include at least 3 supporting quotes clearly demonstrating thematic coherence.
    - Briefly explain why these quotes naturally cluster together, explicitly highlighting shared meanings or tensions.
    - Provide one 🧠 *Insight*: a short, declarative summary revealing user behavior, beliefs, or tensions.
    - Explicitly indicate the ❤️ *Emotional Dimension* (e.g., frustration, confusion, confidence) clearly represented by the quotes, if applicable.
    - Clearly indicate 🔥 *Signal* (strength or frequency of evidence for this theme, e.g., "Mentioned in multiple interviews," "Consistent across user groups").
    - Optionally suggest one ✅ *Opportunity*: a concrete, actionable response for product, content, policy, or further research.
    - Optionally provide *Tags* (e.g., trust, transparency, simplicity) for easier future retrieval.
    Additionally:
    - Present themes in a manner that encourages team discussion, highlighting any ambiguities or areas for further exploration.
    - Use structured formatting to visually represent relationships between themes and sub-themes.
    - Be open to revisiting and refining themes as new data emerges, supporting an iterative analysis process.

  Return up to {{max_themes | default(3)}} clearly differentiated themes. Include fewer themes if data does not support clear distinctions. Clearly note if a theme has complexity or nuance.

  Avoid generic labels (e.g., "communication"). Favor labels that express real, specific user tensions (e.g., "I don't know who to trust," "This feels endless"). Write clearly, avoiding jargon, passive voice, or overly academic language. Use Slack markdown formatting clearly for team readability.

  **Example Theme:**

  🏷️ **THEME: "Everything feels uncertain"**

  > "I'm not even sure if my paperwork was received."
  > "Nobody can tell me how long this will actually take."
  > "Every person I ask gives me a different answer."

  🧠 *Insight:* Users experience frustration and anxiety due to inconsistent and unclear timelines for benefit approval.

  ❤️ *Emotional Dimension:* Anxiety and frustration  
  🔥 *Signal:* Consistent across interviews with first-time applicants  
  ✅ *Opportunity:* Provide clear, standardized communication and real-time status updates to users awaiting benefit decisions.  
  *Tags:* clarity, transparency, anxiety reduction

