id: affinity_mapping
name: run_affinity_mapping

label: 🧠 Affinity Mapping
version: "v1.5"

description: >
  Group qualitative quotes, notes, or observations into clearly labeled themes using AI.
  This method replaces manual affinity mapping tools (like Miro) with a faster, scalable, and shareable format.
  Designed to support synthesis across large datasets with clean Slack/GitHub export.

author: CivicMind R&D  
created: 2025-06-27  
last_updated: 2025-06-27

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

input_variables:
  - input_text           # Quotes, observations, or notes to group
  - max_themes           # Optional: Number of themes to return (default 5)
  - study_name           # Optional: Title of study or Slack post context
  - study_link           # Optional: Link to supporting doc, repo, Notion, etc.

output_use: |
  Use this when you want to quickly turn raw qualitative input into structured themes for synthesis,
  reporting, or product alignment. Output is formatted for Slack and exportable to GitHub or Notion.

output_notes: |
  This method returns 1-5 themes by default. Researchers may specify a smaller number (e.g. max_themes: 3)
  to focus or guide the level of compression. Avoid generic or vague labels. Think like a synthesis lead preparing a readout.
  Each theme should include quotes, a plain-language insight, and — if appropriate — a policy, design, or research opportunity.
  Use Slack formatting: bold section titles, blockquotes for quotes, spacing between blocks, and horizontal rules for clarity.

persona_hinting: |
  Common personas include:
    - First-time applicant
    - Veteran seeking housing
    - Caregiver supporting an elder
    - Small business owner
    - Young adult navigating benefits

# Output schema:
# - Theme label: string
# - Quotes: [string[]]
# - Insight: string
# - Opportunity: optional string

output_format: |
  📌 *AFFINITY MAPPING: {{study_name | default("SUMMARY")}}*
  🔗 *Study Link:* {{study_link | default("No link provided")}}

  👋 Hi team! Here are early themes emerging from this round of research.  
  Let’s use this thread to turn insight into action — reply below with your reactions, ideas, or product implications.

  
  ---

  🏷️ *THEME 1: [Label]*

  > “Quote 1”  
  > “Quote 2”  
  > “Quote 3”

  🧠 *Insight:* [What this pattern reveals about user behavior, belief, or tension]  
  ✅ *Opportunity:* [What the team could explore, build, or fix]

  
  ---

  🏷️ *THEME 2: [Label]*

  > “Quote 1”  
  > “Quote 2”  
  > “Quote 3”

  🧠 *Insight:* ...  
  ✅ *Opportunity:* ...

  
  ---

  🏷️ *THEME 3: [Label]*

  > “Quote 1”  
  > “Quote 2”  
  > “Quote 3”

  🧠 *Insight:* ...  
  ✅ *Opportunity:* ...

  
  ---

  🏷️ *THEME 4: [Label]*

  > “Quote 1”  
  > “Quote 2”  
  > “Quote 3”

  🧠 *Insight:* ...  
  ✅ *Opportunity:* ...

  
  ---

  🏷️ *THEME 5: [Label]*

  > “Quote 1”  
  > “Quote 2”  
  > “Quote 3”

  🧠 *Insight:* ...  
  ✅ *Opportunity:* ...

prompt: |
  You are a senior qualitative researcher and synthesis facilitator. Your job is to group quotes, notes, or field observations 
  into a small number of clearly labeled themes using affinity mapping principles.

  These themes will be used by research and product teams to identify patterns, tensions, and opportunities across multiple voices.

  Based on the input provided, return up to {{max_themes | default(5)}} themes.

  Each theme must:
    - Have a clear, plain-language label that describes the underlying tension, pattern, or idea
    - Include at least 3 quotes or notes that meaningfully support that theme
    - Include one *Insight*: a short, declarative sentence that summarizes what this theme tells us
    - Optionally include one *Opportunity*: a way the team might respond (design, content, policy, or research)

  Avoid generic themes like “communication” or “helpfulness.” Use labels that reflect real user concerns (e.g., “I’m not sure who to trust” or “everything takes too long”).

  Write at a 10th-grade reading level. Use analogies or metaphors if helpful to describe patterns. Avoid jargon, academic language, and passive voice.

  Format the output using Slack markdown:
    - Bold theme titles
    - Use `>` blockquotes for each quote
    - Include *Insight* and *Opportunity* as bold bullet labels
    - Add horizontal rules `---` between themes
    - Space content for readability
