id: affinity_mapping
name: run_affinity_mapping
label: "🧠 Affinity Mapping"
version: "v3.0"

description: >
  Group qualitative quotes and observations into clearly labeled themes using AI.
  Creates visual text-based affinity clusters from coded session summaries.
  Strict grounding to source data - no hallucination.

author: Qori R&D  
created: 2025-06-27  
last_updated: 2025-01-07

input_type: slack_modal_form
input_processing: auto_file_discovery

llm_config:
  model: "claude-sonnet-4"
  temperature: 0.3
  max_tokens: 6000

system_limits:
  max_total_tokens: 50000
  min_content_threshold: 500
  max_file_size: 100000
  supported_formats: [".md", ".txt"]
  max_files_per_analysis: 20

privacy_controls:
  enable_pii_detection: true
  pii_detection_patterns:
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
    phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    ssn: '\b\d{3}-\d{2}-\d{4}\b'
  masking_strategy:
    email: "[EMAIL]"
    phone: "[PHONE]" 
    ssn: "[SSN]"

input_variables:
  - selected_study              # Study name from dropdown (REQUIRED)
  - include_research_plan       # Boolean from checkbox (OPTIONAL)
  - include_participant_notes   # Boolean from checkbox (OPTIONAL)  
  - include_raw_transcripts     # Boolean from checkbox (OPTIONAL)
  
  # Auto-generated during processing
  - discovered_files            # Files found by auto-discovery (GENERATED)
  - combined_file_content       # Auto-combined content (GENERATED)
  - quality_assessment          # Initial quality score (GENERATED)

# Study metadata mapping
study_metadata:
  "VA Housing Application Usability Study":
    folder: "va-housing-usability-2025"
    researcher: "jordan.researcher"
    channel: "#research-housing-app"
    focus_area: "housing application usability"
    
  "Benefits Portal Navigation Research":
    folder: "benefits-portal-nav-2025"
    researcher: "alex.ux"
    channel: "#research-benefits"
    focus_area: "benefits portal navigation"
    
  "Veteran Onboarding Experience Study":
    folder: "veteran-onboarding-2025"
    researcher: "casey.research"
    channel: "#research-onboarding"
    focus_area: "veteran onboarding experience"

# File discovery system
auto_file_discovery:
  core_files:
    session_summaries:
      file_patterns: ["*session_summary*", "*summary*", "*session*"]
      search_paths: ["01-sessions/", "sessions/", "summaries/"]
      priority: "required"
      confidence_weight: 50
      
    transcripts:
      file_patterns: ["*transcript*", "*interview*", "*recording*"]
      search_paths: ["01-sessions/", "transcripts/", "interviews/"]
      priority: "high"
      confidence_weight: 30
  
  enhancement_files:
    research_plan:
      enabled_when: "{{include_research_plan}} == true"
      file_patterns: ["*research_plan*", "*study_plan*", "*methodology*"]
      search_paths: ["00-planning/", "planning/", "research/"]
      confidence_boost: 8
      
    participant_notes:
      enabled_when: "{{include_participant_notes}} == true"
      file_patterns: ["*participant*", "*notes*", "*observations*"]
      search_paths: ["02-participants/", "participants/", "notes/"]
      confidence_boost: 5
      
    raw_transcripts:
      enabled_when: "{{include_raw_transcripts}} == true"
      file_patterns: ["*raw*", "*unprocessed*", "*recording*"]
      search_paths: ["01-sessions/raw/", "raw/", "recordings/"]
      confidence_boost: 3

ai_generation_tasks:
  - task_id: "affinity_mapping_complete"
    prompt: |
      ============================================================
      🚨 CRITICAL GROUNDING RULES - READ FIRST 🚨
      ============================================================
      
      You are creating an affinity map from REAL research data.
      
      ABSOLUTE REQUIREMENTS:
      1. ONLY use quotes, pain points, insights, and observations from the source data below
      2. NEVER invent quotes, participants, or findings
      3. NEVER mention other apps, products, or studies not in the source data
      4. If the source data is empty or insufficient, say so - do not fabricate content
      5. Every theme must have REAL quotes from the source data
      6. Every participant ID (PT001, PT002, etc.) must exist in the source data
      
      If you cannot find sufficient data to create meaningful themes, output:
      "⚠️ Insufficient data for affinity mapping. Source files may be empty or not loaded."
      
      DO NOT proceed with generic themes if source data is missing.
      
      ============================================================
      SOURCE DATA
      ============================================================
      
      **Study:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      **Files Discovered:** {{discovered_files}}
      
      **Research Data:**
      
      {{combined_file_content}}
      
      ============================================================
      AFFINITY MAPPING INSTRUCTIONS
      ============================================================
      
      STEP 1: EXTRACT ALL QUOTES AND FINDINGS
      Read through ALL source data and extract:
      - Direct participant quotes (with participant ID)
      - Pain points (with severity)
      - Opportunities identified
      - Insights about user behavior
      - Positive feedback
      - Emotional moments
      
      STEP 2: CLUSTER BY SIMILARITY
      Group related items based on:
      - Similar problems or frustrations
      - Related user needs
      - Connected behaviors or mental models
      - Shared emotional experiences
      
      STEP 3: NAME EACH CLUSTER
      Create theme names that:
      - Are specific to THIS study (not generic)
      - Describe the actual user tension or need
      - Use participant language where possible
      
      ============================================================
      OUTPUT FORMAT - OPTION D: INDENTED CARDS
      ============================================================
      
      # 🧠 Affinity Map: {{selected_study}}
      
      **Analysis Date:** {{current_date}}
      **Focus Area:** {{focus_area}}
      
      ---
      
      ## 📊 Data Summary
      
      | Source | Count |
      |--------|-------|
      | Pain Points | [count from source] |
      | Opportunities | [count from source] |
      | Insights | [count from source] |
      | Quotes | [count from source] |
      
      ---
      
      ## 🎯 Theme 1: [Specific Theme Name from Data]
      
      **The Pattern:** [1-2 sentence summary of what unites these findings]
      
      ---
      
      **💬 Quote**
      > "[Exact quote from participant]"
      > 
      > *— PT001*
      
      ---
      
      **💬 Quote**
      > "[Another related quote]"
      > 
      > *— PT002*
      
      ---
      
      **🔴 Pain Point: [Title from source]**
      - Severity: [from source]
      - Participants: [who experienced this]
      - Context: [brief description]
      
      ---
      
      **💡 Insight: [Title from source]**
      - [Description of the insight]
      - Type: [insight type]
      - Source: [participant]
      
      ---
      
      **Evidence Strength:** [X] items from [Y] participants
      
      **Strategic Implication:** [What this means for product decisions]
      
      ---
      
      ## 🎯 Theme 2: [Specific Theme Name from Data]
      
      **The Pattern:** [1-2 sentence summary]
      
      ---
      
      [Same card format - 3-6 items with quotes, pain points, insights]
      
      ---
      
      ## 🎯 Theme 3: [Specific Theme Name from Data]
      
      [Same format]
      
      ---
      
      ## 🟢 What's Working Well
      
      **The Pattern:** [What users found successful or satisfying]
      
      ---
      
      **✅ [Positive Finding Title]**
      > "[Supporting quote]"
      > 
      > *— PT00X*
      
      ---
      
      **✅ [Another Positive Finding]**
      > "[Supporting quote]"
      > 
      > *— PT00X*
      
      ---
      
      ## 📈 Theme Strength Analysis
      
      | Theme | Evidence Count | Participants | Priority |
      |-------|---------------|--------------|----------|
      | [Theme 1 name] | [X items] | [PT001, PT002...] | 🔴 Critical |
      | [Theme 2 name] | [X items] | [PT001, PT003...] | 🟡 High |
      | [Theme 3 name] | [X items] | [PT002...] | 🟡 Medium |
      
      ---
      
      ## 🚀 Recommended Actions
      
      Based on the affinity clusters above:
      
      ---
      
      **1. [Action Title]** — Addresses: [theme name]
      
      - **What:** [specific action]
      - **Why:** [evidence from clustering]
      - **Priority:** [High/Medium/Low]
      
      ---
      
      **2. [Action Title]** — Addresses: [theme name]
      
      - **What:** [specific action]
      - **Why:** [evidence from clustering]
      - **Priority:** [High/Medium/Low]
      
      ---
      
      **3. [Action Title]** — Addresses: [theme name]
      
      - **What:** [specific action]
      - **Why:** [evidence from clustering]
      - **Priority:** [High/Medium/Low]
      
      ---
      
      ## 🔗 Cross-Theme Connections
      
      [Describe how themes relate to each other - are some pain points connected? Do insights explain pain points?]
      
      ---
      
      ## ✅ Validation Checklist
      
      - All quotes are verbatim from source data: [Yes/No]
      - All participant IDs exist in source: [Yes/No]
      - All pain points traced to source: [Yes/No]
      - No fabricated themes or findings: [Yes/No]
      
      ---
      
      *Generated by Qori Research Synthesis • {{current_date}}*
      
      ============================================================
      QUALITY REQUIREMENTS
      ============================================================
      
      Before outputting, verify:
      - Every quote appears EXACTLY in the source data
      - Every participant ID (PT001, etc.) exists in source
      - Theme names are specific to THIS study, not generic
      - No mention of unrelated apps/products/studies
      - Evidence counts are accurate
      - If source data is empty, output the insufficient data message instead
      
      WRONG theme names (too generic):
      - "Simplify Complex Processes"
      - "Personalize User Experiences"
      - "Enhance Accessibility"
      
      RIGHT theme names (specific to data):
      - "Unlabeled Buttons Block Screen Reader Users"
      - "Hidden Actions Require Exhaustive Search"
      - "Appointment Scheduling Path Unclear"
      
      Return the complete affinity map. No preamble.

output_template: |
  {{ai_generated.affinity_mapping_complete}}

output_options:
  default_delivery: "slack_and_file"
  slack_format: "affinity_focused"
  file_format: "github_markdown"
  path: "04-analysis/affinity-mapping/"
  filename: "{{study_folder}}_affinity_mapping_{{current_date}}.md"
  
  delivery:
    github:
      enabled: true
      commit_message: "🧠 Affinity mapping - {{selected_study}} - {{current_date}}"
      
    slack:
      enabled: true
      message_preview: |
        🧠 **Affinity Mapping Complete**
        
        **Study:** {{selected_study}}
        **Focus Area:** {{focus_area}}
        
        Themes identified - see full map below.

# Auto-generated variables
auto_variables:
  - max_themes: extract_theme_count(ai_generated.affinity_mapping_complete) || 3
  - current_date: new Date().toISOString().split('T')[0]
  - analysis_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(selected_study, current_date)

quality_assurance:
  require_source_grounding: true
  require_verbatim_quotes: true
  require_participant_ids: true
  reject_generic_themes: true
  validate_evidence_counts: true
  check_for_hallucination: true
  
  hallucination_indicators:
    flag_if_mentions:
      - "mobile banking"
      - "fitness app"
      - "recipe"
      - "e-commerce"
      - "social media platform"
    unless_in_source: true

notify:
  - role: team
    action: "Affinity mapping completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} completed affinity mapping for {{selected_study}}. {{max_themes}} themes identified."

notes: |
  v3.0 Changes:
  - Added critical grounding rules at top of prompt
  - Added "insufficient data" fallback if source is empty
  - Changed to Option D format (Indented Cards with dividers) for GitHub rendering
  - Required specific theme names (not generic consultant-speak)
  - Added evidence strength tracking per theme
  - Added cross-theme connections section
  - Added validation checklist
  - Added hallucination detection in quality_assurance
  - Single task instead of chained tasks (prevents cascade hallucination)
  - Added "What's Working Well" section for positive findings
  - Added Theme Strength Analysis table
  - Preserved original variables from v2.1
