  - role: researcher
    action: "Analysis saved"
    slack_tag: "{{researcher_contact}}"
    message: "Your affinity mapping results have been posted to {{study_channel}} and saved to GitHub. Analysis confidence: {{confidence_level}} based on file selection quality."

output_use: |
  Direct Affinity Mapping allows researchers to select their own research files and generate thematic analysis 
  with comprehensive quality controls, privacy protection, and performance optimization. The system validates 
  file selection against required and optimal data specifications, automatically detects and masks PII, 
  tracks data lineage for all quotes, monitors performance metrics, and provides quality assessment and 
  recommendations for improving analysis confidence. Users benefit from transparent file coverage analysis, 
  direct control over data inputs, complete source attribution, privacy compliance, and actionable insights 
  about how their file selection affects analysis quality.

  Use this method to:
    - Generate thematic analysis directly from selected research files with full privacy protection
    - Track exact sources and attribution for all quotes and evidence used
    - Understand how file selection impacts analysis confidence and reliability
    - Get specific recommendations for improving data coverage and research quality
    - Maintain full control over what data feeds into analysis with PII safeguards
    - Receive actionable insights and opportunities from themes with performance analytics
    - Ensure research meets professional standards with bias detection and reliability assessment
    - Maintain privacy compliance with automated PII detection and masking
    - Track analysis performance and system optimization metrics

output_notes: |
  This method returns up to {{max_themes}} themes based on data analysis and file coverage quality.
  Analysis confidence level: {{confidence_level}} based on selected file completeness.
  Session count ({{session_count}}) estimated from input patterns and file content.
  File coverage assessment guides confidence levels and recommendations.

persona_hinting: |
  Common personas include:
    - First-time applicant
    - Veteran seeking housing
    - Caregiver supporting an elder
    - Small business owner
    - Young adult navigating benefits
