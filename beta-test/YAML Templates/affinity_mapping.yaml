id: affinity_mapping
name: run_affinity_mapping

label: 🧠 Affinity Mapping
version: "v2.1"

description: >
  Group qualitative quotes, notes, or observations into clearly labeled themes using AI.
  Automatically discovers and analyzes research files from selected study folder with 
  optional quality improvements. Uses inductive clustering methodology with Senior UX Strategy perspective.

author: Qori R&D  
created: 2025-06-27  
last_updated: 2025-09-10

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.4
  max_tokens: 4000

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 1000
  max_file_size: 100000
  supported_formats: [".md", ".txt", ".csv", ".json"]
  max_files_per_analysis: 20

# Privacy controls
privacy_controls:
  enable_pii_detection: true
  pii_detection_patterns:
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
    phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    ssn: '\b\d{3}-\d{2}-\d{4}\b'
  masking_strategy:
    email: "[EMAIL_REDACTED]"
    phone: "[PHONE_REDACTED]" 
    ssn: "[SSN_REDACTED]"

# Slack modal input variables
input_variables:
  - selected_study              # Study name from dropdown (REQUIRED)
  - include_research_plan       # Boolean from checkbox (OPTIONAL)
  - include_participant_notes   # Boolean from checkbox (OPTIONAL)  
  - include_raw_transcripts     # Boolean from checkbox (OPTIONAL)
  
  # Auto-generated during processing
  - discovered_files            # Files found by auto-discovery (GENERATED)
  - combined_file_content       # Auto-combined content (GENERATED)
  - quality_assessment          # Initial quality score (GENERATED)

# Study metadata mapping
study_metadata:
  "VA Housing Application Usability Study":
    folder: "va-housing-usability-2025"
    researcher: "jordan.researcher"
    channel: "#research-housing-app"
    focus_area: "housing application usability"
    
  "Benefits Portal Navigation Research":
    folder: "benefits-portal-nav-2025"
    researcher: "alex.ux"
    channel: "#research-benefits"
    focus_area: "benefits portal navigation"
    
  "Veteran Onboarding Experience Study":
    folder: "veteran-onboarding-2025"
    researcher: "casey.research"
    channel: "#research-onboarding"
    focus_area: "veteran onboarding experience"

# File discovery system
auto_file_discovery:
  core_files:
    session_summaries:
      file_patterns: ["*session_summary*", "*summary*", "*session*"]
      search_paths: ["01-sessions/", "sessions/", "summaries/"]
      priority: "required"
      confidence_weight: 50
      
    transcripts:
      file_patterns: ["*transcript*", "*interview*", "*recording*"]
      search_paths: ["01-sessions/", "transcripts/", "interviews/"]
      priority: "high"
      confidence_weight: 30
  
  enhancement_files:
    research_plan:
      enabled_when: "{{include_research_plan}} == true"
      file_patterns: ["*research_plan*", "*study_plan*", "*methodology*"]
      search_paths: ["00-planning/", "planning/", "research/"]
      confidence_boost: 8
      
    participant_notes:
      enabled_when: "{{include_participant_notes}} == true"
      file_patterns: ["*participant*", "*notes*", "*observations*"]
      search_paths: ["02-participants/", "participants/", "notes/"]
      confidence_boost: 5
      
    raw_transcripts:
      enabled_when: "{{include_raw_transcripts}} == true"
      file_patterns: ["*raw*", "*unprocessed*", "*recording*"]
      search_paths: ["01-sessions/raw/", "raw/", "recordings/"]
      confidence_boost: 3

# AI generation tasks
ai_generation_tasks:
  # File discovery and quality assessment
  - task_id: "file_discovery_summary"
    prompt: |
      As a research operations specialist, analyze the discovered files and quality:
      
      **Selected Study:** {{selected_study}}
      **Enhancement Options Selected:**
      - Research plan: {{include_research_plan}}
      - Participant notes: {{include_participant_notes}}
      - Raw transcripts: {{include_raw_transcripts}}
      
      **Discovered Files:** {{discovered_files}}
      **Total Content:** [Analyze character/word count of combined_file_content]
      
      Report on file coverage, content quality, enhancement impact, and analysis confidence.

  # Core affinity mapping process
  - task_id: "affinity_clustering"
    prompt: |
      As a Senior UX Strategist conducting affinity mapping, extract and cluster insights from this research data:
      
      **Research Data:** {{combined_file_content}}
      **Study Context:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      **Business Context:** This analysis will inform product decisions and strategic priorities
      
      **Affinity Mapping Process:**
      
      **Step 1: Extract Individual Insights**
      Read through all data and extract discrete observations, quotes, behaviors, and pain points. Focus on:
      - Direct user quotes that reveal needs, frustrations, or motivations
      - Observed behaviors and interaction patterns
      - Emotional reactions and sentiment
      - Functional needs and task breakdowns
      - System/process gaps and opportunities
      
      **Step 2: Look for Natural Groupings**
      Group related insights based on:
      - Similar user needs or goals
      - Common emotional experiences
      - Related functional problems
      - Shared behavioral patterns
      - Connected system touchpoints
      
      **Step 3: Identify Strategic Patterns**
      Focus on patterns that reveal:
      - Unmet user needs with business impact
      - Emotional barriers to adoption or success
      - Process inefficiencies affecting multiple users
      - Opportunities for competitive advantage
      - Systemic issues requiring strategic response
      
      **Output Format:**
      
      **EXTRACTED INSIGHTS** (30-50 individual items)
      
      **User Quotes & Direct Feedback:**
      • "Quote about specific need or frustration" - P1 (context)
      • "Quote about emotional reaction or concern" - P3 (context)
      • "Quote about desired outcome or expectation" - P2 (context)
      
      **Observed Behaviors:**
      • Specific behavior pattern observed - Context/frequency
      • User interaction or workaround - Context/impact
      
      **Pain Points & Friction:**
      • Specific friction point - Where it occurs/impact
      • System limitation or gap - User effect
      
      **Needs & Motivations:**
      • Underlying need expressed - How it manifests
      • Goal or desired outcome - Current barriers
      
      ---
      
      **NATURAL CLUSTERS**
      
      **Cluster A: [Descriptive Label]**
      ▸ "Direct quote supporting this cluster" - P1
      ▸ "Related quote showing same pattern" - P3
      ▸ Observed behavior: [Specific behavior] - Multiple participants
      ▸ "Another supporting quote" - P2
      ▸ System gap: [Specific gap] - Affects workflow
      
      **Cluster Connection:** [What unites these insights - the underlying user need, emotional experience, or systemic issue]
      **Strategic Implication:** [Why this matters for product/business decisions]
      
      **Cluster B: [Descriptive Label]**
      [Continue same format...]
      
      ---
      
      **AFFINITY MAPPING SUMMARY**
      
      **Clustering Approach:** [How clusters naturally emerged - inductive process description]
      **Pattern Strength:** [How consistently patterns appeared across participants]
      **Strategic Focus Areas:** [Which clusters represent highest-impact opportunities]
      **Cross-Cluster Connections:** [How different clusters relate or reinforce each other]

  # Convert clusters to strategic themes
  - task_id: "theme_identification"
    prompt: |
      As a Senior UX Strategist, convert affinity clusters into strategic theme labels:
      
      **Affinity Clusters:** {{ai_generated.affinity_clustering}}
      **Study Context:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      **Strategic Objective:** Transform clusters into actionable themes that inform product decisions
      
      For each cluster, create a theme that:
      1. Captures the core user tension or need (not just problems)
      2. Suggests strategic direction or opportunity
      3. Connects to business outcomes and user value
      4. Uses language that stakeholders can act upon
      
      **Format each theme as:**
      **Theme [X]: "[Specific user tension or strategic need]"**
      - **Strategic Insight:** [What this reveals about user strategy or business opportunity]
      - **User Impact:** [How this affects users' success and satisfaction]
      - **Business Implication:** [Why this matters for product/business decisions]
      - **Evidence Strength:** [How strongly this pattern appears in the data]

  # Map themes back to evidence
  - task_id: "quote_clustering"
    prompt: |
      As a Senior UX Strategist, map themes back to their strongest supporting evidence:
      
      **Identified Themes:** {{ai_generated.theme_identification}}
      **Original Affinity Clusters:** {{ai_generated.affinity_clustering}}
      
      For each theme, select the strongest supporting evidence from the original clusters:
      
      1. **Choose 4-6 most compelling pieces of evidence** per theme
      2. **Prioritize direct user quotes** over researcher observations
      3. **Include participant context** when available (P1, P3, etc.)
      4. **Show evidence diversity** - different participants, different contexts
      5. **Maintain quote integrity** - use complete thoughts, not fragments
      6. **Demonstrate theme coherence** - show how evidence naturally supports the theme

  # Generate strategic insights
  - task_id: "insight_generation"
    prompt: |
      As a Senior UX Strategist, develop strategic insights and emotional dimensions for each theme:
      
      **Themes with Evidence:** {{ai_generated.quote_clustering}}
      **Study Context:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      
      For each theme, generate:
      1. **Key Strategic Insight:** One concise statement revealing user behavior and business opportunity
      2. **Emotional Dimension:** Specific emotions users experience and why
      3. **Business Impact:** How this theme affects business outcomes
      4. **User Success Factor:** How this theme affects users' ability to accomplish their goals

  # Generate actionable opportunities
  - task_id: "opportunity_generation"
    prompt: |
      As a Senior UX Strategist, generate actionable opportunities for each theme:
      
      **Themes with Insights:** {{ai_generated.insight_generation}}
      **Study Context:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      
      For each theme, generate:
      1. **Primary Opportunity:** One concrete, actionable response that addresses the user tension
      2. **Implementation Approach:** Specific steps teams could take
      3. **Success Metrics:** How to measure if the opportunity addresses the theme
      4. **Strategic Priority:** High/Medium/Low based on user impact and business value

# Processing workflow
processing_workflow:
  1. validate_slack_modal_inputs
  2. discover_files_from_study_selection
  3. calculate_initial_quality_assessment
  4. validate_discovered_files
  5. combine_selected_files_with_truncation
  6. execute_file_discovery_summary
  7. execute_affinity_clustering
  8. execute_theme_identification
  9. execute_quote_clustering
  10. execute_insight_generation
  11. execute_opportunity_generation
  12. format_slack_output
  13. format_github_output
  14. save_to_analysis_folder
  15. send_team_notifications

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "affinity_focused"
  file_format: "github_markdown"
  path: "04-analysis/affinity-mapping/"
  filename: "{{study_folder}}_affinity_mapping_{{current_date}}.md"

# Slack output template
output_template: |
  🧠 **Affinity Mapping Complete**

  **Study:** {{selected_study}}
  **Analysis:** {{max_themes}} themes identified from {{ai_generated.file_discovery_summary.participant_count}} participants

  ---

  ## **Key Themes**

  {{ai_generated.theme_identification}}

  ---

  ## **Strategic Insights**

  {{ai_generated.insight_generation}}

  ---

  ## **Opportunities**

  {{ai_generated.opportunity_generation}}

  ---

  **What do you think?** Reply in thread:
  • Which themes feel most actionable?
  • Any themes that need more investigation?  
  • Ready to move forward with the recommended opportunities?

  📋 [View detailed report with evidence]({{github_file_link}})

# GitHub markdown file template
github_file_template: |
  # 🧠 Affinity Mapping Analysis Report
  
  ---
  
  ## 📋 **Study Overview**
  
  **Study:** {{selected_study}}  
  **Analysis Date:** {{current_date}}  
  **Researcher:** {{researcher_contact}}  
  **Focus Area:** {{focus_area}}  
  **Analysis Version:** {{analysis_version}}
  
  ---
  
  ## 📊 **Data Quality Assessment**
  
  {{ai_generated.file_discovery_summary}}
  
  ---
  
  ## 🔍 **Affinity Mapping Process**
  
  {{ai_generated.affinity_clustering}}
  
  **Methodology:** Inductive clustering approach - patterns emerged naturally from data rather than predetermined categories.
  
  ---
  
  ## 🎯 **Key Themes Identified**
  
  {{ai_generated.theme_identification}}
  
  ---
  
  ## 💬 **Supporting Evidence**
  
  {{ai_generated.quote_clustering}}
  
  ---
  
  ## 💡 **Strategic Insights & Emotional Dimensions**
  
  {{ai_generated.insight_generation}}
  
  ---
  
  ## 🚀 **Actionable Opportunities**
  
  {{ai_generated.opportunity_generation}}
  
  ---
  
  ## 📚 **Methodology Notes**
  
  **Analysis Approach:** This affinity mapping analysis used an inductive clustering methodology where individual observations and quotes were first extracted from research data, then naturally grouped based on similarity before theme identification. This bottom-up approach ensures themes emerge from data patterns rather than researcher assumptions.
  
  **Quality Controls:**
  - ✅ Bias detection analysis performed
  - ✅ Source attribution maintained for all quotes
  - ✅ Privacy compliance verified
  
  ---
  
  ## 📞 **Contact & Follow-up**
  
