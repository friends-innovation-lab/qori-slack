  - [GitHub Issues](https://github.com/department-of-veterans-affairs/va.gov-team/issues)

  ---

  ## 🏷️ Tags

  `va`, `{{methodology_type | lower | replace(" ", "-")}}`, `research-readout`, `{{product_area | lower | replace(" ", "-")}}`, `qori`, `{{file_quality_score}}-quality`

  ---

  *Questions about these findings?* Reply in thread or contact {{researcher_contact}} for detailed discussion.

  *🤖 AI-Generated Analysis | Files: {{data_sources}} | Quality: {{file_quality_score}} | Router: {{router_version}} | Analysis ID: {{analysis_id}}*

# Updated prompt to use AI-generated content
prompt: |
  You are a senior UX researcher creating a comprehensive VA-compliant research readout for formal documentation and stakeholder review.

  ANALYSIS CONTEXT:
  - Study: {{study_name}}
  - Methodology: {{methodology_type}} (AI-extracted from analysis)
  - Participants: {{participant_count}} (AI-identified from data)
  - Findings: {{finding_count}} (AI-determined from complexity)
  - Product area: {{product_area}} (AI-identified from context)

  The AI analysis tasks have already extracted:
  - Study context and methodology details
  - Participant overview and demographics
  - Key insights with supporting evidence
  - Detailed findings with quotes and recommendations
  - Summary table with severity and frequency
  - Actionable next steps with timelines

  Your role is to ensure the AI-generated content is properly formatted, flows logically, and meets VA research standards for formal documentation and stakeholder review.

  Focus on creating professional documentation that enables stakeholders to understand research outcomes and make informed decisions about next steps.

notify:
  - role: research_team
    action: "AI-enhanced research readout completed"
    channel: "{{study_channel}}"
    message: "📊 Research readout for {{study_name}} complete. {{finding_count}} key findings with AI-synthesized insights ready for review."
  - role: researcher
    action: "Readout delivered"
    slack_tag: "{{researcher_contact}}"
    message: "Your AI-enhanced research readout has been posted to {{study_channel}} and saved to GitHub for stakeholder review."
