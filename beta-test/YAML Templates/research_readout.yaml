id: research_readout
name: run_research_readout
label: "📊 Research Readout"
version: v5.0
description: |
  Generate comprehensive, stakeholder-ready research readouts from session summaries 
  and synthesis artifacts. Features professional GitHub styling, industry-standard 
  research documentation structure, and actionable recommendations framework.
  
  v5.0 Changes:
  - Professional GitHub-native styling with centered headers
  - Industry-standard research report structure (NNG, IDEO, Portigal)
  - Enhanced evidence presentation with severity indicators
  - Confidence and validity framework
  - Executive-friendly formatting with progressive disclosure
  - Improved visual hierarchy for stakeholder scanning

author: Qori R&D
created: 2025-06-26
last_updated: 2026-01-27

# ============================================================
# BACKEND DATA REQUIREMENTS (for Tanzeel/Abdul)
# ============================================================
# 
# This workflow requires actual file contents to be loaded into variables.
# Without this data, the AI will output "Insufficient data" (correct behavior).
#
# REQUIRED DATA FLOW:
#
# 1. Session Summaries → {{input_text}} or {{research_readout_data}}
#    - Location: 03-fieldwork/session-summaries/
#    - Files: *session_summary*.md (all of them, concatenated)
#    - Example: PT001_session_summary.md + PT002_session_summary.md + PT003_session_summary.md
#
# 2. Research Plan → included in {{input_text}} or {{research_readout_data}}
#    - Location: 00-planning/research_plan.md
#    - Contains: methodology, goals, research questions
#
# OPTIONAL (enhances quality):
# 3. Affinity Map → append to {{input_text}}
#    - Location: 04-analysis/affinity-mapping/*.md
#
# BACKEND PSEUDOCODE:
#
#   combined_content = ""
#   
#   # Load research plan
#   research_plan = await github_api.get_file_contents("00-planning/research_plan.md")
#   combined_content += research_plan
#   
#   # Load all session summaries
#   session_files = await github_api.list_files("03-fieldwork/session-summaries/")
#   for file in session_files:
#       if "session_summary" in file.name:
#           content = await github_api.get_file_contents(file.path)
#           combined_content += "\n\n---\n\n" + content
#   
#   # Optional: Load affinity map if exists
#   affinity_files = await github_api.list_files("04-analysis/affinity-mapping/")
#   for file in affinity_files:
#       content = await github_api.get_file_contents(file.path)
#       combined_content += "\n\n---\n\n" + content
#   
#   # Pass to AI
#   variables["input_text"] = combined_content
#
# ============================================================

input_type: text
input_processing: summarize_if_long

llm_config:
  model: "claude-sonnet-4"
  temperature: 0.3
  max_tokens: 8000  # Increased for richer formatted output

input_variables:
  - research_folder_path
  - study_name
  - researcher_contact
  - study_channel
  - research_readout_data
  - input_text
  - study_link
  - team_members

core_files:
  research_plan:
    file: "research_plan.md"
    required: true
    extract: ["objectives", "methods", "success_criteria", "timeline"]
    description: "Study objectives, research methods, and success criteria"
    
  session_summaries:
    folder: "03-fieldwork/session-summaries/"
    required: true
    extract: ["pain_points", "opportunities", "insights", "quotes", "participant_context"]
    description: "Session summaries with coded findings per participant"
    file_pattern: "*session_summary*.md"
    processing: "aggregate_all_sessions"
    
  participant_tracker:
    file: "participant_tracker.md"
    required: false
    extract: ["demographics", "sample_size", "completion_status"]
    description: "Participant demographics and completion data"

optional_files:
  affinity_mapping:
    file: "04-analysis/affinity-mapping/*.md"
    extract: ["themes", "evidence_counts", "recommendations"]
    description: "Synthesized themes from affinity analysis"
    
  journey_mapping:
    file: "04-analysis/journey-mapping/*.md"
    extract: ["stages", "pain_points", "opportunities"]
    description: "User journey analysis"
    
  personas:
    file: "04-analysis/personas/*.md"
    extract: ["user_types", "behaviors", "goals"]
    description: "User archetypes"

auto_variables:
  - current_date: |
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      generate_github_link(study_name, current_date) || null
  - detected_files: |
      scan_research_folder(research_folder_path, core_files, optional_files)
  - file_quality_score: |
      assess_file_completeness(detected_files, core_files, optional_files)
  - participant_count: |
      extract_from_md(participant_tracker, "participants") || "Unknown"
  - session_count: |
      count_completed_sessions(participant_tracker, "completed") || "Unknown"
  - methodology_type: |
      extract_methodology(research_plan) || "Usability Testing"
  - product_area: |
      extract_product_area(research_plan) || "Digital Services"

ai_generation_tasks:
  - task_id: "research_readout_complete"
    prompt: |
      ============================================================
      🚨 CRITICAL GROUNDING RULES - READ FIRST 🚨
      ============================================================
      
      You are creating a research readout from REAL research data.
      
      ABSOLUTE REQUIREMENTS:
      1. ONLY use findings, quotes, and insights from the source data below
      2. NEVER invent quotes, participants, or findings
      3. NEVER mention products, features, or issues not in the source data
      4. If the source data is empty or insufficient, say so - do not fabricate
      5. Use participant IDs exactly as they appear (PT001, PT002, etc.)
      6. Counts must be accurate (if 3 participants, say 3 - not 10 or 20)
      
      FORBIDDEN (hallucination indicators):
      - "checkout process" / "conversion rates" / "e-commerce" (unless in source)
      - "website navigation" (unless source mentions website)
      - Participant counts that don't match source
      - Quotes not found verbatim in source
      - Generic findings not tied to specific evidence
      
      ============================================================
      SOURCE DATA
      ============================================================
      
      **Study Name:** {{study_name}}
      **Research Folder:** {{research_folder_path}}
      **Lead Researcher:** {{researcher_contact}}
      **Detected Files:** {{detected_files}}
      
      **Research Data:**
      
      {{input_text}}
      
      {{research_readout_data}}
      
      ============================================================
      METADATA INFERENCE
      ============================================================
      
      Extract from source data:
      - Participant count: Count unique PT### IDs in source
      - Session count: Same as participant count (1 session per participant)
      - Methodology: Look for "usability testing," "interviews," etc.
      - Product area: What product/app is being researched
      
      If {{study_name}} or date is blank, infer from content.
      
      ============================================================
      OUTPUT FORMAT - PROFESSIONAL GITHUB STYLING
      ============================================================
      
      <div align="center">
      
      # 📊 Research Readout
      ## [Study name from source or variable]
      
      **[Actual date]**
      
      ---
      
      | Participants | Sessions | Methodology | Lead Researcher |
      |:------------:|:--------:|:-----------:|:---------------:|
      | [Count] | [Count] | [Type] | {{researcher_contact}} |
      
      </div>
      
      ---
      
      ## 📌 Executive Summary
      
      > [!IMPORTANT]
      > **Bottom Line:** [Single sentence capturing the most critical insight and its business implication]
      
      ### Key Takeaways
      
      | Priority | Finding | Impact | Action Required |
      |:--------:|:--------|:-------|:----------------|
      | 🔴 | [Critical finding in one line] | [Business/user impact] | [Immediate action] |
      | 🟡 | [High-priority finding] | [Impact] | [Action] |
      | 🟢 | [What's working well] | [Positive impact] | [Maintain/enhance] |
      
      ---
      
      ## 📊 Findings at a Glance
      
      <table>
      <tr>
      <td width="33%" valign="top">
      
      ### 🔴 Critical Issues
      **[Count] findings**
      
      - [Issue 1 - brief]
      - [Issue 2 - brief]
      
      </td>
      <td width="33%" valign="top">
      
      ### 🟡 Improvements Needed
      **[Count] findings**
      
      - [Issue 1 - brief]
      - [Issue 2 - brief]
      
      </td>
      <td width="33%" valign="top">
      
      ### 🟢 Working Well
      **[Count] findings**
      
      - [Positive 1 - brief]
      - [Positive 2 - brief]
      
      </td>
      </tr>
      </table>
      
      ---
      
      ## 🔍 Detailed Findings
      
      ### Finding 1: [Specific title from data]
      
      <table>
      <tr>
      <td width="70%" valign="top">
      
      #### What We Observed
      
      [2-3 sentence description grounded in source data. Be specific about the behavior, context, and consequence.]
      
      #### Supporting Evidence
      
      > "[Exact quote from source]"
      > 
      > — **PT001** *[Brief context if available]*
      
      > "[Another exact quote from source]"
      > 
      > — **PT002** *[Brief context]*
      
      </td>
      <td width="30%" valign="top">
      
      **Severity**
      
      `🔴 CRITICAL`
      
      **Frequency**
      
      [X] of [Y] participants
      ([percentage]%)
      
      **Participants**
      
      PT001, PT002, PT003
      
      </td>
      </tr>
      </table>
      
      <details>
      <summary><strong>💡 Recommendation</strong></summary>
      
      **Suggested Action:** [Specific, actionable recommendation]
      
      **Rationale:** [Why this addresses the finding]
      
      **Owner:** [Suggested team/role]
      
      **Effort Estimate:** [Low / Medium / High]
      
      </details>
      
      ---
      
      ### Finding 2: [Specific title from data]
      
      <table>
      <tr>
      <td width="70%" valign="top">
      
      #### What We Observed
      
      [Description grounded in source data]
      
      #### Supporting Evidence
      
      > "[Exact quote from source]"
      > 
      > — **PT00X**
      
      </td>
      <td width="30%" valign="top">
      
      **Severity**
      
      `🟡 HIGH`
      
      **Frequency**
      
      [X] of [Y] participants
      
      **Participants**
      
      [IDs]
      
      </td>
      </tr>
      </table>
      
      <details>
      <summary><strong>💡 Recommendation</strong></summary>
      
      **Suggested Action:** [Recommendation]
      
      **Rationale:** [Why]
      
      **Owner:** [Team]
      
      </details>
      
      ---
      
      ### Finding 3: [Specific title from data]
      
      [Same format - continue for all major findings]
      
      ---
      
      ## ✅ What's Working Well
      
      > [!TIP]
      > These elements should be preserved and potentially expanded in future iterations.
      
      | Positive Finding | Evidence | Participant(s) |
      |:-----------------|:---------|:---------------|
      | **[Positive 1]** | "[Supporting quote]" | PT00X |
      | **[Positive 2]** | "[Supporting quote]" | PT00X |
      | **[Positive 3]** | "[Supporting quote]" | PT00X |
      
      ---
      
      ## 👥 Participant Overview
      
      | ID | Context | Key Contribution | Notable Quotes |
      |:---|:--------|:-----------------|:---------------|
      | **PT001** | [From participant context] | [What they highlighted] | [Brief memorable quote] |
      | **PT002** | [From participant context] | [What they highlighted] | [Brief quote] |
      | **PT003** | [From participant context] | [What they highlighted] | [Brief quote] |
      
      <details>
      <summary><strong>📋 Sample Characteristics</strong></summary>
      
      | Characteristic | Distribution |
      |:---------------|:-------------|
      | Total Participants | [N] |
      | [Demographic 1 if known] | [Distribution] |
      | [Demographic 2 if known] | [Distribution] |
      
      > [!NOTE]
      > [Any notes about recruitment, sample limitations, or representation]
      
      </details>
      
      ---
      
      ## 🔬 Methodology
      
      | Aspect | Details |
      |:-------|:--------|
      | **Research Type** | [From research plan or inferred] |
      | **Sessions Conducted** | [Count] |
      | **Session Duration** | [If known] |
      | **Research Focus** | [What was being tested/explored] |
      | **Recruitment Method** | [If known] |
      | **Data Collection** | [Methods used] |
      
      ---
      
      ## 🚀 Recommended Actions
      
      ### 🔴 Immediate Priority (Next 2 Weeks)
      
      | # | Action | Addresses Finding | Owner | Effort |
      |:-:|:-------|:------------------|:------|:------:|
      | 1 | **[Specific action]** | [Finding title] | [Team] | [L/M/H] |
      | 2 | **[Specific action]** | [Finding title] | [Team] | [L/M/H] |
      
      ### 🟡 Short-Term (1-2 Months)
      
      | # | Action | Addresses Finding | Owner | Effort |
      |:-:|:-------|:------------------|:------|:------:|
      | 1 | **[Action]** | [Finding] | [Team] | [L/M/H] |
      | 2 | **[Action]** | [Finding] | [Team] | [L/M/H] |
      
      ### 🟢 Future Considerations
      
      | # | Action | Addresses Finding | Notes |
      |:-:|:-------|:------------------|:------|
      | 1 | **[Action]** | [Finding] | [Context] |
      
      ### 🔍 Follow-Up Research Needed
      
      > [!NOTE]
      > These gaps emerged during analysis and warrant further investigation.
      
      - [ ] [Research gap or question that emerged]
      - [ ] [Another area needing investigation]
      
      ---
      
      ## 📎 Appendix
      
      <details>
      <summary><strong>📁 Related Artifacts</strong></summary>
      
      | Artifact | Location | Status |
      |:---------|:---------|:-------|
      | Session Summaries | [{{research_folder_path}}/03-fieldwork/session-summaries/]({{research_folder_path}}/03-fieldwork/session-summaries/) | ✅ Complete |
      | Affinity Map | [{{research_folder_path}}/04-analysis/affinity-mapping/]({{research_folder_path}}/04-analysis/affinity-mapping/) | [Status] |
      | Full Study Documentation | [Link]({{study_link}}) | ✅ Available |
      
      </details>
      
      <details>
      <summary><strong>✅ Research Validity Checklist</strong></summary>
      
      | Criterion | Status | Notes |
      |:----------|:------:|:------|
      | All quotes verbatim from source | ✅ | Verified |
      | All participant IDs match source | ✅ | PT### format preserved |
      | Participant count accurate | ✅ | [N] participants |
      | No fabricated findings | ✅ | All grounded in data |
      | Findings specific to this study | ✅ | No generic insights |
      
      </details>
      
      ---
      
      <div align="center">
      
      ---
      
      **Questions about this research?**
      
      Contact {{researcher_contact}} | Channel: {{study_channel}}
      
      ---
      
      *Generated by Qori Research Synthesis • [Date]*
      
      </div>
      
      ============================================================
      QUALITY CHECKS (do not include in output)
      ============================================================
      
      Before outputting, verify:
      - Every quote appears EXACTLY in source
      - Participant IDs are PT### format, not P1 or P01
      - Participant count matches unique IDs in source
      - No mentions of products/features not in source
      - Findings are specific to THIS study, not generic
      - GitHub HTML elements are properly closed
      - Tables have consistent column counts
      
      Output ends at the centered Qori attribution line.

output_options:
  default_delivery: "slack_notification_and_github"
  slack_format: "minimal_notification_with_link"
  github_format: "comprehensive_research_document"
  path: "05-findings/"
  filename: "research_readout_{{study_name}}_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: false
  title_format: "📊 Research Readout Ready"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "📋 View Full Research Readout"
      url: "{{github_file_link}}"

slack_message_format: |
  📊 **Research Readout Complete**
  
  **Study:** {{study_name}}
  **Participants:** {{participant_count}} | **Sessions:** {{session_count}}
  
  👆 **View Full Readout:** [Link]({{github_file_link}})
  
  *Questions?* Contact {{researcher_contact}}

output_template: |
  {{ai_generated.research_readout_complete}}

notify:
  - role: research_team
    action: "Research readout completed"
    channel: "{{study_channel}}"
    message: "📊 Research readout for {{study_name}} is ready for review."

notes: |
  v5.0 - Professional Styling & Industry Standards Update
  
  VISUAL ENHANCEMENTS:
  - Centered header with study metadata table
  - GitHub alert syntax (> [!IMPORTANT], > [!TIP], > [!NOTE])
  - Three-column findings summary using HTML tables
  - Side-by-side layout for findings (evidence + metadata)
  - Collapsible sections for detailed content
  - Consistent severity indicators (🔴 🟡 🟢)
  - Inline code styling for severity badges
  
  STRUCTURAL IMPROVEMENTS (Industry Standards):
  - Executive summary follows NNG readout format
  - Findings structure based on IDEO research templates
  - Recommendation tables with Owner + Effort estimates
  - Validity checklist (research rigor transparency)
  - Progressive disclosure for stakeholder scanning
  
  RESEARCH BEST PRACTICES:
  - Portigal-style evidence presentation (quote → context → implication)
  - Severity + Frequency + Participants triad for each finding
  - Explicit "What's Working Well" section (balanced reporting)
  - Follow-up research gaps documented
  - Sample characteristics in collapsible detail
  
  UNCHANGED:
  - All input_variables preserved
  - All core_files and optional_files preserved
  - All auto_variables preserved
  - Backend data requirements unchanged
  - Grounding/anti-hallucination rules unchanged
  
  GITHUB COMPATIBILITY:
  - HTML tables render correctly
  - Alert syntax works on GitHub
  - Details/summary for collapsible sections
  - Div alignment for centered content
  - All markdown properly escaped
