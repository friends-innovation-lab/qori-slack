  {{team_members}} - this readout contains {{finding_count}} key findings with detailed evidence and recommendations.

  📂 *Study:* {{study_name}}  
  🔗 *Full details:* {{study_link}}
  📊 *Data Sources:* {{data_sources}}
  🎯 *Quality Score:* {{file_quality_score}}

  ---

  # 📊 Research Readout — {{study_name}}

  **🤖 AI-Enhanced Analysis Complete**

  {{ai_generated.study_context_analysis}}

  **📁 File Processing Results:** {{ai_generated.file_input_processing}}
  **📊 Router Quality Assessment:** {{file_selection_quality}}
  **🕐 Analysis Date:** {{current_date}}

  ---

  ## 🔍 Key Insights Summary

  {{ai_generated.key_insights_extraction}}

  ---

  ## 👥 Participant Overview

  {{ai_generated.participant_analysis}}

  ---

  ## 🧠 Detailed Findings & Recommendations

  {{ai_generated.detailed_findings_analysis}}

  ---

  ## 📊 Findings Summary Table

  {{ai_generated.findings_summary_table}}

  ---

  ## ✅ Next Steps

  {{ai_generated.next_steps_generation}}

  ---

  ## 🔗 Linked Artifacts

  - [Study Documentation]({{study_link}})
