id: research_readout
name: run_research_readout
label: "📊 Research Readout"
version: v4.0
description: |
  Generate comprehensive research readouts from session summaries and synthesis artifacts.
  Creates stakeholder-ready documentation with grounded findings and actionable recommendations.

author: Qori R&D
created: 2025-06-26
last_updated: 2026-01-07

# ============================================================
# BACKEND DATA REQUIREMENTS (for Tanzeel/Abdul)
# ============================================================
# 
# This workflow requires actual file contents to be loaded into variables.
# Without this data, the AI will output "Insufficient data" (correct behavior).
#
# REQUIRED DATA FLOW:
#
# 1. Session Summaries → {{input_text}} or {{research_readout_data}}
#    - Location: 03-fieldwork/session-summaries/
#    - Files: *session_summary*.md (all of them, concatenated)
#    - Example: PT001_session_summary.md + PT002_session_summary.md + PT003_session_summary.md
#
# 2. Research Plan → included in {{input_text}} or {{research_readout_data}}
#    - Location: 00-planning/research_plan.md
#    - Contains: methodology, goals, research questions
#
# OPTIONAL (enhances quality):
# 3. Affinity Map → append to {{input_text}}
#    - Location: 04-analysis/affinity-mapping/*.md
#
# BACKEND PSEUDOCODE:
#
#   combined_content = ""
#   
#   # Load research plan
#   research_plan = await github_api.get_file_contents("00-planning/research_plan.md")
#   combined_content += research_plan
#   
#   # Load all session summaries
#   session_files = await github_api.list_files("03-fieldwork/session-summaries/")
#   for file in session_files:
#       if "session_summary" in file.name:
#           content = await github_api.get_file_contents(file.path)
#           combined_content += "\n\n---\n\n" + content
#   
#   # Optional: Load affinity map if exists
#   affinity_files = await github_api.list_files("04-analysis/affinity-mapping/")
#   for file in affinity_files:
#       content = await github_api.get_file_contents(file.path)
#       combined_content += "\n\n---\n\n" + content
#   
#   # Pass to AI
#   variables["input_text"] = combined_content
#
# ============================================================

input_type: text
input_processing: summarize_if_long

llm_config:
  model: "claude-sonnet-4"
  temperature: 0.3
  max_tokens: 6000

input_variables:
  - research_folder_path
  - study_name
  - researcher_contact
  - study_channel
  - research_readout_data
  - input_text
  - study_link
  - team_members

core_files:
  research_plan:
    file: "research_plan.md"
    required: true
    extract: ["objectives", "methods", "success_criteria", "timeline"]
    description: "Study objectives, research methods, and success criteria"
    
  session_summaries:
    folder: "03-fieldwork/session-summaries/"
    required: true
    extract: ["pain_points", "opportunities", "insights", "quotes", "participant_context"]
    description: "Session summaries with coded findings per participant"
    file_pattern: "*session_summary*.md"
    processing: "aggregate_all_sessions"
    
  participant_tracker:
    file: "participant_tracker.md"
    required: false
    extract: ["demographics", "sample_size", "completion_status"]
    description: "Participant demographics and completion data"

optional_files:
  affinity_mapping:
    file: "04-analysis/affinity-mapping/*.md"
    extract: ["themes", "evidence_counts", "recommendations"]
    description: "Synthesized themes from affinity analysis"
    
  journey_mapping:
    file: "04-analysis/journey-mapping/*.md"
    extract: ["stages", "pain_points", "opportunities"]
    description: "User journey analysis"
    
  personas:
    file: "04-analysis/personas/*.md"
    extract: ["user_types", "behaviors", "goals"]
    description: "User archetypes"

auto_variables:
  - current_date: |
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      generate_github_link(study_name, current_date) || null
  - detected_files: |
      scan_research_folder(research_folder_path, core_files, optional_files)
  - file_quality_score: |
      assess_file_completeness(detected_files, core_files, optional_files)
  - participant_count: |
      extract_from_md(participant_tracker, "participants") || "Unknown"
  - session_count: |
      count_completed_sessions(participant_tracker, "completed") || "Unknown"
  - methodology_type: |
      extract_methodology(research_plan) || "Usability Testing"
  - product_area: |
      extract_product_area(research_plan) || "Digital Services"

ai_generation_tasks:
  - task_id: "research_readout_complete"
    prompt: |
      ============================================================
      🚨 CRITICAL GROUNDING RULES - READ FIRST 🚨
      ============================================================
      
      You are creating a research readout from REAL research data.
      
      ABSOLUTE REQUIREMENTS:
      1. ONLY use findings, quotes, and insights from the source data below
      2. NEVER invent quotes, participants, or findings
      3. NEVER mention products, features, or issues not in the source data
      4. If the source data is empty or insufficient, say so - do not fabricate
      5. Use participant IDs exactly as they appear (PT001, PT002, etc.) - NEVER change to P1, P01, etc.
      6. Counts must be accurate (if 3 participants, say 3 - not 10 or 20)
      
      FORBIDDEN (hallucination indicators):
      - "checkout process" / "conversion rates" / "e-commerce"
      - "website navigation" (unless source mentions website)
      - Participant counts that don't match source
      - Quotes not found verbatim in source
      - Generic findings not tied to specific evidence
      
      If source data is insufficient, output:
      "⚠️ Insufficient data for research readout. Required files may be empty or not loaded."
      
      ============================================================
      SOURCE DATA
      ============================================================
      
      **Study Name:** {{study_name}}
      **Research Folder:** {{research_folder_path}}
      **Lead Researcher:** {{researcher_contact}}
      **Detected Files:** {{detected_files}}
      
      **Research Data:**
      
      {{input_text}}
      
      {{research_readout_data}}
      
      ============================================================
      METADATA INFERENCE
      ============================================================
      
      Extract from source data:
      - Participant count: Count unique PT### IDs in source
      - Session count: Same as participant count (1 session per participant)
      - Methodology: Look for "usability testing," "interviews," etc. in source
      - Product area: What product/app is being researched
      
      If {{study_name}} or date is blank, infer from content.
      
      ============================================================
      OUTPUT FORMAT
      ============================================================
      
      # 📊 Research Readout: [Study name from source or variable]
      
      **Date:** [Actual date] | **Lead:** [Researcher] | **Participants:** [Actual count from source]
      
      ---
      
      ## 📌 TL;DR
      
      [3-4 bullet executive summary - the absolute essentials]
      
      - **Top Finding:** [Most critical finding in one sentence]
      - **Key Pattern:** [What users consistently experienced]
      - **Primary Recommendation:** [Single most important action]
      - **Business Impact:** [Why this matters]
      
      ---
      
      ## 📊 At a Glance
      
      | Finding | Severity | Participants Affected | Recommended Action |
      |---------|----------|----------------------|-------------------|
      | [Finding 1] | 🔴 Critical | [PT001, PT002...] | [Action] |
      | [Finding 2] | 🟡 High | [PT001, PT003...] | [Action] |
      | [Finding 3] | 🟡 Medium | [PT002...] | [Action] |
      
      ---
      
      ## 🔍 Key Findings
      
      ### Finding 1: [Specific title from data]
      
      **What we observed:**
      [Description grounded in source data]
      
      **Evidence:**
      > "[Exact quote from source]"
      > *— PT001*
      
      > "[Another exact quote from source]"
      > *— PT002*
      
      **Frequency:** [X] of [Y] participants
      **Severity:** [Critical/High/Medium/Low]
      
      **Recommendation:**
      [Specific action to address this finding]
      
      ---
      
      ### Finding 2: [Specific title from data]
      
      [Same format]
      
      ---
      
      ### Finding 3: [Specific title from data]
      
      [Same format]
      
      ---
      
      ## ✅ What's Working Well
      
      [Positive findings from source - don't skip this]
      
      - **[Positive 1]:** "[Supporting quote]" — PT00X
      - **[Positive 2]:** "[Supporting quote]" — PT00X
      
      ---
      
      ## 👥 Participants
      
      | ID | Context | Key Contribution |
      |----|---------|------------------|
      | PT001 | [From participant context in source] | [What they highlighted] |
      | PT002 | [From participant context in source] | [What they highlighted] |
      | PT003 | [From participant context in source] | [What they highlighted] |
      
      **Total:** [Actual count] participants
      
      ---
      
      ## 🔬 Methodology
      
      - **Type:** [From research plan or inferred]
      - **Duration:** [Per session if known]
      - **Focus:** [What was being tested]
      - **Recruitment:** [How participants were recruited if known]
      
      ---
      
      ## 🚀 Recommended Actions
      
      ### Immediate (Next 2 Weeks)
      
      1. **[Action]** — Addresses: [Finding]
         - Owner: [Team/role]
         - Why urgent: [Evidence]
      
      2. **[Action]** — Addresses: [Finding]
         - Owner: [Team/role]
         - Why urgent: [Evidence]
      
      ### Short-term (1-2 Months)
      
      1. **[Action]** — Addresses: [Finding]
         - Owner: [Team/role]
      
      ### Follow-up Research
      
      - [Any gaps or areas needing more investigation]
      
      ---
      
      ## 🔗 Related Artifacts
      
      - [Session Summaries]({{research_folder_path}}/03-fieldwork/session-summaries/)
      - [Affinity Map]({{research_folder_path}}/04-analysis/affinity-mapping/) (if generated)
      - [Full Study Documentation]({{study_link}})
      
      ---
      
      ## ✅ Validation
      
      - All quotes verbatim from source: [Yes/No]
      - All participant IDs match source: [Yes/No]
      - Participant count accurate: [Yes/No]
      - No fabricated findings: [Yes/No]
      
      ---
      
      *Generated by Qori Research Synthesis • [Date]*
      
      **Questions?** Contact {{researcher_contact}}
      
      ============================================================
      QUALITY CHECKS (do not include in output)
      ============================================================
      
      Before outputting, verify:
      - Every quote appears EXACTLY in source
      - Participant IDs are PT001 format, not P1 or P01
      - Participant count matches unique IDs in source
      - No mentions of products/features not in source
      - Findings are specific to THIS study, not generic
      
      Output ends at "Contact {{researcher_contact}}" line.

output_options:
  default_delivery: "slack_notification_and_github"
  slack_format: "minimal_notification_with_link"
  github_format: "comprehensive_research_document"
  path: "05-shareouts/"
  filename: "research_readout_{{study_name}}_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: false
  title_format: "📊 Research Readout Ready"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "📋 View Full Research Readout"
      url: "{{github_file_link}}"

slack_message_format: |
  📊 **Research Readout Complete**
  
  **Study:** {{study_name}}
  **Participants:** {{participant_count}} | **Sessions:** {{session_count}}
  
  👆 **View Full Readout:** [Link]({{github_file_link}})
  
  *Questions?* Contact {{researcher_contact}}

output_template: |
  {{ai_generated.research_readout_complete}}

notify:
  - role: research_team
    action: "Research readout completed"
    channel: "{{study_channel}}"
    message: "📊 Research readout for {{study_name}} is ready for review."
