id: research_readout
name: run_research_readout
label: 📊 Research Readout
version: v3.0
description: |
  Generate comprehensive VA-aligned research readouts with AI-synthesized findings, participant analysis, 
  and actionable recommendations. Creates formal documentation with intelligent insights extraction and 
  stakeholder-ready formatting for research teams and project archives.

author: Qori R&D
created: 2025-06-26
last_updated: 2025-08-19

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.4
  max_tokens: 6000

input_variables:
  # ENHANCED FILE INPUT OPTIONS
  - study_folder_path        # GitHub folder path (e.g., "va-studies/housing-app") (OPTIONAL)
  - research_plan_file       # Research plan document URL or content (OPTIONAL)
  - participant_tracker_file # Participant CSV/sheet URL or content (OPTIONAL)
  - session_files_folder     # Folder containing session notes (OPTIONAL)
  - analysis_files_folder    # Folder containing existing analysis (OPTIONAL)
  - uploaded_files           # Files uploaded directly to Slack (OPTIONAL)
  
  # Core analysis data (backward compatible)
  - input_text           # Research findings, insights, session notes (OPTIONAL if files provided)
  - study_name           # Title of study (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to post results (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Who to notify/tag (OPTIONAL)
  
  # Router intelligence (from synthesize_router OR file processing)
  - file_selection_quality    # Router's file quality assessment (OPTIONAL)
  - analysis_preview         # Router's expected outcomes (OPTIONAL)
  - recommendations          # Router's smart suggestions (OPTIONAL)
  - collaboration_plan       # Router's team coordination plan (OPTIONAL)
  - routing_validation       # Router's methodology validation (OPTIONAL)
  - selected_files_summary   # Summary of files used (OPTIONAL)
  - data_combination_strategy # How files were combined (OPTIONAL)
  
  # Router metadata
  - router_version           # Router version for tracking (OPTIONAL)
  - preprocessing_timestamp  # When router processed (OPTIONAL)
  - analysis_id             # Unique analysis identifier (OPTIONAL)

# AI GENERATION TASKS
ai_generation_tasks:
  # FILE PROCESSING TASKS (NEW)
  
  # Process GitHub folder or file inputs
  - task_id: "file_input_processing"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      Process and validate file inputs for research analysis:
      
      **Study Folder Path:** {{study_folder_path}}
      **Research Plan File:** {{research_plan_file}}
      **Participant Tracker:** {{participant_tracker_file}}
      **Session Files Folder:** {{session_files_folder}}
      **Analysis Files Folder:** {{analysis_files_folder}}
      **Uploaded Files:** {{uploaded_files}}
      
      Analyze available file inputs:
      1. **File availability assessment** - What files are provided?
      2. **File type identification** - Research plan, tracker, sessions, analysis?
      3. **File relationship validation** - Do participant IDs match across files?
      4. **Data completeness scoring** - How complete is the dataset?
      5. **Processing strategy** - How to best synthesize these files?
      
      **Format:**
      **Available Files:** [List of detected/provided files]
      **File Types Identified:** [Research plan: Yes/No, Tracker: Yes/No, Sessions: Count, Analysis: Yes/No]
      **Data Quality Score:** [High/Medium/Low] - [Reasoning]
      **Participant Coverage:** [How many participants, any gaps?]
      **Processing Strategy:** [How to synthesize these files for best analysis]
      **Missing Elements:** [What would improve the analysis if available]

  # Extract research context from plan file
  - task_id: "research_plan_extraction"
    condition: "research_plan_file is provided"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      Extract research context from the provided research plan:
      
      **Research Plan Content:** {{research_plan_file}}
      
      Extract key information:
      1. **Study objectives** and research goals
      2. **Research questions** being investigated
      3. **Methodology** and session approach
      4. **Participant criteria** and recruitment strategy
      5. **Success metrics** and KPIs
      6. **Timeline** and milestones
      
      **Format:**
      **Study Objectives:** [3-4 main research objectives]
      **Research Questions:** [3-4 specific questions the study addresses]
      **Methodology:** [Research approach, session type, duration]
      **Participant Criteria:** [Who was recruited and why]
      **Success Metrics:** [How to measure study success]
      **Timeline:** [Study duration and key milestones]

  # Extract participant demographics and completion data
  - task_id: "participant_tracker_extraction"
    condition: "participant_tracker_file is provided"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Use participant aliases (P01, P02) for privacy
      
      Extract participant information from the tracker file:
      
      **Participant Tracker Content:** {{participant_tracker_file}}
      
      Extract and analyze:
      1. **Total participant count** and completion rate
      2. **Demographics breakdown** (age, role, experience)
      3. **Recruitment channels** and success rates
      4. **Session completion status** for each participant
      5. **Notable participant characteristics** relevant to study
      6. **Any recruitment or completion challenges**
      
      **Format:**
      **Total Participants:** [Count] with [X%] completion rate
      **Demographics Breakdown:**
      • Age ranges: [breakdown]
      • Roles/backgrounds: [breakdown]
      • Experience levels: [breakdown]
      **Recruitment Success:**
      • [Channel 1]: [Count] participants
      • [Channel 2]: [Count] participants
      **Session Status:** [Completed/Scheduled/Cancelled breakdown]
      **Key Participant Characteristics:** [Relevant traits for study context]
      **Completion Challenges:** [Any issues encountered]

  # Synthesize insights from session files
  - task_id: "session_files_synthesis"
    condition: "session_files_folder is provided OR uploaded_files contains session data"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Include specific quotes with participant IDs
      
      Synthesize insights from all available session files:
      
      **Session Files:** {{session_files_folder}} {{uploaded_files}}
      
      For each session, extract:
      1. **Participant ID** and session context
      2. **Key insights** and observations per session
      3. **Direct user quotes** that illustrate findings
      4. **Behavioral patterns** observed during sessions
      5. **Usability issues** and pain points encountered
      6. **Positive moments** and successful interactions
      
      Then synthesize across all sessions:
      1. **Common themes** that appear across multiple participants
      2. **Frequency patterns** (how often issues occur)
      3. **Contradictions** or edge cases between participants
      4. **Strongest evidence** for key insights
      
      **Format:**
      **Per-Session Summary:**
      • P01: [Key insights and notable quotes]
      • P02: [Key insights and notable quotes]
      • [Continue for each session]
      
      **Cross-Session Themes:**
      • Theme 1: [Description] - [Frequency: X/Y participants]
      • Theme 2: [Description] - [Frequency: X/Y participants]
      
      **Compelling Quotes:**
      • "[Quote 1]" - P[X] [Context]
      • "[Quote 2]" - P[X] [Context]
      
      **Evidence Strength:** [Assessment of consistency and reliability]

  # Integrate existing analysis files
  - task_id: "existing_analysis_integration"
    condition: "analysis_files_folder is provided"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      Integrate existing analysis files with current research processing:
      
      **Analysis Files:** {{analysis_files_folder}}
      
      Review and integrate:
      1. **Existing themes** or findings from prior analysis
      2. **Validation opportunities** - Do session files confirm existing themes?
      3. **Gaps or contradictions** between existing analysis and session data
      4. **Additional insights** not captured in previous analysis
      5. **Confidence assessment** of existing vs. new findings
      
      **Format:**
      **Existing Themes Identified:**
      • [Theme 1]: [Description and source]
      • [Theme 2]: [Description and source]
      
      **Validation Results:**
      • [Theme 1]: [Confirmed/Contradicted/Partially supported by session data]
      • [Theme 2]: [Confirmed/Contradicted/Partially supported by session data]
      
      **New Insights from Session Data:**
      • [Insight 1]: [Not captured in existing analysis]
      • [Insight 2]: [Not captured in existing analysis]
      
      **Confidence Assessment:** [How existing analysis aligns with fresh session data]

  # CORE ANALYSIS TASKS (Enhanced with file context)
  
  # Extract study context and methodology
  - task_id: "study_context_analysis"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      Analyze the research context using all available sources:
      
      **File Processing Results:** {{ai_generated.file_input_processing}}
      **Research Plan Context:** {{ai_generated.research_plan_extraction}}
      **Manual Input Data:** {{input_text}}
      **Study Name:** {{study_name}}
      **Router Assessment:** {{file_selection_quality}}
      
      Synthesize and identify:
      1. **Research methodology type** (usability testing, interviews, surveys, etc.)
      2. **Participant count** and demographics 
      3. **Session duration** estimates
      4. **Product area** being researched
      5. **Research goals** (3-4 clear objectives)
      6. **Research questions** (3-4 specific questions addressed)
      
      **Prioritize file-extracted data** over manual input when available.
      
      **Format:**
      **Methodology:** [Specific type - prioritize from research plan if available]
      **Participants:** [Count and demographics - use tracker data if available]
      **Session Duration:** [From plan or estimated from session files]
      **Product Area:** [Specific VA service or digital area]
      **Research Goals:**
      • [Goal 1 - from research plan or inferred from data]
      • [Goal 2 - from research plan or inferred from data]
      • [Goal 3 - from research plan or inferred from data]
      **Research Questions:**
      • [Question 1 - from research plan or inferred]
      • [Question 2 - from research plan or inferred]
      • [Question 3 - from research plan or inferred]

  # Generate participant overview table
  - task_id: "participant_analysis"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Use participant aliases (P01, P02) for privacy
      
      Create a participant overview table using all available data sources:
      
      **Participant Tracker Data:** {{ai_generated.participant_tracker_extraction}}
      **Session Synthesis:** {{ai_generated.session_files_synthesis}}
      **Manual Input Data:** {{input_text}}
      **Study Context:** {{ai_generated.study_context_analysis}}
      
      **Prioritize tracker file data** when available, supplement with session and manual data.
      
      Extract participant information and create a structured table showing:
      - Participant ID (P01, P02, etc.)
      - Demographics (age range, role, experience level)
      - Session status (completed, rescheduled, etc.)
      - Key characteristics relevant to study
      - Recruitment channel (if available from tracker)
      
      **Format as markdown table:**
      | Participant | Demographics | Session Status | Recruitment | Key Notes |
      |-------------|--------------|----------------|-------------|-----------|
      | P01 | [Age/role info] | Completed | [Channel] | [Relevant context] |
      | P02 | [Age/role info] | Completed | [Channel] | [Relevant context] |
      
      Include summary statistics:
      **Total Participants:** [Count from tracker or session files]
      **Completion Rate:** [Percentage from tracker or calculated]
      **Participant Types:** [Brief breakdown of user types]
      **Recruitment Channels:** [Breakdown by channel if available]

  # Extract and prioritize key insights
  - task_id: "key_insights_extraction"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Make insights specific and actionable
      
      Extract 3-5 key insights using all available data sources:
      
      **Session Synthesis:** {{ai_generated.session_files_synthesis}}
      **Existing Analysis:** {{ai_generated.existing_analysis_integration}}
      **Research Goals:** {{ai_generated.study_context_analysis.goals}}
      **Manual Input Data:** {{input_text}}
      **File Quality:** {{ai_generated.file_input_processing}}
      
      **Prioritize insights from session synthesis** when available, validate against existing analysis.
      
      Identify the most important insights that directly address research goals:
      
      1. **Prioritize insights** that are well-supported by evidence across multiple sources
      2. **Focus on user tensions** and specific behaviors observed in sessions
      3. **Include impact level** (high/medium/low) for each insight
      4. **Make insights actionable** for design and product decisions
      5. **Cross-validate** with existing analysis when available
      
      **Format:**
      **Key Insight 1:** [Specific, actionable insight]
      **Key Insight 2:** [Specific, actionable insight]  
      **Key Insight 3:** [Specific, actionable insight]
      **Key Insight 4:** [Specific, actionable insight] (if supported by data)
      **Key Insight 5:** [Specific, actionable insight] (if supported by data)
      
      **Examples of good insights:**
      - "Veterans abandon applications when they can't save progress and return later (observed in 6/8 sessions)"
      - "Users create workarounds when official processes require information they don't have (P02, P05, P07)"
      - "People assume government websites will fail based on past experiences (validated by existing analysis)"

  # Generate detailed findings with evidence
  - task_id: "detailed_findings_analysis"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Include specific quotes and behavioral evidence
      
      Create detailed findings with supporting evidence from all data sources:
      
      **Session Synthesis:** {{ai_generated.session_files_synthesis}}
      **Key Insights:** {{ai_generated.key_insights_extraction}}
      **Research Methodology:** {{ai_generated.study_context_analysis.methodology}}
      **Participant Data:** {{ai_generated.participant_tracker_extraction}}
      **Manual Input Data:** {{input_text}}
      
      **Use session file quotes and participant IDs** when available for strongest evidence.
      
      For each key insight, develop a detailed finding that includes:
      1. **Clear title** that summarizes the finding
      2. **Detailed description** of what was observed
      3. **Supporting quotes** from participants (2-3 per finding, with P## IDs when available)
      4. **Behavioral evidence** (what users did, not just what they said)
      5. **Frequency data** (X out of Y participants when available)
      6. **Specific recommendations** (2-3 actionable next steps)
      7. **Impact assessment** (how this affects user success)
      
      **Format for each finding:**
      ## Finding [X]: [Clear, specific title]
      
      **What we observed:** [Detailed description of the pattern or issue]
      
      **Supporting evidence:**
      > "[Complete quote from participant]" - P[X] (from session data)
      > "[Complete quote from participant]" - P[X] (from session data)
      > "[Complete quote from participant]" - P[X] (from session data)
      
      **Behavioral indicators:** [What users actually did during sessions - from session files]
      **Frequency:** [X out of Y participants experienced this - when session data available]
      
      **Recommendations:**
      • [Specific action 1]
      • [Specific action 2]  
      • [Specific action 3]
      
      **Impact:** [How this affects user success and business goals]

  # Create findings summary table
  - task_id: "findings_summary_table"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      Create a summary table of all findings:
      
      **Detailed Findings:** {{ai_generated.detailed_findings_analysis}}
      
      Summarize each finding in a scannable table format showing:
      - Finding title
      - Severity/Impact level
      - Frequency (how often observed)
      - Priority for action
      
      **Format as markdown table:**
      | Finding | Severity | Frequency | Priority | Quick Summary |
      |---------|----------|-----------|----------|---------------|
      | [Title 1] | High/Med/Low | [X/Y participants] | High/Med/Low | [One-line summary] |
      | [Title 2] | High/Med/Low | [X/Y participants] | High/Med/Low | [One-line summary] |
      
      **Severity Criteria:**
      - **High:** Prevents task completion or causes significant frustration
      - **Medium:** Creates friction but users can work around
      - **Low:** Minor inconvenience with minimal impact

  # Generate actionable next steps
  - task_id: "next_steps_generation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Make next steps specific and assignable
      
      Generate actionable next steps based on findings:
      
      **Findings:** {{ai_generated.detailed_findings_analysis}}
      **Router Recommendations:** {{recommendations}}
      
      Create 4-6 specific next steps that address the findings:
      
      1. **Immediate actions** (next 2 weeks)
      2. **Short-term initiatives** (next 1-2 months)
      3. **Research follow-ups** (additional studies needed)
      4. **Cross-team coordination** (who needs to be involved)
      
      **Format:**
      **Immediate Actions (Next 2 Weeks):**
      • [Specific action with owner/team]
      • [Specific action with owner/team]
      
      **Short-term Initiatives (1-2 Months):**
      • [Initiative with timeline and owner]
      • [Initiative with timeline and owner]
      
      **Research Follow-ups:**
      • [Additional research needed with rationale]
      • [Validation studies or deeper dives]
      
      **Cross-team Coordination:**
      • [Who needs to be involved and why]
      • [Stakeholder communication plan]

# Auto-generated/computed variables (enhanced with file processing)
auto_variables:
  - methodology_type: |
      extract_methodology(ai_generated.research_plan_extraction) || 
      extract_methodology(ai_generated.study_context_analysis) || "Usability Testing"
  - participant_count: |
      extract_participant_count(ai_generated.participant_tracker_extraction) || 
      extract_participant_count(ai_generated.participant_analysis) || "multiple participants"
  - finding_count: |
      count_findings(ai_generated.key_insights_extraction) || 3
  - session_duration: |
      extract_session_duration(ai_generated.research_plan_extraction) || 
      extract_session_duration(ai_generated.study_context_analysis) || "60 minutes"
  - product_area: |
      extract_product_area(ai_generated.research_plan_extraction) || 
      extract_product_area(ai_generated.study_context_analysis) || "Digital Services"
  - completion_rate: |
      extract_completion_rate(ai_generated.participant_tracker_extraction) || "high"
  - session_count: |
      count_sessions(ai_generated.session_files_synthesis) || 
      estimate_sessions(input_text) || "multiple sessions"
  - file_quality_score: |
      extract_quality_score(ai_generated.file_input_processing) || "medium"
  - data_sources: |
      identify_data_sources(ai_generated.file_input_processing) || "manual input"
  - current_date: |
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      generate_github_link(study_name, current_date) || null

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "structured"
  file_location: "05-shareouts/"
  file_name: "research_readout_{{study_name_slug}}_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "📊 Research Readout"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "🎯 Create Stakeholder Summary"
      action: "run_stakeholder_summary"
    - text: "💡 Generate Insight Cards"
      action: "run_insight_card"
    - text: "🐛 Extract GitHub Issues"
      action: "run_github_issues_generator"
    - text: "👥 Team-Specific Readouts"
      action: "run_team_readouts"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"

output_use: |
  Enhanced Research Readout leverages AI analysis to create comprehensive, VA-compliant research documentation 
  with intelligent insights extraction and stakeholder-ready formatting. Integrates router intelligence for 
  optimal data processing and confidence assessment.

  Use this method to:
    - Generate formal research documentation with AI-synthesized insights
    - Create structured findings with supporting evidence and quotes
    - Provide actionable recommendations with clear next steps
    - Support research handoffs and stakeholder decision-making

output_notes: |
  Methodology type ({{methodology_type}}) and participant count ({{participant_count}}) extracted from AI analysis.
  Finding count ({{finding_count}}) determined based on insight complexity.
  Session duration ({{session_duration}}) and product area ({{product_area}}) auto-detected.
  Write in clear, professional language at 10th-grade reading level.
  Use active voice, avoid business jargon and em-dashes.
  Include specific quotes and evidence to support findings.
  Format for formal documentation with clear hierarchy and scannable structure.

# Enhanced output template using AI-generated content and file processing
output_format: |
