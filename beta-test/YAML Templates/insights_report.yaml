id: insights_report
label: 📊 Insights Report
description: Turn a summary thread into a formatted report or slide outline 🧾
input_type: text
input_processing: summarize_if_long
prompt: |
  You are a research assistant helping convert a Slack summary thread into a formatted insights report or slide outline.
  
  Structure the output into:
  1. Title
  2. Key Insight Summary (3 bullet points)
  3. Supporting Quotes (3–5)
  4. Optional Slide Notes
  
  Use plain, accessible language at a 10th-grade reading level. Write in a professional but conversational tone. Use active voice and avoid jargon. Do not use em-dashes.
  
  Thread Input:
  {{input}}
output_format: |
  # 📌 [Title of Report]
  
  ## 🔍 Key Insight Summary
  - Insight 1
  - Insight 2
  - Insight 3
  
  ## 💬 Supporting Quotes
  - "Quote 1"
  - "Quote 2"
  - "Quote 3"
  - "Quote 4"
  - "Quote 5"
  
  ## 📝 Slide Notes (Optional)
  - Add visual or summary notes here