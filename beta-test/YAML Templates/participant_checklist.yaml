id: participant_checklist
label: "✅ Pre-Session Checklist"
description: Provides a checklist to help researchers prepare for a specific participant session.
input_type: structured
fields:
  participant_id: ""
  session_type: "interview | usability | observation"
prompt: |
  Generate a checklist of pre-session tasks for a {{session_type}} with participant {{participant_id}}. Use clear, action-oriented steps.
output_format: |
  ### Pre-Session Checklist for {{participant_id}}
  - [ ] Review the discussion guide
  - [ ] Confirm participant consent form
  - [ ] Set up recording or observation tools
  - [ ] Alert the note-taker or support staff
  - [ ] Verify incentive is prepared if applicable
