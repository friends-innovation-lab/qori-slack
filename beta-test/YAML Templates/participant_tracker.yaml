id: participant_tracker
label: 👥 Participant Tracker
description: Generate and manage participant tracker for a VA research study with recruitment tracking
input_type: structured
input_processing: validate_and_organize

# Structured inputs from Slack modal or import
inputs:
  study_id: "{{study_id}}"
  study_name: "{{study_name}}"
  participant_name: "{{participant_name}}"
  contact_details: "{{contact_details}}"
  recruitment_source: "{{recruitment_source}}"
  scheduled_date: "{{scheduled_date}}"
  scheduled_time: "{{scheduled_time}}"
  status_select: "{{status_select}}"
  notes_field: "{{notes_field}}"
  demographics_info: "{{demographics_info}}"
  current_date: "{{current_date}}"
  added_by: "{{added_by}}"
  import_source: "{{import_source}}" # manual, calendly, csv
  existing_participants: "{{existing_participants}}" # for updates
  session_context: "{{session_context}}" # study context for observer guidelines
  meeting_link: "{{meeting_link}}" # for observer guidelines
  session_duration: "{{session_duration}}" # default 45 minutes
  
  # Observer-related inputs
  observer_assignment: "{{observer_assignment}}" # when adding observers
  observer_user_id: "{{observer_user_id}}"
  observer_user_name: "{{observer_user_name}}"
  observer_role: "{{observer_role}}"
  observer_status: "{{observer_status}}" # confirmed, pending, removed
  triggered_by_observer_request: "{{triggered_by_observer_request}}" # true/false
  
# Participant status mappings
status_mappings:
  recruited: 
    display: "📝 Recruited"
    description: "Initial contact made, screening in progress"
  confirmed:
    display: "✅ Confirmed" 
    description: "Session scheduled and confirmed"
  completed:
    display: "🎯 Completed"
    description: "Session completed successfully"
  pending:
    display: "⏳ Pending"
    description: "Awaiting response from participant"
  rescheduling:
    display: "🕐 Rescheduling"
    description: "Need to reschedule session"
  backup:
    display: "🔄 Backup"
    description: "Backup participant if needed"
  canceled:
    display: "❌ Canceled"
    description: "Participant canceled or no-show"
  disqualified:
    display: "🚫 Disqualified"
    description: "Did not meet study criteria"

# Recruitment source mappings
recruitment_sources:
  internal_panel: "🗂️ Internal VA Panel"
  calendly: "📅 Calendly Signup"
  email_outreach: "📧 Email Outreach"
  phone: "📞 Phone Recruitment"
  referral: "🤝 Referral"
  online: "🌐 Social/Website"
  csv_import: "📊 CSV Import"
  api_import: "🔗 API Import"

# Observer management configuration
observer_management:
  capacity_per_session: 3
  auto_approve_users: ["{{trusted_team_members}}"]
  approval_required_users: ["{{stakeholder_users}}"]
  
  observer_roles:
    note_taker:
      label: "Note-taker"
      description: "Take detailed notes during session"
      auto_approve: true
    silent_observer:
      label: "Silent Observer"
      description: "Observe without taking notes"  
      auto_approve: true
    pm_observer:
      label: "PM Observer"
      description: "Focus on product/business insights"
      auto_approve: false
    stakeholder:
      label: "Stakeholder"
      description: "Executive or external observer"
      auto_approve: false

# Session data structure template
session_structure:
  - id: "{{participant_id}}"
    date: "{{session_date}}"
    time: "{{session_time}}"
    status: "{{session_status}}"
    observers:
      - name: "{{slack_user_id}}"
        role: "{{observer_role}}"
        status: "confirmed"
        added_by: "{{researcher_id}}"
        added_at: "{{timestamp}}"
    pending_observers:
      - name: "{{requesting_user_id}}"
        role: "{{requested_role}}"
        requested_at: "{{request_timestamp}}"
        reason: "{{observer_reason}}"
        status: "pending_approval"
    observer_feedback:
      - observer: "{{observer_user_id}}"
        feedback: "{{feedback_text}}"
        themes: ["{{theme1}}", "{{theme2}}"]
        submitted_at: "{{feedback_timestamp}}"

ai_generation_tasks: |
  You are managing a participant tracker for a VA research study. Generate or update a comprehensive participant tracking table based on the provided participant information and observer assignments.

  **Study Details:**
  - Study: {{study_name}}
  - Participant: {{participant_name}}
  - Contact: {{contact_details}}
  - Recruited via: {{recruitment_source}}
  - Status: {{status_select}}
  - Session Date: {{scheduled_date}} {{scheduled_time}}
  - Special Notes: {{notes_field}}
  - Demographics: {{demographics_info}}
  - Added by: {{added_by}}
  - Added on: {{current_date}}

  **Observer Information** (if applicable):
  - Observer Assignment: {{observer_assignment}}
  - Observer: {{observer_user_name}} ({{observer_user_id}})
  - Observer Role: {{observer_role}}
  - Observer Status: {{observer_status}}
  - Triggered by Observer Request: {{triggered_by_observer_request}}

  **Instructions:**
  
  1. **Generate Participant ID**: Create a unique participant ID (P01, P02, etc.) based on existing participants count
  2. **Format Contact Info**: Ensure contact information follows privacy guidelines (mask if needed for privacy)
  3. **Status Tracking**: Use appropriate status with emoji and clear description from status_mappings
  4. **Scheduling**: Format date/time clearly, handle TBD cases appropriately
  5. **Notes Management**: Include accommodations, demographics, recruitment source details
  6. **Recruitment Tracking**: Show recruitment method and track effectiveness
  7. **Observer Management**: Update observer assignments, track capacity, manage guidelines delivery

  **Observer Integration Logic:**
  - If {{triggered_by_observer_request}} is true, this update was triggered by an approved observer request
  - Update observer tables with new assignments
  - Track observer capacity per session (max 3)
  - Generate action items for observer guideline delivery
  - Include observer status in session scheduling section

  **Privacy Guidelines:**
  - Use participant aliases or initials instead of full names when possible
  - Mask email addresses if needed for privacy (j***@email.com)
  - Include accommodation needs for accessibility planning
  - Track demographics for diversity reporting (optional)

  **Calculations:**
  - Count total participants, confirmed sessions, pending responses, completed sessions
  - Calculate recruitment method breakdown with percentages
  - Track observer assignments and capacity utilization
  - Generate action items based on current status and missing information
  - Suggest next steps for recruitment, scheduling, and observer coordination

  **Existing Participants** (if updating tracker):
  {{existing_participants}}

  Generate a complete, well-organized participant tracker that includes this new participant/observer update and maintains all existing participant data with enhanced observer management.

output_template: |
  # 👥 Participant Tracker – {{study_name}}

  **📊 Recruitment Summary**
  - **Total Participants:** [Calculate total count]
  - **Confirmed Sessions:** [Count confirmed status]
  - **Pending Responses:** [Count pending status]
  - **Completed Sessions:** [Count completed status]
  - **Observer Assignments:** [Count total observer assignments across all sessions]
  - **Last Updated:** {{current_date}} by {{added_by}}

  ---

  ## 📋 Participant Details

  | ID | Name/Alias | Contact | Recruited Via | Scheduled | Status | Notes & Accommodations |
  |----|-----------|---------|-----------------|-----------|--------|----------------------|
  | [Generate participant rows including new participant with unique ID] |

  ---

  ## 🎯 Recruitment Progress

  | Recruitment Method | Count | Percentage |
  |--------------------|-------|------------|
  | [Generate breakdown of recruitment sources with counts and percentages] |

  **🔍 Recruitment Effectiveness:**
  [Analyze which recruitment methods are working best and suggest improvements]

  ---

  ## 📅 Session Schedule

  ### ✅ Confirmed Sessions
  [List all confirmed sessions with dates, times, participant IDs, and observer assignments]

  ### ⏳ Pending Scheduling
  [List participants who need session scheduling]

  ### 🕐 Rescheduling Needed
  [List any participants who need rescheduling]

  ---

  ## 👥 Observer Management

  **Session Observer Assignments:**
  [Generate detailed table showing observer assignments for each session]

  | Session | Date/Time | Observers | Capacity | Pending Requests | Guidelines Sent |
  |---------|-----------|-----------|----------|------------------|-----------------|
  | [Show observer data for each session including guideline delivery status] |

  **Observer Role Distribution:**
  | Role | Count | Sessions |
  |------|-------|----------|
  | 📝 Note-taker | [count] | [session list] |
  | 👁️ Silent Observer | [count] | [session list] |
  | 📊 PM Observer | [count] | [session list] |
  | 🏛️ Stakeholder | [count] | [session list] |

  **Observer Guidelines Status:**
  - **✅ Guidelines Sent:** [List observers who have received guidelines]
  - **⏳ Pending Delivery:** [List observers awaiting guidelines]
  - **🔄 Updates Needed:** [List observers needing updated guidelines]

  **Observer Guidelines:** 
  - Review session plan before observing
  - Stay muted unless emergency
  - Take notes without interrupting
  - Share feedback after session

  **🔄 Observer Action Items:**
  [Generate specific observer-related tasks based on current assignments and gaps]
  - [ ] Send guidelines to newly assigned observers
  - [ ] Update existing observers with session changes
  - [ ] Confirm observer availability 24hrs before sessions
  - [ ] Prepare observer-specific materials (templates, frameworks)

  ---

  ## 🔍 Action Items

  **🚨 Immediate Actions:**
  [Generate specific action items based on participant statuses and observer assignments]

  **📞 Follow-up Needed:**
  [List participants who need follow-up contact]

  **👀 Observer Coordination:**
  [List observer-specific action items]
  {% if triggered_by_observer_request %}
  - [ ] ✅ {{observer_user_name}} approved for {{session_id}} as {{observer_role}}
  - [ ] 📤 Send observer guidelines to {{observer_user_name}}
  - [ ] 📅 Add {{observer_user_name}} to {{session_id}} calendar invite
  - [ ] 🔄 Update session capacity tracking
  {% endif %}

  **📋 Recruitment Needs:**
  [Assess if more participants are needed and suggest recruitment strategies]

  ---

  ## 📝 Accessibility & Accommodations

  **Special Needs Summary:**
  [List all accommodation requirements across participants for planning purposes]

  **Preparation Checklist:**
  - [ ] Interpreter services arranged (if needed)
  - [ ] Accessible meeting platform confirmed
  - [ ] Screen reader compatibility tested
  - [ ] Alternative formats prepared
  - [ ] Session timing accommodations noted
  - [ ] Observer accessibility needs considered

  ---

  ## 📊 Demographics Overview (Optional)

  **Diversity Tracking:**
  [If demographics provided, show age range and location distribution for diversity assessment]

  ---

  **📝 Tracker Management:**
  - Use participant aliases for privacy protection
  - Update status after each participant interaction
  - Include accommodation needs for proper session planning
  - Track recruitment sources to analyze effectiveness
  - Coordinate with observers before each session
  - Send observer guidelines immediately upon assignment

  **🔄 Next Steps:**
  [Generate specific recommendations based on current tracker status:
  - If under target: suggest recruitment strategies
  - If scheduling gaps: suggest scheduling optimization
  - If accommodations needed: reminder to arrange services
  - If observers needed: suggest adding team members
  - If observer guidelines pending: immediate delivery required]

# Output configuration
output_options:
  filename: "{{study_name}}_participant_tracker_{{current_date}}.md"
  path: "02-participants/"
  generate_index: true
  index_filename: "README.md"
  
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      path: "02-participants/"
      commit_message: "Update participant tracker for {{study_name}}"
      
    slack:
      enabled: true
      send_dm: true
      target_user: "{{slack_user_id}}"
      include_copy_button: true
      include_email_format: false
      
      message: >
        👥 **Participant Tracker Updated** for {{study_name}}
        
        💾 Saved to: `{{filename}}`
        
        {% if participant_name %}
        **Participant Added:** {{participant_name}}
        **Status:** {{status_select}}
        **Recruitment Source:** {{recruitment_source}}
        {% endif %}
        
        {% if observer_assignment %}
        **Observer Update:** {{observer_user_name}} assigned as {{observer_role}}
        {% endif %}
      
      actions:
        - text: "📋 View Tracker"
          style: "primary"
          action_type: "url"
          url: "{{github_file_url}}"
          
        - text: "👥 Add Another Participant"
          style: "default"
          action_type: "modal"
          modal_id: "participant_tracker"

# Enhanced notification system with observer integration
notify:
  - role: researcher
    action: "Participant added to tracker"
    slack_tag: "@{{added_by}}"
    condition: "participant_name != null"
    
  - role: team
    action: "Recruitment status update"
    channel: "{{study_channel}}"
    condition: "participant_name != null"
    
  # NEW: Observer notifications
  - role: observer
    action: "Added to session"
    slack_dm: "{{observer_user_id}}"
    condition: "observer_assignment == true"
    message: >
      👀 **You've been assigned as observer!**
      
      **Session:** {{session_id}} - {{participant_name}}
      **Date:** {{scheduled_date}} at {{scheduled_time}}
      **Your Role:** {{observer_role}}
      
      📋 Observer guidelines are being sent to you now with session-specific preparation materials.
    auto_trigger: "observer_guide"
    trigger_params:
      observer_name: "{{observer_user_name}}"
      observer_role: "{{observer_role}}"
      session_id: "{{session_id}}"
      participant_name: "{{participant_name}}"
      session_date: "{{scheduled_date}}"
      session_time: "{{scheduled_time}}"
      
  - role: researcher
    action: "Observer assigned to session"
    slack_tag: "@{{researcher_slack_id}}"
    condition: "observer_assignment == true"
    message: "✅ {{observer_user_name}} confirmed as {{observer_role}} for {{session_id}}"

# Workflow integration with observer request system
workflow_integration:
  triggers:
    observer_request_approved:
      enabled: true
      action: "update_tracker_with_observer"
      data_mapping:
        observer_user_id: "requesting_user"
        observer_user_name: "requesting_user_name"
        observer_role: "requested_role"
        session_id: "session_id"
        triggered_by_observer_request: true
      
    manual_observer_assignment:
      enabled: true
      action: "update_tracker_with_observer"
      
  auto_triggers:
    observer_guidelines:
      condition: "observer_assignment == true AND observer_status == confirmed"
      target_workflow: "observer_guide"
      delay: "immediate"
      
    capacity_alert:
      condition: "observer_count >= 3"
      action: "notify_researcher_capacity_reached"
      
# Integration data mappings for cross-workflow communication
integration_mappings:
  from_observer_request:
    requesting_user: "observer_user_id"
    requesting_user_name: "observer_user_name" 
    requested_role: "observer_role"
    session_id: "session_id"
    
  to_observer_guide:
    observer_user_name: "observer_name"
    observer_role: "observer_role"
    session_id: "session_id"
    participant_name: "participant_name"
    scheduled_date: "session_date"
    scheduled_time: "session_time"

# Capacity management and validation
capacity_management:
  max_observers_per_session: 3
  role_limits:
    note_taker: 1
    stakeholder: 1
    pm_observer: 2
    silent_observer: 3
    
  validation_rules:
    - check_session_capacity_before_assignment
    - validate_observer_role_limits
    - confirm_no_duplicate_assignments
    
  overflow_handling:
    action: "create_waitlist"
    notification: "notify_researcher_and_requester"
