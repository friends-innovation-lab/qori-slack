id: participant_tracker
label: 👥 Participant Tracker
description: Generate and manage participant tracker for a VA research study with recruitment tracking
input_type: structured
input_processing: validate_and_organize

# Structured inputs from Slack modal or import
inputs:
  study_id: "{{study_id}}"
  study_name: "{{study_name}}"
  participant_name: "{{participant_name}}"
  recruitment_source: "{{recruitment_source}}"
  scheduled_date: "{{scheduled_date}}"
  scheduled_time: "{{scheduled_time}}"
  status_select: "{{status_select}}"
  notes_field: "{{notes_field}}"
  
  # New demographic inputs
  race_ethnicity: "{{race_ethnicity}}"
  age_range: "{{age_range}}"
  education_level: "{{education_level}}"
  location_type: "{{location_type}}"
  
  current_date: "{{current_date}}"
  added_by: "{{added_by}}"
  import_source: "{{import_source}}" # manual, csv
  existing_participants: "{{existing_participants}}" # for updates
  session_context: "{{session_context}}" # study context
  meeting_link: "{{meeting_link}}"
  session_duration: "{{session_duration}}" # default 45 minutes
  
  # Observer-related inputs
  observer_assignment: "{{observer_assignment}}" # when adding observers
  observer_user_id: "{{observer_user_id}}"
  observer_user_name: "{{observer_user_name}}"
  observer_role: "{{observer_role}}"
  observer_status: "{{observer_status}}" # confirmed, pending, removed
  triggered_by_observer_request: "{{triggered_by_observer_request}}" # true/false

# Participant status mappings
status_mappings:
  recruited: 
    display: "📝 Recruited"
    description: "Initial contact made, screening in progress"
  confirmed:
    display: "✅ Confirmed" 
    description: "Session scheduled and confirmed"
  completed:
    display: "🎯 Completed"
    description: "Session completed successfully"
  pending:
    display: "⏳ Pending"
    description: "Awaiting response from participant"
  rescheduling:
    display: "🕐 Rescheduling"
    description: "Need to reschedule session"
  backup:
    display: "🔄 Backup"
    description: "Backup participant if needed"
  canceled:
    display: "❌ Canceled"
    description: "Participant canceled or no-show"
  disqualified:
    display: "🚫 Disqualified"
    description: "Did not meet study criteria"

# Recruitment source mappings (removed calendly)
recruitment_sources:
  internal_panel: "🗂️ Internal VA Panel"
  email_outreach: "📧 Email Outreach"
  phone: "📞 Phone Recruitment"
  referral: "🤝 Referral"
  online: "🌐 Social/Website"
  csv_import: "📊 CSV Import"
  api_import: "🔗 API Import"

# Demographic mappings
demographic_mappings:
  race_ethnicity:
    american_indian: "American Indian or Alaska Native"
    asian: "Asian"
    black: "Black or African American"
    hispanic_latino: "Hispanic or Latino"
    native_hawaiian: "Native Hawaiian or Other Pacific Islander"
    white: "White"
    two_or_more: "Two or More Races"
    prefer_not_to_say: "Prefer not to say"
  
  age_range:
    "18-24": "18-24"
    "25-34": "25-34"
    "35-44": "35-44"
    "45-54": "45-54"
    "55-64": "55-64"
    "65-74": "65-74"
    "75+": "75+"
    prefer_not_to_say: "Prefer not to say"
  
  education_level:
    less_than_high_school: "Less than high school"
    high_school: "High school diploma/GED"
    some_college: "Some college"
    associate: "Associate degree"
    bachelor: "Bachelor's degree"
    master: "Master's degree"
    professional: "Professional degree"
    doctorate: "Doctorate degree"
    prefer_not_to_say: "Prefer not to say"
  
  location_type:
    urban: "Urban"
    suburban: "Suburban"
    rural: "Rural"
    prefer_not_to_say: "Prefer not to say"

# Observer management configuration
observer_management:
  capacity_per_session: 3
  auto_approve_users: ["{{trusted_team_members}}"]
  approval_required_users: ["{{stakeholder_users}}"]
  
  observer_roles:
    note_taker:
      label: "Note-taker"
      description: "Take detailed notes during session"
      auto_approve: true
    silent_observer:
      label: "Silent Observer"
      description: "Observe without taking notes"  
      auto_approve: true
    pm_observer:
      label: "PM Observer"
      description: "Focus on product/business insights"
      auto_approve: false
    stakeholder:
      label: "Stakeholder"
      description: "Executive or external observer"
      auto_approve: false

# Session data structure template
session_structure:
  - id: "{{participant_id}}"
    date: "{{session_date}}"
    time: "{{session_time}}"
    status: "{{session_status}}"
    observers:
      - name: "{{slack_user_id}}"
        role: "{{observer_role}}"
        status: "confirmed"
        added_by: "{{researcher_id}}"
        added_at: "{{timestamp}}"
    pending_observers:
      - name: "{{requesting_user_id}}"
        role: "{{requested_role}}"
        requested_at: "{{request_timestamp}}"
        reason: "{{observer_reason}}"
        status: "pending_approval"

# UPDATED OUTPUT TEMPLATE - Cleaner with collapsible sections
output_template: |
  # 👥 Participant Tracker — {{study_name}}

  **📊 Recruitment Summary**

  | Total | Confirmed | Pending | Completed |
  |:-----:|:---------:|:-------:|:---------:|
  | {{total_participants_count}} | {{confirmed_sessions_count}} | {{pending_responses_count}} | {{completed_sessions_count}} |

  **Last Updated:** {{current_date}} by {{added_by}}

  ---

  ## 📋 Participant Details

  | ID | Alias | Recruited Via | Scheduled | Status | Notes & Accommodations |
  |----|-------|---------------|-----------|--------|------------------------|
  {{#each participants}}
  | {{id}} | {{participant_name}} | {{recruitment_source}} | {{scheduled_date}} {{scheduled_time}} | {{status_select}} | {{notes_field}} |
  {{/each}}

  ---

  ## 🎯 Recruitment Progress

  | Recruitment Method | Count | Percentage |
  |--------------------|-------|------------|
  {{#each recruitment_breakdown}}
  | {{method}} | {{count}} | {{percentage}}% |
  {{/each}}

  {{recruitment_analysis}}

  ---

  ## 👥 Observer Management

  **Session Assignments:**

  | Session | Date/Time | Observers | Capacity | Pending Requests | Guidelines Sent |
  |---------|-----------|-----------|----------|------------------|-----------------|
  {{#each session_observers}}
  | {{session_id}} | {{date_time}} | {{observers}} ({{observer_role}}) | {{capacity}}/3 | {{pending_count}} | ✅ Sent |
  {{/each}}

  **Role Distribution:**

  | Role | Count | Sessions |
  |------|-------|----------|
  | 📝 Note-taker | {{note_taker_count}} | {{note_taker_sessions}} |
  | 👁️ Silent Observer | {{silent_observer_count}} | {{silent_observer_sessions}} |
  | 📊 PM Observer | {{pm_observer_count}} | {{pm_observer_sessions}} |
  | 🏛️ Stakeholder | {{stakeholder_count}} | {{stakeholder_sessions}} |

  **Guidelines:** Review session plan beforehand, stay muted, take notes without interrupting, share feedback after session.

  ---

  <details>
  <summary><strong>📊 Demographics Overview</strong></summary>

  **Race/Ethnicity:**

  | Category | Count | Percentage |
  |----------|-------|------------|
  {{#each race_ethnicity_breakdown}}
  | {{category}} | {{count}} | {{percentage}}% |
  {{/each}}

  **Age Range:**

  | Range | Count | Percentage |
  |-------|-------|------------|
  {{#each age_range_breakdown}}
  | {{range}} | {{count}} | {{percentage}}% |
  {{/each}}

  **Education Level:**

  | Level | Count | Percentage |
  |-------|-------|------------|
  {{#each education_breakdown}}
  | {{level}} | {{count}} | {{percentage}}% |
  {{/each}}

  **Location Type:**

  | Type | Count | Percentage |
  |------|-------|------------|
  {{#each location_breakdown}}
  | {{type}} | {{count}} | {{percentage}}% |
  {{/each}}

  </details>

  ---

  ## ♿ Accessibility & Accommodations

  {{#each accommodations}}
  - **{{participant_id}}:** {{accommodation_details}}
  {{/each}}

  **Preparation Checklist:**
  - [ ] Interpreter services arranged (if needed)
  - [ ] Accessible meeting platform confirmed
  - [ ] Screen reader compatibility tested
  - [ ] Alternative formats prepared
  - [ ] Session timing accommodations noted

  ---

  ## 📌 Next Steps

  > [!NOTE]
  > {{next_steps_recommendations}}

  ---

  **🔒 Privacy Reminder:** Use participant aliases only. Update status after each interaction.

# Output configuration
output_options:
  filename: "{{study_name}}_participant_tracker.md"
  path: "02-participants/"
  generate_index: true
  index_filename: "README.md"
  
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      path: "02-participants/"
      commit_message: "Update participant tracker for {{study_name}}"
      
    slack:
      enabled: true
      send_dm: true
      target_user: "{{slack_user_id}}"
      include_copy_button: true
      include_email_format: false
      
      message: >
        👥 **Participant Tracker Updated** for {{study_name}}
        
        💾 Saved to: `{{filename}}`
        
        {% if participant_name %}
        **Participant Added:** {{participant_name}}
        **Status:** {{status_select}}
        **Recruitment Source:** {{recruitment_source}}
        {% endif %}
        
        {% if observer_assignment %}
        **Observer Update:** {{observer_user_name}} assigned as {{observer_role}}
        {% endif %}
      
      actions:
        - text: "📋 View Tracker"
          style: "primary"
          action_type: "url"
          url: "{{github_file_url}}"
          
        - text: "👥 Add Another Participant"
          style: "default"
          action_type: "modal"
          modal_id: "participant_tracker"

# Enhanced notification system with observer integration
notify:
  - role: researcher
    action: "Participant added to tracker"
    slack_tag: "@{{added_by}}"
    condition: "participant_name != null"
    
  - role: team
    action: "Recruitment status update"
    channel: "{{study_channel}}"
    condition: "participant_name != null"
    
  # Observer notifications
  - role: observer
    action: "Added to session"
    slack_dm: "{{observer_user_id}}"
    condition: "observer_assignment == true"
    message: >
      👀 **You've been assigned as observer!**
      
      **Session:** {{session_id}} - {{participant_name}}
      **Date:** {{scheduled_date}} at {{scheduled_time}}
      **Your Role:** {{observer_role}}
      
      📋 Observer guidelines are being sent to you now with session-specific preparation materials.
    auto_trigger: "observer_guide"
    trigger_params:
      observer_name: "{{observer_user_name}}"
      observer_role: "{{observer_role}}"
      session_id: "{{session_id}}"
      participant_name: "{{participant_name}}"
      session_date: "{{scheduled_date}}"
      session_time: "{{scheduled_time}}"
      
  - role: researcher
    action: "Observer assigned to session"
    slack_tag: "@{{researcher_slack_id}}"
    condition: "observer_assignment == true"
    message: "✅ {{observer_user_name}} confirmed as {{observer_role}} for {{session_id}}"

# Workflow integration with observer request system
workflow_integration:
  triggers:
    observer_request_approved:
      enabled: true
      action: "update_tracker_with_observer"
      data_mapping:
        observer_user_id: "requesting_user"
        observer_user_name: "requesting_user_name"
        observer_role: "requested_role"
        session_id: "session_id"
        triggered_by_observer_request: true
      
    manual_observer_assignment:
      enabled: true
      action: "update_tracker_with_observer"
      
  auto_triggers:
    observer_guidelines:
      condition: "observer_assignment == true AND observer_status == confirmed"
      target_workflow: "observer_guide"
      delay: "immediate"
      
    capacity_alert:
      condition: "observer_count >= 3"
      action: "notify_researcher_capacity_reached"
      
# Integration data mappings for cross-workflow communication
integration_mappings:
  from_observer_request:
    requesting_user: "observer_user_id"
    requesting_user_name: "observer_user_name" 
    requested_role: "observer_role"
    session_id: "session_id"
    
  to_observer_guide:
    observer_user_name: "observer_name"
    observer_role: "observer_role"
    session_id: "session_id"
    participant_name: "participant_name"
    scheduled_date: "session_date"
    scheduled_time: "session_time"

# Capacity management and validation
capacity_management:
  max_observers_per_session: 3
  role_limits:
    note_taker: 1
    stakeholder: 1
    pm_observer: 2
    silent_observer: 3
    
  validation_rules:
    - check_session_capacity_before_assignment
    - validate_observer_role_limits
    - confirm_no_duplicate_assignments
    
  overflow_handling:
    action: "create_waitlist"
    notification: "notify_researcher_and_requester"
