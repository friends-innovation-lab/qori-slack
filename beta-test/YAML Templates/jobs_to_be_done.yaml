id: jobs_to_be_done
name: extract_jobs_to_be_done

label: 🎯 Jobs-To-Be-Done Extraction
version: "v1.5"

description: >
  Extract clear, actionable Jobs-To-Be-Done (JTBD) from research input including quotes, notes, or observations.
  Each job includes a user goal, barrier, and the broader significance of that job in the context of product or service design.
  Ideal for researchers, designers, and product teams turning raw insights into prioritized opportunities.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-06-27

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

input_variables:
  - input_text         # Raw quotes, notes, summaries, or observations
  - max_jobs           # Optional: Number of jobs to return (default 3)
  - study_name         # Optional: Title of study or Slack message context

output_use: |
  Use this when you want to translate research into jobs that guide product decisions.
  JTBDs help product, design, and policy teams understand real user goals, tensions, and system-level blockers.
  Output is ready for Slack, GitHub issues, or readouts.

output_notes: |
  Write in plain, confident language. Avoid tech jargon, filler words, or speculative statements.
  Make sure “Why it Matters” connects to the broader study or user need — not just UX ease.
  Add line breaks and horizontal rules between jobs for readability in Slack.

persona_hinting: |
  Common personas include:
    - Black first-time investor
    - Veteran applying for housing
    - Rural benefits navigator
    - Caregiver managing multiple services
    - Young adult navigating a job loss
    - Small business owner dealing with bureaucracy

# Output schema:
# - Persona: string
# - Job: string
# - Obstacle: string
# - Why it Matters: string
# - Tags: [string[]]
# - Signal: optional string (e.g., how frequently this was raised in interviews or notes)
# - Opportunity: optional string (e.g., a design, content, or system fix that might help)
# - Source: optional string (e.g., session, quote, study reference)
# - Pull Quote: optional string (verbatim quote that best reflects this job or obstacle)

output_format: |
  📌 *JOBS-TO-BE-DONE: {{study_name | default("SUMMARY")}}*
  🔗 *Study Link:* {{study_link | default("No link provided")}}

  👋 Hi team! Here are structured JTBDs from this round of research. Each one highlights a user goal, the barrier in the way, and why it matters. Feel free to thread your thoughts, product ideas, or questions.

  ---

  🛠️ *JOB 1: [Job Summary Title]*

  *Persona:* [Short user description]  
  *Job:* [What they’re trying to do]  
  *Obstacle:* [What’s in their way]  
  *Why it Matters:* [Why this goal matters in context]

  > “[Pull quote that captures the tension or need]”

  *Tags:* [e.g. trust, access, navigation]  
  🔥 *Signal:* [Mentioned in 4 interviews]  
  ✅ *Opportunity:* [What could be built, improved, or rethought]  
  📚 *Source:* [e.g., Study 3, Session 2, Quote 14]

  ---

  🛠️ *JOB 2: [Job Summary Title]*

  *Persona:* ...  
  *Job:* ...  
  *Obstacle:* ...  
  *Why it Matters:* ...

  > “Pull quote here if available.”

  *Tags:* ...  
  🔥 *Signal:* ...  
  ✅ *Opportunity:* ...  
  📚 *Source:* ...

  ---

  🛠️ *JOB 3: [Job Summary Title]*

  *Persona:* ...  
  *Job:* ...  
  *Obstacle:* ...  
  *Why it Matters:* ...

  > “Pull quote here if available.”

  *Tags:* ...  
  🔥 *Signal:* ...  
  ✅ *Opportunity:* ...  
  📚 *Source:* ...

prompt: |
  You are a senior civic tech strategist and qualitative researcher with over 10 years of experience
  helping teams turn raw research into clear, actionable Jobs-To-Be-Done (JTBD) that inform product and policy decisions.

  Based on the input provided — whether it includes direct quotes, researcher notes, field observations,
  or thematic summaries — extract up to {{max_jobs | default(3)}} distinct Jobs-To-Be-Done.

  Each JTBD should help a product or delivery team understand:
    - What a real person is trying to accomplish
    - What barriers or conditions are preventing success
    - Why that job matters in the broader context of the study or service being designed

  Each JTBD must include:
    - A summary title
    - Persona
    - Job (goal)
    - Obstacle (barrier)
    - Why it Matters (real-world impact or stakes)
    - Tags
    - Signal 🔥 (e.g., “Mentioned in 4 interviews”, “Recurring across field notes”)
    - Opportunity ✅ (e.g., “Simplify recertification checklist”, “Add eligibility explainer”)
    - Source 📚 (e.g., “Session 3, Quote 12” or “Field notes – Week 2”)
    - Pull Quote 💬 (if available): A direct quote that captures the user's tension or goal

  ⚠️ You must return no more than {{max_jobs | default(3)}} JTBDs.

  Write in clear, professional, and human language. Avoid filler phrases like “to make it easier.”
  Anchor the job in the person’s goal, and the “why it matters” in the research mission or system impact.
  Format for Slack using bold headers, spacing, and horizontal rules.  
  Add spacing between each job for visual clarity.
