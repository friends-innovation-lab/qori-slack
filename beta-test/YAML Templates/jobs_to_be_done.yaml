id: jobs_to_be_done
name: extract_jobs_to_be_done

label: 🎯 Jobs to be Done
version: "v2.0"

description: >
  Extract clear, actionable Jobs-To-Be-Done (JTBD) from civic tech research inputs, including quotes, notes, and observations.
  Automatically discovers and analyzes research files from selected study folder with optional quality improvements. 
  Uses when/want/so structure to identify user goals, barriers, and opportunities for improved service delivery.

author: Qori R&D
created: 2025-06-26
last_updated: 2025-09-10

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.4
  max_tokens: 4000

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 1000
  max_file_size: 100000
  supported_formats: [".md", ".txt", ".csv", ".json"]
  max_files_per_analysis: 20

# Privacy controls
privacy_controls:
  enable_pii_detection: true
  pii_detection_patterns:
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
    phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    ssn: '\b\d{3}-\d{2}-\d{4}\b'
  masking_strategy:
    email: "[EMAIL_REDACTED]"
    phone: "[PHONE_REDACTED]" 
    ssn: "[SSN_REDACTED]"

# Slack modal input variables
input_variables:
  - selected_study              # Study name from dropdown (REQUIRED)
  - include_research_plan       # Boolean from checkbox (OPTIONAL)
  - include_participant_notes   # Boolean from checkbox (OPTIONAL)  
  - include_raw_transcripts     # Boolean from checkbox (OPTIONAL)
  
  # Auto-generated during processing
  - discovered_files            # Files found by auto-discovery (GENERATED)
  - combined_file_content       # Auto-combined content (GENERATED)
  - quality_assessment          # Initial quality score (GENERATED)

# Study metadata mapping
study_metadata:
  "VA Housing Application Usability Study":
    folder: "va-housing-usability-2025"
    researcher: "jordan.researcher"
    channel: "#research-housing-app"
    focus_area: "housing application process"
    
  "Benefits Portal Navigation Research":
    folder: "benefits-portal-nav-2025"
    researcher: "alex.ux"
    channel: "#research-benefits"
    focus_area: "benefits portal navigation"
    
  "Veteran Onboarding Experience Study":
    folder: "veteran-onboarding-2025"
    researcher: "casey.research"
    channel: "#research-onboarding"
    focus_area: "veteran onboarding experience"

# File discovery system
auto_file_discovery:
  core_files:
    session_summaries:
      file_patterns: ["*session_summary*", "*summary*", "*session*"]
      search_paths: ["01-sessions/", "sessions/", "summaries/"]
      priority: "required"
      confidence_weight: 50
      
    transcripts:
      file_patterns: ["*transcript*", "*interview*", "*recording*"]
      search_paths: ["01-sessions/", "transcripts/", "interviews/"]
      priority: "high"
      confidence_weight: 30
  
  enhancement_files:
    research_plan:
      enabled_when: "{{include_research_plan}} == true"
      file_patterns: ["*research_plan*", "*study_plan*", "*methodology*"]
      search_paths: ["00-planning/", "planning/", "research/"]
      confidence_boost: 8
      
    participant_notes:
      enabled_when: "{{include_participant_notes}} == true"
      file_patterns: ["*participant*", "*notes*", "*observations*"]
      search_paths: ["02-participants/", "participants/", "notes/"]
      confidence_boost: 5
      
    raw_transcripts:
      enabled_when: "{{include_raw_transcripts}} == true"
      file_patterns: ["*raw*", "*unprocessed*", "*recording*"]
      search_paths: ["01-sessions/raw/", "raw/", "recordings/"]
      confidence_boost: 3

# AI generation tasks
ai_generation_tasks:
  # File discovery and quality assessment
  - task_id: "file_discovery_summary"
    prompt: |
      As a research operations specialist, analyze the discovered files and quality:
      
      **Selected Study:** {{selected_study}}
      **Enhancement Options Selected:**
      - Research plan: {{include_research_plan}}
      - Participant notes: {{include_participant_notes}}
      - Raw transcripts: {{include_raw_transcripts}}
      
      **Discovered Files:** {{discovered_files}}
      **Total Content:** [Analyze character/word count of combined_file_content]
      
      Report on file coverage, content quality, enhancement impact, and analysis confidence for JTBD extraction.

  # Analyze job complexity and determine optimal approach
  - task_id: "job_scope_analysis"
    prompt: |
      As an experienced JTBD researcher specializing in civic tech, analyze the scope and complexity for Jobs-to-be-Done extraction:
      
      **Study:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      **Input Data:** {{combined_file_content}}
      **Quality Assessment:** {{ai_generated.file_discovery_summary}}
      
      Analyze:
      1. **Job Complexity Level:** How many distinct jobs are represented in the data?
      2. **Optimal Job Count:** Based on data patterns and user role diversity, how many JTBD should be extracted?
      3. **User Role Diversity:** What different types of users/roles are represented?
      4. **Data Suitability:** How well does the data support JTBD extraction?
      5. **Analysis Confidence:** What confidence level is appropriate for JTBD analysis?
      
      **Format:**
      **Job Complexity Level:** [High/Medium/Low] - [specific details about variety in user goals and contexts]
      **Recommended Job Count:** [2-5 jobs] - [reasoning based on distinct job patterns and user roles]
      **User Role Diversity:** [List different user types/roles identified: veterans, navigators, staff, etc.]
      **Data Suitability:** [Excellent/Good/Adequate/Poor] for JTBD extraction - [reasoning]
      **Analysis Confidence:** [High/Medium/Low] - [reasoning based on file assessment]
      **Primary Context:** [Main civic/service context for the jobs]

  # Identify potential jobs and user contexts
  - task_id: "job_identification"
    prompt: |
      As an experienced JTBD researcher, identify potential jobs from the research data:
      
      **Input Data:** {{combined_file_content}}
      **Job Context:** {{ai_generated.job_scope_analysis}}
      **Study Context:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      
      Based on the recommended job count, identify each distinct job:
      
      1. **Job Themes:** What are the core jobs people are trying to get done?
      2. **User Contexts:** What situations trigger each job?
      3. **Job Distinctiveness:** How are the jobs different from each other?
      4. **Evidence Support:** What data supports each identified job?
      5. **Role Variations:** How do different user roles approach the same job differently?
      
      **Format for each potential job:**
      **Job [X]: "[Descriptive job title]"**
      - **Core Motivation:** [What the user is fundamentally trying to accomplish]
      - **Triggering Context:** [Situation that creates the need for this job]
      - **User Types:** [Which types of users have this job - veterans, staff, navigators, etc.]
      - **Job Scope:** [How broad or specific this job is]
      - **Supporting Evidence:** [Quotes or patterns that indicate this job exists]
      - **Distinctiveness:** [How this job differs from other identified jobs]
      
      Requirements:
      - Focus on jobs that reveal user motivations, not just surface-level tasks
      - Look for emotional and functional dimensions
      - Recognize different user roles and contexts
      - Ensure jobs are genuinely distinct from each other
      - Ground each job in actual research evidence

  # Develop JTBD narratives using when/want/so structure
  - task_id: "jtbd_narrative_development"
    prompt: |
      As an experienced JTBD researcher, develop complete narratives for each identified job:
      
      **Identified Jobs:** {{ai_generated.job_identification}}
      **Input Data:** {{combined_file_content}}
      
      For each job, develop the classic JTBD narrative structure:
      
      **Format for each job:**
      **Job: "[Job title]"**
      
      🎯 **JTBD Narrative:** *When* [specific context/situation], *I want to* [specific goal/action], *so I can* [desired outcome/benefit].
      
      📋 **Job Breakdown:**
      - **When (Context):** [Specific situation that triggers this job - be detailed and realistic]
      - **I want to (Goal):** [Specific action or capability the user seeks]
      - **So I can (Outcome):** [Underlying benefit or result they're after]
      
      👤 **Primary User:** [Most common user type for this job]
      📊 **Job Frequency:** [How often this job occurs - daily, weekly, situational, etc.]
      💬 **Supporting Evidence:** [Specific quotes or observations that support this JTBD narrative]
      
      Requirements:
      - Make contexts specific and realistic, not generic
      - Ensure goals are actionable and concrete
      - Connect outcomes to real user benefits and motivations
      - Base all elements on actual data evidence
      - Avoid abstract or theoretical job statements

  # Analyze obstacles and barriers preventing job completion
  - task_id: "obstacle_barrier_analysis"
    prompt: |
      As an experienced UX researcher specializing in civic services, analyze obstacles preventing job completion:
      
      **JTBD Narratives:** {{ai_generated.jtbd_narrative_development}}
      **Input Data:** {{combined_file_content}}
      **Study Context:** {{selected_study}}
      
      For each job, identify:
      1. **Current Obstacles:** What's preventing users from completing this job successfully?
      2. **System Barriers:** What structural or process issues create friction?
      3. **Information Gaps:** What knowledge or clarity is missing?
      4. **Emotional Barriers:** What fears, anxieties, or confidence issues interfere?
      5. **Resource Constraints:** What capacity or capability limitations exist?
      
      **Format for each job:**
      **Job: "[Job title]"**
      
      🚧 **Current Obstacles:** [Comprehensive list of what prevents job completion - be specific]
      🏛️ **System Barriers:** [Structural, process, or policy issues that create friction]
      ❓ **Information Gaps:** [What users don't know or can't find out]
      😟 **Emotional Barriers:** [Fears, anxieties, confidence issues, trust problems]
      ⚡ **Resource Constraints:** [Time, capacity, skill, or access limitations]
      🎯 **Primary Blocker:** [The biggest single obstacle preventing job success]
      📊 **Impact Severity:** [High/Medium/Low] - [How much obstacles affect job completion]
      💬 **Evidence:** [Specific quotes or observations that demonstrate these obstacles]
      
      Requirements:
      - Make obstacles specific and actionable, not generic
      - Connect barriers to actual user experiences from data
      - Prioritize obstacles by impact on job completion
      - Focus on barriers teams can potentially address

  # Assess civic significance and broader impact
  - task_id: "civic_impact_assessment"
    prompt: |
      As an experienced civic tech strategist, assess the broader significance of each job:
      
      **Jobs with Obstacles:** {{ai_generated.obstacle_barrier_analysis}}
      **Study Context:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      
      For each job, assess:
      1. **Civic Significance:** Why does this job matter for public service delivery?
      2. **Systemic Impact:** How does job failure affect broader systems or outcomes?
      3. **User Impact:** What happens to individuals when this job fails?
      4. **Organizational Impact:** How does job friction affect government/service efficiency?
      5. **Policy Implications:** What policy or process changes could address job barriers?
      
      **Format for each job:**
      **Job: "[Job title]"**
      
      🏛️ **Civic Significance:** [Why this job matters for public service delivery - specific benefits to civic mission]
      🌍 **Systemic Impact:** [How job success/failure affects broader systems, processes, or outcomes]
      👤 **User Impact:** [Specific consequences for individuals when this job fails or succeeds]
      🏢 **Organizational Impact:** [How job friction affects government efficiency, staff workload, or service quality]
      📋 **Policy Implications:** [What policy, process, or regulatory changes could address job barriers]
      ⭐ **Priority Level:** [High/Medium/Low] - [reasoning based on civic impact and user consequences]
      📈 **Success Metrics:** [How to measure if this job is being completed successfully]
      
      Requirements:
      - Connect significance to real-world civic and service outcomes
      - Show specific impact on both users and systems
      - Avoid generic "important for users" statements
      - Focus on measurable consequences and benefits

  # Generate actionable opportunities for each job
  - task_id: "job_opportunity_generation"
    prompt: |
      As an experienced civic service designer, generate actionable opportunities for each job:
      
      **Jobs with Impact Assessment:** {{ai_generated.civic_impact_assessment}}
      **Obstacle Analysis:** {{ai_generated.obstacle_barrier_analysis}}
      **Study Context:** {{selected_study}}
      
      For each job, generate:
      1. **Primary Opportunity:** Most impactful way to support job completion
      2. **Implementation Approach:** Specific steps civic teams could take
      3. **Quick Wins:** Immediate actions that could reduce job friction
      4. **Long-term Solutions:** Systemic changes that would transform job experience
      
      **Format for each job:**
      **Job: "[Job title]"**
      
      💡 **Primary Opportunity:** [Specific, actionable intervention that directly addresses the primary blocker]
      
      🛠️ **Implementation Approach:**
      - [Immediate action]: [What team should do this and timeline]
      - [System change]: [What structural improvement is needed]
      - [Resource requirement]: [What capacity or tools are needed]
      
      ⚡ **Quick Wins:** [2-3 immediate actions that could reduce job friction within weeks]
      🚀 **Long-term Solutions:** [Systemic changes that would transform the job experience]
      📊 **Success Indicators:** [How to measure if opportunities successfully support job completion]
      🎯 **Team Ownership:** [Which teams/roles should own different aspects of this opportunity]
      
      **Examples of good civic opportunities:**
      - "Create a unified eligibility checker that gives real-time, consistent answers across all staff"
      - "Develop a pre-application checklist that shows exactly what documents are needed for each benefit"
      - "Implement proactive status updates that eliminate the need for users to call for progress"
      
      **NOT vague opportunities like:**
      - "Improve communication"
      - "Better user experience"
      - "More efficient processes"

  # Generate supporting quotes and evidence validation
  - task_id: "evidence_quote_generation"
    prompt: |
      As an experienced qualitative researcher, identify supporting quotes and validate evidence for each job:
      
      **Complete Job Analysis:**
      {{ai_generated.jtbd_narrative_development}}
      {{ai_generated.obstacle_barrier_analysis}}
      
      **Input Data:** {{combined_file_content}}
      
      For each job, find:
      1. **Representative Quote:** Direct quote that best illustrates the job
      2. **Signal Strength:** How often this job appears in the data
      3. **Evidence Quality:** How well-supported this job is
      4. **Additional Supporting Evidence:** Other quotes that reinforce the job
      
      **Format for each job:**
      **Job: "[Job title]"**
      
      💬 **Representative Quote:** "[Direct quote from data that clearly illustrates this job - use actual participant language]"
      📊 **Signal Strength:** [How often this job appears: "Mentioned by X participants" / "Consistent theme across sessions" / "Strong recurring pattern" / "Well-documented example"]
      ✅ **Evidence Quality:** [Strong/Moderate/Limited] - [assessment of how well data supports this job]
      📝 **Additional Evidence:** [Other quotes or observations that support this job]
      
      Requirements:
      - Use direct quotes that genuinely demonstrate the job
      - Be specific about signal strength - use actual numbers when possible
      - Assess evidence quality honestly based on data strength
      - Choose additional evidence that reinforces the job narrative

# Processing workflow
processing_workflow:
  1. validate_slack_modal_inputs
  2. discover_files_from_study_selection
  3. calculate_initial_quality_assessment
  4. validate_discovered_files
  5. combine_selected_files_with_truncation
  6. execute_file_discovery_summary
  7. execute_job_scope_analysis
  8. execute_job_identification
  9. execute_jtbd_narrative_development
  10. execute_obstacle_barrier_analysis
  11. execute_civic_impact_assessment
  12. execute_job_opportunity_generation
  13. execute_evidence_quote_generation
  14. format_slack_output
  15. format_github_output
  16. save_to_analysis_folder
  17. send_team_notifications

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "jtbd_focused"
  file_format: "github_markdown"
  path: "04-analysis/jobs-to-be-done/"
  filename: "{{study_folder}}_jobs_to_be_done_{{current_date}}.md"

# Slack output template
output_template: |
