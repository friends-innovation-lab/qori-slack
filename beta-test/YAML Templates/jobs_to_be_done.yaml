# Auto-generated variables
auto_variables:
  - max_jobs: extract_job_count(ai_generated.job_scope_analysis) || 3
  - current_date: new Date().toISOString().split('T')[0]
  - analysis_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(study_name, current_date)

notify:
  - role: team
    action: "Jobs to be Done analysis completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} just completed JTBD analysis for {{selected_study}}. {{max_jobs}} jobs identified - check it out!"

output_use: |
  Slack-Native Jobs to be Done analysis automatically discovers research files from selected study folders,
  analyzes user goals and contexts using the classic when/want/so structure, and identifies obstacles and 
  opportunities for supporting job completion. Outputs concise Slack summaries focused on jobs and 
  opportunities, plus detailed GitHub markdown reports for stakeholder sharing and documentation.

  Use this method to:
    - Extract user goals and motivations using proven JTBD methodology
    - Identify specific obstacles preventing job completion
    - Generate actionable opportunities for supporting user success
    - Understand civic impact and policy implications of user jobs
    - Create professional reports with evidence validation
