# Processing workflow
processing_workflow:
  1. validate_router_inputs
  2. confirm_data_quality_context
  3. execute_job_scope_analysis
  4. execute_job_identification
  5. execute_jtbd_narrative_development
  6. execute_obstacle_barrier_analysis
  7. execute_civic_impact_assessment
  8. execute_job_opportunity_generation
  9. execute_evidence_quote_generation
  10. execute_job_validation_and_follow_up
  11. format_comprehensive_output
  12. save_to_analysis_folder
  13. send_team_notifications
  14. track_analysis_completion

notify:
  - role: team
    action: "Router-enhanced Jobs-To-Be-Done extraction completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} just extracted {{max_jobs}} key jobs from {{study_name}} with {{confidence_level}} confidence. Check out the actionable opportunities!"
  - role: researcher
    action: "Analysis saved"
    slack_tag: "{{researcher_contact}}"
    message: "Your router-enhanced JTBD results have been posted to {{study_channel}} and saved to GitHub. Analysis confidence: {{confidence_level}} based on file quality assessment."
