  **Study:** {{selected_study}}
  **Analysis:** {{max_jobs}} jobs identified from {{ai_generated.file_discovery_summary.participant_count}} participants

  ---

  ## **Jobs Identified**

  {{ai_generated.job_identification}}

  ---

  ## **JTBD Narratives**

  {{ai_generated.jtbd_narrative_development}}

  ---

  ## **Key Obstacles**

  {{ai_generated.obstacle_barrier_analysis}}

  ---

  ## **Opportunities**

  {{ai_generated.job_opportunity_generation}}

  ---

  **What do you think?** Reply in thread:
  • Which jobs feel most critical to address first?
  • Any jobs that need more research or validation?
  • Ready to move forward with the recommended opportunities?

