# ===========================
# 🧠 CivicMind JTBD Prompt Config
# Extracts structured, Slack-friendly Jobs-To-Be-Done from qualitative research input
# Author: CivicMind + ChatGPT Expert Prompt Engineering
# Version: v1.3
# Created: 2025-06-26
# Last Updated: 2025-06-26
# ===========================

id: jobs_to_be_done                 # Unique identifier used in prompt routing or Slackbot workflows
name: extract_jobs_to_be_done      # Verb-based internal name of the task for clarity and reuse

label: 🎯 Jobs-To-Be-Done Extraction
version: "v1.3-june-2025"

description: >
  Extract high-quality, structured 1-3 Jobs-To-Be-Done (JTBD) from user research quotes.
  This is optimized for civic tech and equity-centered research. Output is Slack-friendly, traceable, and designed
  to support product, design, policy, and research synthesis workflows.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-06-26
changelog:
  - v1.0: Created base prompt with structured JTBD output
  - v1.1: Added persona guidance and tags
  - v1.2: Introduced signal, source, and opportunity fields
  - v1.3: Final formatting and Slack readability improvements

input_type: text  # Accepts raw text input such as quotes or transcript excerpts
input_processing: summarize_if_long  # Summarize automatically if input exceeds 1000 words
batch_mode: true  # Allows multiple quotes to be processed in one batch
batch_delimiter: "---"  # Required delimiter between each quote when using batch mode
precision_mode: concise | detailed  # Controls response richness; detailed adds context, tags, and source

input_variables:
  - input_text       # May include quotes, notes, summaries, observations
  - max_jobs         # Optional: 1–3 max JTBDs to return

output_use: |
  Output will be posted in Slack, turned into GitHub issues, and referenced in research synthesis.
  It must be clear, structured, skimmable, and usable in async, cross-functional workflows.

output_notes: |
  Use confident, plainspoken language. Do not hedge or speculate.
  Avoid empty terms like "easier" or "better" without context.
  Emphasize the consequence or opportunity of unmet needs for equity and service impact.

persona_hinting: |
  Examples of likely personas:
    - Black first-time investor
    - Veteran seeking housing
    - Rural benefits navigator
    - Caregiver supporting an elder
    - Young adult managing student loans

# Output schema:
# - Persona: string
# - Job: string
# - Obstacle: string
# - Why it Matters: string
# - Tags: [string[]]
# - Signal: optional string
# - Opportunity: optional string
# - Source: optional string

output_format: |
  🛠️ JOB 1: Apply for public housing

  PERSONA: Low-income family seeking stable housing  
  JOB: Apply for public housing assistance  
  OBSTACLE: The application process is complex and requires multiple documents that are hard to gather  
  WHY IT MATTERS: Access to stable housing is essential for family stability and well-being, reducing the risk of homelessness  
  TAGS: housing, access, stability, support  
  🔥 SIGNAL: Highlighted in 5 interviews  
  ✅ OPPORTUNITY: Develop a checklist and resource guide to help families understand required documents and steps  
  📚 SOURCE: Housing Access Study – Session 04, Quote 6  


  🛠️ JOB 2: Access mental health services

  PERSONA: Young adult experiencing mental health challenges  
  JOB: Access affordable mental health services  
  OBSTACLE: Limited availability of services and stigma around seeking help  
  WHY IT MATTERS: Timely access to mental health support can significantly improve quality of life and prevent crises  
  TAGS: mental health, access, stigma, support  
  🔥 SIGNAL: Frequently mentioned across interviews  
  ✅ OPPORTUNITY: Create awareness campaigns to reduce stigma and provide a directory of accessible services  
  📚 SOURCE: Mental Health Study – Session 02, Quote 5  


  🛠️ JOB 3: Navigate public benefits programs

  PERSONA: Newly unemployed individual seeking assistance  
  JOB: Navigate public benefits programs to secure financial support  
  OBSTACLE: Confusing eligibility requirements and lack of clear guidance on how to apply  
  WHY IT MATTERS: Understanding and accessing benefits is critical for individuals facing financial hardship to regain stability  
  TAGS: benefits, navigation, financial support, equity  
  🔥 SIGNAL: Commonly raised issue in discussions  
  ✅ OPPORTUNITY: Implement a user-friendly online tool that guides users through eligibility and application processes  
  📚 SOURCE: Employment Support Study – Session 03, Quote 1


prompt: |
  You are a senior civic tech strategist and qualitative researcher with over 10 years of experience
  turning messy or partial research input into structured insights.

  Based on the input provided — whether it includes direct quotes, researcher notes, field observations,
  or thematic summaries — extract up to {{max_jobs | default(3)}} distinct Jobs-To-Be-Done (JTBD).

  Only return jobs that are clearly supported by the input. If fewer than {{max_jobs | default(3)}} clear jobs exist, return only those.
  If no useful jobs can be confidently extracted, return:
  🛠️ No clear job could be extracted from this input.

  Then, for each job:
    - Format it clearly and consistently for use in Slack and research repositories
    - Include persona, job, obstacle, why it matters, tags, and (if applicable) signal, opportunity, and source

  Before you begin writing each job:
    - Identify who the user or participant is (persona)
    - Infer what they are trying to accomplish (functional and emotional goals)
    - Clarify what is preventing success (obstacles)
    - Articulate the stakes — what happens if the job remains unmet, or what changes if it is fulfilled

  Use confident, plainspoken language. Avoid jargon, buzzwords, or empty phrases like “to make things easier.”
  Do not speculate or hedge. If something is unclear, leave it out rather than guessing.

  Each JTBD should contain the following fields:

    - Persona: Who the job belongs to — a brief role or identity (e.g., “Black first-time investor”, “benefits navigator”)
    - Job: What they are trying to do or accomplish
    - Obstacle: What makes this hard, confusing, or inaccessible
    - Why it Matters: Why this job matters in the context of the study's mission, public impact, or equity goals
    - Tags: Short keywords (e.g., trust, access, navigation, communication)
    - Signal: Optional — include if the issue was frequent, severe, or urgent
    - Opportunity: Optional — suggest a design, content, or system opportunity (non-prescriptive)
    - Source: Optional — include a note like “Session 2, Quote #4” to trace origin

  If you cannot extract a clear job from the input, return:
  🛠️ No clear job could be extracted from this input.

  Format the output for readability in Slack. Add a full blank line between each job block.

  ---
  Example input:

  "I talked to three veterans last week who were all trying to apply for housing assistance but gave up halfway.
   They either didn’t know which documents to upload or kept getting logged out of the portal.
   One of them just went back to sleeping in his car."

  Example output:

  🛠️ Job 1: Apply for public housing online

  Persona: Veteran seeking housing assistance  
  Job: Apply for public housing online  
  Obstacle: The portal is difficult to navigate and times out without saving progress  
  Why it Matters: Without stable housing access, veterans remain vulnerable to homelessness and hardship  
  Tags: access, digital inclusion, housing, trust  
  Signal: 🔥 Raised in 3 separate interviews  
  Opportunity: ✅ Offer guided step-by-step support for applicants with unstable internet or low digital literacy  
  Source: Black Veterans Study – Session 03, Quote 7
