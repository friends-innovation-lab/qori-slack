  {{team_members}} - would love your thoughts on these jobs, especially which ones feel most urgent or where you see quick wins we could tackle.

  📂 *Study:* {{study_name}}  
  🔗 *Full details:* {{study_link}}
  📊 *Router Analysis:* [View preprocessing intelligence]({{router_log_link}})

  ---

  ## 📊 *JOB SCOPE & QUALITY ANALYSIS*

  {{ai_generated.job_scope_analysis}}

  **Router Quality Assessment:**
  {{file_selection_quality}}

  **Files Analyzed:**
  {{selected_files_summary}}

  ---

  ## 🔍 *IDENTIFIED JOBS*

  {{ai_generated.job_identification}}

  ---

  ## 🎯 *JOBS-TO-BE-DONE NARRATIVES*

