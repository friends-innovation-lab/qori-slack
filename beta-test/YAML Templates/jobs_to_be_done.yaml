id: jobs_to_be_done
name: extract_jobs_to_be_done
label: 🎯 Jobs-To-Be-Done Extraction
version: v1.7
description: |
  Extract clear, actionable Jobs-To-Be-Done (JTBD) from civic tech research inputs, including quotes, notes, and observations. Each JTBD clarifies user goals, barriers, and their broader significance in public service and civic engagement contexts. Ideal for researchers, designers, stakeholders, and product teams translating insights into opportunities for improved service delivery and policy outcomes.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-02

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

input_variables:
  - input_text           # Research data, quotes, observations (REQUIRED)
  - study_name           # Title of study (REQUIRED)  
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to post results (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Who to notify/tag (OPTIONAL)

# Auto-generated/computed variables
auto_variables:
  - max_jobs: |
      # AI analyzes input complexity to determine optimal job count
      # Default: 3, Range: 2-5 based on data patterns and user role diversity
      analyze_job_complexity(input_text) || 3
  - session_count: |
      # AI estimates session count from input patterns
      # Looks for interview markers, participant IDs, role indicators
      estimate_session_count(input_text) || "multiple sessions"
  - current_date: |
      # Auto-generate current date for file naming
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      # Auto-generate based on study name and date
      generate_github_link(study_name, current_date) || null

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "structured"
  file_location: "04-analysis/"
  file_name: "jobs_to_be_done_{{study_name_slug}}_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "🎯 Jobs-To-Be-Done Results"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "🧠 Run Affinity Mapping"
      action: "run_affinity_mapping"
    - text: "👤 Create Personas"
      action: "run_persona_generator"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"

output_use: |
  CivicMind Jobs-To-Be-Done (JTBD) extraction accelerates qualitative synthesis and quickly translates user insights into clear, structured, and actionable product or policy opportunities.

  Use this JTBD method to:
    - Rapidly articulate precise user goals, obstacles, and measurable outcomes.
    - Clearly communicate insights to stakeholders and teams, directly linking research to actionable interventions.
    - Provide transparency around AI-driven synthesis logic, enabling trust and adoption among researchers.
    - Facilitate quicker transitions from research insights to design or policy decisions without sacrificing rigor or clarity.

output_notes: |
  This method returns up to {{max_jobs}} jobs based on data analysis. AI automatically determines optimal job count.
  Session count ({{session_count}}) estimated from input patterns and role diversity.
  Write in clear, confident, plain language. Avoid technical jargon, filler words, or speculative statements. No em-dashes.
  Clearly connect "Why it Matters" to real-world civic or systemic outcomes.
  Use Slack formatting: *text* for bold (single asterisks), > for quotes, `backticks` for tags, spacing between blocks, and horizontal rules for clarity.

persona_hinting: |
  Common civic personas include:
    - Veteran applying for housing
    - Rural benefits navigator
    - Caregiver managing multiple services
    - Young adult navigating job loss
    - Small business owner navigating bureaucracy
    - Resident seeking public assistance
    - Community organizer advocating for local policy change
    - Immigrant navigating citizenship processes

prompt: |
  You are a senior civic tech strategist and qualitative researcher with extensive experience applying the Jobs-To-Be-Done (JTBD) framework to civic research.

  ANALYSIS CONTEXT:
  - Study: {{study_name}}
  - Estimated sessions: {{session_count}}
  - Target jobs: {{max_jobs}} (AI-determined based on data complexity and role diversity)

  Extract up to {{max_jobs}} clearly differentiated Jobs-To-Be-Done (JTBD).
  
  Each JTBD must follow the classic JTBD narrative structure:
  "*When* [context/situation], *I want to* [goal/action], *so I can* [desired outcome]."

  For each job, provide:
  1. **Job Title** - Clear, descriptive name for the job
  2. **JTBD Narrative** - The when/want/so structure  
  3. **Current Obstacles** - What's preventing job completion
  4. **Why This Matters** - Broader civic or systemic significance
  5. **Supporting Quote** - Direct quote illustrating the job
  6. **Opportunity** - Actionable response to address obstacles
  7. **Signal** - Evidence strength (e.g., "Mentioned by 4 participants")
  8. **Source** - Research source reference
  9. **Tags** - Keywords for categorization

  Focus on jobs that reveal user motivations, not just surface-level tasks. Look for emotional and functional dimensions. Recognize different user roles (primary users, support staff, decision-makers).

  Format for Slack using *single asterisks* for bold, > for quotes, `backticks` for code formatting on tags, and proper spacing.

  **Example JTBD:**

  🛠️ *JOB: "Getting Reliable Eligibility Information"*

  *When* I'm helping a client determine their benefit eligibility, *I want to* access consistent, up-to-date guidelines, *so I can* give them accurate information without multiple calls or delays.

  *Current Obstacles:*
  Guidelines are scattered across different systems, some information is outdated, and different staff give conflicting answers.

  *Why This Matters:*
  Accurate eligibility information directly impacts whether people get the help they need and reduces administrative burden on staff.

  > "I waste hours cross-checking rules, delaying support for people who urgently need it."

  💡 *Opportunity:* Create a unified eligibility checker tool with real-time updates
  📊 *Signal:* Mentioned by 7 out of 8 navigators
  📚 *Source:* Study 2, Session 5
  `Tags: efficiency, accuracy, tools`

  ⚠️ Return no more than {{max_jobs}} JTBDs.

output_format: |
  Hi team! 👋 I just extracted the key jobs users are trying to get done from our research data. Found some really interesting patterns around what people are actually trying to accomplish and what's getting in their way.

  {{team_members}} - would love your thoughts on these jobs, especially which ones feel most urgent or where you see quick wins we could tackle.

  📂 *Study:* {{study_name}}  
  🔗 *Full details:* {{study_link}}

  ---

  *🎯 JOBS-TO-BE-DONE RESULTS*

  🛠️ *JOB: "{{job_1_title}}"*

  *When* {{job_1_context}}, *I want to* {{job_1_goal}}, *so I can* {{job_1_outcome}}.

  *Current Obstacles:*
  {{job_1_obstacle}}

  *Why This Matters:*
  {{job_1_significance}}

  > "{{job_1_quote}}"

  💡 *Opportunity:* {{job_1_opportunity}}

  📊 *Signal:* {{job_1_signal}}  
  📚 *Source:* {{job_1_source}}

  `Tags: {{job_1_tags}}`

  ---

  🛠️ *JOB: "{{job_2_title}}"*

  *When* {{job_2_context}}, *I want to* {{job_2_goal}}, *so I can* {{job_2_outcome}}.

  *Current Obstacles:*
  {{job_2_obstacle}}

  *Why This Matters:*
  {{job_2_significance}}

  > "{{job_2_quote}}"

  💡 *Opportunity:* {{job_2_opportunity}}

  📊 *Signal:* {{job_2_signal}}  
  📚 *Source:* {{job_2_source}}

  `Tags: {{job_2_tags}}`

  ---

  🛠️ *JOB: "{{job_3_title}}"*

  *When* {{job_3_context}}, *I want to* {{job_3_goal}}, *so I can* {{job_3_outcome}}.

  *Current Obstacles:*
  {{job_3_obstacle}}

  *Why This Matters:*
  {{job_3_significance}}

  > "{{job_3_quote}}"

  💡 *Opportunity:* {{job_3_opportunity}}

  📊 *Signal:* {{job_3_signal}}  
  📚 *Source:* {{job_3_source}}

  `Tags: {{job_3_tags}}`

  ---

  *What do you think?* Reply in thread with your thoughts:
  • Which jobs feel most critical to address?
  • Any jobs that need more research or validation?
  • How do these connect to our current roadmap?

notify:
  - role: team
    action: "Jobs-To-Be-Done extraction completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} just extracted {{max_jobs}} key jobs from {{study_name}}. Check out the actionable opportunities!"
  - role: researcher
    action: "Analysis saved"
    slack_tag: "{{researcher_contact}}"
    message: "Your Jobs-To-Be-Done results have been posted to {{study_channel}} and saved to GitHub."
