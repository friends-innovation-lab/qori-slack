id: jobs_to_be_done
name: extract_jobs_to_be_done

label: 🎯 Jobs to be Done
version: "v3.1"

description: >
  Extract research-grounded Jobs-to-be-Done using the industry-standard
  When/Want/So framework. Identifies functional, emotional, and social jobs
  with current solutions, pain points, and design opportunities.

author: Qori R&D
created: 2025-06-26
last_updated: 2026-01-08

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4000

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 1000
  max_file_size: 100000
  supported_formats: [".md", ".txt", ".csv", ".json"]
  max_files_per_analysis: 20

# Privacy controls
privacy_controls:
  enable_pii_detection: true
  pii_detection_patterns:
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
    phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    ssn: '\b\d{3}-\d{2}-\d{4}\b'
  masking_strategy:
    email: "[EMAIL_REDACTED]"
    phone: "[PHONE_REDACTED]" 
    ssn: "[SSN_REDACTED]"

# Slack modal input variables
input_variables:
  - selected_study
  - include_research_plan
  - include_participant_notes
  - include_raw_transcripts
  - discovered_files
  - combined_file_content
  - quality_assessment

# Study metadata mapping
study_metadata:
  "VA Housing Application Usability Study":
    folder: "va-housing-usability-2025"
    researcher: "jordan.researcher"
    channel: "#research-housing-app"
    focus_area: "housing application process"
    
  "Benefits Portal Navigation Research":
    folder: "benefits-portal-nav-2025"
    researcher: "alex.ux"
    channel: "#research-benefits"
    focus_area: "benefits portal navigation"

# File discovery system
auto_file_discovery:
  core_files:
    session_summaries:
      file_patterns: ["*session_summary*", "*summary*", "*session*"]
      search_paths: ["01-sessions/", "sessions/", "summaries/"]
      priority: "required"
      confidence_weight: 50
      
    transcripts:
      file_patterns: ["*transcript*", "*interview*", "*recording*"]
      search_paths: ["01-sessions/", "transcripts/", "interviews/"]
      priority: "high"
      confidence_weight: 30
  
  enhancement_files:
    research_plan:
      enabled_when: "{{include_research_plan}} == true"
      file_patterns: ["*research_plan*", "*study_plan*", "*methodology*"]
      search_paths: ["00-planning/", "planning/", "research/"]
      confidence_boost: 8

# AI generation tasks - SINGLE CONSOLIDATED TASK
ai_generation_tasks:
  - task_id: "jtbd_complete"
    prompt: |
      ============================================================
      🚨 CRITICAL RULES - READ BEFORE ANYTHING ELSE 🚨
      ============================================================
      
      RULE 1: NO HALLUCINATION - EXTRACT ONLY
      You are an EXTRACTOR, not a GENERATOR.
      - Every job must be based on ACTUAL user statements in the data
      - Every pain point must come from the research
      - If you cannot find evidence, DO NOT INCLUDE IT
      - NEVER invent jobs like "Impact Assessment" or "Data Repository"
      
      RULE 2: VA GOVERNMENT CONTEXT ONLY
      These are Veterans using VA services.
      - Jobs relate to: healthcare, benefits, claims, appointments, prescriptions, profile management
      - Pain points relate to: app usability, navigation, loading, accessibility
      - NEVER mention: "task forces", "project teams", "staff training", "data analytics"
      
      RULE 3: JOBS ARE ABOUT PROGRESS, NOT TASKS
      A job is the PROGRESS someone is trying to make in their life.
      
      ❌ TASK (too narrow): "Click the Edit button"
      ❌ TASK (too narrow): "Check claim status"
      ✅ JOB (progress): "Feel confident my benefits are being processed correctly"
      ✅ JOB (progress): "Keep my VA contact information current so I don't miss important updates"
      
      RULE 4: CITE EVERYTHING
      Every pain point and quote MUST have:
      - Participant ID (PT001, PT002, etc.)
      - Timestamp if available
      
      RULE 5: JOBS MUST BE DISTINCT
      If two jobs sound similar, they should be ONE job.
      - Don't create separate jobs for "navigation" and "finding information"
      - Don't create separate jobs for "app frustration" and "preferring phone"
      
      RULE 6: INCLUDE ALL THREE JOB TYPES
      Every functional job has emotional and social dimensions:
      - **Functional:** What they're trying to accomplish
      - **Emotional:** How they want to feel
      - **Social:** How they want to be perceived
      
      ============================================================
      YOUR TASK
      ============================================================
      
      Extract Jobs-to-be-Done from this research data:
      
      **Study:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      **Input Data:** {{combined_file_content}}
      
      ============================================================
      OUTPUT FORMAT - FOLLOW EXACTLY
      ============================================================
      
      # 🎯 Jobs to be Done: [INSERT ACTUAL STUDY NAME]
      
      > **[X] jobs** from **[Y] participants** | **Generated:** [Today's date]
      
      ---
      
      ## At a Glance
      
      | # | Job | Type | Current Solution | Top Pain Point |
      |---|-----|------|------------------|----------------|
      | 1 | [Short job name] | Functional | [What they do now] | [Biggest problem] |
      | 2 | [Short job name] | Functional | [What they do now] | [Biggest problem] |
      
      ---
      
      ## Job 1: [Descriptive Job Name]
      
      ### 📋 Job Statement
      
      > **When** [specific situation/trigger from research],
      > **I want to** [goal/motivation],
      > **So I can** [desired outcome/progress].
      
      | Dimension | Description |
      |-----------|-------------|
      | **Functional** | [What they're trying to accomplish] |
      | **Emotional** | [How they want to feel: confident, relieved, in control, etc.] |
      | **Social** | [How they want to be perceived: responsible, informed, capable, etc.] |
      
      ### 🔄 Current Solution
      
      What users "hire" to do this job today:
      
      | Solution | Why They Use It | Why It Falls Short |
      |----------|-----------------|-------------------|
      | [Current approach] | [What works about it] | [What doesn't work] |
      | [Alternative approach] | [What works about it] | [What doesn't work] |
      
      ### 😤 Pain Points
      
      What makes the current solution inadequate:
      
      | Pain Point | Impact | Evidence |
      |------------|--------|----------|
      | [Specific issue] | [How it blocks progress] | [Participant ID], [timestamp] |
      | [Specific issue] | [How it blocks progress] | [Participant ID], [timestamp] |
      | [Specific issue] | [How it blocks progress] | [Participant ID], [timestamp] |
      
      ### ✅ Success Criteria
      
      How users know the job is done:
      
      - [Measurable outcome 1]
      - [Measurable outcome 2]
      
      ### 💡 Design Opportunity
      
      | Opportunity | Addresses | Priority |
      |-------------|-----------|:--------:|
      | [Specific, implementable fix] | [Which pain point] | 🔴 |
      | [Specific, implementable fix] | [Which pain point] | 🟡 |
      
      ---
      
      ## Job 2: [Descriptive Job Name]
      
      [Same format as Job 1]
      
      ---
      
      [REPEAT FOR EACH JOB - typically 2-4 jobs from research data]
      
      ---
      
      ## Summary: Opportunity Priorities
      
      | # | Opportunity | Job | Pain Point Addressed | Effort |
      |---|-------------|-----|---------------------|:------:|
      | 1 | [Top priority] | Job 1 | [Specific pain point] | 🔵⚪⚪ |
      | 2 | [Second priority] | Job 2 | [Specific pain point] | 🔵🔵⚪ |
      | 3 | [Third priority] | Job 1 | [Specific pain point] | 🔵🔵⚪ |
      
      ---
      
      ## Methodology
      
      **Framework:** Jobs-to-be-Done (JTBD)
      
      **Key Principle:** Jobs are about the PROGRESS users are trying to make, not the tasks they perform. Jobs are stable over time even as technology changes.
      
      **Data Sources:** [List ALL participant IDs]
      
      ---
      
      ### References
      
      This analysis follows established JTBD methods:
      
      - **Clayton Christensen** — "Competing Against Luck" (2016), originator of JTBD theory
      - **Bob Moesta** — "Demand-Side Sales 101", Switch interviews and Forces of Progress
      - **Tony Ulwick** — Outcome-Driven Innovation (ODI), jobs-based innovation framework
      - **Alan Klement** — "When Coffee and Kale Compete", JTBD for product design
      
      ---
      
      *Generated by Qori • [Today's date]*
      
      ============================================================
      QUALITY REQUIREMENTS
      ============================================================
      
      GOOD JOB STATEMENTS (focus on progress):
      ✅ "When I file a claim, I want to track its progress, so I can feel confident it's being handled"
      ✅ "When my phone number changes, I want to update it quickly, so I don't miss important VA communications"
      ✅ "When I need a prescription refill, I want to request it without calling, so I can manage my health independently"
      
      BAD JOB STATEMENTS (too task-focused or generic):
      ❌ "When I use the app, I want it to work, so I can do things" (too vague)
      ❌ "When I click Edit, I want to edit, so I can make edits" (circular)
      ❌ "When I experience frustration, I want less frustration" (not a job)
      
      GOOD PAIN POINTS (specific, from data):
      ✅ "App takes 8+ seconds to load — PT003, 00:01:56"
      ✅ "Edit button hidden in overflow menu, not visible with large text — PT003, 00:02:52"
      ✅ "Claims shows 'No active claims' despite filing one — PT003, 00:03:42"
      
      BAD PAIN POINTS (invented, generic):
      ❌ "Users experience frustration" (too vague)
      ❌ "System is not optimized" (not from user perspective)
      ❌ "Staff need better training" (wrong context - this is about end users)
      
      GOOD DESIGN OPPORTUNITIES (specific, implementable):
      ✅ "Add progress indicator during load with estimated time"
      ✅ "Show claim status as 'Processing' with submission date, not 'No active claims'"
      ✅ "Move Edit button inline with profile header, increase tap target to 44px"
      
      BAD OPPORTUNITIES (vague, hallucinated):
      ❌ "Improve user experience" (not actionable)
      ❌ "Create task force to assess impact" (wrong context)
      ❌ "Develop data repository for contextual information" (hallucinated)
      
      ============================================================
      INTERNAL VALIDATION (Do not include in output)
      ============================================================
      
      Before submitting, verify:
      - [ ] All jobs relate to VA services (healthcare, benefits, claims)
      - [ ] Job statements follow When/Want/So format
      - [ ] Each job has Functional/Emotional/Social dimensions
      - [ ] All pain points have citations
      - [ ] Jobs are distinct (no overlap)
      - [ ] Opportunities are specific and implementable
      - [ ] No hallucinated content (task forces, data repositories, etc.)
      - [ ] Multiple participants cited across the analysis

# Processing workflow
processing_workflow:
  1. validate_slack_modal_inputs
  2. discover_files_from_study_selection
  3. calculate_initial_quality_assessment
  4. validate_discovered_files
  5. combine_selected_files_with_truncation
  6. execute_jtbd_complete
  7. format_slack_output
  8. format_github_output
  9. save_to_analysis_folder
  10. send_team_notifications

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "jtbd_focused"
  file_format: "github_markdown"
  path: "04-analysis/jobs-to-be-done/"
  filename: "{{study_folder}}_jobs_to_be_done_{{current_date}}.md"

# Slack output template - just passes through AI content
output_template: |
  {{ai_generated.jtbd_complete}}

# GitHub markdown file template
github_file_template: |
  {{ai_generated.jtbd_complete}}
  
  ---
  
  ## Related Analyses
  
  | Analysis | Purpose |
  |----------|---------|
  | 👤 **Personas** | Create user archetypes |
  | 🧭 **Journey Mapping** | Map stages users go through |
  | 🧠 **Affinity Mapping** | Identify broader themes |
  | 🐛 **Usability Issues** | Prioritize interface problems |
  
  ---
  
  ## Contact
  
  **Lead Researcher:** {{researcher_contact}}
  **Study Channel:** {{study_channel}}

# Auto-generated variables
auto_variables:
  - max_jobs: extract_job_count(ai_generated.jtbd_complete) || 3
  - current_date: new Date().toISOString().split('T')[0]
  - analysis_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(study_name, current_date)

notify:
  - role: team
    action: "Jobs to be Done analysis completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} completed JTBD analysis for {{selected_study}}. {{max_jobs}} jobs identified!"

quality_assurance:
  require_when_want_so: true
  require_job_dimensions: true
  require_citations: true
  require_va_context: true
  prohibit_task_level_jobs: true
  prohibit_generic_content: true

notes: |
  v3.0 Changes (Complete Redesign):
  - Consolidated 8 AI tasks into 1 comprehensive task
  - Proper JTBD structure following Christensen/Moesta framework:
    - Job Statement (When/Want/So) is PROMINENT
    - Three job dimensions: Functional, Emotional, Social
    - Current Solution section (hiring/firing metaphor)
    - Success Criteria (how users know job is done)
  - Added grounding rules to prevent hallucination
  - VA context enforcement
  - Citation requirements
  - Good/bad examples for everything
  - Jobs focus on PROGRESS, not tasks
  
  v2.0: Original 8-task architecture (caused hallucination, drift)

output_use: |
  Extract research-grounded Jobs-to-be-Done using the industry-standard
  When/Want/So framework. Each job includes functional, emotional, and 
  social dimensions, current solutions users "hire", pain points with 
  citations, and specific design opportunities.
