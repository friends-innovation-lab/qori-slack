id: jobs_to_be_done
label: 🎯 Jobs-To-Be-Done Extraction
description: Identify 3-5 user goals and obstacles using JTBD framework 🧰
input_type: text
prompt: |
  From the quotes below, extract key Jobs-To-Be-Done and related barriers 🚧.

  Quotes:
  {{input}}
output_format: |
  ## 🎯 Job 1
  - **Goal:** ...
  - **Obstacle:** ...

  ## 🎯 Job 2
  - **Goal:** ...
  - **Obstacle:** ...

  ## 🎯 Job 3
  - **Goal:** ...
  - **Obstacle:** ...

  ## 🎯 Job 4
  - **Goal:** ...
  - **Obstacle:** ...

    ## 🎯 Job 5
  - **Goal:** ...
  - **Obstacle:** ...
