# Fixed version with removed pipe operators and dynamic paths
id: participant_outreach
name: run_participant_outreach
label: 📧 Participant Outreach
version: v2.0
description: Generate professional participant outreach messages for VA research studies

author: CivicMind R&D
created: 2025-07-07
last_updated: 2025-07-16

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.3
  max_tokens: 2000

input_type: structured
input_processing: dynamic_conditional
precision_mode: detailed

# Input variables with proper validation
input_variables:
  # Required core fields
  - message_type:
      type: "select"
      required: true
      options: ["initial_recruitment", "session_confirmation", "session_reminder", "rescheduling_request", "follow_up", "thank_you"]
      
  - participant_name:
      type: "text"
      required: true
      placeholder: "e.g., Alex M. or pt004"
      
  - study_name:
      type: "text"
      required: true
      placeholder: "e.g., VA Housing App Usability Study"
      
  # NEW: Study folder for file organization
  - study_folder_name:
      type: "text"
      required: true
      placeholder: "e.g., housing-app-study-2025"
      help_text: "Folder name for organizing study files"
      
  - researcher_name:
      type: "text"
      required: true
      placeholder: "e.g., Jordan (UX Researcher)"
      
  - researcher_email:
      type: "email"
      required: true
      placeholder: "researcher@va.gov"
      
  - researcher_phone:
      type: "tel"
      required: true
      placeholder: "(555) 123-4567"
      
  - contact_method:
      type: "select"
      required: true
      options: ["email", "recruitment_agency"]
      default: "email"
      
  - tone:
      type: "select"
      required: true
      options: ["friendly", "formal", "casual"]
      default: "friendly"
      
  # Conditional fields based on message type
  - session_date:
      type: "date"
      required_if: ["session_confirmation", "session_reminder", "rescheduling_request"]
      
  - session_time:
      type: "time"
      required_if: ["session_confirmation", "session_reminder", "rescheduling_request"]
      
  - session_duration:
      type: "select"
      required_if: ["session_confirmation", "session_reminder"]
      options: ["30 minutes", "45 minutes", "60 minutes", "90 minutes"]
      default: "45 minutes"
      
  - session_link:
      type: "url"
      required_if: ["session_confirmation", "session_reminder"]
      placeholder: "https://va-gov.zoom.us/j/123456789"
      
  - meeting_id:
      type: "text"
      required_if: ["session_confirmation", "session_reminder"]
      placeholder: "123 456 789"
      
  - dial_in_number:
      type: "tel"
      required_if: ["session_confirmation", "session_reminder"]
      placeholder: "+1 (555) 123-4567"
      
  - study_description:
      type: "textarea"
      required_if: ["initial_recruitment"]
      placeholder: "Brief description of what the study involves"
      
  - incentive_amount:
      type: "text"
      required_if: ["initial_recruitment", "thank_you"]
      placeholder: "e.g., $75"
      
  - reschedule_reason:
      type: "text"
      required_if: ["rescheduling_request"]
      placeholder: "Brief reason for rescheduling"
      
  - reschedule_options:
      type: "textarea"
      required_if: ["rescheduling_request"]
      placeholder: "List 2-3 alternative time slots"

# AI Generation Tasks - Simplified without pipe operators
ai_generation_tasks:
  - task_id: "subject_line"
    prompt: >
      Create a clear, professional email subject line for a {{message_type}} message about {{study_name}}.
      
      Context:
      - Participant: {{participant_name}}
      - Tone: {{tone}}
      - Contact method: {{contact_method}}
      
      Requirements:
      - Be specific about the purpose and study name
      - Use clear, action-oriented language
      - Keep under 60 characters for mobile readability
      - Match the tone appropriately
      - Include urgency indicators for time-sensitive messages
      
      Return only the subject line, no additional text.

  - task_id: "email_body"
    prompt: >
      Create a professional, trauma-informed {{message_type}} email for {{study_name}} research.
      
      Core Details:
      - Message Type: {{message_type}}
      - Participant: {{participant_name}}
      - Study: {{study_name}}
      - Researcher: {{researcher_name}} ({{researcher_email}})
      - Tone: {{tone}}
      - Contact Method: {{contact_method}}
      
      Include proper VA disclaimers, contact information, and trauma-informed language.
      Use 10th-grade reading level maximum.
      Format with clear paragraphs and bullet points where appropriate.
      
      Email Signature Format:
      Best regards,
      {{researcher_name}}
      Department of Veterans Affairs
      Email: {{researcher_email}}
      Phone: {{researcher_phone}}

  - task_id: "followup_suggestions"
    prompt: >
      Suggest 2-3 follow-up actions the researcher should consider after sending this {{message_type}} message.
      Format as actionable bullet points with suggested timelines.

# Output template - simplified without complex filters
output_template: >
  # Participant Outreach Message
  
  **Generated for:** {{participant_name}} • {{contact_method}} • {{tone}} tone  
  **Study:** {{study_name}}  
  **Researcher:** {{researcher_name}}  
  **Date:** {{current_date}}  
  **File:** {{filename}}
  
  ---
  
  ## Email Content
  
  ### Subject Line
  {{ai_generated.subject_line}}
  
  ### Email Body
  **To:** {{participant_name}}  
  **From:** {{researcher_name}} <{{researcher_email}}>  
  **Subject:** {{ai_generated.subject_line}}
  
  ---
  
  {{ai_generated.email_body}}
  
  ---
  
  ## Follow-up Actions
  
  {{ai_generated.followup_suggestions}}
  
  ---
  
  *Generated by Qori's AI-powered outreach system {{version}}*

# Output configuration with dynamic paths
output_options:
  # Dynamic file naming - simplified
  filename: "{{participant_name}}_{{message_type}}_{{current_date}}.md"
  # Dynamic path based on study
  path: "studies/{{study_folder_name}}/participants/outreach/"
  
  delivery:
    github:
      enabled: true
      path: "studies/{{study_folder_name}}/participants/outreach/"
      commit_message: "Add {{message_type}} message for {{participant_name}}"
      
    slack:
      enabled: true
      send_dm: true
      message: >
        Participant outreach message generated for {{participant_name}} in {{study_name}}
        
        Message saved to: research/{{study_folder_name}}/participants/outreach/{{filename}}

# Message type descriptions for UI  
message_type_descriptions:
  initial_recruitment: "First contact to invite participants to join your study"
  session_confirmation: "Confirm scheduled session details with participant"
  session_reminder: "24-48 hour reminder about upcoming session"
  rescheduling_request: "When you need to reschedule a session"
  follow_up: "Check in when participant hasn't responded"
  thank_you: "Post-session thank you with next steps"
