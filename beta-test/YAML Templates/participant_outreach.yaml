id: participant_outreach
name: run_participant_outreach
label: 📧 Participant Outreach
version: v3.0
description: Generate professional participant outreach messages for VA research studies

author: CivicMind R&D
created: 2025-07-07
last_updated: 2025-10-25

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.3
  max_tokens: 2000

input_type: structured
input_processing: dynamic_conditional
precision_mode: detailed

# Enhanced Error Handling and Validation
error_handling:
  validation_errors:
    - field: "study_id"
      rules:
        - type: "required"
          message: "Please select a study"
        - type: "exists_in_database"
          table: "studies"
          message: "Selected study not found or you don't have access"
        - type: "study_active"
          message: "Selected study is not active"
    
    - field: "participant_name"
      rules:
        - type: "min_length"
          value: 2
          message: "Participant name must be at least 2 characters"
        - type: "max_length"
          value: 50
          message: "Participant name cannot exceed 50 characters"
    
    - field: "researcher_email"
      rules:
        - type: "email_format"
          message: "Please enter a valid email address"
        - type: "domain_whitelist"
          domains: ["va.gov", "vha.gov", "med.va.gov"]
          message: "Please use a VA email address"
    
    - field: "session_date"
      rules:
        - type: "future_date"
          message: "Session date must be in the future"
        - type: "business_hours"
          start_time: "08:00"
          end_time: "17:00"
          message: "Please schedule sessions during business hours (8 AM - 5 PM)"
    
    - field: "meeting_link"
      rules:
        - type: "url_format"
          message: "Please enter a valid meeting link"
        - type: "allowed_domains"
          domains: ["zoom.us", "teams.microsoft.com", "meet.google.com"]
          message: "Please use approved meeting platforms"
          
    - field: "signup_instructions"
      rules:
        - type: "contains_valid_urls"
          message: "Please check that any links in signup instructions are valid URLs"
        - type: "allowed_signup_domains"
          domains: ["calendly.com", "typeform.com", "forms.gle", "google.com", "va.gov", "microsoft.com"]
          message: "Please use approved platforms for signup links"

# Input variables - Core field definitions
input_variables:
  # Core participant info
  - participant_name:
      type: "text"
      required: true
      placeholder: "e.g., Alex M. or PT004"
      help_text: "Use alias to protect participant privacy"
      max_length: 50
      
  # Study selection
  - study_id:
      type: "select"
      required: true
      data_source: "existing_studies"
      placeholder: "Select a study..."
      help_text: "Choose from your existing studies"
      
  - study_name:
      type: "hidden"
      derived_from: "study_id.name"
      
  - study_folder_name:
      type: "hidden"
      derived_from: "study_id.folder_name"
      
  # Researcher contact info
  - researcher_name:
      type: "text"
      required: true
      placeholder: "e.g., Jordan (UX Researcher)"
      max_length: 50
      
  - researcher_email:
      type: "email"
      required: true
      placeholder: "researcher@va.gov"
      
  - researcher_phone:
      type: "tel"
      required: true
      placeholder: "(555) 123-4567"
      
  # Message settings
  - contact_method:
      type: "select"
      required: true
      options: ["email", "recruitment_agency"]
      default: "email"
      
  - tone:
      type: "select"
      required: true
      options: ["friendly", "formal", "casual"]
      default: "friendly"

  # Initial recruitment fields
  - study_description:
      type: "textarea"
      required: false
      placeholder: "Brief description of what the study involves"
      help_text: "Describe what the study involves and what participants can expect"
      max_length: 500
      
  - signup_instructions:
      type: "textarea"
      required: false
      placeholder: "e.g., Click this link to complete our screener: https://calendly.com/research-team or reply to this email"
      help_text: "How participants should sign up - include screener links, Calendly links, or email instructions"
      max_length: 500
      
  - incentive_amount:
      type: "text"
      required: false
      placeholder: "e.g., $75"
      help_text: "Compensation amount for participation"
      
  # Session-related fields
  - session_date:
      type: "date"
      required: false
      
  - session_time:
      type: "time"
      required: false
      
  - session_duration:
      type: "select"
      required: false
      options: ["30 minutes", "45 minutes", "60 minutes", "90 minutes"]
      default: "45 minutes"
      
  - meeting_link:
      type: "url"
      required: false
      placeholder: "https://va-gov.zoom.us/j/123456789"
      
  - meeting_id:
      type: "text"
      required: false
      placeholder: "123 456 789"
      
  - dial_in_number:
      type: "tel"
      required: false
      placeholder: "+1 (555) 123-4567"
      
  # Rescheduling fields
  - reschedule_reason:
      type: "text"
      required: false
      placeholder: "Brief reason for rescheduling"
      max_length: 200
      
  - reschedule_options:
      type: "textarea"
      required: false
      placeholder: "List 2-3 alternative time slots"
      max_length: 300

# AI Generation Tasks
ai_generation_tasks:
  - task_id: "subject_line"
    prompt: >
      Create a clear, professional email subject line for {{message_type}} about {{study_name}}.
      
      Context:
      - Message Type: {{message_type}}
      - Study: {{study_name}}
      - Participant: {{participant_name}}
      - Tone: {{tone}}
      
      Requirements:
      - Keep it under 60 characters
      - Be specific and action-oriented
      - Use {{tone}} style appropriately
      - For reminders, include date if provided
      - For confirmations, emphasize the confirmation
      
      Examples:
      - initial_recruitment: "Research Opportunity: Help Improve VA Services"
      - session_confirmation: "Confirmed: Your Research Session on [Date]"
      - session_reminder: "Reminder: Research Session Tomorrow at [Time]"
      - rescheduling_request: "Need to Reschedule: [Study Name] Session"
      - follow_up: "Following Up: [Study Name] Research Opportunity"
      - thank_you: "Thank You for Participating in [Study Name]"
      
      Return only the subject line, nothing else.
    output_variable: "subject_line"

  - task_id: "email_body"
    prompt: >
      Generate a professional, clear email for {{message_type}} message.
      
      CRITICAL INSTRUCTIONS:
      - Use simple, direct language (8th-grade reading level)
      - Keep paragraphs short (2-3 sentences max)
      - Use active voice, present tense
      - Avoid bureaucratic or overly formal language
      - Be warm and human, not robotic
      
      Language Guidelines:
      - Instead of: This study seeks to... → This study will help us...
      - Instead of: Your input would facilitate... → Your input will help us...
      - Instead of: We endeavor to... → We are working to...
      - Instead of: At your earliest convenience → When you have a moment
      
      Message Type: {{message_type}}
      Participant: {{participant_name}}
      Study: {{study_name}}
      Tone: {{tone}}
      Researcher: {{researcher_name}}
      Researcher Email: {{researcher_email}}
      Researcher Phone: {{researcher_phone}}
      Contact Method: {{contact_method}}
      
      {% if message_type == "initial_recruitment" %}
      Study Description: {{study_description}}
      Signup Instructions: {{signup_instructions}}
      Incentive: {{incentive_amount}}
      
      Structure:
      1. Warm greeting to {{participant_name}}
      2. Brief introduction of who you are
      3. What the study is about (use {{study_description}})
      4. What participation involves (time commitment, format)
      5. Compensation: {{incentive_amount}}
      6. How to sign up: {{signup_instructions}}
      7. Emphasize voluntary participation and easy withdrawal
      8. Contact info and invitation to ask questions
      {% endif %}
      
      {% if message_type == "session_confirmation" %}
      Session Date: {{session_date}}
      Session Time: {{session_time}}
      Duration: {{session_duration}}
      Meeting Link: {{meeting_link}}
      Meeting ID: {{meeting_id}}
      Dial-in Number: {{dial_in_number}}
      
      Structure:
      1. Friendly greeting
      2. Confirm session is scheduled
      3. Session details in clear format:
         - Date: {{session_date}}
         - Time: {{session_time}}
         - Duration: {{session_duration}}
         - Meeting Link: {{meeting_link}}
         - Meeting ID: {{meeting_id}}
         - Dial-in: {{dial_in_number}}
      4. What to expect during the session
      5. Request they join 5 minutes early
      6. Offer to answer questions
      7. Thank them for their time
      {% endif %}
      
      {% if message_type == "session_reminder" %}
      Session Date: {{session_date}}
      Session Time: {{session_time}}
      Duration: {{session_duration}}
      Meeting Link: {{meeting_link}}
      Meeting ID: {{meeting_id}}
      Dial-in Number: {{dial_in_number}}
      
      Structure:
      1. Friendly reminder opening
      2. Session is happening soon (tomorrow/in 2 days)
      3. Quick session details reminder:
         - Date: {{session_date}}
         - Time: {{session_time}}
         - Duration: {{session_duration}}
         - Meeting Link: {{meeting_link}}
         - Meeting ID: {{meeting_id}}
         - Dial-in: {{dial_in_number}}
      4. Brief prep instructions (no preparation needed)
      5. Easy way to reschedule if needed
      6. Looking forward to speaking with them
      {% endif %}
      
      {% if message_type == "rescheduling_request" %}
      Original Session Date: {{session_date}}
      Original Session Time: {{session_time}}
      Reason: {{reschedule_reason}}
      New Options: {{reschedule_options}}
      
      Structure:
      1. Apologetic opening
      2. Explain need to reschedule (use {{reschedule_reason}})
      3. Original time: {{session_date}} at {{session_time}}
      4. Proposed new times: {{reschedule_options}}
      5. Ask them to let you know which works best
      6. Sincere apology and appreciation for flexibility
      {% endif %}
      
      {% if message_type == "follow_up" %}
      Structure:
      1. Gentle, friendly opening
      2. Reference previous invitation to {{study_name}}
      3. Check if they're still interested in participating
      4. Remind them briefly what the study involves
      5. Make it easy to opt out with no pressure
      6. Provide simple next steps if interested
      7. Thank them for their consideration
      {% endif %}
      
      {% if message_type == "thank_you" %}
      Incentive: {{incentive_amount}}
      
      Structure:
      1. Warm, grateful opening
      2. Thank them for participating in {{study_name}}
      3. Emphasize how valuable their input was
      4. Explain how their feedback will be used
      5. Mention compensation ({{incentive_amount}}) and when they'll receive it
      6. Invite them to participate in future studies
      7. Final thank you
      {% endif %}
      
      VA Research Standards:
      - Use trauma-informed language (avoid pressure, emphasize choice)
      - Emphasize voluntary participation and easy withdrawal
      - Use clear, simple language (avoid jargon)
      - Be respectful and professional regardless of tone
      - Include accessibility statement if relevant
      
      Always end with this exact signature:
      
      Best regards,
      {{researcher_name}}
      On behalf of the Department of Veterans Affairs
      Email: {{researcher_email}}
      Phone: {{researcher_phone}}
      
      This research is conducted in accordance with VA research standards and IRB approval.
      
      Return only the email body, no subject line.
    output_variable: "email_body"

  - task_id: "followup_suggestions"
    prompt: >
      Based on sending a {{message_type}} message for {{study_name}}, suggest 2-3 specific follow-up actions the researcher should take.
      
      Consider:
      - Timing for follow-up communications
      - Potential participant responses or concerns
      - Next steps in the research process
      - Documentation needs
      - Accessibility considerations
      
      Format as specific, actionable bullet points with suggested timelines.
    output_variable: "followup_suggestions"

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. validate_message_type_requirements
  3. execute_ai_generation_tasks
  4. format_output
  5. save_to_github
  6. send_to_slack

# Output template
output_template: >
  
  ## 📧 Email Content
  
  **Subject:** {{ai_generated.subject_line}}
  
  {{ai_generated.email_body}}
  
  ---
  
  ## 📋 Next Steps
  
  {{ai_generated.followup_suggestions}}
  
  ---
  
  *Generated by Qori v{{version}} • Saved to {{filename}}*

# Output configuration
output_options:
  filename: "{{participant_name}}_{{message_type}}_{{current_date}}.md"
  path: "02-participants/outreach_messages/"
  generate_index: true
  index_filename: "README.md"
  
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      path: "02-participants/outreach_messages/"
      commit_message: "Add {{message_type}} message for {{participant_name}}"
      
    slack:
      enabled: true
      send_dm: true
      target_user: "{{slack_user_id}}"
      include_copy_button: true
      include_email_format: false
      
      message: >
        📧 Generated {{message_type|replace("_", " ")}} message for **{{participant_name}}** in {{study_name}}
        
        💾 Saved to: `{{filename}}`
        
        ---
        
        **Subject:** {{ai_generated.subject_line}}
        
        **To:** {{participant_name}} • **From:** {{researcher_name}} <{{researcher_email}}>
        
        {{ai_generated.email_body}}
      
      actions:
        - text: "📋 Copy Email"
          style: "primary"
          action_type: "copy_to_clipboard"
          content: >
            Subject: {{ai_generated.subject_line}}
            
            {{ai_generated.email_body}}
            
        - text: "📂 View Full File"
          style: "default"
          action_type: "url"
          url: "{{github_file_url}}"
          
        - text: "👥 Generate Another"
          style: "default"
          action_type: "modal"
          modal_id: "participant_outreach"

