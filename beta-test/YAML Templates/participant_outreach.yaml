id: participant_outreach
label: "📬 Participant Outreach Templates"
description: Generates outreach messages for different recruitment phases - from initial contact to post-session follow-up.
input_type: structured

# Message type selection (presented as radio buttons in Slack modal)
message_types:
  initial_recruitment:
    label: "📧 Initial Recruitment Email"
    description: "First contact to invite participants to join your study. Includes study overview and next steps."
    icon: "📧"
  
  session_confirmation:
    label: "📅 Session Confirmation"
    description: "Confirm scheduled session details with participant. Includes date, time, and joining instructions."
    icon: "📅"
  
  session_reminder:
    label: "⏰ Session Reminder"
    description: "24-48 hour reminder about upcoming session. Includes prep instructions and contact info."
    icon: "⏰"
  
  rescheduling_request:
    label: "🔄 Rescheduling Request"
    description: "When you need to reschedule a session. Apologetic tone with new time options."
    icon: "🔄"
  
  follow_up:
    label: "🔔 Follow-up"
    description: "Check in when participant hasn't responded. Gentle reminder with easy opt-out option."
    icon: "🔔"
  
  thank_you:
    label: "🙏 Thank You"
    description: "Post-session thank you with next steps, payment info, and how their input will be used."
    icon: "🙏"

# Form fields (shown in Slack modal)
fields:
  message_type:
    type: "radio"
    label: "Message Type"
    required: true
    default: "initial_recruitment"
    options: ["initial_recruitment", "session_confirmation", "session_reminder", "rescheduling_request", "follow_up", "thank_you"]
  
  participant_name:
    type: "text"
    label: "Participant Name"
    placeholder: "e.g., Alex M. or pt004"
    required: true
  
  contact_method:
    type: "select"
    label: "Contact Method"
    required: true
    default: "email"
    options: ["email", "phone", "sms"]
  
  session_date:
    type: "date"
    label: "Session Date"
    required: false
  
  session_time:
    type: "time"
    label: "Session Time"
    required: false
    default: "14:00"
  
  tone:
    type: "select"
    label: "Tone"
    required: true
    default: "friendly"
    options: ["friendly", "formal", "casual"]
  
  contact_person:
    type: "text"
    label: "Contact Person"
    placeholder: "Your name and title"
    default: "Jordan (UX Researcher)"
    required: true

# Dynamic prompts based on message type
prompts:
  initial_recruitment: |
    Write a {{tone}} initial recruitment email to {{participant_name}} inviting them to participate in a VA housing app research study. 
    
    Include:
    - Brief, friendly introduction
    - Study purpose (improving VA housing application process)
    - Session details: {{session_date}} at {{session_time}}, 45 minutes, remote
    - $75 compensation
    - Next steps and contact info for {{contact_person}}
    - Professional but welcoming tone
    
    Contact method: {{contact_method}}

  session_confirmation: |
    Write a {{tone}} session confirmation email to {{participant_name}} confirming their scheduled research session.
    
    Include:
    - Confirmation of session details: {{session_date}} at {{session_time}}
    - Virtual meeting link placeholder
    - What to expect (45-minute conversation)
    - Prep instructions (no special preparation needed)
    - Contact info for {{contact_person}} if questions
    - Looking forward to the conversation
    
    Contact method: {{contact_method}}

  session_reminder: |
    Write a {{tone}} reminder email to {{participant_name}} about their upcoming research session.
    
    Include:
    - Friendly reminder: session is {{session_date}} at {{session_time}}
    - Meeting link and dial-in info
    - Brief reminder of what to expect
    - Contact info for {{contact_person}} for questions
    - Appreciation for their time
    
    Contact method: {{contact_method}}

  rescheduling_request: |
    Write a {{tone}} rescheduling email to {{participant_name}} requesting to reschedule their session.
    
    Include:
    - Apologetic tone for the inconvenience
    - Explanation that we need to reschedule (keep it brief)
    - 2-3 alternative time options around {{session_date}}
    - Reassurance that we still want their participation
    - Contact info for {{contact_person}} to confirm new time
    - Thanks for their flexibility
    
    Contact method: {{contact_method}}

  follow_up: |
    Write a {{tone}} follow-up email to {{participant_name}} checking in about their research session participation.
    
    Include:
    - Gentle check-in (no pressure)
    - Reminder of the research opportunity
    - Session details: {{session_date}} at {{session_time}} if still available
    - Easy opt-out option if no longer interested
    - Contact info for {{contact_person}}
    - Appreciation for their consideration
    
    Contact method: {{contact_method}}

  thank_you: |
    Write a {{tone}} thank you email to {{participant_name}} after their completed research session.
    
    Include:
    - Genuine thanks for their time and insights
    - How their feedback will be used to improve VA services
    - Information about $75 payment processing
    - Timeline for when improvements might be visible
    - Contact info for {{contact_person}} for follow-up questions
    - Appreciation for their service (if veteran)
    
    Contact method: {{contact_method}}

# Output format templates
output_formats:
  email:
    subject_templates:
      initial_recruitment: "Research Opportunity: Help Improve VA Housing Services"
      session_confirmation: "Session Confirmed: {{session_date}} at {{session_time}}"
      session_reminder: "Reminder: Research Session Tomorrow at {{session_time}}"
      rescheduling_request: "Need to Reschedule: Research Session"
      follow_up: "Following up: VA Housing Research Opportunity"
      thank_you: "Thank You: Your Input Helps Improve VA Services"
    
    format: |
      Subject: {{subject}}
      
      {{email_body}}
      
      {{signature}}

  phone:
    format: |
      Phone Script for {{participant_name}}:
      
      {{phone_script}}
      
      Key points to remember:
      - {{session_date}} at {{session_time}}
      - 45-minute conversation
      - $75 thank-you payment
      - Contact: {{contact_person}}

  sms:
    format: |
      SMS to {{participant_name}}:
      
      {{sms_message}}
      
      (Keep under 160 characters)

# File naming convention for saved outputs
file_naming:
  pattern: "{{participant_name_slug}}_{{message_type}}_{{date}}"
  path: "02-participants/outreach/"
  extension: ".md"

# Slack output configuration
slack_output:
  title_format: "{{message_type_icon}} {{message_type_label}} Generated"
  context_format: "Generated for: {{participant_name}} • {{contact_method}} • {{tone}} tone • Session: {{session_date}} at {{session_time}}"
  
  buttons:
    primary:
      - text: "📋 Copy Email"
        action: "copy_to_clipboard"
      - text: "✏️ Edit & Regenerate"
        action: "edit_template"
      - text: "👥 Generate for Another Participant"
        action: "new_participant"
    
    quick_actions:
      label: "Generate other message types:"
      buttons:
        - text: "📅 Session Confirmation"
          action: "generate_confirmation"
        - text: "⏰ Session Reminder"
          action: "generate_reminder"
        - text: "🔄 Rescheduling Request"
          action: "generate_rescheduling"
        - text: "🔔 Follow-up"
          action: "generate_followup"
        - text: "🙏 Thank You"
          action: "generate_thankyou"
