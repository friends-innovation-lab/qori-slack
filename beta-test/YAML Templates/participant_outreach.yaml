id: participant_outreach
name: run_participant_outreach
label: 📧 Participant Outreach
version: v2.0
description: Generate professional participant outreach messages for VA research studies

author: CivicMind R&D
created: 2025-07-07
last_updated: 2025-07-16

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.3
  max_tokens: 2000

input_type: structured
input_processing: dynamic_conditional
precision_mode: detailed

# Enhanced Error Handling and Validation
error_handling:
  validation_errors:
    - field: "study_id"
      rules:
        - type: "required"
          message: "Please select a study"
        - type: "exists_in_database"
          table: "studies"
          message: "Selected study not found or you don't have access"
        - type: "study_active"
          message: "Selected study is not active"
    
    - field: "participant_name"
      rules:
        - type: "min_length"
          value: 2
          message: "Participant name must be at least 2 characters"
        - type: "max_length"
          value: 50
          message: "Participant name cannot exceed 50 characters"
    
    - field: "researcher_email"
      rules:
        - type: "email_format"
          message: "Please enter a valid email address"
        - type: "domain_whitelist"
          domains: ["va.gov", "vha.gov", "med.va.gov"]
          message: "Please use a VA email address"
    
    - field: "session_date"
      rules:
        - type: "future_date"
          message: "Session date must be in the future"
        - type: "business_hours"
          start_time: "08:00"
          end_time: "17:00"
          message: "Please schedule sessions during business hours (8 AM - 5 PM)"
    
    - field: "meeting_link"
      rules:
        - type: "url_format"
          message: "Please enter a valid meeting link"
        - type: "allowed_domains"
          domains: ["zoom.us", "teams.microsoft.com", "meet.google.com"]
          message: "Please use approved meeting platforms"
          
    - field: "signup_instructions"
      rules:
        - type: "contains_valid_urls"
          message: "Please check that any links in signup instructions are valid URLs"
        - type: "allowed_signup_domains"
          domains: ["calendly.com", "typeform.com", "forms.gle", "google.com", "va.gov", "microsoft.com"]
          message: "Please use approved platforms for signup links"
          optional: true

# SINGLE SOURCE OF TRUTH: Define which fields are needed for which message types
message_type_requirements:
  initial_recruitment:
    required_fields:
      - study_description
      - signup_instructions
    optional_fields:
      - incentive_amount
      
  session_confirmation:
    required_fields:
      - session_date
      - session_time
      - session_duration
      - meeting_link
      - meeting_id
      - dial_in_number
    optional_fields: []
    
  session_reminder:
    required_fields:
      - session_date
      - session_time
      - session_duration
      - meeting_link
      - meeting_id
      - dial_in_number
    optional_fields: []
    
  rescheduling_request:
    required_fields:
      - session_date
      - session_time
      - reschedule_reason
      - reschedule_options
    optional_fields: []
    
  follow_up:
    required_fields: []
    optional_fields: []
    
  thank_you:
    required_fields: []
    optional_fields:
      - incentive_amount

# Input variables - ALIGNED with message_type_requirements above
input_variables:
  # ALWAYS REQUIRED (core fields)
  - message_type:
      type: "select"
      required: true
      options: ["initial_recruitment", "session_confirmation", "session_reminder", "rescheduling_request", "follow_up", "thank_you"]
      
  - participant_name:
      type: "text"
      required: true
      placeholder: "e.g., Alex M. or pt004"
      
  - study_id:
      type: "select"
      required: true
      data_source: "existing_studies"
      placeholder: "Select a study..."
      help_text: "Choose from your existing studies created in plan-study"
      
  - study_name:
      type: "hidden"
      derived_from: "study_id.name"
      
  - study_folder_name:
      type: "hidden"
      derived_from: "study_id.folder_name"
      
  - researcher_name:
      type: "text"
      required: true
      placeholder: "e.g., Jordan (UX Researcher)"
      
  - researcher_email:
      type: "email"
      required: true
      placeholder: "researcher@va.gov"
      
  - researcher_phone:
      type: "tel"
      required: true
      placeholder: "(555) 123-4567"
      
  - contact_method:
      type: "select"
      required: true
      options: ["email", "recruitment_agency"]
      default: "email"
      
  - tone:
      type: "select"
      required: true
      options: ["friendly", "formal", "casual"]
      default: "friendly"

  # CONDITIONAL FIELDS - Required based on message type
  
  # Initial recruitment fields
  - study_description:
      type: "textarea"
      required_if: ["initial_recruitment"]
      placeholder: "Brief description of what the study involves"
      help_text: "Describe what the study involves and what participants can expect"
      
  - signup_instructions:
      type: "textarea"
      required_if: ["initial_recruitment"]
      placeholder: "e.g., Click this link to complete our screener: https://calendly.com/research-team or reply to this email"
      help_text: "How participants should sign up - include screener links, Calendly links, or email instructions"
      
  # Session-related fields (confirmation & reminder)
  - session_date:
      type: "date"
      required_if: ["session_confirmation", "session_reminder", "rescheduling_request"]
      
  - session_time:
      type: "time"
      required_if: ["session_confirmation", "session_reminder", "rescheduling_request"]
      
  - session_duration:
      type: "select"
      required_if: ["session_confirmation", "session_reminder"]
      options: ["30 minutes", "45 minutes", "60 minutes", "90 minutes"]
      default: "45 minutes"
      
  - meeting_link:
      type: "url"
      required_if: ["session_confirmation", "session_reminder"]
      placeholder: "https://va-gov.zoom.us/j/123456789"
      
  - meeting_id:
      type: "text"
      required_if: ["session_confirmation", "session_reminder"]
      placeholder: "123 456 789"
      
  - dial_in_number:
      type: "tel"
      required_if: ["session_confirmation", "session_reminder"]
      placeholder: "+1 (555) 123-4567"
      
  # Rescheduling-specific fields
  - reschedule_reason:
      type: "text"
      required_if: ["rescheduling_request"]
      placeholder: "Brief reason for rescheduling"
      
  - reschedule_options:
      type: "textarea"
      required_if: ["rescheduling_request"]
      placeholder: "List 2-3 alternative time slots"
      
  # Incentive field (recruitment & thank you)
  - incentive_amount:
      type: "text"
      required_if: []
      optional_if: ["initial_recruitment", "thank_you"]
      placeholder: "e.g., $75"
      help_text: "Compensation amount for participation"

# IMPROVED AI Generation Tasks - Using actual variables
ai_generation_tasks:
  - task_id: "subject_line"
    prompt: >
      Create a clear, professional email subject line for {{message_type}} about {{study_name}}.
      
      Context:
      - Participant: {{participant_name}}
      - Tone: {{tone}}
      - Contact method: {{contact_method}}
      
      Requirements:
      - Be specific about the purpose and study name
      - Use clear, action-oriented language
      - Keep under 60 characters for mobile readability
      - Match the {{tone}} tone appropriately
      - Include urgency indicators for time-sensitive messages
      
      Subject line examples by type:
      - initial_recruitment: "Research Opportunity: {{study_name}} - Your Input Needed"
      - session_confirmation: "Confirmed: {{study_name}} Session {{session_date}} at {{session_time}}"
      - session_reminder: "Tomorrow: {{study_name}} Session at {{session_time}}"
      - rescheduling_request: "Schedule Change: {{study_name}} Session - New Times Available"
      - follow_up: "Following up: {{study_name}} Research Opportunity"
      - thank_you: "Thank you for participating in {{study_name}}"
      
      Return ONLY the subject line, no quotes or additional text.

  - task_id: "email_body"
    prompt: >
      Create a professional, trauma-informed {{message_type}} email for the {{study_name}} research study.
      
      CRITICAL: Use these EXACT values in the email (do not use placeholders):
      - Participant Name: {{participant_name}}
      - Study Name: {{study_name}}
      - Researcher Name: {{researcher_name}}
      - Researcher Email: {{researcher_email}}
      - Researcher Phone: {{researcher_phone}}
      - Tone: {{tone}}
      - Contact Method: {{contact_method}}
      
      {% if message_type == "initial_recruitment" %}
      RECRUITMENT CONTENT (use these exact values):
      - Study Description: "{{study_description}}"
      - Signup Instructions: "{{signup_instructions}}"
      {% if incentive_amount %}
      - Incentive Amount: {{incentive_amount}}
      {% endif %}
      
      Write a complete email that:
      1. Greets {{participant_name}} warmly
      2. Explains the study: {{study_description}}
      3. Describes what participation involves based on the study description
      4. Mentions compensation: {{incentive_amount}} (if provided)
      5. Provides signup instructions: {{signup_instructions}}
      6. Emphasizes voluntary participation
      7. Includes researcher contact info
      {% endif %}
      
      {% if message_type == "session_confirmation" %}
      SESSION DETAILS (use these exact values):
      - Date: {{session_date}}
      - Time: {{session_time}}
      - Duration: {{session_duration}}
      - Meeting Link: {{meeting_link}}
      - Meeting ID: {{meeting_id}}
      - Dial-in Number: {{dial_in_number}}
      
      Write a complete email that confirms their session with all technical details.
      {% endif %}
      
      {% if message_type == "session_reminder" %}
      SESSION DETAILS (use these exact values):
      - Date: {{session_date}}
      - Time: {{session_time}}
      - Duration: {{session_duration}}
      - Meeting Link: {{meeting_link}}
      - Meeting ID: {{meeting_id}}
      - Dial-in Number: {{dial_in_number}}
      
      Write a friendly reminder email with all session access information.
      {% endif %}
      
      {% if message_type == "rescheduling_request" %}
      RESCHEDULING INFO (use these exact values):
      - Original Date: {{session_date}}
      - Original Time: {{session_time}}
      - Reason: {{reschedule_reason}}
      - New Options: {{reschedule_options}}
      
      Write an apologetic email requesting to reschedule with the new options provided.
      {% endif %}
      
      {% if message_type == "follow_up" %}
      Write a gentle follow-up email checking if {{participant_name}} is still interested in the {{study_name}} study.
      {% endif %}
      
      {% if message_type == "thank_you" %}
      Write a grateful thank-you email to {{participant_name}} for participating in {{study_name}}.
      {% if incentive_amount %}
      Mention the {{incentive_amount}} compensation.
      {% endif %}
      {% endif %}
      
      VA Research Standards:
      - Use trauma-informed language
      - Emphasize voluntary participation
      - Use clear, simple language (10th grade reading level)
      - Include accessibility statement
      - Be respectful and professional
      
      Always end with this signature:
      
      Best regards,
      {{researcher_name}}
      Department of Veterans Affairs
      Email: {{researcher_email}}
      Phone: {{researcher_phone}}
      
      *This research is conducted in accordance with VA research standards and IRB approval.*

  - task_id: "followup_suggestions"
    prompt: >
      Based on sending a {{message_type}} message for {{study_name}}, suggest 2-3 specific follow-up actions the researcher should take.
      
      Consider:
      - Timing for follow-up communications
      - Potential participant responses or concerns
      - Next steps in the research process
      - Documentation needs
      - Accessibility considerations
      
      Format as specific, actionable bullet points with suggested timelines.

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. validate_conditional_fields_against_requirements
  3. execute_ai_generation_tasks
  4. format_output
  5. save_to_github
  6. send_to_slack

# IMPROVED Output template - Better formatting, less redundancy
output_template: >
  # {{study_name}} - {{message_type}} Message
  
  **Participant:** {{participant_name}}  
  **Generated:** {{current_date}}  
  **Message Type:** {{message_type}}  
  
  ---
  
  ## 📧 Email Content
  
  **Subject:** {{ai_generated.subject_line}}
  
  **To:** {{participant_name}}  
  **From:** {{researcher_name}} <{{researcher_email}}>
  
  {{ai_generated.email_body}}
  
  ---
  
  ## 📋 Next Steps
  
  {{ai_generated.followup_suggestions}}
  
  ---
  
  *Generated by Qori v{{version}} • Saved to {{filename}}*

# Output configuration
output_options:
  filename: "{{participant_name|slug}}_{{message_type}}_{{current_date|date:'Y-m-d'}}.md"
  path: "02-participants/outreach/"
  generate_index: true
  index_filename: "README.md"
  
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      path: "02-participants/outreach/"
      commit_message: "Add {{message_type}} message for {{participant_name}}"
      
    slack:
      enabled: true
      send_dm: true
      target_user: "{{slack_user_id}}"
      include_copy_button: true
      include_email_format: true
      message: >
        📧 Generated {{message_type|replace("_", " ")}} message for **{{participant_name}}** in {{study_name}}
        
        💾 Saved to: `{{filename}}`
      
      actions:
        - text: "📋 Copy Email"
          style: "primary"
          action_type: "copy_to_clipboard"
          content: >
            Subject: {{ai_generated.subject_line}}
            
            {{ai_generated.email_body}}
            
        - text: "📂 View File"
          style: "default"
          action_type: "url"
          url: "{{github_file_url}}"
          
        - text: "👥 Generate Another"
          style: "default"
          action_type: "modal"
          modal_id: "participant_outreach"

# SINGLE SOURCE OF TRUTH - Slack UI uses message_type_requirements above
slack_ui:
  initial_modal:
    title: "📧 Participant Outreach"
    submit_label: "Next"
    close_label: "Cancel"
    blocks:
      message_type_selection:
        type: "radio_buttons"
        options: ["initial_recruitment", "session_confirmation", "session_reminder", "rescheduling_request", "follow_up", "thank_you"]
        required: true
    
  details_modal:
    title: "📝 Message Details"
    submit_label: "Generate Message"
    close_label: "Back"
    
    common_fields:
      - participant_name
      - study_id
      - researcher_name
      - researcher_email
      - researcher_phone
      - contact_method
      - tone

  validation:
    study_id:
      required: true
      exists_in_database: true
      error_message: "Please select a valid study"
    participant_name:
      min_length: 2
      max_length: 50
      error_message: "Please enter a participant name (2-50 characters)"
    researcher_name:
      min_length: 2
      max_length: 50
      error_message: "Please enter researcher name (2-50 characters)"
    researcher_email:
      email_format: true
      domain_whitelist: ["va.gov", "vha.gov", "med.va.gov"]
      error_message: "Please enter a valid VA email address"
    researcher_phone:
      phone_format: true
      error_message: "Please enter a valid phone number"
    session_date:
      future_date: true
      error_message: "Session date must be in the future"
    meeting_link:
      url_format: true
      allowed_domains: ["zoom.us", "teams.microsoft.com", "meet.google.com"]
      error_message: "Please use approved meeting platforms"

# Analytics and Tracking
analytics:
  track_events:
    - event: "message_generated"
      properties: [message_type, participant_name, study_name, researcher_name, tone, contact_method]
    - event: "message_copied"
      properties: [message_id, copy_type]

# Integration with plan-study system
study_integration:
  enabled: true
  data_source: "plan_study_database"
  study_fields:
    - id: "study_id"
    - name: "study_name" 
    - folder_name: "study_folder_name"
    - description: "study_description"
    - researcher: "researcher_name"
    - researcher_email: "researcher_email"
    - created_date: "study_created_date"
  
  fallback_mode:
    enabled: true
    show_manual_entry: true
    message: "No studies found. Create a study first using plan-study or enter details manually."
    
  validation:
    require_active_study: true
    check_permissions: true
    error_message: "Please select a valid, active study you have access to."

# Message type descriptions for UI  
message_type_descriptions:
  initial_recruitment: "First contact to invite participants to join your study"
  session_confirmation: "Confirm scheduled session details with participant"
  session_reminder: "24-48 hour reminder about upcoming session"
  rescheduling_request: "When you need to reschedule a session"
  follow_up: "Check in when participant hasn't responded"
  thank_you: "Post-session thank you with next steps"
