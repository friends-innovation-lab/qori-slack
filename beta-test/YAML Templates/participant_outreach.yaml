id: participant_outreach
name: run_participant_outreach
label: 📧 Participant Outreach
version: v1.0
description: |
  Generate VA-compliant participant outreach messages for research studies. Creates professional, accessible communication for recruitment, scheduling, and follow-up based on research phase and participant needs.

author: CivicMind R&D
created: 2025-07-07
last_updated: 2025-07-07

# LangChain.js Router Configuration
router_config:
  primary_worker: "llm_worker"
  model: "gpt-3.5-turbo"
  temperature: 0.4
  max_tokens: 1500

input_type: structured
input_processing: direct
precision_mode: concise

# Input schema for Slack UI
input_variables:
  - message_type         # Selected message type (REQUIRED)
  - study_name          # Name of the research study (REQUIRED)
  - researcher_name     # Lead researcher name (REQUIRED)
  - researcher_email    # Contact email (REQUIRED)
  - participant_name    # Participant name (OPTIONAL - for personalization)
  - session_date        # Session date (REQUIRED for confirmation/reminder)
  - session_time        # Session time (REQUIRED for confirmation/reminder)
  - session_link        # Meeting link (REQUIRED for confirmation/reminder)
  - study_description   # Brief study description (REQUIRED for initial recruitment)
  - incentive_amount    # Compensation amount (OPTIONAL)
  - reschedule_options  # Available reschedule times (REQUIRED for reschedule)

# Message type specific prompts
message_type_prompts:
  initial_recruitment:
    prompt: |
      Create a professional, welcoming initial recruitment message for "{{study_name}}" that includes:
      - Warm, respectful greeting
      - Brief study description: {{study_description}}
      - What participation involves (duration, format)
      - Compensation information: {{incentive_amount}}
      - Next steps to participate
      - Clear contact information: {{researcher_name}} at {{researcher_email}}
      - VA research ethics and voluntary participation language
      - Professional, accessible tone at 10th-grade reading level
    
  session_confirmation:
    prompt: |
      Create a session confirmation message for "{{study_name}}" that includes:
      - Confirmation of participation
      - Session details: {{session_date}} at {{session_time}}
      - Meeting link: {{session_link}}
      - What to expect during the session
      - Pre-session preparation instructions
      - Technical requirements (if remote)
      - Contact information: {{researcher_name}} at {{researcher_email}}
      - Professional, clear tone with helpful logistics
    
  session_reminder:
    prompt: |
      Create a 24-48 hour session reminder for "{{study_name}}" that includes:
      - Friendly reminder of upcoming session
      - Session details: {{session_date}} at {{session_time}}
      - Meeting link: {{session_link}}
      - Preparation checklist or instructions
      - What to do if they need to reschedule
      - Contact information: {{researcher_name}} at {{researcher_email}}
      - Encouraging, supportive tone
    
  rescheduling_request:
    prompt: |
      Create an apologetic rescheduling message for "{{study_name}}" that includes:
      - Sincere apology for the schedule change
      - Brief explanation (without oversharing details)
      - Alternative time options: {{reschedule_options}}
      - Reassurance about their continued participation
      - Easy way to confirm new time
      - Contact information: {{researcher_name}} at {{researcher_email}}
      - Respectful, understanding tone
    
  follow_up:
    prompt: |
      Create a gentle follow-up message for "{{study_name}}" that includes:
      - Polite check-in about participation
      - Reminder of study importance and their valuable input
      - Easy way to confirm or decline participation
      - Clear opt-out option with no penalty
      - Alternative participation options if relevant
      - Contact information: {{researcher_name}} at {{researcher_email}}
      - Respectful, pressure-free tone
    
  thank_you:
    prompt: |
      Create a post-session thank you message for "{{study_name}}" that includes:
      - Sincere gratitude for their participation
      - Acknowledgment of their valuable contribution
      - Information about compensation/payment: {{incentive_amount}}
      - Timeline for payment processing
      - How their input will be used (anonymized)
      - Optional future research opportunities
      - Contact information: {{researcher_name}} at {{researcher_email}}
      - Warm, appreciative tone

# AI Generation Task
ai_generation_tasks:
  - task_id: "message_content"
    worker: "llm_worker"
    prompt: "{{selected_message_prompt}}"

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. select_message_prompt
  3. execute_ai_generation
  4. format_output

# Output template
output_template: |
  **Subject:** {{generated_subject_line}}
  
  ---
  
  {{ai_generated.message_content}}
  
  ---
  
  **Message Type:** {{message_type}}  
  **Study:** {{study_name}}  
  **Generated:** {{current_date}}

# Slack notification configuration
slack_config:
  notify_channel: "#research-ops"
  message: "📧 {{message_type}} message generated for {{study_name}}"
