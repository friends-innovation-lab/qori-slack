id: upload_notes_integrated
label: 📝 Upload Session Notes (Integrated)
description: Automatic session documentation triggered by participant tracker integration
input_type: pre_populated
input_processing: ai_enhanced_analysis

# INTEGRATION: Auto-populated from participant tracker
# Triggered when: session_datetime + 30_minutes has passed
integration_source: participant_tracker
trigger_conditions:
  - session_status: "confirmed"
  - current_time: ">session_datetime + 30_minutes"
  - observers_assigned: true

# Pre-populated inputs from participant tracker
inputs:
  # Session context (from participant tracker)
  study_id: "{{tracker_study_id}}"
  study_name: "{{tracker_study_name}}"
  participant_id: "{{tracker_participant_id}}"
  session_date: "{{tracker_session_date}}"
  session_time: "{{tracker_session_time}}"
  session_observers: "{{tracker_session_observers}}" # Array from tracker
  
  # Current user context (from Slack notification trigger)
  current_user_id: "{{slack_user_id}}"
  current_user_role: "{{user_observer_role}}" # From tracker observer assignment
  triggered_by_notification: true
  notification_timestamp: "{{current_timestamp}}"
  
  # Input method and content (user-provided)
  input_method: "{{input_method}}" # upload, zoom, manual
  uploaded_files: "{{uploaded_files}}" # array of file objects
  manual_notes: "{{manual_notes}}" # direct text input
  zoom_meeting_id: "{{zoom_meeting_id}}" # for zoom integration
  
  # Processing metadata
  uploaded_by: "{{current_user_id}}"
  upload_timestamp: "{{upload_timestamp}}"
  session_duration: "{{tracker_session_duration}}"
  session_platform: "{{tracker_session_platform}}"

# Role-specific guidance and prompts
role_specific_prompts:
  lead_researcher:
    title: "Lead Researcher Checklist"
    description: "Your upload will serve as the foundation for this session's documentation."
    focus_areas:
      - "Overall session flow and participant behavior"
      - "Key quotes and emotional reactions"
      - "Technical issues or usability problems"  
      - "Follow-up questions for future research"
      - "Professional observations and insights"
    processing_priority: "high"
    
  note_taker:
    title: "Note-Taker Focus Areas"
    description: "Help verify and supplement the session documentation."
    focus_areas:
      - "Quote accuracy and context"
      - "Missed observations or details"
      - "Participant non-verbal cues"
      - "Technical difficulties encountered"
      - "Timing and flow clarifications"
    processing_priority: "medium"
    
  pm_observer:
    title: "PM Observer Insights"
    description: "Focus on business and product implications."
    focus_areas:
      - "Business impact observations"
      - "Feature prioritization insights"
      - "Technical feasibility notes"
      - "User adoption barriers"
      - "Market validation points"
    processing_priority: "medium"
    
  silent_observer:
    title: "Silent Observer Contributions"
    description: "Share your unique perspective from observing."
    focus_areas:
      - "User behavior patterns"
      - "Emotional journey mapping"
      - "Accessibility observations"
      - "Environment/context factors"
      - "Comparative insights"
    processing_priority: "low"
    
  stakeholder:
    title: "Stakeholder Strategic View"
    description: "Provide strategic context and policy implications."
    focus_areas:
      - "Strategic implications"
      - "Policy considerations"
      - "Resource allocation insights"
      - "Compliance observations"
      - "Organizational impact"
    processing_priority: "high"

# Automatic notification system
notification_workflow:
  # Step 1: Lead researcher notification (immediate)
  lead_researcher_notification:
    trigger: "session_datetime + 30_minutes"
    message: |
      🎬 **Session Complete: {{participant_id}} - {{study_name}}**
      
      Your session with {{participant_id}} finished 30 minutes ago.
      
      📝 Upload your session notes while they're still fresh in your memory.
      
      Other observers will be notified once you upload your notes.
    
    actions:
      - text: "📝 Upload My Notes"
        style: "primary"
        action_type: "modal"
        modal_id: "upload_notes_integrated"
        pre_populated_data:
          study_id: "{{study_id}}"
          participant_id: "{{participant_id}}"
          current_user_role: "lead_researcher"
          
  # Step 2: Observer notifications (after lead researcher uploads)
  observer_notifications:
    trigger: "lead_researcher_upload_complete"
    delay: "1_hour" # Give lead researcher notes time to process
    message: |
      📋 **Observer Input Requested: {{participant_id}} - {{study_name}}**
      
      {{lead_researcher_name}} has uploaded the initial session notes.
      
      **Your role:** {{observer_role}}
      **Deadline:** {{deadline_timestamp}} (48 hours)
      
      Please review the initial notes and add your observations.
    
    actions:
      - text: "📖 Review Initial Notes"
        style: "secondary"
        url: "{{session_notes_url}}"
        
      - text: "➕ Add My Input"
        style: "primary"  
        action_type: "modal"
        modal_id: "upload_notes_integrated"
        pre_populated_data:
          study_id: "{{study_id}}"
          participant_id: "{{participant_id}}"
          current_user_role: "{{observer_role}}"

# Automatic PII protection (always enabled)
privacy_protection:
  pii_scrubbing:
    enabled: true
    auto_detect: true
    
    patterns_to_redact:
      names: true # Replace with participant IDs
      email_addresses: true
      phone_numbers: true
      ssn: true
      addresses: true
      veteran_ids: true
      case_numbers: true
    
    replacement_strategy:
      names: "{{participant_id}}"
      generic: "[{{type}}_REDACTED]"
      
    confidence_threshold: 0.85
    human_review_required: false # Auto-approve for government efficiency
    
  audit_trail:
    log_redactions: true
    track_reviewer: true
    maintain_mapping: false

# Automatic insight coding (always enabled)
insight_coding:
  enabled: true
  
  categories:
    pain_points:
      icon: "🔴"
      severity_levels: ["Critical", "High", "Medium", "Low"]
      
    opportunities:
      icon: "🟡"  
      impact_levels: ["High Impact", "Medium Impact", "Quick Win"]
      
    key_insights:
      icon: "💡"
      insight_types: ["User Behavior", "System Issue", "Process Gap", "Success Pattern"]
      
    usability_issues:
      icon: "⚠️"
      severity_levels: ["Blocker", "Major", "Minor", "Enhancement"]
      
    feature_requests:
      icon: "✨"
      priority_levels: ["Must Have", "Should Have", "Nice to Have"]
  
  role_weighted_coding:
    lead_researcher: 1.0 # Full weight
    pm_observer: 0.8 # High weight for business insights
    note_taker: 0.6 # Medium weight
    stakeholder: 0.9 # High weight for strategic insights
    silent_observer: 0.5 # Lower weight

# Search and discoverability
search_optimization:
  github_search:
    enabled: true
    indexable_fields: ["participant_quotes", "themes", "pain_points", "insights"]
    
  metadata_tagging:
    study_tags: true
    participant_tags: true
    session_tags: true
    insight_tags: true
    
  cross_reference:
    link_related_sessions: true
    link_similar_insights: true
    track_theme_evolution: true

# File processing and integration
file_processing:
  supported_formats:
    transcripts: [".txt", ".docx", ".pdf", ".md"]
    audio: [".mp3", ".m4a", ".wav", ".aac"]
    video: [".mp4", ".mov", ".avi", ".webm"]
    
  max_file_size: "100MB"
  
  transcription_service:
    enabled: true
    provider: "azure_speech" # or "aws_transcribe", "google_speech"
    language: "en-US"
    speaker_diarization: true
    
  content_extraction:
    pdf_ocr: true
    docx_formatting: true
    timestamp_preservation: true
  
  zoom_integration:
    enabled: true
    auto_fetch_transcript: true
    auto_fetch_recording: true
    meeting_id_validation: true

# AI processing pipeline
ai_processing:
  content_analysis:
    sentiment_analysis: true
    emotion_detection: true
    topic_modeling: true
    key_phrase_extraction: true
    
  research_specific:
    usability_issues: true
    feature_requests: true
    user_goals: true
    pain_point_severity: true
    accessibility_barriers: true
    
  output_structuring:
    executive_summary: true
    detailed_findings: true
    participant_quotes: true
    researcher_observations: true
    next_steps: true

output_template: |
  # 📝 Session Notes: {{participant_id}}
  
  **Study:** {{study_name}}  
  **Session Date:** {{session_date}} at {{session_time}}  
  **Generated:** {{upload_timestamp}} by {{uploaded_by}} ({{current_user_role}})  
  **Status:** {{processing_status}}

  ---

  ## 🎬 Session Overview

  {{ai_executive_summary}}

  **Key Findings:** {{key_findings_count}} insights identified  
  **Critical Issues:** {{critical_issues_count}} requiring immediate attention  
  **Opportunities:** {{opportunities_count}} for improvement identified  

  ---

  ## 💬 Key Participant Quotes

  {{#each participant_quotes}}
  > **{{context}}**  
  > "{{quote}}"  
  > *— {{participant_id}} ({{timestamp}})* <!-- PII-scrubbed: original name replaced with participant ID -->

  {{/each}}

  ---

  ## 🔴 Pain Points

  {{#each pain_points}}
  **{{severity}} - {{title}}**
  - *Description:* {{description}}
  - *User Impact:* {{user_impact}}
  - *Frequency:* {{frequency}}
  - *Evidence:* "{{supporting_quote}}"
  - *Recommendation:* {{recommendation}}
  {{/each}}

  ## 🟡 Opportunities

  {{#each opportunities}}  
  **{{impact_level}} - {{title}}**
  - *Description:* {{description}}
  - *Business Value:* {{business_value}}
  - *Implementation Effort:* {{effort_estimate}}
  - *Evidence:* "{{supporting_quote}}"
  {{/each}}

  ## 💡 Key Insights

  {{#each key_insights}}
  **{{insight_type}} - {{title}}**
  - *Insight:* {{description}}
  - *Implication:* {{implication}}
  - *Evidence:* "{{supporting_quote}}"
  - *Cross-session Pattern:* {{pattern_status}}
  {{/each}}

  ## ⚠️ Usability Issues

  {{#each usability_issues}}
  **{{severity}} - {{title}}**
  - *Issue:* {{description}}
  - *User Behavior:* {{observed_behavior}}
  - *Suggested Fix:* {{suggested_solution}}
  - *WCAG Impact:* {{wcag_relevance}}
  {{/each}}

  ---

  ## 🎯 Research Objectives & Outcomes

  **Objectives Addressed:**
  {{#each objectives_met}}
  - ✅ {{objective}}
  {{/each}}

  **Unaddressed Areas:**
  {{#each objectives_missed}}
  - ⏳ {{objective}} (Reason: {{reason}})
  {{/each}}

  ---

  ## 🎬 Session Flow & Behavior

  ### Timeline of Events
  {{#each session_timeline}}
  **{{timestamp}}** - {{event_type}}  
  {{event_description}}
  {% if participant_reaction %}*Participant reaction:* {{participant_reaction}}{% endif %}

  {{/each}}

  ### Task Performance
  {{#each tasks}}
  #### Task {{task_number}}: {{task_name}}
  - **Completion:** {{completion_status}}
  - **Time Taken:** {{duration}}
  - **Success Rate:** {{success_rate}}
  - **Difficulty Rating:** {{difficulty}} (1-5 scale)
  - **Notable Behaviors:** {{behaviors}}
  {{/each}}

  ---

  ## 👥 Observer Contributions

  {% for observer in session_observers %}
  ### {{observer.name}} ({{observer.role}})
  {% if observer.contributed %}
  **Upload Date:** {{observer.upload_timestamp}}  
  **Key Contributions:** {{observer.contribution_summary}}

  {{observer.processed_content}}
  {% else %}
  *Upload pending - deadline: {{observer.deadline}}*
  {% endif %}
  {% endfor %}

  ---

  ## ✅ Action Items & Next Steps

  ### Immediate Actions (1-2 weeks)
  {{#each immediate_actions}}
  - [ ] **{{action}}**
    - *Owner:* {{owner}}
    - *Due Date:* {{due_date}}
    - *Priority:* {{priority}}
  {{/each}}

  ### Short-term Actions (1-2 months)
  {{#each short_term_actions}}
  - [ ] **{{action}}**
    - *Owner:* {{owner}}
    - *Estimated Effort:* {{effort}}
  {{/each}}

  ### Long-term Considerations
  {{#each long_term_items}}
  - **{{consideration}}**
    - *Impact:* {{impact}}
    - *Dependencies:* {{dependencies}}
  {{/each}}

  ---

  ## 🔄 Follow-up Planning

  **Recommended Follow-up Sessions:**
  {{#each follow_up_sessions}}
  - {{session_type}} with {{participant_id}} (Timing: {{timing}})
    - *Focus:* {{focus_areas}}
    - *Questions to explore:* {{questions}}
  {{/each}}

  **Cross-participant Patterns:**
  {{cross_participant_insights}}

  ---

  ## 📊 Research Metrics

  | Metric | Value | Notes |
  |--------|-------|-------|
  | Task Success Rate | {{overall_success_rate}}% | {{success_notes}} |
  | Average Task Time | {{avg_task_time}} min | {{timing_notes}} |
  | User Satisfaction | {{satisfaction_score}}/10 | {{satisfaction_notes}} |
  | Critical Issues Found | {{critical_issues}} | {{issues_notes}} |
  | Accessibility Barriers | {{accessibility_barriers}} | {{barriers_notes}} |

  ---

  ## 📝 Accessibility & Accommodations

  **Special Needs Summary:**
  {{#each accommodations}}
  - {{participant_id}}: {{accommodation_details}}
  {{/each}}

  **Accessibility Observations:**
  {{#each accessibility_notes}}
  - **{{barrier_type}}:** {{description}}
    - *Affected Users:* {{user_groups}}
    - *Severity:* {{accessibility_severity}}
    - *WCAG Relevance:* {{wcag_guideline}}
    - *Recommended Action:* {{recommendation}}
  {{/each}}

  ---

  ## 🔗 Session Files

  - **Participant Profile:** [{{participant_id}} Details](../participant-tracker/{{participant_id}}.md)
  - **Study Protocol:** [{{study_name}} Protocol](../study-design/protocol.md)
  - **Redacted Transcript:** [{{participant_id}}-transcript.txt](./redacted-transcripts/{{participant_id}}-transcript.txt)
  - **Session Summary:** [{{participant_id}}-summary.md](./session-summaries/{{participant_id}}-summary.md)  
  - **Observer Insights:** [{{participant_id}}-observer-input.md](./observer-insights/{{participant_id}}-observer-input.md)

  ---

  ## 🔍 Search & Discovery

  **GitHub Search Tips:**
  - Search across all sessions: `repo:your-org/research-repo "pain point"`
  - Find similar insights: `repo:your-org/research-repo "{{key_theme}}" path:fieldwork`
  - Participant-specific search: `repo:your-org/research-repo "{{participant_id}}" path:session-notes`
  - Cross-study patterns: `repo:your-org/research-repo "usability issue" path:primary-research`

  **Searchable Content:** All participant quotes, themes, pain points, and insights are indexed for GitHub search.

  ---

  **🔍 GitHub Search Tags:** `{{study_name}}` `{{participant_id}}` `session-complete` `{{key_themes}}`

  **📝 Processing Details:**
  - *Integration Source:* Participant Tracker (Auto-triggered)
  - *Privacy Protection:* {{pii_items_redacted}} items redacted
  - *AI Confidence:* {{ai_confidence_score}}% 
  - *Contributors:* {{contributor_count}}/{{assigned_observers_count}}
  - *Last Updated:* {{last_updated}}
  - *Next Review:* {{next_review_date}}

# File organization (updated folder structure)
output_options:
  primary_file:
    filename: "{{participant_id}}-session-notes.md"
    path: "primary-research/fieldwork/{{study_name}}/session-notes/"
  
  supporting_files:
    redacted_transcript:
      filename: "{{participant_id}}-transcript.txt"
      path: "primary-research/fieldwork/{{study_name}}/redacted-transcripts/"
    
    observer_contributions:
      filename: "{{participant_id}}-observer-input.md"
      path: "primary-research/fieldwork/{{study_name}}/observer-insights/"
    
    session_summary:
      filename: "{{participant_id}}-summary.md"
      path: "primary-research/fieldwork/{{study_name}}/session-summaries/"
      
  indexing:
    update_study_index: true
    update_participant_index: true
    create_session_index: true
  
  delivery:
    github:
      enabled: true
      commit_message: "📝 {{current_user_role}} notes for {{participant_id}} - {{insights_coded_count}} insights coded"
      auto_pr: false
      
    slack:
      enabled: true
      channel: "{{study_slack_channel}}"
      dm_researcher: true
      
      # Different messages based on role
      message_templates:
        lead_researcher: |
          🎬 **Session Notes Generated** for {{study_name}}
          
          **Participant:** {{participant_id}}
          **Lead Researcher:** {{uploaded_by}}
          **Insights Found:** {{insights_coded_count}}
          
          {% if critical_issues_count > 0 %}
          🔴 **{{critical_issues_count}} Critical Issues** identified
          {% endif %}
          
          📤 **Next:** Observer notifications sent - {{pending_observer_count}} contributors pending
          
        observer: |
          ➕ **Observer Input Added** to {{study_name}}
          
          **Contributor:** {{uploaded_by}} ({{current_user_role}})
          **Session:** {{participant_id}}
          **Additional Insights:** {{new_insights_count}}
          
          📊 **Status:** {{completed_observers}}/{{total_observers}} observers completed
          
      actions:
        - text: "📖 View Session Notes"
          style: "primary"
          url: "{{github_notes_url}}"
          
        - text: "📊 View Study Progress"
          style: "default"
          url: "{{study_dashboard_url}}"

# Integration with participant tracker (two-way sync)
participant_tracker_integration:
  # Update participant status when notes are uploaded
  status_updates:
    lead_researcher_upload: "session_documented"
    all_observers_complete: "fully_documented"
    
  # Trigger next phase workflows
  workflow_triggers:
    after_lead_upload:
      - target: "observer_notification"
        delay: "1_hour"
        
    after_all_observers:
      - target: "session_synthesis" 
        condition: "session_count >= 5 OR all_participants_complete"
        delay: "24_hours"
        
    weekly_synthesis:
      - target: "research_synthesis"
        schedule: "weekly_friday_5pm"
        condition: "new_sessions_this_week > 0"

# Observer deadline management
deadline_management:
  observer_deadline: "48_hours"
  
  reminder_schedule:
    first_reminder: "24_hours_after_notification"
    final_reminder: "6_hours_before_deadline"
    
  escalation:
    auto_finalize: true
    notify_lead_researcher: true
    mark_incomplete: true
    
  deadline_message: |
    ⏰ **Observer Input Deadline Reminder**
    
    **Session:** {{participant_id}} - {{study_name}}
    **Your Role:** {{observer_role}}
    **Time Remaining:** {{time_until_deadline}}
    
    Please upload your observations or the session will be finalized without your input.

# Quality assurance and validation
quality_assurance:
  content_validation:
    min_content_length: 200 # Shorter for observer contributions
    ai_confidence_threshold: 0.7
    
  integration_validation:
    verify_participant_tracker_sync: true
    verify_observer_assignments: true
    check_session_timing: true
    
  automated_review:
    flag_sensitive_content: true
    validate_pii_scrubbing: true
    check_insight_coding_quality: true

# Capacity management and validation
capacity_management:
  max_observers_per_session: 3
  role_limits:
    note_taker: 1
    stakeholder: 1
    pm_observer: 2
    silent_observer: 3
    
  validation_rules:
    - check_session_capacity_before_assignment
    - validate_observer_role_limits
    - confirm_no_duplicate_assignments
    
  overflow_handling:
    action: "create_waitlist"
    notification: "notify_researcher_and_requester"

# Analytics for system optimization
analytics:
  track_response_rates: true
  measure_upload_timing: true
  analyze_content_quality: true
  monitor_integration_success: true
  track_processing_time: true
  measure_ai_accuracy: true
  monitor_observer_response_rate: true
  analyze_finding_patterns: true
  
reporting:
  observer_participation_rates: true
  session_completion_metrics: true
  integration_health_dashboard: true
  content_quality_scores: true
  weekly_summary: true
  study_progress_dashboard: true
  cross_session_analysis: true
  methodology_effectiveness: true

# Workflow integration with other systems
workflow_integration:
  triggers:
    observer_request_approved:
      enabled: true
      action: "update_tracker_with_observer"
      data_mapping:
        observer_user_id: "requesting_user"
        observer_user_name: "requesting_user_name"
        observer_role: "requested_role"
        session_id: "session_id"
        triggered_by_observer_request: true
      
    manual_observer_assignment:
      enabled: true
      action: "update_tracker_with_observer"
      
  auto_triggers:
    observer_guidelines:
      condition: "observer_assignment == true AND observer_status == confirmed"
      target_workflow: "observer_guide"
      delay: "immediate"
      
    capacity_alert:
      condition: "observer_count >= 3"
      action: "notify_researcher_capacity_reached"
      
# Integration data mappings for cross-workflow communication
integration_mappings:
  from_observer_request:
    requesting_user: "observer_user_id"
    requesting_user_name: "observer_user_name" 
    requested_role: "observer_role"
    session_id: "session_id"
    
  to_observer_guide:
    observer_user_name: "observer_name"
    observer_role: "observer_role"
    session_id: "session_id"
    participant_name: "participant_name"
    scheduled_date: "session_date"
    scheduled_time: "session_time"
    
  from_participant_tracker:
    tracker_study_id: "study_id"
    tracker_study_name: "study_name"
    tracker_participant_id: "participant_id"
    tracker_session_date: "session_date"
    tracker_session_time: "session_time"
    tracker_session_observers: "session_observers"
    tracker_session_duration: "session_duration"
    tracker_session_platform: "session_platform"
