id: survey_synthesis
name: survey_response_synthesizer

label: 📊 Survey Synthesis
version: "v3.0"

description: >
  Analyze open-ended survey responses using thematic analysis.
  Identifies patterns across responses, counts frequency, extracts
  representative quotes, and generates actionable recommendations.
  
  v3.0: Switched to Claude Sonnet, improved question_focus handling,
  removed unused variables for cleaner modal alignment.

author: Qori R&D
created: 2025-08-11
last_updated: 2026-01-29

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration - Claude Sonnet
llm_config:
  model: "claude-sonnet-4-20250514"
  temperature: 0.2
  max_tokens: 6000

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 500
  max_file_size: 200000
  supported_formats: [".csv", ".xlsx", ".xls"]
  max_files_per_analysis: 5

# Slack modal input variables
input_variables:
  - name: selected_study
    type: select
    required: true
    description: "Study folder name"
    
  - name: survey_name
    type: text
    required: true
    placeholder: "e.g., Post-launch satisfaction survey"
    description: "Name of the survey being analyzed"
    
  - name: question_focus
    type: textarea
    required: false
    placeholder: "e.g., Q5: What was most frustrating? Q8: Any other feedback?"
    description: "Specific questions to prioritize. If blank, analyzes all text responses."
    
  - name: survey_files
    type: file_input
    required: true
    filetypes: ["csv", "xlsx", "xls"]
    max_files: 5
    description: "Survey export files"
    
  - name: combined_file_content
    type: textarea
    required: true
    description: "Extracted content from uploaded files (provided by backend)"

# File discovery system
auto_file_discovery:
  core_files:
    survey_data:
      file_patterns: ["*survey*", "*responses*", "*feedback*"]
      search_paths: ["01-planning/surveys/"]
      priority: "required"
      confidence_weight: 60
      
    previous_analysis:
      file_patterns: ["*survey_synthesis*", "*survey_analysis*"]
      search_paths: ["04-analysis/"]
      priority: "optional"
      confidence_weight: 20

# AI generation task
ai_generation_tasks:
  - task_id: "survey_synthesis_complete"
    prompt: |
      You are synthesizing open-ended survey responses using thematic analysis.
      
      IMPORTANT: Generate the COMPLETE output following the format below. Do not stop early.
      
      ============================================================
      RULES — READ THEN GENERATE FULL OUTPUT
      ============================================================
      
      RULE 1: THEME-BY-THEME, NOT RESPONSE-BY-RESPONSE
      
      ❌ WRONG:
      "Response 1: User said X. Response 2: User said Y."
      
      ✅ RIGHT:
      "Theme: Loading Speed — 47 of 76 responses (62%) mentioned this."
      
      Aggregate patterns across ALL responses. No one reads response-by-response.
      
      RULE 2: EVERY THEME NEEDS FREQUENCY + QUOTES
      
      For each theme:
      - Count: How many responses mentioned it
      - Percentage: What portion of total responses
      - Quotes: 2-3 representative quotes with respondent IDs (R001, R012, etc.)
      
      RULE 3: RESPONDENT CITATIONS
      
      Assign IDs sequentially: R001, R002, R003...
      Every quote must cite: "[Quote]" — R00X
      
      RULE 4: SENTIMENT WITH MEANING
      
      ❌ WRONG: "50% negative, 32% positive"
      ✅ RIGHT: "50% negative — primarily about loading times and navigation"
      
      Always explain WHAT is driving the sentiment.
      
      RULE 5: NO HALLUCINATION
      
      - Only report themes that actually appear in the data
      - Counts must be accurate — if you're unsure, say "approximately"
      - Quotes must be verbatim from responses
      - Never invent responses or fabricate statistics
      
      RULE 6: QUESTION FOCUS
      
      {{#if question_focus}}
      PRIORITIZE these questions in your analysis:
      {{question_focus}}
      
      Focus your thematic analysis primarily on responses to these questions.
      You may note patterns from other questions if highly relevant.
      {{else}}
      Analyze ALL open-ended/text responses in the data.
      Skip closed-ended questions (multiple choice, ratings, etc.) unless
      they provide important context for open-ended responses.
      {{/if}}
      
      RULE 7: VA CONTEXT (if applicable)
      
      If this is VA research:
      - Users are Veterans
      - Focus on benefits, healthcare, claims, prescriptions
      - NEVER mention: Marketing, Sales, engagement metrics
      
      RULE 8: VERIFY BEFORE SUBMITTING
      - Theme counts add up correctly
      - Every quote has a respondent ID
      - Sentiment percentages total ~100%
      - Recommendations tie to specific themes
      
      ============================================================
      INPUT DATA
      ============================================================
      
      **Study:** {{selected_study}}
      **Survey:** {{survey_name}}
      {{#if question_focus}}
      **Questions to Focus On:** {{question_focus}}
      {{/if}}
      **Survey Data:** 
      ---BEGIN DATA---
      {{combined_file_content}}
      ---END DATA---
      
      ============================================================
      NOW GENERATE THE COMPLETE OUTPUT BELOW
      ============================================================
      
      # 📊 Survey Synthesis: {{survey_name}}
      
      > **Study:** {{selected_study}} | **Generated:** {{current_date}}
      
      ---
      
      ## Overview
      
      | | |
      |---|---|
      | **Survey** | {{survey_name}} |
      | **Responses Analyzed** | [X] |
      | **Themes Identified** | [Y] |
      {{#if question_focus}}
      | **Focus Questions** | {{question_focus}} |
      {{/if}}
      | **Top Finding** | [1 sentence — the most important takeaway] |
      
      ---
      
      ## Theme Summary
      
      | # | Theme | Frequency | Sentiment | Priority |
      |---|-------|:---------:|:----------|:--------:|
      | 1 | [Theme name] | [X] ([Y]%) | 😤 Negative | 🔴 |
      | 2 | [Theme name] | [X] ([Y]%) | 😊 Positive | 🟢 |
      | 3 | [Theme name] | [X] ([Y]%) | 🤔 Mixed | 🟡 |
      | 4 | [Theme name] | [X] ([Y]%) | [Emoji] [Sentiment] | [Priority] |
      
      > **Note:** Percentages may exceed 100% as responses can mention multiple themes.
      
      ---
      
      ## Theme 1: [Theme Name]
      
      **Frequency:** [X] of [Total] responses ([Y]%)
      
      **Sentiment:** [😤 Negative / 😊 Positive / 🤔 Mixed / 😐 Neutral]
      
      **What respondents said:**
      
      > "[Direct quote from response]" — R00X
      
      > "[Direct quote from response]" — R00X
      
      > "[Direct quote from response]" — R00X
      
      **Pattern:** [1-2 sentences explaining what this theme means and why it matters]
      
      ---
      
      ## Theme 2: [Theme Name]
      
      **Frequency:** [X] of [Total] responses ([Y]%)
      
      **Sentiment:** [Emoji] [Sentiment]
      
      **What respondents said:**
      
      > "[Direct quote]" — R00X
      
      > "[Direct quote]" — R00X
      
      **Pattern:** [1-2 sentences]
      
      ---
      
      ## Theme 3: [Theme Name]
      
      **Frequency:** [X] of [Total] responses ([Y]%)
      
      **Sentiment:** [Emoji] [Sentiment]
      
      **What respondents said:**
      
      > "[Direct quote]" — R00X
      
      > "[Direct quote]" — R00X
      
      **Pattern:** [1-2 sentences]
      
      ---
      
      [Continue for additional themes as needed]
      
      ---
      
      ## Sentiment Overview
      
      | Sentiment | Count | % | Key Driver |
      |-----------|:-----:|:-:|------------|
      | 😤 Negative | [X] | [Y]% | [What topics caused frustration] |
      | 😊 Positive | [X] | [Y]% | [What topics caused satisfaction] |
      | 🤔 Mixed | [X] | [Y]% | [What topics had split opinions] |
      | 😐 Neutral | [X] | [Y]% | [Factual/descriptive responses] |
      
      **Key Insight:** [1-2 sentences — what the overall sentiment pattern tells us]
      
      ---
      
      ## Recommendations
      
      | Priority | Action | Based On | Owner |
      |:--------:|--------|----------|-------|
      | 🔴 | [Specific action to address issue] | Theme 1 | `[Team]` |
      | 🔴 | [Specific action] | Theme 2 | `[Team]` |
      | 🟡 | [Specific action] | Theme 3 | `[Team]` |
      
      > **Legend:** 🔴 High | 🟡 Medium | 🟢 Low
      
      ---
      
      ## Methodology
      
      **Framework:** Thematic Analysis
      
      **Approach:** Open-ended responses were coded for recurring themes, counted for frequency, and analyzed for sentiment patterns. Representative quotes were extracted to illustrate each theme.
      
      **Data Source:** {{survey_name}} — [X] responses
      
      ---
      
      ### References
      
      This analysis follows established survey analysis methods:
      
      - **Virginia Braun & Victoria Clarke** — Thematic analysis methodology
      - **Nielsen Norman Group** — Survey data analysis best practices
      - **Qualtrics** — Open-ended response coding guidelines
      
      ---
      
      *Generated by Qori • {{current_date}}*

# Processing workflow
processing_workflow:
  - validate_slack_modal_inputs
  - discover_files_from_study_selection
  - parse_survey_data
  - combine_selected_files_with_truncation
  - execute_survey_synthesis_complete
  - format_slack_output
  - format_github_output
  - save_to_analysis_folder

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "survey_focused"
  file_format: "github_markdown"
  path: "04-analysis/survey-synthesis/"
  filename: "{{selected_study}}_survey_synthesis_{{current_date}}.md"

# Slack output template
output_template: |
  {{ai_generated.survey_synthesis_complete}}

# GitHub markdown file template
github_file_template: |
  {{ai_generated.survey_synthesis_complete}}

# Auto-generated variables
auto_variables:
  theme_count: "extract_theme_count(ai_generated.survey_synthesis_complete) || 4"
  response_count: "extract_response_count(ai_generated.survey_synthesis_complete) || 0"
  current_date: "new Date().toISOString().split('T')[0]"
  analysis_version: "v3.0"
  github_file_link: "generate_github_link(selected_study, current_date)"

# Slack notifications
notify:
  - role: team
    action: "Survey synthesis completed"
    channel: "{{study_channel}}"
    message: "📊 Survey synthesis complete for {{selected_study}}. {{theme_count}} themes identified from {{response_count}} responses!"

# Slack UI configuration
slack_ui:
  modal:
    title: "Survey data"
    submit_label: "Analyze"
    close_label: "Cancel"
    
  error_messages:
    no_files: "⚠️ Please upload at least one survey file."
    no_survey_name: "⚠️ Please enter a survey name."
    processing_failed: "⚠️ Analysis failed. Please check that your files are valid CSV or Excel format."

output_use: |
  Analyze open-ended survey responses using thematic analysis.
  Identifies patterns across all responses, counts theme frequency,
  extracts representative quotes with respondent citations, and
  generates prioritized recommendations based on findings.
