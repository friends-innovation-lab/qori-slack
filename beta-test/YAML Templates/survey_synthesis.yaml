  **Themes:**
  - Theme 1: [Specific theme name]
  - Theme 2: [Specific theme name]
  - Theme 3: [Specific theme name]

  **💬 Key Quote:** "[Most illustrative quote from this response]"
  
  **Tone:** [Positive/Negative/Neutral/Mixed]
  
  **Pain Points:** [Specific issues mentioned]
  
  **Suggestions:** [Any improvements they suggested]

  ### Response 2
  **Themes:**
  - Theme 1: [Specific theme name]
  - Theme 2: [Specific theme name]
  - Theme 3: [Specific theme name]

  **💬 Key Quote:** "[Most illustrative quote from this response]"
  
  **Tone:** [Positive/Negative/Neutral/Mixed]
  
  **Pain Points:** [Specific issues mentioned]
  
  **Suggestions:** [Any improvements they suggested]

  ### Response 3
  **Themes:**
  - Theme 1: [Specific theme name]
  - Theme 2: [Specific theme name]
  - Theme 3: [Specific theme name]

  **💬 Key Quote:** "[Most illustrative quote from this response]"
  
  **Tone:** [Positive/Negative/Neutral/Mixed]
  
  **Pain Points:** [Specific issues mentioned]
  
  **Suggestions:** [Any improvements they suggested]

  ---

  ## 🤖 AI-Enhanced Analysis

  ### 📊 Sentiment Analysis
  {{ai_generated.sentiment_analysis}}

  ### 🚨 Priority Issues Assessment
  {{ai_generated.priority_issues}}

  ### 🎯 Actionable Recommendations
  {{ai_generated.actionable_recommendations}}

  ### 💡 User Suggestions Synthesis
  {{ai_generated.user_suggestions_synthesis}}

  ---

  ## 🔍 Cross-Response Pattern Analysis

  ### 🔥 Most Frequent Themes
  1. **[Theme Name]** - mentioned in X of Y responses (XX%)
     - *Supporting quotes: "[quote 1]", "[quote 2]"*
  2. **[Theme Name]** - mentioned in X of Y responses (XX%)
     - *Supporting quotes: "[quote 1]", "[quote 2]"*
  3. **[Theme Name]** - mentioned in X of Y responses (XX%)
     - *Supporting quotes: "[quote 1]", "[quote 2]"*

  ### 🚨 Critical Issues (Immediate Attention)
  - **[Issue 1]** - mentioned by X respondents
  - **[Issue 2]** - mentioned by X respondents
  - **[Issue 3]** - mentioned by X respondents

  ### 💡 User Suggestions
  - **[Suggestion 1]** - "Direct quote from user"
  - **[Suggestion 2]** - "Direct quote from user"
  - **[Suggestion 3]** - "Direct quote from user"

  ### 📈 Sentiment Breakdown
  - **Positive responses:** X of Y (XX%)
  - **Negative responses:** X of Y (XX%)
  - **Mixed responses:** X of Y (XX%)
  - **Neutral responses:** X of Y (XX%)

  ### 🎯 Actionable Insights for Team
  1. **Fix immediately:** [Top priority issue]
  2. **Investigate further:** [Areas needing more research]
  3. **Consider implementing:** [Top user suggestions]
  4. **Monitor:** [Emerging concerns]

  ---

  ## 📋 Summary for Stakeholders

  **Key Findings:**
  - [Most important finding 1]
  - [Most important finding 2]
  - [Most important finding 3]

  **Recommended Actions:**
  - [Specific action 1 with priority level]
  - [Specific action 2 with priority level]
  - [Specific action 3 with priority level]

  **Next Steps:**
  - [Follow-up research needed]
  - [Additional data to collect]
  - [Teams to involve]

output_options:
  filename: "survey_synthesis_{{current_date}}.md"
  path: "04-analysis/survey-synthesis/"
  template: "survey_analysis_report"
  
  delivery:
    slack:
      enabled: true
      channel: "{{study_channel}}"
      message: |
        📊 **Survey Analysis Complete**
        
        {{researcher_contact}} analyzed {{response_count}} survey responses for {{study_name}}.
        
        **AI-Enhanced Insights:**
        
        🎯 **Top Priority Issues:**
        {{ai_generated.priority_issues_summary}}
        
        💡 **Key User Suggestions:**
        {{ai_generated.top_user_suggestions}}
        
        📈 **Sentiment Overview:**
        {{ai_generated.sentiment_breakdown}}
        
        📋 Full analysis with actionable recommendations: {{output_file_link}}
      
      actions:
        - text: "📊 View Full Analysis"
          style: "primary"
          url: "{{output_file_url}}"
        - text: "🔄 Run Follow-up Analysis"
          style: "default"
          action_id: "synthesize_modal"

    github:
      enabled: true
      commit_message: "Add survey synthesis analysis - {{current_date}}"
      pr_title: "Survey Analysis: Key Themes and User Feedback"
      pr_description: |
        ## Survey Response Analysis Results
        
        **Study:** {{study_name}}
        **Responses Analyzed:** {{response_count}}
        **Researcher:** {{researcher_contact}}
        
        ### 🎯 AI-Enhanced Insights:
        **Top Theme:** {{most_frequent_theme}}
        **Critical Issues:** {{critical_issue_count}}
        **Sentiment Breakdown:** {{ai_generated.sentiment_overview}}
        
        ### Key Findings:
        {{key_findings_summary}}
        
        ### Priority Actions:
        {{ai_generated.immediate_actions_summary}}
        
        ### User Suggestions:
        {{ai_generated.top_suggestions_summary}}

use_cases: |
  Survey Synthesis with AI Enhancement analyzes open-ended survey responses to identify themes, extract supporting quotes, and provide actionable insights with intelligent prioritization. Perfect for post-study feedback, user satisfaction surveys, feature request analysis, and customer feedback synthesis. Uses AI to automatically perform sentiment analysis, identify critical issues, extract user suggestions, prioritize recommendations by feasibility and impact, and generate immediate action items. Automatically counts theme frequency, assesses emotional triggers, provides implementation roadmaps, and delivers structured reports with priority levels for quick decision-making. Integrates seamlessly with research workflows and provides both detailed analysis and executive summaries.
