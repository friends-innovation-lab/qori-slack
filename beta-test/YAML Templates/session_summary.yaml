id: analyze_notes
name: analyze_session_notes
label: "📝 Analyze Notes"
version: v1.3
description: Analyze session notes and transcript to generate comprehensive session summary with pain points, opportunities, insights, and recommendations

author: Research Ops Team
created: 2025-10-25
last_updated: 2025-12-09

llm_config:
  model: "claude-sonnet-4"
  temperature: 0.3
  max_tokens: 4000

input_type: multi_source_analysis
input_processing: synthesize_notes_and_transcript

slack_command:
  command: "/analyze-notes"
  description: "Analyze session notes and transcript to generate summary"
  usage_hint: "Select session, notes, and transcript to analyze"

external_data_sources:
  sessions:
    file_path: "03-fieldwork/sessions/"
    endpoint: "/api/slack/options/sessions"
    cache_duration: "5 minutes"
    option_mapping:
      value: "{{session_id}}"
      label: "{{participant_id}} - {{participant_name}} ({{session_date}})"
      description: "{{study_name}} | {{notes_count}} notes available"
    filters:
      - has_notes: true
      - status: "completed"

  session_notes:
    file_path: "03-fieldwork/session-notes/{{session_id}}/"
    endpoint: "/api/slack/options/session-notes"
    dynamic: true
    depends_on: "session_id"
    option_mapping:
      value: "{{note_file_path}}"
      label: "{{observer_name}} - {{submission_date}}"
      description: "{{note_length}} characters | Submitted {{submission_time}}"

  coded_transcripts:
    file_path: "03-fieldwork/coded-transcripts/{{session_id}}/"
    endpoint: "/api/slack/options/coded-transcripts"
    dynamic: true
    depends_on: "session_id"
    option_mapping:
      value: "{{coded_transcript_file_path}}"
      label: "{{coded_transcript_name}}"
      description: "{{codes_count}} codes | {{pain_points_count}} pain points"

input_variables:
  - session_id:
      type: "select"
      required: true
      label: "Session"
      placeholder: "Select a session to analyze..."
      data_source: "sessions"
      help_text: "Choose from completed sessions with notes"

  - selected_notes:
      type: "multi_select"
      required: true
      label: "Session notes to analyze"
      placeholder: "Select one or more note files..."
      data_source: "session_notes"
      help_text: "Choose all observer notes for this session"
      min_selections: 1
      max_selections: 10

  - coded_transcript_file:
      type: "select"
      required: true
      label: "Coded transcript"
      placeholder: "Select coded transcript file..."
      data_source: "coded_transcripts"
      help_text: "Primary source for analysis"

  - participant_id:
      type: "hidden"
      derived_from: "session_id.participant_id"

  - participant_name:
      type: "hidden"
      derived_from: "session_id.participant_name"

  - session_date:
      type: "hidden"
      derived_from: "session_id.session_date"

  - study_name:
      type: "hidden"
      derived_from: "session_id.study_name"

  - notes_content:
      type: "hidden"
      derived_from: "selected_notes.content_combined"

  - coded_transcript_content:
      type: "hidden"
      derived_from: "coded_transcript_file.content"

  - analyzer:
      type: "hidden"
      derived_from: "slack_user_display_name"

ai_generation_tasks:
  - task_id: "analyze_and_extract"
    prompt: |
      You are analyzing a UX research session to create a comprehensive session summary.

      SESSION METADATA
      - Participant ID: {{participant_id}}
      - Study Name: {{study_name}}
      - Session Date: {{session_date}}

      PRIMARY SOURCE - Coded Transcript:
      {{coded_transcript_content}}

      SUPPORTING SOURCES - Observer Notes:
      {{notes_content}}

      ============================================================
      CRITICAL GROUNDING RULES
      ============================================================

      You are an EXTRACTOR and SYNTHESIZER. Your job is to find what EXISTS in the sources and make reasonable inferences from participant behavior.

      ABSOLUTE REQUIREMENTS:
      1. Pain Points and Quotes must be EXPLICITLY stated in sources
      2. Opportunities can be INFERRED from participant struggles and requests
      3. Insights can be INFERRED from observed behavior and statements
      4. Every finding must trace back to specific source evidence
      5. When in doubt about Pain Points or Quotes, OMIT
      6. When in doubt about Opportunities or Insights, INCLUDE with clear evidence link

      QUOTE RULES:
      - ONLY use quotes that appear VERBATIM in the sources with quotation marks
      - Include timestamps if present
      - NEVER fabricate or paraphrase quotes

      ============================================================
      OUTPUT DOCUMENT
      ============================================================

      Create the following document structure:

      # 📋 Session Summary - {{participant_id}}

      **Study:** {{study_name}}
      **Date:** {{session_date}}

      ---

      ## 👤 Participant Context

      In 2-3 sentences, summarize key context about this participant that frames their feedback:
      - Relevant background (military service, disability, experience level)
      - How they use the app (frequency, primary tasks)
      - Assistive technology or accessibility needs
      - Any other context that helps interpret their feedback

      If insufficient context available, output: *Limited participant context available in sources.*

      ---

      ## 🔴 Top Pain Points

      Extract the TOP 3-5 most critical issues the participant experienced.

      Look for:
      - Explicit frustration statements
      - Task failures or struggles
      - Confusion expressed by participant
      - Accessibility barriers encountered
      - Workarounds participant had to use

      Assign severity:
      - Critical = Blocked participant entirely or major accessibility violation
      - High = Significant struggle or repeated frustration
      - Medium = Notable confusion or inefficiency
      - Low = Minor annoyance

      Format each as:
      **[Severity] - [Brief Title]**
      [1-2 sentence description with specific evidence from sources]

      If no pain points found, output: *No clear pain points were documented in the available sources.*

      ## 🟢 What Worked Well

      Identify 1-3 aspects of the experience that worked smoothly for the participant.

      Look for:
      - Tasks completed without struggle
      - Positive comments or relief expressed
      - Features participant praised
      - Patterns that supported their workflow
      - Moments where expectations were met

      Why this matters: Understanding what works helps teams replicate successful patterns and protects good features from being changed.

      Format each as:
      **[Brief Title]**
      [1-2 sentence description of what worked and why]

      If no positive moments identified, output: *No explicit positive feedback was captured in the available sources.*

      ## 🟡 Key Opportunities

      Identify 2-4 DIVERSE opportunities for improvement based on participant struggles and requests.

      IMPORTANT: Each opportunity should address a DIFFERENT aspect of the experience. Do not list multiple opportunities about the same issue.

      How to identify opportunities (these are INFERENCES you should make):
      - Participant says they wish something existed = Direct opportunity
      - Participant struggles with a task = Opportunity to improve that flow
      - Participant expresses confusion = Opportunity for clearer design
      - Participant suggests a solution = Direct opportunity
      - Participant compares unfavorably to other apps = Opportunity to match expectations
      - Participant uses workaround = Opportunity to support that need directly
      - Something worked well = Opportunity to apply that pattern elsewhere

      Categories to consider (aim for variety):
      - Accessibility improvements
      - Navigation and information architecture
      - UI placement and visibility
      - Content and labeling
      - Feature gaps
      - Standards and consistency

      Assign impact:
      - High Impact = Affects core tasks or large user segments
      - Medium Impact = Affects efficiency or secondary tasks
      - Quick Win = Easy fix with clear benefit

      Format each as:
      **[Impact Level] - [Solution-Oriented Title]**
      [1-2 sentence description linking opportunity to specific participant evidence]

      If genuinely no opportunities can be inferred, output: *No key opportunities were identified in the available sources.*

      ## 💡 Key Insights

      Identify 2-4 DIVERSE insights about user behavior, mental models, or patterns.

      IMPORTANT: 
      - Insights are about the USER, not the interface
      - Each insight should reveal something DIFFERENT
      - Do NOT repeat the same theme as your Opportunities (e.g., if you have an opportunity about labeling, find insights about OTHER aspects)
      - Include at least one insight about what WORKED WELL if present in sources

      How to identify insights (these are INFERENCES about the user):
      - How participant EXPECTED things to work = Mental model insight
      - Navigation strategies participant used = Behavior pattern insight
      - Assumptions participant made about where to find things = User expectations insight
      - Workarounds or coping strategies = Adaptation pattern insight
      - What surprised participant vs what felt natural = Expectation gap insight
      - Expertise or context that shaped experience = User context insight
      - What worked smoothly and WHY = Success pattern insight
      - How participant compared to other experiences = Benchmarking insight

      Insight types to use:
      Mental Model, Behavior Pattern, User Expectations, Navigation Strategy, Accessibility Need, User Context, Expertise Level, Workflow Pattern, Success Pattern, Benchmarking

      Format each as:
      **[Insight Type] - [Descriptive Title]**
      [1-2 sentence description of insight and design implications]

      If genuinely no insights can be inferred, output: *No key insights were identified in the available sources.*

      ## 💬 Top Quotes

      Extract 4-6 of the most impactful VERBATIM participant quotes.

      Requirements:
      - Must appear exactly as written in sources
      - Include timestamps in format [MM:SS] or [HH:MM:SS] if available
      - Choose quotes that illustrate pain points, needs, OR reactions

      Prioritize quotes that are:
      - Emotionally resonant (frustration, satisfaction, surprise)
      - Specific and concrete (not generic)
      - Quotable in stakeholder presentations
      - Representative of key themes

      Aim for VARIETY across:
      - At least one quote showing frustration or struggle
      - At least one quote showing what the participant wants or needs
      - At least one quote that would resonate with stakeholders
      - If available, one quote showing something positive or what worked

      Format each as:
      [number]. *"[Exact quote from sources]"* [timestamp]

      If no verbatim quotes exist, output: *No verbatim participant quotes were captured in the available sources.*

      ## ✅ Recommended Actions

      Generate 3-5 prioritized action items based on the findings above.

      Requirements:
      - Each action must address a specific finding from this summary
      - Note which finding it addresses in parentheses
      - Make actions specific and achievable
      - Use action-oriented language

      Priority levels:
      - Critical = Address immediately, blocks users
      - High Impact = Significant improvement to experience
      - Quick Win = Easy to implement, clear benefit

      Format each as:
      - **[Priority]:** [Specific action] *(addresses: [finding])*

      If insufficient findings, output: *Additional session data needed to generate specific recommendations.*

      ## 📊 Analysis Overview

      **Sources Analyzed:**
      - Coded Transcript: [Available/Not Available]
      - Observer Notes: [X files analyzed]

      **Extraction Summary:**
      - Pain points extracted: [count]
      - Opportunities identified: [count]
      - Insights captured: [count]
      - Verbatim quotes found: [count]

      **Data Quality Note:** [Note any limitations, e.g., missing transcript, single observer, etc.]

      ============================================================
      FINAL CHECKLIST
      ============================================================

      Before outputting, verify:
      - Every pain point has source evidence
      - Every quote is verbatim from sources
      - Opportunities are reasonable inferences from struggles/requests
      - Insights reveal something about the USER, not just the interface
      - Actions link to specific findings

      Return the complete document starting with the header. No preamble.
    output_variable: "session_summary_output"

output_template: |
  {{ai_generated.analyze_and_extract}}

output_options:
  filename: "{{participant_id}}-session-summary-{{session_date}}.md"
  path: "03-fieldwork/session-summaries/"
  delivery:
    github:
      enabled: true
      commit_message: "📋 {{participant_id}} session summary - {{session_date}}"
    slack:
      enabled: true
      dm_notification:
        enabled: true
        target_user: "{{analyzer}}"
        message: |
          ✅ **Session Summary Generated** - {{participant_id}}

          📂 **Study:** {{study_name}}
          📅 **Session Date:** {{session_date}}
          🕐 **Generated:** {{current_date}}

          📊 **Sources Analyzed:**
          • {{notes_count}} observer note files
          • 1 coded transcript

          Ready to review and share! 👇
        actions:
          - text: "📤 Share to Channel"
            style: "primary"
            action_id: "share_summary_to_channel"
          - text: "📖 View Summary"
            style: "default"
            url: "{{github_summary_url}}"
          - text: "📝 View Notes"
            style: "default"
            url: "{{github_notes_folder_url}}"

slack_ui:
  modal:
    title: "📝 Analyze Notes"
    submit_label: "Analyze & Generate"
    close_label: "Cancel"
    sections:
      - section_title: "Session Selection"
        section_icon: "📅"
        section_description: "Choose the session to analyze"
        fields:
          - session_id
      - section_title: "Sources to Analyze"
        section_icon: "📄"
        section_description: "Select notes and coded transcript for analysis"
        fields:
          - selected_notes
          - coded_transcript_file

processing_rules:
  combine_multiple_notes: true
  transcript_is_primary_source: true
  synthesize_all_sources: true
  extract_verbatim_quotes: true
  prioritize_by_severity: true
  fail_gracefully_on_empty_sources: true
  require_source_attribution: true

validation_rules:
  require_at_least_one_note: true
  require_transcript: true
  validate_quote_format: true
  check_timestamp_presence: true

quality_assurance:
  verify_quote_accuracy: true
  check_severity_labels: true
  validate_impact_levels: true
  ensure_actionable_recommendations: true
  cross_reference_sources: true

output_use: |
  Analyzes session notes and transcript together to generate comprehensive session
  summaries. Synthesizes multiple observer perspectives with transcript content to
  extract pain points, opportunities, insights, quotes, and create action items.

notes: |
  v1.3 Changes:
  - Added Participant Context section for stakeholder framing
  - Added What Worked Well section for balanced analysis
  - Required DIVERSITY in Opportunities (different aspects, not all same theme)
  - Required DIVERSITY in Insights (avoid redundancy with Opportunities)
  - Added Success Pattern insight type
  - Increased quote target to 4-6 with variety requirements
  - Added guidance to find positive patterns and what worked
  
  v1.2 Changes:
  - Fixed YAML parsing errors with colons and quotes in prompt
  - Improved Opportunities section with inference guidance
  - Improved Insights section with inference guidance
  - Added clear distinction between extraction (Pain Points, Quotes) and inference (Opportunities, Insights)
  - Added examples of valid inferences to guide the model
  - Simplified prompt formatting to avoid YAML conflicts
