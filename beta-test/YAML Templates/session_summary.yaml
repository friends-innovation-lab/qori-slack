id: analyze_notes
name: analyze_session_notes
label: 🔍 Analyze Notes
version: v1.1
description: Analyze session notes and transcript to generate comprehensive session summary with pain points, opportunities, insights, and recommendations

author: Research Ops Team
created: 2025-10-25
last_updated: 2025-12-09

llm_config:
  model: "claude-sonnet-4"
  temperature: 0.3
  max_tokens: 4000

input_type: multi_source_analysis
input_processing: synthesize_notes_and_transcript

# Slack Command Configuration
slack_command:
  command: "/analyze-notes"
  description: "Analyze session notes and transcript to generate summary"
  usage_hint: "Select session, notes, and transcript to analyze"

# External data sources
external_data_sources:
  sessions:
    file_path: "03-fieldwork/sessions/"
    endpoint: "/api/slack/options/sessions"
    cache_duration: "5 minutes"
    
    option_mapping:
      value: "{{session_id}}"
      label: "{{participant_id}} - {{participant_name}} ({{session_date}})"
      description: "{{study_name}} | {{notes_count}} notes available"
      
    filters:
      - has_notes: true
      - status: "completed"
      
  session_notes:
    file_path: "03-fieldwork/session-notes/{{session_id}}/"
    endpoint: "/api/slack/options/session-notes"
    dynamic: true
    depends_on: "session_id"
    
    option_mapping:
      value: "{{note_file_path}}"
      label: "{{observer_name}} - {{submission_date}}"
      description: "{{note_length}} characters | Submitted {{submission_time}}"
      
  coded_transcripts:
    file_path: "03-fieldwork/coded-transcripts/{{session_id}}/"
    endpoint: "/api/slack/options/coded-transcripts"
    dynamic: true
    depends_on: "session_id"
    
    option_mapping:
      value: "{{coded_transcript_file_path}}"
      label: "{{coded_transcript_name}}"
      description: "{{codes_count}} codes | {{pain_points_count}} pain points"

input_variables:
  # Step 1: Session Selection
  - session_id:
      type: "select"
      required: true
      label: "Session"
      placeholder: "Select a session to analyze..."
      data_source: "sessions"
      help_text: "Choose from completed sessions with notes"
  
  # Step 2: Notes Selection (multi-select)
  - selected_notes:
      type: "multi_select"
      required: true
      label: "Session notes to analyze"
      placeholder: "Select one or more note files..."
      data_source: "session_notes"
      help_text: "Choose all observer notes for this session"
      min_selections: 1
      max_selections: 10
  
  # Step 2: Coded Transcript Selection
  - coded_transcript_file:
      type: "select"
      required: true
      label: "Coded transcript"
      placeholder: "Select coded transcript file..."
      data_source: "coded_transcripts"
      help_text: "Primary source for analysis"
  
  # Hidden derived fields
  - participant_id:
      type: "hidden"
      derived_from: "session_id.participant_id"
      
  - participant_name:
      type: "hidden"
      derived_from: "session_id.participant_name"
      
  - session_date:
      type: "hidden"
      derived_from: "session_id.session_date"
      
  - study_name:
      type: "hidden"
      derived_from: "session_id.study_name"
      
  - notes_content:
      type: "hidden"
      derived_from: "selected_notes.content_combined"
      
  - coded_transcript_content:
      type: "hidden"
      derived_from: "coded_transcript_file.content"
      
  - analyzer:
      type: "hidden"
      derived_from: "slack_user_display_name"

ai_generation_tasks:
  
  - task_id: "analyze_and_extract"
    prompt: |
      You are analyzing a UX research session to create a comprehensive session summary.
      
      **SESSION METADATA:**
      - Participant ID: {{participant_id}}
      - Study Name: {{study_name}}
      - Session Date: {{session_date}}
      
      **PRIMARY SOURCE - Coded Transcript:**
      {{coded_transcript_content}}
      
      **SUPPORTING SOURCES - Observer Notes:**
      {{notes_content}}
      
      ---
      
      ## ⚠️ CRITICAL GROUNDING RULES - READ FIRST
      
      You are an EXTRACTOR, not a GENERATOR. Your job is to find and organize what EXISTS in the sources above.
      
      **ABSOLUTE REQUIREMENTS:**
      1. ONLY include information that is EXPLICITLY stated in the provided sources
      2. If a source section above is empty or contains only whitespace, treat it as unavailable
      3. NEVER invent, assume, or generate content not present in the sources
      4. Every pain point, opportunity, insight, and quote MUST be traceable to specific text in the sources
      5. If you cannot find content for a section, use the designated fallback text
      6. When in doubt, OMIT rather than fabricate
      
      **SOURCE PRIORITY:**
      - If coded transcript is available: Use as PRIMARY source for pain points, quotes, and structured findings
      - If coded transcript is empty/missing: Rely ONLY on observer notes; clearly note limited source availability
      - Observer notes provide: Context, emotional observations, behavioral patterns, timestamps
      
      **QUOTE EXTRACTION RULES:**
      - ONLY use quotes that appear VERBATIM in the sources with quotation marks
      - If no direct quotes exist in sources, output: "*No verbatim participant quotes were captured in the available sources.*"
      - NEVER paraphrase and present as a quote
      - NEVER generate plausible-sounding quotes
      
      ---
      
      **Your Task:**
      Extract and synthesize findings from the sources above. If sources are limited, produce a shorter summary rather than inventing content.
      
      **OUTPUT THE COMPLETE DOCUMENT WITH THIS EXACT STRUCTURE:**
      
      # 📋 Session Summary - {{participant_id}}
      
      **Study:** {{study_name}}  
      **Date:** {{session_date}}
      
      ---
      
      ## 🔴 Top Pain Points
      Extract the TOP 3-5 most critical issues the participant experienced.
      
      Requirements:
      - ONLY include issues explicitly described in the sources
      - Identify from transcript/notes what frustrated, blocked, or confused the participant
      - Assign severity: Critical > High > Medium > Low
      - Include specific context from session
      
      Format each as:
      **[Severity] - [Brief Title]**
      [1-2 sentence description of the pain point with specific context FROM THE SOURCES]
      
      If no pain points are identifiable in the sources, output: "*No clear pain points were documented in the available sources.*"
      
    ## 🟡 Key Opportunities
    Identify the TOP 2-3 opportunities for improvement based on participant struggles and requests.

    **How to identify opportunities:**
    - When participant says "I wish..." or "I expected..." → Direct opportunity
    - When participant struggles with a task → Opportunity to improve that flow
    - When participant expresses confusion → Opportunity for clearer design
    - When participant suggests a solution → Direct opportunity
    - When participant compares unfavorably to other apps → Opportunity to match expectations

    **From the sources, look for:**
    - Explicit requests: "Every button needs a proper label" → Opportunity: Add accessibility labels
    - Implicit gaps: Participant couldn't find "Schedule appointment" → Opportunity: Add clear scheduling action
    - Workarounds: Participant had to guess button functions → Opportunity: Improve discoverability

    Requirements:
    - Each opportunity must trace to a specific participant struggle or statement
    - Assign impact: High Impact (affects core tasks) > Medium Impact (affects efficiency) > Quick Win (easy fix)
    - Frame as actionable improvements, not just restated problems

    Format each as:
  **[Impact Level] - [Solution-Oriented Title]**
  [1-2 sentence description linking the opportunity to the specific participant evidence]

If genuinely no opportunities can be inferred, output: "*No key opportunities were identified in the available sources.*"

---

## 💡 Key Insights
Identify the TOP 2-3 insights about user behavior, mental models, or patterns revealed in this session.

**How to identify insights:**
- How participant EXPECTED things to work (mental model)
- Navigation strategies participant used (behavior pattern)
- Assumptions participant made about where to find things (user expectations)
- Workarounds or coping strategies (adaptation patterns)
- What surprised the participant vs. what felt natural (expectation gaps)
- Expertise or context that shaped their experience (user context)

**From the sources, look for:**
- "I'm guessing that would be under Payments" → Insight: User has logical mental model of IA
- Participant navigated systematically through all elements → Insight: Screen reader users explore exhaustively
- "Better than it used to be, but still behind commercial apps" → Insight: User benchmarks against commercial app standards
- Participant used VoiceOver expertly → Insight: Assistive technology proficiency affects expectations

Requirements:
- Each insight must be supported by specific observed behavior or statement
- Insights reveal something ABOUT THE USER, not just about the interface
- Focus on patterns that would apply to similar users

Format each as:
**[Insight Type] - [Descriptive Title]**
[1-2 sentence description of the insight and what it implies for design]

Insight types: Mental Model, Behavior Pattern, User Expectations, Navigation Strategy, Accessibility Need, User Context, Expertise Level

If genuinely no insights can be inferred, output: "*No key insights were identified in the available sources.*"
      
      ## ✅ Recommended Actions
      Generate 3-5 prioritized action items based ONLY on documented findings.
      
      Requirements:
      - Each action must trace back to a specific finding extracted above
      - Do not recommend actions for issues not documented in sources
      - Prioritize by severity and impact (Critical > Quick Win > High Impact)
      - Make actions specific and achievable
      
      Format each as:
      - **[Priority Level]:** [Specific recommendation] *(addresses: [which finding])*
      
      If insufficient findings to generate actions, output: "*Additional session data needed to generate specific recommendations.*"
      
      ## 📊 Analysis Overview
      
      **Sources Analyzed:**
      - Coded Transcript: [Available/Not Available]
      - Observer Notes: [X files analyzed]
      
      **Extraction Summary:**
      - Pain points extracted: [count or "None documented"]
      - Opportunities identified: [count or "None documented"]  
      - Insights captured: [count or "None documented"]
      - Verbatim quotes found: [count or "None in sources"]
      
      **Data Quality Note:** [If sources were limited, note: "Summary based on observer notes only - coded transcript was not available" or similar]
      
      ---
      
      FINAL VERIFICATION - Before outputting, confirm:
      ☐ Every pain point references specific source content
      ☐ Every quote appears verbatim in sources (or fallback used)
      ☐ Every insight traces to documented observation
      ☐ No content was generated that cannot be found in sources above
      ☐ Fallback text used for any empty sections
      
      Return the COMPLETE document starting with the header. No preamble or additional commentary.
    output_variable: "session_summary_output"

# Output template now directly uses the AI-generated complete document
output_template: |
  {{ai_generated.analyze_and_extract}}

output_options:
  filename: "{{participant_id}}-session-summary-{{session_date}}.md"
  path: "03-fieldwork/session-summaries/"
  
  delivery:
    github:
      enabled: true
      commit_message: "📋 {{participant_id}} session summary - {{session_date}}"
      
    slack:
      enabled: true
      
      dm_notification:
        enabled: true
        target_user: "{{analyzer}}"
        message: |
          ✅ **Session Summary Generated** - {{participant_id}}
          
          📂 **Study:** {{study_name}}
          📅 **Session Date:** {{session_date}}
          🕐 **Generated:** {{current_date}}
          
          📊 **Sources Analyzed:**
          • {{notes_count}} observer note files
          • 1 coded transcript
          
          Ready to review and share! 👇
        
        actions:
          - text: "📤 Share to Channel"
            style: "primary"
            action_id: "share_summary_to_channel"
          - text: "📖 View Summary"
            style: "default"
            url: "{{github_summary_url}}"
          - text: "📝 View Notes"
            style: "default"
            url: "{{github_notes_folder_url}}"

# Slack UI Definition
slack_ui:
  modal:
    title: "🔍 Analyze Notes"
    submit_label: "Analyze & Generate"
    close_label: "Cancel"
    
    sections:
      - section_title: "Session Selection"
        section_icon: "📅"
        section_description: "Choose the session to analyze"
        fields:
          - session_id
      
      - section_title: "Sources to Analyze"
        section_icon: "📄"
        section_description: "Select notes and coded transcript for analysis"
        fields:
          - selected_notes
          - coded_transcript_file

processing_rules:
  combine_multiple_notes: true
  transcript_is_primary_source: true
  synthesize_all_sources: true
  extract_verbatim_quotes: true
  prioritize_by_severity: true
  fail_gracefully_on_empty_sources: true
  require_source_attribution: true
  never_fabricate_quotes: true
  
validation_rules:
  require_at_least_one_note: true
  require_transcript: true
  validate_quote_format: true
  check_timestamp_presence: true

quality_assurance:
  verify_quote_accuracy: true
  check_severity_labels: true
  validate_impact_levels: true
  ensure_actionable_recommendations: true
  cross_reference_sources: true
  reject_if_no_source_match: true
  flag_low_confidence_extractions: true
  validate_all_quotes_are_verbatim: true

output_use: |
  Analyzes session notes and transcript together to generate comprehensive session 
  summaries. Synthesizes multiple observer perspectives with transcript content to 
  extract pain points, opportunities, insights, quotes, and create action items.

notes: |
  Key Design Decisions:
  - Multi-select for notes (can have multiple observers)
  - Single select for transcript (one transcript per session)
  - Transcript is primary source for quotes and specifics
  - Notes provide context, patterns, and observer insights
  - Two-step modal: Session → Notes/Transcript
  - Dynamic preview shows what will be analyzed
  - Output matches session summary format for consistency
  
  v1.1 Changes:
  - AI now generates complete document including header
  - output_template is now a direct pass-through of AI output
  - Renamed output_variable to session_summary_output for clarity
  - Added session metadata to AI prompt context
