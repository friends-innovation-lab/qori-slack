id: team_readouts
name: run_team_readouts
label: 👥 Team-Specific Readouts
version: v1.0
description: |
  Generate customized research readouts tailored to specific team roles and responsibilities.
  Transforms comprehensive research findings into focused, actionable insights for design, engineering, 
  content, product, and other specialized teams based on their unique needs and workflows.

author: Qori R&D
created: 2025-08-19
last_updated: 2025-08-19

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.4
  max_tokens: 4000

input_variables:
  # Core analysis data
  - input_text           # Research findings or readout data (REQUIRED)
  - study_name           # Title of study (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to post results (REQUIRED)
  - team_type            # Target team (design, engineering, content, product, accessibility) (REQUIRED)
  - team_members         # Specific team members to notify (OPTIONAL)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  
  # Context from research readout (if chained)
  - research_readout_data # Full readout data for context (OPTIONAL)
  - github_issues_data   # Generated issues for technical context (OPTIONAL)

# AI GENERATION TASKS
ai_generation_tasks:
  # Analyze team-specific needs and focus areas
  - task_id: "team_focus_analysis"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      Analyze the research findings for team-specific insights and needs:
      
      **Input Data:** {{input_text}}
      **Target Team:** {{team_type}}
      **Study Context:** {{study_name}}
      **Research Context:** {{research_readout_data}}
      
      Based on the team type, identify:
      1. **Primary focus areas** relevant to this team's responsibilities
      2. **Key findings** that directly impact their work
      3. **Actionable insights** they can implement
      4. **Dependencies** with other teams
      5. **Success metrics** they should track
      
      **Team-Specific Focus Areas:**
      
      **Design Team:**
      - Interface usability issues and interaction problems
      - User behavior patterns and mental models
      - Accessibility barriers and inclusive design opportunities
      - Design system implications and component needs
      - Visual design and information architecture issues
      
      **Engineering Team:**
      - Technical implementation requirements and constraints
      - Performance issues and system reliability problems
      - Bug reports with reproduction steps
      - Feature requirements with technical specifications
      - API design and backend architecture needs
      
      **Content Team:**
      - Copy clarity and user language preferences
      - Help text effectiveness and guidance needs
      - Error message improvements and communication gaps
      - Content strategy and information architecture
      - Voice, tone, and accessibility requirements
      
      **Product Team:**
      - Feature prioritization and roadmap implications
      - User needs alignment with business goals
      - Success metrics and KPI opportunities
      - Market positioning and competitive insights
      - Resource allocation and timeline considerations
      
      **Accessibility Team:**
      - Barriers for users with disabilities
      - WCAG compliance gaps and opportunities
      - Assistive technology compatibility issues
      - Inclusive design recommendations
      - Testing and validation requirements
      
      **Format:**
      **Team Type:** {{team_type}}
      **Primary Focus Areas:** [3-4 key areas this team should focus on]
      **Relevant Findings Count:** [Number of findings that impact this team]
      **Immediate Actions:** [What this team can start working on right away]
      **Cross-team Dependencies:** [What they need from other teams]

  # Extract team-specific insights and recommendations
  - task_id: "team_insights_extraction"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on actionable insights for this specific team
      
      Extract insights and recommendations specifically relevant to the {{team_type}} team:
      
      **Input Data:** {{input_text}}
      **Team Focus:** {{ai_generated.team_focus_analysis}}
      **Target Team:** {{team_type}}
      
      For the {{team_type}} team, identify:
      1. **Top 3-5 insights** most relevant to their work
      2. **Supporting evidence** (quotes, behaviors, data)
      3. **Specific recommendations** they can implement
      4. **Priority levels** based on impact and effort
      5. **Success measures** for their implementations
      
      **Format for each insight:**
      
      **{{team_type}} Insight [X]: [Specific insight relevant to team]**
      
      **Evidence:**
      [Quotes, behavioral observations, or data that support this insight]
      
      **What this means for {{team_type}}:**
      [Direct implications for their work and responsibilities]
      
      **Recommended Actions:**
      • [Specific action 1]
      • [Specific action 2]
      • [Specific action 3]
      
      **Priority:** [High/Medium/Low] - [Reasoning based on user impact and implementation effort]
      
      **Success Metrics:**
      [How this team can measure if their changes improve user experience]
      
      **Dependencies:**
      [What they need from other teams or external factors]

  # Generate team-specific action plan
  - task_id: "team_action_plan"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Create specific, time-bound action items
      
      Create a detailed action plan for the {{team_type}} team:
      
      **Team Insights:** {{ai_generated.team_insights_extraction}}
      **Team Focus:** {{ai_generated.team_focus_analysis}}
      **GitHub Issues:** {{github_issues_data}}
      
      Develop a prioritized action plan with:
      1. **Immediate actions** (next 1-2 weeks)
      2. **Short-term projects** (next 1-2 months)
      3. **Long-term initiatives** (quarterly planning)
      4. **Collaboration needs** with other teams
      5. **Resource requirements** and dependencies
      
      **Format:**
      
      **🎯 {{team_type}} Team Action Plan**
      
      **Immediate Actions (Next 1-2 Weeks):**
      • [Specific action with owner and deadline]
      • [Specific action with owner and deadline]
      • [Specific action with owner and deadline]
      
      **Short-term Projects (1-2 Months):**
      • [Project name]: [Description, timeline, and success criteria]
      • [Project name]: [Description, timeline, and success criteria]
      
      **Long-term Initiatives (Quarterly):**
      • [Initiative name]: [Description, goals, and milestone]
      • [Initiative name]: [Description, goals, and milestone]
      
      **Cross-team Collaboration:**
      • **With Design:** [Specific collaboration needs]
      • **With Engineering:** [Specific collaboration needs]
      • **With Content:** [Specific collaboration needs]
      • **With Product:** [Specific collaboration needs]
      
      **Resource Requirements:**
      • Tools or software needed
      • Training or skill development areas
      • External vendor or consultant needs
      • Budget considerations
      
      **Success Tracking:**
      • [Metric 1]: [How to measure and target]
      • [Metric 2]: [How to measure and target]
      • [Metric 3]: [How to measure and target]

  # Create team-specific deliverables and templates
  - task_id: "team_deliverables"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Provide practical templates and examples
      
      Create specific deliverables and templates for the {{team_type}} team:
      
      **Team Action Plan:** {{ai_generated.team_action_plan}}
      **Team Insights:** {{ai_generated.team_insights_extraction}}
      **Target Team:** {{team_type}}
      
      Based on the team type, provide:
      1. **Practical templates** they can use immediately
      2. **Checklists** for implementation
      3. **Example solutions** based on research findings
      4. **Quality criteria** for their deliverables
      5. **Communication templates** for stakeholder updates
      
      **Team-Specific Deliverables:**
      
      **For Design Teams:**
      - User flow improvements template
      - Accessibility checklist
      - Design system component specifications
      - Usability testing plan template
      
      **For Engineering Teams:**
      - Technical requirements template
      - Bug reproduction steps format
      - Performance testing checklist
      - Code review criteria
      
      **For Content Teams:**
      - Content audit template
      - Voice and tone guidelines
      - Error message standards
      - Help text effectiveness checklist
      
      **For Product Teams:**
      - Feature prioritization matrix
      - User story templates
      - Success metrics dashboard
      - Stakeholder communication plan
      
      **For Accessibility Teams:**
      - WCAG compliance checklist
      - Assistive technology testing plan
      - Inclusive design review template
      - Accessibility audit report format
      
      **Format:**
      
      **📋 {{team_type}} Team Deliverables**
      
      **Ready-to-Use Templates:**
      [Provide 2-3 specific templates this team can use immediately]
      
      **Implementation Checklists:**
      [Step-by-step checklists for their most important actions]
      
      **Example Solutions:**
      [Concrete examples of how to address the research findings]
      
      **Quality Criteria:**
      [How to know if their work successfully addresses user needs]
      
      **Stakeholder Communication:**
      [Templates for updating leadership on progress]

# Auto-generated/computed variables
auto_variables:
  - team_focus_count: |
      count_focus_areas(ai_generated.team_focus_analysis) || 3
  - immediate_actions_count: |
      count_immediate_actions(ai_generated.team_action_plan) || 3
  - current_date: |
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      generate_github_link(study_name, current_date, team_type) || null

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "structured"
  file_location: "05-shareouts/team-specific/"
  file_name: "{{team_type}}_readout_{{study_name_slug}}_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "👥 {{team_type}} Team Readout"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "📊 View Full Research Readout"
      action: "run_research_readout"
    - text: "🎯 Stakeholder Summary"
      action: "run_stakeholder_summary"
    - text: "🐛 GitHub Issues"
      action: "run_github_issues_generator"
    - text: "👥 Generate Another Team Readout"
      action: "run_team_readouts"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"

output_use: |
  Team-Specific Readouts transform comprehensive research findings into focused, actionable insights
  tailored to specific team roles and responsibilities. Each team receives relevant findings,
  practical recommendations, and ready-to-use templates for their workflows.

  Use this method to:
    - Deliver targeted insights to specialized teams
    - Provide role-specific action plans and recommendations
    - Include practical templates and checklists for implementation
    - Ensure research findings reach the right people with relevant context
    - Facilitate cross-team collaboration with clear dependencies

output_notes: |
  Generated for {{team_type}} team with {{team_focus_count}} focus areas and {{immediate_actions_count}} immediate actions.
  Includes team-specific templates, checklists, and collaboration guidance.

# Enhanced output template
output_format: |
  Hi {{team_type}} team! 👋 I've created a customized readout from our {{study_name}} research with insights and actions specifically relevant to your work.

  {{team_members}} - this readout includes {{immediate_actions_count}} immediate actions you can take, plus templates and checklists for implementation.

  📂 *Study:* {{study_name}}  
  🔗 *Full Research:* {{study_link}}
  🎯 *Team Focus:* {{team_focus_count}} key areas identified for {{team_type}}

  ---

  ## 👥 {{team_type}} TEAM READOUT — {{study_name}}

  **🤖 AI-Customized for {{team_type}} Team | {{current_date}}**

  ---

  ### 🎯 Team Focus Analysis

  {{ai_generated.team_focus_analysis}}

  ---

  ### 💡 {{team_type}} Team Insights

  {{ai_generated.team_insights_extraction}}

  ---

  ### 📋 Action Plan for {{team_type}} Team

  {{ai_generated.team_action_plan}}

  ---

  ### 🛠️ Ready-to-Use Templates & Deliverables

  {{ai_generated.team_deliverables}}

  ---

  ### 🔗 Related Resources

  - [Full Research Readout]({{study_link}}) - Complete findings and methodology
  - [GitHub Issues](../06-implementation/) - Technical implementation tasks
  - [Stakeholder Summary](../05-shareouts/) - Executive overview
  - [Cross-team Coordination](../collaboration/) - Dependencies and handoffs

  ---

  **🏷️ Tags:** `{{team_type}}-team`, `team-readout`, `research-insights`, `action-plan`, `implementation-ready`

  ---

  *Questions about implementation?* Reply in thread or contact {{researcher_contact}} for research context and clarification.

  *🤖 AI-Generated Team Readout | Customized for {{team_type}} Workflow*

notify:
  - role: team_specific
    action: "Team readout delivered"
    channel: "{{study_channel}}"
    message: "👥 {{team_type}} team readout for {{study_name}} is ready. Includes {{immediate_actions_count}} immediate actions and team-specific templates."
  - role: researcher
    action: "Team readout generated"
    slack_tag: "{{researcher_contact}}"
    message: "Your {{team_type}} team readout has been delivered with customized insights and action plans."
