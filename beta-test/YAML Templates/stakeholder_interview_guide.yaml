  - Added complete input_variables with types, required flags, descriptions
  - Added study context variables (study_name, study_channel, researcher_contact)
  - Added stakeholder_name field for scheduling
  - Added current_date for output
  
  v1.1 Updates:
  - Updated file paths to primary-research/01-planning/
  
  v1.0 Initial release:
  - Structured guide for internal stakeholder interviews
  - Role-specific question generation
  - Connection to user research findings
  - Follows Portigal, Hall, Goodwin methodologies
