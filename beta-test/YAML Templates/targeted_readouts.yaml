id: targeted_readouts
name: run_targeted_readouts
label: "🎯 Targeted Readouts"
version: v3.0
description: |
  Generate audience-specific research readouts. Supports Congressional Briefings, 
  Executive Summaries, and Team-specific formats with appropriate tone and structure.

author: Qori R&D
created: 2025-08-19
last_updated: 2026-01-07

# ============================================================
