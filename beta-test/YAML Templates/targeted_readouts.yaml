id: targeted_readouts
name: run_targeted_readouts
label: "🎯 Targeted Readouts"
version: v4.0
description: |
  Generate audience-specific research reports. Supports Congressional Briefings, 
  Leadership Briefs, Product Briefs, and Team Readouts with appropriate tone, 
  structure, and level of detail for each audience.
  
  v4.0 Changes:
  - Added Leadership Brief format (Secretary/SES level)
  - Added Product Brief format (PO/Director reporting up)
  - Refined Congressional Briefing format
  - Improved Team Readout with implementation focus
  - Increased max_tokens to 10000
  - Removed backend developer notes

author: Qori R&D
created: 2025-08-19
last_updated: 2026-01-28

input_type: text
input_processing: summarize_if_long

llm_config:
  model: "claude-sonnet-4"
  temperature: 0.2
  max_tokens: 10000

input_variables:
  - research_folder_path
  - target_audience
  - study_name
  - researcher_contact
  - study_channel
  - research_readout_data
  - input_text
  - study_link
  - team_members
  - congressional_mandate
  - oversight_committee
  - reporting_deadline

core_files:
  research_plan:
    file: "research_plan.md"
    required: true
    extract: ["objectives", "methods", "success_criteria", "timeline"]
    
  session_summaries:
    folder: "03-fieldwork/session-summaries/"
    required: true
    extract: ["pain_points", "opportunities", "insights", "quotes", "participant_context"]
    file_pattern: "*session_summary*.md"
    
  participant_tracker:
    file: "participant_tracker.md"
    required: false
    extract: ["demographics", "sample_size", "completion_status"]

optional_files:
  affinity_mapping:
    file: "04-analysis/affinity-mapping/*.md"
    extract: ["themes", "evidence_counts", "recommendations"]
    
  journey_mapping:
    file: "04-analysis/journey-mapping/*.md"
    extract: ["stages", "pain_points", "opportunities"]

auto_variables:
  - audience_category: |
      determine_audience_category(target_audience) || "team"
  - current_date: |
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      generate_github_link(study_name, current_date, target_audience) || null
  - detected_files: |
      scan_research_folder(research_folder_path, core_files, optional_files)
  - participant_count: |
      extract_from_md(participant_tracker, "participants") || "Unknown"
  - session_count: |
      count_completed_sessions(participant_tracker, "completed") || "Unknown"

audience_routing:
  congressional:
    - "congressional_briefing"
    - "congressional"
    - "Congressional Briefing"
    
  leadership:
    - "executive"
    - "executive_leadership"
    - "Executive Leadership"
    - "leadership"
    - "ses_briefing"
    - "secretary"
    
  product_leadership:
    - "product_leadership"
    - "Product Leadership"
    - "design_leadership"
    - "Design Leadership"
    - "director"
    
  team:
    - "product"
    - "Product Team"
    - "design"
    - "Design Team"
    - "engineering"
    - "Engineering Team"
    - "accessibility"
    - "Accessibility Team"
    - "content"
    - "Content Team"

ai_generation_tasks:
  - task_id: "targeted_readout_complete"
    prompt: |
      ============================================================
      🚨 CRITICAL GROUNDING RULES - READ FIRST 🚨
      ============================================================
      
      You are creating a targeted research report from REAL research data.
      
      ABSOLUTE REQUIREMENTS:
      1. ONLY use findings, quotes, and data from the source below
      2. NEVER invent statistics, quotes, or findings
      3. Use participant IDs exactly as they appear (PT001, PT002, etc.)
      4. All numbers must be accurate to source data
      5. If source data is empty, say so - do not fabricate
      
      If source data is insufficient, output:
      "⚠️ Insufficient data for targeted report. Required files may be empty."
      
      ============================================================
      SOURCE DATA
      ============================================================
      
      **Study Name:** {{study_name}}
      **Target Audience:** {{target_audience}}
      **Research Folder:** {{research_folder_path}}
      **Lead Researcher:** {{researcher_contact}}
      **Congressional Mandate:** {{congressional_mandate}}
      **Oversight Committee:** {{oversight_committee}}
      
      **Research Data:**
      
      {{input_text}}
      
      {{research_readout_data}}
      
      ============================================================
      AUDIENCE DETECTION
      ============================================================
      
      Determine audience type from {{target_audience}}:
      
      CONGRESSIONAL: "Congressional Briefing", "congressional_briefing", "congressional"
      LEADERSHIP: "Executive Leadership", "executive_leadership", "executive", "leadership", "secretary"
      PRODUCT_LEADERSHIP: "Product Leadership", "Design Leadership", "product_leadership", "design_leadership", "director"
      TEAM: "Product Team", "Design Team", "Engineering Team", "Accessibility Team", "Content Team", "product", "design", "engineering", "accessibility", "content"
      
      Select the appropriate format below based on audience type.
      
      ============================================================
      FORMAT A: CONGRESSIONAL BRIEFING
      ============================================================
      
      Use this format for: Congressional Briefing
      
      Tone: Formal government language. No jargon. Direct and specific.
      Length: 1-2 pages maximum. Legislators skim.
      Purpose: Testimony prep, oversight response, budget justification.
      
      ---
      
      <div align="center">
      
      # 🏛️ CONGRESSIONAL BRIEFING
      ## {{study_name}}
      
      **[Date]**
      
      ---
      
      | Classification | Prepared By | Oversight Committee |
      |:--------------:|:-----------:|:-------------------:|
      | UNCLASSIFIED | {{researcher_contact}} | {{oversight_committee}} |
      
      </div>
      
      ---
      
      ## 📌 BOTTOM LINE UP FRONT
      
      > [!IMPORTANT]
      > [2-3 sentences maximum. What Congress needs to know RIGHT NOW.]
      
      | Issue | Veteran Impact | VA Status |
      |:------|:---------------|:----------|
      | [Primary issue] | [X] veterans affected | [What VA is doing] |
      
      ---
      
      ## 📋 BACKGROUND
      
      **Why this research was conducted:** [1-2 sentences]
      
      | Study Details | |
      |:--------------|:--|
      | **Methodology** | [Usability testing / Interviews / etc.] |
      | **Participants** | [X] veterans |
      | **Focus Area** | [What was evaluated] |
      
      ---
      
      ## 🔍 KEY FINDINGS
      
      ### Finding 1: [Title]
      
      - **Veteran Impact:** [How many affected, severity]
      - **Evidence:** "[Brief quote]" — PT00X
      - **Status:** [Being addressed / Requires action]
      
      ### Finding 2: [Title]
      
      - **Veteran Impact:** [How many affected, severity]
      - **Evidence:** "[Brief quote]" — PT00X
      - **Status:** [Being addressed / Requires action]
      
      ### Finding 3: [Title]
      
      - **Veteran Impact:** [How many affected, severity]
      - **Evidence:** "[Brief quote]" — PT00X
      - **Status:** [Being addressed / Requires action]
      
      ---
      
      ## ✅ ACTIONS UNDERWAY
      
      | Action | Owner | Timeline | Status |
      |:-------|:------|:---------|:-------|
      | [Action 1] | [Team] | [Date] | [In Progress/Planned] |
      | [Action 2] | [Team] | [Date] | [In Progress/Planned] |
      
      ---
      
      ## ⚠️ RISK IF NOT ADDRESSED
      
      - [Specific consequence for veterans]
      - [Potential scale of impact]
      
      ---
      
      ## 📊 SUCCESS METRICS
      
      Congress can track progress through:
      - [Metric 1 with target]
      - [Metric 2 with target]
      
      ---
      
      <div align="center">
      
      ---
      
      **Point of Contact:** {{researcher_contact}} | **Channel:** {{study_channel}}
      
      ---
      
      *Prepared for Congressional Oversight • [Date]*
      
      </div>
      
      ---
      
      ============================================================
      FORMAT B: LEADERSHIP BRIEF (Executive Leadership)
      ============================================================
      
      Use this format for: Executive Leadership, Secretary, SES
      
      Tone: Strategic, mission-focused. Decisions and risk.
      Length: 1 page. They have 5 minutes.
      Purpose: Priority setting, budget decisions, risk awareness.
      
      ---
      
      <div align="center">
      
      # 📊 LEADERSHIP BRIEF
      ## {{study_name}}
      
      **[Date]**
      
      ---
      
      | Participants | Sessions | Methodology | Lead Researcher |
      |:------------:|:--------:|:-----------:|:---------------:|
      | {{participant_count}} | {{session_count}} | [Type] | {{researcher_contact}} |
      
      </div>
      
      ---
      
      ## 📌 BOTTOM LINE
      
      > [!IMPORTANT]
      > [One sentence: What's the issue and why does it matter to VA's mission?]
      
      ---
      
      ## 🎯 VETERAN IMPACT
      
      | Finding | Veterans Affected | Severity | Mission Risk |
      |:--------|:-----------------:|:--------:|:-------------|
      | [Finding 1] | [X] of [Y] | 🔴 Critical | [Risk to VA mission] |
      | [Finding 2] | [X] of [Y] | 🟡 High | [Risk to VA mission] |
      | [Finding 3] | [X] of [Y] | 🟢 Low | [Positive/maintain] |
      
      ---
      
      ## ✅ WHAT'S WORKING
      
      - [Positive finding] — preserve and expand
      
      ---
      
      ## ⚡ DECISION NEEDED
      
      | Decision | Options | Recommendation |
      |:---------|:--------|:---------------|
      | [What needs deciding] | A: [Option] / B: [Option] | [Recommended + why] |
      
      ---
      
      ## 💰 RESOURCE IMPLICATIONS
      
      | Aspect | Impact |
      |:-------|:-------|
      | **Timeline** | [Effect on roadmap] |
      | **Staffing** | [Any needs or "Current staffing sufficient"] |
      | **Budget** | [Any implications or "No additional budget required"] |
      
      ---
      
      ## ⚠️ IF NOT ADDRESSED
      
      - [Consequence 1 for veterans]
      - [Consequence 2 for VA operations/reputation]
      
      ---
      
      <div align="center">
      
      ---
      
      **Full Report:** [Link to complete research report]
      
      **Contact:** {{researcher_contact}} | **Channel:** {{study_channel}}
      
      ---
      
      *Prepared for VA Leadership • [Date]*
      
      </div>
      
      ---
      
      ============================================================
      FORMAT C: PRODUCT BRIEF (Product/Design Leadership)
      ============================================================
      
      Use this format for: Product Leadership, Design Leadership, Directors
      
      Tone: Strategic but practical. Roadmap and trade-offs.
      Length: 1-2 pages. Needs to justify priorities.
      Purpose: Roadmap decisions, resource requests, stakeholder updates.
      
      ---
      
      <div align="center">
      
      # PRODUCT BRIEF
      ## {{study_name}}
      
      **Date:** [Date] | **Participants:** {{participant_count}} | **Lead:** {{researcher_contact}}
      
      </div>
      
      ---
      
      ## SUMMARY
      
      > [!IMPORTANT]
      > [One sentence: What did we learn and what should we do about it?]
      
      ---
      
      ## PRIORITY MATRIX
      
      | Finding | Severity | User Impact | Effort | Recommendation |
      |:--------|:--------:|:-----------:|:------:|:---------------|
      | [Finding 1] | 🔴 Critical | High | Medium | Fix in current sprint |
      | [Finding 2] | 🟡 High | Medium | High | Plan for next quarter |
      | [Finding 3] | 🟢 Low | Low | Low | Backlog |
      
      ---
      
      ## KEY FINDINGS
      
      ### 🔴 [Finding 1 Title]
      
      **The Problem:** [2-3 sentences describing the issue]
      
      **User Evidence:**
      > "[Quote from participant]" — PT00X
      
      **Impact:** [X]% of participants affected | [Effect on task completion/satisfaction]
      
      **Recommended Action:** [Specific fix]
      
      ---
      
      ### 🟡 [Finding 2 Title]
      
      [Same format]
      
      ---
      
      ## WHAT'S WORKING
      
      | Feature/Flow | Evidence | Recommendation |
      |:-------------|:---------|:---------------|
      | [What works] | "[Quote]" — PT00X | Maintain / Expand pattern to X |
      
      ---
      
      ## ROADMAP IMPACT
      
      **If we prioritize these fixes:**
      - [Trade-off 1: What gets delayed]
      - [Trade-off 2: Resource reallocation]
      
      **If we delay these fixes:**
      - [Risk 1: User impact continues]
      - [Risk 2: Metric impact]
      
      ---
      
      ## METRICS TO TRACK
      
      | Metric | Current | Target | Timeline |
      |:-------|:-------:|:------:|:---------|
      | [Metric 1] | [X] | [Y] | [When] |
      | [Metric 2] | [X] | [Y] | [When] |
      
      ---
      
      ## NEXT STEPS
      
      | Action | Owner | By When |
      |:-------|:------|:--------|
      | [Action 1] | [Team/Person] | [Date] |
      | [Action 2] | [Team/Person] | [Date] |
      
      ---
      
      **Questions?** {{researcher_contact}}
      
      ---
      
      ============================================================
      FORMAT D: TEAM READOUT
      ============================================================
      
      Use this format for: Product Team, Design Team, Engineering Team, Accessibility Team, Content Team
      
      Tone: Practical, implementation-focused. What do they need to DO.
      Length: As needed for actionable detail.
      Purpose: Sprint planning, implementation guidance, specific fixes.
      
      ---
      
      <div align="center">
      
      # {{target_audience}} READOUT
      ## {{study_name}}
      
      **Date:** [Date] | **Participants:** {{participant_count}} | **Lead:** {{researcher_contact}}
      
      </div>
      
      ---
      
      ## TL;DR
      
      [3-4 bullets of what THIS team specifically needs to know/do]
      
      - 🔴 [Critical action for this team]
      - 🟡 [Important action for this team]
      - 🟢 [What's working - don't break this]
      
      ---
      
      ## FINDINGS FOR {{target_audience}}
      
      ### 🔴 Finding 1: [Title]
      
      **User Quote:**
      > "[Exact quote from participant]"
      > — **PT001** [context]
      
      | Aspect | Details |
      |:-------|:--------|
      | **The Problem** | [Specific description relevant to this team] |
      | **Severity** | 🔴 Critical |
      | **Affected** | [X] of [Y] participants ([%]) |
      | **Where it happens** | [Specific screen/flow/component] |
      
      **Suggested Fix:**
      [Specific, actionable recommendation for this team]
      
      ---
      
      ### 🟡 Finding 2: [Title]
      
      [Same format]
      
      ---
      
      ## IMPLEMENTATION CHECKLIST
      
      - [ ] [Specific task 1 for this team]
      - [ ] [Specific task 2 for this team]
      - [ ] [Specific task 3 for this team]
      - [ ] [Specific task 4 for this team]
      
      ---
      
      ## WHAT'S WORKING (Don't Break These)
      
      | Feature | Why It Works | Evidence |
      |:--------|:-------------|:---------|
      | [Feature 1] | [Why users liked it] | "[Quote]" — PT00X |
      | [Feature 2] | [Why users liked it] | "[Quote]" — PT00X |
      
      ---
      
      ## OPEN QUESTIONS FOR {{target_audience}}
      
      - [Question that emerged from research this team should consider]
      - [Another question for team discussion]
      
      ---
      
      ## RELATED FILES
      
      | Document | Link |
      |:---------|:-----|
      | Full Research Report | [Link] |
      | Session Summaries | {{research_folder_path}}/03-fieldwork/session-summaries/ |
      | Affinity Map | {{research_folder_path}}/04-analysis/affinity-mapping/ |
      
      ---
      
      **Questions?** {{researcher_contact}} | **Channel:** {{study_channel}}
      
      ---
      
      ============================================================
      OUTPUT SELECTION
      ============================================================
      
      Based on {{target_audience}}, output ONLY ONE format:
      
      - Congressional Briefing → FORMAT A
      - Executive Leadership → FORMAT B
      - Product Leadership, Design Leadership → FORMAT C
      - Engineering Team, Design Team, Product Team, Accessibility Team, Content Team → FORMAT D
      
      Do not mix formats. Do not include these instructions in output.

output_options:
  path: "05-findings/"
  filename: "{{target_audience}}_readout_{{study_name}}_{{current_date}}.md"

slack_message_format: |
  🎯 **{{target_audience}} Readout Ready**
  
  **Study:** {{study_name}}
  **Participants:** {{participant_count}}
  
  👆 **View:** [Link]({{github_file_link}})
  
  *Questions?* {{researcher_contact}}

output_template: |
  {{ai_generated.targeted_readout_complete}}

notify:
  - role: targeted_audience
    action: "Readout ready"
    channel: "{{study_channel}}"
    message: "🎯 {{target_audience}} readout for {{study_name}} is ready."
