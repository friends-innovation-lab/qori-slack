# ============================================================
#
# This workflow requires actual file contents to be loaded into variables.
# Without this data, the AI will output "Insufficient data" (correct behavior).
#
# REQUIRED DATA FLOW:
#
# 1. Session Summaries → {{input_text}} or {{research_readout_data}}
#    - Location: 03-fieldwork/session-summaries/
#    - Files: *session_summary*.md (all of them, concatenated)
#    - Example: PT001_session_summary.md + PT002_session_summary.md + PT003_session_summary.md
#
# 2. Research Plan (optional but helpful) → append to {{input_text}}
#    - Location: 00-planning/research_plan.md
#    - Contains: methodology, goals, research questions
#
# 3. Affinity Map (optional) → append to {{input_text}}
#    - Location: 04-analysis/affinity-mapping/*.md
#    - Enhances theme identification
#
# BACKEND PSEUDOCODE:
#
#   combined_content = ""
#   
#   # Load all session summaries (REQUIRED)
#   session_files = await github_api.list_files("03-fieldwork/session-summaries/")
#   for file in session_files:
#       if "session_summary" in file.name:
#           content = await github_api.get_file_contents(file.path)
#           combined_content += "\n\n---\n\n" + content
#   
#   # Load research plan (optional)
#   try:
#       research_plan = await github_api.get_file_contents("00-planning/research_plan.md")
#       combined_content = research_plan + "\n\n---\n\n" + combined_content
#   except: pass
#   
#   # Load affinity map if exists (optional)
#   try:
#       affinity_files = await github_api.list_files("04-analysis/affinity-mapping/")
#       for file in affinity_files:
#           content = await github_api.get_file_contents(file.path)
#           combined_content += "\n\n---\n\n" + content
#   except: pass
#   
#   # Pass to AI
#   variables["input_text"] = combined_content
#
# IF DATA IS EMPTY → AI outputs "Insufficient data" (this is correct behavior)
# IF DATA IS LOADED → AI generates grounded readout
#
# ============================================================

input_type: text
input_processing: summarize_if_long

llm_config:
  model: "claude-sonnet-4"
  temperature: 0.2
  max_tokens: 5000

input_variables:
  - research_folder_path
  - target_audience
  - study_name
  - researcher_contact
  - study_channel
  - research_readout_data
  - input_text
  - study_link
  - team_members
  - congressional_mandate
  - oversight_committee
  - reporting_deadline

core_files:
  research_plan:
    file: "research_plan.md"
    required: true
    extract: ["objectives", "methods", "success_criteria", "timeline"]
    
  session_summaries:
    folder: "03-fieldwork/session-summaries/"
    required: true
    extract: ["pain_points", "opportunities", "insights", "quotes", "participant_context"]
    file_pattern: "*session_summary*.md"
    
  participant_tracker:
    file: "participant_tracker.md"
    required: false
    extract: ["demographics", "sample_size", "completion_status"]

optional_files:
  affinity_mapping:
    file: "04-analysis/affinity-mapping/*.md"
    extract: ["themes", "evidence_counts", "recommendations"]
    
  journey_mapping:
    file: "04-analysis/journey-mapping/*.md"
    extract: ["stages", "pain_points", "opportunities"]

auto_variables:
  - audience_category: |
      determine_audience_category(target_audience) || "team"
  - current_date: |
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      generate_github_link(study_name, current_date, target_audience) || null
  - detected_files: |
      scan_research_folder(research_folder_path, core_files, optional_files)
  - participant_count: |
      extract_from_md(participant_tracker, "participants") || "Unknown"
  - session_count: |
      count_completed_sessions(participant_tracker, "completed") || "Unknown"

audience_routing:
  congressional:
    - "congressional_briefing"
    - "congressional"
    - "ses_briefing"
    
  executive:
    - "executive"
    - "leadership"
    - "director"
    
  team:
    - "product"
    - "design"
    - "engineering"
    - "accessibility"
    - "content"

ai_generation_tasks:
  - task_id: "targeted_readout_complete"
    prompt: |
      ============================================================
      🚨 CRITICAL GROUNDING RULES - READ FIRST 🚨
      ============================================================
      
      You are creating a targeted research readout from REAL research data.
      
      ABSOLUTE REQUIREMENTS:
      1. ONLY use findings, quotes, and data from the source below
      2. NEVER invent statistics, quotes, or findings
      3. Use participant IDs exactly as they appear (PT001, PT002, etc.)
      4. All numbers must be accurate to source data
      5. If source data is empty, say so - do not fabricate
      
      If source data is insufficient, output:
      "⚠️ Insufficient data for targeted readout. Required files may be empty."
      
      ============================================================
      SOURCE DATA
      ============================================================
      
      **Study Name:** {{study_name}}
      **Target Audience:** {{target_audience}}
      **Research Folder:** {{research_folder_path}}
      **Lead Researcher:** {{researcher_contact}}
      **Congressional Mandate:** {{congressional_mandate}}
      **Oversight Committee:** {{oversight_committee}}
      
      **Research Data:**
      
      {{input_text}}
      
      {{research_readout_data}}
      
      ============================================================
      AUDIENCE DETECTION
      ============================================================
      
      Determine audience type from {{target_audience}}:
      
      CONGRESSIONAL: "congressional_briefing", "congressional", "ses_briefing", "congress"
      EXECUTIVE: "executive", "leadership", "director", "va_leadership"
      TEAM: "product", "design", "engineering", "accessibility", "content"
      
      Select the appropriate format below based on audience type.
      
      ============================================================
      FORMAT A: CONGRESSIONAL BRIEFING
      ============================================================
      
      Use this format if audience is Congressional/SES briefing.
      
      Tone: Formal government language. No consultant jargon. Direct and specific.
      Length: 1-2 pages maximum. Executives skim.
      
      ---
      
      # CONGRESSIONAL BRIEFING
      ## [Study Name]
      
      **Date:** [Date] | **Prepared by:** [Researcher] | **Classification:** UNCLASSIFIED
      
      ---
      
      ### BOTTOM LINE UP FRONT
      
      [2-3 sentences maximum. What Congress needs to know RIGHT NOW.]
      
      - **Issue:** [One sentence describing the problem]
      - **Impact:** [X] veterans affected by [specific issue]
      - **Status:** [What VA is doing about it]
      
      ---
      
      ### BACKGROUND
      
      [2-3 sentences. Why this research was conducted.]
      
      - **Study Type:** [Usability testing / Interviews / etc.]
      - **Participants:** [X] veterans, [brief demographics]
      - **Focus:** [What was being evaluated]
      
      ---
      
      ### KEY FINDINGS
      
      **Finding 1: [Specific title]**
      - **Veteran Impact:** [How many affected, how severely]
      - **Evidence:** "[Brief quote from veteran]" — PT00X
      - **Status:** [Being addressed / Requires action / Under review]
      
      **Finding 2: [Specific title]**
      - **Veteran Impact:** [How many affected, how severely]
      - **Evidence:** "[Brief quote from veteran]" — PT00X
      - **Status:** [Being addressed / Requires action / Under review]
      
      **Finding 3: [Specific title]**
      - **Veteran Impact:** [How many affected, how severely]
      - **Evidence:** "[Brief quote from veteran]" — PT00X
      - **Status:** [Being addressed / Requires action / Under review]
      
      ---
      
      ### ACTIONS UNDERWAY
      
      | Action | Owner | Timeline | Status |
      |--------|-------|----------|--------|
      | [Action 1] | [Team/Office] | [Date] | [In Progress/Planned] |
      | [Action 2] | [Team/Office] | [Date] | [In Progress/Planned] |
      | [Action 3] | [Team/Office] | [Date] | [In Progress/Planned] |
      
      ---
      
      ### RISK ASSESSMENT
      
      **If not addressed:**
      - [Specific consequence for veterans]
      - [Potential scale of impact]
      
      ---
      
      ### RESOURCE REQUIREMENTS
      
      [Only if applicable - otherwise state "No additional resources required at this time."]
      
      ---
      
      ### METRICS FOR SUCCESS
      
      Congress can track progress through:
      - [Metric 1 with target]
      - [Metric 2 with target]
      
      ---
      
      ### LEGISLATIVE ALIGNMENT
      
      [Only if {{congressional_mandate}} provided]
      
      This research supports compliance with [mandate/bill] by [specific connection].
      
      ---
      
      **Point of Contact:** {{researcher_contact}}
      
      ---
      
      ============================================================
      FORMAT B: EXECUTIVE SUMMARY
      ============================================================
      
      Use this format if audience is Executive/Leadership.
      
      Tone: Professional, strategic focus. Results and decisions needed.
      Length: 1 page ideal.
      
      ---
      
      # EXECUTIVE SUMMARY
      ## [Study Name]
      
      **Date:** [Date] | **Lead:** [Researcher]
      
      ---
      
      ### KEY TAKEAWAYS
      
      1. **[Finding 1]** — [One sentence impact + action needed]
      2. **[Finding 2]** — [One sentence impact + action needed]  
      3. **[Finding 3]** — [One sentence impact + action needed]
      
      ---
      
      ### WHAT'S WORKING
      
      - [Positive finding with evidence]
      
      ---
      
      ### DECISIONS NEEDED
      
      | Decision | Options | Recommendation | By When |
      |----------|---------|----------------|---------|
      | [Decision 1] | [A or B] | [Recommended option] | [Date] |
      
      ---
      
      ### RESOURCE IMPLICATIONS
      
      - **Timeline:** [Impact on roadmap]
      - **Staffing:** [Any needs]
      - **Budget:** [Any implications]
      
      ---
      
      **Full details:** [Link to complete readout]
      
      ---
      
      ============================================================
      FORMAT C: TEAM READOUT
      ============================================================
      
      Use this format if audience is Product/Design/Engineering/etc.
      
      Tone: Practical, implementation-focused. What do they need to DO.
      Length: As needed for actionable detail.
      
      ---
      
      # [Team Name] READOUT
      ## [Study Name]
      
      **Date:** [Date] | **Participants:** [X] | **Lead:** [Researcher]
      
      ---
      
      ### TL;DR FOR [TEAM]
      
      [3-4 bullets of what THIS team needs to know/do]
      
      ---
      
      ### FINDINGS RELEVANT TO [TEAM]
      
      **[Finding 1]**
      
      > "[Quote from participant]"
      > *— PT001*
      
      - **The Problem:** [Specific description]
      - **Severity:** [Critical/High/Medium/Low]
      - **Affected:** [X] of [Y] participants
      - **Suggested Fix:** [Specific recommendation]
      
      ---
      
      **[Finding 2]**
      
      [Same format]
      
      ---
      
      ### IMPLEMENTATION CHECKLIST
      
      - [ ] [Specific action item 1]
      - [ ] [Specific action item 2]
      - [ ] [Specific action item 3]
      
      ---
      
      ### QUESTIONS FOR [TEAM]
      
      - [Open question from research that team should consider]
      
      ---
      
      ### RELATED FILES
      
      - [Session summaries](link)
      - [Affinity map](link) if available
      
      ---
      
      **Questions?** {{researcher_contact}}
      
      ---
      
      ============================================================
      OUTPUT SELECTION
      ============================================================
      
      Based on {{target_audience}}, output ONLY the appropriate format above.
      Do not mix formats. Do not include these instructions in output.

output_options:
  path: "05-findings/"
  filename: "{{target_audience}}_readout_{{study_name}}_{{current_date}}.md"

slack_message_format: |
  🎯 **{{target_audience}} Readout Ready**
  
  **Study:** {{study_name}}
  **Participants:** {{participant_count}}
  
  👆 **View:** [Link]({{github_file_link}})
  
  *Questions?* {{researcher_contact}}

output_template: |
  {{ai_generated.targeted_readout_complete}}

notify:
  - role: targeted_audience
    action: "Readout ready"
    channel: "{{study_channel}}"
    message: "🎯 {{target_audience}} readout for {{study_name}} is ready."
