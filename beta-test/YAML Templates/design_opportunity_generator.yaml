# Auto-generated variables
auto_variables:
  - num_opportunities: extract_opportunity_count(ai_generated.problem_diversity_analysis) || 4
  - design_focus: extract_design_focus(ai_generated.problem_diversity_analysis) || "User Experience"
  - innovation_level: extract_innovation_level(ai_generated.problem_diversity_analysis) || "Significant"
  - current_date: new Date().toISOString().split('T')[0]
  - analysis_version: generate_version_number() || "v1.0"
  - github_file_link: generate_github_link(study_name, current_date)

notify:
  - role: team
    action: "Design opportunities generation completed"
    channel: "{{study_channel}}"
    message: "{{researcher_contact}} identified {{num_opportunities}} design opportunities for {{selected_study}} with {{innovation_level}} innovation potential. Perfect for workshops!"

output_use: |
  Slack-Native Design Opportunities Generator automatically discovers research files from selected study folders,
  systematically identifies user problems, transforms them into "How Might We" questions that inspire creative 
  solutions, and develops workshop-ready guidance for design teams. Outputs concise Slack summaries focused on 
  opportunities and HMW questions, plus detailed GitHub markdown reports for workshop facilitation.

  Use this method to:
    - Transform user problems into creative design challenges
    - Generate "How Might We" questions that inspire breakthrough thinking
    - Develop workshop-ready opportunities with evidence and guidance
    - Bridge research insights with design exploration and ideation
    - Create actionable opportunities for design teams and innovation sessions
