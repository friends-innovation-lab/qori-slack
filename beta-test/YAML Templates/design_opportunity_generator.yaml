id: design_opportunity_generator
name: run_design_opportunity_generator

label: 💡 Design Opportunities
version: "v2.0"

description: >
  Generate design opportunities and "How Might We" questions from research themes and findings.
  Automatically discovers and analyzes research files from selected study folder with optional quality improvements.
  Transforms user problems into creative design challenges that inspire innovative solutions and guide design exploration workshops.

author: Qori R&D
created: 2025-06-26
last_updated: 2025-09-10

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.4
  max_tokens: 4000

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 1000
  max_file_size: 100000
  supported_formats: [".md", ".txt", ".csv", ".json"]
  max_files_per_analysis: 20

# Privacy controls
privacy_controls:
  enable_pii_detection: true
  pii_detection_patterns:
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
    phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    ssn: '\b\d{3}-\d{2}-\d{4}\b'
  masking_strategy:
    email: "[EMAIL_REDACTED]"
    phone: "[PHONE_REDACTED]" 
    ssn: "[SSN_REDACTED]"

# Error handling and retry configuration
error_handling:
  max_retries: 3
  retry_delay: 5000  # milliseconds
  retry_backoff: "exponential"
  
  error_types:
    file_not_found:
      action: "log_and_continue"
      fallback: "use_available_files"
      
    llm_timeout:
      action: "retry_with_shorter_content"
      max_content_length: 25000
      
    insufficient_content:
      action: "request_additional_files"
      min_threshold: 500
      
    pii_detection_failure:
      action: "mask_all_potential_pii"
      escalation: true

# Performance and timeout configuration
performance_config:
  timeouts:
    file_discovery: 30000      # 30 seconds
    llm_generation: 120000     # 2 minutes
    total_analysis: 600000     # 10 minutes
    
  rate_limits:
    api_calls_per_minute: 10
    concurrent_analyses: 3
    max_queue_size: 20
    
  caching:
    enable_file_cache: true
    cache_duration: 3600  # 1 hour
    cache_size_limit: "500MB"

# Validation rules
validation_rules:
  input_validation:
    selected_study:
      required: true
      type: "string"
      allowed_values: ["VA Housing Application Usability Study", "Benefits Portal Navigation Research", "Veteran Onboarding Experience Study"]
      
    file_content:
      min_length: 1000
      max_length: 100000
      encoding: "utf-8"
      
  output_validation:
    hmw_questions:
      min_count: 2
      max_count: 8
      format_pattern: "^How might we.*\\?$"
      
    opportunities:
      required_fields: ["problem", "hmw", "why_this_matters", "design_challenge"]

# Security and integration configuration
security_config:
  environment_variables:
    required:
      - OPENAI_API_KEY
      - SLACK_WEBHOOK_URL
      - GITHUB_API_TOKEN
    optional:
      - GOOGLE_DRIVE_CREDENTIALS
      
  access_control:
    required_permissions: ["research.read", "analysis.generate"]
    allowed_channels: ["#research-*", "#design-*"]
    
  data_retention:
    raw_files_cache: "7_days"
    analysis_outputs: "90_days"
    error_logs: "30_days"

# Logging and monitoring
logging_config:
  level: "INFO"
  format: "json"
  
  log_events:
    - analysis_start
    - file_discovery_complete
    - ai_generation_complete
    - analysis_complete
    - errors_and_warnings
    
  metrics:
    track_analysis_duration: true
    track_file_discovery_success_rate: true
    track_ai_generation_quality: true

# Slack modal input variables
input_variables:
  - selected_study              # Study name from dropdown (REQUIRED)
  - include_research_plan       # Boolean from checkbox (OPTIONAL)
  - include_participant_notes   # Boolean from checkbox (OPTIONAL)  
  - include_raw_transcripts     # Boolean from checkbox (OPTIONAL)
  
  # Auto-generated during processing
  - discovered_files            # Files found by auto-discovery (GENERATED)
  - combined_file_content       # Auto-combined content (GENERATED)
  - quality_assessment          # Initial quality score (GENERATED)

# Study metadata mapping
study_metadata:
  "VA Housing Application Usability Study":
    folder: "va-housing-usability-2025"
    researcher: "jordan.researcher"
    channel: "#research-housing-app"
    focus_area: "housing application design"
    
  "Benefits Portal Navigation Research":
    folder: "benefits-portal-nav-2025"
    researcher: "alex.ux"
    channel: "#research-benefits"
    focus_area: "benefits portal design"
    
  "Veteran Onboarding Experience Study":
    folder: "veteran-onboarding-2025"
    researcher: "casey.research"
    channel: "#research-onboarding"
    focus_area: "onboarding experience design"

# File discovery system
auto_file_discovery:
  core_files:
    session_summaries:
      file_patterns: ["*session_summary*", "*summary*", "*session*"]
      search_paths: ["01-sessions/", "sessions/", "summaries/"]
      priority: "required"
      confidence_weight: 50
      
    transcripts:
      file_patterns: ["*transcript*", "*interview*", "*recording*"]
      search_paths: ["01-sessions/", "transcripts/", "interviews/"]
      priority: "high"
      confidence_weight: 30
  
  enhancement_files:
    research_plan:
      enabled_when: "{{include_research_plan}} == true"
      file_patterns: ["*research_plan*", "*study_plan*", "*methodology*"]
      search_paths: ["00-planning/", "planning/", "research/"]
      confidence_boost: 8
      
    participant_notes:
      enabled_when: "{{include_participant_notes}} == true"
      file_patterns: ["*participant*", "*notes*", "*observations*"]
      search_paths: ["02-participants/", "participants/", "notes/"]
      confidence_boost: 5
      
    raw_transcripts:
      enabled_when: "{{include_raw_transcripts}} == true"
      file_patterns: ["*raw*", "*unprocessed*", "*recording*"]
      search_paths: ["01-sessions/raw/", "raw/", "recordings/"]
      confidence_boost: 3

# AI generation tasks
ai_generation_tasks:
  # File discovery and quality assessment
  - task_id: "file_discovery_summary"
    prompt: |
      As a research operations specialist, analyze the discovered files and quality:
      
      **Selected Study:** {{selected_study}}
      **Enhancement Options Selected:**
      - Research plan: {{include_research_plan}}
      - Participant notes: {{include_participant_notes}}
      - Raw transcripts: {{include_raw_transcripts}}
      
      **Discovered Files:** {{discovered_files}}
      **Total Content:** [Analyze character/word count of combined_file_content]
      
      Report on file coverage, content quality, enhancement impact, and analysis confidence for design opportunity generation.

  # Analyze problem diversity and determine optimal opportunity approach
  - task_id: "problem_diversity_analysis"
    prompt: |
      As an experienced design strategist specializing in opportunity identification, analyze the problem diversity in this research data:
      
      **Study:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      **Input Data:** {{combined_file_content}}
      **Quality Assessment:** {{ai_generated.file_discovery_summary}}
      
      Analyze:
      1. **Problem Diversity Level:** How many distinct problem areas are represented in the data?
      2. **Optimal Opportunity Count:** Based on diversity and data quality, how many design opportunities should be created?
      3. **Primary Problem Categories:** What are the main themes or types of user problems?
      4. **Innovation Potential:** What level of innovation do these problems suggest?
      5. **Design Focus Area:** What primary design challenge emerges from the problems?
      6. **Data Richness:** How well does the data support opportunity creation?
      
      **Format:**
      **Problem Diversity Level:** [High/Medium/Low] - [specific details about variety in problem types]
      **Recommended Opportunity Count:** [3-6 opportunities] - [reasoning based on distinct problem patterns]
      **Primary Problem Categories:** [List main problem themes identified]
      **Innovation Potential:** [Breakthrough/Significant/Incremental] - [reasoning based on problem complexity]
      **Design Focus Area:** [Primary design challenge area - e.g., "Trust & Transparency", "Process Simplification"]
      **Data Suitability:** [Excellent/Good/Adequate/Poor] for opportunity development - [reasoning]
      **Analysis Confidence:** [High/Medium/Low] - [reasoning based on file assessment]

  # Identify and categorize specific problems from research
  - task_id: "problem_identification"
    prompt: |
      As an experienced UX researcher, identify specific problems from the research data:
      
      **Input Data:** {{combined_file_content}}
      **Problem Diversity Context:** {{ai_generated.problem_diversity_analysis}}
      **Study Context:** {{selected_study}}
      **Focus Area:** {{focus_area}}
      
      Based on the recommended opportunity count, identify each distinct problem area:
      
      1. **Problem Titles:** Clear, engaging names for each problem area
      2. **Problem Statements:** Concise descriptions of user pain points
      3. **User Impact:** How each problem affects user success or experience
      4. **Evidence Strength:** How well-supported each problem is in the data
      5. **Design Potential:** Opportunity level for creative solutions
      
      **Format for each problem:**
      **Problem [X]: [Clear, engaging problem title]**
      - **Problem Statement:** [Specific description of the user pain point]
      - **User Impact:** [How this affects user success, confidence, or experience]
      - **Evidence Strength:** [Strong/Moderate/Emerging] - [description of supporting data]
      - **Design Potential:** [High/Medium/Low] - [reasoning for creative solution opportunity]
      - **Supporting Evidence:** [Specific quotes or patterns that illustrate this problem]
      - **Frequency:** [How often this problem appears in the data]
      
      Requirements:
      - Only identify problems clearly supported by research evidence
      - Make problem statements specific enough to inspire solutions
      - Focus on user-centered problems, not system or business problems
      - Ensure each problem is genuinely distinct from others
      - Ground each problem in actual research evidence

  # Transform problems into "How Might We" opportunities
  - task_id: "hmw_opportunity_generation"
    prompt: |
      As an experienced design facilitator, transform identified problems into "How Might We" opportunities:
      
      **Identified Problems:** {{ai_generated.problem_identification}}
      **Study Context:** {{selected_study}}
      **Design Focus:** {{ai_generated.problem_diversity_analysis}}
      
      For each problem, create:
      1. **HMW Question:** Open-ended question that invites creative solutions
      2. **Opportunity Significance:** Why solving this matters for users and outcomes
      3. **Creative Challenge:** Specific design challenge for teams to tackle
      4. **Success Vision:** What success would look like for users
      5. **Inspiration Examples:** Analogies or examples that spark creative thinking
      
      **Format for each opportunity:**
      **Opportunity [X]: [Problem Title]**
      
      **Problem:** [Brief restatement of core problem]
      **HMW:** [How might we... question that opens creative possibilities]
      **Why This Matters:** [Significance for users and business outcomes - specific impact]
      **Design Challenge:** [Specific creative challenge for designers to tackle]
      **Success Vision:** [What success would look like from user perspective]
      **Creative Inspiration:** [Analogies, examples, or frameworks that could spark ideas]
      **Supporting Quote:** "[Direct quote from research that illustrates the problem]"
      
      **HMW Requirements:**
      - Start with "How might we..."
      - Be specific enough to focus thinking but broad enough to allow creativity
      - Avoid suggesting solutions within the question
      - Focus on user outcomes and experiences
      - Inspire breakthrough thinking, not just incremental fixes
      
      **Examples of excellent HMW questions:**
      - "How might we make complex government processes feel as simple as ordering coffee?"
      - "How might we help users feel confident they're making the right choice when stakes feel high?"
      - "How might we turn waiting time into valuable, productive moments?"
      - "How might we make error recovery feel empowering rather than frustrating?"

  # Assess design signals and evidence strength
  - task_id: "design_signal_assessment"
    prompt: |
      As an experienced design researcher, assess the design signals and evidence strength for each opportunity:
      
      **HMW Opportunities:** {{ai_generated.hmw_opportunity_generation}}
      **Input Data:** {{combined_file_content}}
      
      For each opportunity, assess:
      1. **Signal Strength:** How strong is the evidence for this opportunity
      2. **User Frequency:** How often users encounter this problem
      3. **Impact Level:** Severity of impact when users face this problem
      4. **Solution Readiness:** How ready this opportunity is for design exploration
      5. **Workshop Suitability:** How well this would work in design workshops
      
      **Format for each opportunity:**
      **Opportunity: [Title]**
      
      📊 **Signal Strength:** [Strong/Moderate/Emerging] - [description of evidence quality and quantity]
      🔄 **User Frequency:** [High/Medium/Low] - [how often users encounter this problem]
      ⚡ **Impact Level:** [High/Medium/Low] - [severity when users face this problem]
      🛠️ **Solution Readiness:** [Ready/Needs validation/Exploratory] - [assessment of design readiness]
      🎯 **Workshop Suitability:** [Excellent/Good/Fair] - [how well this works for ideation sessions]
      📈 **Expected Session Count:** [Single session/Multiple sessions/Workshop series] - [estimated ideation scope]
      🎨 **Creative Constraints:** [Helpful constraints that could guide ideation without limiting solutions]
      📝 **Validation Needs:** [What would strengthen confidence in this opportunity]
      
      Requirements:
      - Base signal strength on actual evidence quantity and quality
      - Make frequency assessments realistic based on data patterns
      - Connect impact levels to specific user consequences
      - Give practical guidance for workshop facilitation

  # Generate actionable next steps and workshop guidance
  - task_id: "workshop_guidance_generation"
    prompt: |
      As an experienced design workshop facilitator, generate actionable guidance for using these opportunities:
      
      **Assessed Opportunities:** {{ai_generated.design_signal_assessment}}
      **Problem Context:** {{ai_generated.problem_diversity_analysis}}
      **Study Context:** {{selected_study}}
      
      Generate:
      1. **Priority Ranking:** Which opportunities to tackle first and why
      2. **Workshop Recommendations:** How to structure ideation sessions
      3. **Team Preparation:** What teams need before workshops
      4. **Success Metrics:** How to measure ideation and solution success
      5. **Follow-up Actions:** Next steps after initial ideation
      
      **Format:**
      
      ## 🎯 **OPPORTUNITY PRIORITIZATION**
      
      **High Priority (Start Here):**
      - [Opportunity]: [Why this should be first - specific reasoning]
      
      **Medium Priority (Next Phase):**
      - [Opportunity]: [Why this comes next - specific reasoning]
      
      **Lower Priority (Future Exploration):**
      - [Opportunity]: [Why this can wait - specific reasoning]
      
      ## 🛠️ **WORKSHOP RECOMMENDATIONS**
      
      **Recommended Session Structure:**
      - **Duration:** [Specific time recommendation based on opportunity complexity]
      - **Participants:** [Who should attend and why]
      - **Materials:** [What teams need prepared]
      - **Format:** [In-person/Remote/Hybrid recommendation with reasoning]
      
      **Session Flow:**
      1. [Phase 1]: [Specific activity and time allocation]
      2. [Phase 2]: [Specific activity and time allocation]
      3. [Phase 3]: [Specific activity and time allocation]
      
      ## 📋 **TEAM PREPARATION CHECKLIST**
      
      **Before the Workshop:**
      - [ ] [Specific preparation task]: [Why this matters]
      - [ ] [Specific preparation task]: [Why this matters]
      - [ ] [Specific preparation task]: [Why this matters]
      
      **Materials to Gather:**
      - [Specific material]: [How it supports ideation]
      - [Specific material]: [How it supports ideation]
      
      ## 📊 **SUCCESS METRICS**
      
      **Ideation Success:**
      - [Specific metric]: [How to measure good ideation]
      - [Quality indicator]: [What makes ideas promising]
      
      **Solution Success:**
      - [User outcome]: [How to measure user impact]
      - [Business outcome]: [How to measure business value]
      
      ## ⭐ **FOLLOW-UP RECOMMENDATIONS**
      
      **Immediate Next Steps (Week 1):**
      - [Action]: [Who does this and why]
      
      **Short-term Actions (Weeks 2-4):**
      - [Action]: [How this builds on workshop outcomes]
      
      **Long-term Strategy (Months 2-3):**
      - [Strategic action]: [How this creates lasting impact]

# Processing workflow
processing_workflow:
  1. validate_slack_modal_inputs
  2. discover_files_from_study_selection
  3. calculate_initial_quality_assessment
  4. validate_discovered_files
  5. combine_selected_files_with_truncation
  6. execute_file_discovery_summary
  7. execute_problem_diversity_analysis
  8. execute_problem_identification
  9. execute_hmw_opportunity_generation
  10. execute_design_signal_assessment
  11. execute_workshop_guidance_generation
  12. format_slack_output
  13. format_github_output
  14. save_to_analysis_folder
  15. send_team_notifications

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "opportunities_focused"
  file_format: "github_markdown"
  path: "04-analysis/design-opportunities/"
  filename: "{{study_folder}}_design_opportunities_{{current_date}}.md"

# Slack output template
output_template: |
