id: design_opportunities
name: generate_design_opportunities

label: 💡 Design Opportunities
version: "v2.0"

description: >
  Transform research-grounded problems into How Might We (HMW) opportunity
  statements. Each opportunity traces directly to user evidence.

author: Qori R&D
created: 2025-06-26
last_updated: 2026-01-08

input_type: slack_modal_form
input_processing: auto_file_discovery

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 4000

# System limits
system_limits:
  max_total_tokens: 50000
  min_content_threshold: 1000
  max_file_size: 100000
  supported_formats: [".md", ".txt", ".csv", ".json"]
  max_files_per_analysis: 20

# Privacy controls
privacy_controls:
  enable_pii_detection: true
  pii_detection_patterns:
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
    phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    ssn: '\b\d{3}-\d{2}-\d{4}\b'
  masking_strategy:
    email: "[EMAIL_REDACTED]"
    phone: "[PHONE_REDACTED]"
    ssn: "[SSN_REDACTED]"

# Slack modal input variables
input_variables:
  - selected_study
  - include_session_summaries
  - include_transcripts
  - include_existing_analysis
  - discovered_files
  - combined_file_content

# File discovery system
auto_file_discovery:
  core_files:
    session_summaries:
      file_patterns: ["*session_summary*", "*summary*"]
      search_paths: ["01-sessions/", "sessions/"]
      priority: "required"
      confidence_weight: 50
      
    transcripts:
      file_patterns: ["*transcript*", "*interview*"]
      search_paths: ["01-sessions/", "transcripts/"]
      priority: "high"
      confidence_weight: 30
      
    existing_analysis:
      file_patterns: ["*affinity*", "*journey*", "*usability*"]
      search_paths: ["04-analysis/"]
      priority: "optional"
      confidence_weight: 20

# AI generation task
ai_generation_tasks:
  - task_id: "opportunities_complete"
    prompt: |
      You are generating design opportunities from research data.
      
      IMPORTANT: Generate the COMPLETE output following the format below. Do not stop early.
      
      ============================================================
      RULES — READ THEN GENERATE FULL OUTPUT
      ============================================================
      
      RULE 1: HMWs COME FROM PROBLEMS — NO INVENTION
      
      Every HMW must trace DIRECTLY to a problem found in the research.
      
      ❌ WRONG (invented):
      - "How might we improve personalization?"
      - "How might we foster community connection?"
      - "How might we reduce information overload?"
      
      ✅ RIGHT (from research):
      - "How might we help veterans know their claim is processing without checking daily?" (from PT003 claim status confusion)
      - "How might we make profile editing discoverable for users with large text settings?" (from PT003 hidden edit button)
      
      If you cannot cite a specific participant and quote, DO NOT include the HMW.
      
      RULE 2: HMW FORMULA
      
      Use this structure:
      "How might we [VERB] for [USER] when [SITUATION] so that [OUTCOME]?"
      
      - VERB: action word (help, enable, reduce, simplify)
      - USER: veterans, users with accessibility needs, etc.
      - SITUATION: specific trigger from research
      - OUTCOME: desired state (NOT a solution)
      
      RULE 3: SCOPE — NOT TOO BROAD, NOT TOO NARROW
      
      ❌ TOO BROAD: "How might we improve the app experience?"
      ❌ TOO NARROW: "How might we move the edit button 10 pixels higher?"
      ✅ JUST RIGHT: "How might we make profile editing obvious without scrolling?"
      
      RULE 4: NO SOLUTIONS IN HMWs
      
      HMWs invite exploration, they don't prescribe answers.
      
      ❌ WRONG: "How might we add a loading spinner?"
      ✅ RIGHT: "How might we reassure users the app is working during slow loads?"
      
      RULE 5: VA CONTEXT ONLY
      
      Users are Veterans accessing VA services.
      Problems relate to: app usability, claims, benefits, healthcare, prescriptions.
      
      ❌ NEVER mention:
      - "platform community," "social features," "personalization algorithms"
      - "coworking," "personal shopper," "content recommendations"
      - Marketing, Sales, engagement metrics
      
      RULE 6: CITE EVERYTHING
      
      Every opportunity must include:
      - Participant ID (PT001, PT002, etc.)
      - Direct quote from research
      - Timestamp if available
      
      RULE 7: VERIFY BEFORE SUBMITTING
      - Every HMW traces to a specific research finding
      - No invented problems or generic UX issues
      - HMWs are scoped appropriately (not too broad/narrow)
      - All quotes are verbatim from source data
      - Context is VA/veterans only
      
      ============================================================
      INPUT DATA
      ============================================================
      
      **Study:** {{selected_study}}
      **Research Data:** {{combined_file_content}}
      
      ============================================================
      NOW GENERATE THE COMPLETE OUTPUT BELOW
      ============================================================
      
      # 💡 Design Opportunities: {{selected_study}}
      
      > **Generated:** [Today's date] | **[X] opportunities** from **[Y] participants**
      
      ---
      
      ## Overview
      
      | Priority | Opportunity | From Problem | Evidence |
      |:--------:|-------------|--------------|----------|
      | 🔴 | [Short HMW name] | [Pain point summary] | PT00X, PT00X |
      | 🔴 | [Short HMW name] | [Pain point summary] | PT00X |
      | 🟡 | [Short HMW name] | [Pain point summary] | PT00X |
      
      ---
      
      ## Opportunity 1: [Short Descriptive Name]
      
      **The Problem:**
      
      > "[Direct quote from research]" — PT00X, 00:00:00
      
      [1-2 sentence problem statement grounded in the quote above]
      
      **How Might We...**
      
      > How might we **[verb]** for **[veterans]** when **[situation from research]** so that **[desired outcome]**?
      
      **Why This Matters:**
      
      | User Impact | Evidence Strength |
      |-------------|-------------------|
      | [What happens if unsolved] | [Strong/Moderate] — [X] participants mentioned |
      
      **Design Direction:** [General approach — NOT a specific solution]
      
      **Success Looks Like:** [Measurable outcome — e.g., "User finds feature in under 2 taps"]
      
      | Scope | Priority |
      |:-----:|:--------:|
      | 🔵⚪⚪ Small | 🔴 High |
      
      ---
      
      ## Opportunity 2: [Short Descriptive Name]
      
      **The Problem:**
      
      > "[Direct quote from research]" — PT00X, 00:00:00
      
      [1-2 sentence problem statement]
      
      **How Might We...**
      
      > How might we **[verb]** for **[veterans]** when **[situation]** so that **[outcome]**?
      
      **Why This Matters:**
      
      | User Impact | Evidence Strength |
      |-------------|-------------------|
      | [Impact] | [Strength] — [X] participants |
      
      **Design Direction:** [Approach]
      
      **Success Looks Like:** [Measurable outcome]
      
      | Scope | Priority |
      |:-----:|:--------:|
      | 🔵🔵⚪ Medium | 🔴 High |
      
      ---
      
      ## Opportunity 3: [Short Descriptive Name]
      
      [Same format — continue for each distinct opportunity]
      
      ---
      
      ## Prioritization
      
      | # | Opportunity | Impact | Effort | When |
      |---|-------------|:------:|:------:|:----:|
      | 1 | [Name] | 🔴 High | 🔵⚪⚪ | Now |
      | 2 | [Name] | 🔴 High | 🔵🔵⚪ | Next |
      | 3 | [Name] | 🟡 Med | 🔵🔵🔵 | Later |
      
      > **Impact:** 🔴 High | 🟡 Medium | 🟢 Low — **Effort:** 🔵🔵🔵 High | 🔵🔵⚪ Med | 🔵⚪⚪ Low
      
      <br>
      
      ---
      
      ## Methodology
      
      **Framework:** How Might We (HMW) Opportunity Framing
      
      **Approach:** Transform research-grounded problems into open questions that invite solution exploration without prescribing answers.
      
      **Data Sources:** [List participant IDs]
      
      <br>
      
      ---
      
      ### References
      
      This analysis follows established opportunity framing methods:
      
      - **IDEO** — Design Thinking, HMW framework origin
      - **Stanford d.school** — "How Might We" question methodology
      - **Nielsen Norman Group** — From research insights to design opportunities
      - **Vijay Kumar** — "101 Design Methods" (Opportunity framing)
      
      ---
      
      *Generated by Qori • [Today's date]*

# Processing workflow
processing_workflow:
  1. validate_slack_modal_inputs
  2. discover_files_from_study_selection
  3. combine_selected_files_with_truncation
  4. execute_opportunities_complete
  5. format_slack_output
  6. format_github_output
  7. save_to_analysis_folder

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "opportunities_focused"
  file_format: "github_markdown"
  path: "04-analysis/design-opportunities/"
  filename: "{{study_folder}}_design_opportunities_{{current_date}}.md"

# Slack output template
output_template: |
  {{ai_generated.opportunities_complete}}

# GitHub markdown file template
github_file_template: |
  {{ai_generated.opportunities_complete}}

notes: |
  v2.0 Complete Rewrite:
  - Fixed severe hallucination (HMWs were 100% invented)
  - Added HMW formula: verb + user + situation + outcome
  - Added scope guidance (not too broad/narrow)
  - Removed workshop bloat (separate deliverable)
  - Every HMW must cite specific participant + quote
  - Added expert references (IDEO, d.school, NN/g, Kumar)
  - Streamlined output (~400 words vs 1000+)
  
  v1.0: Original (broken — hallucinated HMWs)

output_use: |
  Generate How Might We opportunity statements from research data.
  Each opportunity traces directly to user evidence with quotes and
  participant citations. Includes prioritization and design direction.
