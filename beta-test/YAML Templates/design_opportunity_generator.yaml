id: design_opportunity_generator
name: run_design_opportunity_generator
label: 🎨 Design Opportunity Generator
version: v2.0
description: |
  Generate design opportunities and "How Might We" questions from research themes and findings. Transform user problems into creative design challenges that inspire innovative solutions and guide design exploration workshops.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-02

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

input_variables:
  - input_text           # Research themes, findings, problem areas (REQUIRED)
  - study_name           # Title of study (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to post results (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Who to notify/tag (OPTIONAL)

# Auto-generated/computed variables
auto_variables:
  - num_opportunities: |
      # AI analyzes input complexity to determine optimal opportunity count
      # Default: 4, Range: 3-6 based on problem diversity and scope
      analyze_problem_diversity(input_text) || 4
  - design_focus: |
      # AI identifies primary design challenge area
      # e.g., "Usability", "Trust & Transparency", "Process Simplification"
      identify_design_focus(input_text) || "User Experience"
  - innovation_level: |
      # AI assesses innovation potential from problems
      # Incremental/Significant/Breakthrough based on problem complexity
      assess_innovation_potential(input_text) || "Significant"
  - session_count: |
      # AI estimates session count from input patterns
      estimate_session_count(input_text) || "multiple sessions"
  - current_date: |
      # Auto-generate current date for file naming
      new Date().toISOString().split('T')[0]
  - github_file_link: |
      # Auto-generate based on study name and date
      generate_github_link(study_name, current_date) || null

# Output configuration
output_options:
  default_delivery: "slack_and_file"
  slack_format: "structured"
  file_location: "04-analysis/"
  file_name: "design_opportunities_{{study_name_slug}}_{{current_date}}.md"

slack_output:
  post_in_channel: true
  create_thread: true
  title_format: "🎨 Design Opportunities"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "💡 Create Insight Cards"
      action: "run_insight_card"
    - text: "🧠 Run Affinity Mapping"
      action: "run_affinity_mapping"
    - text: "🗂️ View in GitHub"
      url: "{{github_file_link}}"

output_use: |
  CivicMind Design Opportunity Generator transforms research problems into actionable design challenges. Perfect for design workshops, ideation sessions, and creative problem-solving that leads to innovative user experiences.

  Use this method to:
    - Convert research findings into creative design challenges
    - Generate HMW questions for design workshops and ideation
    - Identify innovation opportunities from user problems
    - Bridge research insights with design exploration
    - Inspire breakthrough thinking beyond incremental fixes

output_notes: |
  This method generates {{num_opportunities}} design opportunities based on problem diversity analysis.
  Design focus ({{design_focus}}) and innovation level ({{innovation_level}}) identified from research themes.
  Session count ({{session_count}}) estimated from input patterns.
  Write HMW questions that inspire creative thinking, not constrain solutions.
  Focus on user outcomes and experiences, not just feature fixes.
  Use plain, actionable language accessible to designers and stakeholders.
  Format for design workshop readiness using clear problem → opportunity structure.

