# FINAL OPTIMIZED RESEARCH PLAN - Targeted Improvements Implementation

id: research_plan
name: run_research_plan
label: 🧭 Research Plan
version: v3.0
description: |
  🧭 **Research Idea → Complete Execution Plan**
  
  Transform your research concept into a comprehensive, VA-compliant plan in minutes. Streamlined for faster stakeholder approval while maintaining professional quality. Optimized to keep your strong VA-specific sections while adding critical planning elements and removing bloat.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-16

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.2
  max_tokens: 4000

input_type: structured
input_processing: direct
precision_mode: detailed

# Enhanced Error Handling (backend only)
error_handling:
  validation_errors:
    - field: "project_title"
      rules:
        - type: "min_length"
          value: 5
          message: "Project title must be at least 5 characters"
    - field: "participant_count"
      rules:
        - type: "methodology_appropriate"
          message: "Participant count should match methodology"

# Current UI-Compatible Input Schema
input_variables:
  - project_title:
      type: "text"
      required: true
      placeholder: "e.g., Debt Letters Usability Study"
      
  - product_area:
      type: "text"
      required: true
      placeholder: "e.g., Debt Letters, Benefits Navigation, Claims Processing"
      
  - decision_context:
      type: "textarea"
      required: true
      placeholder: "e.g., Should we redesign the debt letter format to reduce veteran confusion?"
      
  - research_goal:
      type: "textarea"
      required: true
      placeholder: "e.g., Understand how veterans interpret current debt letters and identify pain points"
      
  - methodology:
      type: "checkboxes"
      required: true
      options: ["Usability Testing", "User Interviews", "Survey Research", "Card Sorting", "Concept Testing", "Competitive Analysis"]
      
  - target_participants:
      type: "textarea"
      required: true
      placeholder: "e.g., Veterans who received debt letters in past 6 months"
      
  - participant_count:
      type: "text"
      required: true
      placeholder: "e.g., 5-8 participants"
      
  - timeline_preference:
      type: "radio"
      required: true
      options: ["Rush (2-3 weeks total)", "Standard (4-6 weeks total)", "Extended (8+ weeks total)"]
      
  - lead_researcher:
      type: "text"
      required: true
      placeholder: "e.g., Jordan Smith"
      
  - team_office:
      type: "text"
      required: true
      placeholder: "e.g., VA Digital Services, OCTO, 18F"

# ENHANCED AI GENERATION TASKS
ai_generation_tasks:
  # NEW - Input validation and improvement (runs first)
  - task_id: "input_validation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on practical improvements and clear validation
      
      As an experienced VA UX Researcher, review and improve these user inputs for clarity and completeness:
      
      **Project Title:** {{project_title}}
      **Product Area:** {{product_area}}
      **Decision Context:** {{decision_context}}
      **Research Goal:** {{research_goal}}
      **Target Participants:** {{target_participants}}
      
      For each input, provide:
      1. **Validation:** Is it clear and specific enough?
      2. **Improvements:** Any suggested refinements for VA research standards
      3. **Compliance Notes:** Any VA-specific considerations
      
      Return improved versions that maintain the user's intent but improve clarity and specificity for stakeholder consumption.

  # IMPROVED - Concise product area (replace verbose description)
  - task_id: "concise_product_area"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Maximum 2-3 sentences ONLY
      
      As an experienced VA UX Researcher, create a concise, professional description of "{{product_area}}":
      
      Requirements:
      - Explain what it is and why it matters to Veterans
      - Include business context within VA ecosystem
      - Use clear, professional language
      - NO marketing speak or verbose descriptions
      
      Example format: "[Product] - [what it does] serving [Veterans' need]. [Brief business context or impact]."

  # KEEP - OCTO Priorities (enhanced with 2025 priorities)
  - task_id: "octo_priorities"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS format Additional Priorities with bold priority names: **[Priority Name]:** [description]
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      As an experienced VA UX Researcher, map {{product_area}} research to current OCTO-DE priorities:
      
      **OCTO-DE Priorities 2025:**
      1. Improve the Veteran login experience
      2. Solidify the VA.gov platform  
      3. Integrate health portal features into VA.gov
      4. Expand the flagship mobile app
      5. Refresh VA.gov homepage and IA
      6. Enhance Veterans' personalized online experience
      7. Fast-track disability claims, starting with PACT Act claims
      8. Grow the OCTO team
      9. Formalize the VA Innovation Unit and innovation process
      10. Drive OIT's Digital Transformation Strategy
      
      Required format:
      **Primary OCTO Priority:** [Exact title from list above]
      
      **Explanation:** One sentence connecting {{product_area}} to this priority.
      
      **Additional Priorities (if applicable):**
      - **[Priority Name]:** [Brief explanation]
      - **[Priority Name]:** [Brief explanation]
      
      **Project-Specific Priorities:**
      - [2-3 specific priorities for {{product_area}}]
      
      Use exact OCTO priority titles and be specific to {{product_area}}.

  # KEEP - Veteran Journey (enhanced mapping)
  - task_id: "veteran_journey"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline," "play a role"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - ALWAYS bold the life stage names: **[Life Stage]:** [description]
      
      As an experienced VA UX Researcher, map {{product_area}} to the official VA Journey of Veterans Map framework:
      
      **VA Journey Map Reference:**
      *Life Stages:* Joining, Serving, Getting out, Starting up, Reinventing Myself, Putting down roots, Taking care of myself, Retiring, Aging, Dying
      
      *Key Moments (commonly referenced):*
      - Taking care of myself: Attending to health needs, Recognizing and addressing mental health needs, Managing primary care and chronic health issues, Seeking support for an acute health event, Maintaining my health, Re-establishing and creating relationships, Balancing finances
      - Putting down roots: Finding a place to live, Starting/growing/maintaining my family, Connecting with and serving my community
      - Retiring: Finding additional sources of income, Managing my declining health, Planning for longer term care
      - Aging: Maintaining social and community connections, Adapting my support network to my new needs
      
      **Format your response as:**
      **Veteran Journey Connection:** Write 1-2 sentences explaining where {{product_area}} fits into the Veteran journey
      
      **Key Moments:** List 3-5 specific moments from the VA Journey stages above that {{product_area}} touches, using this EXACT format:
      - **[Life Stage]:** [Specific moment description]
      - **[Life Stage]:** [Specific moment description]
      
      **Relevant "Moments that Matter" (if applicable):** Reference any specific moments that matter that are particularly relevant to {{product_area}}
      
      CRITICAL: Always bold the life stage names before the colon. Keep concise and practical. Use exact moment terminology. Focus specifically on {{product_area}}.

  # IMPROVED - Clear decision context (replace basic background)
  - task_id: "decision_context"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - NEVER use numbered lists - write as flowing paragraphs
      - Maximum 75 words total
      
      As an experienced VA UX Researcher, transform decision context into clear, structured background section:
      
      Input context: "{{decision_context}}"
      Product area: "{{product_area}}"
      
      Create 2-3 clean sentences (NO numbered lists) using this structure:
      "This research will inform [specific decision about {{product_area}}]. This decision will [specific benefit for Veterans] and [business outcome for VA]. [Brief context if needed]."
      
      Requirements:
      - Mention {{product_area}} by name in the first sentence
      - Be specific about the change being considered
      - Include measurable impact on Veterans
      - Use plain language - avoid jargon
      - Write as flowing paragraphs, not numbered points

  # IMPROVED - Streamlined research goals (replace verbose current version)
  - task_id: "research_goals"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Maximum 2 sentences for Primary Goal
      
      As an experienced VA UX Researcher, create concise, actionable research goals:
      
      Primary goal input: "{{research_goal}}"
      Methodology: {{methodology}}
      Participants: "{{target_participants}}"
      Product area: "{{product_area}}"
      
      Required format:
      **Primary Goal:** [Improved, concise version of input goal - maximum 2 sentences]
      
      **Supporting Goals:**
      [2-3 bullet points that complement primary goal and are achievable through {{methodology}}]
      
      Requirements:
      - Keep goals specific and measurable
      - Directly connect to {{methodology}} capabilities
      - Reference {{product_area}} specifically
      - Support business decision-making about {{product_area}}
      - Avoid repetitive or generic language

  # NEW - Accurate timeline calculation (fix placeholder dates!)
  - task_id: "accurate_timeline"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - ALWAYS calculate actual business day dates starting from {{current_date}}
      
      As an experienced VA UX Researcher, calculate realistic project timeline starting from TODAY ({{current_date}}) for {{timeline_preference}}:
      
      **Base Timeline Templates (AI-accelerated):**
      - Rush: Planning(1d), Collaboration Cycle(2d), Recruiting(3d), Research(3d), Analysis(1d), Reporting(1d) = 11 business days
      - Standard: Planning(2d), Collaboration Cycle(5d), Recruiting(7d), Research(5d), Analysis(1d), Reporting(1d) = 21 business days  
      - Extended: Planning(3d), Collaboration Cycle(10d), Recruiting(14d), Research(7d), Analysis(2d), Reporting(2d) = 38 business days
      
      Consider:
      - Methodology: {{methodology}}
      - Participant count: {{participant_count}}
      - Skip weekends and major holidays
      - Include buffer time for {{methodology}} complexity
      
      Format as clean markdown table:
      | Phase | Duration | Start Date | End Date | Key Deliverables |
      |-------|----------|------------|----------|------------------|
      
      Use actual business day dates starting from {{current_date}}. Include specific milestones and dependencies.

  # NEW - Risk assessment (critical missing piece)
  - task_id: "risk_assessment"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on practical, actionable mitigation strategies
      
      As an experienced VA UX Researcher, identify the top 3-4 risks for this research project:
      
      Project: {{project_title}}
      Methodology: {{methodology}}
      Participants: {{target_participants}} (n={{participant_count}})
      Timeline: {{timeline_preference}}
      Product area: {{product_area}}
      
      Format each risk as:
      **[Risk Type]:** [Specific risk description]
      - **Likelihood:** High/Medium/Low
      - **Mitigation:** [Specific action to prevent or reduce this risk]
      
      Focus on practical risks:
      - Recruitment challenges (finding qualified {{target_participants}})
      - Execution issues ({{methodology}} implementation problems)
      - Timeline risks (delays that affect {{timeline_preference}})
      - Quality concerns (data validity, stakeholder satisfaction)
      - VA-specific risks (Collaboration Cycle delays, compliance issues)
      
      Keep mitigation strategies actionable and specific.

  # IMPROVED - Streamlined success criteria (replace verbose percentages)
  - task_id: "success_criteria"
    prompt: |
      As an experienced VA UX Researcher, create 3-4 clear, measurable success criteria:
      
      Research goal: "{{research_goal}}"
      Timeline: {{timeline_preference}}
      Methodology: {{methodology}}
      Product area: {{product_area}}
      
      Format as specific, business-focused outcomes:
      1. **Decision Support:** [How findings will inform {{product_area}} decisions - include timeline]
      2. **Quality Threshold:** [Standards for research quality and actionability]  
      3. **Timeline Success:** [Delivery expectations and stakeholder review requirements]
      4. **Impact Measurement:** [How success will be measured after research completion]
      
      Requirements:
      - Avoid complex percentages and unrealistic metrics
      - Focus on practical business outcomes
      - Include specific timelines for decision-making
      - Make criteria measurable but achievable

  # IMPROVED - Essential deliverables only (replace lengthy list)
  - task_id: "key_deliverables"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS tie timing to "research completion" not arbitrary day numbers
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Maximum 5 total deliverables
      
      As an experienced VA UX Researcher, list essential deliverables that support {{product_area}} decision-making:
      
      Methodology: {{methodology}}
      Research goal: "{{research_goal}}"
      Timeline: {{timeline_preference}}
      
      Required format:
      **Primary Deliverables:**
      - [Essential deliverable 1] - [delivered within X days of research completion]
      - [Essential deliverable 2] - [delivered within X days of research completion]  
      - [Essential deliverable 3] - [delivered within X days of research completion]
      
      **Supporting Materials:**
      - [Nice-to-have deliverable 1] - [timing]
      - [Nice-to-have deliverable 2] - [timing]
      
      Requirements:
      - Limit to maximum 5 total deliverables
      - Focus on decision-making value, not busy work
      - Include realistic delivery timelines based on AI-accelerated synthesis (1-2 days for analysis, 1 day for reporting)
      - Tie timing to "research completion" not arbitrary day numbers
      - Avoid redundant or overlapping deliverables
      - Prioritize stakeholder needs over comprehensive documentation

  # IMPROVED - Practical methodology (replace verbose implementation)
  - task_id: "methodology_optimization"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Maximum 2 sentences for Methodology Rationale
      
      As an experienced VA UX Researcher, provide concise methodology details and implementation approach:
      
      Selected methodology: {{methodology}}
      Research goals: "{{research_goal}}"
      Participants: {{target_participants}} (n={{participant_count}})
      Product area: {{product_area}}
      
      Required format:
      **Methodology Rationale:** [Why {{methodology}} is optimal for this research - maximum 2 sentences]
      
      **Implementation Approach:**
      - Session format and duration appropriate for {{methodology}}
      - Key activities and data collection techniques
      - Specific protocols for {{product_area}} evaluation
      
      **VA Compliance Notes:**
      - Collaboration Cycle requirements and approval timeline
      - Trauma-informed research considerations
      - Accessibility accommodations for participants
      
      Keep practical and implementation-focused. Avoid theoretical discussions. Focus on what researchers need to execute this plan.

  # KEEP - Demographic targets (enhanced for realism)
  - task_id: "demographic_targets"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - ALWAYS provide specific realistic numbers that add up logically
      
      As an experienced VA UX Researcher, generate realistic demographic targets for {{participant_count}} participants following VA inclusive research standards:
      
      **Format as:**
      
      **Demographic targets (aim for when possible):**
      Based on {{participant_count}} participants, calculate realistic and proportional numbers:
      - Service era diversity: Include participants from recent veterans and different service periods when possible
      - Income diversity: Aim for participants with household income $49,000 or less (target ~30% of sample)
      - Racial/ethnic diversity: Include participants identifying as Black, Hispanic/Latina/Latinx, Asian, or Native American when possible
      - Gender diversity: Include participants identifying as other than male when possible  
      - Age diversity: Include both under 35 and over 55 when possible
      - Education diversity: Include participants without degrees when possible
      - Accessibility needs: Include assistive technology users if relevant to the study
      
      **Secondary targets (nice-to-haves):**
      - Geographic diversity: Rural and urban participants when possible
      - {{product_area}} usage patterns: Mix of high and low usage levels when possible
      - Technology comfort levels: Mix of high and low comfort when possible
      
      **Important:** For {{participant_count}} participants, provide specific realistic numbers (e.g., "2-3 participants" or "at least 1 participant") that add up logically. If the participant count is small (under 8), note that not all demographic targets may be achievable in a single study and prioritize the most relevant categories for {{product_area}} research.

  # NEW - Next steps (critical missing piece for stakeholder value)
  - task_id: "next_steps"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on actionable, specific steps with clear ownership
      
      As an experienced VA UX Researcher, create actionable post-research timeline and decision framework:
      
      Research completion: [Based on {{timeline_preference}} timeline]
      Product area: {{product_area}}
      Research goal: "{{research_goal}}"
      
      Required format:
      **Immediate Actions (Week 1 post-research):**
      - [Specific action with responsible party]
      - [Specific action with timeline]
      
      **Short-term Actions (Weeks 2-4):**
      - [Implementation planning step]
      - [Decision-making milestone]
      - [Resource allocation decision]
      
      **Success Metrics:**
      - [How research impact will be measured]
      - [Follow-up research needs assessment]
      
      Requirements:
      - Focus on turning research insights into {{product_area}} improvements
      - Include realistic timelines for stakeholder decision-making
      - Specify who is responsible for each action
      - Connect actions to business value and veteran impact
      - Make steps concrete and achievable

