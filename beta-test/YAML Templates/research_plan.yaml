# REALISTIC OPTIMIZATION - Compatible with Current Single-Modal UI

id: research_plan
name: run_research_plan
label: 🧭 Research Plan
version: v2.8
description: |
  🧭 **Research Idea → Complete Execution Plan**
  
  Transform your research concept into a comprehensive, VA-compliant plan in minutes. Just provide your basic project details and get back a professional research plan with timeline, recruitment strategy, methodology details, and stakeholder-ready documentation.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-16

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.2
  max_tokens: 4000

input_type: structured
input_processing: direct
precision_mode: detailed

# ENHANCED ERROR HANDLING (without requiring UI changes)
error_handling:
  validation_errors:
    - field: "project_title"
      rules:
        - type: "min_length"
          value: 5
          message: "Project title must be at least 5 characters"
        - type: "max_length"
          value: 80
          message: "Project title cannot exceed 80 characters"
    
    - field: "participant_count"
      rules:
        - type: "numeric_range"
          min: 3
          max: 50
          message: "Participant count must be between 3 and 50"
        - type: "methodology_appropriate"
          message: "Participant count should match methodology (interviews: 5-12, usability: 5-8, surveys: 20+)"
    
    - field: "lead_researcher"
      rules:
        - type: "name_format"
          message: "Please include your full name"

# CURRENT UI-COMPATIBLE INPUT SCHEMA
input_variables:
  - project_title:
      type: "text"
      required: true
      placeholder: "e.g., Debt Letters Usability Study"
      
  - product_area:
      type: "text"
      required: true
      placeholder: "e.g., Debt Letters, Benefits Navigation, Claims Processing"
      
  - decision_context:
      type: "textarea"
      required: true
      placeholder: "e.g., Should we redesign the debt letter format to reduce veteran confusion?"
      
  - research_goal:
      type: "textarea"
      required: true
      placeholder: "e.g., Understand how veterans interpret current debt letters and identify pain points"
      
  - methodology:
      type: "checkboxes"  # Matches current UI
      required: true
      options: ["Usability Testing", "User Interviews", "Survey Research", "Card Sorting", "Concept Testing", "Competitive Analysis"]
      
  - target_participants:
      type: "textarea"
      required: true
      placeholder: "e.g., Veterans who received debt letters in past 6 months"
      
  - participant_count:
      type: "text"
      required: true
      placeholder: "e.g., 5-8 participants"
      
  - timeline_preference:
      type: "radio"  # Matches current UI
      required: true
      options: ["Rush (2-3 weeks total)", "Standard (4-6 weeks total)", "Extended (8+ weeks total)"]
      
  - lead_researcher:
      type: "text"
      required: true
      placeholder: "e.g., Jordan Smith"
      
  - team_office:
      type: "text"
      required: true
      placeholder: "e.g., VA Digital Services, OCTO, 18F"

# ENHANCED AI GENERATION (works with any UI)
ai_generation_tasks:
  - task_id: "methodology_optimization"
    prompt: |
      Analyze and optimize the selected methodologies: {{methodology}}
      
      For the research goal: "{{research_goal}}"
      Target participants: "{{target_participants}}"
      Participant count: "{{participant_count}}"
      
      Provide:
      **Recommended Primary Method:** [Best fit for the research goal]
      **Supporting Methods:** [Complementary approaches]
      **Sequencing:** [Optimal order if multiple methods]
      **Participant Allocation:** [How to distribute participants across methods]
      **Methodology Rationale:** [Why this combination works best]
      
      Consider methodology best practices and ensure participant count aligns with selected methods.

  - task_id: "enhanced_timeline"
    prompt: |
      Create detailed timeline for {{timeline_preference}} research plan.
      
      Project: "{{project_title}}"
      Methodology: {{methodology}}
      Participants: {{participant_count}}
      
      Base timelines with AI acceleration:
      - Rush: Planning(1d), IRB(2d), Recruiting(3d), Research(3d), AI Analysis(0.5d), Reporting(0.5d) = 10 days
      - Standard: Planning(2d), IRB(5d), Recruiting(7d), Research(5d), AI Analysis(1d), Reporting(1d) = 21 days
      - Extended: Planning(3d), IRB(10d), Recruiting(14d), Research(7d), AI Analysis(1d), Reporting(2d) = 37 days
      
      Format as markdown table with:
      | Phase | Duration | Start Date | End Date | Key Deliverables |
      
      Include specific milestones, dependencies, and buffer time for {{methodology}}.

  - task_id: "recruitment_strategy"
    prompt: |
      Design recruitment strategy for: "{{target_participants}}"
      
      Number needed: {{participant_count}}
      Methodology: {{methodology}}
      Timeline: {{timeline_preference}}
      Product area: {{product_area}}
      
      Provide:
      **Recruitment Channels:**
      - VA-specific databases and systems relevant to {{product_area}}
      - Veteran service organizations
      - Digital outreach methods
      
      **Screening Criteria:**
      - Inclusion requirements for {{product_area}} research
      - Experience qualifications
      - Accessibility considerations
      
      **Recruitment Timeline:**
      - Funnel estimates and conversion rates
      - Backup recruitment strategies
      - Scheduling coordination approach
      
      **Incentive Strategy:**
      - Appropriate compensation for {{methodology}}
      - Payment timeline and method

  - task_id: "risk_mitigation"
    prompt: |
      Identify risks and mitigation strategies for this research plan:
      
      Project: {{project_title}}
      Methodology: {{methodology}}
      Timeline: {{timeline_preference}}
      Participants: {{target_participants}} (n={{participant_count}})
      
      **Recruitment Risks:**
      - Participant availability and qualification challenges
      - Timeline risks with recruitment funnel
      
      **Execution Risks:**
      - Methodology-specific implementation challenges
      - Technology dependencies and backup plans
      
      **Quality Risks:**
      - Data validity and reliability concerns
      - Bias and representation issues
      
      **VA-Specific Risks:**
      - IRB approval requirements and timeline
      - Security and compliance considerations
      
      For each risk, provide specific mitigation strategies and contingency plans.

# ENHANCED OUTPUT TEMPLATE
output_template: |
  # 🧭 Research Plan – {{project_title}}

  **📦 Product/Feature Area:** {{product_area}}  
  **👩🏽‍🔬 Lead Researcher:** {{lead_researcher}}  
  **🏛️ Team/Office:** {{team_office}}  
  **🗓️ Created:** {{current_date}}

  ---

  ## 🔎 Background & Decision Context

  {{decision_context}}

  **Research Goal:** {{research_goal}}

  ---

  ## 🛠️ Methodology & Approach

  {{ai_generated.methodology_optimization}}

  ---

  ## 🧲 Recruitment Plan

  **🎯 Target Participants:** {{target_participants}}  
  **🧍 Participant Count:** {{participant_count}}

  {{ai_generated.recruitment_strategy}}

  ---

  ## ⏰ Project Timeline

  **Timeline Preference:** {{timeline_preference}}

  {{ai_generated.enhanced_timeline}}

  ---

  ## ⚠️ Risk Assessment & Mitigation

  {{ai_generated.risk_mitigation}}

  ---

  ## 👥 Team & Stakeholder Coordination

  | Role | Assigned | Responsibilities |
  |------|----------|------------------|
  | Lead Researcher | {{lead_researcher}} | Overall study design, execution, analysis |
  | Research Operations | [TBD] | Recruitment, scheduling, logistics |
  | Note-taker | [TBD] | Session documentation, data collection |
  | Stakeholder Lead | [TBD] | Requirements clarity, findings review |

  ---

  ## 📋 Success Criteria & Deliverables

  **Success Criteria:**
  - Clear insights about {{product_area}} inform decision-making
  - {{participant_count}} qualified participants complete research activities
  - Findings delivered within {{timeline_preference}} timeline
  - Stakeholder alignment on next steps within 1 week

  **Key Deliverables:**
  - Research findings report with actionable recommendations
  - Executive summary for decision-makers
  - Implementation roadmap for {{product_area}} improvements
  - Raw data and supporting evidence

  ---

  *Research plan generated by Qori AI Research Platform v{{version}}*

# ENHANCED DELIVERY (works with current setup)
output_options:
  filename: "research_plan_{{project_title|slugify}}_{{current_date}}.md"
  path: "01-planning/"
  
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add research plan: {{project_title}}"
      
    slack:
      enabled: true
      channel: "#research-planning"
      message: |
        🧭 **Research Plan Generated**
        
        **Project:** {{project_title}}
        **Methodology:** {{methodology}}
        **Timeline:** {{timeline_preference}}
        **Participants:** {{participant_count}}
        
        Plan saved to GitHub and ready for stakeholder review.
      
      # Enhanced with action buttons (compatible with Slack)
      actions:
        - text: "📋 View Full Plan"
          style: "primary"
          url: "{{github_file_url}}"
        - text: "💬 Create Discussion Guide"
          style: "default"
          action: "trigger_discussion_guide"
        - text: "👥 Generate Outreach"
          style: "default"
          action: "trigger_participant_outreach"

# SIMPLE BUT ENHANCED SLACK UI (compatible with current)
slack_ui:
  modal:
    title: "🧭 Create Research Plan"
    submit_label: "Generate Plan"
    close_label: "Cancel"
    blocks:
      - type: "section"
        text: "I'll help you create a comprehensive VA-aligned research plan. Just provide the key details below."
      
      - type: "input"
        label: "Project Title"
        element: "plain_text_input"
        placeholder: "e.g., Debt Letters Usability Study"
        
      - type: "input"  
        label: "Product/Feature Area"
        element: "plain_text_input"
        placeholder: "e.g., Debt Letters, Benefits Navigation, Claims Processing"
        
      - type: "input"
        label: "What decision will this research inform?"
        element: "plain_text_input"
        multiline: true
        placeholder: "e.g., Should we redesign the debt letter format to reduce veteran confusion?"
        
      - type: "input"
        label: "Primary research goal" 
        element: "plain_text_input"
        multiline: true
        placeholder: "e.g., Understand how veterans interpret current debt letters and identify pain points"
        
      - type: "input"
        label: "Methodology (select all that apply)"
        element: "checkboxes"
        options:
          - text: "Usability Testing"
            value: "usability_testing"
          - text: "User Interviews"  
            value: "user_interviews"
          - text: "Survey Research"
            value: "survey_research"
          - text: "Card Sorting"
            value: "card_sorting"
          - text: "Concept Testing"
            value: "concept_testing"
          - text: "Competitive Analysis"
            value: "competitive_analysis"
            
      - type: "input"
        label: "Target participants"
        element: "plain_text_input"
        multiline: true
        placeholder: "e.g., Veterans who received debt letters in past 6 months"
        
      - type: "input"
        label: "Number of participants"
        element: "plain_text_input"
        placeholder: "e.g., 5-8 participants"
        
      - type: "input"
        label: "Timeline preference"
        element: "radio_buttons"
        options:
          - text: "Rush (2-3 weeks total)"
            value: "rush"
          - text: "Standard (4-6 weeks total)"
            value: "standard"
          - text: "Extended (8+ weeks total)"
            value: "extended"
            
      - type: "input"
        label: "Lead researcher"
        element: "plain_text_input"
        placeholder: "e.g., Jordan Smith"
        
      - type: "input"
        label: "Team/Office"
        element: "plain_text_input"
        placeholder: "e.g., VA Digital Services, OCTO, 18F"

# ANALYTICS (backend only, no UI changes needed)
analytics:
  track_events:
    - event: "research_plan_generated"
      properties: [project_title, methodology, timeline_preference, team_office]
    - event: "methodology_selected" 
      properties: [methodology, participant_count]
      
  generate_reports:
    - type: "weekly_usage"
      recipients: ["research-ops@va.gov"]
      metrics: [plans_generated, popular_methodologies, timeline_preferences]

# VALIDATION (backend processing, no UI impact)
validation:
  project_title:
    min_length: 5
    max_length: 80
    error_message: "Project title must be 5-80 characters"
    
  participant_count:
    methodology_check: true
    error_message: "Participant count should align with methodology (5-8 for usability, 20+ for surveys)"
    
  methodology:
    min_selections: 1
    error_message: "Please select at least one methodology"

processing_workflow:
  1. validate_inputs
  2. check_methodology_alignment  
  3. execute_ai_generation_tasks
  4. enhance_content_quality
  5. format_professional_output
  6. save_to_github
  7. send_enhanced_slack_notification
  8. track_analytics

# USAGE INSTRUCTIONS
usage_instructions: |
  Current UI Compatible Enhancements:
  1. Fill out the single modal form (same UI as current)
  2. Enhanced validation catches common errors before processing
  3. AI generates much more comprehensive and professional plans
  4. Enhanced Slack notifications with action buttons
  5. Improved GitHub organization and file naming
  6. Analytics tracking for continuous improvement
  
  No UI changes required - all enhancements work with existing interface!
