id: research_plan
label: 🧭 Research Plan
description: Draft a structured VA-aligned research plan for a civic tech study
input_type: text
input_processing: summarize_if_long

# Enhanced inputs section
inputs:
  project_title: "{{project_title}}"
  product_area: "{{product_area}}"
  decision_context: "{{decision_context}}"
  research_goal: "{{research_goal}}"
  methodology: "{{methodology}}"
  target_participants: "{{target_participants}}"
  participant_count: "{{participant_count}}"
  timeline_preference: "{{timeline_preference}}"
  lead_researcher: "{{lead_researcher}}"
  team_office: "{{team_office}}"
  current_date: "{{current_date}}"
  user_input: "{{input}}"

# Timeline duration mappings
timeline_durations:
  rush:
    planning: 3
    recruiting: 5
    interviews: 5
    synthesis: 3
    reporting: 2
  standard:
    planning: 5
    recruiting: 10
    interviews: 10
    synthesis: 5
    reporting: 5
  extended:
    planning: 10
    recruiting: 21
    interviews: 14
    synthesis: 10
    reporting: 7

prompt: |
  You are drafting a VA-style research plan using the structure below. Fill in each section with clear, plain language. Use a conversational but professional tone at a 10th-grade reading level. Avoid jargon, em-dashes, or business speak.

  Use the provided inputs to generate realistic, specific content for each section:

  **Project Details:**
  - Title: {{project_title}}
  - Product Area: {{product_area}}
  - Team/Office: {{team_office}}
  - Lead Researcher: {{lead_researcher}}
  - Decision Context: {{decision_context}}
  - Research Goal: {{research_goal}}
  - Methodology: {{methodology}}
  - Target Participants: {{target_participants}}
  - Participant Count: {{participant_count}}

  **Timeline Calculation Instructions:**
  - Current Date: {{current_date}}
  - Timeline Preference: {{timeline_preference}}
  
  Based on the timeline preference, calculate specific dates for all timeline tables:
  
  Rush Timeline ({{timeline_preference == "rush" ? "SELECTED" : "not selected"}}):
  - Planning: 3 business days
  - Recruiting: 5 business days  
  - Interviews: 5 business days
  - Synthesis: 3 business days
  - Reporting: 2 business days
  
  Standard Timeline ({{timeline_preference == "standard" ? "SELECTED" : "not selected"}}):
  - Planning: 5 business days
  - Recruiting: 10 business days
  - Interviews: 10 business days
  - Synthesis: 5 business days
  - Reporting: 5 business days
  
  Extended Timeline ({{timeline_preference == "extended" ? "SELECTED" : "not selected"}}):
  - Planning: 10 business days
  - Recruiting: 21 business days
  - Interviews: 14 business days
  - Synthesis: 10 business days
  - Reporting: 7 business days

  **IMPORTANT:** Calculate actual dates starting from {{current_date}} using the selected timeline durations. Skip weekends when calculating business days. Format dates as "Month DD" (e.g., "July 15", "Aug 22").

  For recruitment timeline, suggest realistic milestones based on the recruiting phase duration.

  Additional Context (if provided):
  {{user_input}}

output_format: |
  # 📝 Research Plan – {{project_title}}

  **📦 Product/Feature Area:**  
  {{product_area}}

  **🏛️ Team/Office:**  
  {{team_office}}

  **👩🏽‍🔬 Researchers:**  
  {{lead_researcher}} (Lead)

  **🗓️ Date:**  
  {{current_date}}

  ---

  ## 🔎 Background  
  {{decision_context}}

  [Expand with relevant history and context based on the product area and decision being informed.]

  ## 🎯 Organizational Priorities  
  [Generate content based on {{team_office}} and {{product_area}} - align with VA/OCTO/agency goals relevant to this area]

  ## 🧭 Veteran/User Journey  
  [Describe where {{product_area}} fits in the user's end-to-end experience, considering {{target_participants}}]

  ## 🎓 Research Goals  
  {{research_goal}}

  [Expand with 2-3 additional supporting goals based on the methodology and context]

  ## ❓ Research Questions  
  [Generate 3-4 specific research questions based on {{research_goal}} and {{methodology}}]

  ## 🧪 Hypotheses  
  [Generate 2-3 testable hypotheses based on the research questions and {{methodology}}]

  ## 🛠️ Methodology  
  {{methodology}}

  [Expand with specific details about how each selected methodology will be implemented]

  ## 🧲 Recruitment Plan  

  **🎯 Target Participants:**  
  {{target_participants}}

  **📋 Recruitment Strategy:**  
  [Generate strategy based on {{target_participants}} - suggest appropriate channels like internal panel, screener survey, CivicMind consent form]

  **📅 Recruitment Timeline:**

  [Calculate specific dates based on {{timeline_preference}} recruiting phase duration, starting from planning end date]

  | Date       | Activity              |
  |------------|-----------------------|
  | [Date]     | Screeners sent        |
  | [Date]     | Recruiting begins     |
  | [Date]     | Sessions scheduled    |

  **🧍 Participant Count:**  
  {{participant_count}}

  ## ⏰ Timeline Overview

  [Calculate all dates based on {{timeline_preference}} and {{current_date}}, using business days only]

  | Phase        | Dates        |
  |--------------|--------------|
  | Planning     | [Start] - [End] |
  | Recruiting   | [Start] - [End] |
  | Interviews   | [Start] - [End] |
  | Synthesis    | [Start] - [End] |
  | Reporting    | [Start] - [End] |

  ## 👥 Team Roles

  | Team Member      | Role               |
  |------------------|--------------------|
  | {{lead_researcher}} | Lead Researcher |
  | [To be assigned] | Note-taker         |
  | [To be assigned] | Observer           |

  ## 🧰 Tools & Platforms  
  Qori, Slack, GitHub, Zoom, Google Drive

  [Add specific tools based on {{methodology}} - e.g., if usability testing, mention screen recording tools]

  ## ✅ Success Criteria  
  [Generate 2-3 specific, measurable success criteria based on {{research_goal}} and {{methodology}}]

  ## 📦 Output Artifacts  
  [Generate realistic artifacts based on {{methodology}} - e.g., usability testing report, interview synthesis, recommendations document]

  ## 🏷️ Tags  
  `va`, `ux-research`, `research-plan`, `{{product_area | lower | replace(" ", "-")}}`, `{{methodology | lower | replace(" ", "-")}}`

notify:
  - role: stakeholder
    action: "Please approve the research study"
    slack_tag: "@{{lead_researcher}}"
