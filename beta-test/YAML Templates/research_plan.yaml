# Output configuration (same as current)
output_options:
  filename: "research_plan_{{project_title}}_{{current_date}}.md"
  path: "01-planning/"
  
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add research plan: {{project_title}}"
      
    slack:
      enabled: true
      channel: "#research-planning"
      message: |
        🧭 **Research Plan Generated** 
        **Project:** {{project_title}}
        **Timeline:** {{timeline_preference}}
        **Ready for stakeholder review.**
      
      actions:
        - text: "📋 View Plan"
          style: "primary"
          url: "{{github_file_url}}"
        - text: "💬 Create Discussion Guide"
          style: "default"
          action: "trigger_discussion_guide"

# Same Slack UI as current
slack_ui:
  modal:
    title: "🧭 Create Research Plan"
    submit_label: "Generate Plan"
    close_label: "Cancel"
    # ... existing form structure

# Enhanced processing
processing_workflow:
  1. validate_inputs
  2. execute_audience_detection_task
  3. execute_input_validation_task
  4. check_methodology_alignment
  5. execute_ai_generation_tasks
  6. validate_timeline_accuracy
  7. format_output
  8. save_to_github
  9. send_slack_notification
  10. track_analytics
