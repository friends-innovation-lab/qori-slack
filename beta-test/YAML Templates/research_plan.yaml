# Processing workflow
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. validate_generated_content
  4. populate_template
  5. save_to_outputs

# Output configuration
output_options:
  filename: "research_plan_{{project_title}}_{{current_date}}.md"
  path: "01-planning/"
  
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add research plan: {{project_title}}"
      
    slack:
      enabled: true
      channel: "#research-planning"
      message: |
        🧭 **Research Plan Generated** 
        **Project:** {{project_title}}
        **Timeline:** {{timeline_preference}}
        **Ready for stakeholder review.**
      
      actions:
        - text: "📋 View Plan"
          style: "primary"
          url: "{{github_file_url}}"
        - text: "💬 Create Discussion Guide"
          style: "default"
          action: "trigger_discussion_guide"

# Slack UI configuration
slack_ui:
  modal:
    title: "🧭 Create Research Plan"
    submit_label: "Generate Plan"
    close_label: "Cancel"
