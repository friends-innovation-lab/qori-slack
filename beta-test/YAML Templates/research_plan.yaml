id: research_plan
name: run_research_plan
label: 🧭 Research Plan
version: v2.5
description: |
  Generate comprehensive VA-aligned research plans for civic tech studies. Creates structured research plans with timelines, methodology, recruitment strategy, and success criteria following VA research standards and organizational priorities. Automatically refines informal inputs to create professional, detailed execution plans with Qori AI-powered analysis integration.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-11

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.4
  max_tokens: 4000

input_type: structured
input_processing: direct
precision_mode: detailed

# Input schema for Slack UI
input_variables:
  - project_title        # Project title from UI (REQUIRED)
  - product_area         # Product/Feature area from UI (REQUIRED)
  - decision_context     # What decision will this research inform? (REQUIRED)
  - research_goal        # Primary research goal from UI (REQUIRED)
  - methodology          # Selected methodologies from checkboxes (REQUIRED)
  - target_participants  # Target participants description (REQUIRED)
  - participant_count    # Number of participants (REQUIRED)
  - timeline_preference  # Rush/Standard/Extended from radio buttons (REQUIRED)
  - lead_researcher      # Lead researcher name (REQUIRED)
  - team_office          # Team/Office from UI (REQUIRED)

# AI Generation Tasks - These will be processed sequentially
ai_generation_tasks:
  - task_id: "refined_product_area"
    prompt: |
      Improve and clarify the product area: "{{product_area}}"
      
      Rewrite to be more professional and specific while preserving the original meaning:
      - Use proper VA/government terminology
      - Fix informal language and make more specific
      - Maintain the core product focus and scope
      - Add context about how this fits within VA services
      
      If input is very brief, expand appropriately to provide better context while staying true to the apparent intent.

  - task_id: "refined_decision_context"
    prompt: |
      Improve and clarify the decision context: "{{decision_context}}"
      
      Rewrite to be more professional and specific while preserving the original intent:
      - Use clear business language
      - Make vague decisions more specific and actionable
      - Fix grammatical issues and informal language
      - Maintain the core decision that needs to be made
      - Add context about why this decision matters
      
      If input is very brief, expand appropriately to explain the business context and stakes involved.

  - task_id: "refined_research_goal"
    prompt: |
      Improve and clarify the research goal: "{{research_goal}}"
      
      Rewrite to be more professional and measurable while preserving the original intent:
      - Use proper research terminology
      - Make vague goals more specific and actionable
      - Fix informal language
      - Maintain the core learning objective
      - Ensure the goal is achievable through research
      
      Format as a clear, single-sentence goal that explains what insights the research will provide.

  - task_id: "refined_target_participants"
    prompt: |
      Improve and clarify the target participants: "{{target_participants}}"
      
      Rewrite to be more professional and specific while preserving the original intent:
      - Use proper demographic and psychographic descriptors
      - Make vague participant descriptions more specific
      - Fix informal language
      - Maintain the core participant profile
      - Add relevant context about why these participants matter for the research
      
      If input is very brief, expand appropriately to provide better participant context while staying true to the apparent intent.

  - task_id: "octo_priorities"
    prompt: |
      Identify which OCTO-DE priorities this research supports and explain the connection. Reference the official priorities below:
      
      **OCTO-DE Priorities 2023:**
      1) Improve the Veteran login experience
      2) Solidify the VA.gov platform
      3) Integrate health portal features into VA.gov
      4) Expand the flagship mobile app
      5) Refresh VA.gov homepage and IA
      6) Enhance Veterans' personalized online experience
      7) Fast-track disability claims, starting with PACT Act claims
      8) Grow the OCTO team
      9) Formalize the VA Innovation Unit and innovation process
      10) Drive OIT's Digital Transformation Strategy
      
      **Format your response:**
      
      **Primary OCTO Priority:** Select the most relevant priority from the list above and explain how this research directly supports it
      
      **Additional Priorities (if applicable):** List any other relevant OCTO priorities this research touches
      
      **Project-Specific Priorities:** Add 2-3 additional goals specific to this research that support broader VA objectives (similar to how real VA teams add context-specific priorities)
      
      Use the exact OCTO priority titles from the list above. Keep explanations concise and focused on how the research outcomes will advance these priorities.

  - task_id: "user_journey_context"
    prompt: |
      Map this research to the official VA Journeys of Veterans Map framework using the established stages and moments below.
      
      **VA Journey Map Reference:**
      
      *Life Stages:* Joining, Serving, Getting out, Starting up, Reinventing Myself, Putting down roots, Taking care of myself, Retiring, Aging, Dying
      
      *Key Moments (commonly referenced):*
      - Taking care of myself: Attending to health needs, Recognizing and addressing mental health needs, Managing primary care and chronic health issues, Seeking support for an acute health event, Maintaining my health, Re-establishing and creating relationships, Balancing finances
      - Putting down roots: Finding a place to live, Starting/growing/maintaining my family, Connecting with and serving my community
      - Retiring: Finding additional sources of income, Managing my declining health, Planning for longer term care
      - Aging: Maintaining social and community connections, Adapting my support network to my new needs
      
      *Key "Moments that Matter" (reference if relevant):*
      - Mental health access: "Veterans with mental health needs often have a difficult time accessing providers and feeling safe once in care"
      - Healthcare continuity: "A lack of formal or informal knowledge transfer between providers leads to Veterans experiencing discontinuity"
      - Community connection: "Veterans create a sense of community through bonding over shared experiences"
      - Technology adoption: Veterans' varying comfort levels with digital tools and platforms
      
      **Format your response as:**
      
      **Veteran Journey Connection:** Write 1-2 sentences explaining where this product/research fits into the Veteran journey
      
      **Key Moments:** List 3-5 specific moments from the VA Journey stages above that this research touches, using exact terminology
      
      **Relevant "Moments that Matter" (if applicable):** Reference any specific moments that matter that are particularly relevant to this research
      
      Keep the response concise and practical - similar to how VA research teams write these sections. Use the exact moment terminology provided above.

  - task_id: "additional_research_goals"
    prompt: |
      Generate 2-3 supporting research goals that complement the refined primary goal.
      
      These should:
      - Be specific to the methodology "{{methodology}}"
      - Help inform the refined decision context
      - Support the primary goal without duplicating it
      - Be achievable within the research scope
      
      Format as clear bullet points with proper indentation and descriptive explanations for each goal.

  - task_id: "research_questions"
    prompt: |
      Create 3-4 specific, actionable research questions based on:
      - Refined primary goal
      - Refined decision context
      - Refined target participants
      - Methodology: {{methodology}}
      
      Questions should:
      - Be answerable through the specified methodology
      - Connect directly to the decision that needs to be made
      - Be specific to the participant type and context
      - Focus on insights that will inform action
      
      Format as numbered questions with clear, detailed explanations that guide the research investigation.

  - task_id: "research_hypotheses"
    prompt: |
      Generate 2-3 testable hypotheses based on the research questions and methodology "{{methodology}}".
      
      Each hypothesis should:
      - Make a specific prediction about what the research will find
      - Be testable through the proposed methodology
      - Connect to the refined research goals
      - Use measurable language when possible
      
      Format each hypothesis with:
      1. **Hypothesis statement** (numbered)
      2. Clear explanation of how it can be tested
      3. Connection to research goals
      
      Use proper indentation and bullet formatting for sub-points.

  - task_id: "methodology_details"
    prompt: |
      Provide detailed implementation steps for "{{methodology}}" with proper formatting and structure:
      
      **Session Structure and Duration:**
      - Session format and timing
      - Number and length of interactions
      - Session flow and activities
      
      **Specific Approach and Techniques:**
      - Detailed methodology implementation
      - Data collection methods
      - Specific protocols and procedures
      
      **VA Compliance Considerations:**
      - IRB approval requirements and timeline
      - Informed consent procedures
      - Data privacy and security protocols
      - Veteran-specific ethical considerations
      
      **Trauma-Informed Design Elements:**
      - Approaches to support veteran mental health
      - Accommodation for PTSD and anxiety
      - Safe and supportive research environment
      
      Use clear section headers (bolded), proper bullet point indentation, and specific implementation details.

  - task_id: "recruitment_strategy"
    prompt: |
      Suggest a comprehensive recruitment strategy for the refined target participants with clear formatting:
      
      **Specific Recruitment Channels:**
      - VA-specific recruitment channels and databases
      - Community partnerships and veteran organizations
      - Digital outreach methods appropriate for the target audience
      
      **Partnership Opportunities:**
      - Relevant VA programs and offices
      - External veteran service organizations
      - Community groups and advocacy organizations
      
      **Screening Criteria and Process:**
      - Specific inclusion/exclusion criteria
      - Screening questions and process
      - Qualification verification methods
      
      **Accessibility Considerations:**
      - Accommodations for disabilities
      - Language and communication needs
      - Technology access and support
      
      Use bolded headers, proper indentation, and specific actionable guidance for each section.

  - task_id: "demographic_requirements"
    prompt: |
      Generate specific demographic recruitment requirements based on the participant count "{{participant_count}}" and research context. Follow VA's inclusive recruitment standards:
      
      **Format as:**
      
      **Demographic must-haves:** 
      Create specific quotas based on the total participant count, using this structure:
      - Service era diversity (recent veterans, different service periods)
      - Income diversity (at least 40% with household income $49,000 or less)
      - Racial/ethnic diversity (at least 50% identifying as Black, Hispanic/Latina/Latinx, Asian, or Native American)
      - Cognitive considerations (significant portion with diagnosed cognitive disorders)
      - Gender diversity (at least 35% identifying as other than male)
      - LGBTQ+ representation (at least 25% identifying as LGBTQ+)
      - Education diversity (mix of education levels including those without degrees)
      - Age diversity (both under 35 and over 55 represented)
      - Language diversity (non-native English speakers)
      - Accessibility needs (screen reader users, assistive technology users)
      
      **Secondary criteria (nice-to-haves):**
      - Geographic diversity (rural vs urban)
      - VA service usage patterns
      - Technology comfort levels
      
      Calculate actual numbers based on the participant count and add a note about recruitment challenges. Use the exact format and language style from real VA research plans.

  - task_id: "timeline_calculation"
    prompt: |
      Calculate a detailed timeline starting from the current date using "{{timeline_preference}}" settings:
      
      **Rush Timeline:** Planning(3d), Recruiting(5d), Interviews(5d), AI Synthesis(1d), Reporting(1d)
      **Standard Timeline:** Planning(5d), Recruiting(10d), Interviews(10d), AI Synthesis(2d), Reporting(2d)  
      **Extended Timeline:** Planning(10d), Recruiting(21d), Interviews(14d), AI Synthesis(3d), Reporting(3d)
      
      Create a clean markdown table with:
      - Phase names
      - Duration in business days
      - Actual start and end dates (business days only)
      - Key milestones and deliverables
      
      Note: Synthesis timeline dramatically reduced due to Qori's AI-powered analysis capabilities. Traditional manual coding and thematic analysis (5-10 days) replaced with AI-assisted insights generation.
      
      Calculate from today's date and account for weekends.

  - task_id: "ai_analysis_approach"
    prompt: |
      Describe how Qori will be integrated into the analysis workflow for "{{methodology}}" with clear formatting:
      
      **Real-time Analysis:**
      - Automatic transcription and thematic tagging during interviews
      - Live insight generation and pattern detection
      - Instant quote extraction and sentiment analysis
      
      **Post-Interview Synthesis:**
      - Automated cross-interview pattern recognition
      - AI-generated insight summaries with supporting evidence
      - Rapid identification of conflicting findings and edge cases
      
      **Quality Assurance:**
      - Human researcher review of AI-generated insights
      - Validation of key themes and recommendations
      - Manual refinement of nuanced findings
      
      **Output Generation:**
      - Automated report drafting with human editorial oversight
      - Instant stakeholder-ready summaries and recommendations
      - Real-time Slack updates with key findings
      
      Use bolded section headers and clear bullet point structure with proper indentation.

  - task_id: "tools_platforms"
    prompt: |
      List specific tools and platforms needed for "{{methodology}}" with clear organization and formatting:
      
      **Scheduling and Coordination:**
      - Participant scheduling tools: Calendly, Doodle
      - Calendar management systems: Google Calendar, Microsoft Outlook
      - Communication platforms: Slack, Microsoft Teams
      
      **Research Session Platforms:**
      - Video conferencing tools: Zoom, Microsoft Teams
      - Screen sharing and recording: Zoom, Microsoft Teams
      - Remote testing platforms: UserTesting, Validately
      
      **Recording and Transcription:**
      - Audio/video recording solutions: Zoom, Microsoft Teams
      - AI-powered transcription services: Whisper, Otter.ai
      - Data security and storage: Google Drive, Microsoft OneDrive
      
      **AI-Powered Analysis and Synthesis:**
      - **Primary:** Qori (AI-powered qualitative analysis and insight generation)
      - **Supporting:** Traditional tools for complex analysis (NVivo, Dedoose) if needed
      - **Collaboration:** Miro for visual synthesis, Slack integration for real-time insights
      - **Data visualization:** GitHub markdown files from Qori + Tableau/Power BI for advanced needs
      
      **Documentation and Storage:**
      - **Version control:** GitHub (research artifacts, insights, and documentation)
      - **Secure file storage:** Government-approved cloud storage solutions
      - **Real-time collaboration:** Slack integration for instant insights and team coordination
      
      **VA Compliance Note:** Ensure all selected tools meet VA security and privacy requirements. Qori significantly reduces analysis time from weeks to hours through automated thematic analysis, quote extraction, and insight generation.
      
      Use clear section headers (bolded), proper tool categorization, and specific tool recommendations.

  - task_id: "success_criteria"
    prompt: |
      Define 3-4 measurable success criteria that leverage Qori's AI capabilities and indicate the research has achieved the refined primary goal:
      
      Each criterion should:
      - Be specific and measurable
      - Connect directly to the research goals
      - Leverage Qori's speed and AI capabilities
      - Support rapid decision-making
      
      Include criteria such as:
      - **Speed:** Timeline for initial insights delivery
      - **Depth:** AI theme identification and validation rates
      - **Actionability:** Time to stakeholder action on findings
      - **Integration:** Automated conversion to actionable items
      
      Format as numbered, measurable outcomes with clear metrics and timelines.

  - task_id: "output_artifacts"
    prompt: |
      List realistic deliverables and artifacts based on "{{methodology}}" and the refined research goal, with clear formatting:
      
      **Primary Research Deliverables:**
      - AI-generated interview summaries and thematic analysis
      - Comprehensive research reports with supporting evidence
      - Executive summaries with actionable recommendations
      
      **AI-Generated Supporting Artifacts:**
      - Automated transcripts with thematic tagging
      - Real-time insight updates posted to Slack
      - Quote libraries organized by theme and sentiment
      
      **Stakeholder Communication Materials:**
      - Executive dashboards with key findings
      - Visual summaries and infographics
      - GitHub issues with specific recommendations
      
      **Actionable Recommendations and Next Steps:**
      - Prioritized improvement roadmaps
      - Implementation strategies with supporting evidence
      - Follow-up research recommendations
      
      Provide estimated completion dates based on timeline preference and emphasize how Qori accelerates delivery. Use clear section headers and proper formatting.

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. validate_generated_content
  4. populate_template
  5. save_to_outputs

# Output template with improved formatting
output_template: |
