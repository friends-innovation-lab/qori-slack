# OPTIMIZED RESEARCH PLAN - Targeted Improvements Implementation

id: research_plan
name: run_research_plan
label: 🧭 Research Plan
version: v3.1
description: |
  🧭 **Research Idea → Complete Execution Plan**
  
  Transform your research concept into a comprehensive, VA-compliant plan in minutes. Streamlined for faster stakeholder approval while maintaining professional quality. Optimized to keep your strong VA-specific sections while adding critical planning elements and removing bloat.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-16

# Character encoding fix
encoding: utf-8
output_encoding: utf-8

# LLM Configuration
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.2
  max_tokens: 4000

input_type: structured
input_processing: direct
precision_mode: detailed

# Enhanced Error Handling (backend only)
error_handling:
  validation_errors:
    - field: "project_title"
      rules:
        - type: "min_length"
          value: 5
          message: "Project title must be at least 5 characters"
    - field: "participant_count"
      rules:
        - type: "methodology_appropriate"
          message: "Participant count should match methodology"

# Current UI-Compatible Input Schema
input_variables:
  - project_title:
      type: "text"
      required: true
      placeholder: "e.g., Debt Letters Usability Study"
      
  - product_area:
      type: "text"
      required: true
      placeholder: "e.g., Debt Letters, Benefits Navigation, Claims Processing"
      
  - decision_context:
      type: "textarea"
      required: true
      placeholder: "e.g., Should we redesign the debt letter format to reduce veteran confusion?"
      
  - research_goal:
      type: "textarea"
      required: true
      placeholder: "e.g., Understand how veterans interpret current debt letters and identify pain points"
      
  - methodology:
      type: "checkboxes"
      required: true
      options: ["Usability Testing", "User Interviews", "Survey Research", "Card Sorting", "Concept Testing", "Competitive Analysis"]
      
  - target_participants:
      type: "textarea"
      required: true
      placeholder: "e.g., Veterans who received debt letters in past 6 months"
      
  - participant_count:
      type: "text"
      required: true
      placeholder: "e.g., 5-8 participants"
      
  - timeline_preference:
      type: "radio"
      required: true
      options: ["Rush (2-3 weeks total)", "Standard (4-6 weeks total)", "Extended (8+ weeks total)"]
      
  - lead_researcher:
      type: "text"
      required: true
      placeholder: "e.g., Jordan Smith"
      
  - team_office:
      type: "text"
      required: true
      placeholder: "e.g., VA Digital Services, OCTO, 18F"

# ENHANCED AI GENERATION TASKS
ai_generation_tasks:
  # Clean product area description
  - task_id: "clean_product_area"
    prompt: |
      Create a concise, professional description for "{{product_area}}":
      
      Requirements:
      - 1-2 sentences maximum
      - Explain what it does for Veterans
      - Use clear, direct language
      - No marketing speak
      
      Format: "{{product_area}} - [what it does for Veterans]. [Brief context]."

  # OCTO Priorities with audience detection
  - task_id: "octo_priorities"
    prompt: |
      Select appropriate OCTO-DE priorities based on target participants: "{{target_participants}}"
    
      Available priorities:
      1. Improve the Veteran login experience
      2. Solidify the VA.gov platform  
      3. Integrate health portal features into VA.gov
      4. Expand the flagship mobile app
      5. Refresh VA.gov homepage and IA
      6. Enhance Veterans' personalized online experience
      7. Fast-track disability claims, starting with PACT Act claims
    
      Format your response WITHOUT numbers - use clean names only:
      **Primary OCTO Priority:** [Select priority name only, no numbers]
    
      **Explanation:** [1 sentence connecting {{product_area}} to this priority]
    
      **Additional Priorities:**
      - **[Priority Name Only]:** [Brief explanation]
      - **[Priority Name Only]:** [Brief explanation]
    
      IMPORTANT: Do not include the numbers (1, 2, 3, etc.) in your final output - just use the priority names.

  # User Journey
  - task_id: "user_journey"
    prompt: |
      Map {{product_area}} to the VA Journey of Veterans Map:
      
      **User Journey Connection:** [1 sentence explaining where {{product_area}} fits in veteran journey]
      
      **Key Moments/Phases:**
      - **Taking care of myself:** [relevant moment]
      - **Putting down roots:** [relevant moment]  
      - **Retiring:** [relevant moment]
      
      **Critical Pain Points:** [Any specific pain points for {{product_area}}]

  # Background/Decision Context
  - task_id: "background"
    prompt: |
      Transform this decision context into clear background: "{{decision_context}}"
      
      Create 2-3 sentences that explain:
      - What decision this research will inform about {{product_area}}
      - How this will benefit Veterans
      - The business impact for VA
      
      Use direct, professional language. No jargon.

  # Research Goals
  - task_id: "research_goals"
    prompt: |
      Create clear research goals based on: "{{research_goal}}"
      
      **Primary Goal:** [Improved version of the input goal - 1-2 sentences]
      
      **Supporting Goals:**
      - [Specific goal achievable through {{methodology}}]
      - [Specific goal related to {{product_area}}]
      - [Specific goal that supports decision-making]

  # Success Criteria
  - task_id: "success_criteria"
    prompt: |
      Create practical success criteria for {{timeline_preference}} research on {{product_area}}:
      
      1. **Decision Support:** By [specific timeframe], research findings will inform specific {{product_area}} improvements, addressing identified barriers and providing clear direction for Q1 2026 redesign decisions
      2. **Quality Threshold:** All recommendations will be actionable, evidence-based, and directly tied to observed user behavior with {{product_area}}, meeting stakeholder standards for implementation
      3. **Timeline Success:** Research report and recommendations delivered within {{timeline_preference}} timeline, allowing stakeholders 2 weeks for review and approval before implementation planning begins  
      4. **Impact Measurement:** Establish baseline metrics for {{product_area}} user satisfaction and task completion rates, with clear success indicators for measuring post-implementation improvements

  # Key Deliverables
  - task_id: "deliverables"
    prompt: |
      List essential deliverables for {{methodology}} research:
      
      **Primary Deliverables:**
      - [Essential deliverable 1] - delivered within 2 days of research completion
      - [Essential deliverable 2] - delivered within 3 days of research completion
      
      **Supporting Materials:**
      - [Supporting deliverable] - delivered within 1 day of research completion

  # Methodology Details
  - task_id: "methodology_details"
    prompt: |
      Provide methodology details for {{methodology}}:
      
      **Methodology Rationale:** [Why {{methodology}} is right for this research - 1-2 sentences]
      
      **Implementation Approach:**
      - Session format and duration for {{methodology}}
      - Key activities and data collection
      - Specific protocols for {{product_area}}
      
      **VA Compliance Notes:**
      - Collaboration Cycle requirements
      - Trauma-informed research considerations
      - Accessibility accommodations

  # Demographics
  - task_id: "demographics"
    prompt: |
      Create demographic targets for {{participant_count}} participants:
      
      **Demographic targets:**
      Based on {{participant_count}} participants:
      - Service era: [realistic breakdown]
      - Age: [realistic breakdown]
      - Gender: [realistic breakdown]
      - Accessibility needs: [realistic breakdown]
      
      **Secondary targets:**
      - {{product_area}} usage patterns
      - Technology comfort levels

  # Simplified Timeline
  - task_id: "timeline"
    prompt: |
      Create a timeline table for {{timeline_preference}} research:
      
      Use these phases for {{timeline_preference}}:
      - Planning: 2 days
      - Collaboration Cycle: 5 days
      - Recruiting: 7 days  
      - Research: 5 days
      - Analysis: 1 day
      - Reporting: 1 day
      
      Format as:
      | Phase | Duration | Key Deliverables |
      |-------|----------|------------------|
      | Planning | 2 days | Project Brief, Research Plan |
      | Collaboration Cycle | 5 days | Stakeholder Alignment |
      | Recruiting | 7 days | Participant Selection |
      | Research | 5 days | Data Collection |
      | Analysis | 1 day | Insights Synthesis |
      | Reporting | 1 day | Final Report |
      
      Note: Timeline begins after stakeholder approval

  # Risk Assessment
  - task_id: "risks"
    prompt: |
      Identify top 4 risks for this research:
      
      **Recruitment Challenges:** [Risk related to finding {{target_participants}}]
      - **Likelihood:** High/Medium/Low
      - **Mitigation:** [Specific action]
      
      **Execution Issues:** [Risk related to {{methodology}}]
      - **Likelihood:** High/Medium/Low  
      - **Mitigation:** [Specific action]
      
      **Timeline Risks:** [Risk related to {{timeline_preference}}]
      - **Likelihood:** High/Medium/Low
      - **Mitigation:** [Specific action]
      
      **Quality Concerns:** [Risk related to research quality]
      - **Likelihood:** High/Medium/Low
      - **Mitigation:** [Specific action]

  # Next Steps
  - task_id: "next_steps"
    prompt: |
      Create actionable next steps for post-research:
      
      **Immediate Actions (Week 1 post-research):**
      - [Specific action with owner]
      - [Specific action with timeline]
      
      **Short-term Actions (Weeks 2-4):**
      - [Implementation step]
      - [Decision milestone]
      
      **Success Metrics:**
      - [How impact will be measured]
      - [Follow-up assessment plan]

