# Output configuration
output_options:
  # File settings
  filename: "research_plan_{{project_title}}_{{current_date}}.md"
  path: "01-planning/"
  
  # Delivery methods (multiple can be enabled)
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add research plan for {{project_title}}"
      
    slack:
      enabled: true
      channel: "#research-planning"
      notify_user: "{{lead_researcher}}"
      message: "🧭 Research plan for {{project_title}} has been generated and saved to GitHub."
      include_preview: false  # Set to true to include brief summary in Slack
      actions:
        - text: "🧭 View Plan"
          url: "{{github_file_link}}"
        - text: "💬 Create Discussion Guide"
          action: "run_discussion_guide"
    
    email:
      enabled: false
      # Future: email delivery options
      
    teams:
      enabled: false
      # Future: Teams delivery options

output_use: |
  CivicMind Research Plan generator creates comprehensive VA-aligned research execution plans with integrated AI-powered analysis. Automatically refines informal or unclear inputs to create professional, detailed research plans with accelerated timelines through Qori's AI capabilities. Transforms stakeholder input into actionable research roadmaps with built-in synthesis automation.

output_notes: |
  Input refinement: AI automatically improves clarity and professionalism of research inputs while preserving original intent.
  Content quality: Transforms informal inputs into detailed, professional research execution plans with enhanced formatting.
  VA compliance: All generated content follows VA research standards and organizational priorities.
  AI integration: Leverages Qori's capabilities to dramatically reduce synthesis time and improve insight quality.
  Format consistency: Maintains professional formatting with improved readability and clear structure.

execution_mode: "generate_full_content"
replace_placeholders: true
