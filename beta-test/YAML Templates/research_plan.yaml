id: research_plan
name: run_research_plan
label: 🧭 Research Plan
version: v2.1
description: |
  Generate comprehensive VA-aligned research plans for civic tech studies. Creates structured research plans with timelines, methodology, recruitment strategy, and success criteria following VA research standards and organizational priorities.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-07

# LangChain.js Router Configuration
router_config:
  primary_worker: "llm_worker"
  model: "gpt-3.5-turbo"
  temperature: 0.4
  max_tokens: 4000

input_type: structured
input_processing: direct
precision_mode: detailed

# Input schema for Slack UI
input_variables:
  - project_title        # Project title from UI (REQUIRED)
  - product_area         # Product/Feature area from UI (REQUIRED)
  - decision_context     # What decision will this research inform? (REQUIRED)
  - research_goal        # Primary research goal from UI (REQUIRED)
  - methodology          # Selected methodologies from checkboxes (REQUIRED)
  - target_participants  # Target participants description (REQUIRED)
  - participant_count    # Number of participants (REQUIRED)
  - timeline_preference  # Rush/Standard/Extended from radio buttons (REQUIRED)
  - lead_researcher      # Lead researcher name (REQUIRED)
  - team_office          # Team/Office from UI (REQUIRED)

# AI Generation Tasks - These will be processed by LLM Worker
ai_generation_tasks:
  - task_id: "organizational_priorities"
    worker: "llm_worker"
    prompt: |
      Based on the product area "{{product_area}}" and team office "{{team_office}}", generate 2-3 specific VA/OCTO organizational priorities that this research supports. Focus on real VA priorities like equity, digital modernization, and veteran-centric design.
    
  - task_id: "user_journey_context"
    worker: "llm_worker"
    prompt: |
      Describe how "{{product_area}}" fits into the end-to-end user experience for "{{target_participants}}" within the VA ecosystem. Include touchpoints, related services, and how this area connects to their broader VA journey.
    
  - task_id: "additional_research_goals"
    worker: "llm_worker"
    prompt: |
      Generate 2-3 supporting research goals that complement the primary goal: "{{research_goal}}". These should be specific to the methodology "{{methodology}}" and help inform the decision context.
    
  - task_id: "research_questions"
    worker: "llm_worker"
    prompt: |
      Create 3-4 specific, actionable research questions based on:
      - Primary goal: {{research_goal}}
      - Decision context: {{decision_context}}
      - Target participants: {{target_participants}}
      - Methodology: {{methodology}}
    
  - task_id: "research_hypotheses"
    worker: "llm_worker"
    prompt: |
      Generate 2-3 testable hypotheses based on the research questions and methodology "{{methodology}}". Make them specific and measurable.
    
  - task_id: "methodology_details"
    worker: "llm_worker"
    prompt: |
      Provide detailed implementation steps for "{{methodology}}" including:
      - Session structure and duration
      - Specific approach and techniques
      - VA compliance considerations
      - Trauma-informed design elements
    
  - task_id: "recruitment_strategy"
    worker: "llm_worker"
    prompt: |
      Suggest a comprehensive recruitment strategy for "{{target_participants}}" that includes:
      - Specific recruitment channels appropriate for VA research
      - Partnership opportunities with VA programs
      - Screening criteria and process
      - Accessibility considerations
    
  - task_id: "timeline_calculation"
    worker: "llm_worker"
    prompt: |
      Calculate a detailed timeline starting from the current date using "{{timeline_preference}}" settings:
      - Rush: Planning(3d), Recruiting(5d), Interviews(5d), Synthesis(3d), Reporting(2d)
      - Standard: Planning(5d), Recruiting(10d), Interviews(10d), Synthesis(5d), Reporting(5d)
      - Extended: Planning(10d), Recruiting(21d), Interviews(14d), Synthesis(10d), Reporting(7d)
      
      Provide actual calendar dates (business days only) in a markdown table format.
    
  - task_id: "tools_platforms"
    worker: "llm_worker"
    prompt: |
      List specific tools and platforms needed for "{{methodology}}" including:
      - Scheduling and coordination tools
      - Research session platforms
      - Recording and transcription
      - Analysis and synthesis tools
      - Documentation and storage
    
  - task_id: "success_criteria"
    worker: "llm_worker"
    prompt: |
      Define 3-4 measurable success criteria that indicate the research has achieved "{{research_goal}}" and will inform "{{decision_context}}".
    
  - task_id: "output_artifacts"
    worker: "llm_worker"
    prompt: |
      List realistic deliverables and artifacts based on "{{methodology}}" and "{{research_goal}}" with estimated completion dates.

# Processing workflow for LangChain.js Router
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. populate_template
  4. save_to_outputs

# Output template with AI generation placeholders
output_template: |
  # 🧭 Research Plan – {{project_title}}

  **📦 Product/Feature Area:** {{product_area}}  
  **🏛️ Team/Office:** {{team_office}}  
  **👩🏽‍🔬 Lead Researcher:** {{lead_researcher}}  
  **🗓️ Date:** {{current_date}}

  ---

  ## 🔎 Background  
  {{decision_context}}

  ## 🎯 Organizational Priorities  
  {{ai_generated.organizational_priorities}}

  ## 🧭 Veteran/User Journey  
  {{ai_generated.user_journey_context}}

  ## 🎓 Research Goals  
  **Primary Goal:** {{research_goal}}

  {{ai_generated.additional_research_goals}}

  ## ❓ Research Questions  
  {{ai_generated.research_questions}}

  ## 🧪 Hypotheses  
  {{ai_generated.research_hypotheses}}

  ## 🛠️ Methodology  
  **Approach:** {{methodology}}

  {{ai_generated.methodology_details}}

  ## 🧲 Recruitment Plan  

  **🎯 Target Participants:** {{target_participants}}

  **📋 Recruitment Strategy:** {{ai_generated.recruitment_strategy}}

  **📅 Recruitment Timeline:**
  {{ai_generated.timeline_calculation}}

  **🧍 Participant Count:** {{participant_count}}

  ## ⏰ Timeline Overview
  {{ai_generated.timeline_calculation}}

  ## 👥 Team Roles
  | Team Member      | Role               |
  |------------------|--------------------|
  | {{lead_researcher}} | Lead Researcher |
  | [To be assigned] | Note-taker         |
  | [To be assigned] | Observer           |

  ## 🧰 Tools & Platforms  
  {{ai_generated.tools_platforms}}

  ## ✅ Success Criteria  
  {{ai_generated.success_criteria}}

  ## 📦 Output Artifacts  
  {{ai_generated.output_artifacts}}

# Output configuration
output_options:
  # File settings
  filename: "research_plan_{{project_title}}_{{current_date}}.md"
  path: "01-planning/"
  
  # Delivery methods (multiple can be enabled)
  delivery:
    github:
      enabled: true
      repo: "your-research-repo"
      commit_message: "Add research plan for {{project_title}}"
      
    slack:
      enabled: true
      channel: "#research-planning"
      notify_user: "{{lead_researcher}}"
      message: "🧭 Research plan for {{project_title}} has been generated and saved to GitHub."
      include_preview: false  # Set to true to include brief summary in Slack
      actions:
        - text: "🧭 View Plan"
          url: "{{github_file_link}}"
        - text: "📋 Create Research Script"
          action: "run_research_script"
    
    email:
      enabled: false
      # Future: email delivery options
      
    teams:
      enabled: false
      # Future: Teams delivery options

execution_mode: "generate_full_content"
replace_placeholders: true
