  **📦 Product/Feature Area:** {{ai_generated.refined_product_area}}  
  **🏛️ Team/Office:** {{team_office}}  
  **👩🏽‍🔬 Lead Researcher:** {{lead_researcher}}  
  **🗓️ Date:** {{current_date}}

  ---

  ## 🔎 Background  
  {{ai_generated.refined_decision_context}}

  ---

