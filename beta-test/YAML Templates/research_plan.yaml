id: research_plan
name: run_research_plan
label: Research Plan
version: v4.2
description: |
  **Research Idea → Complete Execution Plan**
  
  Transform your research concept into a comprehensive, VA-compliant plan in minutes. Streamlined for faster stakeholder approval while maintaining professional quality.

author: Qori R&D
created: 2025-06-26
last_updated: 2025-11-25

# Character encoding fix
encoding: utf-8
output_encoding: utf-8

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.2
  max_tokens: 4000

input_type: structured
input_processing: direct
precision_mode: detailed

# Enhanced Error Handling (backend only)
error_handling:
  validation_errors:
    - field: "project_title"
      rules:
        - type: "min_length"
          value: 5
          message: "Project title must be at least 5 characters"
    - field: "participant_count"
      rules:
        - type: "methodology_appropriate"
          message: "Participant count should match methodology"

# Current UI-Compatible Input Schema
input_variables:
  - project_title:
      type: "text"
      required: true
      placeholder: "e.g., Debt Letters Usability Study"
      
  - product_area:
      type: "text"
      required: true
      placeholder: "e.g., Debt Letters, Benefits Navigation, Claims Processing"
      
  - decision_context:
      type: "textarea"
      required: true
      placeholder: "e.g., Should we redesign the debt letter format to reduce veteran confusion?"
      
  - research_goal:
      type: "textarea"
      required: true
      placeholder: "e.g., Understand how veterans interpret current debt letters and identify pain points"
      
  - methodology:
      type: "checkboxes"
      required: true
      options: ["Usability Testing", "User Interviews", "Survey Research", "Card Sorting", "Concept Testing", "Competitive Analysis"]
      
  - target_participants:
      type: "textarea"
      required: true
      placeholder: "e.g., Veterans who received debt letters in past 6 months"
      
  - participant_count:
      type: "text"
      required: true
      placeholder: "e.g., 5-8 participants"
      
  - timeline_preference:
      type: "radio"
      required: true
      options: ["Rush (2-3 weeks total)", "Standard (4-6 weeks total)", "Extended (8+ weeks total)"]
      
  - lead_researcher:
      type: "text"
      required: true
      placeholder: "e.g., Jordan Smith"
      
  - team_office:
      type: "text"
      required: true
      placeholder: "e.g., VA Digital Services, OCTO, 18F"

# ENHANCED AI GENERATION TASKS
ai_generation_tasks:
  # Clean product area name - SHORT NAME ONLY
  - task_id: "clean_product_area"
    prompt: |
      Extract ONLY the core product name from this input: {{product_area}}
      
      Rules:
      - Return ONLY the short product name (2-4 words maximum)
      - Do not include descriptions, features, or platform mentions
      - Do not include phrases like "and supporting..." 
      - Do not wrap your answer in quotes
      
      Examples:
      - Input: "VA Mobile App navigation and search" → Output: VA Mobile App
      - Input: "VA Video Connect and supporting telehealth touchpoints across mobile and desktop" → Output: VA Video Connect
      - Input: "Debt Letters redesign project" → Output: Debt Letters
      
      Return ONLY the short name, nothing else. No quotes.

  # Product description - concise
  - task_id: "product_description"
    prompt: |
      Create a concise, professional description for {{product_area}}:
      
      Requirements:
      - 1-2 sentences maximum
      - Explain what it does for Veterans
      - Use clear, direct language
      - No marketing speak
      - Do not wrap text in quotes
      
      Format: [Short Product Name] — [what it does for Veterans in one sentence].

  # OCTO Priorities
  - task_id: "octo_priorities"
    prompt: |
      Select appropriate OCTO-DE priorities for {{product_area}} based on target participants: {{target_participants}}
      
      Available priorities:
      1. Improve the Veteran login experience
      2. Solidify the VA.gov platform  
      3. Integrate health portal features into VA.gov
      4. Expand the flagship mobile app
      5. Refresh VA.gov homepage and IA
      6. Enhance Veterans' personalized online experience
      7. Fast-track disability claims, starting with PACT Act claims
      
      Format your response WITHOUT numbers - use clean names only:
      **Primary OCTO Priority:** [Select priority name only, no numbers]
      
      **Explanation:** [1 sentence connecting {{product_area}} to this priority]
      
      **Additional Priorities:**
      - **[Priority Name Only]:** [Brief explanation]
      - **[Priority Name Only]:** [Brief explanation]
      
      IMPORTANT: Do not include the numbers (1, 2, 3, etc.) in your output. Do not use quotes around text.

  # User Journey
  - task_id: "user_journey"
    prompt: |
      Map {{product_area}} to the VA Journey of Veterans Map.
      
      Provide your response in this format (do not use quotes around any text):
      
      **User Journey Connection:** [1 sentence explaining where {{product_area}} fits in veteran journey]
      
      **Key Moments/Phases:**
      - **Taking care of myself:** [How {{product_area}} helps veterans manage their health and wellbeing]
      - **Putting down roots:** [How {{product_area}} supports veterans settling into civilian life]
      - **Retiring:** [How {{product_area}} assists veterans in retirement]
      
      **Critical Pain Points:** [2-3 specific pain points for {{product_area}}]
      
      Write naturally without wrapping any content in quotation marks.

  # Background/Decision Context
  - task_id: "background"
    prompt: |
      Transform this decision context into clear background: {{decision_context}}
      
      Create 2-3 sentences that explain:
      - What decision this research will inform about {{product_area}}
      - How this will benefit Veterans
      - The business impact for VA
      
      Use direct, professional language. No jargon. Focus on specific outcomes.
      Do not wrap text in quotes.

  # Research Goals
  - task_id: "research_goals"
    prompt: |
      Create clear research goals based on: {{research_goal}}
      
      **Primary Goal:** [Improved version of the input goal - 1-2 sentences, specific and measurable, referencing {{product_area}}]
      
      **Supporting Goals:**
      - [Specific goal achievable through {{methodology}} that provides actionable insights for {{product_area}}]
      - [Specific goal related to {{product_area}} that addresses user needs]
      - [Specific goal that supports decision-making with concrete outcomes for {{product_area}}]
      
      IMPORTANT: 
      - Use the product name "{{product_area}}" directly in your response
      - Do not use empty quotes or placeholder text
      - Do not wrap any text in quotation marks
      - Make each goal specific to the product and methodology

  # Success Criteria - USER-STUDY-CENTERED
  - task_id: "success_criteria"
    prompt: |
      Generate exactly these 4 user-study-centered success criteria numbered 1-4.
      
      Create success criteria for {{product_area}} research with {{participant_count}} participants using {{methodology}}:
      
      1. **Participant Completion:** Minimum 90% of recruited participants ({{participant_count}}) complete full research sessions, ensuring adequate data for meaningful analysis
      2. **Data Quality:** Achieve thematic saturation or pattern consistency by the final participant session, with clear triangulation across multiple data points to validate findings
      3. **Timeline Adherence:** All research sessions completed and initial analysis documented within the {{timeline_preference}} timeframe, with final report delivered within 5 business days of last session
      4. **Stakeholder Alignment:** Research findings reviewed by key stakeholders within 3 business days of report delivery, with documented agreement on priority recommendations for {{product_area}}
      
      Use exactly this format and numbering.

  # Key Deliverables - CONSISTENT FORMATTING
  - task_id: "deliverables"
    prompt: |
      List essential deliverables for {{methodology}} research on {{product_area}}.
      
      Use this EXACT format with bold labels and numbered list:
      
      **Primary Deliverables:**
      1. **Usability Report:** Key findings, pain points, and prioritized recommendations for {{product_area}} — delivered within 2 days of research completion
      2. **Decision Matrix:** Prioritized enhancements based on user feedback and {{methodology}} results — delivered within 3 days of research completion
      3. **Executive Summary:** Key insights and recommendations for stakeholder decision-making — delivered within 3 days of research completion
      
      **Supporting Materials:**
      4. **Design Recommendations:** Wireframes or mockups illustrating proposed changes for {{product_area}} — delivered within 1 day of research completion
      5. **Validation Plan:** Methodology and criteria for testing proposed design changes — delivered within 2 days of research completion
      
      IMPORTANT FORMATTING RULES:
      - Use numbered list (1-5) for ALL items
      - Bold the deliverable name before the colon
      - Use em dash (—) before delivery timeline
      - Reference {{product_area}} where appropriate

  # Methodology Details
  - task_id: "methodology_details"
    prompt: |
      Provide methodology details for {{methodology}} research on {{product_area}}:
      
      **Methodology Rationale:** [Why {{methodology}} is specifically right for {{product_area}} research - 1-2 sentences]
      
      **Implementation Approach:**
      - **Session Format:** [Format and duration appropriate for {{methodology}}]
      - **Key Activities:** [Data collection techniques specific to {{product_area}}]
      - **Evaluation Protocol:** [Specific protocols for evaluating {{product_area}} user experience]
      
      **VA Compliance Notes:**
      - **Collaboration Cycle:** [Requirements and timeline]
      - **Trauma-Informed Approach:** [Considerations for veteran participants]
      - **Accessibility:** [Accommodations for diverse participant needs]
      
      Be specific about why this methodology answers the research questions. Do not use quotes around text.

  # Demographics
  - task_id: "demographics"
    prompt: |
      Create demographic targets for {{participant_count}} participants researching {{product_area}}:
      
      **Demographic Targets:**
      Based on {{participant_count}} participants:
      - **Service Era:** [realistic breakdown - Vietnam, Gulf War, Post-9/11 - that adds up to total]
      - **Age:** [realistic breakdown that adds up to total]
      - **Gender:** [realistic breakdown that adds up to total]
      - **Accessibility Needs:** [realistic breakdown for inclusive research]
      
      **Secondary Targets:**
      - **{{product_area}} Usage Patterns:** [frequency and experience levels]
      - **Technology Comfort Levels:** [range of digital literacy]
      
      Ensure all numbers add up logically to {{participant_count}}.

  # Timeline - REVERTED TO ORIGINAL WORKING VERSION
  - task_id: "timeline"
    prompt: |
      Create a detailed timeline table for {{timeline_preference}} research.

      Use **today's date (in US timezone)** as the starting point (timeline begins after stakeholder approval).  
      Timezone: US Eastern Time (ET). Format: ISO (YYYY-MM-DD).

      Rules:
      - Planning starts today.
      - Each next phase starts the day after the previous phase ends.
      - End Date = Start Date + (Duration - 1) days.
      - Count all calendar days (no skipping weekends/holidays).
      - Show actual computed dates (not relative placeholders).

      Phases and durations (calendar days):
      - Planning: 2 days
      - Collaboration Cycle: 5 days
      - Recruiting: 7 days
      - Research: 5 days
      - Analysis: 1 day
      - Reporting: 1 day

      Output as a markdown table:

      | Phase | Duration | Start Date | End Date | Key Deliverables |
      |-------|----------|------------|----------|------------------|
      | Planning | 2 days | (today) | (today + 1 day) | Project Brief, Research Plan |
      | Collaboration Cycle | 5 days | (day after Planning end) | (start + 4 days) | Stakeholder Alignment |
      | Recruiting | 7 days | (day after Collaboration end) | (start + 6 days) | Participant Selection |
      | Research | 5 days | (day after Recruiting end) | (start + 4 days) | Data Collection |
      | Analysis | 1 day | (day after Research end) | (same day) | Insights Synthesis |
      | Reporting | 1 day | (day after Analysis end) | (same day) | Final Report |

  # Risk Assessment
  - task_id: "risks"
    prompt: |
      Identify top 4 risks for {{methodology}} research on {{product_area}}:
      
      **Recruitment Challenges:** [Risk related to finding {{target_participants}} for {{product_area}} research]
      - **Likelihood:** High/Medium/Low
      - **Mitigation:** [Specific action to address recruitment issues]
      
      **Execution Issues:** [Risk related to {{methodology}} implementation for {{product_area}}]
      - **Likelihood:** High/Medium/Low  
      - **Mitigation:** [Specific action to ensure quality execution]
      
      **Timeline Risks:** [Risk related to {{timeline_preference}} affecting {{product_area}} decisions]
      - **Likelihood:** High/Medium/Low
      - **Mitigation:** [Specific action to stay on schedule]
      
      **Quality Concerns:** [Risk related to data validity for {{product_area}} recommendations]
      - **Likelihood:** High/Medium/Low
      - **Mitigation:** [Specific action to ensure research quality]
      
      Make each risk and mitigation specific to this research project.

  # Next Steps
  - task_id: "next_steps"
    prompt: |
      Create actionable next steps for {{product_area}} research implementation:
      
      Format as:
      
      ```diff
      + IMMEDIATE (Week 1 post-research)
      ```
      - [Specific action with owner and timeline for {{product_area}} decisions]
      - [Specific action for stakeholder engagement with timeline]
      
      ```diff
      ! SHORT-TERM (Weeks 2-4)
      ```
      - [Implementation planning step for {{product_area}} improvements]
      - [Decision milestone for {{product_area}} changes]
      
      ```diff
      - LONGER-TERM (Month 2+)
      ```
      **Success Metrics:**
      - [How {{product_area}} improvements will be measured]
      - [Follow-up assessment plan for {{product_area}} success]
      
      Include the exact color-coded diff blocks in your response.

  # Detailed Research Protocols
  - task_id: "detailed_protocols"
    prompt: |
      Generate specific research protocols for {{methodology}} methodology studying {{product_area}}.
      
      IMPORTANT: Only include protocols relevant to {{methodology}}. Make all examples specific to {{product_area}} and telehealth/VA context - do NOT use generic shopping cart or e-commerce examples.
      
      Based on {{methodology}}, provide detailed protocols:
      
      **For Usability Testing:**
      - **Task Scenarios:** [3-4 specific tasks participants will complete with {{product_area}} - must be relevant to telehealth/VA services]
      - **Think-Aloud Protocol:** [Instructions for facilitating concurrent verbalization]
      - **Data Collection:** [Screen recording setup, observation notes template, timing protocols]
      - **Post-Session Interviews:** [Key follow-up questions about {{product_area}} experience]
      
      **For User Interviews:**
      - **Interview Guide Structure:** [Opening, main topics, probing questions about {{product_area}}]
      - **Question Types:** [Behavioral, attitudinal, and contextual questions]
      - **Recording Protocols:** [Audio/video setup and consent procedures]
      - **Analysis Approach:** [Thematic analysis, affinity mapping, coding framework]
      
      **For Card Sorting:**
      - **Card Preparation:** [How to create cards from {{product_area}} content/features]
      - **Sorting Methodology:** [Open vs. closed sort, hybrid approaches]
      - **Analysis Procedures:** [Statistical measures, dendrograms, similarity matrices]
      - **Results Interpretation:** [How to translate findings into {{product_area}} recommendations]
      
      **For Survey Research:**
      - **Question Design:** [Scale types, validation approaches for {{product_area}} metrics]
      - **Sampling Strategy:** [Target demographics, sample size calculations]
      - **Distribution Methods:** [Platform selection, timing, reminder protocols]
      - **Statistical Analysis:** [Descriptive statistics, significance testing, reporting standards]
      
      **For Concept Testing:**
      - **Concept Presentation:** [Prototype fidelity, scenario setup for {{product_area}}]
      - **Testing Protocol:** [Task completion, feedback collection, preference ranking]
      - **Measurement Criteria:** [Usability metrics, comprehension testing, appeal assessment]
      - **Iteration Framework:** [How to incorporate feedback into {{product_area}} design]
      
      **For Competitive Analysis:**
      - **Evaluation Framework:** [Heuristics, feature comparison matrices for {{product_area}}]
      - **Documentation Standards:** [Screenshots, interaction flows, usability notes]
      - **Analysis Criteria:** [Strengths/weaknesses identification, best practice extraction]
      - **Synthesis Approach:** [How to translate competitive insights into {{product_area}} recommendations]

