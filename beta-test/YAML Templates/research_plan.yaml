id: research_plan
name: run_research_plan
label: 🧭 Research Plan
version: v2.6
description: |
  🧭 **Research Idea → Complete Execution Plan**
  
  Transform your research concept into a comprehensive, VA-compliant plan in minutes. Just provide your basic project details and get back a professional research plan with timeline, recruitment strategy, methodology details, and stakeholder-ready documentation.
  
  Perfect for getting leadership buy-in and ensuring your research meets VA standards.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-14

# LLM Configuration - Updated for better consistency
llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.2  # Reduced for more focused, consistent output
  max_tokens: 4000

input_type: structured
input_processing: direct
precision_mode: detailed

# Input schema for Slack UI
input_variables:
  - project_title        # Project title from UI (REQUIRED)
  - product_area         # Product/Feature area from UI (REQUIRED)
  - decision_context     # What decision will this research inform? (REQUIRED)
  - research_goal        # Primary research goal from UI (REQUIRED)
  - methodology          # Selected methodologies from checkboxes (REQUIRED)
  - target_participants  # Target participants description (REQUIRED)
  - participant_count    # Number of participants (REQUIRED)
  - timeline_preference  # Rush/Standard/Extended from radio buttons (REQUIRED)
  - lead_researcher      # Lead researcher name (REQUIRED)
  - team_office          # Team/Office from UI (REQUIRED)

# AI Generation Tasks - These will be processed sequentially
ai_generation_tasks:
  - task_id: "refined_product_area"
    prompt: |
      Improve and clarify the product area: "{{product_area}}"
      
      Rewrite to be more professional and specific while preserving the original meaning:
      - Use proper VA/government terminology
      - Fix informal language and make more specific
      - Maintain the core product focus and scope
      - Add context about how this fits within VA services
      
      If input is very brief, expand appropriately to provide better context while staying true to the apparent intent.

  - task_id: "refined_decision_context"
    prompt: |
      Create a focused background section for {{product_area}} research.
      
      Input context: "{{decision_context}}"
      
      Write exactly 2-3 sentences:
      1. **Decision statement:** "This research will inform whether [specific change to {{product_area}}]."
      2. **Impact statement:** "This decision will [specific benefit for Veterans] and [business outcome for VA]."
      3. **Context:** Brief explanation of current situation (optional if needed)
      
      Requirements:
      - Mention {{product_area}} by name in the first sentence
      - Be specific about the change being considered
      - Include measurable impact on Veterans
      - Avoid generic business language
      - Maximum 75 words total

  - task_id: "refined_research_goal"
    prompt: |
      Improve and clarify the research goal: "{{research_goal}}"
      
      Rewrite to be more professional and measurable while preserving the original intent:
      - Use proper research terminology
      - Make vague goals more specific and actionable
      - Fix informal language
      - Maintain the core learning objective about {{product_area}}
      - Ensure the goal is achievable through research
      
      Format as a clear, single-sentence goal that explains what insights the research will provide about {{product_area}}.

  - task_id: "refined_target_participants"
    prompt: |
      Improve and clarify the target participants: "{{target_participants}}"
      
      Rewrite to be more professional and specific while preserving the original intent:
      - Use proper demographic and psychographic descriptors
      - Make vague participant descriptions more specific
      - Fix informal language
      - Maintain the core participant profile
      - Add relevant context about why these participants matter for {{product_area}} research
      
      If input is very brief, expand appropriately to provide better participant context while staying true to the apparent intent.

  - task_id: "octo_priorities"
    prompt: |
      Map {{product_area}} research to OCTO-DE priorities. Reference the official priorities below:
      
      **OCTO-DE Priorities 2023:**
      1) Improve the Veteran login experience
      2) Solidify the VA.gov platform
      3) Integrate health portal features into VA.gov
      4) Expand the flagship mobile app
      5) Refresh VA.gov homepage and IA
      6) Enhance Veterans' personalized online experience
      7) Fast-track disability claims, starting with PACT Act claims
      8) Grow the OCTO team
      9) Formalize the VA Innovation Unit and innovation process
      10) Drive OIT's Digital Transformation Strategy
      
      Required format:
      **Primary OCTO Priority:** [Exact title from list above]
      **Explanation:** One sentence connecting {{product_area}} to this priority.
      
      **Additional Priorities (if applicable):** [List max 2 others with brief explanations]
      
      **Project-Specific Priorities:**
      - Improve {{product_area}} [specific aspect]
      - [Two more priorities specific to this product area]
      
      Use exact OCTO priority titles. Avoid generic language about "user experience" - be specific to {{product_area}}.

  - task_id: "user_journey_context"
    prompt: |
      Map {{product_area}} research to the official VA Journeys of Veterans Map framework using the established stages and moments below.
      
      **VA Journey Map Reference:**
      
      *Life Stages:* Joining, Serving, Getting out, Starting up, Reinventing Myself, Putting down roots, Taking care of myself, Retiring, Aging, Dying
      
      *Key Moments (commonly referenced):*
      - Taking care of myself: Attending to health needs, Recognizing and addressing mental health needs, Managing primary care and chronic health issues, Seeking support for an acute health event, Maintaining my health, Re-establishing and creating relationships, Balancing finances
      - Putting down roots: Finding a place to live, Starting/growing/maintaining my family, Connecting with and serving my community
      - Retiring: Finding additional sources of income, Managing my declining health, Planning for longer term care
      - Aging: Maintaining social and community connections, Adapting my support network to my new needs
      
      *Key "Moments that Matter" (reference if relevant):*
      - Mental health access: "Veterans with mental health needs often have a difficult time accessing providers and feeling safe once in care"
      - Healthcare continuity: "A lack of formal or informal knowledge transfer between providers leads to Veterans experiencing discontinuity"
      - Community connection: "Veterans create a sense of community through bonding over shared experiences"
      - Technology adoption: Veterans' varying comfort levels with digital tools and platforms
      
      **Format your response as:**
      
      **Veteran Journey Connection:** Write 1-2 sentences explaining where {{product_area}} fits into the Veteran journey
      
      **Key Moments:** List 3-5 specific moments from the VA Journey stages above that {{product_area}} touches, using exact terminology
      
      **Relevant "Moments that Matter" (if applicable):** Reference any specific moments that matter that are particularly relevant to {{product_area}}
      
      Keep the response concise and practical. Use the exact moment terminology provided above. Focus specifically on {{product_area}}.

  - task_id: "additional_research_goals"
    prompt: |
      Generate 2-3 supporting research goals that complement the refined primary goal for {{product_area}}.
      
      These should:
      - Be specific to {{methodology}} and {{product_area}}
      - Help inform the decision about {{product_area}}
      - Support the primary goal without duplicating it
      - Be achievable within the research scope
      - Reference {{target_participants}} specifically
      
      Format as clear bullet points with proper indentation and descriptive explanations for each goal.

  - task_id: "research_questions"
    prompt: |
      CONTEXT: You are creating research questions for {{product_area}}.
      REQUIREMENT: Every question must relate directly to {{product_area}} and include specific terminology.
      
      Create 3-4 specific, actionable research questions based on:
      - {{product_area}} (must be mentioned in each question)
      - {{target_participants}}
      - {{methodology}}
      - Decision context about {{product_area}}
      
      Each question should:
      - Include "{{product_area}}" or related terminology
      - Reference {{target_participants}} explicitly
      - Be answerable through {{methodology}}
      - Connect directly to the decision about {{product_area}}
      
      AVOID: Generic usability questions, website navigation, e-commerce references unless {{product_area}} specifically involves these.
      
      Format as numbered questions with context-specific explanations that focus on {{product_area}}.

  - task_id: "research_hypotheses"
    prompt: |
      Generate exactly 3 testable hypotheses for {{product_area}} research using {{methodology}}.
      
      Each hypothesis must:
      - Start with "Veterans using {{product_area}} will..." or "{{target_participants}} will..."
      - Include specific, measurable predictions about {{product_area}}
      - Reference {{methodology}} testing approach
      - Connect to the decision about {{product_area}}
      
      Required format for each:
      **Hypothesis [number]:** [Specific prediction about {{product_area}}]
      - **Testing method:** How this will be measured through {{methodology}}
      - **Success criteria:** Specific metrics or observations that would confirm this hypothesis
      
      Maximum 100 words per hypothesis. Ensure each hypothesis mentions {{product_area}} by name.

  - task_id: "methodology_details"
    prompt: |
      Provide detailed implementation steps for "{{methodology}}" specifically for {{product_area}} research:
      
      **Session Structure and Duration:**
      - Session format and timing for {{product_area}} evaluation
      - Number and length of interactions
      - Session flow and activities specific to {{product_area}}
      
      **Specific Approach and Techniques:**
      - Detailed {{methodology}} implementation for {{product_area}}
      - Data collection methods relevant to {{product_area}}
      - Specific protocols and procedures
      
      **VA Compliance Considerations:**
      - IRB approval requirements and timeline
      - Informed consent procedures
      - Data privacy and security protocols
      - Veteran-specific ethical considerations
      
      **Trauma-Informed Design Elements:**
      - Approaches to support veteran mental health during {{product_area}} research
      - Accommodation for PTSD and anxiety
      - Safe and supportive research environment
      
      Use clear section headers (bolded), proper bullet point indentation, and specific implementation details for {{product_area}}.

  - task_id: "recruitment_strategy"
    prompt: |
      Suggest a comprehensive recruitment strategy for {{target_participants}} for {{product_area}} research:
      
      **Specific Recruitment Channels:**
      - VA-specific recruitment channels and databases relevant to {{product_area}} users
      - Community partnerships and veteran organizations
      - Digital outreach methods appropriate for {{target_participants}}
      
      **Partnership Opportunities:**
      - Relevant VA programs and offices related to {{product_area}}
      - External veteran service organizations
      - Community groups and advocacy organizations
      
      **Screening Criteria and Process:**
      - Specific inclusion/exclusion criteria for {{product_area}} research
      - Screening questions related to {{product_area}} experience
      - Qualification verification methods
      
      **Accessibility Considerations:**
      - Accommodations for disabilities
      - Language and communication needs
      - Technology access and support
      
      Use bolded headers, proper indentation, and specific actionable guidance for recruiting {{target_participants}} for {{product_area}} research.

  - task_id: "demographic_requirements"
    prompt: |
      Generate specific demographic recruitment requirements based on the participant count "{{participant_count}}" for {{product_area}} research. Follow VA's inclusive recruitment standards:
      
      **Format as:**
      
      **Demographic must-haves:** 
      Create specific quotas based on the total participant count, using this structure:
      - Service era diversity (recent veterans, different service periods)
      - Income diversity (at least 40% with household income $49,000 or less)
      - Racial/ethnic diversity (at least 50% identifying as Black, Hispanic/Latina/Latinx, Asian, or Native American)
      - Cognitive considerations (significant portion with diagnosed cognitive disorders)
      - Gender diversity (at least 35% identifying as other than male)
      - LGBTQ+ representation (at least 25% identifying as LGBTQ+)
      - Education diversity (mix of education levels including those without degrees)
      - Age diversity (both under 35 and over 55 represented)
      - Language diversity (non-native English speakers)
      - Accessibility needs (screen reader users, assistive technology users)
      
      **Secondary criteria (nice-to-haves):**
      - Geographic diversity (rural vs urban)
      - {{product_area}} usage patterns and experience levels
      - Technology comfort levels
      
      Calculate actual numbers based on {{participant_count}} and add a note about recruitment challenges. Use the exact format and language style from real VA research plans.

  - task_id: "timeline_calculation"
    prompt: |
      Calculate a detailed timeline starting from the current date using "{{timeline_preference}}" settings:
      
      **Rush Timeline:** Planning(3d), Recruiting(5d), Interviews(5d), AI Synthesis(1d), Reporting(1d)
      **Standard Timeline:** Planning(5d), Recruiting(10d), Interviews(10d), AI Synthesis(2d), Reporting(2d)  
      **Extended Timeline:** Planning(10d), Recruiting(21d), Interviews(14d), AI Synthesis(3d), Reporting(3d)
      
      Create a clean markdown table with:
      - Phase names
      - Duration in business days
      - Actual start and end dates (business days only)
      - Key milestones and deliverables
      
      Note: Synthesis timeline dramatically reduced due to Qori's AI-powered analysis capabilities. Traditional manual coding and thematic analysis (5-10 days) replaced with AI-assisted insights generation.
      
      Calculate from today's date and account for weekends.

  - task_id: "success_criteria"
    prompt: |
      Define 3-4 measurable success criteria that indicate the {{product_area}} research has achieved its goals:
      
      Each criterion should:
      - Be specific and measurable
      - Connect directly to the research goals about {{product_area}}
      - Support rapid decision-making about {{product_area}}
      - Include specific metrics or outcomes
      
      Include criteria such as:
      - **Insight quality:** Specific findings about {{product_area}} that inform decisions
      - **Participant engagement:** Response rates and feedback quality
      - **Actionability:** Time from findings to stakeholder decisions about {{product_area}}
      - **Impact measurement:** Metrics to track {{product_area}} improvements
      
      Format as numbered, measurable outcomes with clear metrics and timelines for {{product_area}}.

  - task_id: "output_artifacts"
    prompt: |
      List realistic research deliverables for {{methodology}} that will inform decisions about {{product_area}}:
      
      **Primary Deliverables:**
      - Research report with key findings about {{product_area}} and actionable recommendations
      - Executive summary with specific insights about {{product_area}} decisions
      - Supporting evidence and participant quotes related to {{product_area}}
      
      **Supporting Materials:**
      - Visual summaries and infographics about {{product_area}} findings
      - Implementation recommendations with priorities for {{product_area}}
      - Follow-up research suggestions for {{product_area}}
      
      **Stakeholder Communication:**
      - Presentation materials for {{product_area}} decisions
      - One-page summary of key {{product_area}} recommendations
      - Documentation of {{product_area}} improvement opportunities
      
      Focus on stakeholder value and decision-making about {{product_area}}. Include estimated completion dates based on timeline preference.

# Processing workflow
processing_workflow:
  1. validate_inputs
  2. execute_ai_generation_tasks
  3. validate_generated_content
  4. populate_template
  5. save_to_outputs

# Output template with improved formatting and stakeholder focus
