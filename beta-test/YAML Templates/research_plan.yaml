id: research_plan
name: run_research_plan
label: 🧭 Research Plan
version: v2.0
description: |
  Generate comprehensive VA-aligned research plans for civic tech studies. Creates structured research plans with timelines, methodology, recruitment strategy, and success criteria following VA research standards and organizational priorities.

author: CivicMind R&D
created: 2025-06-26
last_updated: 2025-07-02

input_type: text
input_processing: summarize_if_long
temperature: 0.4
precision_mode: concise | detailed

input_variables:
  - input_text           # Research goals, context, methodology requirements (REQUIRED)
  - study_name           # Title of study (REQUIRED)
  - researcher_contact   # Lead researcher (REQUIRED)
  - study_channel        # Where to notify completion (REQUIRED)
  - study_link           # Link to study folder or documentation (OPTIONAL)
  - team_members         # Who to notify (OPTIONAL)

# Auto-generated/computed variables
auto_variables:
  - product_area: |
      # AI identifies product/service area from context
      identify_product_area(input_text) || "Digital Services"
  - team_office: |
      # AI determines team/office from context
      identify_team_office(input_text) || "OCTO-DE"
  - research_goal: |
      # AI extracts primary research goal
      extract_research_goal(input_text) || "Understand user needs and pain points"
  - methodology: |
      # AI suggests research methodology from goals
      suggest_methodology(input_text) || "Qualitative interviews and usability testing"
  - target_participants: |
      # AI identifies target participant types
      identify_participants(input_text) || "Veterans and caregivers"
  - participant_count: |
      # AI suggests participant count based on methodology
      suggest_participant_count(input_text) || "8-12 participants"
  - timeline_preference: |
      # AI determines timeline urgency from context
      assess_timeline_urgency(input_text) || "standard"
  - decision_context: |
      # AI extracts decision context from research goals
      extract_decision_context(input_text) || "Inform product improvements and user experience design"
  - current_date: |
      # Auto-generate current date
      new Date().toLocaleDateString('en-US', {year: 'numeric', month: 'long', day: 'numeric'})
  - github_file_link: |
      # Auto-generate based on study name and date
      generate_github_link(study_name, current_date) || null

# Output configuration
output_options:
  default_delivery: "file_only"
  slack_format: "notification_only"
  file_location: "01-planning/"
  file_name: "research_plan_{{study_name_slug}}_{{current_date}}.md"

slack_output:
  post_in_channel: false
  create_thread: false
  send_notification: true
  title_format: "🧭 Research Plan Created"
  ping_team: ["{{researcher_contact}}", "{{team_members}}"]
  interactive_elements:
    - text: "🧭 View Plan"
      url: "{{github_file_link}}"
    - text: "💬 Create Discussion Guide"
      action: "run_discussion_guide"

output_use: |
  CivicMind Research Plan generator creates comprehensive VA-compliant research plans with detailed timelines, methodology, and recruitment strategies. Ensures proper planning and stakeholder alignment for successful research execution.

  Use this method to:
    - Generate structured research plans following VA standards
    - Plan realistic timelines and resource allocation
    - Define clear methodology and participant requirements
    - Align teams on research goals and success criteria
    - Document recruitment strategy and logistics

output_notes: |
  Product area ({{product_area}}) and methodology ({{methodology}}) determined from research goals.
  Timeline preference ({{timeline_preference}}) and participant details ({{target_participants}}) identified automatically.
  Plan includes VA/OCTO organizational alignment and trauma-informed considerations.
  Write in clear, professional language accessible to stakeholders.
  Include realistic timelines and actionable planning details.

output_format: |
  # 🧭 Research Plan – {{study_name}}

  **📦 Product/Feature Area:** {{product_area}}  
  **🏛️ Team/Office:** {{team_office}}  
  **👩🏽‍🔬 Lead Researcher:** {{researcher_contact}}  
  **🗓️ Date:** {{current_date}}

  ---

  ## 🔎 Background  
  {{study_background}}

  ## 🎯 Organizational Priorities  
  {{organizational_priorities}}

  ## 🧭 Veteran/User Journey  
  {{user_journey_context}}

  ## 🎓 Research Goals  
  {{research_goal}}

  {{additional_goals}}

  ## ❓ Research Questions  
  {{research_questions}}

  ## 🧪 Hypotheses  
  {{research_hypotheses}}

  ## 🛠️ Methodology  
  {{methodology}}

  {{methodology_details}}

  ## 🧲 Recruitment Plan  

  **🎯 Target Participants:** {{target_participants}}

  **📋 Recruitment Strategy:** {{recruitment_strategy}}

  **📅 Recruitment Timeline:**
  {{recruitment_timeline_table}}

  **🧍 Participant Count:** {{participant_count}}

  ## ⏰ Timeline Overview
  {{timeline_table}}

  ## 👥 Team Roles
  {{team_roles_table}}

  ## 🧰 Tools & Platforms  
  {{tools_and_platforms}}

  ## ✅ Success Criteria  
  {{success_criteria}}

  ## 📦 Output Artifacts  
  {{output_artifacts}}

  ## 🏷️ Tags  
  {{generated_tags}}

  ---
  **Study Details:** {{study_link}}

prompt: |
  You are a senior UX researcher experienced in creating comprehensive VA-compliant research plans for government service design.

  ANALYSIS CONTEXT:
  - Study: {{study_name}}
  - Product area: {{product_area}} (AI-identified from context)
  - Team/Office: {{team_office}} (AI-determined from scope)
  - Research goal: {{research_goal}} (AI-extracted from objectives)
  - Methodology: {{methodology}} (AI-suggested from goals)
  - Participants: {{target_participants}} (AI-identified from context)
  - Count: {{participant_count}} (AI-suggested from methodology)
  - Timeline: {{timeline_preference}} (AI-assessed from urgency)
  - Decision context: {{decision_context}} (AI-extracted from goals)

  Create a comprehensive research plan that includes:

  1. **Study Background** - Context and motivation for research based on decision context
  2. **Organizational Priorities** - Alignment with VA/OCTO goals relevant to product area
  3. **User Journey Context** - How this research fits in end-to-end user experience
  4. **Additional Goals** - 2-3 supporting goals based on methodology and context
  5. **Research Questions** - 3-4 specific questions based on research goal and methodology
  6. **Research Hypotheses** - 2-3 testable hypotheses based on research questions
  7. **Methodology Details** - Specific implementation details for suggested methodology
  8. **Recruitment Strategy** - Appropriate channels and approach for target participants
  9. **Timeline Tables** - Realistic timelines based on timeline preference:
     - Rush: Planning(3d), Recruiting(5d), Interviews(5d), Synthesis(3d), Reporting(2d)
     - Standard: Planning(5d), Recruiting(10d), Interviews(10d), Synthesis(5d), Reporting(5d)
     - Extended: Planning(10d), Recruiting(21d), Interviews(14d), Synthesis(10d), Reporting(7d)
  10. **Team Roles Table** - Lead researcher plus suggested roles
  11. **Tools and Platforms** - Specific tools based on methodology
  12. **Success Criteria** - 2-3 measurable success criteria
  13. **Output Artifacts** - Realistic deliverables based on methodology
  14. **Generated Tags** - Relevant tags for organization and discovery

  Requirements:
  - Calculate actual dates from {{current_date}} using business days only
  - Follow VA research standards and organizational priorities
  - Use plain, professional language accessible to stakeholders
  - Include realistic timelines and resource considerations
  - Consider trauma-informed design principles where relevant
  - Format tables using Markdown table syntax

  Write in clear, directive language that guides successful research execution while ensuring stakeholder alignment.

notify:
  - role: research_team
    action: "Research plan created"
    channel: "{{study_channel}}"
    message: "🧭 Research plan for {{study_name}} has been created and saved. {{timeline_preference}} timeline with {{methodology}} methodology planned."
  - role: researcher
    action: "Plan ready for execution"
    slack_tag: "{{researcher_contact}}"
    message: "Your research plan has been saved to the planning folder and is ready for team review and execution."
