id: synthesize_router
name: route_synthesis_analysis
label: 🔬 Synthesize Study Router
version: v1.1
description: Smart router that directs research synthesis requests to specialized analysis YAMLs based on user selection and intelligent file selection

author: CivicMind R&D
created: 2025-08-11
last_updated: 2025-08-11

input_type: structured
input_processing: route_and_delegate

# LLM Configuration
llm_config:
  model: "gpt-4o"
  temperature: 0.2
  max_tokens: 3000

# Router inputs from Slack modal
input_variables:
  # Study context
  study_folder: "{{study_folder}}"                   # Selected research study folder
  study_name: "{{study_name}}"                       # Display name of the study
  study_channel: "{{study_channel}}"                 # Research team channel
  
  # Analysis routing
  analysis_type: "{{analysis_type}}"                 # Which analysis method to run
  
  # Smart File Selection from Slack interface
  selected_files: "{{selected_files}}"               # Array of file IDs selected by user
  file_selection_metadata: "{{file_selection_metadata}}" # Categories and counts for validation
  
  # User context
  researcher_contact: "{{researcher_contact}}"       # User who initiated analysis
  team_members: "{{team_members}}"                   # Team members to notify
  
  # Study data context (for routing optimization)
  total_sessions: "{{total_sessions}}"
  total_transcripts: "{{total_transcripts}}"
  total_summaries: "{{total_summaries}}"
  total_participants: "{{total_participants}}"

# AI GENERATION TASKS
ai_generation_tasks:
  # File selection quality assessment
  - task_id: "file_selection_analysis"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      As an experienced UX Research analyst, evaluate the file selection quality for this {{analysis_type}} analysis:
      
      **Study:** {{study_name}}
      **Analysis Type:** {{analysis_type}}
      **Selected Files:** {{selected_files}}
      **File Categories:** {{file_selection_metadata}}
      **Study Context:** {{total_sessions}} sessions, {{total_participants}} participants
      
      **Required Data for {{analysis_type}}:**
      {{analysis_type}}.required_data
      
      **Optimal Data for {{analysis_type}}:**
      {{analysis_type}}.optimal_data
      
      Assess:
      1. **Coverage Assessment:** Do selected files meet minimum requirements?
      2. **Quality Indicators:** What file types will provide the richest insights?
      3. **Missing Critical Data:** What important files are missing that could improve analysis quality?
      4. **Selection Optimization:** Rate the file selection (Excellent/Good/Adequate/Poor)
      
      **Format:**
      **Coverage Status:** ✅ Complete / ⚠️ Partial / ❌ Insufficient
      **Quality Score:** [X/10] - [brief explanation]
      **Critical Gaps:** [List missing files that would significantly improve analysis]
      **Recommendation:** [Keep current selection / Add specific files / Reconsider analysis type]

  # Smart analysis preview and expectations
  - task_id: "analysis_preview_generation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on specific, actionable insights
      
      As an experienced UX Research analyst, preview what the {{analysis_type}} analysis will deliver:
      
      **Study:** {{study_name}}
      **Analysis Type:** {{analysis_type}}
      **Available Data:** {{selected_files}}
      **Study Scale:** {{total_sessions}} sessions with {{total_participants}} participants
      
      **Analysis Description:** {{analysis_type}}.description
      
      Based on the selected files, predict:
      1. **Key Deliverables:** What specific outputs will be generated?
      2. **Insight Types:** What kinds of findings should the team expect?
      3. **Confidence Level:** How reliable will insights be given the data quality?
      4. **Timeline Estimate:** How long will this analysis take?
      5. **Team Value:** How will these insights support decision-making?
      
      **Format:**
      **Expected Deliverables:**
      - [Specific deliverable 1 with detail level]
      - [Specific deliverable 2 with detail level]
      - [Specific deliverable 3 with detail level]
      
      **Insight Confidence:** High/Medium/Low - [reasoning based on data quality]
      
      **Estimated Completion:** [X] minutes for analysis + [Y] minutes for review
      
      **Decision Support:** [How findings will help the team make specific decisions]

  # Intelligent file gap analysis and recommendations
  - task_id: "intelligent_recommendations"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Provide specific, actionable recommendations
      
      As an experienced UX Research analyst, provide intelligent recommendations for improving this analysis:
      
      **Study:** {{study_name}}
      **Analysis Type:** {{analysis_type}}
      **Current Selection:** {{selected_files}}
      **Study Context:** {{total_sessions}} sessions, {{total_participants}} participants
      
      **Available Data Sources:** 
      - Session summaries: {{total_summaries}}
      - Transcripts: {{total_transcripts}}
      - Participant data: Available
      - Task completion data: Available
      - Research context: Available
      
      Analyze and recommend:
      1. **High-Impact Additions:** Which missing files would most improve analysis quality?
      2. **Alternative Analysis Types:** Would a different analysis be better suited to available data?
      3. **Sequential Analysis:** What analysis should follow this one for maximum insight?
      4. **Risk Mitigation:** How to address any data quality concerns?
      
      **Format:**
      **Recommended Additions (if any):**
      - [Specific file type]: [Why it would improve analysis] - Impact: High/Medium/Low
      - [Specific file type]: [Why it would improve analysis] - Impact: High/Medium/Low
      
      **Alternative Suggestion:** 
      [If current analysis isn't optimal: "Consider [alternative analysis] because [reason]"]
      [If current analysis is optimal: "Current analysis type is well-suited to available data"]
      
      **Follow-up Analysis:**
      After {{analysis_type}}, consider running [specific analysis] to [specific benefit]
      
      **Risk Mitigation:**
      [Any specific steps to ensure analysis quality given current file selection]

  # Team collaboration and workflow optimization
  - task_id: "collaboration_optimization"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      - Focus on specific team coordination actions
      
      As an experienced UX Research operations specialist, optimize team collaboration for this analysis:
      
      **Study:** {{study_name}}
      **Analysis Type:** {{analysis_type}}
      **Researcher:** {{researcher_contact}}
      **Team Members:** {{team_members}}
      **Study Channel:** {{study_channel}}
      
      Plan coordination strategy:
      1. **Review Responsibilities:** Who should review what outputs?
      2. **Stakeholder Communication:** What should be shared and when?
      3. **Decision Timeline:** When do insights need to inform decisions?
      4. **Follow-up Actions:** What happens after analysis completion?
      
      **Format:**
      **Review Plan:**
      - Primary Reviewer: {{researcher_contact}} - [specific responsibilities]
      - Team Review: {{team_members}} - [what they should focus on]
      - Stakeholder Review: [timing and format]
      
      **Communication Strategy:**
      - Initial Results: Share [specific elements] in {{study_channel}}
      - Detailed Findings: Deliver [format] by [timeline]
      - Decision Support: Present [key insights] to [stakeholders]
      
      **Next Steps Planning:**
      - Immediate (24 hours): [specific actions]
      - Short-term (1 week): [follow-up activities]
      - Future Research: [recommended next studies]

  # Analysis routing validation and optimization
  - task_id: "routing_validation"
    prompt: |
      **MANDATORY WRITING REQUIREMENTS:**
      - NEVER use these words: "crucial," "seamless," "ultimately," "leverage," "enhance," "streamline"
      - ALWAYS use direct, concrete language - avoid vague aspirational phrases
      - ALWAYS use active voice and specific verbs
      
      As an experienced UX Research methodology expert, validate the routing decision for this analysis:
      
      **Requested Analysis:** {{analysis_type}}
      **Study Type:** Based on {{study_name}} with {{total_sessions}} sessions
      **Available Data:** {{selected_files}}
      **Research Goals:** [Inferred from study context]
      
      **Target YAML:** {{analysis_type}}.target_yaml {{analysis_type}}.version
      
      Validate:
      1. **Methodology Match:** Is {{analysis_type}} the right choice for this study?
      2. **Data Compatibility:** Do selected files support this analysis method?
      3. **Output Alignment:** Will deliverables meet research goals?
      4. **Resource Efficiency:** Is this the most efficient path to insights?
      
      **Format:**
      **Routing Validation:** ✅ Optimal / ⚠️ Acceptable / ❌ Reconsider
      
      **Methodology Assessment:**
      {{analysis_type}} is [well-suited/adequately suited/poorly suited] because [specific reasoning]
      
      **Data-Method Alignment:**
      Selected files [fully support/partially support/inadequately support] {{analysis_type}} because [specific reasons]
      
      **Efficiency Rating:** [High/Medium/Low] - [explanation]
      
      **Final Recommendation:**
      [Proceed as planned / Modify approach / Consider alternative analysis] - [specific reasoning]

# Analysis routing configuration
analysis_routes:
  affinity_mapping:
    target_yaml: "affinity_mapping.yaml"
    version: "v1.6"
    description: "Group observations into themes with AI-determined optimal count"
    required_data: ["session_summaries"]
    optimal_data: ["transcripts", "research_objectives", "raw_notes", "participant_tracker"]
    
  journey_mapping:
    target_yaml: "journey_mapping.yaml"
    version: "v1.2"
    description: "Map user experience stages with AI-adapted journey length"
    required_data: ["session_summaries"]
    optimal_data: ["emotional_states_tracker", "task_completion_data", "transcripts", "raw_notes"]
    
  persona_generation:
    target_yaml: "persona_generator.yaml"
    version: "v2.1"
    description: "Create research-grounded personas with diversity analysis"
    required_data: ["participant_tracker", "session_summaries"]
    optimal_data: ["user_goals_data", "transcripts", "emotional_states_tracker", "task_completion_data"]
    
  jobs_to_be_done:
    target_yaml: "jobs_to_be_done.yaml"
    version: "v1.7"
    description: "Extract user jobs and motivations with role diversity analysis"
    required_data: ["session_summaries", "user_goals_data"]
    optimal_data: ["transcripts", "participant_tracker", "competitive_analysis", "emotional_states_tracker"]
    
  usability_issues:
    target_yaml: "usability_issues_extractor.yaml"
    version: "v2.0"
    description: "Extract prioritized usability problems with severity assessment"
    required_data: ["session_summaries", "task_completion_data"]
    optimal_data: ["raw_notes", "error_logs", "transcripts", "participant_tracker", "emotional_states_tracker"]
    
  design_opportunities:
    target_yaml: "design_opportunity_generator.yaml"
    version: "v2.0"
    description: "Generate HMW questions and design challenges with innovation scoring"
    required_data: ["session_summaries", "user_suggestions"]
    optimal_data: ["user_goals_data", "task_completion_data", "competitive_analysis", "transcripts", "error_logs", "emotional_states_tracker", "research_objectives"]

# Data source mapping for each study
study_data_mapping:
  standard_sources:
    # Core session data
    session_summaries: "03-fieldwork/summaries/{{study_folder}}/"
    raw_notes: "03-fieldwork/session-notes/"
    transcripts: "03-fieldwork/transcripts/"
    
    # Participant and user data
    participant_tracker: "02-participants/{{study_folder}}_participant_tracker.md"
    user_goals_data: "02-participants/{{study_folder}}_user_goals.md"
    
    # Performance and error data
    task_completion_data: "03-fieldwork/task-data/{{study_folder}}_task_results.csv"
    error_logs: "03-fieldwork/error-logs/{{study_folder}}_errors.log"
    
    # Research context files
    research_objectives: "01-planning/{{study_folder}}_research_plan.md"
    competitive_analysis: "01-planning/competitive_analysis.md"
    user_suggestions: "03-fieldwork/feedback/{{study_folder}}_suggestions.md"
    emotional_states_tracker: "03-fieldwork/emotional-data/{{study_folder}}_emotions.md"
    
  derived_sources:
    pain_points_analysis: "04-analysis/affinity-mapping/{{study_folder}}_affinity_mapping_*.md"
    extracted_suggestions: "extracted from transcripts and summaries"
    calculated_task_data: "extracted from session notes"
    coded_emotional_data: "extracted from coded observations"

# File ID to source mapping (from Slack interface to actual files)
file_id_mapping:
  # Session summaries
  session_summary_1: "03-fieldwork/summaries/{{study_folder}}/session_summary_p1.md"
  session_summary_2: "03-fieldwork/summaries/{{study_folder}}/session_summary_p2.md"
  session_summary_3: "03-fieldwork/summaries/{{study_folder}}/session_summary_p3.md"
  session_summary_4: "03-fieldwork/summaries/{{study_folder}}/session_summary_p4.md"
  session_summary_5: "03-fieldwork/summaries/{{study_folder}}/session_summary_p5.md"
  session_summary_6: "03-fieldwork/summaries/{{study_folder}}/session_summary_p6.md"
  
  # Interview transcripts
  transcript_1: "03-fieldwork/transcripts/{{study_folder}}_p1_transcript.md"
  transcript_2: "03-fieldwork/transcripts/{{study_folder}}_p2_transcript.md"
  transcript_3: "03-fieldwork/transcripts/{{study_folder}}_p3_transcript.md"
  transcript_4: "03-fieldwork/transcripts/{{study_folder}}_p4_transcript.md"
  
  # Raw research data
  raw_notes_1: "03-fieldwork/session-notes/{{study_folder}}_day1_notes.md"
  raw_notes_2: "03-fieldwork/session-notes/{{study_folder}}_day2_notes.md"
  raw_notes_3: "03-fieldwork/session-notes/{{study_folder}}_day3_notes.md"
  
  # Participant & user data
  participant_tracker: "02-participants/{{study_folder}}_participant_tracker.md"
  user_goals_data: "02-participants/{{study_folder}}_user_goals.md"
  
  # Performance & error data
  task_completion_data: "03-fieldwork/task-data/{{study_folder}}_task_results.csv"
  error_logs: "03-fieldwork/error-logs/{{study_folder}}_errors.log"
  
  # Research context
  research_objectives: "01-planning/{{study_folder}}_research_plan.md"
  competitive_analysis: "01-planning/competitive_analysis.md"
  user_suggestions: "03-fieldwork/feedback/{{study_folder}}_suggestions.md"
  emotional_states_tracker: "03-fieldwork/emotional-data/{{study_folder}}_emotions.md"

# Router processing logic
processing_workflow:
  - validate_study_selection
  - confirm_analysis_type
  - process_user_file_selection  # NEW: Validate and map selected files
  - validate_required_data_availability  # NEW: Check required files are selected
  - execute_file_selection_analysis  # AI: Assess file selection quality
  - execute_routing_validation  # AI: Validate analysis type choice
  - gather_selected_data_sources  # Updated: Only gather user-selected files
  - execute_analysis_preview_generation  # AI: Preview expected outcomes
  - execute_intelligent_recommendations  # AI: Suggest improvements
  - execute_collaboration_optimization  # AI: Plan team coordination
  - prepare_target_yaml_inputs  # Format combined content for target YAML
  - generate_routing_intelligence_log  # Save preprocessing report
  - trigger_target_yaml_execution  # EXECUTE target analysis YAML
  - track_analysis_handoff_completion  # Monitor target YAML completion

# File selection processing logic
file_selection_processing:
  validation_rules:
    - ensure_required_files_selected
    - validate_file_paths_exist
    - check_file_access_permissions
    - warn_if_optimal_files_missing
    
  combination_strategy:
    # How to combine different file types for input_text
    session_summaries:
      header: "=== SESSION SUMMARIES ==="
      format: "**Session {{session_number}} - {{participant_details}}**\n{{content}}\n\n"
      
    transcripts:
      header: "=== INTERVIEW TRANSCRIPTS ==="
      format: "**Transcript {{participant_number}}**\n{{content}}\n\n"
      
    raw_notes:
      header: "=== RAW FIELD NOTES ==="
      format: "**{{note_date}} - {{note_title}}**\n{{content}}\n\n"
      
    participant_data:
      header: "=== PARTICIPANT DATA ==="
      format: "{{content}}\n\n"
      
    task_data:
      header: "=== TASK & PERFORMANCE DATA ==="
      format: "{{content}}\n\n"
      
    research_context:
      header: "=== RESEARCH CONTEXT ==="
      format: "{{content}}\n\n"

# Input preparation for target YAMLs
target_yaml_inputs:
  # Common inputs for all analysis types
  common:
    study_name: "{{study_name}}"
    researcher_contact: "{{researcher_contact}}"
    study_channel: "{{study_channel}}"
    team_members: "{{team_members}}"
    study_link: "{{github_study_folder_link}}"
    selected_files_summary: "{{selected_files_summary}}"
    
  # Analysis-specific input preparation
  affinity_mapping:
    input_text: "{{combined_selected_content}}"
    focus_area: "themes and patterns across sessions"
    
  journey_mapping:
    input_text: "{{combined_selected_content}}"
    focus_area: "user experience flow and emotional journey"
    
  persona_generation:
    input_text: "{{combined_selected_content}}"
    focus_area: "behavioral patterns and user archetypes"
    
  jobs_to_be_done:
    input_text: "{{combined_selected_content}}"
    focus_area: "user motivations and underlying jobs"
    
  usability_issues:
    input_text: "{{combined_selected_content}}"
    focus_area: "interface problems and usability barriers"
    
  design_opportunities:
    input_text: "{{combined_selected_content}}"
    focus_area: "innovation opportunities and design challenges"

# Router intelligence report template (not the final analysis)
output_template: |
  🔬 **Router Intelligence: {{study_name}}**
  
  ✅ **Preprocessing Complete - Analysis Starting**
  
  **Study:** {{study_name}}  
  **Analysis:** {{analysis_routes.[analysis_type].description}}  
  **Target YAML:** {{analysis_routes.[analysis_type].target_yaml}} ({{analysis_routes.[analysis_type].version}})  
  **Researcher:** {{researcher_contact}}
  
  ---
  
  ## 📊 File Selection Analysis
  
  {{ai_generated.file_selection_analysis}}
  
  **Files Selected by User:**
  {{#each selected_file_details}}
  • {{file_category}}: {{file_name}} ({{file_type}})
  {{/each}}
  
  **Data Combination Strategy:**
  {{#each content_sections}}
  • {{section_name}}: {{file_count}} files combined
  {{/each}}
  
  ---
  
  ## 🔮 Analysis Preview
  
  {{ai_generated.analysis_preview_generation}}
  
  ---
  
  ## 💡 Smart Recommendations
  
  {{ai_generated.intelligent_recommendations}}
  
  ---
  
  ## 👥 Team Collaboration Plan
  
  {{ai_generated.collaboration_optimization}}
  
  ---
  
  ## ✅ Routing Validation
  
  {{ai_generated.routing_validation}}
  
  ---
  
  ## 🚀 Execution Status
  
  **Input Preparation:** ✅ Complete  
  **Combined Content:** {{combined_content_length}} characters prepared  
  **Target YAML Trigger:** {{analysis_routes.[analysis_type].target_yaml}} starting now...  
  
  **Expected Outputs from {{analysis_routes.[analysis_type].target_yaml}}:**
  - Primary analysis deliverable in `04-analysis/{{analysis_folder_name}}/`
  - Team notification in {{study_channel}} upon completion
  - Analysis completion within {{estimated_completion_time}}
  
  ---
  
  *📋 This routing log saved to:* `04-analysis/_router-logs/`  
  *🎯 Actual analysis results will be delivered by:* {{analysis_routes.[analysis_type].target_yaml}}

# Router output configuration - preprocessing intelligence log only
router_output_options:
  filename: "_router_log_{{study_folder}}_{{analysis_type}}_{{current_date}}.md"
  path: "04-analysis/_router-logs/"
  template: "{{router_output_template}}"
  
  delivery:
    slack:
      enabled: true
      channel: "{{study_channel}}"
      message: |
        🔬 **Analysis Starting: {{analysis_type}}**
        
        {{researcher_contact}} is running {{analysis_type}} on {{study_name}}.
        
        **File Quality:** {{ai_generated.file_selection_quality_summary}}
        **Expected Results:** {{ai_generated.analysis_preview_summary}}
        
        ⏱️ ETA: {{estimated_completion_time}}
        📁 Results will appear in this channel when complete
        
      dm_notification:
        enabled: true
        target_user: "{{researcher_contact}}"
        message: |
          🔬 **Preprocessing Complete - Analysis Running**
          
          Your **{{analysis_type}}** for **{{study_name}}** has been optimized and is now running.
          
          **Quality Assessment:** {{ai_generated.file_selection_quality_summary}}
          **Expected Completion:** {{estimated_completion_time}}
          
          The actual analysis results will be delivered by {{analysis_routes.[analysis_type].target_yaml}} when complete.
        
        actions:
          - text: "📊 View Routing Intelligence"
            style: "default"
            url: "{{routing_log_url}}"
          - text: "🔄 Run Another Analysis"
            style: "default"
            action_id: "synthesize_modal"

# Target YAML will handle its own output configuration
# Router only produces preprocessing intelligence, not final analysis

# Integration with target analysis YAMLs
yaml_integration:
  method: "workflow_trigger"
  handoff_type: "direct_execution"
  
  trigger_mapping:
    affinity_mapping: "run_affinity_mapping"
    journey_mapping: "run_journey_mapping"
    persona_generation: "run_persona_generator"
    jobs_to_be_done: "extract_jobs_to_be_done"
    usability_issues: "run_usability_issues_extractor"
    design_opportunities: "run_design_opportunity_generator"
  
  # What gets passed to target YAML
  parameter_passthrough:
    # Core analysis input (processed and formatted)
    input_text: "{{combined_selected_content}}"           # Main analysis data
    focus_area: "{{target_yaml_inputs.[analysis_type].focus_area}}"
    
    # Study context (preserved)
    study_name: "{{study_name}}"
    study_folder: "{{study_folder}}"
    researcher_contact: "{{researcher_contact}}"
    study_channel: "{{study_channel}}"
    team_members: "{{team_members}}"
    
    # Router intelligence (enhanced)
    file_selection_quality: "{{ai_generated.file_selection_analysis}}"
    analysis_preview: "{{ai_generated.analysis_preview_generation}}"
    recommendations: "{{ai_generated.intelligent_recommendations}}"
    collaboration_plan: "{{ai_generated.collaboration_optimization}}"
    routing_validation: "{{ai_generated.routing_validation}}"
    
    # File metadata
    selected_files_summary: "{{selected_files_summary}}"
    data_combination_strategy: "{{file_combination_metadata}}"
    
    # Processing context
    router_version: "v1.1"
    preprocessing_timestamp: "{{current_timestamp}}"
    analysis_id: "{{unique_analysis_id}}"

  # Execution flow
  execution_sequence:
    1. router_completes_preprocessing
    2. router_saves_intelligence_log
    3. router_triggers_target_yaml
    4. target_yaml_receives_prepared_inputs
    5. target_yaml_generates_analysis_deliverable
    6. target_yaml_notifies_completion
    7. router_tracks_end_to_end_success

# Quality checks before routing
pre_routing_validation:
  - verify_study_data_exists
  - validate_selected_files_exist
  - confirm_required_data_sources_selected
  - validate_team_permissions
  - check_analysis_quota_limits
  - assess_file_selection_completeness

# Post-routing tracking
post_routing_tracking:
  - log_analysis_request_with_file_selection
  - update_study_dashboard
  - track_file_selection_patterns
  - notify_completion_status
  - update_analysis_index

# Smart recommendations for future file selections
selection_intelligence:
  learning_enabled: true
  track_metrics:
    - most_successful_file_combinations_by_analysis_type
    - researcher_selection_patterns
    - analysis_quality_by_file_completeness
    
  recommendation_engine:
    - suggest_files_based_on_analysis_success_history
    - warn_about_commonly_missed_but_valuable_files
    - recommend_file_additions_mid_analysis

output_use: |
  AI-Enhanced Synthesis Router serves as an intelligent preprocessor that validates file selections, optimizes analysis inputs, and triggers specialized analysis YAMLs. The router produces two key outputs: (1) routing intelligence log with file quality assessment, analysis preview, smart recommendations, and team collaboration planning, and (2) prepared, formatted inputs that are passed to target analysis YAMLs (affinity_mapping.yaml, journey_mapping.yaml, etc.) for actual analysis execution. This ensures optimal data preparation, provides quality recommendations, sets realistic expectations, and maintains seamless integration with existing analysis workflows while preserving team collaboration features. The router transforms raw file selection into optimized analysis inputs, maximizing the quality of downstream analysis deliverables.
