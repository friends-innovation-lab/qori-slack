id: transcript_upload
label: "📝 Upload & Code Session Transcript"
description: Upload transcripts with automatic PII redaction and AI-powered research coding
input_type: tabbed_upload
input_processing: ai_enhanced_coding
version: v2.1

input_tabs:
  file_upload:
    label: "📁 Upload File"
    description: "Upload transcript from Zoom, Otter.ai, or other source"
    fields:
      uploaded_file:
        type: "file"
        label: "Select Transcript File"
        accept: [".txt", ".docx", ".pdf", ".md", ".vtt", ".srt"]
        max_size: "15MB"
        drag_drop: true
        required: true
        
      transcript_source:
        type: "select"
        label: "Source (Optional)"
        required: false
        options:
          - "Zoom Auto-Generated"
          - "Otter.ai"
          - "Rev.com"
          - "Teams Auto-Generated"
          - "Manual Notes"
          - "Other"
    
  paste_text:
    label: "📋 Paste Text"
    description: "Copy and paste transcript directly"
    fields:
      manual_transcript:
        type: "textarea"
        label: "Transcript Content"
        placeholder: "Paste your transcript here..."
        rows: 20
        word_count: true
        required: true

privacy_protection:
  pii_scrubbing:
    enabled: true
    auto_detect: true
    
    speaker_label_redaction:
      enabled: true
      replace_name_labels_with: "Speaker {{number}}"
      auto_assign_speaker_numbers: true
    
    patterns_to_redact:
      names: true
      email_addresses: true
      phone_numbers: true
      ssn: true
      addresses: true
      veteran_ids: true
      case_numbers: true
      company_names: true
    
    replacement_strategy:
      names: "{{auto_detected_participant_id}}"
      email_addresses: "[EMAIL]"
      phone_numbers: "[PHONE]"
      addresses: "[ADDRESS]"
      company_names: "[COMPANY]"
      generic: "[REDACTED]"
      
    confidence_threshold: 0.85

ai_processing:
  metadata_extraction:
    auto_detect_participant_id: true
    auto_detect_session_info: true
    auto_detect_study_context: true
    
    extraction_patterns:
      participant_id:
        filename_patterns: ["pt001", "participant_1", "p1", "user_01"]
        content_patterns: ["Participant ID:", "Participant:", "User:"]
        fallback: "participant_{{timestamp}}"
        
      session_id:
        filename_patterns: ["session_1", "s1", "interview_1"]
        content_patterns: ["Session:", "Interview #", "Meeting ID:"]
        fallback: "session_{{date}}"
        
      study_name:
        folder_context: true
        filename_patterns: ["housing_study", "va_research"]
        content_patterns: ["Study:", "Research Project:", "Project:"]
        fallback: "research_study"
        
      session_date:
        filename_date_patterns: true
        content_patterns: ["Date:", "Session Date:", "Interview Date:"]
        file_modified_date: true
        fallback: "{{upload_date}}"
    
  transcript_cleaning:
    fix_obvious_errors: true
    auto_detect_speaker_format: true
    standardize_speaker_labels: true
    preserve_timestamps: true
    remove_excessive_filler: false
    
    speaker_format_patterns:
      - pattern: "Interviewer:|Moderator:|Researcher:|Speaker 1:|Speaker1:|S1:"
        standardize_to: "Speaker 1:"
      - pattern: "Participant:|User:|Respondent:|Interviewee:|Speaker 2:|Speaker2:|S2:"
        standardize_to: "Speaker 2:"
      - pattern: "^[A-Z][a-z]+ [A-Z][a-z]*:"
        standardize_to: "Speaker {{auto_number}}:"
        pii_redaction_required: true
        auto_number_speakers: true
    
  research_formatting:
    paragraph_breaks_by_speaker: true
    consistent_speaker_format: true
    preserve_emotional_indicators: true
    maintain_context_cues: true

ai_coding:
  enabled: true
  
  coding_categories:
    pain_points:
      icon: "🔴"
      description: "Frustrations, difficulties, problems, barriers"
      severity_levels: ["Critical", "High", "Medium", "Low"]
      extract_quotes: true
      
    opportunities:
      icon: "🟡"  
      description: "Unmet needs, suggestions, improvement areas"
      impact_levels: ["High Impact", "Medium Impact", "Quick Win"]
      extract_quotes: true
      priority: "high"
      minimum_required: 2
      
    insights:
      icon: "💡"
      description: "Key behaviors, patterns, revelations, mental models"
      insight_types: ["User Behavior", "Mental Model", "Workflow", "Preference", "Accessibility Pattern", "Benchmarking", "Abandonment Pattern", "Workaround"]
      extract_quotes: true
      priority: "high"
      minimum_required: 2
      
    positive_feedback:
      icon: "🟢"
      description: "What's working well, successful interactions"
      extract_quotes: true
      
    feature_requests:
      icon: "✨"
      description: "Explicit requests for new features or changes"
      priority_levels: ["Must Have", "Should Have", "Nice to Have"]
      extract_quotes: true
      
    usability_issues:
      icon: "⚠️"
      description: "Interface problems, confusion, interaction failures"
      severity_levels: ["Blocker", "Major", "Minor"]
      extract_quotes: true
      cross_code_from_pain_points: true
      
    emotions:
      icon: "😊"
      description: "Emotional reactions and sentiment"
      emotion_types: ["Frustrated", "Confused", "Delighted", "Relieved", "Anxious", "Confident", "Satisfied", "Resigned"]
      extract_quotes: true
      minimum_required: 2

  coding_confidence:
    min_confidence: 0.75
    flag_low_confidence: true
    human_review_threshold: 0.60

file_processing:
  supported_formats:
    text: [".txt", ".md"]
    documents: [".docx", ".pdf"]
    subtitles: [".vtt", ".srt"]
    csv: [".csv"]
    
  max_file_size: "15MB"
  
  content_extraction:
    pdf_ocr: true
    docx_formatting: true
    csv_parsing: true
    subtitle_parsing: true
    timestamp_preservation: true
    speaker_diarization_preservation: true
    filename_analysis: true

ai_generation_tasks:
  - task_id: "transcript_coding_markdown"
    prompt: |
      MANDATORY WRITING REQUIREMENTS
      - NEVER use these words: crucial, seamless, ultimately, leverage, enhance, streamline
      - ALWAYS use direct, concrete language
      - ALWAYS use active voice and specific verbs
      - Follow all redaction, normalization, and formatting rules below
      - Return ONLY the final Markdown (no code fences, no backticks, no JSON, no prose outside the Markdown)

      You are a meticulous research-ops assistant. Read the transcript and (optional) notes, redact PII, normalize speakers, extract findings, and render a complete Markdown report.

      Context Hints
      - Filename: {{filename}}
      - Folder Context: {{folder_context}}
      - Upload Date (UTC): {{upload_date_utc}}
      - Transcript Source (optional): {{transcript_source}}

      Manual Notes (optional)
      {{manual_notes_text_or_blank}}

      Transcript
      {{input_text}}

      ============================================================
      ⚠️ MANDATORY ENFORCEMENT RULES - READ FIRST
      ============================================================

      These rules are NON-NEGOTIABLE. Outputs that violate these rules are INVALID.

      RULE 1 - PARTICIPANT CONTEXT IS MANDATORY
      You MUST extract participant context. Look for:
      - How often they use the app (frequency mentioned)
      - What tasks they typically do
      - Any disabilities, accessibility needs, or assistive tech
      - Age, military service, or other background mentioned
      - Experience level with technology
      - Comparison points they reference
      
      If the transcript mentions ANY of these, include them. Only output "Limited participant context" if the transcript truly contains ZERO context clues.

      RULE 2 - USABILITY ISSUES MUST CROSS-CODE FROM PAIN POINTS
      Every pain point that involves a UI element MUST ALSO appear in Usability Issues.
      
      Cross-code when pain point involves:
      - Buttons, links, or controls
      - Navigation or menus
      - Forms or input fields
      - Labels or text
      - Layout or positioning
      - Loading or performance
      - Error messages
      - Search functionality
      
      The usability_issues_count should typically be 50-80% of pain_points_count.
      If usability_issues_count is 0 but pain_points_count is greater than 0, your output is INVALID.

      RULE 3 - EMOTIONAL JOURNEY IS MANDATORY
      Every research session has emotional moments. You MUST capture at least 2.
      
      Look for these signals:
      - Frustration: "frustrating" / "annoying" / "I give up" / "I'd probably just call"
      - Confusion: "confusing" / "I don't understand" / "what does this mean" / questions
      - Satisfaction: "that works" / "makes sense" / "I like" / "good"
      - Relief: "found it" / "there it is" / "finally"
      - Resignation: "I'd just call instead" / "give up" / "not worth it"
      
      If emotions_count is 0 for a session with any struggle or success, your output is INVALID.

      RULE 4 - OPPORTUNITIES MINIMUM = 2
      Every session with pain points has opportunities. Infer them:
      - Pain point about confusing labels → Opportunity: Clarify labels
      - Pain point about hidden button → Opportunity: Improve button visibility
      - Pain point about slow loading → Opportunity: Improve performance
      - Positive feedback about one area → Opportunity: Apply pattern elsewhere
      - User says "I'd call instead" → Opportunity: Reduce need to call
      
      If opportunities_count is 0 but pain_points_count is greater than 2, your output is INVALID.

      RULE 5 - INSIGHTS MINIMUM = 2
      Every session reveals user behavior. Extract insights about:
      - HOW user navigates (trial-and-error, systematic, etc.)
      - WHAT user expects (mental models)
      - WHY user does things a certain way
      - Workarounds user employs
      - What causes user to abandon tasks
      - What user compares the app to
      
      If insights_count is 0 but total session length is over 3 minutes, your output is INVALID.

      RULE 6 - NO DUPLICATE PAIN POINTS
      Each pain point must be UNIQUE. Do not code the same issue twice.
      - If two quotes illustrate the same issue, combine into ONE pain point with the best quote
      - Use different titles for different issues
      - If you find yourself writing similar descriptions, MERGE them

      RULE 7 - SEVERITY MUST BE JUSTIFIED
      - Critical: ONLY for task blockers or accessibility violations that prevent completion
      - High: Significant frustration OR multiple failed attempts
      - Medium: Moderate confusion or inefficiency
      - Low: Minor annoyance that user overcomes easily
      
      Do NOT assign Critical to issues the user eventually overcomes.
      Do NOT assign Low to issues that cause explicit frustration statements.

      ============================================================
      PII REDACTION RULES
      ============================================================
      
      Apply before coding and in final transcript:
      - Redact personal names, email addresses, phone numbers, street addresses, company names, veteran IDs, case numbers, SSNs
      - Replace:
        - Names with auto_detected_participant_id
        - Emails with [EMAIL]
        - Phones with [PHONE]
        - Addresses with [ADDRESS]
        - Company names with [COMPANY]
        - Anything else sensitive with [REDACTED]
      - Redact inside quotes and speaker labels; preserve timestamps if present

      ============================================================
      SPEAKER NORMALIZATION
      ============================================================
      
      - Map Interviewer/Moderator/Researcher/Speaker 1/S1 to Speaker 1:
      - Map Participant/User/Respondent/Interviewee/Speaker 2/S2 to Speaker 2:
      - If a real name appears as speaker label, convert to Speaker number and redact name
      - Preserve existing timestamps. Do not invent timestamps
      - Keep fillers; structure as paragraphs per speaker

      ============================================================
      METADATA DETECTION
      ============================================================
      
      Use hints, then fallbacks:
      - auto_detected_participant_id: detect from filename/folder/content. Fallback: participant_YYYYMMDDHHmmss
      - auto_detected_session_id: detect session_1/s1/interview_1. Fallback: session_YYYYMMDD
      - auto_detected_study_name: detect from folder/content. Fallback: research_study
      - auto_detected_date: prefer date in transcript, else filename date, else upload date. Format: YYYY-MM-DD
      - transcript_source: use provided value or infer from format

      ============================================================
      AI CODING RULES
      ============================================================
      
      - Confidence range: 0 to 1
      - Include items with confidence >= 0.75
      - If 0.60-0.74, include but flag for review
      - If less than 0.60, exclude
      - Each item must include verbatim supporting_quote and timestamp if available

      ============================================================
      🔴 PAIN POINTS
      ============================================================

      Things that are BROKEN, FRUSTRATING, or INEFFICIENT.

      SIGNAL PHRASES:
      - "frustrating" / "confusing" / "annoying" / "not helpful"
      - "I can't find" / "I don't know" / "I don't understand"
      - "That's confusing" / "Those are two separate things?"
      - "I'd probably give up" / "I'd just call instead"
      - Trial-and-error behavior / Multiple attempts at same task

      SEVERITY ASSIGNMENT:
      - Critical: Task cannot be completed / Accessibility blocker
      - High: Explicit frustration statement OR multiple failed attempts OR "I'd give up"
      - Medium: Confusion requiring clarification OR inefficient workflow
      - Low: Minor annoyance user overcomes without frustration

      DEDUPLICATION:
      Before finalizing pain points, check: Are any two pain points about the SAME underlying issue?
      If yes, MERGE them. Keep the best quote. Use ONE entry.

      ============================================================
      🟡 OPPORTUNITIES
      ============================================================

      Improvements that would make experience better. MINIMUM: 2 per session.

      MANDATORY INFERENCE: For each pain point, ask: "What would fix this?"
      That fix is an opportunity.

      TYPES OF OPPORTUNITIES:
      1. Direct fixes: User explicitly says what should change
      2. Inferred fixes: Pain point implies needed improvement
      3. Pattern replication: Something works well, apply elsewhere
      4. Abandonment prevention: User says they'd give up or call instead

      SIGNAL PHRASES:
      - "I wish" / "There should be" / "It would help if"
      - "I'd expect" / "I thought it would"
      - "That's confusing" → Opportunity: Clarify
      - "I can't find" → Opportunity: Improve discoverability
      - "I'd probably call" → Opportunity: Reduce need for phone support
      - "This part works well" → Opportunity: Apply this pattern elsewhere

      IMPACT LEVELS:
      - High Impact: Affects core task completion or large user segment
      - Medium Impact: Affects efficiency or secondary tasks
      - Quick Win: Easy fix, clear benefit, low effort

      ============================================================
      💡 KEY INSIGHTS
      ============================================================

      Reveal HOW users think and work. MINIMUM: 2 per session.

      INSIGHT TYPES:
      
      Mental Model: How user expects things to work
      - "I thought it would be under..." / "I expected..."
      - Correct or incorrect predictions about navigation
      
      Behavior Pattern: How user actually navigates
      - Trial-and-error exploration
      - Systematic/methodical approach
      - Giving up and trying alternative channels
      
      Abandonment Pattern: When and why users give up
      - "I'd probably give up and call"
      - "By the time this loads, I could have talked to a person"
      - Switching to phone, in-person, or other channels
      
      Workaround: How user compensates for issues
      - Using external tools
      - Calling instead of using app
      - Memorizing complex navigation paths
      
      Benchmarking: What user compares to
      - Other apps or websites
      - Previous versions
      - Phone or in-person experience

      DO NOT just restate pain points. Insights are about USER BEHAVIOR, not interface problems.
      
      WRONG: "User faces difficulty with navigation" (this is a pain point)
      RIGHT: "User employs trial-and-error navigation, testing multiple paths when labels are unclear" (behavior pattern)

      ============================================================
      🟢 POSITIVE FEEDBACK
      ============================================================

      What works well. Include ALL positive comments, even brief ones:
      - "That's simple" / "straightforward" / "makes sense"
      - "I like" / "that works" / "good"
      - "Easy to find" / "clear"
      - Quick task completion without confusion

      ============================================================
      ✨ FEATURE REQUESTS
      ============================================================

      Explicit requests for new or changed functionality:
      - "There should be" / "I need" / "You should add"
      - "It would help if" / "I wish there was"
      - Direct suggestions

      PRIORITY:
      - Must Have: Blocks core functionality
      - Should Have: Would significantly improve experience
      - Nice to Have: Appreciated but not essential

      ============================================================
      ⚠️ USABILITY ISSUES
      ============================================================

      MANDATORY: Cross-code from pain points involving UI elements.

      Every pain point about these MUST also be a usability issue:
      - Buttons, links, controls
      - Navigation, menus
      - Forms, inputs
      - Labels, text
      - Layout, positioning
      - Loading, performance
      - Error messages
      - Search

      SEVERITY:
      - Blocker: Cannot complete task
      - Major: Significant difficulty or confusion
      - Minor: Slight friction, user overcomes

      ============================================================
      😊 EMOTIONAL JOURNEY
      ============================================================

      MANDATORY: Capture at least 2 emotional moments per session.

      EMOTION TYPES AND SIGNALS:

      Frustrated:
      - "frustrating" / "annoying" / "ridiculous"
      - "I shouldn't have to" / "Why do I have to"
      - Audible sighs, exasperation
      - Multiple failed attempts

      Confused:
      - "I don't understand" / "What does this mean"
      - "Are these different things?" / "That's confusing"
      - Questions about functionality
      - Hesitation, uncertainty

      Resigned:
      - "I'd probably give up" / "I'd just call instead"
      - "Not worth the effort" / "Forget it"
      - Abandonment statements

      Satisfied:
      - "That works" / "Makes sense" / "Good"
      - Quick completion
      - Positive tone

      Relieved:
      - "Found it" / "There it is" / "Finally"
      - Completion after struggle

      Confident:
      - Certainty in navigation
      - Quick decisions
      - "I know where this is"

      ============================================================
      CODING PROCESS - FOLLOW THIS ORDER
      ============================================================

      STEP 1: Read entire transcript
      
      STEP 2: Extract Participant Context
      - Note ANY background mentioned (frequency, tasks, accessibility needs, experience)
      - Only say "Limited" if truly NOTHING is mentioned
      
      STEP 3: Identify Pain Points
      - Find all frustrations, confusions, failures
      - Assign severity based on rules
      - DEDUPLICATE: Merge similar issues into one entry
      
      STEP 4: Cross-code Usability Issues
      - For EACH pain point involving UI, create matching usability issue
      - Use same quote, adjust severity if needed
      
      STEP 5: Extract Emotional Journey
      - Find at least 2 emotional moments
      - Include timestamp and context
      
      STEP 6: Infer Opportunities (minimum 2)
      - For each pain point, what would fix it?
      - What patterns from positive areas could apply elsewhere?
      
      STEP 7: Extract Insights (minimum 2)
      - How does user navigate? (behavior pattern)
      - What does user expect? (mental model)
      - When does user give up? (abandonment pattern)
      - What does user compare to? (benchmarking)
      
      STEP 8: Capture Positive Feedback
      - Include ALL positive comments
      
      STEP 9: Note Feature Requests
      - Explicit suggestions for new functionality
      
      STEP 10: Final Validation
      - Verify no duplicate pain points
      - Verify usability_issues_count > 0 if pain_points_count > 0
      - Verify emotions_count >= 2
      - Verify opportunities_count >= 2
      - Verify insights_count >= 2

      ============================================================
      BUCKETS AND REQUIRED FIELDS
      ============================================================

      pain_points:
        - severity: Critical, High, Medium, or Low
        - title: unique descriptive title (no duplicates)
        - description
        - supporting_quote: verbatim from transcript
        - timestamp
        - confidence

      opportunities:
        - impact_level: High Impact, Medium Impact, or Quick Win
        - title
        - description: include what pain point or positive this addresses
        - supporting_quote
        - timestamp
        - confidence

      insights:
        - insight_type: User Behavior, Mental Model, Workflow, Preference, Abandonment Pattern, Workaround, or Benchmarking
        - title
        - description: focus on USER behavior, not interface
        - supporting_quote
        - timestamp
        - confidence

      positive_feedback:
        - title
        - description
        - supporting_quote
        - timestamp
        - confidence

      feature_requests:
        - priority_level: Must Have, Should Have, or Nice to Have
        - title
        - description
        - supporting_quote
        - timestamp
        - confidence

      usability_issues:
        - severity: Blocker, Major, or Minor
        - title
        - description
        - supporting_quote
        - timestamp
        - confidence

      emotions:
        - emotion_type: Frustrated, Confused, Resigned, Satisfied, Relieved, or Confident
        - description: context of what triggered emotion
        - supporting_quote
        - timestamp
        - confidence

      ============================================================
      COUNTS AND SUMMARY
      ============================================================

      Compute after coding:
      - pain_points_count, opportunities_count, insights_count, positive_feedback_count, feature_requests_count, usability_issues_count, emotions_count
      - total_codes_found: sum across all buckets
      - high_confidence_codes: count with confidence >= 0.75
      - flagged_codes: count with confidence 0.60-0.74
      - avg_confidence_score: mean confidence x 100, rounded to integer
      - processing_duration: "unknown"

      ============================================================
      OUTPUT FORMAT
      ============================================================

      # auto_detected_participant_id Coded Transcript

      **Study:** auto_detected_study_name  
      **Participant:** auto_detected_participant_id  
      **Date:** auto_detected_date  
      **Source:** transcript_source  
      **Analysis:** AI-coded + PII redacted

      ---

      ## 👤 Participant Context
      [2-3 sentences about participant background, app usage frequency, accessibility needs, experience level. Extract from transcript - only say "Limited" if truly nothing mentioned.]

      ---

      ## 🔴 Pain Points (pain_points_count)
      For each item:
      **severity - title**
      - *Issue:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If empty: *No pain points were identified in this session.*

      ---

      ## 🟡 Opportunities (opportunities_count)
      For each item:
      **impact_level - title**
      - *Opportunity:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If empty: *No opportunities were identified in this session.*

      ---

      ## 💡 Key Insights (insights_count)
      For each item:
      **insight_type - title**
      - *Insight:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If empty: *No key insights were identified in this session.*

      ---

      ## 🟢 Positive Feedback (positive_feedback_count)
      For each item:
      **title**
      - *What worked:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If empty: *No positive feedback was identified in this session.*

      ---

      ## ✨ Feature Requests (feature_requests_count)
      For each item:
      **priority_level - title**
      - *Request:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If empty: *No feature requests were identified in this session.*

      ---

      ## ⚠️ Usability Issues (usability_issues_count)
      For each item:
      **severity - title**
      - *Issue:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If empty: *No usability issues were identified in this session.*

      ---

      ## 😊 Emotional Journey (emotions_count)
      For each item:
      **emotion_type** (timestamp)
      - *Context:* description
      - *Quote:* "supporting_quote"

      If empty: *No notable emotional reactions were identified in this session.*

      ---

      ## 📊 Coding Summary
      - **Total Codes:** total_codes_found
      - **High-Confidence Codes:** high_confidence_codes
      - **Flagged for Review:** flagged_codes
      - **Processing Time:** processing_duration

      *AI Coding Confidence: avg_confidence_score%*

      ---

      ## ✅ Validation Checklist
      - Pain points deduplicated: [Yes/No]
      - Usability issues cross-coded: [Yes/No] (usability_issues_count / pain_points_count)
      - Emotional journey captured: [Yes/No] (emotions_count)
      - Opportunities inferred: [Yes/No] (opportunities_count)
      - Insights extracted: [Yes/No] (insights_count)

  - task_id: "transcript_coding_filename"
    prompt: |
      Extract participant ID and output filename.

      Manual Notes (optional)
      {{manual_notes_text_or_blank}}

      Transcript
      {{input_text}}

      Detection Rules:
      - Look for explicit IDs: PT7, PT12, participant-15, participant_9, p23, user_7
      - Normalize: "Participant PT003" becomes pt003, "User 07" becomes pt007
      - If only human name appears, treat as no ID found
      - Fallback: participant_YYYYMMDDHHmmss from first date/time in text
      - If no date/time: participant_00000000000000

      Output: PARTICIPANT_ID-coded-transcript-analysis.md (lowercase)
      Return ONLY the filename, one line.

output_template: |
  {{ai_generated.transcript_coding_markdown}}

output_options:
  filename: "{{ai_generated.transcript_coding_filename}}"
  path: "03-fieldwork/coded-transcript-analysis/"
    
  delivery:
    github:
      enabled: true
      commit_message: "📝 {{auto_detected_participant_id}} coded transcript - {{total_codes_found}} codes"
      
    slack:
      enabled: true
      message_template: |
        🤖 **AI Coding Complete** for {{auto_detected_participant_id}}
        
        **Study:** {{auto_detected_study_name}} 
        **Session Date:** {{auto_detected_date}}
        
        🔴 {{pain_points_count}} Pain Points
        🟡 {{opportunities_count}} Opportunities  
        💡 {{insights_count}} Key Insights
        ⚠️ {{usability_issues_count}} Usability Issues
        😊 {{emotions_count}} Emotional Moments
        
      actions:
        - text: "📖 View Coded Analysis"
          url: "{{github_coded_analysis_url}}"

quality_assurance:
  content_validation:
    min_content_length: 200
    verify_speaker_labels: true
    check_pii_redaction: true
    
  metadata_validation:
    verify_auto_detection_accuracy: true
    validate_participant_id_format: true
    check_session_id_format: true
    confirm_study_context: true
    
  coding_validation:
    min_codes_expected: 5
    verify_quote_accuracy: true
    check_timestamp_alignment: true
    flag_low_confidence_codes: true
    
    # Enforcement rules
    require_opportunities_minimum: 2
    require_insights_minimum: 2
    require_emotions_minimum: 2
    require_usability_crosscode: true
    require_pain_point_deduplication: true
    require_participant_context: true
    
    validate_opportunities_are_not_pain_points: true
    validate_insights_reveal_behavior: true
    ensure_usability_overlap_with_pain_points: true
    
  research_readiness:
    verify_participant_id_consistency: true
    check_coding_coverage: true
    validate_insight_quality: true

cross_session_analysis:
  pattern_detection:
    enabled: true
    compare_with_existing_sessions: true
    identify_recurring_themes: true
    flag_new_patterns: true
    
  synthesis_triggers:
    auto_trigger_synthesis: "session_count >= 5"
    weekly_synthesis: true
    pattern_alerts: true

notifications:
  coding_complete:
    message: |
      🤖 **AI Coding Complete: {{auto_detected_participant_id}}**
      
      **{{total_codes_found}} codes identified**
      
      🔴 {{pain_points_count}} Pain Points
      🟡 {{opportunities_count}} Opportunities
      💡 {{insights_count}} Insights
      ⚠️ {{usability_issues_count}} Usability Issues
      😊 {{emotions_count}} Emotional Moments
      
      {% if flagged_codes > 0 %}
      ⚠️ {{flagged_codes}} codes flagged for review
      {% endif %}
      
    actions:
      - text: "📖 Review Coded Analysis"
        url: "{{github_coded_analysis_url}}"

error_handling:
  validation_failure:
    message: "Coding validation failed. Check enforcement rules."
    action: "flag_for_review"
    
  file_too_large:
    message: "File exceeds 15MB limit."
    suggestion: "Split or compress file."
    
  unsupported_format:
    message: "Format not supported. Convert to .txt, .docx, .pdf, or .md"
    
  pii_detection_failed:
    message: "PII redaction incomplete. Manual review required."
    action: "flag_for_manual_review"

analytics:
  track_enforcement_compliance: true
  track_opportunities_rate: true
  track_insights_rate: true
  track_usability_crosscode_rate: true
  track_emotional_journey_coverage: true
  track_deduplication_rate: true
  measure_coding_consistency: true

notes: |
  v2.1 Changes:
  - Added MANDATORY ENFORCEMENT RULES section at top of prompt
  - Added Rule 1: Participant Context is mandatory (not just "Limited")
  - Added Rule 2: Usability Issues must cross-code from pain points
  - Added Rule 3: Emotional Journey minimum = 2
  - Added Rule 4: Opportunities minimum = 2
  - Added Rule 5: Insights minimum = 2
  - Added Rule 6: No duplicate pain points
  - Added Rule 7: Severity must be justified
  - Added Validation Checklist to output
  - Added "Resigned" and "Abandonment Pattern" types
  - Added explicit CODING PROCESS steps
  - Added quality_assurance enforcement rules
