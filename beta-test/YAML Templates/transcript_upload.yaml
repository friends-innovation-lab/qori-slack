id: transcript_upload
label: "📝 Upload & Code Session Transcript"
description: Upload transcripts with automatic PII redaction and AI-powered research coding
input_type: tabbed_upload
input_processing: ai_enhanced_coding

input_tabs:
  file_upload:
    label: "📁 Upload File"
    description: "Upload transcript from Zoom, Otter.ai, or other source"
    fields:
      uploaded_file:
        type: "file"
        label: "Select Transcript File"
        accept: [".txt", ".docx", ".pdf", ".md", ".vtt", ".srt"]
        max_size: "15MB"
        drag_drop: true
        required: true
        
      transcript_source:
        type: "select"
        label: "Source (Optional)"
        required: false
        options:
          - "Zoom Auto-Generated"
          - "Otter.ai"
          - "Rev.com"
          - "Teams Auto-Generated"
          - "Manual Notes"
          - "Other"
    
  paste_text:
    label: "📋 Paste Text"
    description: "Copy and paste transcript directly"
    fields:
      manual_transcript:
        type: "textarea"
        label: "Transcript Content"
        placeholder: "Paste your transcript here..."
        rows: 20
        word_count: true
        required: true

privacy_protection:
  pii_scrubbing:
    enabled: true
    auto_detect: true
    
    speaker_label_redaction:
      enabled: true
      replace_name_labels_with: "Speaker {{number}}"
      auto_assign_speaker_numbers: true
    
    patterns_to_redact:
      names: true
      email_addresses: true
      phone_numbers: true
      ssn: true
      addresses: true
      veteran_ids: true
      case_numbers: true
      company_names: true
    
    replacement_strategy:
      names: "{{auto_detected_participant_id}}"
      email_addresses: "[EMAIL]"
      phone_numbers: "[PHONE]"
      addresses: "[ADDRESS]"
      company_names: "[COMPANY]"
      generic: "[REDACTED]"
      
    confidence_threshold: 0.85

ai_processing:
  metadata_extraction:
    auto_detect_participant_id: true
    auto_detect_session_info: true
    auto_detect_study_context: true
    
    extraction_patterns:
      participant_id:
        filename_patterns: ["pt001", "participant_1", "p1", "user_01"]
        content_patterns: ["Participant ID:", "Participant:", "User:"]
        fallback: "participant_{{timestamp}}"
        
      session_id:
        filename_patterns: ["session_1", "s1", "interview_1"]
        content_patterns: ["Session:", "Interview #", "Meeting ID:"]
        fallback: "session_{{date}}"
        
      study_name:
        folder_context: true
        filename_patterns: ["housing_study", "va_research"]
        content_patterns: ["Study:", "Research Project:", "Project:"]
        fallback: "research_study"
        
      session_date:
        filename_date_patterns: true
        content_patterns: ["Date:", "Session Date:", "Interview Date:"]
        file_modified_date: true
        fallback: "{{upload_date}}"
    
  transcript_cleaning:
    fix_obvious_errors: true
    auto_detect_speaker_format: true
    standardize_speaker_labels: true
    preserve_timestamps: true
    remove_excessive_filler: false
    
    speaker_format_patterns:
      - pattern: "Interviewer:|Moderator:|Researcher:|Speaker 1:|Speaker1:|S1:"
        standardize_to: "Speaker 1:"
      - pattern: "Participant:|User:|Respondent:|Interviewee:|Speaker 2:|Speaker2:|S2:"
        standardize_to: "Speaker 2:"
      - pattern: "^[A-Z][a-z]+ [A-Z][a-z]*:"
        standardize_to: "Speaker {{auto_number}}:"
        pii_redaction_required: true
        auto_number_speakers: true
    
  research_formatting:
    paragraph_breaks_by_speaker: true
    consistent_speaker_format: true
    preserve_emotional_indicators: true
    maintain_context_cues: true

ai_coding:
  enabled: true
  
  coding_categories:
    pain_points:
      icon: "🔴"
      description: "Frustrations, difficulties, problems, barriers"
      severity_levels: ["Critical", "High", "Medium", "Low"]
      extract_quotes: true
      
    opportunities:
      icon: "🟡"  
      description: "Unmet needs, suggestions, improvement areas"
      impact_levels: ["High Impact", "Medium Impact", "Quick Win"]
      extract_quotes: true
      priority: "high"
      
    insights:
      icon: "💡"
      description: "Key behaviors, patterns, revelations, mental models"
      insight_types: ["User Behavior", "Mental Model", "Workflow", "Preference", "Accessibility Pattern", "Benchmarking"]
      extract_quotes: true
      priority: "high"
      
    positive_feedback:
      icon: "🟢"
      description: "What's working well, successful interactions"
      extract_quotes: true
      
    feature_requests:
      icon: "✨"
      description: "Explicit requests for new features or changes"
      priority_levels: ["Must Have", "Should Have", "Nice to Have"]
      extract_quotes: true
      
    usability_issues:
      icon: "⚠️"
      description: "Interface problems, confusion, interaction failures"
      severity_levels: ["Blocker", "Major", "Minor"]
      extract_quotes: true
      
    emotions:
      icon: "😊"
      description: "Emotional reactions and sentiment"
      emotion_types: ["Frustrated", "Confused", "Delighted", "Relieved", "Anxious", "Confident", "Satisfied"]
      extract_quotes: true

  coding_confidence:
    min_confidence: 0.75
    flag_low_confidence: true
    human_review_threshold: 0.60

file_processing:
  supported_formats:
    text: [".txt", ".md"]
    documents: [".docx", ".pdf"]
    subtitles: [".vtt", ".srt"]
    csv: [".csv"]
    
  max_file_size: "15MB"
  
  content_extraction:
    pdf_ocr: true
    docx_formatting: true
    csv_parsing: true
    subtitle_parsing: true
    timestamp_preservation: true
    speaker_diarization_preservation: true
    filename_analysis: true

ai_generation_tasks:
  - task_id: "transcript_coding_markdown"
    prompt: |
      MANDATORY WRITING REQUIREMENTS
      - NEVER use these words: crucial, seamless, ultimately, leverage, enhance, streamline
      - ALWAYS use direct, concrete language
      - ALWAYS use active voice and specific verbs
      - Follow all redaction, normalization, and formatting rules below
      - Return ONLY the final Markdown (no code fences, no backticks, no JSON, no prose outside the Markdown)

      You are a meticulous research-ops assistant. Read the transcript and (optional) notes, redact PII, normalize speakers, extract findings, and render a complete Markdown report in the exact section order specified.

      Context Hints
      - Filename: {{filename}}
      - Folder Context: {{folder_context}}
      - Upload Date (UTC): {{upload_date_utc}}
      - Transcript Source (optional): {{transcript_source}}

      Manual Notes (optional)
      {{manual_notes_text_or_blank}}

      Transcript
      {{input_text}}

      ---
      PII REDACTION RULES (apply before coding and in the final transcript)
      - Redact personal names, email addresses, phone numbers, street addresses, company names, veteran IDs, case numbers, SSNs
      - Replace:
        - Names with auto_detected_participant_id (an ID you derive per rules below)
        - Emails with [EMAIL]
        - Phones with [PHONE]
        - Addresses with [ADDRESS]
        - Company names with [COMPANY]
        - Anything else sensitive with [REDACTED]
      - Redact inside quotes and speaker labels; preserve timestamps if present

      SPEAKER NORMALIZATION
      - Map Interviewer/Moderator/Researcher/Speaker 1/S1 to Speaker 1:
      - Map Participant/User/Respondent/Interviewee/Speaker 2/S2 to Speaker 2:
      - If a real name appears as a speaker label (e.g., John:), convert to the appropriate Speaker number and ensure the name is redacted
      - Preserve existing timestamps (e.g., 00:12:31.450). Do not invent timestamps
      - Keep fillers; structure as paragraphs per speaker

      METADATA DETECTION (use hints, then fallbacks)
      - auto_detected_participant_id: detect from filename/folder/content (examples: pt001, participant_1, p1, user_01). Fallback: participant_YYYYMMDDHHmmss (UTC)
      - auto_detected_session_id: detect session_1/s1/interview_1; fallback: session_YYYYMMDD
      - auto_detected_study_name: detect from folder/content (examples: housing_study, va_research); fallback: research_study
      - auto_detected_date: prefer date in transcript/notes, else filename date, else upload date; format YYYY-MM-DD
      - transcript_source: use provided value if present; else infer one of: Zoom Auto-Generated, Otter.ai, Teams Auto-Generated, Rev.com, Manual Notes, Other

      ---
      AI CODING RULES
      - Confidence range: 0 to 1
      - Include items with confidence >= 0.75
      - If 0.60-0.74, include them but they count toward Flagged for Review
      - If less than 0.60, exclude
      - Each item must include a verbatim supporting_quote and a timestamp if available; if the transcript has no timestamps anywhere, set timestamp to an empty string

      ============================================================
      SEVERITY AND IMPACT ASSIGNMENT RULES
      ============================================================

      CRITICAL RULE FOR ACCESSIBILITY ISSUES:
      If the participant uses assistive technology (screen reader, VoiceOver, TalkBack, JAWS, etc.), apply these severity overrides:

      CRITICAL severity for:
      - Unlabeled buttons, images, or controls (screen reader cannot identify function)
      - Missing ARIA labels or roles
      - Content not announced by screen reader
      - Focus management failures
      - Any issue that BLOCKS a screen reader user from completing a task

      HIGH severity for:
      - Hidden or hard-to-find controls for screen reader users
      - Non-standard patterns requiring exhaustive search
      - Poor reading order or confusing navigation
      - Any issue causing significant extra effort for assistive tech users

      GENERAL SEVERITY GUIDE:
      - Critical: Blocks task completion or represents accessibility violation for AT users
      - High: Significant frustration, multiple attempts needed, or major confusion
      - Medium: Notable inefficiency or moderate confusion
      - Low: Minor annoyance, easily overcome

      ============================================================
      🔴 PAIN POINTS - What They Are
      ============================================================

      Things that are BROKEN, FRUSTRATING, or INEFFICIENT:
      - Broken functionality or bugs
      - Accessibility violations (especially critical for AT users)
      - Confusing interfaces
      - Inefficient workflows caused by poor design
      - Missing information that should be present
      - Guessing or trial-and-error required

      LOOK FOR THESE SIGNALS:
      - Explicit frustration: "That's not helpful" / "I shouldn't have to..."
      - Confusion: "I don't know what this does" / "There's no way to tell..."
      - Failure: "I can't find..." / "It doesn't work..."
      - Workarounds: "I have to guess..." / "Let me try..."

      ============================================================
      🟡 OPPORTUNITIES - What They Are
      ============================================================

      Opportunities are improvements that would make the experience better. They can be:
      1. NEW capabilities the user wishes existed
      2. FIXES that the user explicitly requests or suggests
      3. PATTERNS from successful areas that could be applied elsewhere
      4. STANDARDS the user references from other experiences

      THE OPPORTUNITY TEST (must pass at least 1):
      - Does the user express desire for something (wish, want, should, need)?
      - Does the user suggest a solution or improvement?
      - Does the user reference a better experience elsewhere?
      - Does a successful part of the experience suggest a pattern to replicate?

      SIGNAL PHRASES for opportunities:
      - "I wish..." / "There should be..." / "It would be great if..."
      - "Every [thing] needs..." / "[Thing] should have..."
      - "A well-designed app would..." / "Other apps let me..."
      - "I have to go to [other tool] to..." (implies missing capability)
      - "This part works well because..." (pattern to replicate)

      VALID OPPORTUNITY EXAMPLES from transcripts like this:
      - User says "Every button needs a proper label" = Opportunity for accessibility label remediation
      - User struggles to find Schedule button = Opportunity to add visible scheduling action
      - User praises one section structure = Opportunity to apply that pattern elsewhere
      - User compares unfavorably to commercial apps = Opportunity to meet industry standards

      IMPORTANT: Do NOT skip opportunities just because they involve "fixing" something. If the user articulates what they WANT or NEED, that's an opportunity.

      ============================================================
      💡 INSIGHTS - What They Are
      ============================================================

      Insights reveal HOW users think, work, and approach tasks. They help teams understand user behavior beyond just problems.

      THE INSIGHT TEST (must pass at least 1):
      - Does this describe HOW or WHY the user does something?
      - Does this reveal a pattern that would apply to similar users?
      - Does this show user expectations, mental models, or strategies?
      - Does this explain user context that frames their feedback?

      INSIGHT TYPES TO LOOK FOR:

      Mental Model: How user expects things to work
      - User correctly/incorrectly predicts where to find something
      - User applies patterns from other experiences
      - User has assumptions about how system should behave

      Behavior Pattern: How user actually navigates or works
      - Sequential/systematic navigation approach
      - Trial-and-error vs. methodical exploration
      - Shortcuts or efficiency strategies

      User Context: Background that frames their perspective
      - Assistive technology expertise level
      - Frequency of use
      - Comparison points (other apps, previous versions)

      Accessibility Pattern: How AT users specifically interact
      - Screen reader navigation strategies
      - How they explore unfamiliar interfaces
      - What they rely on (labels, headings, landmarks)

      Benchmarking: What users compare against
      - Commercial app expectations
      - Industry standards
      - Previous experiences

      SIGNAL PHRASES for insights:
      - "I always..." / "I typically..." / "My process is..."
      - "I'm guessing that would be under..." (mental model)
      - "Let me try..." / "Let me check..." (exploration strategy)
      - "That's how I normally..." / "I use [tool] because..."
      - "It's better/worse than..." (benchmarking)

      VALID INSIGHT EXAMPLES from transcripts like this:
      - User predicts menu structure correctly = Mental Model insight about IA expectations
      - User navigates systematically through all elements = Behavior Pattern for screen reader users
      - User compares to commercial apps = Benchmarking insight about user standards
      - User demonstrates VoiceOver expertise = User Context about AT proficiency

      IMPORTANT: Insights should NOT just restate pain points. "User faces difficulty" is a pain point. "User explores interfaces exhaustively due to screen reader navigation" is an insight.

      ============================================================
      😊 EMOTIONAL JOURNEY - What to Capture
      ============================================================

      Capture emotional shifts throughout the session. Look for:

      FRUSTRATION signals:
      - Tone words: "frustrating" / "annoying" / "not helpful"
      - Exasperation: "I shouldn't have to..." / "That's ridiculous..."
      - Repeated attempts: Multiple tries at same task

      CONFUSION signals:
      - Questions: "What does this do?" / "Where is...?"
      - Hedging: "I'm not sure..." / "Maybe..."
      - Pauses: [Long pause] / "Let me think..."

      SATISFACTION/RELIEF signals:
      - Positive statements: "That works well" / "Makes sense"
      - Completion: "Found it!" / "There it is"
      - Praise: "I like..." / "This is good"

      CONFIDENCE signals:
      - Certainty: "I know..." / "Obviously..."
      - Quick navigation: Moving through sections easily
      - Teaching tone: Explaining how things should work

      Include timestamp and context for each emotional moment.

      ============================================================
      ✨ FEATURE REQUESTS - What to Capture
      ============================================================

      Explicit requests for new or changed functionality:
      - "There should be..." / "I need..." / "You should add..."
      - "Every [thing] needs to..." (prescriptive statement)
      - Direct suggestions for improvement

      Priority levels:
      - Must Have: Blocks core functionality or accessibility
      - Should Have: Would significantly improve experience
      - Nice to Have: Would be appreciated but not essential

      ============================================================
      CODING PROCESS
      ============================================================

      1. Read the ENTIRE transcript carefully
      2. Note participant context (assistive tech use, experience level, etc.)
      3. Identify ALL pain points - apply accessibility severity rules if AT user
      4. For each pain point involving UI elements, ALSO code as usability issue
      5. Look for opportunities using signal phrases AND user suggestions
      6. Extract insights about HOW and WHY user behaves (not just problems)
      7. Track emotional journey throughout session
      8. Note explicit feature requests
      9. Capture ALL positive feedback, even brief mentions
      10. Ensure each finding has a direct supporting quote

      DIVERSITY CHECK before finalizing:
      - Do opportunities cover DIFFERENT aspects than pain points (not just restating)?
      - Do insights reveal user BEHAVIOR/THINKING (not just problems)?
      - Is emotional journey captured across the session (not just one moment)?

      ============================================================
      BUCKETS AND REQUIRED FIELDS
      ============================================================

      pain_points:
        - severity: one of Critical, High, Medium, Low (use accessibility rules for AT users)
        - title, description, supporting_quote, timestamp, confidence

      opportunities:
        - impact_level: one of High Impact, Medium Impact, Quick Win
        - title, description, supporting_quote, timestamp, confidence

      insights:
        - insight_type: one of User Behavior, Mental Model, Workflow, Preference, Accessibility Pattern, Benchmarking
        - title, description, supporting_quote, timestamp, confidence

      positive_feedback:
        - title, description, supporting_quote, timestamp, confidence

      feature_requests:
        - priority_level: one of Must Have, Should Have, Nice to Have
        - title, description, supporting_quote, timestamp, confidence

      usability_issues:
        - severity: one of Blocker, Major, Minor
        - title, description, supporting_quote, timestamp, confidence

      emotions:
        - emotion_type: one of Frustrated, Confused, Delighted, Relieved, Anxious, Confident, Satisfied
        - description, supporting_quote, timestamp, confidence

      ============================================================
      COUNTS AND SUMMARY
      ============================================================

      Compute after gating by confidence:
      - pain_points_count, opportunities_count, insights_count, positive_feedback_count, feature_requests_count, usability_issues_count, emotions_count: sizes of corresponding arrays
      - total_codes_found: total number of included items across all buckets
      - high_confidence_codes: count of items with confidence >= 0.75
      - flagged_codes: count of items with confidence between 0.60 and 0.74
      - avg_confidence_score: integer percentage; mean confidence of all included items x 100, rounded; if no items, return 0
      - processing_duration: output "unknown"

      Empty Section Handling:
      - If a section array is empty, output the designated fallback text

      ---
      RENDER THIS EXACT MARKDOWN STRUCTURE

      # auto_detected_participant_id Coded Transcript

      **Study:** auto_detected_study_name  
      **Participant:** auto_detected_participant_id  
      **Date:** auto_detected_date  
      **Source:** transcript_source  
      **Analysis:** AI-coded + PII redacted

      ---

      ## 👤 Participant Context
      In 2-3 sentences, summarize key context about this participant:
      - Assistive technology use (if any)
      - Experience level with the app/system
      - Relevant background mentioned
      - Primary tasks or goals for this session

      If no context available, output: *Limited participant context available in transcript.*

      ---

      ## 🔴 Pain Points (pain_points_count)
      For each item in pain_points:
      **severity - title**
      - *Issue:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If pain_points is empty, output: *No pain points were identified in this session.*

      ---

      ## 🟡 Opportunities (opportunities_count)
      For each item in opportunities:
      **impact_level - title**
      - *Opportunity:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If opportunities is empty, output: *No opportunities were identified in this session.*

      ---

      ## 💡 Key Insights (insights_count)
      For each item in insights:
      **insight_type - title**
      - *Insight:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If insights is empty, output: *No key insights were identified in this session.*

      ---

      ## 🟢 Positive Feedback (positive_feedback_count)
      For each item in positive_feedback:
      **title**
      - *What worked:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If positive_feedback is empty, output: *No positive feedback was identified in this session.*

      ---

      ## ✨ Feature Requests (feature_requests_count)
      For each item in feature_requests:
      **priority_level - title**
      - *Request:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If feature_requests is empty, output: *No feature requests were identified in this session.*

      ---

      ## ⚠️ Usability Issues (usability_issues_count)
      For each item in usability_issues:
      **severity - title**
      - *Issue:* description
      - *Quote:* "supporting_quote"
      - *Timestamp:* timestamp

      If usability_issues is empty, output: *No usability issues were identified in this session.*

      ---

      ## 😊 Emotional Journey (emotions_count)
      For each item in emotions:
      **emotion_type** (timestamp)
      - *Context:* description
      - *Quote:* "supporting_quote"

      If emotions is empty, output: *No notable emotional reactions were identified in this session.*

      ---

      ## 📊 Coding Summary
      - **Total Codes:** total_codes_found
      - **High-Confidence Codes:** high_confidence_codes
      - **Flagged for Review:** flagged_codes
      - **Processing Time:** processing_duration

      *AI Coding Confidence: avg_confidence_score%*

  - task_id: "transcript_coding_filename"
    prompt: |
      You will receive only the Manual Notes and Transcript text. Extract a participant id and output a filename.

      Manual Notes (optional)
      {{manual_notes_text_or_blank}}

      Transcript
      {{input_text}}

      Detection Rules:
      - Look for explicit IDs such as: PT7, PT12, participant-15, participant_9, p23, user_7, user-42
      - Normalize examples:
        - "Participant PT003" becomes pt003
        - "User 07" becomes pt007
      - If only a human name appears (e.g., "Participant: John"), treat as no ID found.
      - Fallback when no ID is found:
        - Build participant_YYYYMMDDHHmmss (UTC) from the first date/time found in the text.
        - If only a date (no time) is found, append 000000.
        - If no date/time is found at all, use participant_00000000000000.

      Output Rules:
      - Produce: PARTICIPANT_ID-coded-transcript-analysis.md (replace PARTICIPANT_ID with the detected/normalized id, in lowercase)
      - Return ONLY the filename as one line
      - Example: pt003-coded-transcript-analysis.md

output_template: |
  {{ai_generated.transcript_coding_markdown}}

output_options:
  filename: "{{ai_generated.transcript_coding_filename}}"
  path: "03-fieldwork/coded-transcript-analysis/"
    
  delivery:
    github:
      enabled: true
      commit_message: "📝 {{auto_detected_participant_id}} coded transcript analysis - {{total_codes_found}} insights identified"
      
    slack:
      enabled: true
      message_template: |
        🤖 **AI Coding Complete** for {{auto_detected_participant_id}}
        
        **Study:** {{auto_detected_study_name}} 
        **Participant:** {{auto_detected_participant_id}}
        **Session Date:** {{auto_detected_date}}
        **Insights Found:** {{total_codes_found}} codes identified
        
        🔴 {{pain_points_count}} Pain Points
        🟡 {{opportunities_count}} Opportunities  
        💡 {{insights_count}} Key Insights
        ⚠️ {{usability_issues_count}} Usability Issues
        
      actions:
        - text: "📖 View Coded Analysis"
          url: "{{github_coded_analysis_url}}"

quality_assurance:
  content_validation:
    min_content_length: 200
    verify_speaker_labels: true
    check_pii_redaction: true
    
  metadata_validation:
    verify_auto_detection_accuracy: true
    validate_participant_id_format: true
    check_session_id_format: true
    confirm_study_context: true
    
  coding_validation:
    min_codes_expected: 5
    verify_quote_accuracy: true
    check_timestamp_alignment: true
    flag_low_confidence_codes: true
    require_opportunities: true
    require_insights: true
    validate_opportunities_are_not_pain_points: true
    validate_insights_reveal_behavior: true
    ensure_usability_overlap_with_pain_points: true
    require_emotional_journey: true
    validate_accessibility_severity: true
    
  research_readiness:
    verify_participant_id_consistency: true
    check_coding_coverage: true
    validate_insight_quality: true

cross_session_analysis:
  pattern_detection:
    enabled: true
    compare_with_existing_sessions: true
    identify_recurring_themes: true
    flag_new_patterns: true
    
  synthesis_triggers:
    auto_trigger_synthesis: "session_count >= 5"
    weekly_synthesis: true
    pattern_alerts: true

notifications:
  upload_complete:
    message: |
      ✅ **{{auto_detected_participant_id}} transcript is ready for coding**
      
      Privacy protected • Ready for analysis
      
    actions:
      - text: "📖 Open Transcript"
        url: "{{github_transcript_url}}"

  coding_complete:
    message: |
      🤖 **AI Coding Complete: {{auto_detected_study_name}}/{{auto_detected_participant_id}}**
      
      **{{total_codes_found}} insights automatically coded**
      
      🔴 **{{pain_points_count}} Pain Points** ({{critical_pain_points}} critical)
      🟡 **{{opportunities_count}} Opportunities** ({{high_impact_opportunities}} high-impact)
      💡 **{{insights_count}} Key Insights**
      
      {% if flagged_codes > 0 %}
      ⚠️ **{{flagged_codes}} codes** flagged for human review
      {% endif %}
      
    actions:
      - text: "📖 Review Coded Analysis"
        url: "{{github_coded_analysis_url}}"

error_handling:
  file_too_large:
    message: "File size exceeds 15MB limit. Please compress or split the file."
    suggestion: "Try uploading as plain text or splitting into multiple files."
    
  unsupported_format:
    message: "File format not supported. Please convert to .txt, .docx, .pdf, or .md"
    suggestion: "Most transcription services can export to these formats."
    
  pii_detection_failed:
    message: "Unable to complete PII redaction. Manual review required."
    action: "flag_for_manual_review"
    
  metadata_extraction_failed:
    message: "Could not auto-detect participant information. Using fallback values."
    action: "proceed_with_fallbacks"
    notification: "Please verify participant ID and session details in the generated file."
    
  transcription_unclear:
    message: "Transcript quality may be low. Consider re-uploading with better source."
    action: "proceed_with_warning"

analytics:
  track_upload_method_preferences: true
  measure_processing_time: true
  monitor_pii_redaction_accuracy: true
  track_file_format_usage: true
  measure_transcript_quality: true
  track_coding_accuracy: true
  measure_cross_session_patterns: true
  track_opportunities_identification_rate: true
  track_insights_identification_rate: true
