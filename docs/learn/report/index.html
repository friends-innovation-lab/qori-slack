<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stakeholder Reports — Learn Qori</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(214.3 31.8% 91.4%)",
                        background: "hsl(0 0% 100%)",
                        foreground: "hsl(222.2 84% 4.9%)",
                        primary: { DEFAULT: "hsl(142.1 76.2% 36.3%)", foreground: "hsl(355.7 100% 97.3%)" },
                        muted: { DEFAULT: "hsl(210 40% 96.1%)", foreground: "hsl(215.4 16.3% 46.9%)" },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Consolas', 'monospace'],
                    },
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-background text-foreground antialiased">
    <header class="sticky top-0 z-50 bg-background/80 backdrop-blur-sm border-b border-border">
        <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="../" class="flex items-center gap-3">
                <img src="../assets/qori_logo.png" alt="Qori" class="w-8 h-8 rounded-lg">
                <span class="font-semibold text-lg text-foreground">Qori</span>
            </a>
            <a href="https://github.com/Friends-From-The-City/Qori-Slack-AI-Bot" class="flex items-center gap-2 text-sm text-muted-foreground hover:text-foreground transition-colors">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                GitHub
            </a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-16">
        <div class="text-center mb-8">
            <span class="inline-block bg-foreground text-background text-xs font-semibold uppercase tracking-wide px-3 py-1 rounded-full mb-4">Analysis</span>
            <div class="flex items-center justify-center gap-2 flex-wrap">
                <a href="../analyze/" class="inline-block border border-border text-muted-foreground hover:text-foreground hover:border-foreground text-sm font-medium px-4 py-1.5 rounded-full transition-colors">Analyze Sessions</a>
                <a href="../synthesis/" class="inline-block border border-border text-muted-foreground hover:text-foreground hover:border-foreground text-sm font-medium px-4 py-1.5 rounded-full transition-colors">Synthesis</a>
                <span class="inline-block bg-foreground text-background text-sm font-medium px-4 py-1.5 rounded-full">Stakeholder Reports</span>
            </div>
        </div>

        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-foreground mb-4 tracking-tight">Stakeholder Reports</h1>
            <p class="text-lg text-muted-foreground max-w-xl mx-auto mb-6">Generate polished reports, auto-create GitHub issues.</p>
            <code class="inline-block bg-zinc-100 text-zinc-800 font-mono text-sm px-4 py-2 rounded-lg">/qori-report</code>
        </div>

        <div class="bg-gradient-to-br from-slate-50 to-slate-100 border border-slate-200/50 rounded-xl p-8 text-center">
            <p class="text-muted-foreground">Tutorial content coming soon</p>
        </div>
    </main>

    <footer class="border-t border-border py-8">
        <p class="text-center text-sm text-muted-foreground">Built for research teams by Qori</p>
    </footer>
</body>
</html>
